body:
  text: 容春堂後集卷四明卲寶撰墓志銘十四首明故通奉大夫河南左布政使楊君墓志銘正德癸酉冬十二月三日河南左布政使楊君名父以入覲北行卒於衛輝之驛舍汝府陳長史某以其介子孫辰殮其冢子國子生孫元自京師奔至奉其喪歸奉京兆楊公方震狀來請銘豫知君久比又得君之詳於其姻友都御史魏公士華近聞君調江西說者謂將遂以君撫巡豫日計君南來而不意其至是也烏乎惜哉君諱子器名父其字别號柳塘世為慈溪人唐宋來代有顯者至君高祖彥良曾祖斗瞻祖佶皆隱以終父祿字履翁號石田以儒醫名纍贈吏部員外郎母張氏纍封太宜人君舉浙省成化丙午經魁明年丁未登進士除知崑山縣以石田憂去𢎞治甲寅起復知山西之高平二年調常熟又二年考最進階文林郎受贈封典尋以風憲召補考功主事正德丙寅轉驗封員外郎以詔加贈封之恩尋升郎中又四年遷湖廣右參議尋轉福建提學按察副使一年轉河南右參政尋進右布政使是歲以湖廣郴桂功受白金文綺之賜尋轉今官以卒歷中外若干年年五十六君生有異質志高而鋭於學初入邑庠都御史白洲李公以按察副使提學兩浙見君諸生中曰天下士也既而高第主司猶以未首薦為慊在崑山常熟延禮文儒討論羣籍以資博洽高平則專以經義教諸生旁及鄰邑在吏部時嘗倡為五經㑹非甚病雖冗不輟披覽同考㑹試以得士稱提學尤稱精鍳所著凡若干卷其篤學如此每談治體自六部逹諸鎮能歷道其故及當變通之宜北敵犯邉嘗陳邉務數十事馬鈞陽劉華容二公皆重嘆許其才略如此𢎞治末多所建白至孝廟山陵方起君聞有水石為病上疏言之至下君詔獄執不變未幾還君於職君子謂君言於君無隱情而山陵之議大矣君既葬石田公廬墓陽嘉山中至功衰猶戚事張太宜人不有私篋其忠孝大節如此君歷三縣因時立政畫然歸於禮法極力乃已毁諸淫祠而以其材充廟學公署之用常熟稅入常後期君令先輸者無耗計日遞加既乃以多益寡耗足轉輸而民無敢後者東南諸水由常熟白茅塘入海工侍淳安徐公嘗合四郡力疏之㑹有漲沙當海口潮汐增淤水患如故君相許浦塘便率民開之比歲衝流日深水不為患汴城苦逺汲君井城中數十處皆得美泉又作屋以居織染貧匠其惠利如此君為考功郎中逆瑾勢方熾君惟共職不敢以媚㑹有擬薦某為某官某為某官而擬君翰林者君聞之亟為書辭於內閣事為之寢當是時辭難處辭尤難識者以是韙君其自守如此初至湖廣分守辰常道㑹郴桂賊起遂請改道自效冒暑提兵追賊平之在福建以進表至京師㑹轉河南時方以郴桂積勞成疾而東賊方渡河天又寒甚有勸緩行者君亟輿而往即至嵩縣居守賊方走湖廣君曰賊逼土兵必復向汝州洛陽藩籬備不可缺乃自嵩馳赴之賊至君輟食登城晝夜調度手書示城中人曰不上城及上而輒下者皆斬既而有將下從賊者即斬以狥城守益堅賊遂引去其臨事應遽如此山陵之獄以救君為言者兩京科道及庶吉士進士凡若干人君性介直濟以和易與人交能以量容以情恕不能以詞色假故人於君無喜怒而有感愧其意氣傾動如此性惡華侈位至方伯服食如諸生時有餽貽於故舊儀而不貨其儉約如此吾嘗論君學政兼資惟古之師氣以輔志久而益篤使遂大用當有以副人望者惜也階已及而命沮之然其所建立亦足暴於天下矣君三娶初沈氏纍贈宜人生子某女嫁某繼邵氏封孺人贈宜人生子某女嫁某繼應氏孫男一世憲女一君墓在某縣某原其葬在卒之明年某月某日銘曰烏乎名父乃躬自厚曰古之人人則謂何三代斯民古亦有言任重道逺中行尚矣孰我狂狷君歷內外邑省藩臺生無遺力死有餘才終焉道路吁其可哀惟才之難匪今自古我作銘詞烏乎名父明故鎮國將軍浙江都指揮同知白君墓志銘君姓白氏諱宏字宗大别號松庵其先出元部落有巴爾斯台者以功受王封國初有士頎者始受籍民於永平之昌黎君曾祖也君祖誠從文皇靖難之師有功後再以克敵功纍升永平衛指揮使君父廷玉襲嘗推總三千營事今俱贈如君官母蘇氏封太夫人初蘇氏娠君有夢祥既而君生器宇果異六歲讀書日記數百言與羣兒嬉有一誤墮溝中衆駭奔去公獨垂繩援焉十三能屬文選補武學生從翰林劉先生戩受易學三應科舉更習書經司馬余公子俊保國朱公永臨試弓馬䇿略屢優奬之時京營候參帥者若干人君為之首𢎞治戊申始開武舉君舉第二升署都指揮同知贊畫方略於大總兵所加俸三石未幾實授癸丑冬有舉君久諳戎務者以前官總理神機營事司馬馬公文升一見稱材且以久滯為惜尋銓今官理軍政兼屯田清軍馬政諸務庚申歲總漕都憲張公敷華以君廉勇協望舉總浙漕君疏八事上備朝議多見施行居二年鎮巡㑹推邉帥疏上君名奉勑總督海道今都憲洪公逺時以憲副與君同事葺城於圯浚壕於淤抑强警惰以御守卒先是有屋於海島者往往招釁而私鹽竈燒疑於烽火君悉去之他所施罷皆當利弊又以餘力設師孰以訓武胄居歲餘海道寧肅正德改元以上登極恩使來致白金及金獅緋衣之賜明年兵部以荆楚地重乃移君掌湖廣都司事君鎮以簡靜南人懷之巡按御史李君天賦嘗以堪大將舉是歲三法司奉勑蒞獄於藩有議死而稱寃者君得其情正色言之不少畏却蓋得釋者二百餘人又明年君以疾請於巡撫都御史陳公鎬乃檄還君於浙越三年江西盜侵衢州鎮巡謂公練逹委以疆事君極力備禦未幾輿疾還卒是為癸酉六月四日享年六十有五配韓氏封夫人五軍營總領都指揮瑛之女男一人曰文杭州右衛指揮同知女一人孫男一人女二人君雅好吟咏與客倡和動成卷帙有松庵集藏於家豫在浙及湖再與君同官蓋知君久兹其子文以參政鄒君某狀來請銘尚寶卿劉君克柔復書為申之君墓錢塘下竺桂峰之陽其葬在卒之明年某月某日銘曰有美白君用夏以繼用武以承而文焉以濟是謂功名之際才觀於漕政觀於海君歸自南寮遷嵗改我銘於何輿言是采嗟我懷君申之以慨明故太平府同知進階朝列大夫屠君暨配陸宜人墓志銘正德甲戌二月一日太平府同知平湖屠君以疾卒於家先是嵗癸酉十有一月十有九日其配陸宜人卒其冢子江西布政司參議奎季子南京某道監察御史垚先後奔歸自官適及君病且喪越某月某甲子葬君於某山之原而宜人合焉禮也御史垚以參議奎書來請銘江西憲副沈君剛夫實為之狀御史先官吾郡簡召入某道以君及宜人老疏請便飬改今官豫時與聞之今二老繼沒而銘焉是屬其焉能辭君諱熙字元明號三一居士世居嘉興海鹽縣西莊里今其地析𨽻平湖其逺祖有舉解元者曰曽一至君曽祖澤民蓋數世矣祖湘以君從弟太子太保刑部尚書公某貴纍贈資政大夫刑部尚書父楨號西溪以君貴贈文林郎武昌府推官母龎氏封太孺人君生而敦敏九歲游縣學十五以書經補學生既而習禮經時陳郎中清陳僉事謨諸知府觀以經學聞西溪公延以師君君學能自得三君者大期之都御史澤州楊公繼宗時為嘉興剛直少許可或問士必先舉君君喪西溪公哀而得禮事龐太孺人謹龐始就君兄養君晨省必躬有美飲食必饋成化甲午君發解浙省少傅木齊謝公時為解首實知君深君纍屈禮部公嘆遺才焉初選得武昌推官武昌㑹府事劇君敏而勤居數月獄無滯囚有盜繫十八年弗決者中一人年三十一一人年二十九君曰信如是二人為盜時尚在童稚豈以弱自誣伏乎即辨出之興國民吳榮謀殺徽商張姓者久未成獄君廉得榮焚尸藏陶穴中竟致於法其他理淹察隱者多類是都御史林公俊時為按察使尤雅重君君當考績林公曰君子之心公而恕屠某不有是耶考以是書巡撫都御史沈公暉巡按御史曾君昂王君恩輩各疏君治狀請旌異勑進君階及封贈父母妻如制尋擢建昌同知於是藩府貴近有隂籍富民抑配子錢將取其産者民不敢言時知府入覲君諭而裁之歲旱苗稿君禱輒雨凡三禱三雨未幾以母喪歸服闋改直𨽻太平府治如建昌周方伯紹立時為守以得賢佐自慶巡撫都御史艾公璞巡按御史陳君世良以公勤奬之居無何君以久宦自厭遂疏請老吏部稽叙賢勞用恬退例為之請詔進從四品階蓋家居者凡若干年君性介直而惡惡恆過故於衆寡合歷官所至惟一蒼頭自隨廨宇蕭然人弗堪其約而君固自安也君歸未幾太保公亦得請致仕二第相去一舍所恆放舟相過召諸昆季為雅燕友恭之篤鄉人談之府縣非公事不至或以私請輒加叱絶二子繼登甲科君每貽書申以官戒其於家稍治田疇取自足而已其晚節如此宜人亦邑巨族曾祖叔某祖謙例授承事郎父鴻號怡菊以詩禮稱廣德知州鳯其伯父也母唐氏宜人詳慧淑慎通孝經列女傳諸書能誦古文長篇女工織絍精粗兼勤怡菊翁擇配歸君為西溪翁冢婦時贈尚書竹軒公總家政與西溪翁皆重之初君以禮斆學杭紹間及入太學積數歲不歸宜人躬理家事尤急子之教養龐太孺人得婦道甚君官武昌欲迎焉宜人曰姑老矣吾任其養江路險逺迎惡乎宜太孺人卒宜人大慟幾絶斂殯具物比君歸無遺憾及佐襄事無違始以君武昌旌例封孺人及參議考工部績當封例從君官再進今號君卒距其生某年某月某日壽若干宜人卒距其生某年某月某日壽六十九子男三長即奎其科進士娶沈氏繼倪氏女五長壻馮鏜次馬鍾次王金次嘉邑諸生楊伯雍次太學生張鎣孫男四永錫鋭銑鉟女一銘曰兩官三郡自老以歸詔進厥階燁如金緋有子於省有子於臺維政有聞於時稱才才以自效人曰公教賀者方來乃繼以弔婉婉宜人厥德同之繼卒偕葬其終與從之明故光祿寺署丞進階文林郎華君墓志銘光祿華君之病而將卒也命其子鉦徴銘於豫越九月鉦以太僕少卿吕君仲仁狀介吾姻友秦君國英以君言來請昔君在光祿見內庭供億之繁而有司者弗能繼也有隱憂焉每見豫部署輒形於言今君已矣銘焉能無感乎君諱珵字汝德别號夢萱華其氏也華自春秋來為著姓晉有孝子旌於南齊者曰寶錫諸華實宗之在宋有族望曰原泉者傳八世至伯初君高祖也是為錫隆亭之宗伯初子彥威彥威子惟正咸以隱終至君父時濟翁始應助賑例授宣義郎後以君暨其弟南京吏部郎中珏貴先贈如君官尋加贈户部主事母徐氏纍贈安人君幼有巨人儀度讀書早悟而能勤甫成童與吏部同學時其族弟湖廣參議仁甫亦在館更切劘以業君游邑庠廩於公者若干年文學日進凡七試應天始以貢升太學於是二弟者後先登第君弗愠弗沮益友天下士士之負時望者極意結納有多聞之益既而選於吏部授光祿寺大官署署丞光祿劇地而大官為最中貴人宣索日數至聲張勢附殊難酬應獨見君正色溫言顧加體貌君夙夜恪居三載考稱受勑推贈如制尋以勞遘疾得告南歸時𢎞治已未也越若干年病已例起君不行乃用詔進階致仕君始家居事親以承歡為說親有疾必躬進藥繼以躬禱喪葬祭皆勉自躬壯歲以父命自隆亭居闞莊闞莊業未治或為君少之君曰分也數年而田野益闢食指至千餘則規而率之日修禮於祠堂退而事事內外小大無敢喧閧自族姻黨里至於疏逖皆被其惠君時未有子擇諸從得吏部季子鉦鉦已聘夏遂子而室之君平生好品論古圖書器玩以賞監自負或持至君所真贋立辨所御几杖盤盂之類皆倣諸古居官時公退輒自玩及歸而益遂焉更自號曰尚古君既有樓閣園亭之勝而古物充貯其間所過賔客又多清人逸士君古衣冠從容日夕城府俗事不惟不屑亦不暇論者謂尚古之號於是為稱君老多疾日焚香靜坐間以製藥治書自適藥非嘗驗不製中須逺方珍品雖重賈必致之故病人有不之醫肆而之君者書倣宋人活字板加以精密愛放翁諸集多印以歸士夫士夫以他書鈔本至不數日以印本出尤以是稱快其手校而梓行者若揚子方言百川學海東書堂帖又凡數十種歲衣寒者食餓者殮葬死無歸者不下若干人正旦扶携來拜稱謝者盈庭君無德色庶子鑄晚生年及就傅君以教屬鉦曰吾老矣汝尚終之先卒之數月嘗泛舟西觀於大江登金山絶頂東望海嶼有超世之想焉歸而疾病病間為二子處後事甚悉蓋三越月而君卒矣君雅能忍或負君君率弗校晚有搆大禍以誣君者負君為尤衆皆危君君曰命也吾焉咎之未幾誣者自敗坐逺戍戌還詣君謝君勞苦之如平生蓋君之閲世於是久矣論者多之君卒於正德甲戌正月十有六日距其生正統戊午某月某日壽七十有七配胡氏贈孺人繼張氏封如之子男二人鉦為長太學生其次即鑄其所生母葛氏女四長庶出適錢詔次適陳鳯徐某周某俱側室陳出孫男五女一君葬於闞莊新阡蓋去所居二里而近胡孺人先葬某原鉦嘗請遷袝君曰非古也且體魄安矣其勿輕動鉦從之葬之日為卒之明年正月庚申銘曰華君好古詩書是珍謂其人逺兹惟其神有官卿屬厥亦有祿有感於𠂻不敢上告敢憂於獨謂彼蹐局退我巖谷有林叢叢有泉潨潨有子克述既傳而終我思古人九原其從明故徵仕郎工科右給事中葛君墓志銘正德丁卯春廷臣同日以敕致仕者三十七人工科右給事中吾錫葛君嵩與焉君子愛而不唁君歸四年庚午宄瑾既誅有疏起君者又三年癸酉君卒君子有遺望焉先是君之子泰死君哭之慟既力疾治葬已乃用書謀於其從子刑部主事恆以其弟豫為後至是豫將葬君以君治命奉刑部狀及書來以銘請余與君同門既而同朝相知蓋嘗嘉其節概有可書者銘能無諾乎君諱嵩字鍾甫葛其氏支庵其所自號世為錫人曾祖仲良祖文晟父浩由太學生歷知興國永寧二縣終湖廣按察司經歷以君貴贈文林郎禮科給事中母沈氏贈孺人繼母田氏封太孺人君幼聰慧好學成童從故學諭蒿庵俞先生受尚書為經義成章可觀長老見而稱焉君曰某未讀書何敢言文蓋閉户誦習者三年同進讓之十九補郡學生提學御史戴婁二先生皆加器重凡七試至成化丙午始領鄉薦又五試禮部登𢎞治已未進士庚申授行人有事周遼二藩禮成加敏嘗再疏言事擢禮科給事中先皇帝在位勵精求言君既就列即感激論事應天尹某不共於職君劾罷之魏國家衆訟田於民事久且濫君請專官往核是歲當閲實邊儲君之薊州諸倉多所釐革還上四事曰謹收納曰禁饋送曰抑權貴曰清屯種皆切務也未幾命㸃團營軍士於是貨免於私役者衆伍恆半虛其弊蓋久而莫敢昌言之者君倡同事以狀聞兵部尚書華容劉公方圖核正得君奏重為稱歎三載考最勑贈封父母妻如制未幾遷工科右給事中上初改元君上法祖任相納諌務學四事是冬南京科道官以言事逮至君偕同官論救甚力既而諸大臣進諫科道繼之蓋忤瑾者以是君既致仕歸作三宜亭於後圃日手一卷燕坐其中客至則出然惟詩人徴和經生質疑則喜應之或問國事不答問郡邑事不答及廷議起廢巡按御史上君名日且有超擢有勸行者君曰吾言不利於奸得退為幸行焉用之雖然命下而辭則無及也乃手為請老疏緘寓刑部曰即有命當以是上未幾病瘧且痞數月而殆是為癸酉四月二十四日距其生正統戊辰十二月乙丑為壽六十有六配孺人郁氏子男一人即泰邑庠生女一人適江隂杜恂孫女二人長適江隂徐毅夫次受同邑施巽聘豫有女一人受武進黃氏聘君性謹飭瞿瞿蹈履於流俗中多所自毖待人無少長皆厚以周或不答不校也居父母喪哀而得禮事繼母如母與弟大梁居無間言教其弟之子如子恆舉進士今在刑部有官譽自謂得君教為多兄亡姊寡撫其子各置之所所著詩文有筠軒録君墓在龍山㠏􅣦之原其葬之日為卒之明年甲戌十一月二十六日豫邑庠生銘曰官有言路人有諫姿官哉人哉兹惟其時彼為厲階戾我鑿枘人哉官哉往蹇來遂祿不可榮乃榮其退人壽幾何言則不朽視物考年孰與君久斯麓斯干君墓斯安過者式觀曰惟其人不惟其官明故中順大夫建昌府知府蘇君墓志銘正德甲戌春三月辛卯建昌府知府蘇君介福以疾卒於官其冢子承芳吾常郡守李侯惟嶽長女壻也以其年秋九月奉君喪歸道京口用書告侯請銘於豫豫嘗聞君於君之姻御史中丞王公朝言先是五年君以監察御史奉敕總督江南糧儲豫歸自漕臺一再見君越三年君得郡南來訪豫病中别未久而訃至何忍言銘然侯之意不可虛也按侯所為狀君諱錫蘇其氏介福其字别號槐軒世為山東濵州人曾大父某大父某皆以隱終父瑁膺貢入太學授獲嘉縣學訓導以君貴封監察御史母鄭氏封孺人君幼頴敏甫十歲見古人詩詞豪壯者一二讀輒成誦對客歌之有激昂振迅之意既而侍監察公於獲嘉時吳御史天宏為邑每課試諸生必召君偕見君所作嘆賞不置成化丙午君與其兄銓歸補州學生銓有疾君日夕侍湯藥以進伺意所嚮而寬慰之疾且殆致書獲嘉猶為婉詞曰不如是則重親驚銓沒君哀痛幾絶具物成斂於是嫂田氏少二孤方襁褓君撫之慈田忘其寡焉居數年監察公休官家居謂銓既夭尤以高門屬君君求靜地卒業居宿於州東秦臺者若干年𢎞治乙卯以書經領鄉薦已未登進士第授直𨽻太湖知縣太湖政積弛君初至振以嚴肅朞而濟以裕再朞而濟以寬其自勵清勤始卒不變居四年巡按上君治狀召拜山西道監察御史奉命按視山海等邊關倉儲廄馬稽閲惟謹蓋所至著風裁焉正德己巳有議革巡撫官者於是君方以才力稱於臺乃有江南之命蓋其權實視巡撫君毅然當之惟民惟國不顧權勢厥既巡行蘇松諸郡見其賦繁而弊滋也乃立調區之法嚴加耗之令宿奸震懾人困稍蘇或以弊告君曰矯枉必過直吾嘗聞諸古人凡吾所舉蓋以濟時也他日將不更有濟之者乎聞者說服未幾以母憂歸既終喪復任擢知建昌府君素著剛明聲民望而畏之君曰守令同體建昌之民即太湖之民也至郡詢諸民曰利施之曰害罷之不疑不沮事用和輯郡中民居櫛比先是屢火君求古人火政為備甚悉其他備預事多類是撫巡藩臬稱良守焉在官九閲月而病又三月卒年四十六配談氏封孺人子男五人長承芳次承學皆州學生次承訓承志承恩女二長適王恩溥次許聘王同量君喪至濵以明年乙亥六月某日葬於某山之原從監察公兆銘曰民有師帥國有紀綱或志其事而地焉未當當焉而兼其氣孔揚匪力則裕政焉用成烏乎蘇君以令以守以撫以巡中外閲歷允為才臣地以成志非君而疇其人胡不永年烏乎蘇君明故承事郎鄒君墓志銘君姓鄒氏諱柷字永章别號松石宋忠公浩九世後有號南山而鄉稱先生者又若干世有諱暐者號友竹於君為祖君父曰濂號凝碧母華氏南齊孝子寶之裔友竹翁嘗七刲股以愈母疾事見王文靖公某所為傳故君家世稱孝友君生而豐偉有器量甫弱冠凝碧翁以家事付之遂納交於錫於吳中諸先生長者請聞禮義之方歸以飭於家政諸先生長者皆樂與之君性好樹藝故有腴地方數十里君以堤以塹以瀦以溝松杉桑梓菱芡茭蕖蒔植隨地罔有間隙見者謂有古井田遺意雅愛竒石與松中庭並植焉沈石田氏見之謂曰此如其人為圖與詩贈之繼而徴賦於雲間錢文通張東海長洲吳文定暨武進陸宫詹諸公凡得詩若干首故人稱松石君君故居沈瀆之南塘今徙蠡溪人以君故稱蠡溪為南塘君事父母孝其喪葬雖細故必檢朱子家禮而後從事歲時祠及墓祭饋奠畢繼以流涕忠公墓在武進百里外天順間巡按御史暨郡守繼修之君皆佐以財力曰此固為後者事也矧有官令敢不是共先世圖書器物或遺落於人雖重價必求復焉曰是忍棄之將無不忍者鄒族既蕃有年甚少而為君父祖行者君執禮必謹家自叔祖母吳以下守節者數人而華氏惠氏未及旌而死君嘆曰是有國制既不可追矣不有文章可以圖不朽乎乃請於文定吳公以下諸名能文者各為立傳謂之四貞一烈與配華居嚴而有禮嘗得子而夭君年四十三子炫始生華子之君勞以成愛深得教法外氏中衰君既養舅姑終其身復為封樹以葬內弟伯仲繼亡遺女四人少曰於我育及長曰於我嫁嫁皆得其人其最得者為都運張君元之其惠於鄉貧者病者死者皆被之又嘗取古孝者二十四人贊并五倫針刋授蒙士俾之誦習兩承勸分令出粟如數而辭不受服年逾六十復值有令乃受承事之命有司以為賢歲鄉飲用書請焉卒辭不赴君忠厚謙遜而勤終其身手鈔名人詩文雖隆冬不輟其先世及君所自得者刻而藏焉各若干卷化及童僕亦知退讓近數十里遇諸塗而却立致恭者必君家人也晚謝家事始就逸暇所居西為蓉溪東為蠡溪各選勝為亭館時與賔客遊之有懷故舊無遠近必貽問焉其巾服履舄不以時易製當其老也時製復如其少君曰吾固謂當爾其有恆如此君卒正德九年七月九日距其生宣德壬子九月五日壽八十有三配華氏母同族也子男一即炫太學生孫男三俱夭女五長受華某聘其二蔡某其四華某其季王某君墓鳯凰濱之新阡以卒之年某月某日葬先期炫奉都運君狀來請銘銘曰古有本富曰惟力田迪乃孝弟漢科是先偉焉南山出道鄉族後二百年君繼其躅東陌西塘有蒲有桑或入君里如古井疆惟君有子出友國士慶澤方將孰謂君死陸光逺妻成氏墓志銘近世士庶人之妻之卒多以孺人稱於銘志而江之南尤盛國典命婦封號自一品夫人至孺人凡七稱孺人者蓋取初命之虛名以崇死者然僣矣知禮者耻之光遠之世自其始祖宋朝散大夫棠為無錫徐陶望族成化間䕫州府同知源潔者光遠父也以鄉貢起家綽有宦績光遠蓋知禮者故稱其妻不曰孺人曰成氏禮也按狀成諱妙清其族出武進稱夾山成氏祖程父諌母馮氏年十七歸光遠逮事其太姑及繼姑既而有娣有子婦皆宜之䕫州君之之官也以蜀道險不以家從太姑亦與留焉成相光逺以養如䕫州之在侍也久之聞䕫州疾謂光遠曰盍亟行視乎緩將遺恨焉光遠遂行比至數日䕫州卒光逺以喪歸成相襄事䕫州有遺資光逺當受分成諷之讓叔氏於是始有産平生儉勤出於天性日雞鳴起即事紡績及布帛成衣粗鬻精以為常衣至數浣猶御器非敝不可御弗棄也推其志即一錢且重費之或謂之吝不辭至於周貧恤喪教子燕客雖偶乏必勉而共比疾劇呼其子婦若孫訓如其素卒為正德癸酉十二月二日距其生正統戊辰四月十日年六十有六子男二長萬安配王氏為廣州府通判懋之孫萬全配張氏為福建運使元之之姪孫男三九州聘李􅀈女九江聘胡宏女九川聘鄉進士吳鐩女孫女一聘于封户部主事成天章子壕光逺卜丙子某月某日以萬安等葬成於某山之陽光逺善姑布子卿之術嘗以形論心於豫為相知先葬請銘曰吾妻不足以辱子吾先世多銘於名公卿文在譜者凡若干篇銘吾妻吾將藉不朽焉豫讀錢常山憲狀遂序而銘之常山其妹之子也銘曰夾山之成徐陶之陸耦嘉維族亦維德之淑既蕃乃育森其蘭玉乃偕老違夙夫命則然其疇曰不祿徐母楊氏墓志銘徐母楊氏前鄉貢進士直夫之配也其二子治洽皆太學生楊教之得母道故以母稱楊無錫望族都憲公叔璣以文與政望天下母其孫女也其父為太學生士書娶於王而生母年若干歸直夫直夫江隂梧塍望族名經其父為中書舍人惟正君之子尚賢成化庚子舉應天鄉試第三直夫世其文母之始歸也尚賢君已沒而直夫方勤於學家衆至數千指姑薛總內外政母日惟饋祀是勤侍者曰日有某事聞諸乎母曰有姑在吾何敢聞姑之與聞也亦以子學故非得已也我於何有直夫劬於書則慰之少怠又勤之𢎞治乙卯直夫舉於鄉為之喜焉勸之進學明年丙辰㑹試下第為之慰焉勸之進學及已未罹變為之唁焉勸之進德於是姑薛沒矣母相直夫襄事於禮直夫遘疾卒母哭泣以毁家政將及焉或以故事告母謝不能惟以成畫授紀綱之僕而內外肅如也而家業日裕於是二子皆就傅矣母有戒言必稱直夫稍長俾游邑庠㑹有例入監並登焉或曰少未可母曰吾聞太學萃天下士師焉友焉皆於是乎在雖少可不力乎初徐氏自尚賢之叔荆門知州君泰舉順天鄉試第一而羣從日趨於文既而尚賢父子繼舉而夭於科第有缺望焉母出宦族謂士不成名不啻農失田工商失藝與資是以若是勤也母蓋婦人之知義者正德甲戌十一月十一日以疾卒距其生成化癸巳十一月八日年四十二子男三長即治娶武進假氏次即洽娶無錫華氏次沾聘同邑夏氏女二長適趙鏊次受夏文敬子某聘治與其弟洽等卜卒之又明年十一月二十五日葬母於砂山之麓合直夫兆先期以江西參議高君舜穆狀來請銘豫與尚賢君同鄉舉故直夫父執豫今見治洽如見其祖與父也於是乎銘銘曰閨中人兮貞如玉羞饋祀兮共以穆事良人兮不終身未死兮心從心從兮奈何井寒泉兮無波子成兮乃死死不愧兮夫子趙梁伯妻錢氏墓志銘正德乙亥四月二十有四日鎮江衛指揮同知趙君梁伯妻錢氏以疾卒明年丙子十有二月二十有六日梁伯以其喪葬諸嵩山祖塋之次鄉葬之數日持喻主事宜之狀介薛襄甫來請銘梁伯過甥也其母於吾母太淑人為再從姊豫知其家之故為詳喻狀出梁伯言不誣其妻乃叙而銘之錢氏諱貞字貞季其族居湖頭於無錫為望國初徙圓通然號於人猶曰湖頭惟實者圓通之望也娶於華而生貞季其行在四長歸梁伯梁伯名柟其宗出宋盛國公叔黔其族望蓋與錢埒初貞季入門逮事舅廣洋翁姑過氏稱得婦道凡若干年舅卒又若干年姑卒貞季喪之皆如禮於是惟實翁卒母華寡而貧貞季曰盍於我飬謀諸梁伯梁伯從之及卒曰盍於我葬謀諸梁伯梁伯從之其兄有孤女擇壻以歸梁伯入資助賑得今銜里媪或賀貞季貞季曰何故曰婦以夫貴曷為不賀貞季曰貴不期驕吾是之懼胡賀之敢當哉既乃勸梁伯益持謙共加之勤儉梁伯罹訟客於外貞季攝家事者十餘年而田無蕪穢僮僕肅如也惠施於姻戚鄰里君子謂貞季有士之德既子爖夭家且多故梁伯以為憂貞季曰賦時厥共則無公責産平厥償則無私怨梁伯方嘉納焉而貞季卒矣貞季生天順壬午十有一月十有三日享春秋五十有四子男一人即爖邑庠生娶江隂周氏女三人長適郡庠生錢世爵次受華某聘次受顧某聘孫男三坤聘常熟錢氏圻未聘垔聘同邑殷氏孫女一銘曰家有中衰婦無外事維志之貞乃罔終墜人亦有言懷安敗名我告夫子永觀厥成家復於故我修吾婦我母我姑厥有恆度有年弗延有子弗年我銘以傳貞季氏錢方母太安人朱氏墓志銘太安人朱氏今南京刑部福建司郎中鵬浙江道監察御史鳯之母也其配為贈禮部主事節庵府君諱麟字某禮部卒時母年已七十矣於是鵬在禮部鳯為行人將有臺擢皆以母老乞便養為今官南京遂奉母以居母體康志適起居甚度見者稱壽居一年得脾疾少間思家復奉以歸又一年疾病卒卒之明年正德丙子二月二十有六日鵬等奉以葬合禮部兆頃自為狀介成主事汝從來請銘按狀母諱清蘇之長洲人其父曰德明母某氏初母無昆弟父母將擇壻贅焉久之得禮部禮部崑山人也其父槐庭翁方以學行稱而禮部又英敏可任事是以與於擇厥既就館母日侍父母月問舅姑實兼內外之養禮部方從事於仕以例授某州吏目尋致其事與母歸依槐庭翁母年才三十亟屏諸飾相禮部力田治生躬井臼以饁夜事麻枲無間寒暑家於是乎始樹及子稍長當教母謀諸禮部謂某盍師焉某盍友焉用嚴勝慈不掩小過禮部嘗謂母曰鵬吾使入官鳯吾使處家鵬治經鳯不必治經母曰何哉君所謂經者經以明理家何異於官而可不以理為也鳯既通經而後治家何不可之有禮部矍然從之命鵬以經授鳯受習唯謹既而皆知名𢎞治戊午辛酉繼領鄉薦於應天正德戊辰同得甲榜人謂方翁知家方母知子母在家有外姻請見雖甚戚必審乃出凡飲食必祝人謂母有女德平居恭慎靜密思而後言慮而後動人謂母有士行方二子偕計而北卒業而南或以勞為母慰母曰分也不以是戚及並位於朝出入臺省或以榮為母賀母曰分也不以是欣母當禮部喪蓋衰服三年未嘗去身鵬以盛暑請少釋母泣曰吾亦知無益死者但盡吾心耳時以覃恩封今號僉謂命下不可久虛請具嘉服以拜母泣曰吾忍乎哉吾何急焉而輒釋此也他日母欲從俗以僧道送禮部葬鵬以禮告諸姑姊解之母曰兒處我以禮不從何為其從善如此母卒正德丙子六月三日距其生正統壬戌二月十日壽七十有五子男二長即鵬娶高氏封安人次即鳯娶范氏女二適張珮龔天禎孫男二策築俱太學生策娶周氏鄉貢進士在之女築娶黃氏京衛經歷京之女女四長適庠生梁金泉州府同知紈之孫次適庠生王同祖石門縣教諭曰仁之孫次適太學生朱希顔沂州判官彬之子次適陸九鼎鄉貢進士表之子曾孫男二曰田曰井井聘朱氏蘇州衛指揮僉事質之孫女女四長許嫁葉廷植文莊公曾孫也餘尚幼墓在邑馬鞍山馬路口之原銘曰始館以義卒嬪以禮子教必經如弗獲已伯出仲處母心則然聮登並顯吾敢要天釋服拜嘉雖暫不可葬故從違有子無我稱母以銘斯其稱情後有傳者於是乎徴徐永州妻吳孺人墓志銘孺人吳氏無錫新塘人大父諒父約皆鄉望母胡氏孺人生及笄歸永州永州名鼎字惟器江隂梧塍徐氏之望景高翁長子也孺人歸未幾翁卒獨事姑包氏凡姑命承之唯謹翁既葬諸子分異永州獨以翁命補諸生邑庠孺人乃勸永州擇城中僻地為館延師而學焉孺人代理庶務小則遂大則咨皆有條叙永州舉於鄉於是三子者長皆授之經延師益選而厚越數年子圭宏道同鄉舉越數年子愷援例入監永州屢屈禮部就選得推官永州孺人居家率諸子事事唯謹越二年孺人以姑老用書速永州歸養永州曰吾志也而吾妻能先之所以相吾者於是大矣歸八年姑卒又八年孺人疾又五年卒是為正德丙子十二月某日距其生某年某月某日壽七十一子三人長即圭娶斥岸蔣氏蚤世次即愷娶傘墩陳氏繼無錫楊氏次即宏道娶石橋趙氏女一人適縣學生王輅孫男六人中孚娶石橋趙氏鑰聘黃墅夏氏鑄聘古塘王氏夢熊聘同邑湯氏浙江右布政使新之之孫也夢熊夢麟幼未聘孫女七人一適國子生同邑趙鈴一適武進學生楊鈞一適無錫吳汝思一適中書舍人常熟李而遇宗伯石城公子也一適武進學生鄭軒一許聘同邑夏勳孺人既卒之明年丁丑十二月十九日永州以子愷等葬繆市東之新阡永州醇謹有士行豫故知也狀來乞銘銘曰敢知家而不敢與知官家知內而不敢與知外曾謂若人而不如鴱我思古人不敢階厲兹惟其藏兮無使樵若牧也壞户部員外郎陳公配過安人墓志銘安人過氏户部員外郎惺泉陳公配也後公若干年卒卒之明年正德丁丑某月某日其子表葬焉先期自為狀介莫如山請銘某與如山皆公門人也如山言如狀狀於某亦奚以為過為吾母太淑人之族其先淮之和陽人宋徐王郡馬孟玉自汴都來居世稱黃藻岸過氏安人祖曰懷玉父曰永母錢氏安人生若干年歸公於是舅裕軒早世姑錢亦弗及侍侍祖舅耕樂翁及祖姑姚起居食飲得扶衰之道公為諸生凡若干年始舉於鄉連捷㑹試遇疾歸越三年登進士第歷官户部主事員外郎凡十年安人皆從之居約克儉稍裕進以禮凡寓館必謹內外於舟於輿皆然居京邸雞鳴戒朝午饋饌惟謹公考最安人封今號於是公再考升員外郎參閲章奏㑹浙江多逋尚書請命有幹局屬官一人督之遂以屬公公道得疾比歸疾甚安人率諸子露香夜禱甚懇數月公卒安人慟且病病已以諸子葬葬已力教如公在時公弟某先卒遺子若女無所依安人為婚嫁之或嘆其難安人曰此君子意也吾方愧弗克稱何難之敢任一僮為商舶觸死有司者將論以故殺商人懼願以百金為請安人辭焉曰僮死實誤故論過矣言於有司釋之其知義如此安人卒以正德丙子二月十五日壽七十有四子男三人長即表娶賈氏次言娶茹氏次文娶徐氏言文俱早世二婦繼之女四人長適武進張廷玠次適宜興徐文靖公從子元枤次適同邑張都運企齊子瑭次適太學生江隂徐紳孫男三仁庠生娶武進莊氏義娶江隂徐氏孝亦庠生聘武進白氏康敏公族孫也孫女一許嫁太學生江隂張某曾孫男一才良女一墓在邑西惠山聽松庵之右合公兆公諱及字及卒葬年月具前志兹不書銘曰族之貴兮宋戚里受命服兮從夫子壯且老兮稱有禮于嗟若人士兮士兮明故劉母張氏墓志銘正德乙亥八月十有八日丞無錫縣劉繼仁之母張氏以疾卒於官舍先是歲二月繼仁督民輸京師其妻董與其子秉公侍母以居比母卒貧弗克殮令君侯世卿助以俸錢若干乃克殮越二月繼仁還至淮始聞報哀慟隕越奔歸即次將以明年丙子正月舟其喪以歸乃介吾姻前涿守之子張元玉來請銘侯君為之狀初繼仁考選得山東蒲臺知縣居一年疏論鎮守官奸利事被逮下詔獄既而事直猶左遷今官繼仁簡質君子也嘗言某在獄母憂而不怨及出喜而無沮豫聞而賢之乃迎養未幾而遂不祿以死侯君悲之豫亦悲之按張氏涿州胡寧里人年若干歸繼仁父府君鑑為繼室繼仁府君元配張氏出也時甫四歲母時其食衣無寒無饑與母在等八歲就外傅朝送之門暮望之閭十八入州學資之加勤凡若干年至𢎞治辛酉繼仁舉順天鄉貢尋遭父喪喪畢卒業太學旬月供饋弗須而備皆自母紡績以出又八年正德壬申之官蒲臺於是流賊方擾山東母留於家分俸為養及遷無錫便道省母母命亟行乃泣請奉以來甫至二月上官以蒲臺聲交檄委重什八在外母廨居疏食菜羮不知肉味論者謂侯君以方嚴為政繼仁稱其佐張母繼仁亦惟稱哉母壽六十有一有男三人繼智繼美繼志與繼仁而四孫男七人秉公秉彛秉倫秉正秉直秉剛秉純葬以喪歸之年四月十九日墓在岐溝之原去涿城西南三十五里銘曰昔令今丞險夷殊方或留或從母罔不寧母若有言汝滂我滂曷養弗終而歸其喪于嗟乎張容春堂後集卷四
