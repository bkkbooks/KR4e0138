body:
  text: 容春堂前集巻三明邵寳撰古詩五十二首送陳都憲赴南臺雄都鎭南服江流走其隈驚風鼓髙浪駕御須公才公船樹雙幟令重御史臺輕裘兀中坐一鼓千艘開江靈戒百神前驅步浮埃有陳既如雲有聲復如雷見將不見水頽波為之回周流有餘暇獨起弔古懷漢功陋昆明天塹胡為哉巍巍皇祖業萬載恒規恢安危繫所修願見封章來題王晉溪畫蘭之子有國香幽居祕蹤跡吾將一采之薦之君王席英英雅淡姿可冩不可即珍重無奈何黄金以為飾望瀑布亦用李韻昔聞地中山今見天上水對日生虚明光照數百里聲將助雷行勢欲隨雲起矯矯白玉龍人立煙霞裏飛流何其雄不受神禹功淨洗下界濁無言歸太空精靈忽旁射秀色溢厓壁動盪元化機落星不為石觀水復觀山萬古心自閒願借一泓清鑑我塵外顔布邪可剪裁衣被盡世間湖口阻風書所見湖西有青草湖東有白石水與草有情與石乃相激草邊水微波石也奈水何有石水不濫不願青草多寄秦擇之用莫如山韻春江生綠蕪所思恨逺别美人有新篇開緘動風日商謠跂呉雲轉使心旌孑誰能袪渴塵惠我太古雪廣文今冷官五斗腰不折朝吟水洋洋晩眺山嵲嵲君庭梧十尋我方咏瓜瓞大哉唐虞談出口陋猥屑夕燈照虚堂屢繫康侯節填然鳴鼓中乃獨按魯薛南沙舊同遊有操如玉潔贈君四三章古調超巧拙嵗寒結深盟紛華以為瞥勸君勿太潛行止故有説秋芳淡無姿美在人未擷我歌亦吾情不為聞者説屯田二首寄胡用晦從軍古云苦況復逺戍邊強者乘障去羸弱乃屯田惡土不生草漠漠沙兼天犂鋤亦病甚幸免荷戈鋋但得烽火息聊以延嵗年邊塞少雨雪嵗豐亦如荒相逢莫相問豐荒兩無望荒嵗固飢餓一死足以當幸哉遇豐年誅求益遑遑有生不如死長慟天蒼茫贈王古直碌碌長安市有客戴葛巾問之何為者自言我山人山人本在山偶然落風塵尚餘邱壑念時向詩中陳暮作琳宫主朝為玉堂賔興到即成徃孰能疏與親浩歌對尊酒一醉全吾眞栖栖復栖栖而謂古遺直曽從西曹遊冒禁為所識長揖稱詩人法吏不敢斥泡燈亦兒戱破碎何足惜西堂坐春風凄涼淚霑臆茲事久已傳野史誰當職疎山寺我來訪疎山幽賞酬夙昔秋風吹新波繫舟巖下石弔古誦其詩手拂蒼蘚壁游雲相徘徊去地不盈尺清歌復清夢聊以終此夕髙安縣學觀習冠禮柬守巡二王君洪州江濤激堤急江中老蛟似人立春來風雨助江靈萬丈新堤無芥力誰將神物障狂流鐵柱宫成幾百秋番陽湖深東入海空厓禹廟何悠悠筠州有蛟今有柱山霧如江化為雨絃歌在泮修舊章允矣嘉賔吾愧主朱仙鎭繡旗揚揚出朱仙中原王氣熄更然敵軍萬騎鳴歸鞭故宫遺廟在眼前奈何忽有金牌宣金牌宣事甚迫將之南將之北南為吾君北社稷敢言君重社稷輕彼奸在側方經營社稷無功君有罪到頭兩事惡乎成岳將軍决南行南行即就死死不愧臣子胥門臣奢無事為君戮臣胥敢怒不敢哭朝辭楚疆暮呉國還兵入郢亦太酷憤憤心還未足楚何怨呉何恩豫讓死王裒存是邪非不必論一片鴟夷皮褁骨難褁魂北風莫遣向越奔向越奔無不可只恐仇呉似仇楚東山公書來問久無書舟中作書悵然有感不上山翁書非懶亦非傲知我者謂誰而不能一報平生觀物心未得從吾好世途渺江湖執簡靡所告章水東北流秋日波浩浩惟有匡廬峰萬變猶古貌吾將作新圖用為識者道送王朝言朝言天下士乃作西江行把酒酹岐路清風引雙旌尊前即萬里動我淮陽情淮陽豈可薄所志在漢庭君去江湖重君留江湖輕君行何所挾岱岳雲英英逺浮洞庭白髙㸃匡廬青誰知造化意藉此方經營歸歟作霖雨四海多蒼生赤壁圖為王冬官題古之達者蘇黄州覽盡赤壁無餘秋至今賦在景亦在誦者如與公同舟公舟凌空與物游東山月出水漫流清風徐來酒在手羽人何處仍丹邱曹呉勝負江山羞洞簫一聲生逺愁眼前水月客知否一笑自㸃仙翁頭水曹年來作浙遊蘇堤風景應全收卻望美人圖畫裏蒹葭霜滿湖南洲哭李方伯惟誠用老杜哀李北海韻朋遊三十年道誼曽不替知公定交初德音日相繼公本西平胄水木有源柢少年擅才名文詞出新製上書排帝閽此志一何鋭門停長者車青眼風塵際仰窺古作者流衍得眞裔主司躍然驚擢桂亦常例獻策迴重瞳一朝荷嘉惠軒昻露頭角清光映宸衞尋常笑語間厯厯邦家計力深稽古餘致逺未嘗泥大哉養材功不負文明世鐘鏞懸華軒珪璧藉文罽令弟共翱翔科重甲辰嵗發軔銓曹郎優游養經濟登俊拔芳翹黜邪洗荒穢公餘日扃門惟有庭鶴唳讀禮歸故山三年淚盈袂夏官故本兵獨立謝權嬖三邊諸將臣始得重輕勢公心如青天風月動光霽揮毫寓軍法煙雲亂行綴奉使厯南邦爽氣消瘴癘西藩領㕘伯簡在荷先帝公初度函闗在在減征稅向來暴如焚屏若掃以篲所不活羣生臣也誓有斃人情甚苦荼而我獨深嚌移旌向浙江山水心夙契相逢我知心懽顔照堂砌冉冉山雲浮滔滔海波逝倡和弔忠魂情眞句還麗惡風從北來羣芳不勝脆萬怪歘呈露共訝天地閉公時居左轄隻手披䝉翳抗衝等鐵石調劑㕘薑桂哭聲動九闗天乎竟迢遞力窮呌蒼梧重華久云瘞飄然得賦歸冰霜日凌厲乾坤浩茫茫吾道眞成滯訃音隔三秋乃復自燕薊日斜望蕪汀些罷愁雲蔽萍鄉虎萍鄉山中虎食畜不食人人亦感虎意罟穽不復陳虎乃有俗俗有仁不啻古云父子親姚源洞華林山有人殺人如草菅吏見野人應厚顔聽雨歌讀見素所上封事作章江門下春水來黄流渾渾無津涯居人爭言二月八水神作㑹多風雷擁衾聽雨坐中夜我船明發開未開濕雲十里接南浦滕王髙閣空崔嵬我歌欲登江上臺吁嗟行路眞難哉莆陽諫草忽在眼歌聲入江江欲迴君看鐵柱生莓苔冬夜觀樹影月樹影在地横斜復横斜誰為水墨畫老筆全無華又如春雷動初驚蟄龍蛇因之得篆法錐鐵行平沙海雲漾雙玕江風落孤楂元冬萬景閟嘉此獨咨嗟他宵有繁隂莫向時人誇建昌分司古松古松當中庭荒館幸有此微風亦秋濤雨翠復煙紫月來夜如何對我閱文史我愛巡行初見汝見君子擬謁李旴江祠旴江傍羣山何處李公墓城西深樹林宛轉通細路秋雨漫如絲沾濕兼瘴霧緬懷千載人乃獨缺瞻顧惟公力古學虞周在襟度平生抱遺經蕪徑倐超驚周行日千里不識草多露典謨二三語一筆萬蛟負横亘天地間精光破昏暮大哉忠孝詞居然見公素寳也晩且愚焉能踵髙步耿耿結中懷所向惟恐誤何當潔芳尊再拜酬夙慕宜黄秋日用韓韻不雨已數日蕭蕭葉聲乾青青獨可愛庭下羣琅玕隂雲何處來與霧晝作團驅瘴無妙術只在心氣安古井湛止水安從起波瀾焚香坐數息日月通泥丸江淺舟可放喜謝山中鞍别羅太史景鳴用東坡韻秋雨濕地無塵沙蕭然薄暮居官衙人言此郡有嵐瘴八月桂樹初開花欲行未行待天霽取道特過山人家山人如鶴心萬里爭林每笑羣栖鴉我昔對語盡長夜别後四見春林葩人間萬事似泉水誰哉鴻漸能嘗茶臺前舞劒聊一試樓上更鼓方三撾懸河之論透骨爽背癢安用麻姑爬明朝分手各大笑尋常為别何云嗟贈君此曲當瓊珮報我萬斛仙壇霞李車駕行李車駕奉璽書西行入闗到邊隅駕言數馬閱牧地要窮利病實與虚有疏馳達承明廬鎮將不敢沮藩吏不敢拘攬轡四顧意有餘李車駕中州豪讀書萬巻志當世排雲閶闔曽鳴號奈何落落不諧俗不為臺諫為郎曹朝回閉閣日靜坐簿領之外更有經濟為心勞李車駕才瑚璉聲球琳大司馬知君深千鈞重任他日須君任等閒一使亦易事中有至意試君以百年未斷之盤錯厯君以萬里未極之巖嶔登臺長嘯望西北秦城莽莽漢闗磊磊弔古還思今揮君賈生涕動君杜甫吟收羅勝槩入胸臆不數雙璧千黄金李車駕須早返落花如雲春色晩風光去人不可挽宗社萬年計廟堂四海憂車駕車駕何以為今謀夢希翁雲頂仙人入我夢玉臺之冠杖青藜不知此地是何所山水滿坐風披披仙人命予歌古詩把酒向天天聽之平生意氣重韓孟壯大何以酬相知仙人仙人今茹芝清時吏隠非予誰春秋經世二三策化作水上滄浪詞滄浪清濁兩言足仙人一笑天無涯笑聲到耳驚夢破惟見寒月懸松枝題錢世恒弔文山遺墨巻北風吹南冠行行一匏瓜作書謝骨肉涕淚紛交加此行已忘身此書又忘家身家既兩忘未忘者何邪片紙今又灰浩嘆天無涯理髮見白有感日來櫛我髪漸覺白者多世事非我力我憂欲如何我齒鄰半百光隂逝江河老至不自覺自謂心無他我心但不改不妨髪皤皤次呉匏翁謝馮廷伯送惠泉韻我愛馮龍厓視山如畫屏視泉復如酒有量元泓渟竹爐效僧海一煮盡一瓶朝朝亦暮暮相對雙眼青細酌入肺腑灑然滌羶腥北燕又南粤觀水記所經惠通萬里外不似渭屬涇昔人作水記髙調聲泠泠水行大地中有穴無人銘君行一嘗飲郤憶漪瀾亭梁溪帶蓉湖飄然晝揚舲痛飲三百盃醉向泉頭停攜罏試煎法如釀新春醽飲罷更須汲一童負雙瓴回視世間物洪波泛輕莛髙情漫為戯題詩謝園丁夕齋待明月禪燈坐青熒試誦盧仝歌山僧或來聽竹枝弄雲影松花遞風馨石牀獨髙卧月上人初醒嘗聞黄河源有海名為星于江復于海一㵼不計齡悟泉未為悟惺泉未為惺煩君奠山堂陸羽故有靈送彭僉憲還莆田壺公山南南海濱山中人兮堯舜民淮南有招招不得桂樹叢叢秋復春壺山主人大隠者緘書逺致南峰下丹厓青壁勿自誇我有幽懷為君寫我招不是淮南招考槃同賦還同謠避人避地兩無謂白雲杳杳壺山髙昔居郎曹更憲府理是漁綸斷樵斧十年吏隠人不知卻道漁樵自今伍掉頭巢父入海東冥鴻萬里商顔翁何如兹山倚南極中深可著神仙宫七人作者莫知氏為溺為沮竟誰是能從吾遊吾與之坐共閒鷗看川逝和陳玉溪得古刀歌玉溪老人鬢雪色平生氣薄秋空碧嚴冬遺我古刀歌白日無風寒慄慄公從何處得此刀而我未見難論直向來淪落未逢人有時隠躍光騰日一朝白璧落公手堪笑當時卞和泣乾坤萬物遞升沈今古千年超恍惚也知剛德本天成等閒未肯為人役西戎北虜不足誅豺狼在道那容息由來神物不自用義士兼資機與力昔年我亦得一鏡篆刻摩挲漢遺跡願將此鏡配公刀共保剛明勿戕賊讀楊君謙和雪詩次韻寄之秃豪一掃繁枝葉詠雪詩成淡于雪眼中作者吾君謙後出辭髙意尤絶直追坡老千載上我輩不覺腰罄折看君風㮣有如此當知此製難磨滅愧我淺薄曽效顰把筆對君如或掣便欲索君書一通大巻珍藏飾文纈文章所貴自己出下此紛紛徒瑣屑渾然元氣未雕鑿言外風神亦飛瞥知言未敢輕自許和篇聊致評詩説他年大作禆雅頌磨有貞珉鐫有鐵寄王推府王郎闗西彦今為蘇郡推憶昔騎瘦馬送我黄金臺寄言問江東謝公安在哉感此不能對慙愧經濟才坐馳楚雲盡望極呉天回遺君尺素書珍重煩君裁答尹吉士齋居坐薄暮西陽照牆東垂簾絶賓客樹影何叢叢尹生偶入室依然故相從數語勤請益令人契深衷妙齡志尚友文翰豈徒工逺遊出彭蠡浩思偕溟濛登廷列周士所得良己豐絃琴謝俗調三嘆歌虞風大哉經世業乾坤與無窮吾衰負吾道俯仰増媿容安能挽星漢一洗兵戈空小孤山昔聞砥柱黄河中萬古坐鎭狂瀾東小孤乃是江砥柱特起不與羣山同羣山隨江挺奔馬愛此石筍凌蒼穹孤哉孤哉本天造一任巨浪乘長風節宣夙受神禹戒滔滔不礙江朝宗我來信宿彭澤下咫尺仰望天妃宫翠煙霏霏落盃酒千帆閱盡澄潭空舉盃酹江江日紅隔江縹緲留青峰便當載筆賦東海三山㸃破雲冥濛聞賀黄門訃平生慕斯人室逺不可即海雲日悠悠醫閭幾千億嵗晩撫孤松山居正幽寂百章對秋旻耿耿夢疇昔清時乃遺賢風敎與有力徃因范長史問我書咫尺好風從東來新詩寄相憶邇來十年餘長空斷飛翼哀昔忽予聞獨坐風雨夕白沙久亡矣而公復窀穸北南兩茫然乾坤浩無極短詞託髙侯歌殘淚沾臆都昌謁陶桓公祠我航東滙澤來拜陶公祠英靈邈千古猶繫吾人思公才不世出幼學多師資時衰領重鎭光輝動旌旗大哉砥柱力江漢如潢池公生清談後惟勤禹為師運甓投博具舉措非徒為道積業可大所志在濟時揮霍掣雷電呼吸飛雲霓公在國與立桓文下風斯進退自明正陋者徒生疑孫曽志公志痛恨晉祚移一辭謝世事采菊忘東籬公心愈表表後哲諒有知鄱湖水浩渺公神亦隨之醴牲嵗復嵗乾坤以為期發都昌彭蠡古來稱險絶其間左蠡尤滕説兩山對峙舟中行白浪乘風晝翻雪都昌枯坐三日來一日東風帆早開匡廬雲外露輕碧水如新鏡無塵埃蒼煙茫茫隔重浦風力催帆更雙櫓行行指㸃落星灣宛在中央手堪拊南康太守送我船船頭忽見瀑布泉飛流未便解肺渴自覺清興同神仙我今西南訪黄鶴一水之間望官閣櫂歌起處天風長行盡澄湖帆未落開先僧送泉水泉齋愛泉如愛玉每向名山觀未足長言世味無此眞俗客浪誇魚我欲匡廬瀑布故有名幾囬坐飲龍池清不知泉亦我知否我獨與泉如結盟兹行未暇登山寺逺汲雙瓶解焦思老僧聞我送茶來笑揖山靈謝珍賜賸攜陽羨新春芽夜烹落盡青燈花吾泉在惠久能味豈以異好成遺遐相將一椀復一椀此味天教吾輩管明朝西望雙虹垂放筆大書湖水滿為黄公獻題和靖咏梅圖江梅萬樹萬樹春水邊一株偏可人山人觀物著妙語雲月慘淡愁花神詩中香影本無色宛然眼界翻成眞誰今以色冩香影山人含笑花應嗔山人山人久寥落風韻猶存松與鶴竹鶴圖歌太子太保户部尚書太原周公作保完堂於晉水之上久矣天下之人望公再起者未嘗一日不西引首也今年春其館甥陳君邦瑞以浙江按察僉事擢陜西苑馬少卿便道謁公將遂為夀乃繪斯圖屬詞於寳寳公舊屬也夀公之心殆有同於苑馬君者顧晩生淺陋何能執筆以冩盛德之形容哉聊即圖中所有為公誦之其詞曰國之元老太原公立朝鯁鯁持清忠作堂晉水近十載但見歌頌傳兒童祝公何言再入相更期夀在喬松上東風吹嘘遍八埏乾坤無言物有象綠竹猗猗鳥鶴鶴石巖巖兮松落落衆禽鳴樹山起雲千花萬花色相錯苑馬南來西入秦獻圖稱夀意獨眞惟天佑德輔皇極嵗寒貞操公其人寳也公門舊遊者有懷如畫無能冩願公自夀夀蒼生士慶在朝農在野為李惟誠題畫江邊草亭好興在江上山山留萬古色白雲時徃還雲來盪胷臆雲去開姿顔雲哉或出岫化為水潺潺觀雲復觀水有道心自閒策杖者何人行將坐其間我懷李蕪湖欲謝功名闗别王演之驅馬出國門風動晨光絢我懷方南馳北望逾眷戀之子何所來昨别今再面囑予彊加飡執手當觴餞駕言詢江東疇應謝公選微詞不自竟輿誦若為獻離筵紛陸離賓客催入燕舉首復叮嚀上馬君乃先君言良過哉相思淚如綫經綸予何知浮雲未成變與王德華别初辭渾河津輕舟疾如駕相逢忽相問兹㑹乃天假去來各匆匆聊此半日暇對君新涼餘王事深慰藉東藩税方逋北徼師未罷悠哉逺臣心焦勞達晨夜謂予汝何言予有再拜謝依依復依依孤舟竟東下為寗菴題畫修竹滿舍傍長松當道周青山生白雲隠隠屋上頭出門見溪水有橋復有舟天風作前驅時引幽人遊琴尊侑髙談興盡不強留靜遊羲皇夢閒聽堯民謳命筆書暄涼山林有春秋獨樂得深味豈嘗抱先憂莫問此何人吾當意中求孫翊妻夫死矣妾何敢生夫讐為重身為輕賊尚生妾何敢死舊門幸有諸君子號召如風赴如水奉賊頭祭夫墓白日下髙天何處黄泉路次喬考功種竹考功憶南曹新竹舊所藝嵗寒凡兩經不見霜雪厲虛懷效前修淺薄諒非計斐然淇水涯千秋一根柢獨立良可嘉羣居亦何戾體疑墨君誣用笑楮生敝城中地如金省庭更難詣植之固由人長養荷天惠醴酒散餘酣醫俗得妙劑等閒供聽觀淡中有眞麗風清玉聲流月暗金影翳結實雖未成鳳鳥或來憩主人道眼明許與松齊嵗豈無一視心餘卉直柔脆我將節下題相過及春霽次孫司勲種松觀樹如觀民豈不試故藝勲曹庭中松植難果誰厲公為百年謀乃狥一朝計知乎向來非勤搔動浮柢揠苖信軻書免歸僮僕戾元氣天地間萬木未嘗敝吾心有妙機到此深造詣况當春雨時㸃㸃荷嘉惠一培一灌之緩急在調劑新梢隠孤髙短葉露修麗雖無虬龍姿白日弄隂翳主人退自公徃徃成小憩竒哉拔地材卓爾倚天勢作詩告方來植也自兹嵗桃李正芳華何心較堅脆請公看嵗寒雪餘晩峰霽宿池江二首秋熱大可畏舟行乘微風豈不愛燕息興在臨川東晩泊擇所止碧水連遙空沙鷗解人意來徃如相從又放船泊中洲不住亦不流愛風當南港畏日背西邱浩歌待明月解帶倚柁樓水花向我笑我意方悠悠風雩臺危厓接雲雨不雩自成壇偶從沂上遊振衣復彈冠晩風西南來五老生髙寒吾襟對陽春浩然天宇寛鹿洞山人與鹿遊乃以鹿名洞洞草春復春人與物情共呦呦詩有之作者非好弄偶名亦佳哉千古興絃誦奉寄東山公二首不見東山公已厯兩冰雪江逺天與俱山深地尤絶吾道付閒雲蒼生望終觖月明千里心相望獨糾結又巴陵勝槩地岳陽天下竒公昔遊且釣今歸幾登之驚波感世路江湖渺無期再讀希文記千古長相思靈濟宫即席賦白巖孤峰何處所屹立太行東聳拔羣厓異蒼茫四望同潤疑連析木髙欲跨崆峒繪妙初施處鋒神未露中逺堪回俗駕清許築仙宫靈秀從何代風流到此公無勞成獨邁不飾見眞工㸃綴長凝雪躋攀合馭風一元開混沌萬仞倚虚空夜共星辰爛春分雨露濛慿誰磨蘚壁為我掃榛叢明日西回首秋雲𣺌去鴻容春堂前集巻三
