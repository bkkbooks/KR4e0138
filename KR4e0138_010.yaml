body:
  text: 容春堂前集卷十明邵寶撰雜著二十六首測影臺考按周禮以土圭之法測日景凡立五表其中表在陽城即今登封東南告縣舊治是也豫至其地有二臺存焉其南一臺琢大石為之上狹下濶高丈餘廣半於高中樹一石碑刻曰周公測景臺臺北三丈所復有一臺約高三丈餘壘磚為之其北之中為缺道深廣二尺許下列石為道直達于北約五丈許石上為二小渠渠側刻尺寸甚精密最北一石為二小竅以出水詢其土人云故老相傳為量天尺又以為銅壺滴漏考之縣志此名觀星臺亦周公所築然豫見其刻尺寸所書特今文耳恐非出於周公况歷代律書言尺度者亦未嘗言及陽城測星臺尺蓋不可信恐惟石臺乃周公遺跡所謂觀星臺者則後人因而建耳且其地嘗置金昌府治又嘗置告縣治建斯臺者豈其時邪又按禮疏四方之表各去中表千里豫以禹跡圖考之南表當在郢之北東表當在遼之東北表當在肅之北西表當在華之西南終南山之東今其地不知亦有遺跡在否姑記兹臺之制以備參考徐君墓辨徐君墓在襄城北二十里墓前有樹相傳為季札掛劔之處名曰靈樹按史季札之初使北過徐君徐君好季札劔口勿敢言季札心知之為使上國未獻還至徐徐君巳死於是解其寶劔繫之徐君冢樹而去徐即書所謂徐戎詩所謂徐方其地在今泗州季札自吳適魯乃其所經之道是故過徐君焉襄城非徐地安得徐君而有是墓邪樹之靈否不論也且季札適魯觀樂之後遂使齊去使於鄭去鄭適衛自衛如晉未聞其道於襄奚從而掛劔哉或謂古者諸侯有邦交之禮然則徐君適鄭而卒於是亦不可知也獨不觀乎史稱季札還至徐徐君死則其死在徐也明矣其曰解劒繫其冢樹則其冢在徐也亦明矣於是過於是弔奚不可知而必為之曲說乎豫讀一統志泗州城北則有徐君冢云或曰襄又有徐君故誤稱之題王真靜詩集真靜先生之詩王祠部應韶評之詳矣寶則因是得其為人嘗聞國初以來浙之東西號多隱君子至于今日或謂其凋謝殆盡寶以先生觀之豈其然哉書梅感卷後姚翁好梅梅方花而翁卒花則盡落不花者三年乃復花翁之子觀而悲之君子於是有梅感之詩烏乎忽而落者近乎有情三年如毁者近乎有禮梅其有知邪其無知邪其有以異於人邪其無以異於人邪詩曰梅感信乎其可以有感矣題文山遺墨卷豫在京師讀信國文公手書於錢僉憲世恆所而悲其蹟之燬也嘗為詩弔之於今七年矣比者視學吉郡謁公新祠而其裔孫裕者復出此書真蹟爛然幸未遭燬豫之悲之不减于昔蓋悲在其人在其國在其世而不在其書也雖然前所見書乃公被執北行時遺其子女有父子之情焉而終不以恩勝義後所見書乃公赴難南行時遺其朋友有君親之念焉而終不以力沮志仁義之人其言固如是夫烏乎悲不在書也讀其書而悲果在燬未燬哉私試策問問昔人稱周公為輔相一食三吐其哺一沐三握其髮其急於見賢至矣說者謂舜相堯禹相舜益相禹伊尹相湯傅說相高宗其勤且勞皆不如是豈周公之德不及前五人者歟他書載周公之言曰吾所執贄而見者十人還贄而相見者三十人貌執者百有餘人欲言而請畢事千有餘人說者謂是特春申孟嘗之行非周公所宜有然則所謂吐哺握髮者將皆傳聞之謬歟夫以人事君大臣事也為周公者宜何如而後可邪江西小試策問問先正論士品而為三其於古人論三不朽同焉者二異焉者一其故何也夫道德功名昔出於一今出於二不朽之論古之道也然亦曰是為上是為次焉必有說矣富貴不足為士而士品之今之士果非古之士乎諸生以士自名請試言焉以觀所志問仲尼傳革之彖稱順天應人以湯武並言之其在論語既稱大伯至德又稱文王至德又曰殷有三仁又曰伯夷叔齊求仁得仁豈未滿於牧野之師而獨志於天下為公之世乎吾其東周之期期月三年必世之擬由今觀之其作為當何如也不然而托之空言豈聖人之心哉豫也欲聞此論久矣問人莫盛於三代後此非無人也不知何人可以稱三代之遺材言莫備於六經後此非無言也不知何言可以稱六經之餘論舉一二以例其餘則無愧於知人知言者矣誰歟我師誰歟我友我規我針伊誰之辭願諸生之終告之也問古之教者始乎小學終乎大學其制備矣世降經殘表章搜輯待其人而明焉然而今之成材與古之成材果何如也大學卒章所引多魯晉秦楚之言是言也果有是學而發諸口者乎小學外篇所采多漢晉隋唐之事是事也果有是學而措諸身者乎不然則聖賢立法豈若是之輕且易哉此豫之所疑諸生倘能言之是豫之所望也問周子之圖為道而畫邵子之數為道而衍程子於此或受而不傳或辭而不學豈無心於道歟不然則周邵之事贅矣豫方思之諸生何以起之問漢之人臣有近太公之材略者有近伊尹之出處者然而固陵之追成都之取君子不滿焉由今論之果何如哉勿以成功而輕為衰世之待勿以成說而重為賢者之責要之歸于中正而已此豫發問之大意也問楚人亡弓聖人謂其楚亡楚得之言曷若謂人亡人得之為大也後世有亡錢者嘗謂人亡人得矣而君子又謂其有體無用夫其事同其論不同此其故何哉不可不辨問新城三老有興邦之力而不與於賞力有大於此者乎商山四老有安國之功而不免於譏功有大於此者乎此漢史之餘論也吾欲追决其是非而未能無疑故與諸生商之問漢世之君或有見於封侯而無見於置將或無見於封侯而有見於命相其得失之故必有在矣酌而反之將安處乎而後為漢法也又安處乎而後為天下萬世之法也問禮樂不在玊帛鐘鼓仲尼有是論矣然而告朔愛一羊之儀聞韶忘三月之味此其故何也若乃嘆文獻之難徵幸雅頌之得所博之聃襄而先進是從無亦謂夫聲音節制之間也歟諸生盍於聖言求其本之所在詳著于篇問孟子叙道統自堯舜至文武乃至孔子嘗考孔子自言文不在兹獨承文王而鳯鳥河圖之嘆其世其人亦可想見是何與孟子之言異歟孔子萬世一人也人有恆言或曰伏羲孔子或曰堯舜孔子或曰文王孔子或曰周公孔子或曰孔顏或曰孔孟或又曰孔墨數聖賢者果若是班乎外此稱聖賢者尚多而恆言不及之抑又何也諸生請無多言願數言足矣華珉字說華甥珉迎婦于我其傅宗鎬君其族叔氏也實以珉來珉冠而未字宗鎬為之請豫字之曰中玉復謂珉曰珉乎夫珉石之似玊者也似玉非玊故不曰玉不曰玉曷不曰石石而異乎石也故曰珉珉在我知珉在人故或玉之或石之然石其外玊其中始或石之終必玉之以是而珉有深藏之義焉吾惟恐其不珉也不然則雖玉其外不能掩其中之石而况中與外之皆石乎求或玊之不可得巳君子之行己也何以異是珉也識之宗鎬曰子幸教珉珉也固珮之於是珉再拜請書于簡雜說三首理不外氣氣之所以順者理也象則在象形則在形反而復則在氣無乎不順無所往而無理也君子由形知象由象知氣由氣知理故曰逝者如斯夫此之謂也鄭有二邑多盜一令視盜若無盜也其一令曰盜害吾民治弗可緩乃簡卒授械百方詰捕之盜得則歸貨于室群盜聞之曰令吾治也非為民也將以巳利也詰捕雖勤吾亦力抗之而巳矣於是盜悉其力詰捕者莫勝也盜之繁繁於視若無盜者烏乎吾乃今知假公以遂私如蹊田奪牛者固不能欺人哉有虎自它山至將搏諸害人之獸然未動也群獸大駭走告山之神曰虎害我我受害神且孤矣山神弗察訴于帝帝曰虎能除害良虎也遂下令旌之虎之名自是大振烏乎孰知神之惡虎顧成虎之名哉史氏二子字序姚江史君秉直以生名其子長曰兆龍次曰兆馬頃客江西嘗問字於豫豫為之字龍曰乾用馬曰坤用蓋取諸易夫乾坤之道大矣而龍馬為用之首然龍有可豢而馬有不可羈可豢非龍也不可羈非馬也必也伸於欲屈於道而乾坤之用於是乎成二子者其尚以此思之題兄弟論毛尹騤頃在南城以唐人所著兄弟論質疑誤焉於豫豫方校文未暇一閲及豫行武寧騤適調是邑復具别本如前請蓋將梓之以諭民也夫天下之達道五而騤獨於兄弟是申豈不謂夫兄弟之翕原於夫婦之正而效於父母之順觀一家而天下可知也乎異室之制君子所以保終同居之義君子所以敦始敝於異者戾而傷恩敝於同者狎而失禮恩禮之中君子酌焉騤也教其民將於斯焉在於是論之疑誤也何有書其首簡而歸之書太原陳氏所藏西涯公字刻西涯公德行文章重天下其書在金石者天下之人重之若圭璧琬琰固無容贊矣但刻工有高下故其入神之妙或不能無異公嘗謂近時京師惟閻傑刻為第一汴梁郝升刻篆文亦頗合古意後寄示揚州瓊花詩不知何人刻又極稱許餘皆未滿公意刻工之難有如是哉太原陳君邦瑞以所得公金石書若干通萃為一冊邀寶觀之寶出公門下聞公評書每及於刻因附數語俾觀者知之公真行草書皆自古篆中來晉以下特兼取而時出之耳故所成如此若不求其原而惟迹之逐豈知公書者哉書華世宏所藏匏翁卷後匏翁此詩豫二十年前嘗見之今世宏復持以相示竊有感焉翁詩如漢循吏所至無赫赫聲而去思不巳世或摸擬之鮮能似也翁逝矣詩失於彼而傳於此豫亦何知哉正德六年正月十三日吳氏二子字說人莫貴於知本知而不忘忠孝出焉吳之先姬姓國也視周為君視魯為宗君而朝之不忘忠也宗而聘之不忘孝也非知本者其孰能與於此吳海容欲名二子而問豫豫名其伯曰朝而遂字以于周仲曰聘而遂字以于魯蓋示以忠孝之道也孟子所謂歸而求之有餘師者其此之類歟雜說對談海運者楚人有以千里馬駕車載重萬鎰歷險途數日至於齊者鄭之鄙人所載如楚人而所駕不如乃迂途而行纍二月亦能至焉吳人以鄭人駕即楚人之途中道踣者數矣幸而至則謂鄭人曰胡不為吾之速也鄭人曰夫速天下之所同欲也吾豈異於人哉顧力與時不可强耳彼千里馬非千金不得得而乘之非王良造父不御且物至萬鎰雖有車非烏獲弗能舉而載焉彼之力足以及此其濟險也固宜吾載非所舉舉非所御御非所乘而險焉是求馳之逐之有斃而巳汝數踣而至一恐不如吾之紆而遲也吾昔壯時蓋有力焉而未能一試今老且衰矣雖欲為之其將能乎吳人無以對周史聞其言也作而嘆曰君子行貴量力動貴相時易是必敗蓋天下之物皆然矣鄭人知此孰謂其鄙哉許濠復水録許州城外四靣有濠濶二十丈許昔人引潩水西北來注之夏秋水盛荷花彌望談者以是為中州勝成化間徽王國於鈞鈞許比境董長史彝過而見之謂守某曰吾將言於王乞此濠為吾府屬可往來遊且利焉民聞而懼言於守决其水而涸之又有為種麥之計者於是荷廢而濠淤者數年適豫來知州達觀於城因憶宋人十里荷花江湖極目之詩而怪今之無水也乃詢諸父老父老述其故且曰不如是則此濠久不為許有矣豫聞而笑曰池城相依此濠實許之池城是焉賴以鈞之封越境而請許之池可乎池歸于鈞城將奚屬國不堪二古之制也雖百董彞之言王將不從吾忍自涸此濠俾我城不固哉乃復引水如故既而率民濬其近城處凡闊二丈深一丈濠之不廢實以是故昨聞羣盜橫行汝潁間獨許以濠故將至數十里不卒攻而退三十年前一言乃驗於此因著之題宋徽宗墨竹論畫者謂宋祐陵墨竹叢密處露微白自成一家不遵古人軌轍今觀此幅信然烏乎古人軌轍物理存焉小者且不可無而况大者乎祐陵於是乎繆矣對秦問天下之亂至七國極矣其勢必歸于强有力之國當是時使無秦也則將何如曰六國之中必有為秦者矣雖然無秦之暴也即有秦之暴而無斯高之奸繆則天下之受禍豈至若是烈哉然則為秦奈何曰得孟軻則王得管仲則伯得斯高則亡而已矣蓬室王先生像贊頑愚銘座忠敬書紳儼而冠裳為古孰庠之主翛然杖屨為今燕射之賓其教之博也盡一時之鄉士其誼之久也至三世之門人然則吾黨稱蓬室先生者必以是而參之畫史乃能倣佛其真也跋潘氏容膝軒記豫數造潘氏容膝軒簡而文朴而雅信有如張公之記者軒搆於元庚辰歲越十有七年至正丙申而記作當時巳有獨存之嘆今去丙申百五十餘年而軒復如故不侈以易不汚以隳君子謂仁仲父有後仁仲之元孫繼芳以記視豫請嗣書之豫聞仁仲為楊鐵崖門人故一時名流若陳子尚張伯雨倪元鎮諸公皆嘗燕集于斯豫愧乎其請也聊書此以復跋韓知縣贈潘克誠文國朝來吾邑賢令以東平韓侯博文為首有廉明公恕民不忍欺之稱後擢通州知州以去終保定知府侯在邑時嘗作君子堂以待賢者若潘公克誠者其斯堂中人歟不然何贈言推重如此豫生也晚嘗友于公之曽孫繼善繼芳聞公與耐軒王學士同游尚書張公之門永樂中以名醫徵嘗從文廟北巡既而授漢府良醫正固辭不就公蓋有識之士宜侯之重之也侯之文簡而質如其為政其後二銜兼書豈侯既擢將行時耶其所謂贈蓋古之所謂處者歟辨盜宏治巳酉春邵子在許三載將考績于京師謝事廨居一夕不寐久如聞有閧聲問家人曰無之俄而曰有使聽焉曰在廨後邵子曰盜也其在李讓氏之室乎登樓望之見火不啓門而鼓鐘既而後堂鐘前堂亦鐘鐘樓大鐘先是約鐘則有盜故諸巡卒皆趨李氏時盜巳半去進而合攻傷三人獲二人以至邵子訊盜甲曰逸者尚十三人中二人曰李洪李贊兄弟也居襄城之次溝餘皆有名居詞具檄追之越數日襄城縣械二人至施别駕方署篆召甲視之曰是也具諸刑弗承是日次溝人百餘羣言無辜于門邵子聞之乃輿而之學宮羣遮道訴邵子若弗聞也者而過之比返羣訴如前邵子令緩訊待察衆退邵子召邏卒靈井慕者密遣訊之野曰得情賞無爽慕請符邵子手書畀之越月餘慕以二人至曰此洪也此贊也審諸甲甲又曰是也邵子異而問焉慕曰四人者皆居次溝前二人家溝之北土著而著後二人家溝之南僑居而微盜者實後二人逸而傭於郾城大姓某有司以名居逮前二人耳邵子謂甲曰若何兩是之甲曰盜實後二人某始言謂是既而得前二人某故有怨且虞反覆之誅故遂是之雖是之實非今所是是也後二人頓首服釋前二人賞慕如初言君子曰聽獄之不可執也如此哉獲盜于所即録其辭得二人名是名也居是居也審之而信宜若無可疑者庸詎知復有後二人者哉使前二人有一先死其主者不遂非而成獄者寡矣白鹿洞諭來學文謹按南康府白鹿洞書院實據匡廬彭蠡之勝宋儒周朱二先生嘗寓遊焉其秀自天可以資靜修之趣其重因人可以興景仰之思士惟無志茍志欲上師聖賢進德修業期有益于天下者聞兹洞院皆當負笈褁糧從事於斯况有舍以居有田以贍有書以觀如今日者而可不遊乎但學者立心之始幾莫大於誠僞辨莫先於義利此之不審皆茍而巳今學校遍天下立貢設科教且用之具有成法若舍彼就此徒欲自異於衆而所習者仍與衆同則於立身經世之道既皆有所妨奪而羣居之誚捷徑之譏或未能免焉吾亦豈敢輕舉以誤諸英俊哉學校諸生暨山林儒士有清修愼篤欲暫輟進取而志於前所謂學者許各府州縣起送前來某雖寡陋敬遵先儒舊規斟酌程課近臨几席逺寓筆札相與講明焉如其師道以伺君子此實區區奉詔崇正求真之分也所謂暫輟進取或五六年或七八年必待學成然後出用不惟其言惟其事實斯為有志之士如或立志未定請勿輕至其四方學者聞而來遊當異館待之某不佞敢以誠告容春堂前集卷十
