body:
  text: 容春堂前集卷二十明邵寶撰祭文二十八篇祭黃丞相文維年月日某官某等謹以牲醴敬告于漢丞相諡定候黃公之神曰嗚呼世稱循吏以公為先考厥遺迹在兹潁川世逺千年改名易治吏不知師民不知事某也不肖嘗竊慕公寧使來官祠享弗崇乃廢尼居乃葺乃理作主栖神人具瞻止兹陳薄奠用告厥成公勿我棄鑒我衷誠尚饗祭李司徒文士患無才患無其時遭時而才沛乎厥施匪時曷乘匪才曷稱才不可強時不可幸開闔變通今孰如公公不自有濟以清忠侍御廉訪中丞方伯司馬司徒以佐邦國四朝三紀簡在聖心歷階而升眷注日深肅肅在臺溫溫在省在漕無譁在邊無警其在卿位不諂以驕民我為憂國我為勞公惟弗為為罔弗果公惟弗謀謀罔弗可人方不足公才有餘時克用公公克副之天胡不弔疾起倉卒惟君惟臣有始有卒生歸有詔死葬有恩孰謂公亡不亡者存寶也小子領公鄉郡見公愛公公言是訓昔公在朝期待實隆解帶為贈曰汝我同公喪北來望塵慟哭匪直我私悲民無祿今日何日再登公堂我酹一巵以告哀傷祭惺泉先生文維年月日門生具官某謹具果脯之奠南望百拜哭祭于故奉訓大夫户部員外郎惺泉先生陳公之靈曰嗚乎先生何遽止於斯乎先生有表俗之規而不當師帥之任有理人之才而不當剸斷之司雖通融變化少著於會計之地而其經國之略惠民之術固未嘗得以大施也嗚乎先生何遽止於斯乎雖然先生忠信在鄉閭文雅在朝寧聲名在甲科政迹在郎署奉使北南所至獲譽使天少假之年則今名臣之録先生亦可與矣而况所謂金紫者又何足語邪寶也不敏蚤嵗執經遊于門下雖業在程文然誨迪之餘則惓惓以為已相期而進取利鈍之言不惟不屑亦所不暇朝漸暮摩日積月化寶雖未足稱於胡公弟子而昔人所謂抗顔為師者先生真能方駕矣既而鄉廷二試皆獲同登朝燕出入無往不承中間領郡於外睽間幾何而書使逺通聲音顔色蓋嘗著於牆而參於衡也比獲同官户曹自以再侍為悅而先生又使于越矣憶當別時登髙臨水跽進一觴二三賓僚實鑒在傍躍馬追送南望倣徨曷其奈何遽異存亡嗚乎哀哉寶始聞訃為位以哭革帶布袍踰月乃復惟心之喪恆抱於獨嗚乎哀哉葬不臨穴殮不慿棺乾坤茫茫道路漫漫我懷先生心焉悲酸傳家有經繼體有子人云先生死猶不死先生有靈尚慰於此嗚乎尚饗祭成國公文為户部諸司同官作惟公元勳之族舊國之封歷事三朝世濟貞忠亹亹其勤翼翼其恭罔富在家罔貴在躬昔我先帝知公自衷乃謂金陵今之鎬豐命公留後詢謀僉同漢隆太傅周重元戎公拜稽首渡江而東祗謁祖陵退修治功我潢我圻我兵我農有法以制有量以容武是用戢文是用崇越我耆耇越我兒童曷德不頌曷令不從愛曰慈父敬曰宗工天子萬夀惟公有終東郊之政南國之風三十餘年勿替益隆時敕歲賜申命以庸天明我眀天聰我聰人方庇依天乃隕公公計北來震動九重臨朝慨然輟其鼓鐘爰議嘉諡爰營幽宮公則無憾斯人之窮某等情違臨穴神懷折衝薄奠一觴為國興恫祭張中丞邦鎮文嗚乎鞠躬盡瘁死而後已古人之言公無愧矣方公東行匹馬單旌疆埸千里倚公為城公竭心精不少暇逸衆興則興衆息則息公治于垣圖惟久安垣未克就公乃蓋棺公有經綸公有節槩公論攸同國史當載唯我數人辱公相知哀不及文述此哭辭嗚乎尚饗祭工侍楊公文維𢎞治十有三年七月七日江西按察司副使無錫邵寶領敕督學東過淮上奉謁故嘉議大夫工部右侍郎楊公墓下謹用隻雞斗酒再拜而奠之曰嗚乎我之別公十有一年公沒公葬我非恝然我懷公德有如長淮滔滔其流日往日來公實知我我奚報公一拜公墓我懷無窮嗚乎尚饗祭太師謙齋徐公文維年月日中憲大夫江西等處提刑按察司副使門生邵寶謹以牲醴庶羞之奠敢敬祭于少師兼太子太師吏部尚書華蓋殿大學士贈太師左柱國諡文靖謙齋先生徐公之靈曰嗚乎公在館閣四十餘年居台輔者為四之一宅端揆者又十之五其於天下不動聲色而濳回默運大有所補也蓋吾嘗迹公平生而求之往古矣魏公明習房相善謀歐陽好士文正先憂具是數德而持之以坦坦而終之以休休用能上謹其謀猷之入下善其播告之修故寬而有制天下皆知公之德犯而不校天下皆知公之心至於從容啓迪澤被天下者天下之人未必無知而知之或未能深也寶生也晚幸及見公禮部之舉公實為宗引掖奬誨無所不至而猶自謂有愧於王文端之風此寶所以愛公敬公而終古無窮者也公之南還寶實送之嵗月幾何而公至於斯矣嗚乎哀哉别公有賦哭公有詩登堂酹公侑之以辭伏惟尚饗祭一峰羅先生文維𢎞治十六年嵗次癸亥十二月庚午朔越十五日甲申江西提學按察副使常郡邵寶謹具果脯之奠遣永豐縣學教諭某致祭于一峰先生羅公曰我懷一峰三代遺材範我馳驅百僨不回公之議論風飛雷厲公之文章川流嶽峙公心何如白日青天綱常一疏君子豫焉公髙者懷公竒者迹卧雲餐霞漱泉憩石廷儀為鳯郊踣為麟我願執鞭莫起其人凡我敬公實自童子再拜公堂有淚如水尚饗謁周朱二先生文維𢎞治十有四年六月丁丑朔越二十五日辛丑巡視學校江西按察司副使後學常郡邵寶至白鹿書院敢昭告于道國元公濂溪周先生徽國文公晦庵朱先生道喪千載孰起以承元公其元文公其貞二公之學世方師之迹其講寓實久於斯人以類聚理以言章肆寶忘陋與衆升堂讀公之書尚求公心兹山實髙兹水實深公如有靈眷兹舊逰惠我光明以永公休謹告宗儒祠始祔諸儒告周朱二先生文惟二先生繼起於宋再闡斯文惟兹洞境皆嘗過化學者宗之百世允式祠曰二賢詞若流寓甚非吾人崇重之意再考文公之時實多髙第弟子相從於是而祠無祔位亦為缺典今擬更祠額為宗儒祠仍設蔡沈以下十四人神位祔于二先生之堂敢用告知然後行事謹告祔祠祭文惟諸儒事我文公逺宗我元公嘗至斯院摳趨堂壇義得祔祠今奉主就列謹陳釋菜之儀告于二先生以及勉齋黃先生九峰蔡先生三山陳先生三山林先生洞長張先生宏齋李先生西坡黃先生厚齋馮先生梅坡彭先生桐源胡先生強齋彭先生義卿呂先生月坡呂先生洞正周先生伏惟尚饗改白鹿先生祠額文維兹洞之創實維李公洞有公祠報本反始合於禮經顧泛而弗專義則未當某也視學至此敢憚兹一舉哉爰即舊祠祠公于中其諸嘗從事是洞者以代列焉謹告長至日南安道源書院釋菜周程三先生文維𢎞治十有六年歲次癸亥十一月甲子朔越二十五日戊子按察副使後學無錫邵寶敢昭告于濂溪先生周公明道先生程公伊川先生程公惟我周先生衡人也兩程先生洛人也地之相去數千餘里而乃授受於此天作之會中興斯文夫豈偶然之故哉嗚呼仲尼之道天地也否孰泰之仲尼之道日月也晦孰明之三先生之功於是為大矣故凡過化之地莫不慕而祠之况授受伊始如南安者而可後乎某也愚陋幼學壯仕夙仰止焉今者承乏視學再至兹郡適當陽復之候謹率諸生祭菜祠下嗚呼獨復之難久矣惟三先生尚矜其志而惠相之謹告寧州謁周濂溪先生祠文惟公繼絶往聖登我後學為世宗師凡公過化神靈攸眷惟我章逢嘉樹之思寓於庭草實惟秉彛無間逺邇肆某不敏承乏學事行視郡邑謂南安為公傳道之始也於是有書院之葺謂九江為公終焉且葬也於是有祠墓之治有祀守之圖謂南康袁州為公所嘗宦逰也於是有白鹿之奠有宜春之謁仰止髙山作我同志非敢為諂兹至寧州覩公遺化如坐光霽焉謹率諸生酌水薦毛竊附古人祭菜之義惟公不鄙其昭臨之謹告祭傅文穆公文維年月日具官某謹具果脯之奠遣臨江府教授某敬祭于大宗伯體齋先生傅公之靈維公立朝餘三十年巨人長德時無間然博推詞林精著史局公稱禮闈忠效經幄既陟宗伯復領宮端元良之輔其慎其難大宗載遷僉曰惟允曾未再期而公遽殞嗚呼哀哉寶初登廷公在執事於文字間與我國士公生我知公沒我悲非我私公天下咸思之尚饗祭丁提學玉夫文維𢎞治十有六年歲次癸亥十月某朔十七日某甲子江西按察副使友生無錫邵寶謹遣南昌府學訓導董遵以醴脯之奠致祭于故廣東按察副使吾友補齋丁先生玉夫之靈而哭且言曰嗚呼溺者古之所不弔也玉夫乃死於溺溺其身甚矣舉家溺焉而僅遺其一子水哉水哉何太濫於玉夫也哉吾嘗觀玉夫之平生譬之於水其瀕於溺者蓋屢矣吾略言之而玉夫聽焉昔在成化乙已玉夫以進士官中書嘗因星變疏陳十事先是見素林公以論建寺張後府兼素以救見素先後下獄玉夫危言繼之衆謂或有濡首之凶賴先帝明聖玉夫得無罪此其瀕溺而免者一也玉夫謫普安不便其水土衆謂玉夫濡尾之虞縱不在近亦必在久既而今上即阼移判廣信此其瀕溺而免者二也玉夫在廣信若干年轉知興國又若干年方其勞於州郡吏陵民梗中遭兩喪貧病憂辱百患備極衣袽之戒蓋兢兢焉而玉夫無恙此其瀕溺而免者三也及今一嵗兩轉視學嶺南蓋出險脫危而超於困君子曰三年大國之賞庶其在是而乃真死於溺嗚呼哀哉向也玉夫溺於世途則王三原援之倪文毅援之非為玉夫為天下也今溺於水亡其身以及其家乃無一援之者或謂世途險於山川豈其然哉雖然玉夫之心固不溺也耿耿者存將託神江湖以指天下之迷乎將假澤星漢以潤天下之枯乎抑將樹靈砥柱以鎮天下之流乎玉夫有知當感於吾言矣西望長江東臨太湖天下之水一也壇位其間玉夫其不夷猶中洲揚靈來即邪彭蠡清波吾聊挹之敬酹玉夫於途耳惠泉一勺傾我心曲尚伺他日也嗚呼哀哉尚饗祭錢希翁文惟君之學始于庭訓中乃自力闔開橫從至晚而極事識其大趣適其真鶴在青田一鳴驚人無懷其心周孔其夢桓文之事時亦口誦品藻折衷與衆異同侃侃皇皇有國士風野服山巾肆玩寄傲富不可求從吾所好厥或用之備顧參謀當有微言明哲所收書變于顔詩變于李楚人之騷亦自成體寶之在校資君實多所不知君人謂我何渙然之亭月來旬往鄙懷區區為君而廣萬卷一堂清晝緑隂君之望我實逺實深表俗經世先義後利手書勤惓心以為識新安之別十有五年僅能再會而君不可延矣嗚呼哀哉凡我欲言筆未能盡千古之期於我傳信廬山之陽有堂有壇遲君不來江濤夜寒君墳于何湖濵軍帳逺寄一觴酹之黃壤祭蒿菴俞先生文維年月日門生江西提學按察副使邵寶謹以牲醴之奠遣從弟珠昭告于故長興教諭蒿菴先生之靈曰嗚呼先生已矣寶不肖摳趨先生之門于今三十年先生教寶精深之義而寶以粗淺負之先生期寶逺大之業而寶以近小負之先生猶不我棄故自諸生至于有祿未嘗一日不欲激昂而使之前也先生之於寶可謂至焉爾矣惟成化癸卯至𢎞治壬子十五年間寶於先生三別三見當其見也則不勝喜及其別也又不勝悲情以恩深義以道重無足怪者庚申冬寶領江西之命道經吾鄉而先生在長興不得一見比南行至平望遂日夜兼程走三百里往謁先生先生飲我食我教我如昔至夜分始寐越明日晚乃拜別去執手溪滸各泣不已嗚呼孰謂此別遂為千古之永訣邪自時厥後先生屢有書示輒以請老為言寶謂長興去錫不逺先生教化方行不宜遽去屢書沮之今年夏聞先生歸自長興賀啓始發繼聞先生疾病方將遣人候問而訃音至矣嗚呼孰謂千古之訣乃在長興之溪滸邪聞訃之日寶視學吉郡有璽書在弗敢位哭悵罔數日哀至淚流幾廢人事聞葬期且迫不得奔走執役謹承治命述事作銘今用附上謹此告哀伏惟先生鑒之尚饗祭匏菴吳先生文嗚呼公在天下為文章伯為道義宗冠冕立朝而凡號為士者莫不想慕其風如是者餘三十年而吾人之望猶未窮也嗚呼哀哉寶嘗觀夫世之士其詞其行華常有餘而實則未足流之成風習之成俗膚末紛紛病我耳目不有君子大雅誰屬此寶於公匪直慟吾之私而實為天下哭也論公之大功在史局忠在經筵儲以貞傅制以典傳曰德曰言溫乎粹然宋歐陽修漢司馬遷祕閣之上朝夕周旋濳消默助厥功懋焉蓋不必秉鈞宅揆而後為專也然聖心眷注終焉罔替既進崇秩復錫嘉諡世祿載頒爰及厥季相古名臣公亦可謂之遭際爾矣寶也甲辰門生也放榜之日公在南宫特舉姓名惟兹一言終身是銘二十餘年幾登公庭與其進也且要其成以淵以裕以介以貞公教厚矣而寶也劣則罔克承海月之菴玉延之亭宛然在望而莫覩儀刑矣此則所謂吾私者而亦天下之情也嗚呼哀哉祭陳方伯晉菴文嗚呼公在考功最殿明允雖居郎署衆惟公凖公歸省覲玉珮璚琚接其德容儼乎煦如公於典章有意明習亹亹緒言當務之急公參閩省遄執其衡可可否否列郡仰成公時未老請致其政再而許之公拜休命公在林下十有五年公德如石公心如泉與公寅寮多躋臺閣日夕嘯歌孰與公樂公夀望八有子成童後事既託正寢而終寶之知公實自早歲期我者深我是之佩别公赴浙歲月未多訃音忽至傷如之何襄事何時逺莫能與我懷悠悠如水東注嗚呼哀哉祭談萊州文嗚呼秋雲公已矣我實銘公而未盡公公之政行有儒者之風奈何乎施而未終吾斯為斯民恫也乾坤茫茫其奚窮邪公之學老而不已豈惟今之人難之屈指古人如公者幾載觀古人或經以師或史以吏或詞以俳其究也藝孰能窮原貫我道器公則亡矣此吾所以悼焉而至於洟涕也公之德雲我銘斯云誦以奠公九原其有聞乎嗚呼謁于肅愍墓文寶嘗論名臣於正統景泰間劉忠愍惇君臣之大義章恭毅明國家之大紀于肅愍建社稷之大功皆所謂願為執鞭而不可得者今也守官浙藩實維肅愍公鄉邦謹用酒脯奠于墓下惟公鑒之祭彭少參文嗚呼君來幾時而遽去邪君之來也湖南之民謂君必以敬獄之心為惠民之舉如七八月之間大旱而雨今也不然君之魂氣果何許邪君才則敏君德則清溫溫其恭乃君之情君位于朝下大夫列奉使南畿其聲烈烈君止於斯孰其為之我輩知君曷勝其悲丹旐翩翩南指閩海我酹一觴申以永慨忠定祠奉安告文維年月日後學都御史邵寶用古祭菜禮敬告于宋丞相特進觀文殿大學士贈太師諡忠定梁溪先生李公曰維公閩宗錫産受靈兹泉歌哭釣逰與山周旋我讀公書尚論其世文獻猶存傳狀志銘君子謂公諸葛其心忠貞宏毅超逸古今維鄉先生沒祭于社我獨懷公作我精舍瞻彼菉竹如將見公秋水春芹有來清風尚饗祭許兩峰文嗚呼兩峰其果無聞邪兩峰之間有白者雲飛為君車止為君墳孰得而分所可分者其翰與文其在君也其餘芬邪昔與君別潮江之濆我心如水日維東奔夫何數月乃遽弔君君歸何時我招君魂魂來孤山清酒在尊告宋尚書文維年月日具官某謹遣署郎中崔旻以特羊之儀祭告于前工部尚書宋公之神惟公建議於永樂間堨汶入濟分流北南以成漕渠前後纍年乃克有濟功在國家歷代既久傳聞寂寥識者恨之今朝廷用言者專祠殷祀肇舉于兹寶以運舟阻厄承命是圖惟兹南旺淺涸人力孔艱惟公惠顧我漕尚默相之俾無膠滯我責既逭公亦有永譽哉謹告代太淑人祭姊文維正德七年嵗次壬申九月壬申朔越二十九日庚子歸邵氏妹封太淑人過氏某謹以柔毛剛鬛之奠遣男户部左侍郎寶婦封淑人顧氏哭祭于我大姊楊孺人之靈曰嗚呼我姊之夀踰七望八不為少矣然鄉閭親黨尚有期耊而未艾者姊獨何為不彼如邪昔我孤孀恃姊如母痛定以思我心惘焉若有所失今吾老矣偕我子婦歸自宦途而姊乃舍我以去不得朝夕相聚樂此餘年嗚呼痛哉維我先父母生我男若女兄弟五人一姊二弟亡歿已久獨與姊埀白在世而居又相邇乃弗克相與以終嗚呼痛哉惟姊篤念母家壯老一致顧諸姪未見成立以吾心之戚戚知姊之不瞑也嗚呼痛哉雖然姊有一女已成貞節二子克家一孫應舉而一孫將繼之餘皆有歸姊亦可以無憾矣千古永訣在此旬日臨柩悲咽不知所云尚饗奉安十賢祠祭文維正德七年歲次壬申十二月某朔越二日某甲子具官某謹以羞醴之奠敢告于劉宋司徒長史湛公挺唐尚書左㒒射趙郡李文肅公紳唐隱士陸公羽宋國史編修秦公觀宋御史裏行錢公顗宋無錫縣令焦公千之宋禮部尚書尤文簡公袤元逸士倪公瓉國朝義士張公翼國朝中書舍人王公紱曰維諸賢於兹山或沒而葬或生而逰隱顯異迹後先繼休惟昔有祠寂寥未續今求其人載秩號祝我山既髙我泉亦深嗟我懷人如玉如金春采藻蘋秋薦黍稷其始自今惠我無極尚饗祭陳平江文維正德七年嵗次壬申二月丙子朔越十有七日癸亥户部左侍郎前總督漕運都御史常郡邵寶謹以果脯之儀致祭于故平江伯陳公之靈曰嵗己巳豫攝漕兮公總戎而與俱念轉輸之多艱兮胥夙夜以馳驅時姦宄方搆虐兮遂誣公而及豫公逺謫於嶺海兮豫退即夫里居居數月維暮春兮公舟道於吾錫舉一觴以相唁兮釋驚悲於疇昔豈後命之弗虞兮猶縱觀於泉石相公度之安暇兮謂成公其在兹徴環賜於筮占兮指虔州以為期越辛未豫南征兮復解后於南浦何信宿之淹留兮各傷神於談虎朝京師既戾止兮嘆天涯之修阻才晤言之一二兮胡遽聞夫訃音衆皆惜夫干城兮矧余情之尤深維公祖之為勳兮夙稱秩於元祀失不逺而亟復兮公方圖報於嘉賜嗟此志之不可酬兮邈乾坤之無窮天有意其謂何兮豫欲叩而無從臨繐帷以一弔兮寄長慟於悲風嗚呼哀哉尚饗容春堂前集卷二十
