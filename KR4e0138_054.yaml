body:
  text: 容春堂續集巻十八明邵寶撰祭文二十一首祭文祭甯庵宗伯吳公文惟公雄才博學發為文章妙選登瀛吾黨有光經筵史局所厯惟共人亦有言公惟宗工我少聞公壯乃相識相知相資公玉我石公舅文靖我師謂公友吾孰曰私眤亦有李文正吳文定我病東歸公南典禮我寄一詩侑以泉水公訃忽來病我能哭哭而未弔墓草先宿公視世事不滿恒多今方鼎革公亦謂何我持我泉公能飲否我意無涯我貳用缶祭錢世恩文烏乎伯川已矣人謂伯川没而不足者二寶亦謂然然與人之言殊伯川以母老請終養歸乃身先母死死其瞑乎伯川懐抱利器雖嘗試用而未究厥施其為天下之心曽何時忘謂伯川不足此固然者然當伯川上疏時宄瑾方竊柄萬一忤意禍且叵測遑恤其他謂伯川不足金紫豈其心哉烏乎伯川已矣寶辱知己病不能弔且哭焉臨祖一奠以寫予衷凡伯川節行政學諸君子有文以發揚之寶亦僣與執筆為後世地者悉矣烏乎哀哉祭從父西園翁文於乎吾叔父真率之性直諒之心感慨之言貞介之行儉素之徳隠遯之節欵洽之情豪邁之氣族人服之鄉人敬之郡縣政人信之寶不敏謹抆淚而誌諸幽傳諸衆矣伏念寶自幼孤長而學壯而仕四五十年之間操几杖侍尊俎訓誨諄諄嘗以范文正公相期微醉之後稠人廣坐抗聲大言曽無少慊寶未嘗不感而且媿也浙憲之行送於南浦執手臨風尤以逺大為望自是間關湖湘越厯淮泗一觴之壽願未之遂既乃以致政之命方以得從邱園共享晩節為幸而訃音至矣於乎痛哉訃之初至實在汶上之野止輿慟哭寓哀于詩人不忍聞寶亦不忍再歌也於乎痛哉家居以來朝夕繐帷追想形容泣對二子情何能極既親訓其孫勲期畢祖志又與二子修葺塋次勉襄襄事今發引之期近在數日感念疇昔不可復得矣割牲釃酒奠于柩前平生之言不能盡述叔父其鑒之於乎哀哉於乎痛哉祭浦麗水文於乎文玉三日之政足以占一生之操三月之病足以慟一邑之心我懐斯人如玉如金九原長恨三嘆遺音於乎文玉節行欲追於古文章不屑於今勤卅年以為學艱難淹䘏僅登一第衆方望其秉史筆戴法冠以為國華而例鳴乎單父之琴文玉之衷有天實臨曷其奈何遽爾幽沈烏乎哀哉理不可究數不可推天不可詰人不可期故假我者謂之大塊苦我者謂之小兒蓋自古如斯矣烏乎文玉卑濕非長沙賦何為乎鵩鳥憂憤非栁州碑何為兮羅池興言至此云胡不悲日月逾邁君喪南來叶弔不盡誄誄不盡意申之此詞烏乎哀哉百日奠告文惟吾母棄不肖倐已逾時葬既不能及古三月之期練亦不敢從今百日之例煢煢在次悲感曷勝謹率婦子告哀殯宫非曰殷奠惟靈鑒之謹告立墓門告神文惟墓有門出入是由觀設於明義通於幽一闔一闢實自今載往來不窮惟山靈攸賴謹告立嗣後告太淑人文寶不孝行年六十未有子納二側室亦久不育不得已而贅壻以篤親好然宗祧之主將焉歸之太淑人常以為憂屢有立後之命先是太淑人病未劇寶衷惟我邵氏著徳望於郡邑者莫大於我曽祖存一府君今寶既無兄弟雖有從弟亦未有子再從弟寛有子在抱實存一府君之𤣥孫於昭穆為宜盍遵慈命立之乗間以請太淑人曰然乃不幸遽當大喪將乞銘於君子而孫行無書慊恨甚大欲於明年二月内擇日抱來以乳母養於吾妻顧淑人之室名曰一元以為寶後以終太淑人之意以延容春以下七府君之世澤敢因朝奠以告伏惟鑒知祈晴文代作今年六七月之間縣境之内罹七八十歳父老所未見之大旱岡麓之地水所不及不能蒔且苗者不必論其瀕河頗近水者極力車戽僅得少蒔典衣鬻器自給口食民之脂膏盡矣若秋霽收成亦恐不能輸租辦稅逋逃離散所不能免奈何八九月以來積雨連隂不肯開霽不惟禾頭生耳而禾藁浥爛在田者不能登場在場者不能脫穗萬口嗷嗷無米無薪溝壑之病盜賊之虞近在目前不待智者知其必然某以菲才承乏初至徳未足以感神政未足以齊民不知何修何為可以少回兹沴惟神左右天工告南壇用此句主我社稷告西壇用此句主我城隍告城隍廟用此句皆以好生為心其忍棄兹百萬生靈置之死地以重地方之憂以勤朝廷東南之顧某等不職甘受罪罰民則何辜民亦固有不孝不友不忠不信作奸犯科以干神怒者其如良善樸厚者何惟神重念斯苦斡旋造化早賜開霽俾得趂時歛穫少餬困窮之口以救垂絶之命則神有大惠於民而某等亦籍以逭罪矣三日不霽則無禾矣況五日乎又況十日乎民命至急不啻倒懸某為民長敢以情告俯伏待命謹告擬遷先考衣棺至新阡告文維嘉靖二年嵗次癸未十月丁酉朔越十日丙午孤哀子某葬我先母封太淑人過氏於繡嶺之原先七日庚子爰以棺衣迎我先考贈都御史府君之神於舊塋共幄於松風閣下伺期而合窆焉謹具常奠昭告尊靈烏乎自我先考早世我先母嫠居幽明悵絶者六十年而始得合奠於斯舊域不能祔也新阡不敢遷也某不肖誠無以為計者棺而衣衾迎神而合焉不肖何以為情哉體魄各安其所而魂氣相從於斯其自今乎謹告祖奠文闕繼夭死母以嗣續為憂至廢飲食於是乎納妾以鄉里之良贅壻以世宦之俊立後以再從之嬰庶㡬少慰母心而母已矣今則誰歟告語哉人見推恩之詔皆勸請封兒以無勞不敢從也人見存問之㫖皆勸請葬兒以無資弗敢從也母素知禮亦必以兒為然吉月令日爰啓壽藏爰製棺衣自舊塋告於先考迎而合焉以上附亡於禮之禮吾母之心萬一其少安乎烏乎母之柩昨日在殯今日在堂明日在途且至於墓矣祖而躐行遣而包餘母其有知乎其無知乎古之人有言曰喪事即逺而無退又曰父母而賓客之此時此情兒亦不自知其何如也烏乎哀哉二廟祈晴文維年月日哀子南京禮部尚書邵某謹遣門下士天台王宗元昭告于本縣城隍之神唐御史中丞張公之神某卜以冬十月丁酉朔舉先母太淑人柩至于繡嶺塋次越十日丙午乃窆惟兹二日隂晴在天逺莫可知竊觀積雨淹延連月未已尤深悚懼葬日在墓蒲宫猶可為也發引在途潦車蓑笠不可為也非神矜閔下衷斡旋化工以襄大事則日食且止不啻老𣆀之虞日昃乃葬難逃魯史之貶不孝之罪將益深重惟神其垂鑒焉是所望也而非所敢必也某不勝俯伏祈懇之至謹告祭王文恪公文若古有志道徳功言稱三不朽公皆有之既博且久公之節行海内所宗維北有斗泰山在東雅頌公詩典謨公書經世大筆舍公誰與公在朝廷艱疑之㑹正色危言於道無媿某蚤慕公晩辱公知廉正守道公哉我師遺言屬銘我則何敢悠悠百年心焉獨感我病方笻公紼莫執南望吳天潸然灑泣祭外舅秋竹顧翁文維年月日長女壻具官邵某謹具柔毛剛鬛之奠率吾妻淑人及子一元等致祭於外舅秋竹處士顧翁之靈曰翁年大耋又加之四壽則高矣有子有孫有女有壻各有甥孫育則蕃矣屬纊之際啟篋分金無不霑被惠則均矣壯而勤敏老而曠夷直言介行一錢尺帛不苟取予鄉人則稱有徳矣我與吾妻左右内弟及其子相既卜新阡擇日禮葬翁於此亦可以無憾矣先期二日登堂告哀平生知我之明愛我之厚具見誌辭兹不再述萬古永訣在此一觴九原茫茫知乎不知嗚呼哀哉三祠祝文代有司作二賢祠惟二公道望文名炳于有宋後先來遊為兹郡重洛指既南蜀轍不西吾山吾水嵗月棲棲生焉斯睠没寧不然我生後者瞻仰是䖍俎豆一堂匪今伊昔春秋薦是陳懐哉敢斁名宦祠維諸公有事兹土于昔于今蹟留史志功著人心維俎豆是脩祗薦春秋祀孰謂逺而公神如水忠義祠烏乎烈哉諸公城存與存城亡與亡維忠維義日月與光新祠秩祀朝有憲章維兹仲春秋敢薦厥常祭高憲副曽唯文於乎曽唯君故吾友乃我謂師君豈不情我則愧斯士先器識吏上經術嗟我知君實此焉律君遊宦路二十餘年家無長物族有義田州郡河渠刑名錢穀嘉績用成在在可錄君譽藹鬱毁亦隨之讒言滔滔君操屹而我病君憂我愈君喜一別逾時君胡不起哭君者女葬君者兄母妻臨穴何以為情墓我銘詩為知己作重以誄詞侑之清酌祭表弟楊元平文烏乎親莫親於兄弟之情悲莫悲於死生之際追而思之曠莫曠於少年之時約莫約於暮景之計視我惓惓尤多意氣我遊宦途將三十䙫我餞我迎我酬我寄此吾所以在喪聞君之喪亟走長號慟哭流涕者也三年再過君喪在堂嵗月逾邁君將亡矣我病艱行不能執紼西望龍山我懐鬱拂凡君隠徳碣有我辭一觴告訣吾甥將之九原茫茫庶乎其一知也烏乎哀哉祭楊郎中文烏乎哀哉東川已矣官之守莫大於廉廉而至於餓其體膚廉之過也臣之節莫大於忠忠而至於隕其軀命忠之至也東川於是乎皆有之烏乎廉之過可怪也抑可敬也忠之至可嘉也尤可愍也烏乎東川吾謂之何哉蓋棺而事定矣歸土而心寧矣東川可以無憾矣吾何言哉吾言在銘矣烏乎哀哉祭華世宏文烏乎世宏已矣我於而翁同年以登如兄及弟故世宏於吾坐立周旋如姪視叔三十年間世講益篤天乎天乎何奪我世宏之速也世宏居鄉則宜於鄉族居家則宜於家人其最大者孝違亂命而得乎天性之友義從荒政而得乎天性之仁蓋吾嘗論世宏者如此亦已託之銘詞勒諸貞珉矣逺日將臨一㑹莫遂追念雅情垂我涕淚惟兹新阡與我世墓壤地相連春秋上塚其將徘徊宿草招弔鶴於華表之顛也乎代内奠莫母茹令人文令人之先君子與我君子幼嘗同學恩義踰戚令先君子不幸三十而卒我君子亦以是嵗宦遊中州令人孀居㡬四十年某也時侍先太夫人就養北南比歸而令人老矣貞靜之風惠懿之徳匪苟知之實心頌之乃以二君子夙昔婦女交遊之戒未嘗過從棗脩之問亦罕胥致兹聞壽終烏能無情哉㑹遭災變不能往弔瓣香束楮觴糈豆脩遣某奠于几筵而我君子代為之辭惟靈鑒之容春堂續集巻十八
