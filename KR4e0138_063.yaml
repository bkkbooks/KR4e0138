body:
  text: 容春堂别集卷八明卲寶撰墓表六首碣銘二首傳三首行狀一首明封太淑人張氏墓表太淑人張氏故贈都察院右副都御史前常德府學訓導致仕菊莊先生縉雲周公某之配後公卒若干年以𢎞治乙丑某月某日終于家先是厥子南以右副都御史奉勑巡撫大同今上登極上兩宫尊號太淑人進今封至是都憲得訃東歸疏以例請得諭祭及葬葬有期謂某昔同官江西嘗獲拜太淑人乃屬文以表墓道寶辭不獲則受其狀而讀之按狀太淑人諱某字某其先湖廣江陵人其父曰楚正統間主縉雲縣簿時菊莊公方弱冠力學有俊聲縣簿公遂以太淑人歸之太淑人儀質端重德性純美孝敬忱肅慈惠懇洽事菊莊公自諸生至于有官及見都憲之成壽高祿厚禮秩有加而厥德益懋於周氏世望為稱君子論女則者必以太淑人先焉今茲墓道之書所以風示夫人不宜縷舉寶特論次其一二大者初太淑人之歸菊莊公也遭家中微敝廬薄田衣食僅充衆謂必不能堪太淑人入門即與妯娌同勞逸無幾微驕態烏乎貧者士之常當今之時蓋知者鮮矣若太淑人厥惟賢哉菊莊公性剛毅處族姻寮友有過輒面折不少貸太淑人每溫言釋之甚則極陳禍敗事以相戒必已乃止烏乎忍濟容大非君子不及此若太淑人厥惟賢哉浙東民俗競崇奩資養女至二三輒不舉呱呱泣盆盎中有不忍言者太淑人相菊莊公生女六人一無遺棄諸子婦守為家法烏乎習俗移人賢者不免天性之親忍自戕賊雖為人實獸不若亦獨何心若太淑人厥惟賢哉諸子既長菊莊公教之極嚴或至傷恩太淑人曰吾觀兒輩異日各有成就第從容誘掖當無不化何苦乃爾烏乎父子不責善夫人知之而弗能自克若太淑人厥惟賢哉太淑人既受封家亦漸裕內媵外僕足備百役而祠堂時祭及寢墓祭牲酒脯饌必手修製極于潔腆不以委人自奉約薄無改于素其暇日織絍補綴每一燈至夜分以為常烏乎貴而能勤富而能儉古詩人猶稱美之若太淑人厥惟賢哉凡此數者非獨天質若有學力焉故有一已足書矧多有之而他行又有不勝書者書其大則小者可知也烏乎德一也而在女婦成之為難蓋姆教既廢修飭由已非若男子之有師友相切磨也然德成而無賢夫子雖有令淑之實密于閨門弗克彰顯以樹風聲為世教重始之難其難在已終之難其難在人惟太淑人始終一節人已克協以迓承天寵生殁榮哀無愧於君子之論某不佞願以是為天下道之太淑人壽七十九有男子四人長魯次即都憲次邦次易易邑庠生蚤卒都憲由進士知六合縣擢監察御史按察副使按察使右布政使召為今官有學有政風裁自持偉然天下之望太淑人始封孺人今為再命云女六人者陳槐朱鎜丁淳李暹羊覃洪奎為其壻孫男曰某某某凡十六人烏乎盛矣是宜附書若夫塋兆方向及葬之月日有少傅姚江謝公志銘在茲可略也陳母王氏太宜人墓表正德元年丙寅八月十五日戶部郎中陳嘉言之母贈太宜人王氏以疾卒于家先是九年𢎞治戊午郎中以主事考績太宜人受勑封太安人又六年甲子又以員外郎考績太宜人乃受誥進今號某嘗觀在勑有端莊謹飭之褒在誥有禮義儉勤之譽大哉皇言足以彰太宜人之德矣宸章煥爛被之穹碑昭揭墓道將永世無極郎中謂某昔同官相知又以表墓見屬謹按太宜人姓王氏父曰某母某氏世為無錫人幼聰惠嘗從父舟行遇盜坦無驚色盜果不犯而去識者已知非庸流凡女紅不煩母訓皆合尺度及笄歸于陳為贈奉直大夫户部員外郎野葵府君配既入門執婦道事舅姑得其歡心於府君或規之或相之皆歸于正族黨姻友能言其事府君卒家道中替太宜人躬舂㸑以撫諸孤夜則絍綴率至四鼓乃罷子若干郎中為長命就學資給之需悉自已出不知其措之難也既而郎中學有成鄉人子弟請業者衆修贄嵗益而力勤弗怠及郎中舉進士授戶部主事屢迎養京師不從至分俸歸則曰我何以叨是賜哉每受必拜郎中三使過家皆旬日促行不使久滯乙丑三邉之使訛言有警頗憂之及歸曰幸矣促行益切但以明年七十期再見為言郎中不忍離也遂留其內子范宜人侍焉越四月疾不起烏乎吾聞仲尼以先事後得為崇德然非知道君子未有不昧者故在當時猶難其人而况後世乃有女婦如太宜人者哉初太宜人訓其子之學也蓋知夫人必如是而後為人不知榮祿之在後也及夫封之既加養之既備則又競競畏抑惟舉臣職為其子勉而不敢自以為功前日之心於是益著由是天鑒厥德以成郎中郎中文行政績焯焯于時崇階厚祿生養沒祭華顯盛大有不期而至者君子考其平生允如勑誥之所嘉奬其為表也孰大於是而尚假於寶之言哉某不佞因郎中之懇特原太宜人所以立心者敬文于碑為鄉人告府君諱璲字德潤野葵其别號孝友直諒孚于邑里愛讀魯齊大學要略及諸史略微醺命兒輩歌詩擊節慨慷有古烈士風濟貧恤喪能悉其力教子極嚴至引髮繫楹以警睡太宜人壽六十九葬以卒之某月某日墓在某地子三人長即郎中名䇿次某次某孫男女凡若干人是為表南京鴻臚寺鳴贊月溪王君墓表君諱皓字希程王其氏月溪其别號也世為無錫人居邑西甘泉里高祖貴一曾祖仲圭祖伯啓父原敬號樂善娶于張生君君幼有志於學治詩經為進士業樂善翁喜而進之翁卒君葬之以禮邑宰河間賴文玊聞其賢也聘為師以教其子君出入縣廨言動不妄賴宰益重之繼補庠生與陳户部惺泉及張太守元之吳侍御遜之三公為友既而各登第君略不為動鄉邦多之若過太僕九臯輩出門下者數人雖貴猶執禮如故後公援例應貢適有教職之選君辭以母老卒業南雍時太宰晉陵王公宗伯華容黎公司成金溪徐公咸稱重之比歸母益老君事之益謹母卒弟兄繼之君備物以葬念所居鄰邑治先祠逼狹弗得展敬乃遷城東新居為終焉之計於是年幾七十邑宰姜士元勸之就選故有茲命既抵任孫卿一見之以得人為僚友賀未幾乞致仕歸杜門非公事不出君善治産晚益饒裕作書屋于所居之右疊山引水雜植花竹堂曰成趣亭曰醉吟有餘情焉仍集歌童數輩日與陳方伯晉庵諸公極過從之樂雖性不喜飲每㑹輒欣然忘倦賦古律詩往往有得意句其曰吾心拱北時時事願繼三王作四王尤為人所傳誦故題其堂曰拱辰云君平生視人猶已過輒攻之善輒譽之有疑必商確求是莊重典雅出言有章尤篤於教子嘗謂曰六經惟易理最奧不可不學乃遣其子卿從華少參靜庵公游君親課督不少休暇卿應例入南雍君忽遘疾卿㑹得依親例歸君喜病為少差卿侍湯藥數月卒實戊辰六月二十六日享春秋七十有六配李氏繼鄧氏子男一即卿女三長適義官張瓉次邑庠生莫愈次周普孫男三東秉采孫女一卿以明年某月某日葬君于惠山河滸之原既得銘于張黎平而墓前之石乃以屬豫遜之吳侍御實狀其行豫嘗謂士大夫之於仕也知進非難知退為難知退而能樂之又難之尤者也若君者懷抱利器纍舉纍屈由例以進庶一盡吾衷於國既而辭冗居散辭近居逺始上而遽歸自適於湖山之間優游康適以至於老所謂退而能樂者非君謂邪豫於是重之豫在邑庠辱君忘年之雅寢門之哭既舉于聞訃時矣兹因卿之請復為之表以詔其後人俾有考焉勑封承德郎戶部主事劉君墓表戶部劉主事鵬監船稅于蘇也厥父封君實來就養未幾以疾卒于官舍人或為戶部憾焉君子曰生養于子也沒殮于子也歸且葬于子也子之幸也何憾之有或以慰戶部戶部哭而興曰幸則幸矣某敢自逭吾罪然有不朽可圖敢不勉於終於是既請銘于少傅守溪先生王公復自為狀介吾邑侯馮應奎以墓表見屬豫嘗聞戶部之善於大司徒劉公今讀其狀知君有大節者二劉世居京師數世至君早失怙恃乃能自力於農每誦古人言則思企焉及戶部生曰此宜業士遂習舉業嘗誨之曰讀古人書當效古人言行用以此不用以此舍此幸進其能為人乎戶部用是砥礪經學舉順天鄉薦登乙丑進士今為戶部有聲人以君為能父君事繼母李氏敬而忠終身不衰李亦感而加慈嘗曰何以報吾兒君垂泣謝曰吾父蚤世今見母如見吾父吾方懼事之弗周而敢望報乎人以君為能子吾嘗見世之人慈溺於愛孝衰於逺而君之為父子如此足以表矣乃若居喪也哀奉祭也豐撫姪也恩睦族也惠處朋友也義鄉之人稱之無間於家又皆有可書者吾特取其大節先焉以為後之人詔君諱華字世美其先山西太原石州人國朝洪武初𨽻神䇿衛籍實居今南京永樂初分調今京師歷四世至君祖福源父聚母趙氏繼董氏李氏君生正統已已二月十有一日卒正德庚午七月十有二日壽六十有二配王氏封安人子男一人即鵬孫女一墓在順天東安嚮口村之原其葬年月日則具諸志云明故封文林郎松滋縣知縣華公墓表公既葬十又幾年其子辰州知府前戶部郎中津始立石表于其墓衰絰詣豫請詞焉公受國封典厥有美褒而群行焯焯具銘諸幽為宸章輔某又何以表之惟公世出南齊孝子寶其來也逺生禀孝友之性於父母命無小大有劄記之敬母卒有毁形之哀父疾有由衷之憂妹與其夫殁有躬視之愛殁有殮殯營葬之勤此其行之大者或遇橫逆有自反不校之恕偕遣二子從明師補邑庠弟子有為國之忠津舉進士筮仕松滋有勤勞之勉及進刑部有欽恤之屬掊尅苞苴鍛錬羅織之戒晚嵗居鄉請浚秦塘有惠民之利及享分俸之養有知足之感終日尋繹漢史故事有慕古之念杖屨逍遙與鄉老觴酌有忘世之度又皆人所難吾書而詔夫鄉人蓋無愧辭焉烏乎天下之理感應盡之矣華氏若公以上世有隱德不圖其家之蕃也及公之父景榮翁贅堠山錢氏盡辭婦財而竭力營立亦不圖後之顯也今公既封而其配同之子凡五人其一為名進士為賢縣令為材部郎為良郡守其名位且未艾孫男十四人繼出仕途又未可量感應之不可誣固如此夫客有謁公墓而讀斯文者其亦有所感興也哉公諱暄字伯和壽七十有三其生也宣德已酉其卒也𢎞治辛酉葬為明年壬戌某月四日墓秦塘北原蓋從父兆公子五人者曰某某某某某孫十四人錢鴻臚妻惠氏孺人合葬表是為鴻臚寺序班錢君世端之墓君葬後二十二年其妻孺人惠氏卒其子仁復仁術等啓而合葬焉禮也先事具狀稽顙拜請豫文其石表三而益勤豫惟鴻臚之父贈奉直大夫工部郎中南邱公忘豫年而辱與之游及其子戶部君益以道義相友至復術昆弟蓋三世矣知孺人之行有可訓於其後者其請也吾其能虛也哉按狀惠氏為長洲世族其先在宋有曰吉甫者由汴徙吳興其子天成再徙蘇之陽山稱陽山惠氏國朝天順間曰宗本者生以範娶錫之鵝湖華思源女實生孺人孺人二嵗喪母鞠于繼母練氏又二嵗練亡思源翁以歸鞠焉孺人弱而能勤翁每稱說古義烈以警動之卒成女德長歸鴻臚鴻臚母華宜人與孺人之母再從姊妹也奉直公知孺人於是乎姻初孺人甫笄以範翁遘疾且殆孺人日夜侍湯藥不交睫者二旬比翁愈寐三日乃寤聞者異之及歸于錢姑華宜人先卒若干年矣奉直公家法嚴甚孺人冡婦也為衆所屬乃從容禮法以奉繼姑王宜人宗族以為能婦奉直公嘗以堪輿家言欲徙所居向西百步曰是為嗣續計顧力未及耳孺人既脫簮珥以鴻臚佐其成然平居恂恂聲不出閫外奉直公益重之王宜人尤加敬愛蓋凡祠堂薦饋悉委焉後數年鴻臚游京師以範翁病亟時暑且疫家衆相戒莫敢近孺人聞訃號咷馳歸躬視二殮或謂盍少避孺人曰此而可避將焉為人終以過哀成疾數月乃已方其疾也家人北上者密戒勿言曰恐以纍大人越幾年鴻臚得豫告歸又幾年奉直公卒孺人相以襄事自是生業日艱外侮乘之則减節諸費一以延師教子為務又幾年鴻臚卒哀疚中率諸孤於禮常曰業不患隳患隳汝學行耳汝父垂絶言不出此諸子聽惟謹用克底于成又幾年年六十諸子將設燕為壽孺人曰父志未成兒何用為是翰林學士荆溪吳公聞而韙之紀之以文又八年卒烏乎婦人之行莫大於孝孝盡於父母舅姑故夫說其順也子樂其慈也而衆德成焉然所害於孝者非利則害於斯不惑可謂難矣孺人天性令淑而孤苦荐歷所謂困心衡慮者蓋多有之宜其能然况既老矣而猶共抑以終其身謂可以訓於其後者莫此為大它若處閨門族䣊雖盛節抑恆事耳且有墓銘在皆可略也孺人子男三人其伯仲即仁復仁術皆縣學生季為仁衍女二人長適華升次適鄒瑚孫男六人去非去疾去僞去欲去回去怠女三人慶延受鄒聘壽延受華聘福延受惠聘曽孫男一逢吉女二慈秀受華聘慈愛尚幼孺人卒以正德壬申九月三日葬以十一月十四日墓在邑西開化鄉軍將山蓋諸錢同原異兆云未軒吳府君妻龔孺人合葬碣銘未軒吳府君既葬於湖濵第二灣之十二年正德丙寅正月七日其室孺人龔氏以疾卒其子文等以其年十月某日啓未軒兆合葬焉惟墳前之石不刻無以示久遂奉其孰賔錢君孝所為狀來請未軒之姑豫從伯祖母也故豫幼辱與未軒遊今其孫汝憲又甥於豫其能辭諸未軒諱榖字民育未軒别號也其先居延陵六世祖均聘始徙無錫之閭江子伯成仕元為青山鎮巡檢其弟仲實國子學録巡檢三傳至義官克勤克勤生承事郎良素承事娶于俞是生未軒未軒幼禀穎秀壯志修警孝弟孚于家恭謹達于鄉而博以書史潤以詞翰邦人之譽無間於其師友漢世所謂賢良有行義者未軒蓋近之觀未軒之行而孺人可知已然其事亦有當特書者孺人姓龔世為武進人祖孟本父濟洪皆隱於耕母王氏孺人生而慧淑言行往往合古義比歸未軒逮事舅姑孝敬兼盡於是祖母鄧碩人期壽在堂孺人能曲致其愛吳既望族而未軒又賢者喪祭婚姻之儀師資賔客之費賦稅力役之供孺人相之井如也孺人分為冢婦其族有諸祖姑行姑行姊妹行者各若干人無不謂孺人有禮至于妾媵僕從及里媪鄰姬皆有恩意尤嚴內外之辨三尺童子不踰屏閾諸婦守以為法凡為夀六十有四在吳者若干年蓋持德如一日云子男三皆邑庠生文娶同邑楊氏早卒繼鄒氏衮娶武進楊氏音娶武進趙氏女一適楊文煦孫男五愚聘朱氏汝憲即豫甥忞聘王氏愈聘陸氏息聘某氏孫女六長許嫁秦某次豫弟國政子勳次華某餘幼惟孺人葬既成禮君子謂稱乎其德未軒之行於是為光且逺矣刻銘于表義也其詞曰循循未軒有政于家孰謂未達在邇可遐承乃祖父資乃師友有相者誰曰維賢婦易象相愛以助以刑若網在綱卒也相成古訓有之嘉耦曰配璧合以藏義取正位我銘石表望于湖濵凡厥伉儷有懷二人華母鄒氏墓碣銘有葬其母三十有六年而請銘其墓者曰華氏子謹其容戚然若有終身之喪其言曰吾母鄒年二十歸吾先君四年而沒時某方三嵗不自知其悲也長聞傅母言吾母天性溫淑蚤習見家法且聞曲禮內則梗槩事父母能曲順㫖父母特愛之有孝女之稱吾祖素負德望故為吾父求配而獲諾焉比歸為冢婦莊肅安詳春秋祠祀視滌視烹炙唯謹尤間於儀當饋食時旋折中度舅姑愛之如其父母孺人益䖍親供膳事朝夕弗怠嵗時父母有所遺必手調製乃進以為不爾非敬也雖處豐裕中蠺績剪製視中家加勤椇榛之贄不越戚吾父方勵精家政而好施豫勤燕欵吾母有將順之美自兄弟婚姻以至里䣊稱吾父者必及吾母然以逺父母故孝思日切顧舅姑家法不敢數歸寧吾外祖母卒哀傷成疾臨終時猶顧謹泣託鞠于傅母者甚悉某既有知念無以表吾母者乃以告吾從叔父韶州先生凡韶州所狀皆不出吾所聞唯公圖之按狀母諱某姓鄒氏家泰伯鄉實宋忠公浩弟泂之裔父曰良節例授七品階母惠氏其歸于華為文煥配舅曰守吉姑某氏母卒于成化乙未九月十九日距其生景泰壬申十二月二日年二十有四子一即謹由諸生卒業太學孫二長宇娶錢氏次察聘錢氏先是葬于椿桂山祖塋之次𢎞治十一年十二月壬寅文煥遷葬于艮山新阡謹用祖命遷母合焉銘曰有子而夭謂壽亦宜遷而從夫備物與儀子壯而思礱石刻辭以慰厥慈烏乎悲哉錢世節傳錢槩字世節無錫人其先出吳越忠獻王三傳至進由嘉禾徙錫之湖頭又四傳至正三以行義稱又四傳至公達號梅堂徙磚橋今所居是也梅堂生閲耕諱正德閲耕生南邱諱溥豪邁有才識以其子今工部郎中榮貴贈禮部主事進工部署郎中世節南邱第四子也始南邱教之業儒沈默善悟以家故不卒業既而伯兄楷為鴻臚序班于京師家政及焉世節殫力酬應南邱無內顧憂比析産以成室遜諸兄自闢草萊以居南邱卒襄事畢力立門户愈勵勤儉於是工部擢甲科或以韋布為世節歉之世節曰分也茍無愧於禮義良農與貴仕等耳一意稼穡益求樹藝之法豐收歉貸雖歉弗歉賦于公每先期退而靜處怡然自堪立小宗祠堂薦祭告謁禮不違義賔客之過從者簡餽而豐儀知者豫之子仁衡游邑庠求師擇友皆惟其人嘗植梅後圃花時步玩其下自謂知梅因號味梅其於世蓋泊如也年四十八卒配華氏子一即仁衡以學稱論曰吾聞諸工部世節貌偉而心下性朴而才密行儉而義周無武斷而鄉曲平無文飾而姻友篤中蓋有確然不拔者知弟莫如兄信斯言也如世節者可多得哉豫於錢氏世戚徴諸其內外無間工部之言孟子所謂一鄉之善士吾於世節見之矣福州知府張公傳公諱遜字時敏姓張氏自號鈍軒纍官至福州知府世為無錫人曽祖均佑元萬户祖定父文簡以公貴贈涿州知州奉直大夫協正庶尹母錢氏贈太宜人公幼有敏識十四嵗充縣學生二十四舉應天鄉試明年㑹試歸益力學越再試乃入太學卒業文譽日起遭父喪服闋又再試乃嘆曰命可知矣且仕以行義又何必進士之科之求也遂就選授福建同安知縣時同安缺官六年帑有𨽻銀若干兩或謂公悉取之公計日而取以其餘充備荒糴本民稱其廉期年而政成縣東海上有五戍戍長擾民且弗受禁公至而止內侍某族大而驕人告侵其園田公立疆之一時荒政公為稱首公曰此何足稱荒在備耳乃即縣治及鄉建倉勸分以廣其儲擇耆老有行者司之至今不廢民葉宗發以豪干法走避嶺下族人往往負稅有死於獄者公簿其丁升分勺别日即稅完尋以治邑高第擢福寧知州福寧亦濵海多盜公選能者責捕之軍豪張某素負力撓法至是斂跡餘悉帖服乃定役法民七軍三井井不紊未數月以內難奔歸服闋改涿州涿在京師西南為天下極衝使者絡繹應接不暇而地多宦者家尤號難制前守率以是廢政公處劇以預處勢以直不激不促久而安之凡守之務次第修舉郡如僻焉安州監生張錦以人命誣其守宋某逮者三百人數年未決撫按以勘檄公公至安數語而服任邱謝令某徑捕張指揮某下獄某訟之且欲搏之死撫按曰此事須張某又檄公勘亦數語而服公暇修郡志質於宫詹陸公公歎其敏既而有福州之擢民老幼遮留不得則脫履以識思焉至福三月理舊務未完者干餘事發解戶以官物私販者五百餘事舊收十邑餘錢助附郭軍需公即革去更定驛遞夫以逸補勞民大稱便福在閩為㑹府鎮巡諸司交牒互判公晨起左右酬應無遺務夜燭治官書恆至漏下二十刻始罷城中外多火公每躬救之或日夜不再食始覺有疾輿而述職過涿之野民識公者奔走相告咸出拜曰今何意復見吾父母比至城官屬以下郊迎館公公堂信宿而去還抵家疾漸亟乃諭其子曰吾受國恩不能報汝曹宜力為吾補之言訖而逝年六十四公歷三官四旌異政清勤公敏具在疏詞民為立碑者三曰愛民曰郤金曰德政作者皆巨人嘗陪祀南郊與慶成燕論者以為盛配邵氏吾族尊姑繼王氏贈封皆宜人子二人曰珤曰琇俱縣學生所著有鈍軒藁贊曰人有恆言吏莫難於三知謂府也州也縣也而公皆歷之人唯見其易不見其難也且南閩北燕風土殊異而在在宜公公豈有異道哉書載簡廉詩咏豈弟公咸有焉某嘗過涿知公所以為州者觀于州而府縣可推也使少假之年厥績之懋當不止是是可惜也吾故詳著之行恕丈人傳丈人姓張氏字惟弟居有行恕齊故人以為稱錫之泰伯里人父以上世為士丈人幼喪母適遭嵗艱二兄各以業養其父而丈人獨無以供子弟職於是始學為醫師事同里黃叔洪叔洪之學朱丹溪再傳也丈人日質所疑夜歸誦讀無憚寒暑如是者數年而學有成辨證切脉悉合理道其變通之術暨炮製和劑之宜一時諸醫皆莫之及叔洪沒復兄事張用謙用謙亦出入黃氏而高明有獨見丈人與之講論以相資益故學愈精施之人多竒驗父兄資焉自是求者彌衆丈人日不暇給凡疑疾則歷檢方書必得其說乃用藥曰人命不可試也每活一人則大喜曰此方驗矣雖甚富者不責其報貧者雖有報必却不受其友朱文立嘗疾丈人治之愈使家童數人負米以報先曾祖存一府君度丈人不受從旁竊觀丈人遇其人為之陳友義卒却之所居狹陋扁曰斗室或勸之廣之丈人不應蓋終身安焉年八十而精神不衰赴人之求雖數十里外亦徒行不索輿馬聞世事得失常為之喜戚觀其為人蓋非直精於醫者子一人景昭冠而死贊曰古人有言人定者勝天天定亦能勝人信斯言也丈人平生為善有隂德焉宜其子孫衆盛且顯以收厚報而竟絶其後今雖未死然老且耋矣將猶待天定邪林泉鄒處士狀君諱忠字顯之姓鄒氏糸出宋忠公之弟進士泂泂之子朴遷無錫華莊五傳至仁榮又遷龍涇生德載德載生師道師道生莊英果負材局在國初始大龍涇之業莊生洪昭嚴毅爽達度量絶人人服其義洪昭生元字以善輸粟受散官克守考訓配華氏君性行夙成髫齓時事父母能迎意承色長益慎密每旦必省退而治事冠裳終日夜漏下十刻始入私室貨無私蓄食無私奉為糧長無乾沒計凡親治綜幹務當其意或有外事寒暑雨雪出復如期弱冠再遭喪哀慟幾隕宿食喪次者終三年年踰五十當忌祭墓祭猶號劈不已迄六十未嘗置酒為壽常以仲兄久病長姊季弟早夭為恨與伯兄處時節燕聚必盡其歡宗族環聽議論鑿鑿里閭傳誦為法伯兄卒君在病哭之甚哀平居禮度矜肅閨門嗃嗃非甚病不內處語孩提以正延師交友久無遷心殺禮賻喪尤腆見鄉人取租量不以槩而貸息倍於法豐貸凶糶視利為計心獨病之乃一切除去嵗捐租什一以為常稍饑則捐什二其出貸也遇饑减息如其取租其他如賙貧濟急濬渠建橋之屬義舉尤多府縣征役應之而已屢有勸分之令懇辭冠帶而發粟如數最後不得辭乃命二子受之君初受産單瘠又以昆季處故居移息東偏兢惕從事幾年有妻之喪又二十年有塘莊之遷蓋追承考志為之而儉約自持久而后成屋有扁扁有義外曰正德內曰崇禮此其大者餘具少宰王公記中君子謂君善居室類其為人婚嫁既畢因授事諸子微總綱要而春秋浸高又雅好煉養之術因自號林泉蕭散自適如神仙中人杜門靜坐不御爐扇中夜弗倦逮疾甚猶自盥櫛端坐而逝諸子殮以角巾布氅遵素命也君生正統丙辰十一月四日卒於𢎞治庚申六月二日年六十五娶錢氏繼惠氏子男五謙觀俱義官豫晉升女七長適禮部員外郎錢榮次適郭悅生員吳文華錡義官華寅過楠浦㑹孫男七承祖紹祖學祖式祖述祖纘祖𦙍祖女九長適華世禎次許嫁楊耒華淨徐謐華琨錢永年華榖餘未受聘君卒之明年十二月十七日謙等葬於寧山先塋從其父兆乃具事行請為狀將乞銘焉寶嘗聞君氣雄度逺公懷直道表裏無間雖處田里而憂時憫俗恆若疾疢慕善嫉惡崇義後利喜與士君子語欵洽慨慷聽者起敬其論天下事悉中機宜至於封域道里歷如指掌朝廷典故亦往往能道其槩幼不及學壯嵗熟讀學庸論語及獵涉通鑑綱目尤好誦老杜詩時有賦詠忠憤激烈要亦近之晚嗜周易昧爽起秉燭坐誦久而有得卦賦一詩櫽括大㫖書法兩沈搨夲數十皆莊重縝楷寶家食時即知重君近嘗為君記務本之堂謂君可比漢之孝弟力田有行義者而文雅過之今君已矣能不一執筆以慰其子哉謹狀容春堂别集卷八
