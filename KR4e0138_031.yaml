body:
  text: 容春堂後集巻十明邵寶撰五言絶十九首五言律七十八首五言排律一首容春軒六詠瞻尼壇精舍東有亭奉先聖孔子畫像前植杏樹為壇其下畫裏瞻尼父庭前卽杏壇春風吹綠樹真作泗濵㸔擬渠井壇之西有地一方畫為井田之形藝蘭蕙諸香草橫渠復古心紙上聊云爾我畫我中庭亦復横渠紙先春臺浙人貽紅梅一株與故有白梅對植庭下臺以數石兩樹分紅白同然見復心開花還結子吾道古猶今晩秋圃精舍西樊地種菊秋菊有黃花有朱亦有素靖節醉東籬為識花心故黿峯庭黿山石一樹精舍前竒而不怪通而不巧萬古水中山一峯山下石古貎獨蒼然不受風濤蝕鐘石沼二石自湖口上鐘山携歸置之盆池其一㠝屼其一穹窿石鐘以聲名無聲安取此風水月明中我憶東坡子題扇贈趙宅之苦熱思高眺王孫勝有樓城隂連塔影山月入溪流顯上人送茶題扇荅之祛暑方靜坐茶來清我心銅槃小泉石緑樹一堂深聞歌二首久不聞山歌南風五月多牧童呼伴侣吹笛下西坡久不聞水歌溪上夜如何一聲長復短隱隠度烟波書國臣扇有物能生風如雲起太空颯然凉似水人在玉堂中題國英扇㸔竹不問主聽松還對僧山中春欲暮此興復誰曾得月為星士作與客講虛中明月照我懷懷中亦有月元從天上來題琴泉手弄朱絲絃音從太古傳山中無和者幽澗落寒泉伯川以生日詩來口占代柬謝客不謝詩謝詩應太俗笑舞老萊衣高歌對慈竹中秋日許東廬過我至晩乃固辭去口占一絶君因賞月來賞心不賞月一夜冉涇船千古王猷雪為張雲邱題畫用其韻夢裏詩情逺閒中筆力長雲邱本孤絶更愛竹風凉知微病口占問之秋雨山僧病經旬我不來夜來來老圃報我桂花開贈吳鷹揚湖上初逢地城中再㑹年白頭今老矣青眼故依然寒日齋居次見素公韻供茶須地栗卽野茡薺北方有之和藥謝天麻山鳥投風樹江鷗避雪沙近招醪飲薄逺劄絹封斜深巷臨涇曲絃歌自一家送李白夫白夫還自應天同考訪予草堂詩以贈之東山謂司馬劉公公嘗有書附白夫見貽故云他日蘭溪上相知尚未深東山千里夢南國兩年心長路㸔孤劒髙枝待上林朱絃寥落久三嘆對希音祠山廟火詩以吊之兼慰孔道士古廟前朝建咸淳紀在碑千金未足惜一火竟堪悲回禄増隣戒嘉平罷里祠羽人愁且病風雨夜何其送浦文玊㑹試雪色照行李江帆影碧空壮懷離别外長策對揚中風轉扶搖上星廻斗柄東濟時公等在吾道付㝠鴻送劉介夫四川提學蜀道兵戈後君行為作人冬深方度臘江逺故從岷鐘鼓堂壇曙旌旗道路春錦川明似鏡天與照風神慈夀為林鎮江賦名郡臨江表思歸未得歸遙持揚子水劇舞老萊衣秋壁寒逾峻春陽逺更暉徴黃仍漢典重誥到慈闈元日試筆荅浦文玉輕著風吹桞深将雨裛花詩筒春有草硯滴海無涯厯紀還元日車書正一家晴洲堪共眺新水荻生芽明日疊前韻秀句傳新歲應知筆夢花昏初廻斗柄春已遍天涯有客真徐孺多書豈鄴家朝來㸔草色隱隱在根芽東廬見過客從寒日至下榻對梅花它夜月千里伊人水一涯病懷違酒社老興託詩家再過須為約春茶漸有芽又用韻柬南沙有風門獨掩寒徑久無花客舫維城角吾廬傍水涯閒将尋奕者靜復謝禪家茗碗何堪供山童掘笋芽送陳嚴州嘉言舊守持新節江邉問睦州春星觀雨駕秋水濟川舟風瀬迎騶騎雲山帶驛樓范公公所慕到處得追遊嘉言前守饒州贈余鴻賔晩領儒官檄真成闕里遊諸生今復魯吾道故從周凍雨隨春作凉雲接海浮古松㸔挺㧞應待棟梁求文玊送雙蓮有詩将之次韻為荅二首水國秋風早雙蓮若為携對時占舉首觀物興思齊茹苦辭熊膽行空信馬蹄相㸔清露溢仙掌不湏梯投我清心物筠籠故故携如聞歌和越真解味忘齊甘露分松頂香風逐駿蹄高登飡沆瀣從此是階梯秋蓮走筆荅文玉秋蓮如晩子應有物持携雙玉價難並群珠數已齊色鮮浮露羽香逺逐風蹄太液九天上朝來何處梯謝生荔次友人有客傳閩荔懷君我更携時和成地勝物論待人齊蜜薦連龍眼塵封謝馬蹄因思南極貢航海復山梯聞東所訃東所不可作其如海月何百年清靜坐一日激昻歌夜雨梅山道春風贑水波白沙遺像在老淚欲滂沱南軒為陳廷儀賦南軒何處是負郭小橋東客復來今雨山如對此翁有懷将獻曝無慍亦歌風期日徃稱壽老人星正中贈周育齋風雨秋堂冷公來便作春雅情長共物妙語不驚人池養寒泉靜園收碩果仁飄然還畫舫湖海自知津送李司訓九載成賢日超遷在此行飛龍重覩象鳴鹿屢聞聲雨露春方早江湖晩更晴東山讀書處回首有餘情東山書院在餘干李餘干人也菊花荘一首寄吳憲使東籬千古意今在野橋東乗興者何客忘機有此翁關河雄鎮後風雨醉吟中我亦開吾徑秋來得㡬叢述事用澹成韻世事絃歌外吾廬揖讓中竹深雲冉冉苔滑徑重重我獨觀生理人徒問坐功秋深苦多雨真欲訟雲龍再用韻荅文玉兼賞佳句二首秋月将弦夜林居自老身社無邀酒地里有和詩人照隱㸔懸鑑窮𤣥擬駕輪一明千里共愛子筆如神詔侍寧親日絃歌報主身靜中真樂地病後有閒人月水雙涵鏡風天一轉輪達觀無不可碌碌恐勞神見新月用前韻獨恨中秋月年年照病身星邉槎有客江上笛何人兎影還雙杵蟾光欲半輪萬峯天柱頂愁坐正馳神遣夜用前韻吟遣初長夜愁将久病身地寛吾愛我天逺此懷人北共星從極西生月在輪披衣還起坐無汨是存神漸霽漸霽驅愁思無風稻正花徑來今雨客烟起野人家晩榻将新月秋溪有凈沙東鄰知我興多事報山華荅文玉詩到謠還歩秋庭落細花百年雙老眼一代㡬名家烟徑兼疎雨風溪帶淺沙不知城郭外何處更清華再荅文玉有客題新句吳箋動墨花市橋南北巷鄰屋兩三家江水初辭峽溪金故出沙病夫饒古意極力謝浮華分胙饋東廬病起乾坤大秋分日夜中山花還我徑露草更天風膰爼分清廟詩筒寄野翁南樓明月夕誰與一罇同贈鍼醫羅某百年江海興南粤又東呉陳榻還曾否騫槎信有無神功人擲杖隱計市懸壷歸到仙巖下重㸔五嶽圖次韻荅顧與成寺憶重遊處僧房古澗隂詩壇曽有意禪榻本無心未敢忘周夢焉能和越吟思君時極目湖上兩雲岑次楊支硎題惠山泉韻公來多逸興勝賞獨於斯水德元無滓山靈故有知泠深方汲綆瀑逺自降旗古調誰能和風湍下石池以雲南芥菜送文玉文玉有詩用韻荅之病起親畦菜常懷飯我恩有方能入藥無和未成飱跡比䲭蹲野心忘鷃適樊慈闈亦知味吾不愧曾元再荅文玉殊方傳美種雨露共天恩葅已供時薦羮還勸客飱夢基君亦蔡學圃我應樊莫道冰霜地微陽復起元夜宿華甥夕話齋與許東廬叙舊坐共青燈榻真成夕話哉暄凉纔問昨晴雨未知來臘放詩人筆春分野老盃梅花應識我相對一徘徊送徐提學兩浙多才地三年化雨深何人悲櫪馬有客賦鎔金歌向胥潮聽書從禹穴尋舊遊吾所愧棠樹未成隂題扇贈侯刑部用姚少師泉上韻三日金陵道江船趂曉開泉甘容我住山重為公來石愧元章拜桑憐著作栽冬深初雨雪春色已盈盃泉上次姚少師江左此亭古原泉若為開龍嘘山雨動魚躍水風來菉竹曾聞賦金蓮不見栽晉人如可作此地復流盃寗庵少宗伯見過病後相逢處猶疑十載前君行當要路吾道在寒泉軒坐風初靜城居地偶偏麻姑壇可到誰共賦遊仙送謝景州侯起家鄉貢厯官太學數年而總賦吾郡清德表表可頌御史謂州守正官也於是乎舉侯之初至嘗謂予曰㢘吾分也不敢自言去之日當知之今侯去矣於是乎言財賦南畿郡文章太學官清為輿論重老覺仕途難台斗天何近滄瀛地本寛董祠千載後再拜肅衣冠元夕過南沙南沙有詩用韻奉荅月比昨宵昏堦墀尚有痕主人将就榻童子正敲門市上燈初靜齋中席舊溫阿咸能從我病力獨乗軒以泉寄寗庵将之以詩星漢孤槎畔風濤二月前不來今雨客聊寄此山泉使出鄉闗便家從驛道偏曽聞路人語塵世有登僊薏苡粥次涯翁韻荅張提學舊是南方物新從北塞傳兩封何鄭重萬顆自勻圓入劑堪充使加飡漫擬仙無心成故事涯老賦詩年雨中懷侯世卿半月黃梅雨懷人意獨深吟長唐省漏夢逺宓堂琴活水通涇曲甘棠㪚野隂泉亭千古勝留眼共登臨疊前韻不枉河陽駕東亭草徑深雨餘方策杖風至自鳴琴病榻忘周夢郎曹惜禹隂未須嗟室逺時有簡書臨次浦文玉對池荷二首超然不見埃池上見花開華嶽詩中望廬峯夢裏廻江湖吾道在壇席若人來逸調難為和天工自剪裁朝露洒炎埃紅渠相映開色深從水出香逺遂風廻華國将移去懷人幸折來江南多舊曲知是女郎裁讀陸民望墓銘愛君不能薦深負百年知吳越觀風地秦淮歩月時清脩堪立傳敦厚稱為詩讀罷南沙誄悽然涙欲垂壽徐封官老拜封官命歸來髪未皤巷深塵事少園小野情多久視天終定初生日又過壽君無長語擊節逺游歌夜坐懷東廬子有客經梅里東廬興若何萬尋青壁逺一徑綠隂多白日羲皇夢滄浪孺子歌新凉且明月下榻候相過錢忠言言每過梅里東廬子必門坐而吟哦聲聞于舟文玉詠吾石次韻荅之有物元如此無材柰爾何雲高千仞小山静一巻多新刻磨崖字遺聲擊磬歌不須袍與笏意到卽相過春日懷史敏甫燈夕何須卜隂晴月在天懷君将縮地别我又經年涇上晩獨立梅花春可憐惠然如在卽重詠惠山泉慰秦國英哭子哭子情無極慰君傷我心幽魂青嶂逺老淚碧潭深麟趾空占夢椿庭正惜隂荒亭重延佇天道竟難尋宿知微山房一宿山中寺王郎兩月情榻雲春坐煖牕月夜㸔晴茗供新分水鐘聲逺隔城知微請題畫政及我詩成發文正公吊書後有作子在心常北吾歸道未南書從春後絶慟豈病餘堪詩興江山老憂懷嵗月酣百年函杖地猶許夢中㕘平生一瓣香今日託人将鴻雁南來少風塵北望長時聞有北邊之警回天曾有筆濟海竟無航留得遺文在星辰夜夜光漫識金山酒公因賞識人己巳春寶以總漕至瓜州䆳翁飲予金山寳曰異哉此酒寶不飲十年矣蓋意公所饋内法酒也翁曰此揚州所釀耳是冬入朝具以告公公曰吾未嘗饋希大在坐曰某實饋之公曰知味哉若人可知不錯了江西秀才憂為天下地笑返雪中春是歲逆瑾将置寳戍至閣下議石齋先生曰邵某云云李老先生知之於是乃得致仕云山色言増重泉評意出新公寄題惠山泉詩有曰地官侍郎心似水平生品泉如品士似云江水不同清此山自得青金精北行人漸逺愁見水粼粼時寶親送寧兒至河濵有句傳江左長教和且歌公近為江南人題詩書其尾曰二泉為我和之又有曰二泉見之其能黙焉而已乎未應知己少自是愛人多雲野秋無雨風江晩更波傷心門下士鬢髪漸成皤盧侍御師邵言文正公除夕之夢夢裏題詩處悠悠萬古心鳯衰吳嶽逺竹老楚江深南極星方照西涯月竟沈繡衣能語我歌苦不成音師邵云乙亥除夕夢有人持畫竹求公題詩成止記二句曰如聞鳯鳥今哀矣欲采琅玕柰逺何聞錢伯川訃伯川俄大病哀甚哭無辭未畢慈親養空勤聖主期湖山春正爾風雨夜何其更憶新亭上高文記兩知雨中寫野景雪應初春少龍分昨夜靈瀑長疑落漢槎逺欲浮星沙鳥兼雲白風萍泊岸青漁船投酒市吹笛過前汀雨霽和文玉三首雨霽詩初至朝來鵲有靈老農頻望歲野史亦占星風水縈新碧雲天露少青五湖堪一望高閣瞰鷗汀霽景還天道吾詩亦性靈檻浮少陵水堂倚太邱星城日低仍白村烟逺更青客愁殊未已雲隱隔溪汀連日愁多雨還誰歌雨靈已㸔船入市安用駕衝星葵掩庭中赤蒲添石上青何時歩新月策杖過沙汀送王同知之處州伊昔曾遊地今還送故人舟横吳浦晩駕轉麗陽春山靜南無粤星明北有辰不須論展驥天子重臣鄰送楊學正之安陸老臆吞雲夢于今在眼中楚材元有望湖教故多功山色連平野江流入半空誰為三鱣頌夫子又關東送伍御史汝真之廣東煌煌嶺南節迤邐過江東歲月馳驅裏山川感慨中有天還北斗何草不秋風如見王宜學相思道病翁與王子春夜坐君來下我榻大熱得清風夜色高低樹秋聲逺近蛩詩曾驚鶴老數已動楓翁萬巻吾堂在煩君校異同湛空為僧作京塵如海水明眼本來空折葦流沙北扶桑斷石東百年無夢後萬象不言中𤓰歩還西上廬山問逺公夜坐有懷浦文玉哭子身仍病懷君我亦傷江湖秋欲老風雨夜初長鶴夢蕪汀逺蛩聲草砌凉兼葭空獨賦愁寂不成章寄薛石泉此叟何如者山中有石泉潤生晴谷雨光動夜潭天鑑影空坡老題名重羽仙歲寒吾道在須記定交年九月一日同諸友行山中二首晩秋逢霽景山寺恣幽尋霜樹丹猶淺寒潭碧正深竹罏鴻漸茗松榻頴師琴亭上還高眺悠然萬古心龍阜秋雲外微茫徑可尋鷗情滄渚逺松影白雲深風逼重陽㡌泉流太古琴草亭春色逺猶是浴沂心為潘復軒題畫兩山藏古寺一道瀉清泉老衲偏知路高松不計年橋通采蘋澗林起煑茶烟更愛王中舍長謠廬嶽篇海洲菊花荘小燕黃花方對酒有客復鳴琴此老歸來興今吾病起心落英曾物色疏越自聲音久熟江頭路橋東更可尋涯翁寄寳詩有江頭路熟家家到之句汪司成器之燕二泉精舍器之為予作精舍記先是三日寄至一盃山舘酒十載歲寒心病起懷君切文成望我深江湖方逺厯邱壑且幽尋已辦題名石公來始自今除夕感懷病後逢除夕燈前感壮心梅花萬古色雲樹一庭隂客去仍懸榻歌成復聽琴蘧瑗思寡過千載有知音送秦國瞻赴應天判國瞻佐京府告别于予書此贈之予於國瞻有一日之長故多䂓焉京尹白公輔之子同年友也見國瞻如見予聞予言将無為國瞻䂓益者乎南國今豐鎬東郊舊畢陳保釐資一徳相恊頼諸臣城險瞻維石江深渡有津謁陵真對越適野極咨詢漢史聞書鳯周風想賦麟轉輸民力竭湔滌聖恩新牧苑曾歸地乗輿亦濟人羽儀㸔筮漸棠憇聽歌豳日月光偏近山川氣孔神吾賢應妙簡尹伯况同寅此日栖鸞地他年燕鹿賔省臺虛席在珍重報君身容春堂後集巻十
