body:
  text: 容春堂前集卷四明邵寶撰五言律詩八十一首聞憲宗皇帝遺詔帝德難思擬天髙后土深驚聞八月詔哀裂萬邦心慈壼虛文膳明堂輟舜琴扣頭瞻北極清淚滿衣襟昭明太子讀書臺江左風流在前梁復後唐壁分新竹色臺散舊藝香跡與仙風逺名隨佛日長澄湖回首地雲水一茫茫贈李參政士清兩世交承舊三年晤語新艱危臨塞日勤苦報君身藩省銜初大邱園業尚貧公心元似水何處見緇塵春野卷白洲千載筆春野百年心雲白山無際草青江有潯杖藜乘晚霽鼓瑟散寒隂人去遺書在悠然懷古今望龜峰望裏龜峰寺幽尋路可窮風塵四壁外天日一方中水曲真疑斷雲盈不礙空往來題未了獨立嘆神功醴陵靖興寺古寺淥江畔僧閒喜客來殿堂分寶界鐘磬落瑤臺興逺雲俱定情多雨未回舊庭元有樹若為老夫栽湘東道中括杜句二首江漢風流在坐來春水船蚤聞黃閣畫晴檢白雲篇節上風塵際司存雨露邊朝班幾回㸃奔走已三年浦雷喧昨夜瀼滑限西東徑篠含風淨林花著雨紅短牆殘草裏髙葉亂帆中長路關心在瀟湘虛映空送鄭刑部汝華鄭君瑚璉器瘦馬亦隨行秋晚天涯别山多溪水長眼應空兾野淚欲灑瀧岡直北須回首郎星帝座傍送僧圓顯住慧山寺寺據諸山㑹公因一檄來夢驚松閣雨歸掃石床苔得主憐西社遺書弔北臺野雲心跡在古洞傍泉開舟中和唐詩五首遊少林寺西出登封縣來尋古少林幢開青嶂近鐘隱白雲深雨積溪初霽峰遮日早隂長廊詩刻滿拂拭倩僧吟晚至華隂西瞻自夙心歇馬向山隂玉井連雲逺金莖入露深半峰留夕照萬籟起秋林往事今何在溫泉未陸沈嶽陽晚景木下秋風起青山送雨歸日低真見落雲逺不知飛江色煙中淡鴻鳴渚外稀倚闌情未極寒氣濕人衣經廢寶慶寺山中留古寺門對夕陽開苓露松春長鴉風鶴夜回佛龕塵伏鼠僧榻雨封苔解得真空意荒涼未足哀晚發五溪晚鼓溪船發秋風動楚天月生洲杜外煙起渚鷗邊野艇橫村渡農簑散水田夜涼何處宿逺思正相牽三竺道中人行松徑靜數里不知遙路轉還逢寺僧迎只過橋巖姿收獨妙泉響息羣囂東去頻回首山花似我邀示吳憲憲也來還去離懷奈爾何雨添雙澗滿雲隔九峰多趨鯉承韋訓遷鶯和木歌源泉才一勺江海有餘波哭李徵伯三首有序吾友李君徵伯不幸巳矣其訃至江西凡四十餘日而後信驚疑悲感百思生于心非言所能盡也一慟之餘略叙成詩因便附達几筵徵伯有知其必有以鑒我矣安得驚心語疑真幸未真誰能知我意天乃奪斯人京國同遊地江湖獨坐身更堪風雨夜愁絶欲沾巾又信也還非信東來近有書病憐秋省誤吟想夜齊虛標格風塵外珠璣咳唾餘不須論舊事淚滿故人裾又多情如子少忍棄白頭親晚節吾方愛中峰孰與鄰月仍留客夜風亦散朝晨欲慰無由往空然北望頻留别婁郎中元善草載論交地溪山古信州晚園收碩果周道傍寒流天與裁春服人將渡野舟夕佳軒外月還照越江秋蘇門山萬古蘇門勝乘閒一覽之秋逢收潦後泉看出山時濕氣生清潤晴光動碧漪坐來心與湛昏黑忘歸遲挽秦封君寥落湖山晚伊人謝草堂子遲封尚蚤身隱道逾光杖老曽于國祠賢合在鄉未能從弔客東望意何長再至東海祠東海祠何處茲山舊所遊帶緣禪語捨衣為旅情留鳥弄峰雲定花開澗水流慿人訂遺像還似此翁不宿池江水落沙新白蟬鳴葉半黃鬱蒸仍午熖淡蕩自秋光夢就書應擲吟餘牘未妨晚風生别渚起坐聽滄浪九江贈馮户部用見素韻五載三曹彥登樓感舊遊帆隂連水岸簾爽帶雲邱院靜風生鶴城春雨應鳩明朝有尊酒還擬為君留送人解擯不足作江上悲蚤秋文非今日贄道有古人謀井惻泉初泄洋望潦已收千年陳榻後為我弔南州挽姚提學秀夫經濟平生志江湖逺奈何惠留吳地志哀起楚人歌卜築溪邊小交遊海內多弔君追賦鵩愁絶洞庭波上航夜泊雪後過江驛平沙水半篙我方甘老懶誰復嘆賢勞峰影雲中淡灘聲月下髙回思十年裏幾度駐旌旄將至塢子舟中作咫尺鄱湖水相將入楚鄉雨中帆力緩風外笛聲長時别船有吹笛者夢渴山泉茗吟銷海島香鍾元普送牙香故云舊遊堪一憩何處有甘棠贈陳平江南浦逢君處相看各問津乘槎元有漢懷璧故無秦帶礪千年地風波萬里身東風淮水上古廟不勝春過嚴灘獨上客星亭羣峰雨外青公心如介石吾道亦滄溟出處輕商楫來歸重漢庭漁歌朝又暮雲掩北山銘女埠夜泊問章楓山女埠薌溪上幽居路不遙山風聽夕瀨江雨問春潮清秩辭新命華緘憶舊招何時拜床下鄙吝為公消秋野用杜韻二首河漢三秋隔星辰萬里違客憐雙鳥去僧訝一人歸相馬吾何有知魚爾亦非春風故相愛吹緑此山薇又亦知樵徑窄且放釣竿長夕籟成竽調寒潭發鏡光小橋當驛道精舍近禪房十月春如許疏梅幾蕊香答孫山人湖海有此客飄然何所投一瓢將水去雙屐為山留落落彌明鼎茫茫太乙舟幾時盛水石古寺共尋幽追挽蔣參議惟深憶駐西藩節觀風幾論心雲收廬嶽逺水入蠡湖深正氣埋邱劒餘音掛壁琴箕裘佳子在相對一沾襟讀章恭毅年譜國論非難定惟應敢諫難一封心自白九死淚如丹遺像慿誰問新編許我看敢言容易拜東向欲為壇聞白沙先生訃二首不仕緣慈母山林七十年識髙翻似劇語妙欲無禪未肯桴浮海真將劒倚天滄波今夜月空向白沙圓又近讀慈元記知公用意深若非碑矗矗空有樹森森南海諸陵淚東山十載心春秋遺策在請聽石翁吟和盛漢臣二首數年王事裏奔走愧纓冠行止惟天在絃歌敢自安雲松看卧鹿風竹聽鳴鸞奉母餘春酒須君罄一歡又鶴老何年逝遺音在士林詩中空見面史外獨傳心風月襟懷逺湖山夢寐深願君歌舊曲吾譜入吾琴泉上答平江用姚少師韻未了登山興樓船冒雨開不須留帶去便擬賜環來寶劒時時拭甘棠處處栽醉吟吾老矣遲子有茶杯慧山十賢堂成有作萬古名泉地諸賢合有堂雲龕藏舊影水鑑發新光國史千鈞筆鄉評一瓣香煩僧語遊客到此肅冠裳麻姑山次萬長史韻二首亭依青嶂曲路出緑蘿間泉聽雲中珮峰看霧裏鬟風煙初曠逺花鳥各幽閒落盡西林日遊人始擬還又景與情俱勝人歸酒未闌輿分秋籟爽橋倚晚淙寒石鼎詩中紀蘭亭畫裏看好山遊欲遍東望眼初寬次許給事啓衷九日感懷因以為贈二首南極開天詔春來萬物蘇節隨星動速槎向海浮迂鯤運溟風翼龍收渥水駒故園聊暫駐松菊未曽蕪賈涕頻封疏因詩復一號風塵人落落江漢日滔滔徑晚菊生色庭秋鶴毨毛玉峰青瑣外何處賦登髙南安謁濓溪先生祠一脈濓溪水中涵太極天契符三聖後冠冕四儒前庭謁初除草峰尋幾問蓮略諳光霽在有筆未能傳夜坐聽雨山中寺蕭條對佛燈春懷偏惱客野興未嫌僧雷似千峰動泉應一夜增壯心方激烈靜坐欲飛騰王敬止使朝鮮卷玉樹挺髙標緋袍勑度遼風傳箕子國星動漢官軺沈斥春回蚤封疆曉望遙清名滿東裔匹馬自還朝徐文靖公挽詞公為蒼生慟私還哭所知名成歸老日功在薦賢時風采山中杖文章海內碑向來參謁地風動古槐枝登白雲閣待友不至路左離亭北幽尋興亦多偶登仙閣坐又聽道童歌雲逺雙峰出林深一鳥過長吟無和者奈此素秋何秋溪卷潢潦初收盡寒泉走白沙雲來疑鴈影雪舞愛蘆花有客同書舫何人獨釣槎滄浪才兩語歌起水無涯慧山寺次姚少師韻十年酬逺興秋晚寺門開山色空中落泉聲起處來草香尋異品樹老問初栽欲為茶神酹還將酒一杯聞西園叔訃素守邱樊節無書謁貴人占從閒處熟吟到醉時真北渚鴻何晚西園草又春正懷家國念聞訃益沾巾題觀松卷散步古松隂清風吹滿襟雨滋蘿薜密雲隱茯苓深靜對寧須臆真知只在心寒巖梅竹畔更許一相尋贈毛淵之寒風吹客衣之子正東歸雲影連蓬島江光動少微天邊棲鳳沼海上釣魚磯折得梅花在還將寄北扉過龜山瀆廟龜山頂長淮日夜東放船方海月掛席更天風鬼物荒唐裏神功鎮靜中濟川吾豈敢斯道正無窮答楊儀部驅馳山水國野興入秋多佳處每十宿浩然時一歌渡江乘月坐題石帶雲磨為問南峰主相逢謂我何德興思家正是思家地山中更雨中林明初得月泉響半因風卧榻辰瞻北巡車道指東慈闈無一字何處問來鴻訪舒方伯本直細雨深山路髙風勇退人骨同仙入相心與道為鄰白髮霜餘少丹崖眼底真歸舟逐煙水回首已迷津金溪懷徐嘉興用濟晚負蒼生望尋山只欲深孤忠天北極遺愛海東潯霜骨全欺杖風髯半拂琴丹崖人似玉吾道愧知音次楊淡成新春感懷韻喜雪還愁雪人將謂我何不堪雷太蚤况復雨兼多黃鳥聲全澀紅梅色半酡慿誰吹古律一笑轉陽和將赴許州奉别西涯先生我有文章願公今海內師南畿叨薦日東閣聽談時地重憐才甚名髙入相遲茫茫離與合何以盡心期送鄒光大分手金臺下東南望故鄉春隨三月盡水入五湖長愛石焚香拜評泉挾茗嘗風光看不了一一付奚囊次韻寄陸兵侍仗劒風塵地皇言屬汝為一書知勝算三月定還期露檄晨馳遽圍碁夜卧遲凱歌催布榖草緑雨絲絲聞工侍徐公訃千里聞公訃悲深弔却難客衣新淚濕賔館舊盟寒南國興居重東門進退寬誄詞書不盡江水易為乾過天津見新築臺臺起孤城外風塵地有餘奔鯨驚築觀飛鳥避儲胥鷗白連漁浦楊青引漕渠它年志兵衛史筆定聯書過滄州指㸃滄州路秋來屢受攻一言符間法賊圍城時城上漫有爾衆即我衆語賊疑之遂殺新附者數矢奏竒功敗屋寒灰後荒城野浸中魚鹽近何價欲問海濵翁德州北路臨流郡南來奉使身將憐初領地謂守備桂勇器問舊藏人時地中掘得火器若干事獨立金湯險先登矢石親盜平看出獵春草四郊新夜遇髙縣尹時新除無錫赴任獨行寒夜清驚烏時一鳴相逢即相别翻使客愁生微論開新瘴幽懷抱宿酲臨分還致語側耳聽賢聲清源别吳馬二生二生先送豫北來至是南還衛水西風急將歸客去時愁難禁下拜苦不㑹成詩三月師應老諸州盜未夷慈闈問消息言喜莫言悲二生臨行得家信正恨慈闈逺如何動笑顔一書三月至千里兩人還嵗月它鄉誤風塵此道艱何時拜家慶春酒對雲山臨清都府感舊成化乙巳豫初領許州道經臨清時吾鄉盛都憲為巡撫實館于茲豫嘗燕焉今二十有七年矣憲府荒城裏重門倚茂林壯懷天地闊舊夢嵗年深月幌思秋霽風簷坐夕隂靜中軍國計一日幾經心晚至臨清汶水窮諸閘西來更衛川堤黃猶有栁浸白已無蓮驛騎衝殘日城鴉起宿煙時時聞盜警烽火似三邊武城夜泊日暮路堪愁長河正北流風聲城上柝星影驛邊舟賢宰懷前輩子游嘗為武城宰儒官感舊遊教諭謝麟江西提學時故吏也是夜來逺迓黎明促南發漕卒正焦頭躍馬泉躍馬泉何在西巖洞北頭無疆坤亦健有本坎還流塊厯風爭驟空行雪避遒百年誰執御江漢日悠悠諸公以將石聨句為贈次韻以答泉已離山久誰教冽且寒無形成砥柱有價比琅玕重在移時試清從激處看不妨江海上風雨落花殘泉亭卷此泉天下勝公乃愛泉人吾道今猶古空亭秋復春眼明曽作鑑心渴幾生塵最喜前川水泠然却近真答王進士演之演之豫臨行執手有謝安東山之望感而成此才短慙鄉國君胡問謝安自緣憂世切誰謂識人難行卷詩俱漫離杯酒獨乾相思江漢外回首朔雲寒容春堂前集卷四
