body:
  text: 容春堂前集卷十二明邵寶撰記一十七首總督漕運憲臣題名記寶承乏憲臣奉勑總督漕運始至淮鎮凡百舉置惟故是稽於是案牘山積追考前政氏名後先罔屬然其間多名人寶幼學時已志其略比官户部所聞漸悉乃今得通閲之諸君子者於是無不載焉於乎盛哉仰惟我祖宗列聖簡任諸臣治兹漕事惟材是屬用底嘉績及其登卿宰進保傅樹勳輔德表表相望寶愚何足以繼之竊嘗考禹貢以水紀諸州貢道蓋後世漕運之端然曰逾沔入渭則取諸陸曰沿海入淮則取諸海其直達帝都者才三之二若漢以下都關都洛都汴間有直達之漕而為力甚難為費甚巨故議者往往右轉輸焉其勢然也元都幽燕海陸並運國初猶因之惟我文皇帝肇建兩都始以平江伯陳公瑄工部尚書宋公禮等建白濬茲漕渠海陸是避萬舟億卒咸建帥長倉支道兑常變具宜蓋有得於轉輸之意講求經畫越厯數朝而漕法大成國計充預萬世允賴然其為壩為閘閉啓掣挽於水性不能無拂焉者是故險雖逺避而勞不多省羣衆所聚蠧病亦從而生既命元戎專制其事而提督整理以命諸卿亞厥後遂有總督憲臣之命然時異勢殊弊由法起名為轉輸而漸變直達既乃公私交征軍疲民困至使論時務者復有于海于陸之思則豈先朝之初意然哉夫救弊在人不在法持法在心不在迹故必通上下而後為平必體遐邇而後為惠必均夷險達經權而後為貞為哲蓋大臣之道如此漕也者特其一事也具是則舉缺是則廢凡兹前政諸公圖艱應遽保豐持平若有異道焉由今而論其世則固莫之能違矣承繼之責取監之義寶雖不敏於是竊有意焉故具列而刻諸石如其品藻以伺君子志漕運者尚亦有考哉自河州王公竑以景泰庚午來蒞迄今六十年為右都御史三人左右副都御史若干人僉都御史若干人兼巡撫者若干人其三人凡再至統曰憲臣者重勑詞也謹記南京福建道監察御史題名記正德已巳秋貴溪徐君盈以行人擢南京福建道監察御史既上之三月其僚任君賢王君鼐皆有使事出徐君署焉政暇閲故牘得前政氏名之悉乃謀諸二君立石於堂序書而刻之書來請記歲月惟我朝制天下十三道道設監察御史數員入則廷規出則方按凡天下事皆得言之是謂風憲與百司體異其在留都務若少簡而建官如故封章馳達人評物議亦往往為公論所屬凡諸君子銜繫官署而名在天下亦何必指議於碑刻間而後知之也哉然論人者必原其初必究其𠂻必徴於終三者非久莫深非深莫悉夫然故在一時亦有遺論焉而或輒為别白曰此忠此佞此正此邪烏乎可哉必也時移地改生乎後者厯指而參稽然後其論可得而定此名之有題所以汲汲於前輩也君子猶以為未盡者謂有鄉評焉有墓碑焉有風謡焉有史傳焉而不止乎是雖然非兹石則氏名不聚氏名不聚則辨論烏乎施况彼數者皆有詞於筆洵武或失之叔假窮奢或失之子儀而隨且隱者又常情所不免也今是石也氏名之下字書貫書出身書厯官書而不書政行若將闕疑以起問設問以待對者而天下之公出焉前監後觀而中以自考於方人得律已之道古之所謂官針者亦何以加於此哉諸君之名於是乎可徴矣觀草記正德壬申春二月豫奉詔攝總督事蒞太倉公館館之堂後甓砌間有隙土二方皆蓬然枯荄子指而問焉館人曰草也今司徒孫公為總督時實種之豫曰是何為者館人曰公嘗言春夏之交草長數寸碧色可掬晨露既晞微風泛之移牀近焉心目之間不知天下之有名園竒卉也豫笑曰有是哉司徒公之好竒也昔濓溪翁嘗以草寄意至今傳之公將襲其跡乎不然書曰爾惟風下民惟草公民曹之長也將以是觀民焉雖然草一也亦有以喻夫臣者臣民之分不同而君子之論於是乎異然則公將自觀乎公豈徒玩物者哉越三月草果長如所言館人請觀子既賦觀草之詩呈司徒公復次第前語為記觀水軒記觀水軒者二泉邵子所乘舟也邵子既得請歸每出則與客泛之客謂邵子曰子所謂觀觀淺深以涉乎觀順逆以濟乎觀清濁以濯乎三者何居邵子曰此皆觀以人者非大觀也夫大觀以天觀以天者必於水之逝也之瀾也之渙也而後可以見道也故逝可以觀體瀾可以觀本渙可以觀文天下之大觀不在是歟客曰涉也濟也濯也謂之人可也若夫淺深順逆清濁非天其孰為之而謂之人乎邵子曰天人同道而異用者也故涉之於淺深濟之於順逆濯之於清濁有心則人無心則天夫唯天也則體之在逝也本之在瀾也文之在渙也斯不為徒觀也而天下之大觀畢矣客曰夫觀則既聞命矣然軒者車之製也昔人蓋有以命夫室者舟而室名其室安在邵子曰盈天地間皆道也人唯無見茍有見矣則凡目之所接安往非逝也瀾也渙也乎身之所處安往非涉也濟也濯也乎由是觀之吾在吾舟猶在吾室也不然何足以為大觀哉客唯唯而退邵子遂筆之舟中以待再問者户部題名記代作惟我聖祖稽周官司徒建户部設尚書一人左右侍郎各一人以率其屬乃永樂七年已丑文皇帝北狩於是有行部户曹之設十五年丁酉復設行在户部至正統辛酉睿皇帝始定都邑去行在之名蓋户部之有今署也更纍朝若干年尚書暨侍郎凡若干人後以京儲事重特設侍郎以理之又若干人矣雖典籍具存然卒欲指數其名氏且不可得況其出處履厯之詳乎某承乏尚書後懼自今將益散滅無所紀用是謀諸侍郎吳公原似公鐘及黃公傑翻閲故牘備録以刻諸石年序而階列名揭而蹟疏之且各虛其下方以俟來日某竊惟公署之有題名固將考往昔垂無窮以備文獻之傳抑所以起問者定品評而勸戒之意實寓乎其中蓋物聚則妍醜形焉事比則得失著焉人並則賢不肖判焉由數十載之後覽數十載之前愛憎既公誠僞亦著是是非非固有不能以毫髮爽者至於時有豐約勢有難易而舒縮之間或有異論然知德者觀之亦自不可得而誣也夫君子之為善固不為名而沒世不稱聖人猶以為可疾名之所繫亦大矣況與賢同道則名罔不昌而身享天下之榮與不肖同迹則名罔不隳而身受天下之辱此豈待後世而後定哉是故夙夜兢惕鑒觀前人則所以殫吾職而熙眀天子之績者於是乎在矣凡我同事越後之君子宜有所警焉某不佞僭為之記品士亭記豫昔為許嘗作品士亭於學宮蓋取其郡先儒靳裁之氏之說將與諸生共戒勉焉每當貢舉必觴于亭以相其志時豫雖有學責然未專也比者奉命督學江西視前舉如為之兆者及蒞南昌分司顧其東隅有一亭而未名豫謂是可以名品士矣遂名之惟許亭之始作也太史義興吳先生實為之記而豫復書其碑隂謂士之品二道德其上功名次之而富貴云者宜斥不與大抵豫之為說取諸靳氏而稍自異君子不以為過且妄也今之於士也又何道以品之哉蓋亦要其上焉而已矣而次焉者亦與焉雖其初終表裏未必一致若難乎為品者然心誠求之不以毀譽不以利鈍不以隱顯操聖賢之律而槩之於其言行其殆所謂不中不逺者乎夫天下之須乎士者大矣士無他成物之德經世之猷憂時之慮三者備焉然後隨其所處藴為道德發為功名異其用而同其體此皆所謂上也惟體不同而用有同者所謂次焉此之謂矣古稱才難正在於是而吾乃欲百一求之以答明詔此夙懷所存非今日為然也豈徒品之云哉成者品之其未成者激昂之策勵之陶養之必欲登其上品焉顧雖次者且不可自畫而況其下乎豫與諸生固當自省也於乎元氣不息才無古今盛世名邦於斯為最豫雖疏陋愧於師道而所以副吾之望者必有其人矣作品士亭記獨對亭記𢎞治辛酉夏六月寶奉詔視學至南康白鹿書院是院也勝在五老聞於四方乃負而弗鄉雖無大關繫然亦若缺典者故周覽之餘欲為亭以對之屬時暑雨未暇相度蓋越一年而後再至步自南岡厯於東崖得地丈餘其平如砥其崇如壇仰而西望五老當前若拱若揖若陟若降若在咫尺可延致與語者竊意亭宜於此諸生從者曰此文公先生舊遊也俯觀崖石有風泉雲壑四字寶乃欣然喜曰此先得吾意乎不於此亭烏乎為宜雖然五老之勝有目者共覩而非公莫之能當故以獨對名亭重公迹也或謂峰以老稱不獨以秀以竒而以其夀是五老者天始與始地終與終夀孰對之謂公獨焉何居寶聞諸孔子仁者樂山山以氣凝而理行其中泉石土木無所非仁惟仁故靜惟靜故夀凡山皆然況其高且大者乎公仁者也純博中正德與山協為鎮為嶽五老之對固其所哉君子觀其進退語默從容暇豫既得公之靜矣則其化逺功深表儀流澤與孔孟無窮其為夀對諸五老必有能信之者况公前後代有寓賢何莫不具一節至要其大孰與公比非公獨對其誰偕之是以危登極眺覽天下之至竒雄詞動筆發天下之至秀彼以其五公以其一出象入神形於賦咏斯固公之餘事而所以作對者亦有在矣抑豈惟是哉公仁且智登斯臺也必嘗反而東顧深湖長江至于滄海皆公之大觀也寶生也晚幸讀公書見公所對如從公焉敢用窺測記於亭中九原可作不知公以為何如耶新喻縣孔子廟門記新喻縣孔子廟門壞𢎞治癸亥鄭知縣瓛新之其材取諸淫祠其工取諸逸卒其雜物取諸羡役有顯大之觀久逺之規考成之日用祭菜禮告於聖靈退燕于學學之師生咸謂是役不可無記謂寶典在教也則來請文惟孔子王祀萬世廟用王制為門者二其在外曰靈星靈星內有門謂之大成壞而新之有司者常事耳在春秋魯復閟宮不書修泮宮亦不書為常事也而閟泮二頌猶存於詩詩春秋皆孔子筆也今廟於孔子莫非是式由詩所載是門之新邑人自宜頌焉豈吾書之宜哉雖然廟為學立學也者風教之源也有司者之政實於是觀其興有慶其廢有讓憲典具在而寶則奉詔専􅀢其事今於是役既率作省成以從良規又為圖諸不朽則凡有學之寄者於其敝缺也能不起而圖之乎以吾之書學春秋之不書蓋志也非頌也抑有風勸之道焉嗟夫吾夫子道在萬世其神在天而主與像則在廟主與像之所在神之所在也神之所在道之所在也是以貴自王公賤至氓庶逺望其宮乘下步趨無敢少忽乃若進而門焉又當何如邪志美富之觀者於斯加悅修孚顒之容者於斯加敬寶嘗身親之矣於是執筆焉蓋不惟勵乎有司而又以見是門之為重也出入是者請敬誦之門壞於𢎞治某甲子而甚於某甲子今之新也始以春季某甲子終以秋仲某甲子凡三閲月而成瓛應天江寧人由進士來為縣清敏而文知政所先而力能為之縣丞某主簿某典史某皆與有力教諭某訓導某諸生某等則請記者也一峯書院記一峯書院者為故南京翰林修撰羅公作也公以文章節行高天下天下之人莫不賢其為人其生也思詣其廬其歿也思造其祠者蓋十人而九也然永豐既居山中公之故第在水心去縣又若干里其墓在某地又去其第若干里若其舊遊所謂金牛書院者則又去其墓若干里而人跡益逺矣故凡至永豐者每以瞻拜無所為恨豫督學江西之三年始一至焉欲為文以弔其墓而雨雪載途不能往乃遣教諭某代以致之繼而步自學宮西偏得隙地若干丈遂屬吉安守張宗厚作堂三間中設公像題其門曰一峯書院俾人之苦於瞻拜者於此得少展焉雖然公之舊遊而詩書絃誦之地固公所以仰前修而迪後學者也時知縣鄭濬主簿某方勤修學之役吉安遂以委之不三月而告成某與訓導某請為之記惟公天資剛毅守道不回而充之以博養之以正蚤貢於鄉已負重望及憲廟之初親擢進士第一其所對策雖制舉之常然援古證今指切本要詞嚴義正誦者起敬故程文未行而海內已録傳之人之視公有漢董賢良之風焉既而入翰林為修撰未及數月即有扶持綱常之疏上忠於君以及輔相新進儒臣能為天下大計逺慮如此固非尋常摘劾之比論者方之唐子方其事似同而義則逺矣至其改官南都時忌者已去以公之望少假歲月公卿可待而竟以疾歸蓋公之仕在行其道而不以位為榮王曽之志錢若水之節公實有之觀於其退而其進可知也烏乎道之在人有正大之體有曲成之用自聖人以下多患不能兼之蓋其體不能協天下之一故其用不能周天下之殊即使幸有所成而正大者或病矣豈曲成之謂哉故觀士於今寧正大而有過毋寧曲成而無尤是則公之進言人曰太訐君子曰忠公之去位人曰太激君子曰介固非誣且過也雖然公之心如青天白日公之德如高山大川此天下之同稱也而才藝弗與焉則世亦不可謂不知公矣寶自童年游于庠序即知慕公及宦遊中外知公為詳誠有所謂願為執鞭而不可得者則於斯舉亦烏能後哉吾聞公晚癖金牛山水而忘其瘴厲竟以是終人之為天下惜公者或以是為公病公而有知其亦以為然歟故豫既為之記復為招魂詞二章俾并刻焉弔公於斯者或一歌之庶乎公之來歸也詞曰公歸來兮金牛不可以居幽阻叢翳兮以魅以魑毒霧中人兮朝弗夕虞什或一存兮虎豹之餘公氣則正兮神明祓除彼伻從公兮將無避而句歸來歸來兮公有鄉閭公歸來兮泮水傍泮水源源兮溪流孔長拜者在庭兮衣冠在堂或羞而爼兮或醴而觴人歆公兮未央公不歸來兮誦吾章瑞州府名宦鄉賢祠記瑞州之境比多盜事聞於廷至命大臣來視當其時方作名宦鄉賢之祠議者或以為迂然是舉也前知府劉璣用齊倡之今知府周津文濟繼而成之同知王相君卿則始終經理之觀其意顧若急務然者祠既成甘通判文紹施通判溥劉推官瑜乃屬髙安知縣謝樞樹碑祠中請豫為記且述或者之意以質於豫豫惟仕于斯謂宦莫非仕也而名者為難其難在政生於斯謂鄉莫非生也而賢者為難其難在德德以成化政以成治治振化流則天下可平而何有於一方也哉是故君子重之然治之善者自足以訓德化之醇者亦足以匡政論名且賢於宦與鄉者斯其尚矣下是有一節焉亦皆不能泯也風聲流傳典型可想尸而祝之將使肅瞻敬對者在宦則名在鄉則賢以成治化庶後之視今猶今之視昔也祠之為道如此故雖國典靡載而有之則備無之則闕蓋天下之通行也久矣可以盜故而廢之歟況宦有龔遂則有渤海之治鄉有陳實則有頴川之化孔子曰斯民也三代之所以直道而行也有若人焉而盜弗息者吾弗信之矣今之論弭盜者其說非一轉移感動吾以為固有在此而不在彼者然或內乏積誠外鮮孚信而徒逐其迹無怪乎人以為迂也若執是而遂謂夫祠之可緩抑豈通論哉夫名賢之祠非為弭盜立也而推本論之必至於是是則數君之舉誠知所務者矣祠之制同宮異列左為名宦凡若干人右為鄉賢凡若干人其間功德之偉亦有繫於天下者稱秩元祀國典存焉而復祠之為一方故句亦不為瀆也乃若其地在孔子廟傍朔望謁春秋享凡郡邑皆習行之而門序庭階翼如森如與禮稱者吾以瑞為盛焉經始於𢎞治辛酉越甲子而畢時大參濟南王公僉憲慈溪王公並繼守巡政刑兼舉威惠迭施盜以靖告祠之克成抑亦有自也已文明閣記𢎞治乙丑四月既望寶行視武寧之學祗謁先聖禮畢退攝講坐以臨諸生既而觀於堂北有新閣焉闕瑞昌縣學遷建記𢎞治癸亥瑞昌縣新作學宮又明年乙丑乃成考而居焉禮也學故在縣治西百步門臨於市之衢囂隘而塵邑之君子因其敝也議欲遷諸爽塏者久矣而未得其地癸亥之歲前巡視都御史林公行縣至是詢諸吏士得遷學之說謁廟禮畢則及分巡僉憲慈溪沈君逹觀厥基顧而謂曰是豈在他求哉後是百步而少右岡南沼北廟焉其可也廟之東為堂為齊又東為庖為廩為廨館皆宜之沈君曰然相與計資庸而授厥事於九江府推汪濬時寶方視學新喻公以書來致命寶拜公命之勤而申戒厥功焉高守友璣始至聞是舉也亟督知縣王顯宗畢事而僉憲天台王君繼蒞巡政益為規畫用𢎞於初初公躬勸富室各助有差既或渝約功未用就今分巡僉憲姚江陳君以舊基豫民取直焉足之而寶適以歲事至乃進民耆某某某某四人議加直於受地之家而益其疆未卒勸者俾以力輸凡得資若干日役里一人稱其常役又贖有罪出錢以賃凡得庸若干於是邑有陳氏族大而禮其為諸生者居什之二請為衆先曰垣也某築池也某鑿道也某修各若干丈於資力又凡省若干寶聞而喜曰林公與諸君之緒兹其可成矣乃謂顯宗日程之濬月核之而總厥功於守友璣是歲秋某月以成告學諭王某暨訓導韓某等請記惟古人之有居既奠則不䡖於遷遷非得已也故詩書所稱商於耿殷周於豳洛皆此焉事今之邑古之國也學之有宮所以守典嗣訓成賢𢎞化其於邑也大矣而瑞昌之學乃市之與鄰焉夫市也者利之所出也衆趨而聚不能不囂衆聚而居不能不隘衆居而溷不能不塵由是以為我絃歌講肄之擾非古人擇且卜焉之意也遷其得已哉然遷之難居之尢難闕請初彭澤學在邑治東病之者謂背陽嚮昧位置弗當擇所宜徙乃得今之地說者曰前山為鞍為帽為髻後為鳳凰為緑梯為蒼崖為潜玉羣勝具萃左襟孤峯右帶重嶺而大江之流舉目望之盡數百里爽秀完敞學於是為稱時都御史林公以巡視至聞而然之分守參議董君分巡僉事沈君王君陳君繼廣其意而高守任焉以有茲成功也豫嘗怪今師生之為學不務力本而以風水妨科名動輒請徙故多抑弗許然學之於治大矣而去陋就嘉亦有司常職此所謂同行異情者吾固弗敢廢焉於其成也能無慶乎雖然學所以學道也昔者孔子之語道多矣而直指親切莫如川上之嘆蓋合理氣顯微一言蔽之而所以為用功地者即是而在萬世之學道者此其的矣天下之大川四而江為首觀水於江非他川比也今彭澤之學既據江為勝而吾夫子實像在廟凡為師生而從事於斯者盍相與追川上之遊求源於深擬進於漸期委於大修為天德發為王道而慎獨以終始之則所謂道者蓋不假諸儒衆說而可自得於觀望之間矣今夫江自大禹疏鑿以來其起合流匯之道蓋未嘗一日改也或者不求其故顧於偏溪曲港力求通焉而曰入海由是雖東之之勢終有必至而支離已甚況徒勞而無歸者又往往是乎君子之於道也何以異此夫志水者必自禹貢而後可得其真六經語孟吾道之禹貢也不是之務而安於偏曲雖亟稱於水亦於學乎奚有哉宮室之成古有頌禱頌禱於學舍道無可語者故於考成之餘擬取川流之㫖為我師生告焉因髙守請紀遂書俾刻之是役也總於推官汪濬勤於知縣王琦而訓術計琦耆民某某則分理焉始𢎞治癸亥三月九日越二年乙丑四月一日而訖其費為白金八百兩出公帑者什四諸生暨富室助焉者什六其工為顧匠若干人為庸徒若干人共若干日計其成為殿廡門堂齊館庖廩廨榭諸屋以楹計者八十墻以堵計者若干街以步計者若干君子謂於舊學為偉蓋一邑之盛事其在郡則二學後先告成不出數月尤足為諸邦起廢之倡是皆不可略也浮梁縣學記凡學之設其道有四一曰習典章二曰明經訓三曰惇風俗四曰育人才斯四者實古之道而今制亦弗能外焉故典章存乎誥令經訓存乎詩書風俗存乎儀式人才存乎貢舉其槩如此世之人徒見科目足以階貴遂謂夫學專為育人才而於所謂典章之習經訓之明風俗之惇判然若無所與故其宮也非謂風水有妨於科目則不修舉不特有司為然而觀風君子亦莫之異嗚乎其亦不思爾矣今科目為入仕之途自皇朝公卿以至內外百吏胥由是出蓋天下之極選而人人慕望焉者承平以來學徒日益廩增常員之外附學為名者多至倍蓰其山林儒士挾藝以應試者亦如之由是而觀雖微學也未嘗無人才也然則學將可廢邪惟學有典章經訓風俗之繫而不止於人才人才之生必是之育而後身心性情有所持循檢飭以為天下國家之用是以國有學而能國郡有學而能郡邑有學而能邑否則於制為缺缺於制是缺於道也今罔攸式古罔攸稽化塞於下而賦竭於上天𠂻人紀孰與立之故學圮則起荒則理壞則葺奠謁飲射講歌遊肄無廢乃已此固有司常職怠是者罰將及之於科目利弗利何有哉浮梁縣學之建久矣𢎞治已未火庚申新之癸亥落成寶謂其得修舉之常當記成蹟乃屬知縣左輔暨教諭張洪等請文於今御史大夫前大司寇戴公繼而有傳公語命寶者寶弗敢當而重違公命也敢著是論而以歲月附焉若夫敷宣聖明文教之懿以申飭我師生公為鄉邦先達且嘗宗師斯文其何辭辭之凡新作大成殿東西廡㦸門明倫堂二齊某等屋若干間其仍而飾者不與是數用木若干石若干磚若干瓦若干鐵若干他物數各稱是始議者知府李復貞而侯知府溪茹同知鑾阮推官韜終之教諭某訓導某某實申告成之請督工某官耆民某某某亦與有勞皆當附書謹書以伺南昌府學上達之閣記𢎞治乙丑春南昌知府祝惟容作重屋於學宮當齊之西館舍之南饌堂射圃之北俾諸生朝夕修肄之暇登而觀焉蓋取古人遊息之意也陳推官察間率訓導董遵請名於豫豫愛其軒窗虛敞迥出羣搆四望清逺有髙明之觀故為之題曰上達之閣而教授王德明適至則與訓導盛杲黃奉黃昂復請為記而江同知昌刻之豫惟君子上達此孔子之言也宋儒為之說曰君子循天理故日進乎高明夫高也明也上之謂也然而進焉者鮮何也人欲害之也天理人欲同形異情其端甚微而其究甚逺是故君子慎厥志焉無志者不足道有志而自畫則陋自滿則淺自放則荒去是數者而後可以言志志以始之力以至之化以終之其間用力之方或以顔之明健或以曽之𢎞毅而其歸未嘗不同也髙明上達其道如此夫何與於斯閣而强以是名哉夫人有所見則有所感感極而反身以修凡遊息之際一景一象莫非德業之助而況其大者乎故海興望洋山起仰止廟朝則敬墟墓則哀隱於蹈井而懼於臨淵蓋情之所發有不能已者然則君子登斯閣也獨無感乎哉今夫登斯閣而感其髙則知循理之髙有大於是而凡徇欲之卑必求去之矣登斯閣而感其明則知循理之明有大於是而凡徇欲之汚必求去之矣是則一瞻望間而大有相於吾志以為力且化焉之地閣以觀建而志可以興故吾斯名閣因以觀示教焉雖然觀一也而所以觀者則存乎人人茍不能自反而徒資覽眺之勝抑亦末於觀矣吾敢以是望諸生哉天下之學同歸於教而南昌特望自兩京國監外衣冠禮樂之盛談者先之上達之志夫人有焉宜吾不能不厚望之也昔者豫在白鹿書院文諭諸生有曰學者立心辨莫先於義利幾莫大於誠僞斯二言者蓋不異此諸生試更以是參之是為記逰梅巖洞記自樂平之之德興也道出某地逺見一山髙十文餘其狀特異問之曰梅巖也行數里巖漸近縣令鄒泰請往觀之遂至山下數竒石離立輿從石中上入洞門門闊十餘文釋輿而步秉燭前導稍曲而左窿然如入室焉當承宇處石有如笋者如菌者如珊瑚琅玕者纍纍下懸如將墜然下近壁處有石鱗輳區分級列如或疆之號仙人田又右而行又如一室室之頂垂石折盤如龍蛟之耳中一竅水滴滴注當注處石承之圓如井䦨崇如柱礎中一竅與上竅對水滿則溢又右而行地漸高有石如舟者在左如棋者在右地漸寬平如階以升其上蓋揭鐘懸益宏而虛如亭之狀左右穴各一天光照焉出之則山顛也泰請賦賦詩二章刻於石云潁州修學記凡我政人胥㑹而論焉莫不曰學政之先也敝必修之然有力焉有財焉財詘不可以舉力罷不可以役亦夫人之通論也贏於詘而優於罷稽諸制而合焉斯則存乎人而不可常例視之者也厥惟艱哉潁州儒學自宋景祐間始建於西湖之上我朝洪武初因而再建未幾圮於河水乃徙於南城內至是蓋百五十年矣蕪穢弗治見者嘆焉而未有能修之者正德壬申夏六月遼陽孫君伯堅以河南按察僉事奉璽書飭兵於斯地方千里皆屬控制而鎮實在潁始至之三日視學而見其廢其嘆也視諸人人加甚乃召州衛官吏師生議而修之於是北方群盜奔突於淮汝間所至屠戮極其慘烈郡邑守令方議戰守不暇則何暇及是哉蓋財之詘力之罷莫甚於此時者矣伯堅之言曰禦賊莫先於戰守戰以勇克守以恆持勇與恆忠義之所發也倡忠義者存乎教化敦教化者存乎庠序荒於素而欲復於遽吾固知其不能也然吾聞諸孟子七年之病求三年之艾不畜不得由是觀之則夫學也烏可以賊故而廢之或謂伯堅財惡取曰取諸淫祠則有餘材力惡取曰取諸休卒則有餘工雜泛之用又惡乎取曰取諸薄罰則有餘需衆皆曰然遂卜日興事訓練撫綏之餘寢食以焉不三月而告成皆不愆其素所謂贏於詘而優於罷者非此謂耶學正某等以伯堅意為書來請記豫惟潁中州要害自古則然我聖祖龍興濠梁今為中都而是地實惟附翼衣冠絃誦四方萬國宜是焉先今一廢至此觀於其所而其道可知也或者猶譊譊焉以武之衰歸之文盛夫文經乎天緯乎地化成乎人者也武何物也而焉能並之雖然文事武備蓋有並以為言者譬之貞以配元義以配仁用雖殊而體未嘗不一也故出入將相皆吾儒事而受成獻馘必於學焉武略之不競吾將文德之弗崇是懼而可以盛衰論乎立政曰克詰戎兵方行天下罔有不服以覲文王之耿光以揚武王之大烈夫戎兵武也以之方行而覲焉揚焉非文德何以與此伯堅素抱遐邃兹焉離艱當劇乃能先庠序教化以倡忠義可謂知所本矣豫知伯堅久且嘉其事之成也故為記之學之堂曰明倫天下之同名也飲讀賔興皆於斯在故是之先堂左右有齊肄也於是西南為膳堂養也於是東北為黌舍宿也於是故繼之是皆謂修堂後為尊經閣制書在焉上下五楹間視禮殿髙數尺外而廨宇倉廩庖湢皆具是皆謂作然皆制也亦謂之修始於某月某日越十月某日落之廟之修也蓋同時而先考焉别有記者不書容春堂前集卷十二
