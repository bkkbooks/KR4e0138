body:
  text: 容春堂後集卷十三明邵寶撰七言律三十一七言排律二詞五八月二十九日門人華雲來自汪司成器之所致吾師少師西涯先生之訃哭已有作忽自司成得訃音燕山湘水夜沈沈公今年七十寶作燕山髙湘水深二辭夀之百年恩義師兼父千載文章古在今無路可奔空縞素有身堪鑄乏黃金京華北斗遙瞻處泣對朱絃欲毁琴越明日寢哭後作别公已分見無期壬申寶别公眷戀快悒不能致一語公曰汝年尚强或可再至但吾老矣恐不能見耳於是各感嘆而别越數月公致政貽寶書曰鄉見孫九峯言國賢行時不欲顯言别去此情此誼亦可與知者道也云云不謂傷心在此時再致語將莖露酒已已寶待罪東朝房公以內法酒惠寶寶將持歸奉母公聞之貽以詩序日再致一語情見乎辭兩知音託惠泉詩寶歸公有詩寄題第二泉其末云我歌泉和兩知音吁嗟乎誰哉更識泉齊心山中几杖操今逺雪裏門牆立故遲寶自庚子舉于公甲辰得進士即出知許州越十年甲寅入户部始獲執業門下最是壽筵賔客散六月九日公生日也今卒七月二十日去生日才一月又十日西風吹雨夜凄其又明日作十年論道坐黃扉多少文章上衮衣緑野堂成才少息碧山居在竟何歸昌黎山斗名方著君實兒童事已非愁絶兩知亭外竹聲聲蕭瑟倚斜暉兩知亭寶取公寄題惠泉詩中語名聽松竹間亭也錢户部世恩為記又明日作明農疏入興超然剛道艱危已濟川晚歲樂無司馬獨盛時憂有范公先三朝天為留平格一語民曽解倒懸縱是門人修譜録隱功隂德恐難傳又明日作方石東山各逺行朱絃還對老門生自庚子迄今凡三十七年公嘗批寶文字後云豫往時嘗被方石老駁得荒今不知國賢亦耐得我否酒邊梅雪五年夢壬申二月望公嘗召賞紅梅時天雪邃翁亦携酒至詩裏雲山千里情寶東歸以來凡得公詩東二十餘紙節擊和歌聲響應壬申將歸公飲之酒時天初熱公命移席中庭陳都憲德卿魯司業振之崔郎中世興何郎中子元皆在坐酒半公曰國賢吳人振之楚人聞皆善歌歌以相和可乎遂出近作古今詩數十首俾歌焉公憑几聽之時一擊節囊留刪稿字縱橫寶自丙午赴許州至復入户部以古文辭呈稿得公批抹無慮數百篇今手墨尚存獨懷他日摳趨地欲向南屏問舊盟甲寅拜公請教實託南屏先之又明日作病久無書問起居有書還復索親書但能數字何須楷從此三年遂不虛湖海却忘魂夢外亭臺猶想笑談餘靜探月窟詩中意舞罷萊衣每愧豫寶病後不能作楷字每上公書輒假手於人公恐寶手尚病故書來索親書曰但得數字足矣不必楷也甲戌嵗公得寶壽詩其和章有月窟靜探康節手綵衣閒稱老萊身之句寶愧乎其言常誦以自警得俞吏科國昌報吏科報至倍傷神說病論醫字字真千字尚留秦篆石國昌書云公壽時猶手篆千字文刻石一時真泣孔經麟新亭東望虛秋月别墅西驚迫塞塵天路茫茫靈爽在先皇應慰見師臣見素公寄和公惠山泉歌至素老書來手獨開涯翁書復幾時來百年倡和空金玉千丈光華自斗台震澤雲山愁獨對重陽風雨夢初回壇帷更擬龍峯下一勺清泉萬古哀是日檢篋得公壬戌和寶哭徴伯詩悲歌當哭不論詩公詩有曰悲歌聊當哭何意復論詩長憶先生哭子時今日又興天下慟他年真拜古人師乙巳寶别公赴許有詩云我有文章願公今海內師南屏曰國賢願為先生衣鉢門生故其詩云公和曰才誇今代得文識古人師匣劍知埋處囊錐見脫時作官州郡小為客歲年遲莫道黃金盡猶堪鑄子期濤驅東海曽於硯石采西山故可碑一念九原應未暝白頭親尚在慈闈宋文傑以通天筆至先是寶命文傑製通天筆數管將以奉公至是筆成忍復通天問筆人涯翁手墨已無真路長不憚頻封駁價重真憐一笑嚬公嘗謂文傑通天筆以寶言遂行於時有詩賞之後所製不如前公欲奪前詩寶書力解而止韓愈傳餘還品藻公權諌後復經綸中山未族將軍老慟哭秋原不為麟雨中念喬司馬不得㑹哭燭照髙齊坐論文十回侍側九喬君寶每侍公公留飲食必召喬司馬希大訃傳兩地慟復慟聲隔九原聞不聞南國江山愁夜雨西涯水月夢秋雲西涯公舊第也在慈恩寺前海子畔獨憐風雪瀧岡館猶許幽談到夕曛公新遷世墓在畏吾村有别館焉已巳歲寶在東朝房公雪中出內閣命司馬約寶同㑹於斯抵暮乃返時守門內臣訝曰嵗寒無景老先生何乃至此公聞而笑曰然哉然哉聞太師公諡文正哀音到後又而今節惠初聞出翰林千載特操遷史筆百年如見范公心東川有障龍門在南斗無光壁宿沈何地可追尼父誄在天真若敬皇臨李尚寶寄文正公遺書至王推府附書一紙公病筆也又有信難一首崔尚寶謂此公文絶筆中序平生與寶論文之詳且引杜李韓栁歐蘇反復數百言公自謂謂寶皆於是在寶昔有文字呈公必為塗抹自請養以來答書而不塗抹者凡四年死後誰知尚有書符臺緘至益沾裾曽知此意吾多負敢謂今人我不如春服從遊諸子在夜堂歌詠幾年餘篝燈再檢平生藁秋雨江南歎索居憶文正公嘗欲卜居宜興幾年卜築欲江東陽羡溪山罨畫中千里有情春草遍一樽無地暮雲空相州未得歸韓老汝潁猶堪葬長公曽說近遊須館我吾亭今合號涯翁初公欲卜居宜興吳禮侍克溫實任其事實亦與聞焉寶嘗謂公無錫須置一莊公曰國賢即我莊也又莊何為邃翁寄文正公志銘藁至銘公誰秉筆如椽邃叟知公自蚤年曽謂中郎碑可愧也知裴老畫堪傳遺書數卷真垂世隂德三朝已格天西直門西埋玉地大書還見表新阡上文正公詩不及見而返用前韻短歌無和不成音手牘重開淚雨深雲隔長安空注目鴈回湘浦獨傷心跡留篆籕須銘鼎調絶風騷莫譜琴此後秪應江閣夢西涯雲水晝隂隂不寐思文正公寒聽鐘清倚枕頻麓堂音斷正愁人書中未盡言中妙畫裏爭如夢裏真九制立揮忙秉筆三朝坐論緩垂紳秪應退食從容地得與光風幾月春張提學寄先師文正公新集至代簡為答遺書新刻自徽州千里緘來百拜收自是叔孫知不朽未應巢父得長留祕藏不作山中計重購還供海外求青眼獨看張侍御瓣香今有古風流送行人喻漢宗之蒼梧雲接楚江西萬里南行嶺復溪使者節從天子所解元名自省闈題家音正值三秋鴈朝報初違五夜雞尚憶憲臺冰玉地獨將文字誦昌黎行人喻君宗之奉使過錫詩以贈之君昔從其外舅僉憲萬君世和于江西因從豫遊豫嘗勸其讀韓文不兩月能記其半既而遂魁廣右其勤且敏如是今之進不亦冝乎燕馮氏山亭病後青山似病前山中流水亦年年淵明不飲終辭社坡老多言漫入禪人結晚盟惟竹最物將春報有梅先却憐亭榭鄰吾館勝日相過共煮泉董感恩道卿自蘭溪來訪致楓山章公手書詩以謝之楓山老矣蘭溪上猶為人間抱隱憂茰菊年年彭澤酒江湖處處范公樓眼看儀羽翔天表心送狂瀾到海頭再見未能徒悵悵道卿十日定須留送道卿道卿南來登我堂西風颯颯吹衣裳十年話逺寒宵短一瓣香清新月光操槧當年曽白鹿濯纓何處不滄浪煩君為吊諸賢墓朱吕風流在此鄉聞秦豫齊訃詩以哭之辛苦吟詩半世忙山林朝市兩茫茫冷官才釋窮時褐壯節還登達者堂北野何人收駿骨東林他日委書香清江風雨重陽卷一讀令人一感傷與道卿夜坐病後相逢似夢中君歸海外我江東幽居門徑松兼竹寒日湖山霧且風與客登臨頻有約著書打坐兩無功從來吳越鄰封地歲晚尋盟正未窮送道卿十日留君未盡情懶從南郭送君行千年琴在朱絃老萬里人歸白髮生陸羽祠前泉水活嚴陵灘上桂舟輕風山問我箋書事隨筆時時不敢程南沙宿知微房奉憶一首信宿山中未得陪老僧獨為供茶杯一時缺事庭無月五里餘情野有梅文㑹又從今日起書評還待後人來卧雲字在南巖石好謂知微莫遣苔碑成再贈南沙三日山中兩日陪病餘猶恨不勝杯詩成陸羽千峰茗夢醒盧同一夜梅汲水客應將石去看花人只待春來大書更有磨崖地半是雲封半是苔數欲叙别于文玉文玉適適鵝湖未果也至是一叙則行期迫矣情見乎辭新相知自舊相知近别離成逺别離擬策已為蘇子地上書還憶漢文時律吹和氣回燕谷旌引文星動海涯我愛梅花思折贈江邊一樹正垂垂豫以大魁望文玉久矣久屈而伸其在兹乎詩以志别春風不負歲寒心行見鶯花滿上林日下望京千里近雲中叩闕九重深良工竟識陵陽玉清世寧論郭隗金瀛水蓬山天只尺江湖回首憶知音送施子羽青年文苑恣遊觀慈母堂前日問安春服試來壇雨霽夜燈懸處硯冰寒琴邊山水知應少藥裏君臣效亦難此去京華須問訊上林何樹可棲翰歲暮遣懷一首門前饋歲野人來手折梅花已半開觀為江山留晚閣興將旬日動春杯年占方怪冬無雪世計還驚夜有雷聊託閒情到詩社兩童東去復西回江上瞻雲為夏少參賦次涯翁先生韻洞庭東望海雲飛一棹凌風省使歸渭北漫愁江樹逺衡陽真恨塞鴻稀金山寺近連秋浦黃鶴樓髙倚夕霏已貴復看頒錦誥未衰何用著斑衣鳥回西極千峯碧花發東郊十里緋寸草有心何日報髙堂無恙幾時違天涯蹤跡散還聚客路懷思渴更饑明到湖南重回首君山如畫帶春暉為龔時亨題王中書春流出峽圖追次王耐軒學士韻三峽諸峯畫裏開登髙不見杜陵臺一灣水帶銀河下千里人從劒閣來忽怪乘風遒似馬慣看撇漩小於杯冥冥不斷楚天雨濯濯新除蜀道埃他日曽悲羈旅客此圖還見出群才低懸星斗雲邊棧深著烟霞石上苔縱使險途經灔澦也勝弱水隔蓬萊百年再和天游句兩絶一時真異哉釣魚詞蘆花秋水淺不用繫扁舟便是被風飄去不到海東頭莫問蓬萊何處莫問瀛洲何處適意是真遊乾坤千萬古遺下這風流一竿三尺線輕揚釣魚鈎更愛相親相近水中鷗不看溪風山月即看渚蒲汀草自識春秋滄洲吾道在江漢日悠悠蝶戀花四闋張提學寄涯翁先生詩卷至中有和盧侍御蝶戀花四闋春日閒居因用韻以寫吾與次章所懷即吾涯翁也三章遂及提學其四復自述焉三年卧病今年好二月春寒又被東風惱古人詩語今人道傍栁隨花方未了閒學少年還嘆老擊節長歌不恨知音少流水橋邊亭子小古琴時有幽人抱相逢誰謂吟詩瘦聞道春來筋力全勝舊曽將春酒遙稱壽今年凖擬明年又夢裏周公應不復筆底春秋莫問何時就老眼摩挲凌宇宙一聲啼鳥西堂晝故人千里書中意前日江山今日還增氣呼童為掃門前地觀風使者春將至行空天馬非凡騎第二泉頭酌水能心醉漫道薦賢名已遂桃李笑東風多事屈指一陽今九九緑起郊原草色無還有燕子歸來應不久主人病後初開酒次第春光詩管取論清景剛道是才黃栁半醒半醉花開後幾多人等閒白首容春堂後集卷十三
