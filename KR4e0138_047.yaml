body:
  text: 容春堂續集卷十一明邵寶撰記一十八首記楓山先生祠堂記嘉靖元年春二月楓山先生章公夀終于蘭溪里第遺言勿干身後恩澤其諸子廣東布政使拯暨門人感恩知縣董遵等以其幼子某敬聽惟謹既葬而今司寇見素先生林公以召命過蘭溪弔且哭焉巳而嘆曰古者鄉先生沒祭于社禮也先生天下士也其分則國之師以義而專祠之不亦可乎於是金華郡守扶風王侯某以上嗣大統奉表入賀未還則以謂其二守歷城張侯齊侯曰此固吾有司之事也某既承乏不敢不勉遵等又皆曰此二三子願也敢以請侯乃鳩工聚材即其第之東南營焉功方興而王侯還則曰此固吾守郡者之責也雖不及其始敢忘其終乎申令加亟通判某郡石侯某推官某郡藍侯某胥贊厥成中為堂四楹前為門如堂之數兩序傍翼繚以周垣中位神主而顔其門曰楓山先生祠堂先生於是以國子監祭酒致仕詔加禮部侍郎再加尚書矣稱先生尚德也先生自壯歲以文章魁天下以忠諫著翰林以經濟稱於海內自史館左遷涉厯中外未克展布晚始起為司成天下莫不賀得師焉及請老歸棲遲林壑隱然繫天下之望者幾二十年上之初政有意用之問使在途而先生卒矣論者於先生猶若未滿焉然以豫觀於先生其共謹康靖之節平鬯醇雅之文簡亷朴直之風在朝在野遐邇承嚮蓋不動聲色而耿耿回瀾老益惇篤君子之論焉可誣也若是而謂先生之道未光於世則豈可哉夫天下之道德烏乎定定於一而巳矣大哉孔子萬世之師也孟子去孔子未逺也闢邪放淫勤一生以為任大間立矣後數百年而有董子欲黜百家於漢又數百年而有韓子欲去二氏於唐然其識與力皆不逮乎其志故泛然莫之能定也周子程子繼起於宋其識與力超然獨詣繼絶闡微為世先覺而朱子繼之著書立言行於天下久矣先生以盛德負重望弗惑弗二而扶衛之意惓惓其間蓋先生之信朱子猶朱子之信周程周程之信孔孟也故雖未嘗昌言如董力辨如韓然篤信好古君子與之起宋儒於千載其謂金許之後無人乎哉正德之初豫按察兩浙先生請老南歸見豫而謂之曰吾將舉公自代而公乃在此乎豫愧乎其言今先生巳矣豫以逺廢而遵也乃用書述王侯之意請為祠記豫感先生之知也於是乎書時言者有為公請諡於朝上方重名德固當從之節惠之公論吾知將與兹祠不朽矣祠成於是歲秋某月冬十一月某日乃記重建同心堂記同心堂者無錫縣治之後堂也國初始建時蓋有之宣德二年凡治之制嘗重建於令唐侯泰安惟堂暨兹堂皆仍厥初𢎞治二年榮侯華始大建堂堂成㑹被召去又遺於兹越數年姜侯文魁繼而修焉亦未之及今令暢侯蒞政之三年覩兹堂壞甚且怪其隘以陋議重建之或有以重費尼侯者侯曰凡治所必有堂有後堂堂以聽政臨民後堂以燕居退食而凡寮佐胥議若夙夜治官書亦皆於斯乎在蓋於堂有表裏之道裏弗表稱則民有遺觀焉吾思吾政而譬諸兹堂是故不可不治也乃謝言者不聽出公錢若干緡授民之材者曰某召匠須材擇日興事增其基於舊髙若干尺深廣若干尺厥既落成仍以正統中項侯伾所扁同心堂者揭之間與杜丞世昻王丞震劉丞璋楊簿梅及典史莫諒請記於某項令所自為記實刻在屏於今八十年矣君子讀而嘉之然尚恨有未盡者政人之心貴於同而不貴於茍同吾昔為許州嘗為同寮之針有王事同襄天工同亮讓生於公爭起於私可可否否不必在人不必在我之說蓋同之不貴於茍也如是吾强勉力行比得代而不能無愧焉今則何以為吾侯告哉凡吏之責惟國惟民上下均繫而損益重輕惟古有訓惟禮惟法並行不悖存乎其人禮以率良法以懲慝斟之酌之與時偕行同心之道其在是矣舍是不由而唯意之狥是比也非所謂同也如吾心何吾又聞洪武末韓侯約嘗為君子之堂以延訪耆德今其遺址莫知所在侯倘能尋焉而復建之乎不然則取其意不襲其跡是亦同心之助也侯名華字某陜之隴西人以正德丁丑進士來逾年政成部使者屢旌之論者謂兹堂良材巨構軒宏嚴重如侯之政而顧諟前規日勤不巳杜丞而下皆謹官針於名義為稱堂成之日為嘉靖元年壬午春正月壬子侯於是又治西門之橋及南門之弔橋皆亟成無重費吾是以附書之古柏亭記亭以古柏名志物也木之材柏惟其良歲久則馨香盛焉而植于郡堂者尤以地稱重壬午七月拔於風者數株郡守宜賔王侯以其二遣使致豫時豫方將為亭於繡䫈夀藏以庇吾二碑於是用以為梁侯聞之又致羣祀之木之同物者以為楹為桷不足諸姻友各有助焉人謂是物也非風則郡守莫得而致也初郡守之來致也不知吾之將為亭也亭非柏亦可以構構之以柏則不勝其馨香之聞有風則益焉吾二碑者一為皇言贈封我考妣之二誥也一為少傳王公之文所以銘五妣之貞節者也繼自今有登焉者莊誦誥詞退嘆艱貞周旋諷詠芬從風流將皆曰良哉重哉非郡守其孰致之郡守其有意乎哉吾德郡守而歸之天天其無意乎哉是惟吾君之賜也是惟吾先考之祉也是惟吾先妣之休也某不德何足以當之雖然其敢不侈言之亭成於是乎記宋太學生追贈祕閣修撰少陽先生陳公祠記天下之勢重在敵國者時有之矣其始也勢必重在小人小人敵國之所資也然人知重在敵國而欲反之也難不知重在小人而欲反之也尤難重在敵國而欲反之當其時以戰鬬死者殆不可勝數也重在小人而欲反之當其時亦必有以諫諍死者戰鬬死者天下哀之猶可言也諫諍死者天下哀之不可言也此宋太學生追贈祕閣修撰少陽先生陳公之死所以至於今數百餘年而痛閔傷悼之不巳廟之貌之尸之祝之而猶以為未足者也宋之亂自熙豐以來其所由來者逺矣至於靖康之時則北敵日盛內逼京師敵國之重於是乎極所謂極重不可反者其此之謂乎而中朝六賊者實為之地重在小人則輕在君子重在敵國則輕在本國天下之勢如此誰歟反者於是有識有力足以當其任者李忠定公綱一人而巳使能專任焉而誅斥六賊則天下之勢尚有可反焉者而二三宰執內忌外懾與六賊者表裏經營不曰割地以和則曰遷都以避茍遂其私而忠定宏才雄略直道正氣乍用遽罷祕撰公發天下之危言當天下之大難六書淵聖三書建炎屢遭挫抑愈益奮厲卒之汪黃二姦黨結䝉蔽曲矯密呼身死其手比之朝衣東市之慘殆有加焉而天下之事去矣蓋反天下之勢者在識與力識在我而力不在我亦獨且奈何哉烏乎少陽其可傷也巳是以天下之人聞其死者莫不扼腕流涕而有百身莫贖之嘆髙宗聞於臨安愕然驚悟既贈官推廕車駕道公鄉特贈錢五十萬紹興初追贈今官仍與恩澤賜田十頃嗚呼人心之公固出於秉彞之初君心之明又復於蠱惑之後以是觀之若公之盡忠為國雖天下祠之可也而况其鄉哉潤之丹陽公鄉也祠焉禮也抑吾以為祠之者之意不惟風忠義以起懦而已其欲謹內外彼此之分於封疆戎好之間也夫其欲嚴君子小人之辨於進退任用之際也夫其欲察姦邪䝉矯之跡於倉卒變故之時也夫上誥下詔一舉數得其為教也大矣深矣蓋正德巳卯監察御史台南葉君巡我江南諸郡以江西之警往來視師江上道出丹陽問公之故慨然以瞻謁無祠為缺且見近地有圓通菴者茂林據勝遂命有司改而建焉時知縣武康朱侯方既以憂去金壇知縣南充任侯佃承檄來攝不越月而規制以完繼而內江趙侯章至從而成之君子謂之善祠祠成且考葉君還朝趙侯亦以憂去越三年今知縣上蔡張侯惟恕踵焉而增賁之趙侯起復復任秀水葉君在臺謂其便也遂命以記屬之於某某欽企祕撰公之忠義久矣且重葉君之屬於是乎記祠在縣西北隅前為石岸以臨運河大建綽禊榜曰宋陳少陽先生之祠樓門三間入門為碑亭左右各一中為堂三間二厦像公其中前為露臺𤣥金鑄黃汪跽伏之像左右廡各十間左曰希賢右曰尚友後為樓五間曰有歸取公自贊語也其下以李嘉仲像配公扁曰交情表贖尸之義焉齊居三間在左守廬六間在右公之族裔居之有三丹亭義見葉君所題詩蓋趙尹狀云工部蕪湖分司題名記公署之有題名舊矣姓名邑里科第官階差遣歲月之外不加一詞而褒貶之公論付之後人書之者無心而觀之者足以為勸為戒其微而婉也有詩之義其簡而嚴也有春秋之體是故君子尚之而厯世不能廢也我國家承平百五十有餘年百司庶府莫不任人就列內而省臺外而藩臬郡縣至於寓館署㕔皆有所謂題名者蓋世平治久制備文繁雖不出於令甲而於事體亦若有不可闕者如此工部分司在蕪湖縣者實自成化七年始當時建議者以漕運舟船之料供應什器之料民不勝其科率盍取諸材木之𣙜焉而蕪湖為畿輔近地當川湖二省下流商筏所聚故分司於是乎建大司空歲請于朝簡委員外郎若主事一人主之期月乃代越𢎞治正德至于今蓋五十有六年矣厯官五十有三人先是𢎞治乙丑主事永平張君秉清者嘗一題之今主事嶽池張君日嘗謂其簡略失次也通加詳訂序書分注以刻諸石將俾繼自今有所考焉用為後人指議之地刻既成則託吾友李生宗銘書來請豫為記豫惟六卿分職莫非天工王事而虞衡所職則涉於𣙜利士大夫之自好者往往不屑於是然君子論為巳之學者率謂錢穀簿書不足為纍蓋于其心不於其跡其道固然也况公私義利之辨政君子所當先講者故不當其事則已茍事有所當則必講也吾致力焉而自考焉實於斯在蓋以公滅私固君子立心之要以義為利尤君子制事之宜以是事國何職不共以是律身何德不進易是則上干官針下招物議刑書史筆不在于今則在于後雖有他美莫之能贖而况無美可稱者哉古今記題名者莫不以司馬公諫院為先要其大指不過忠詐直回四言而巳而後人所議率不能外今豫之虞於後人者豈有他哉亦惟曰某也公某也私某也義某也利云爾烏乎人有恆言後之視今猶今之視昔也可不畏哉可不警哉張君發身賢科始仕初政乃是之蒞於斯記焉豫知君之能愛斯名也抑亦可以觀乎其人矣矧宗銘乃吾同年贈司空舫齊先生之子文行粹然克肖家學凡所稱君其言也信因附書之而不敢加一詞者亦題名體也千金絫趾亭記亭何以名絫趾也志得地之難也言千金何先五世祖時逰僧寓一篋去十餘年不返人謂僧死矣乃手其篋篋重則戒勿啓而遺之聽松菴僧又戒僧有亡勿以告未幾僧大建佛宇蓋有物云於是乎歸我先塋之地僧世守之至于今豫提學赴江西時上官有脅人致賂為其家地者說者云有千金焉豫聞而避之山中靜坐竟日遂議卜今地人謂是日也豫且行迫矣非是則地議不成人將圖之蓋前後六世相距百三十餘年是以喻諸絫趾也雖然避千金而得地雖謂地之價千金可也况前人棄利於不知之地又何千金之足論哉豫於是有感矣亭扁四字宋蔡君謨書莫子如山集而摹之郡守陳侯遺愛邱記此吾郡守陳侯遺愛之邱也邱之所藏者何侯冠與衣也侯卒而其子某以其喪還南海而葬焉民見其行也不忍請其冠與衣而為邱以藏之封之如墓謂其精神之所存也過者輒瞻拜焉俳佪咨嗟久之而後能去歲時或裂楮澆酒焉如鄉人俗烏乎侯何以得此於吾民哉子産之語子太叔曰有德者能以寬服民其侯之謂乎吾又聞子産極論寬猛譬之水火而終之曰寬難非寬之難也有德之難也侯天性仁厚而加之涵飬比舉進士以疾在告居山林者日長其德之所成素矣故其臨民亦如其平居也不自知其為寬也而民之所䝉者如和風甘雨淪浹霑濡相忘而不自知寬乎寬乎在人為難在侯為易民之服之至於為邱以志不忘上視召南之甘棠次若峴山之碑殆無愧焉峴山之碑見者墮淚召南之甘棠相戒勿伐公之斯邱民墮淚而為之者也其有樹焉猶待戒而後勿伐乎昔仲尼聞子産卒出涕曰古之遺愛也侯之初喪吾以病足不能往弔為位於山中草堂而哭焉稱仲尼之言而三嘆之巡按御史朱士光上其事於朝亦云烏乎侯雖亡可以慰於九原矣廣平申侯繼公為郡見斯邱也與其寮佐冷侯柴侯王侯劉侯謂是不可無記而以屬于寶昔者寶視學至南安南安之民之思張東海也亦猶吾民之思陳侯也有祠在郡中越數十年繼守者有忌心焉乃以其像徙置城北僧寺豫問之則曰此侯之所樂逰也於是乎徙而奉之耳豫至其處見其為狀置而非奉遂命返諸其故由是觀之吾申侯與寮佐諸君子視東海之後政其為心何如也吾於是重有感焉復稱仲尼之言三嘆而書之侯諱實字秀卿别號虛菴瓊山人也其政與行在豫志今刻諸碑隂吳皇甫氏宗韓祠記宗韓祠者孰祠祠唐工部郎中安定皇甫先生持正也工部何以有祠於吳工部順慶知府吳人皇甫世庸之逺祖也自工部至於順慶凡若干世矣蓋宋之時有為提刑而扈蹕南渡者遂於長洲籍焉吳之有皇甫氏實自兹始於順慶凡若干世順慶之考封禮部貟外公嘗祠工部於别室順慶因之諸子績學其中朝夕於是乎瞻禮焉者亦久矣今御史大夫泰和陳公靜齊於順慶為同年進士比至吳郡訪順慶於家順慶見其四子焉皆清修玊立茂學而有文公愛之期以逺大因入其書室謂夫湫隘藏修則不足以飬其寧靜也逰息則不足以暢其鬱湮也乃詢得傍近廢寺曰祗園菴者以其地之半歸之順慶遂闢為精舍將徙工部之祠君子謂工部昌黎公門人也國史有傳附焉以傳盍祠昌黎公而以工部配順慶從之故題其門曰宗韓夫昌黎公文師百世而於道亦有所見起衰濟溺厥功大矣當時從之逰者若孟郊李翺張籍與工部數子周旋門下實經指授知遇為深故今稱韓公者必及數子况順慶以文學傳家繼武科第聞數世之上有人如工部者亦烏能無情哉是故推貟外公之志而祠工部近於尊祖矣推工部之志以祠昌黎近於隆師矣所謂義起之禮固於是乎在然非靜齊公崇文廣教汲引來學順慶雖有是心其孰能成之乃若靜齊公之志則於皇甫氏之諸子者固欲其由正學而深造之以求至於聖賢之域而後巳焉尚論古人因文見道者之為重固不若以心體道者之為真也然自皇甫氏觀之尊祖隆師視諸家廟則體殊凖諸鄉社則道重君子之與議於斯祠也者不亦可乎順慶於豫昔嘗同朝間介吾世友呂太僕仲仁來請記於是乎書員外公諱信博學能詩有望於鄉順慶名録由丙辰進士厯禮部郎中至今官靜齊公至吳在丙戌三月越八月而祠成實某月某日高安朱氏坡山世第重建記朱之先自宋忠靖公勝非罷相以觀文殿學士出知洪州其子某由上蔡而遷高安歷三傳至建德者再徙今之坡山為始遷祖勝國時建德之子瑞芳以詩賦為解元解元四傳入國朝曰仲益舉永樂乙未進士官至刑部郎中又三傳至繼祖舉成化甲辰進士厯官兵部員外郎郎中至楚雄知府致仕進階亞中大夫同行兄弟七十餘人其子今監察御史實昌舉正德戊辰進士同行二百餘人諸孫行蕃衍至不能悉數坡山之盛於是為極既而華林盜起祠寢門堂焚毁幾盡先世主版僅得保護而無所於棲變亦甚矣於是御史君內艱家居親遭變故楚雄公以興復命之御史拜命惟謹明年盜息乃購得舊寢堂基及其後地於族人遂建堂六楹曰敦本以奉舊書建德府君而下昭穆官稱字行之版如神主者于中君子謂勤而禮越七年楚雄公卒御史憂居乃卜其前若干步為世恩堂丌閣五世所受敕命若干通及貯遺書若干卷君子謂重而密又前為正心堂歲時家禮於是行之君子謂端而則又前為堂十楹中三間曰著存祠自始祖及諸先祖世厯十一人餘二百不以正終者不與焉君子謂義而嚴左三間曰永思以祠楚雄公暨其配辛恭人君子謂厚而正右三間曰遜志室本以貯祭器御史君嘗與其子誥斆且學焉今是之名將俾後之人於是乎繼君子謂典而逺又前為門三間門之內為墀既深且廣御史君之兄太學生夢昌弟庠生憲昌及族之人皆得由焉君子謂整而辨又外為世進士第之門左右各有掖且翼之以廂則郡縣為之建焉以風勵鄉邦者也君子謂軒而雅既又以世恩堂者逼邇內寢懼其燕而䙝也乃於最後建重屋若干楹上奉諸勑次及遺書曰尊勑者統於上也君子謂宏而敬朱氏之第於是始復於舊且加盛焉廣東提學按察副使歐陽君宗道為記著存之堂翰林修撰呂君仲木記世恩之堂舒君國裳記敦本之堂翰林編修鄒君謙之記正心之堂徐君子升記永思之堂至於遜志之室則刑部員外郎葉君國光記焉而吳郡諸生王寵黃省曾繼之世進士第記之者應天解元袁袠也嘉靖甲申御史君巡我江東諸郡越三年丙戌春既竣事訪我二泉山中請通志之烏乎家之變也有數焉而理亦符之家之復也有理焉而數亦㑹之蓋自古則然矣如朱氏之第自忠靖公三傳而徙坡山坡山自解元公四傳至刑部而盛又三四傳至楚雄公之父子而尤盛盛則衰衰則變固理之恆也華林之變乃與之符焉以楚雄公之仁厚忠諒御史君之俊偉清修適當興衰之時乃堂乃構乃寢乃室繼述之責固有不得辭者而才亦優為焉然非變至此極則其革也必不至蕩然銷盡如彼其新也必不至煥然改觀如此也所謂數㑹於理者又如此哉初第之未罹變也祀於斯燕於斯合羣族於斯郡之人稱禮義有家法者皆以朱氏先焉今復而盛矣御史君在南北二臺廷規有言方巡有績公輔之望士論攸屬而夢昌憲昌又相繼而起禮義之風內外後先輝映充牣繼自今稱有家法者豈止一郡而巳哉稱之天下可也雖然法不徒立道不虛行家之本在身身之本在心天下之治不外是矣而况於家乎豫昔視學江右有觀風之責焉五至高安稔聞朱氏之故楚雄公豫同年進士也而御史君及其兄弟又以文字為知巳追憶往事喜其變而復盛樂為天下道也於是乎記重修陳司徒祠記司徒者何隋大將陳公杲仁也錫曷有其祠公晉陵人錫人慕焉而亦祠之也祠坐震對虹橋少南歲久圮壞宣德間邑令唐侯泰安重建焉其前左地逼於民居成化初元磚橋錢氏孟清兄弟重購而拓之志稱公娶沈發興女發興隂畜異志憚公不敢為乃中公毒以死發興事敗郡人上公忠孝文武信義謀辨八絶行于朝命下立祠祀公至南唐賜有武烈之號宋宣和四年加封忠祐蓋其祀事所由來逺矣近有議改其祠為聚夫之厰者君子謂夫主送迎厰可别建也廢義祠以司供億何以勸德未幾復有議改為里社之壇者君子謂社主祈報壇可别營也廢義祠以求豐穰何以歆神時暢侯子實方飭邑政聞之遂寢其議於是奉祠道士范日溪克承侯意乃修治其堂若干楹前門若干楹左右居守之室若干楹像位祭器視舊完妥資皆不煩于官侯因鑱石請豫記其歲月豫嘗論義起之祀在吾錫者至德如泰伯尚矣其次若龜山先生則遊寓於斯若梁溪先生則生長於斯其道學忠義師表百世或附祠于學宫或專祠于惠麓其禮惟允亦無容議矣乃若睢陽守張中丞保障江淮功在唐室於錫初無遊寓生長之蹟維民崇奉成于感孚邇年建議請祀允為著令此固我朝從義之盛典也司徒公我郡人也德懋望協上匹前修正不容奸死有餘烈其恢綱勵俗之節於中丞公實相伯仲厯代褒嘉昭載史冊凡有人心者皆當敬瞻興起况吾錫漸被其休者哉尸而祝之不亦宜乎吾知斯祠其將永存不廢矣雖然非賢有司好古崇德慎於因革之道其孰能與於此近督學侍御張君汝立按我江南毀斥淫祠無有遺隱惟舊列在典者則存之以振風教斯祠固其一也論者謂得崇正之體焉他日續邑志者尚以是參考之水雲亭記永豐之東北五巘雙溪之間粵有奧區水雲翁世居於是凡若干年至翁而樂焉雲興於巘變化無常水流於溪往來不息而翁之心實與之俱蓋躬督耕稼日行田間倦則少憩於斯久之謂無以蔽風日而適吾趣也乃搆一亭而以水雲名之人之知翁者往而候焉退而嘆曰悠然南山洋洋乎泌也其在翁所矣遂以水雲翁稱之翁之子今華亭知縣豹昔在庠序而從公以遊且息也翁嘗指雲而語焉曰所貴乎雲謂其能為霖也指水而語焉曰所貴乎水謂其能為澤也其體雖殊其用一爾知斯義也可以承吾意矣豹謹志之不忘比豹舉於鄉既得進士而令焉則貽書以戒尤惓惓以為霖且澤為况曰吾昔未能而望於爾爾今能副吾望否乎於是豹考三載績還自中朝乃取道永豐迎翁至華亭官舍謂封典之將及也盍前後拜而受焉居四月命未下浩然西歸華亭之大夫士留之不可得也賦水雲之詩以贈之者若干人厥既成什乃用書屬徐張二生來謁豫序豫常人也何敢序松人之詩哉而永豐則吾視學所嘗至焉者也水雲之亭吾當為翁記之翁性孝友稱于宗䣊而鯁直尚義氣人不可犯視人之急若恫在躬汲汲赴之若不及且不足也蓋鄉評如此可謂有士行者矣豫在永豐有杖而衣冠修眉長髯皓白如雪者二三人走山谷數十里詣豫行臺曰某不入公府若干年矣聞公來故出卒無一言而退問其年皆八十餘問其所厯皆仕而歸者也其風度蓋今猶能言之翁行且受封夀考未艾其若人之流乎身隱而子仕猶身仕而歸且老也易曰不事王侯高尚其事詩曰衡門之下可以棲遲請為翁誦之翁字玊治以字行於是年若干矣鶴山書院改建記嘉靖三年九月蘇州府改建鶴山書院成改而仍其地今巡撫都察院右副都御史蒼梧吳公意也先是巡撫太子少保工部尚書內江李公以臺署久寓書院嘗欲遷之檄府詳議有成畫矣尋以歲饑暫輟公來蒞蘇乃克成之公之言曰惟鶴山書院為宋資政殿大學士參知政事贈太師諡文靖魏公了翁之賜第公在政府理宗嘗御書院額賜公揭之臨卭講學之所後公卒葬蘇州勝國時公之子孫請以賜第為書院命揭舊額遂為公祠國朝永樂初少師夏忠靖公治水江南宣德間司徒周文襄公繼蒞巡撫皆於斯乎聽政當其時二公豈不能别為之署哉詩曰蔽芾甘棠勿翦勿伐召伯所茇蓋於是有餘思焉耳矣嗣是歷巡撫數十公皆因之而書院之名幾於虛設然而日巡月省時葺嵗修不壞益嚴亦惟有司不以祠堂視之而以臺署視之之故不然如漢之任唐之陸宋之吳陳章王周尹數君子者或生長於斯或宦遊於斯功言道德各有所成為世稱重久矣其祠宇之初立亦皆出於好德之𠂻今或荒且圮焉或右姓據焉或異教併焉雖忽諸之歎屢形於人而卒莫之治也抑獨何哉况南畿巡撫視諸藩臬守巡權位有間而治所乃缺於制亦若有不當然者前政之欲遷建書院也固宜論者惟知時詘舉贏之不可不知易地而遷之尤不可之大者蓋文靖公之所居而精神寓焉者今三百餘年矣一旦他圖公如有靈其肯舍此而肸蠁於彼乎且自我而言譬諸生人以客逐主是可安也孰不可安也今盍中分其地限以髙墉南為行臺北為書院别闢之門曲通之道庶幾不易新治而無廢舊規宣政行令崇德尚賢兼存並用不亦可乎時郡守胡侯纘宗長吳二邑令郭波楊叔器及其寮屬承公命惟謹退而㑹材用計徒庸具文若圖以復公曰允哉擇日興事越三月而告成君子謂斯舉也體上下之情通幽明之故逹經權之宜觀贏詘之㑹量豐約之度裁乎義而不失乎禮建一物而衆美具前復百年之觀而後乃垂於無窮抑於是得尚友之道焉詩曰髙山仰止景行行止猗歟休哉可以觀德可以觀政矣胡侯以公命屬記於某某再辭不獲於是乎書院之制自來鶴樓後至于北墻為地若干步去北墻若干步南向為堂四楹中塑公像公服正笏儼然平生鼎炬几筵厥有常設前為露臺翼以兩序凡拜瞻對越皆於來鶴樓下出樓而西若干步西向為門南轉若干步為門如之榜曰宋魏文靖公祠堂再轉而南又若干步至於外門院額揭焉僉曰稱哉董其事者為蘇州衛指揮吳繼美為長吳二典史蕭景腆謝詔其為費白金若干兩役若干人悉如公初議公又以院舊有讀易亭滄浪池世逺迹湮莫知所在乃於東序後蔬圃因取土之汙稍鑿而池焉又亭於其北各揭其名以無忘其故故併書之若文靖公之學術文章勳庸節概儒先君子具有定論見於虞文靖吳文定之記者不書廬陵劉氏一椿堂記世以椿桂擬父子者自燕山竇氏始蓋義方之教為重而非徒以科第為榮也當時有太原王氏植槐以望其子之貴而繼登台鼎卒如其言世之言隂德者稱焉故一椿五桂三槐籍籍人口自宋至今數百年矣猶周人之歌召棠也古今輿論之公固如此哉若今廬陵劉氏之一椿堂者其亦有取於斯乎劉之彥有名某而字大經者今我郡憲劉俟之尊甫公也幼自樹立習進士業初治毛詩繼治周易甫弱冠其父得末疾艱於起居公躬侍湯藥者十有三年業弗克卒既而得丈夫子五人取易震坎艮觀萃五卦既從體而命之名自就外傅即命各治一經躬加策勵冀償夙願焉遂以一椿顔其所居之堂因用為號著志也抑又嘗誦王氏之言曰吾不做吾子必做云云久之志益篤乃以家事為纍虞夙願之不可償也於是萃且殤矣而厥號不忍自廢乃擇于四子以郡憲君天資特異學有日進督之卒業而舉家事付震等若門以內事則內子某人任焉尤嚴私貨私蓄之戒郡憲君用是得專心讀公之書日造髙明稍長游邑庠既廪而後舉連捷春官奉對大廷賜第釋褐試政西曹來司憲於我郡踰年迎公至官舍養焉時震之子牧清坎之子牧宣亦有風庠序將繼叔氏之武以廣其祖之志鄉之大夫士咸謂公無愧於所謂一椿者郡憲君乃以公意來請豫記夫義方之教尚矣世之人有禹鈞之志者能以訓其子姓則凡子之能出科第躋顯要者固竇氏之桂也不然業巳成而或制於命則所謂桂者固亦如之乃有一焉而翹然擢秀上勤明天子稱子大夫於天下其為桂也大矣數之多寡今與古合焉若否不必詢也况諸孫參焉為桂於庭森焉挺焉又若是乎且義方之教而加之隂德之功表裡浹洽竇之桂其將為王氏之槐乎吾聞公在家有譽在鄉有譽積德於無言之地者厚矣郡憲君於是乎既徵之君清貞明恕平反為仁决斷為義所謂惟良折獄者君固有之而哀矜勿喜之念又時時往來於𠂻也槐之徵其不在斯乎後之人將再徵三徵至于不一徵而未巳也豫昔以憲節視學大江之西雖未及見郡憲君而君之友數人者實為相知君亦以是推敬焉而記是之屬豫喜公之志之將有成而樂為天下道也於是乎書張氏祭田記張氏祭田為福州知府鈍軒公之墓而置也置之者公之甥華時正及其子雲初時正館於公實以公冢子珤幼且學未能應門户之故越若干年珤長與其弟琇偕游庠序於是時正之父母亦老乃辭於公迎其婦以歸養焉公與之田三十畝時正辭還以供祠祭公卒之二十三年珤暴病卒又三年公配張宜人夀終其冢孫立暨其諸弟貧乏不能自存琇亦久淹且窘公與宜人之墓在慧山者春秋展掃違時闕事或比歲弗舉垣頽屋敗松楸日凋以仆莫之能起公居官亷家無留資而經理幹蠱繼乏其人無足怪者於是姻友諸君子悲之而以為言先是時正屢嘗周之及兹有聞傷慟涕洟如公始亡既乃想像音容若將見焉則又倣徨戀慕如初違公追念恩德依依不舍如在公室百思兼集殆莫能為懷者諸君子見其然也以為家莫大於墓圖墓之存莫大於時展掃以祭圖祭之繼莫如恆産産莫恆於田僉謂時正曰子盍圖之時正曰諾歸以語雲雲之悲如時正之悲也雲之感如時正之感也乃跽告時正曰此雲志也不敢不力越三月而田成其直為白金二百兩劵立之日具儀物告公及宜人之墓而焚其副焉取諸租以供墓事自今兹始於是諸君子知張氏之祭之有託也張氏之墓之有守也則以立來告某請書諸石於乎義人之恆性也故事以義制載諸書財以義理繫諸易禮以義起記諸禮五常百行於是乎成是謂秉彞良心一有感觸其發也孰能禦之公始館時正以任子之勞義也繼聽時正以終親之養亦義也公與之田義也時正辭焉亦義也而閔外氏之衰微周之不足至置田以保其墓者大矣田乎田乎始以義辭終以義置義以成義於公有光固時正與雲之分也是田也惟爾甥舅之族其胥顧兹石無荒以棄無忿以爭無竊以鬻時斂時供修春與秋俾與兹山而永存則豈惟公與宜人無憾於九原而二族亦有無窮之聞既以告諸君子遂書為記諸君子者為楊溫州致仁為方撫州日升為成僉憲汝從為呂太㒒仲仁為俞大參國昌皆所謂姻友者也時正名麟祥與雲皆太學生田之數若疆及佃人氏名與其租額具諸碑隂道南書院記道南書院曷為而建也為祠宋龜山先生文靖楊公中立而建也公南劒人也常曷為祠之公學于程門還自伊洛至常而留焉謂泰伯延陵之墟也而鄒周三公又與有故故周旋延陵句吳之間與諸生講道者十有八年其風流在士林功化在後學者博且宏矣是以沒而祠之比諸鄉先生越紹熙初郡始立祠紹定淳祐間繼祠益嚴至勝國時乃有龜山書院之創而其圮也久矣國朝成化初嘗起廢焉而公像寓二賢祠者如故前郡守宜賔王侯欲改圖未果今郡守前監察御史瓊臺陳侯實乃卜吉而别建之中祠公二周既仍侑坐今又益以道鄉而下七公禮也其謂道南何侯之志也侯之志也何以昔程伯子於公之行目送而歎焉曰吾道南矣則斯人之所在實斯道之所在也斯道之所在則地因以重有固然者侯謂夫祠名以人不若直指其道表章標榜深切著明有以新學者之觀瞻而興其嚮往之心是之取爾然則於前乎曷徵聖道絶塞自孟子沒至于有宋千有餘年矣南安之㑹程子得周子之道而北洛學於是乎大振此斯文再啓之源天地間一大機㑹也伊洛之遊龜山得程子之道而南閩學因之大成此斯文再傳之委天地間又一大機㑹也是二機㑹者人邪天邪其然也孰能與之是故君子謹諸南安有書院焉名之曰道源為周程志也今是院也為龜山志也名曰道南不亦宜乎矧道南云者實出大儒之言由今觀之於斯人斯地為切侯之命名允矣祠有位奈何乎列公南面中位道鄉先生鄒忠公志完教授先生周公伯忱坑冶先生周公伯溫祕書先生唐公彥思並焉皆公同門同志者也外此數公者則左右分列編修鄒公德久中丞喻公子才皆公門人也文簡尤公延之肅簡李公元德忠文蔣公良貴皆一再傳而私淑者也猶門人也至於龜巢謝公子蘭則聞風而興起焉者也師友之分主賔之儀於是乎辨斯禮也其起斯義也夫諸公於龜山何如道鄉尚矣二周兄弟氣質純明可與入道程叔子實嘗稱之祕書推演師說為當時重編修奏議炳炳能世家學中丞力主正論為時師表文簡立朝抗論老成典刑元德力解學禁辨忠為國忠文抑惡揚善進退有守龜巢崇正闢邪扶植名教事載國史郡志皆無愧於龜山者也祠以道宗配以道合斯名也其稱斯實也夫然則侯之望於學者如斯而巳乎夫道一而已學有科級觀聖道自孟子始韓昌黎有是言矣接孟子之絶學者程子也道南之嘆既屬龜山觀程子者不當自兹始乎由是以希程由程以遡乎孟希聖希天亦將於是乎在此侯之志也侯之志誰歟協者上則前巡撫右都御史今南京工部尚書蒼梧吳公今巡撫右都御史泰和陳公巡按監察御史髙安朱君提學監察御史光山盧君中則郡佐羅侯洪載王侯嶽羅侯述柴侯希高劉侯體觀下則邑令黃潤與其丞簿及郡邑諸博士皆侯志也郡之諸君子贊焉而給事毛君憲參互尚論之功多矣其始曷日嘉靖乙酉七月丙子其訖曷日明年丙戌某日甲子其地焉在在朝京門內若干步所所謂舊驛基者先以與民繼以其直贖之其制奚若前為門為儀門各四楹中為堂六楹後寢如之左右兩廡各四其門之數最後為樓六楹其下可以藏修焉其上可以登眺焉扁曰望閩以無絶其委其東有池為亭以臨之可以逰息焉扁曰思洛以無忘其源繚以周垣爽塏寬廓崇偉靚深清廟之下此其亞歟徒祠無祀可乎徒祠而無祀是浮屠老子之宫也雖然私祀可公祀不可公祀何為而不可也公祀在典龜山既列諸廟庭從祀矣諸賢者皆鄉賢也亦有祀於祠矣再舉則黷是以公祀不可也私祀何為而可也以義起禮擬諸釋菜郡守主之歲春秋二舉取諸田租以供田二百畝租若干石祭之餘以充修理之用不别科率何為其不可也其費曷出出某項為白金若干兩基與構居什之六田什之四是皆有司存焉不足記其記維何斯文之機㑹非人力所能者為天下學者告也記師友之淵源與侯之志為郡後進告也記侯有道教思無窮德逺功深欲俾百世勿壞為政人繼侯者告也屬記者誰郡諸君子自太僕寺丞白君晟以下凡若干人執筆書者誰南京禮部尚書詔許有疾調理後學邵寶亦郡人也東明閣記豫從弟璣弱冠時學于希齊錢先生先生啓迪之甚至終日俾立講下聞四書春秋大義成化乙巳春構屋于舍前之左讀書其中先生為之題曰東明閣復為銘貽之蓋三十有二年于今矣近豫侍養家居請豫為記豫乃復之曰璣乎一明一晦相尋於無窮者天地之候也天地之候隂陽而已是故明不能無晦晦亦不能無明晦明相為消息天地且不能違之而况於人乎然明不生於明而生於晦晦不遽晦由其過於明隂陽消息其理則爾日升於東晦極而明之始也由是而升至於午位而明又極矣璣之閣適東其牖則其方進而未極譬之於人其將進之幾乎是以君子有取焉璣業蚤以事奪今其子勳實從豫遊嗜學績文期畢父志豫日望其進於明也所以成希齊名閣之意實於是乎在璣也其知朂哉西溪記某翁廷俊别號西溪志樂靜退兼善調攝縉紳間稱為逸士豫嘗輿往山中見其過橋時步趨便捷甚愛之於是年届七十矣其孫憲遊吾門文日有進將圖所以慶者先是詣豫請曰吾祖心境光明風儀峻拔平生不作諂媚態庭植花木一室左右圖書惟意所適尤篤於訓子若孫期樹世望其素履之槩若此非先生一言之教無為爼豆光豫例謝夀人文辭而重其崇祖也乃為記西溪歸之記曰邑之西有溪焉受惠泉之流納百瀆之注汪如溶如沄如㳂如水之觀漸具於是㑹而為湖下而為江東入於海海水之宗也雲龍攸宅風鵬攸翔神天下之變化者在是而水之大觀具矣然知水者必思其源焉翁居邇溪觀而有契於心也嘗扁其齊曰西溪因以自志蓋其作德聚澤為流衍之地久矣導入海之勢以大其觀不有在於後人乎是固翁之願也憲也尚其圖之是為記懷雪堂記懷雪者吾郡二守榮昌冷侯扁其所寓之堂之名也侯之先大夫寧逺學諭雪軒先生始仕為崇陽司訓而生侯侯生十有八年雪軒卒又十年其配王夫人亦卒于今若干年矣侯承雪軒之教以德行文辭自勵發身賢科歷掌邑校郡校功在諸生望在縉紳課在視學使者今二大郡而進未巳也其始在南陽而開封而寧國而吾晉陵地凡數易而雪之懷無一日不在蜀道巴雲之間也其名堂也不亦宜乎古之君子於其親之沒也自起居笑語至於嗜好無不繫於思者矧其所以為志意而名夫軒者能不存於心目哉今夫雪之為物寒氣之所凝結也大雪之後一陽生焉於卦為復於時為冬於德為貞以言乎味則為至淡而可以受諸和以言乎色則為太素而可以受諸采先生之所以自成與其所以教侯者要不外是焉是故侯有不思思能不先雪乎侯之言告豫固曰先君逾艾而始生某陶以德行藝以文辭勵以逺大愧未即副且大成也則其所以懷夫雪者宜甚於人人矣雪乎雪乎其將為大有之兆乎其計日而應雨澤仁也其入地而辟螟蝗義也皆雪之所能為也侯也德行以本之文辭以飾之副之晚而成之逺稱國名臣固將於是乎在家之肖子不足言也懷雪之堂仕之郡産之鄉有志焉其能不先之乎侯以記請豫既執筆復託侯言以永侯之懷曰我宦我學惟我翁之教我有德行翁我約之我有文詞翁我授之我是焉承我是焉效嗟我思翁孰不在衷翁名軒雪翁志所從吾敢不顧吾敢不共雪兮雪兮潔可比德白可成文我雪我堂視如有見聽如有聞雪兮雪兮我懷其永存兮容春堂續集卷十一
