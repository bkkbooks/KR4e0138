body:
  text: 容春堂後集卷三明邵寳撰序十九首引一首冉涇邵氏族譜序冉涇遷自新橋新橋逺矣吾祖自冉涇始志所知也冉涇曰容春府君自容春至寳凡八世族之衆散處者凡若干人而南塘水闥橋爲著寳於南塘繼髙之宗也㓜也孤莫知攸叙嘗得從伯祖廷珪手畫圖系焉因稍輯録以備觀覧及登第入官出入外内常以自隨再質於知譜者凡若干年而後成編繼而獲復冉涇故居爲今第即容春軒遺址闢爲精舎又若干年賜告侍養歸自户部乃作四代家廟如典而容春府君則歲修冬至之祀肇祀之歲羣宗咸㑹譜於是始刻惟君子之論宗法尚矣大宗之分非小宗之所敢與也然在我有不敢諉者居可復也祀可舉也矧兹譜之修其敢弗卒義起而志從之其亦吾分爾哉寳不肖年且暮矣而道不加修嗣猶未能承也族猶未能贍也蓋爲是媿且懼者久矣故於譜也感謹書諸首簡正徳乙亥秋九月朏七世孫繼髙小宗子具官寳書李文正公麓堂續藁序麓堂續藁若干巻太師西涯先生李文正公致仕後所著也公所著有麓堂前後藁者刻於徽郡公門下士提學侍御張君汝立實與圖焉公卒之明年汝立復得是藁遂於蘇郡刻之而屬某爲序某嘗聞之道之在天下其極至於萬變君子之言行以之文也者言之精而行之著也是故道盡乎變而後可以言道文盡乎變而後可以言文茍非其人則何以與於此公生四年以神童承顧寵儲養進修又十餘年學用大成既舉進士廻翔翰苑久而後登秘閣進位師傅歴三朝五十餘年高明端雅盛徳嘉謨上沃下敷澤被海内乃或當艱應遽定震稽疑所謂道者隠然在公之身故其爲言𢎞衍旁流即物陳義惟其所當皆能極乎其所止雖其言篇篇殊而所謂道者錯然在焉蓋自六經至諸傳子史上焉凖之次焉資之下焉亦時取之如大將御戎不聞號令而一鼓一麾無不如意如金之鑄於良冶造化自我而不知所以爲之者有道哉文乎可謂能盡其變矣其卓然稱大家而爲學者宗師有以也夫世固有承迂襲隱謂之理學否則荒於釋老否則雜於稗野自以為𤣥為逹爲辯博者皆公門之棄也寳不敏出公門下幾四十年辱公指教多且深矣東歸以來病餘閒居竊有所論如此方將書以請焉而公己矣先是公嘗作信難遺寳乃今有餘思焉敢以是爲汝立復公徳厚而彰功鉅而逺古稱三不朽公實兼之天下後世當有公論焉謹序冉涇圖序冉涇邑城九箭河之一也西距弦河東逹於弓河凡百有幾十有幾丈中有橋通南北曰冉涇橋歴歲既久橋東河尚可舟其西僅有一二洿謂之河形又西河塞幾弗可跡予既復先世之居居當洿且塞處説者謂水由西來鑿之可舟然其地僅有一巷所傍皆民居也或請以賈易之民余曰毁人以自便而可烏乎而不可謝不聽乃鑿巷地隂為之溝道水東之既脱隘鑿為渠焉濶若干丈至於橋凡若干丈以粟傭力皆出自我時縣令侯君世卿請助予謝曰勞人以自省而可烏乎而不可無以以易西街濵河地便民舟泊者其可也越月鑿功成侯君擢秋官去少尹于君世用方署篆來觀於河復嘆曰橋且敝不可弗作此吾有司事公無與焉于君備材石屬諸匠經畫既定都水郎中謝君邦應以視水至檄縣以公錢為河工助予曰橋西河予為予鑿也無庸兹顧橋之東尚淺請藉兹力浚焉以便民舟其可也越月浚功成又越月橋成鄉人耆老又謂予曰橋南故有中街廟以祠土之神今棟撓壁敗葢與橋同而弗與皆新繼自今祠其於何予曰然哉然吾力不能又不可以干官政吾以告富而好義者於是助者凡若干人又越月廟成廟費白金百兩出者以予言故橋費白金六十兩出者以于君言故西河費十有六兩出侯君東河費十有二兩出謝君予費粟百有九十有五石董是役者義民馬經都水分司暨郡縣皆檄之夀府長史致仕楊公崇周實惟里居既有記刻石經復爲之圖於是乎序律呂新書解序古樂之不作古之律不存於今也定律有道焉古之書不有傳於今者乎傳焉而不能行何居知物知數天人叅稽而虚平精白以尸之非有道者不足以與此吁嗟乎若是其爲之難也爲之難言之亦難宋蔡季通氏嘗爲書朱子序焉極其稱許至謂獨見超然千古一快然迄今數百年矣曾未有得其堂奥者吾觀張叔成之爲解也蔡氏之書其將行乎何其悉而理也叔成名敔饒之徳興人予𢎞治辛酉江西所舉士也於是予方校文嘗求知樂者於士葢有以叔成言者㑹叔成領薦以去有缺聞焉乃今見此蓋叔成之所造者深矣我國家承平既乆行將制作以協鈞韶當有知叔成而用之者予病矣雖知焉亦奚以爲爲之序而歸之宜興李氏族譜序論族者喻諸水或源也或委也其爲物不同其理一也雖然泝焉沿焉派而别焉則存乎人是故譜修而後倫叙倫叙而後恩義有所錯古之善族者先譜譜出於史史難矣譜豈易哉宜興李氏望族也其族有名士曰瀛字宗源者志在合族手録其先世文獻之詳及其兄弟子姓名屬合爲一帙而請法於姑蘇文徴明氏徴明夙精史學見而嘉之乃爲斟酌損益以成此編其文約其事核其例簡嚴君子謂徴明善譜謂宗源善族他日宗源以告於某某曰然哉宗源歸屬其族人崇徳典史某刻之送按察副使林君提學山西序正徳甲戌冬十一月龍溪林君廷元自鎮江知府擢山西按察副使而總理其學政越明年春正月璽書自京師至將奉以行則用書告别於予予既作詩送之而其舊僚黎君乾徳復以君意來請言初君以進士有事於江西之建昌予適遇焉而相論議者數日於是知君以學比予在户部君爲郎中咨謀可否朝夕周旋者數月於是知君以政葢至是歴數年矣而知益深故君之愛予猶予之視君也君行而予言固若當然者顧予病餘荒落不能自副而又不能以已也則何以爲乾徳謀哉昔予初領江西視學之命今少傅吏部尚書邃庵楊公在太常太子少保大學士介庵靳公在翰林皆辱為序以贈某也不敏愧乎其言然至於今猶不忘也其大旨邃庵公則謂學政當酌寛嚴之宜介庵公則謂學術當擇是非之實夫政之寛嚴以人不以己術之是非以己不以人此則區區之有得於二公者也夫人非其徇之謂而因之謂非人是因則惟己之徇矣茍無韋弦之戒則不能成水火之濟無足怪者夫已非其任之謂而明之謂非已是明則惟人之任矣茍有槃燭之疑則不能極玊石之辯亦無足怪者是故酌寛嚴之宜者存乎權審是非之實者存乎識識以道充充則博博則精精則何不辯之有權以徳執執則定定則通通則何不濟之有葢凡齊量庻務進退羣材莫不是由獨學焉爾哉然學者學爲天下用也故官以綱紀師道存焉成諸己而養乎人其感孚振作之機固將有在矣而所謂章程者次之修敏如君有不聞是乎予也莫助之愛無以致焉而惟二公之意是述蓋監邇而忘逺矣二公今天下之元老也鎮江爲其鄉郡其知君固深於予予知君之能信之也於是乎言明府侯侯考績詩序無錫之爲縣舊矣在江之南爲望至論其治或以爲難或以爲易予亦持乎其間然予嘗以爲邑之事莫大於賦與訟觀乎賦訟而治之難易可見矣乃今徴乎明府侯公焉公以進士出爲邱縣輿論才之頃以更劇來涖無錫吏以賦告公曰於我乎徴書片紙付里胥民先期來輸舟奪港檐負爭塗門塡除塞税長執籌量窮日夜無休時自始輸至畢不踰五旬吏以訟告公曰於我乎聽旬日一受牒籍志而行之不以屬吏及兩造在庭數言而折刑責加焉退無怨言其聞風自已者什恒居九若是而謂之難吾不信也雖然前乎是者有賦矣逋積數年若罔聞知者獨非此民乎有訟矣邑未終聽輒走而之他累數年而未已者獨非此民乎若是而謂之易吾又不信也吾知之矣令得其人則易不得其人則難難易在人其在地乎始公之至予病未克謁越數日公過予精舎坐論移刻而去予謂人曰邑其治矣或問故予曰邑之人有二君子好禮小人畏法禮加於所好則益崇法加於所畏則益嚴易是不治公禮法人也吾知其必能以是施之民也或疑予言既久而後信之故曰難易在人人孰爲得得乎禮法而已矣吾嘗以是徴之前政洪武中有東平韓某惟其人正統中有永嘉項某亦惟其人當是時人皆以爲易也二公而下難治之議起焉韓好古力學有循吏風項亦文雅易簡皆所謂有禮法者公博學多聞文章法比皆稱精敏不知韓項二公於公何如也公之政於兹纔朞有六月合邱之績當考三載廵按御史唐君異而旌之其文多所稱重其最重者曰操履貞純器識逺大君子謂其言允寳病且僻不敢與聞政竊聞鄉大夫士有詩頌公遂以所嘗論者序而歸之澹成先生七十夀序澹成先生楊公謝夀藩輔導歸居錫邑者十有六年年七十自其子女婦壻外郡邑之伯長里居之耆俊與夫庠序游歌之士郊野耕牧之民道路行遊之人親者致幣敬者致詞莫不以上夀爲公祝焉二泉邵某室鄰於公或見而問焉曰何爲其然也某曰吾昔為許許之東北有木焉其大數抱其高什之其隂四尺爲歩數百風焉則聲聞數里葢自始植於今數百年矣舎其傍者朝夕祝焉曰願乆斯樹以䕃我也其東西南北相去數里者其祝如之葢其意以其色足以起吾望也其聲足以振吾耳也故愛之云爾間有執尋斧而過焉者其祝之亦如之問之曰我國工也有木如斯所謂棟焉梁焉者也過時不取用則晩矣予目望而心度焉以爲棟梁之式於是乎在故祝焉吾之祝之其諸異乎彼之祝之也與予聞而嘆曰斯木之在於斯也䕃焉而愛之望焉而愛之聞焉而愛之者情也以爲度焉而愛之者道也其𠂻皆發乎天予感焉嘗爲之説今公之夀而人之祝之何以異是公㓜禀異資博極羣經子史而融㑹於心肆口爲言執筆爲文皆炳乎有章而尤留心於經世之務剛直守道不爲利疚不爲勢撓行年四十始魁於鄉繼舉進士乃自請教授一郡既而簡擢國子監丞以至今官其道可以行矣又未年而引焉終隱而不出譬之於木所謂棟焉梁焉非公謂耶世之求材者舎是奚所取則焉所謂聲焉色焉䕃焉者則固其餘也是故郡邑之長伯里居之耆俊䕃焉而愛之者也郊野耕牧之民望其色而愛之者也道路行遊之人聞其聲而愛之者也庠序游歌之士則取則於材焉而愛之者也其情異而愛同如是其祝之同也不亦宜乎今國家有大營焉求材者日將取之不特以爲則焉而已是故存之於野則全天地之委夀未艾也登之清廟明堂則成天地之用夀亦未艾也蓋異地而同夀其道如是予是以前同夫人之祝之而後獨致吾意焉愛以天下祝以天下此朋友之情也亦君子之道也然愛焉而莫之助也祝焉而莫之加也亦自致而已矣問者謂予言然請終祝之先是公之子大邦謁予爲夀公之序因書以歸焉伯川子辭慶客序伯川子行年六十於禮稱耆客將徃慶之伯川子曰吾何忍哉吾先大夫未嘗及斯慶也吾何忍哉母在而稱老抑吾豈敢正月朔旦祗見太夫人已遂舟而訪吳禮侍寗庵公於宜興蓋謝客也數日還訪二泉子二泉子曰生日之慶非古也君子謂具慶者可行之子慈侍者葢欣戚半焉耆而辭慶於客其陳義甚𠂻而度子知禮哉子大夫也子有禮言則人將興禮在鄉則鄉人興在國則國人興年不於子慶而以禮之興爲鄉人與國人慶不亦可乎伯川子曰君子哉子之言也吾不敢當請以爲吾母慶王友石畫序永樂初友石先生爲中書舎人與都給事中倪公克明同寓京師倪屢索畫友石諾焉乆之乃得此幅葢得意筆也給事藏之甚珎至其孫御史公汝敬正統甲子將赴鄉試留館主華以文爲别後以文女歸陳用賔遂擕以來工部員外郎進之翁用賔仲父也以繪事妙一時見而心賞之嘗焚香再拜以觀楊謨孟賢爲工部從子壻用賔歸焉孟賢卒歸其從子正甫正徳辛未夏五月正甫以歸我間以視潘繼芳甫言其故如此遂録以識毘陵忠義祠録序毘陵忠義祠録成之四年吾邑令平溪侯侯世卿始梓行之先是武進葉夔司韶之輯斯録也亟視寳請序時寳以致仕之命歸自漕臺既謝不敏未幾請祠命下寳起承乏户部司韶復致書今御史中丞秦公國聲以書來屬申之以京兆尹白公輔之地官主事丁君元徳寳時請養南歸諾焉而輟於病者二年於兹兹侯將從梓事則授簡請校葢中丞公實屬之寳乃略加詮次而爲之序曰忠義何爲而有録也著其所以祠也祠之舉起於庠校上於臺察而議於宗伯允而後請諸上詔俞焉而著於令矣則何録之庸昔在宋德祐間北兵既深江淮奔隤退以吾常爲徼葢去亡無幾而姚陳諸君子倉卒起任守孤城抗大敵力盡以死有餘憤焉文山公嘗謂常爲宋睢陽諸君子其廵逺乎非耶此其忠義之爲烈乆矣乃若其蹟存乎國史史之外有郡邑志志之外有家乘有墓碑有序跋哀弔諸作而尚論者於是乎徴是故録不容己也嗟夫國於天地有與立焉者忠義是也忠義在人爲道爲志而氣實配之養自夙成發由𠂻出倡焉應焉雷行風動唯其所在城池焉於斯爲險甲兵焉於斯爲利蓋屹乎有不可犯者若夫成敗數則存焉而吾浩然之塞固不可泯也傳所謂雖無與立必有與斃者非若人誰其以之故郡之有祠君子曰禮或者謂元祀之稱秩九原之與歸皆隆徃也徃者無聞亦何與生者爲而不知教道實行其間蓋如是而偷懦作如是而貞毅奮如是而奸邪懼俎豆尸祝於前頌歌慨嘆於後而箴規文告顧若有不能及者祠以一郡而風於天下烏乎其微而逺哉司韶倡是舉而録以終之遂成一郡之書吾侯侯圖是之傳蓋天下之志也肇祀之歲常城成㓂殱於江斯禮也其時哉因併著之殊恩晩福詩序户部郎中錢君世恩得請歸養之七年爲正徳乙亥其母王太宜人夀八十而康强如六十七十者邦之縉紳大夫士咸爲世恩慶之世恩問所以爲祝言之首者於其姻友邵某某既謝不敏然嘗敬觀太宜人所受誥詞有曰尚期晩福益迓殊恩者大哉皇言其今之兆乎請以是爲祝先是太宜人夀六十世恩爲禮部主事太宜人始封太安人饗其禄渥哉上恩國人稱福焉繼而夀七十世恩署郎中於工部太宜人進今封饗其禄渥哉上恩國人稱福焉當是時世恩在朝太宜人在里第相違數千里養雖豐未躬也未幾世恩遷今官疏請終養上鍳其誠許之於是太宜人傅内政於諸婦者若干年矣世恩率諸孫諸曾孫若干人晨夕侍焉内承心志外適氣體日以繼日用能有兹夀於戲休哉書稱五福其一曰夀説者謂福以夀而後享故是焉先然夀原於數保之在德而養以介之養子職也仕則有臣職焉有臣職則命自上制上予之歸而子職其職夀於是乎有與焉惟太宜人恩自上出福自上錫以今視昔固有出於尋常萬萬者矣繼是今耄焉期焉登乎上夀斯恩斯福日感之而日饗之而日迓承之其奚窮乎故是焉祝舎是其何詞之以某也不徳方蒙賜告侍吾母太淑人養聞錢氏之舉與有光焉敢述兹文太宜人前進士沂州同知萬松公子也其配贈工部署郎中南邱公其子則世恩其仲也君子論徳皆謂之稱詩凡若干首送山東布政使元山席君序正德九年秋七月浙江按察使元山席君文同擢山東右布政使憲副江隂髙君曾唯以予知元山請贈言焉元山始自蜀省𢎞治已酉發解第二登庚戌進士出尹郯城入為工部主事改戸部進員外郎累遷河南按察僉事貴州提學副使河南叅政至是長憲兩浙凡歴中外若干年士望日起以著昔有論士於宋嘉祐之世者曰以通經學古爲髙曰以救時行道爲賢曰以犯顔諫諍爲忠蓋一時之言也而士之爲道具矣我皇明承平百五十年𢎞治中先皇帝在位治法隆古人才視嘉祐爲盛時若元山葢兼有之元山博綜羣經而原性命逹經與權尤深於春秋蓋吾聞諸王克勤氏其爲文章出入子史粹然典則而先民是則蓋吾聞諸劉用熈氏胡仲光氏其行已如其言蓋吾聞諸錢世恩氏陳嘉言氏其爲書有漕船志者具綜理之才兼變通之識君子謂可以觀經濟焉予之爲漕録也蓋多取之故於遇元山最晩㑹亦最疎而自謂知之最深又嘗見其所上災異疏指切時事累數千言披露激烈有犯顔諫諍之風焉其行道其救時所謂兆焉而未大者也今既總憲而復長巨藩道不於是而大行乎天下之大政有六焉卿倡於内牧承於外内分而受成外合而宣力要於阜民而已矣元山兹行其地牧也其再陟則卿也道行於卿而具於牧吾兹爲元山賀之元山通經學古者也抑先是有試焉以若所已試而有位於卿加以他日犯顔諫諍之力致吾君於隆古之治則所謂行道救時以收平生學古之效將於是乎在矣寳不敏賀焉以是贈焉亦以是元山北行過我於錫何以處我哉恩思録序南京某道監察御史麻城汪君端甫以三載考最勅贈其父坦庵公如其官母某氏爲孺人得命稽首拜受曰是惟朝廷之渥恩臣正不才何敢當抑何以報既而泣再拜曰是惟吾先世之善慶而吾父克成之也是惟吾父義方之教而吾母克佐之也正則何以致之雖然有禄以祭不如以養有官以贈不如以封悠悠我思將何及哉葢端甫於是乎有餘情焉大夫士之知端甫者咸賦詩以揚其美而且慰之君子為之題曰恩思之詩端甫萃而成録緘以示寳昔寳為守於許而端甫典鈞之教二州比境故寳得與端甫遊端甫嘗述其父母之賢若曰隱居養親博渉書史能為聲詩仁厚和易犯焉而不校若易所謂肥遯貞吉者吾父有之躬蠶績謹饁餉賔祀孔時嚴毅而貞順若易所謂無攸遂在中饋者吾母有之寳聞之爲之起敬以是知其善慶之有成也又聞端甫在鈞州抗顔作範以振驕惰乆而能恒師道立焉故少師馬公州人也稱爲賢師三典文衡皆稱得人於是少師公位冢宰端甫以知者薦召至京師簡擢南京江西道監察御史至改今官前後凡若干年嘗監額税於内庫閲市肆於都城靖戎於閩藩詰盗於畿内諸郡所至激揚得體且屢有建白皆繫國是稱名御史者歸端甫焉觀端甫之自立而可以知義方之教矣今也歸徳於親祭而思養焉贈而思封焉思之不已而形之言焉君子謂端甫於是乎孝雖然親則不可作矣孝子之道敬共事君以迓後命重為親榮祭以大夫贈以大夫冠冕以象之鼎爼以薦之金石以銘之其思也如或見之且有令名以震耀於永世端甫之心庶幾慰焉爾矣恩思之思君子當繼其聲焉録不亦宜乎於是乎序使西日記序使西日記記使事也正徳癸酉今致政太僕少卿姑蘇都君元敬以禮部郎中奉册封之命西如慶藩自京師至寧夏而復歴三時行數千里日記於是乎書比致政歸都水郎中謝君邦應方視水東吳見而梓之夫使之重於君子尚矣孔子論使嘗有取於専對不辱當是時列國交聘抗禮執言各愛其情故使之難如此今天下一國四方無虞其在海外亦惟大君是尊敬承惟謹茍無愆儀越度於使稱矣所謂専對不辱今於何有而君子猶是之尚者重命也抑致命之餘有交際焉有臨觀焉有賦詠焉有聽采焉有考閲焉有感且弔焉交際可以觀義臨觀可以觀趣賦詠可以觀才聽采可以觀識考閲可以觀學感且弔可以觀情具是數者則於天下何徃非宜而獨使哉使使焉而當列國之時所謂専對不辱者亦奚難之有是故君子重使不惟其事惟其人不惟古人今之人皆然吾於君斯記也重嘉之君好古博雅粹然文儒使乎未足以盡君君平生所著亦不止是别有傳者兹不著松雲鶴逸詩序松雲鶴逸詩者客賦以爲憲使吳公夀也正徳甲戌公謝山東總憲之政而歸明年乙亥公之年於甲子為復始諸子輅軾轍請以衆賔為公祝之春王正月吉日惟望設燕於堂儀物兼備郡公縣侯鄉大夫士至於姻友羣然畢㑹能詩者賦焉君子什而題之曰松雲鶴逸之詩公昔以夢鶴爲别號先是數年公爲監察御史逆瑾煽禍養晦家居嘗大書其燕室曰松雲鶴逸盖用自况乃今再起而復遂焉故賦者以之厥既成什輅等詣予請序夫鶴一鳥也自經傳以來見於紀載多矣率未嘗有以凡禽視者蓋羽蟲三百六十而鳳凰爲之長其下為鸞為孔雀為鶴而鵬則怪而荒矣故世之儗人者修偉則於鶴曠逺則於鶴清高閒適則於鶴且志有之聖人在位則與鳯凰翔於甸是故以徳則鳳其聖也鶴其大賢乎以位則鳯其君也鶴其大臣乎葢其理如此故隱而能彰為九臯之聞近而能逺為萬里之志然而知中秋則鳴知中夜則鳴其於鳳徳復有類焉逸而能乆為千嵗之夀亦固其理也哉公㓜負異質博學而文慨然欲自見於天下頴之所露見者稱歎而清詞麗翰落筆成章葢自諸生至舉進士厥問日起其為九臯之聲也乆矣繼而遭際先皇帝臨御公由行人擢御史廷有昌言臺有公議嘗出按於雲貴於河南風采震耀於凡山川紆曲天地圜方一再舉而悉見之及簡擢憲副奉勅飭戎中州作鎮於曹維時㓂警孔棘公以雄才竒䇿屢至克㨗今大司馬長洲陸公以御史大夫總制諸軍嘗疏上公績既而總憲山東表然為庶僚綱紀萬里之志於是乎一試焉所謂鳳凰與翔者非是謂耶乃若知夜若秋長鳴而終舉之信哉乎公之於鶴也斯其深矣公嘗為鶴謀必松焉與巢必雲焉與游鶴於是葢有無心而㝠㑹焉者今夫雲變而無方於道為智今夫松節而有貞於道爲仁鶴乎鶴乎周旋其間其靜也松其動也雲蓋不知千歲之將至也以是爲逸可謂天下之真逸矣鶴乎鶴乎其謂公何祝公之詩以是興焉其可也以是比焉賦焉其亦可也某與公同學且同舉進士同立於朝者數十年蓋知公者莫如予顧予勿藥之初不能與兹燕也請以是祝因以爲序魁字屛序大魁字一宋丞相信國文公手筆也𢎞治辛酉予視吉安郡學獲觀焉而摸之以歸有請屛而揭諸吾學尊經閣之下者予曰吾意也斯其稱焉爾矣越十有五年正徳乙亥邑令平溪侯侯世卿方崇學事字於是乎始屛君子以是知斯文之將大顯也是歲秋八月丁祭後三日具官邵某記叩虚集序叩虚集者今致政夀府長史澹成楊先生所著也其名叩虚則先生所自命蓋取諸晉陸機文賦語云蘇子瞻稱韓子文起八代之衰若機之文蓋其所謂矣而先生取之何居取其論而不取其所為文也夫文至韓子而盛以其原於六經也其在當時變而之古功亦大矣然而唐末五季至於宋初猶不能盡變焉至歐陽子出始尊用韓文而後復古之效乃至於今蓋歐陽之後有程朱二子出焉以明六經之道六經之道明則文之出於六經者固不得而易也歐陽倡六經之文程朱倡六經之道道於斯則文於斯顧論功者以道而文不與焉然則文之在天下爲之難論之亦豈易哉先生少敏力學辯博英邁凡所述作言以意出意盡則止而紆徐衍迤渙發條逹有歐陽之體焉徐而究之其為言一宗乎仁義而道徳是歸葢程朱之遺也其視所謂八代者先生不惟不屑爲亦有所不暇爲矣而叩虚之云顧不以人與世而棄焉先生之爲道不亦博且光哉先生舉𢎞治庚戌進士自請教授金華擢丞南雍至今官以老其言行志節介直方嚴有符乎其人者君子觀其文可以知其人矣集凡若干巻總若干篇某於先生始兄事之晩幸隣並受益宏矣集之序先生屬焉其何敢辭送熊山人序予之治精舎於恵山也歲丙子十一月始落焉適董道卿自蘭溪來予與之入觀觀已行山中西至聽松庵庵直綉嶺予草堂在焉去予世墓二百歩許道卿左右視忽指其地曰此有吉壤百歲後可爲太夫人夀藏雖然吾目力淺未若豐城熊山人山人者挾其術遊吾金衢諸郡有年矣自吾師楓山先生以下諸大夫士皆稱重之吾今南歸以公命致之當來來則問焉其可與否將於是乎在予曰有若人乎幸爲我必致之今年丁丑春二月山人至予與之逹觀於山中如道卿之所之其言如道卿而加詳焉其稱中峯左右岡阜前後水沙去來㑹合皆本諸其書而妙出其目予雖不知地理知其言之不誣也明日予以語吾友憲使海洲吳公公好言地理論者稱其精覈雖専門有所不及及見山人尤信重之㑹有女之䘮遂用其言以𦵏且爲夀藏於青山惟山人之指於是山人之名在吾錫猶其在金衢諸郡也秋七月將西歸是冬期復來而請贈於予予遂叙以贈之海洲公以下贈詩者凡若干人山人尚質有名與字而未有號錫人謂山人盍請號焉山人以告予號之曰雲洲蓋取諸王勃氏滕王閣詩云菊雪倡和詩引正徳壬申夏予得請侍養歸越四月同社諸君約爲菊之觀又三月爲雪之賞席間有詩一倡羣和凡以冩興而已非有意於聞也既而和者日多遂成巨巻靜觀施君乃刻而帙焉自是將有聞者矣夫事出於閒暇道擬於息游戒寓於太康盟尋於乆要而興寄於真率前輩君子有遺風矣乃若菊表晩節雪徴歲寒某也不敏亦將有意焉顧未嘗昌言於篇而徒以聲律是聞是固非所敢先而徴諸他日其或不可缺也靜觀是舉抑亦有同予者乎遂復僣書諸首簡是歲冬十二月既望容春堂後集巻三
