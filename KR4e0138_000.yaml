body:
  text: 容春堂前集目録别集類五明卷一辭賦卷二古詩卷三古詩卷四五言律詩卷五五言絶句卷六七言律卷七七言律詩卷八七言絶句卷九雜著卷十雜著卷十一記卷十二記卷十三序卷十四序卷十五表傳卷十六碑卷十七墓志銘卷十八墓志銘卷十九書簡卷二十祭文臣等謹案容春堂全集二十卷後集十四卷續集十八卷别集九卷明邵寶撰寶字國賢自號二泉無錫人成化庚辰進士授許州知州入為户部郎歷官南京禮部尚書卒贈太子太保諡文莊事蹟具明史儒林傳寶覃精經學頗能窺見原本與明季諸家托拾空談浮夸無實者相去迥殊其舉於鄉也為李東陽所得士故其詩文家數皆出自東陽東陽亦以衣鉢相傳許之當寶以侍郎豫告歸東陽作信難一篇以贈稱其集出入經史搜羅傳記該括情事摹寫景物以極其所欲言而無冗字長語辛苦不怡之色若欲進於古之人且以歐陽修之知蘇軾為比其心之相契如此然東陽所見祗有前集其後集續集别集則寶後所續編東陽弗及覩也寶文髙簡有法雖氣局尚嫌拘狹要無愧於醇正之目詩則清和淡泊尤能抒寫性靈鍾惺稱王李盛行以後真詩惟邵二泉其言雖未必盡當而論詩家正派當時實無以過之蓋其風雅可匹吳寬而經術較深峻潔可比王鏊而才力更勝正嘉以前固卓然為一巨手矣其集稱容春者乃其先世所居堂名寶重修復之因以名集云乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀容春堂原序文之製大率有二典重而嚴敷腴而暢嚴則望之巉巉其可畏者也暢則即之溫溫其可愛者也皆文之媺者也而兼之難文如韓栁可謂嚴矣其失也流而為晦甚則僻塞艱蹇聲牙而難入文至歐蘇可謂暢矣其失也流而為弱甚則熟爛萎薾冗長而不足觀蓋非四子者之過學之過也學韓栁者束於法有意而不得逞學歐蘇者惟意之適而不知法以裁之是二者皆過也於乎斯亦難矣董南畿學政侍御張君手一編授豫曰是為户部侍郎無錫邵公之文鰲山蓋嘗師焉將梓刻以傳惟先生序之初豫承乏翰林北上公時始得解過豫舟中出所著視豫固已超然脫去凡近雖不得即而友之亦未克沃而忘之也其後官於朝公以進士補外久之召還豫且以告歸今兹公亦告歸地且孔邇而衰病錮之不能朝夕數數獨時得其文與詩讀之體裁簡重興寄閒逺未嘗不改容欽歎今乃得其全觀之知公之用力於斯也久其志直欲追古人而並之不屑為近世之文也是足以傳矣或問公之文焉所師曰豫也讀之不能窺其所至又安能知其所出然妄意論之公蓋師韓而不暇及乎其他者也其古歌詩蓋有晉魏之風焉而有不同者何師其意不師其詞此固韓公語也師韓而不必似韓此善學韓者也雖然此特於其外之文耳抑復有深於是者焉未敢遽論也公年未及懸車當朝廷渴賢之日方將復起大見於功業不徒托之文章而文章之出將日富而日深又非豫所能涯者姑題其首以俟併以復侍御君以為何如也正德丁丑嵗秋八月望震澤王鏊撰文之好尚不同而相信者絶少蓋文者人心之聲信其人斯信其文矣人豈易信哉見之而不能知弗信也知之而以為不足信弗信也杜子美之於李太白韓退之之於栁子厚張籍皆極推許而三子者有異議焉惟歐陽永叔於蘇子瞻稱其竒才欲相遜避而子瞻心誠服之至以比孟子此何哉信不信之間耳世恆說古今人不相及今之君子果於自信而無所取信乎人故雖有竒才博學或陷於一偏而莫之覺於是益歎夫相信之難也豫於南畿之試得邵君國賢意其非場屋士見所為古文歌詩愛其峭拔與之論焉數年而見之則加厚矣愛其簡潔與之論焉數年而見之則又加裕矣比乃見其容春堂集出入經史搜羅傳記該括情事摹寫景物以極其所欲言而無冗字長語辛苦不怡之色若欲進於古之人以幾于口無擇言言必有中者蓋國賢信我太過而其所自信者固存獨非有所合而然哉國賢清修好古自領科第以來為州守為郎正督學政厯長藩臬更踐臺省雖公務叢委而條貫整飭未嘗以文廢政屬以母老乞終養不得請僅豫告以歸省色養之暇大肆力於所謂文者故其所得益深而猶未見其止也作信難以貽之國賢名寶成化甲辰進士今為户部左侍郎容春者其先世所居之堂國賢所修復者因以名集其他集尤多豫獨備見其前集云長沙李東陽撰今天下以古文名大家者彬彬相望也其在東南凡幾人在常之無錫則有若少司徒泉齊邵公公蚤孤力學弱冠即名於鄉既第進士則遊少師西涯李公之門而有得焉蓋自是仕且學餘三十年文日進以邁西涯人物縣衡也實以天下士目公於是公隱然為東南之望瑾晚末無似辱公寵而教之嘗從容問公曰文將安師曰師今之名天下者無以則先進乎無以則古之人乎曰先進而上宋古乎曰有唐有東西漢者在唐兩漢古乎曰有先秦古文在古至先秦至矣乎曰庶乎其亦古也已曰將不有六經在曰六經尚矣夫學文而曰必且為六經吾則不敢也它日問詩公詔之如問文曰將不有三百篇在曰三百篇尚矣夫學詩而曰必且為三百篇吾則不敢也瑾切志之及公以侍養歸自户部而病病愈無所於事則翻録舊所著文若詩日誦諸容春精舍以為樂樂則傳以視瑾使篇為可否之瑾不佞輒繆復曰某者為可某者不為可公則取所可者覆誦焉曰然乎然乎又樂也如是者百七十日録始定凡得文之類篇若干詩之類篇若干其謹重精純蓋得諸宋其雄渾森嚴蓋得諸唐其爾雅深厚蓋得諸漢其近古蓋得諸先秦至其諸篇每曰君子曰云云者則左氏蓋爾也而公乃自附焉於是知公之嘗以詔瑾者信乎不誣然文不必若六經而粹乎卒澤於理義詩不必若三百篇而溫乎有風雅之遺音是又奚啻先秦而已也與哉蓋所得於西涯與所自得焉者厥亦深矣其望東南而名天下也固宜公之諸門人請先刻今所録者為前集公謂瑾嘗與聞於斯集也命為之序瑾不敢沒公之教且樂附名焉乃謹序其委源聲實之槩俾天下後世之敦文獻者於是乎徵公名某字某其奏議公移在别集其後集在續藳其德其政在史書正德甲戌秋八月既望同邑浦瑾撰內至者言焉成文如三精象垂衆湊效乎其職皆化機自然根諸道而發諸氣者也故曰觀乎人文以化成天下六經羣聖人之藴經緯天地綱紀人倫立萬世常行之矩其根深其充養浩然其化機在我文之至也後世敝經則雜敝朴則靡敝莊則散敝潤則流而入卑弱發乎才而語道或淺要諸理而語氣為或衰文云文云乎哉前輩謂太極圖像經西銘自孟子而後未見易傳甚實而自得今與原道並觀相去逺矣數先生者曷嘗屑屑然屬意文事之工理至詞至機有在我者矣豫嘗謬意古文懵於道而病乎其蹐於氣也嘗思名能文者聽命焉心存意往海內士三數人𢎞治丙辰始得㑹吾二泉追訟相見之晚既而靜思之百能愧詘獨吾齒長爾嘗見品士亭記曰其擇也如此廟學記曰為夫子作也白鹿數篇曰為朱子作也及是容春堂集出得盡觀焉曰是文也其是氣也其不離是道也紆徐容與和以平乎莊以潔乎居而不有辨博而不肆黯然其長油油然其光將根幹宋儒標枝秦漢收韓歐數君子之華實乎起衰斯文其先生始乎先生副上卿惜士者猶未酬其望世固有不相易者正德戊寅春仲見素子俊書于雲莊青野莆田林俊撰
