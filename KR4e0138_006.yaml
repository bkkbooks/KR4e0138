body:
  text: 容春堂前集巻六明邵寶撰七言律詩九十四首賜大明㑹典緗函新捧出天衢十載文光照石渠唐作一經徒託語周遺六典始成書聖神功化三才裏今昔經綸萬巻餘遐想先皇初詔日洞觀千古欲何如醴陵旋節三月湘東應召還君恩免過萬重山正緣岐路生愁思總為庭闈動笑顔雲與新篇封石壁風隨舊節度江闗百年報答知何地只在丹心一寸間歌風臺欲上髙臺水漫波向來遺恨付長河雄圖自謂千年少猛士猶嫌一語多白日無端江草合赤龍何在野雲過登臨更作它時約却向中流聽櫂歌苦雨江寒五月擁重衾雨滴空堦夜夜深無地誅求貧到骨有人慟哭苦闗心百川何處堪囬砥三日它年本作霖坐對青燈頭欲白敢言吾道在山林擬遊慈恩寺用涯翁韻春殘纔作探春行古寺尋僧懶問名近海景多頻立馬對花情劇更聞鶯鏡湖敢乞君分賜寶地偏敎佛主盟却憶江南如畫裏萬峰青接水邊城謁文信國祠春色無端滿地莎傷心燕市偶經過清風又讀忠臣傳白日如聞正氣歌社稷一身惟死是綱常千古有功多瓣香未了平生拜囬首荒祠獨奈何答錢户部世恩梅村東去問前津自折梅花欲贈人别恨却尋何處在寄聲翻笑向來頻魚龍漫擬秋為夜草木先知地有春莫向尊前論出處綵衣公亦賜歸臣聞秦修敬訃太守官封處士名十年詩社忽凋零傷心忍讀蘇洵傳好事爭誇許劭評下榻獨懷它夜永濯纓誰愛此泉清故山回首相從地一曲哀歌萬古情陸宫詹亷伯輓詞謾為斯文嘆寂寥長安誰賦楚人招江山竒氣還千古臺閣清銜在兩朝門刺有名塵榻靜院燈無夢玉堂遙西風落日銘旌短回首鄉園恨未消李絅菴渠南一老亭詩名晩歲滿江南却向渠南小結菴塵起汚人聊作界客來看竹亦容㕘迹如盤谷還嫌僻計似莬裘已絕貪不用丹青寫行樂白頭臨水影涵涵通州遇老母生日辛未去歲兹辰正在家笑傾春酒對梅花日長自計還千筭地逺誰敎各一涯天上鸞書重雨露山中萱室自煙霞慿誰為報真消息己謝秋風奉使槎少師公祈雪齋居代啓奉問白頭燈火玉堂深三嘆朱絃對古琴庭鶴夢清知夜氣江梅花蚤見天心日將南至迎修景風自東來問捷音咫尺門牆勞跂望五雲城闕漏沈沈餘干寄秦擇之别君風雨便隨舟剛得山亭半日留亂草沒泥還宿鷺宻雲籠樹更鳴鳩山中一館鄰僧寺沙際諸生雜吏郵慚媿舊遊無可道湖船連夜發饒州題顯公房寓泉􅌪滿道清隂綠樹遮肩輿坐我勝乘車僧頭似雪逢應晩山價如金欲敢奢一榻此堂真有否百年吾道果非邪不須更索行􅌪記擊壤歌中日未斜答楊杭州京兆重分郡守符春風花鳥動西湖鄴侯功逺千年有坡老情閒一事無益下真成軍國計虚中元出廟堂謨還朝請畫東南水不但流民可獻圗僧圓顯請記行􅌪以詩答之隨意雲山放我歌不須文字記行􅌪夢回赤壁月還小濯罷滄浪水更多靜定故知禪榻在虚明今謂佛燈何相逢莫認鵝湖寺舊學無朋鬢欲皤膠山忠定祠次施克和韻壯懷千古了難償太息羣隂剥一陽鳴鳳未聞聲徵角戰龍曽見血元黃薄茅藉處非無地老樹隂中合有堂風雨去城三十里滿山簫鼓為誰忙重登松風閣天風滿榻坐㕘禪上有松聲下有泉髙閣我來三紀外老僧誰起百年前茶罏夜濕曇花雨畫壁春銷刼火煙最是瀧岡猶未表北山回首思悠然卜居次西涯公時公欲居宜興偶侍西堂坐夕隂可勝歡喜動幽襟鄰州卜築聞新語晩歳依歸愜素心不朽功言方逺大本佳山水更髙深願敎多植梧桐樹次第行聽彩鳳音寄莊定山幾年書㫁定山翁極目江天送去鴻野史不妨朝報外病懷長託醉吟中短笻向晩雲隨在小榻逢秋月與同尚憶長安吟别地夜深風雨燭花紅沛縣懷古次韻臺有遺基水有濱漢家碑刻未成塵獨憐沛邑還稱沛却笑秦人自滅秦猛士存時猶北顧故鄉歸日正東巡城隂秋草孤舟路徃事茫茫問野人盂城即事盂城驛前吟夕陽髙郵湖上好秋光紅分菡萏初經雨綠滿蒹葭未受霜逺浦有波皆浴鷺近堤無路尚垂楊南來時見呉江棹却倚船窻問故鄉經元世祖廟次王應韶韻斷碑閒倚廟門斜徃事傷心付一嗟春草長沙仍牧馬晩風疎樹偶栖鴉角端虗憶傳神語劈正何從紀夢華誰向瀆山陳酒海飛塵如雨亂聞蛙和呉太史種竹此君不作此老客庭院真應長綠苔古風藉汝數輩在今雨從渠何所來歳晩簡書留石室月明環佩傍瑤臺亦知逕造有故事一月須過三十迴謝方石以祖母旌門有作次韻懷清臺倚海天遙臺上風吹宿瘴消雲漢章回聮北極山川光被表南條寜無鄉里評如史信有閨門禮似朝白髪賢孫拜恩地貞䰟應亦望層霄遊從姑山回首麻姑復從姑江中煙霧兩峰孤伊人似玉丹崖阻吾道如川白日徂曽是待年終偃蹇也應閱世未糢糊晩來數㸃神靈雨莫謂巫山作畫圗遊麻姑山二首千載荒壇故姓麻刼灰漫道在煙霞泉流雲壑真能勝海變桑田或是誇此日珮蘭貽水裔它年笙鶴問天涯不須更索題名記八月星河有使槎幾曲登登破嶺煙一亭一曲興超然開雲田畫殷人井轉壑泉分禹日川獨鶴每翔新表外雙松長倚舊壇前顔碑謾為傳聞録屈指于今又許年都下諸友聨句見寄用韻答之千里懷人似望仙春波碧漾草青芊周京漢署天寥濶楚纜呉檣地接連山下石鐘誰定論江邊鐵柱或虚傳欲慿山水尋詩句録取圗經次第箋山行覓句盡日山行苦乏詩此山佳絶句難竒秖應使者孤吟在安得仙人一和之千澗水流皆獨徃萬峰雲起似相期春來漫興何須記它日重尋亦未遲東林寺東西林在萬山中石塔稜層見逺公人結淨緣還未了天留佳境本無窮千峰雲影朝還暮一夜溪聲雨更風欲覓蓮花何處是舊池惟有水涵空謁李忠文公祠江上孤城盡力支忽驚風急仆旌旗已無天訴吾窮矣空有人書某死之不負大魁真此地終為厲鬼是何時何當合祀余安慶再刻文山雙廟詞送徐畊隠畊隠少師公叔氏白頭京國為誰來星聚應占近上台天下仲淹元老在山中宏景隠君回竹林有句人爭和雲岫無心鶴漫猜相業家聲千百世義莊新倚洑溪開别後憶張元之敝裘羸馬未勝寒近别其如數㑹難郢國書來心獨切江州衫在淚初乾月明西寺陪僧坐天濶東樓挾客看憶昔不知今又昔玉河風雪夢長安夢松露公几杖相從十載前東曹齋閣故依然逺書淚落西江水寳提學江西時嘗得公書有林下不能忘之語舊夢心懸北闕天在浙江時又嘗夢與公同入朝秋渚孤鴻還信信春風嘉樹自年年平生手疏遺編在海内于今已有傳南昌感舊舟行何處不通津六載章江憶舊巡南浦但知乘傳客西山獨識倚樓人壇松月靜齋居夜庭草風和燕坐春還向東亭問叢竹别來煙露幾回新湘東夜宿到處春禽弄碧楊山行三月雜暄涼宜春臺上呉闗逺萍實橋西楚路長使節乘風朝渡水客樓聽雨夜焚香憲臣自識均勞義不向長沙弔洛陽哭王都憲汝言未盡平生已葢棺中丞風采豸為冠君臣藥籠諸藩小江漢戎衣六月寒嵗月幾何驚世短風塵如此歎才難舊遊却憶錢塘上淚滿遺書不忍看贈户侍王德華分賑東行燕山東去馬駸駸百姓應知使者心野有赭衣人似獸途多菜色米如金天開岱嶽増新觀春到甘棠復舊隂若過青州須弔古范公祠下石泉深謁謝叠山祠從容就義幾封書三百年來養士餘商老不知周粟富晉人方恨楚材虚庭留舊柏生同勁鼎薦新薇死亦臞有詔作人無事日江花江草正愁予謝方石先生輓詞我歸林下公長逝千里詩筒望不來海隠本非唐少室山居真似宋徂徠雅歌何處聲相和野服它年手自裁有石大書明祭酒古松隂裏墓門開謝邑令請鄉飲迷途嵗晩尚茫茫謂我嘉賓詎敢當揚觶有人慚杜舉承筐無地想周行一經講受曽它日三老周旋即此堂為語縣侯休見訝萊衣方作小兒狂太伯廟太伯新祠古讓鄉老梅根畔水流長十年夢寐三間屋萬古綱常一瓣香扁榜大書元自孔廟額曰至德衣冠遺製合存商向來曽擬荆蠻曲許作迎神第幾章與毛三江訪匏翁故第暮歸有作久矣門牆夢寐中偶來還喜故人同賦詩尚有庭前樹醒酒兼多竹外風百嵗遺情孤綠野一言嘉惠重南宫甲辰放榜日公在禮部堂揖予而進之謂諸公曰此邵國賢也予至今感之不忘賢郎不負箕裘語地下真堪慰乃翁通州遇老母生日去嵗兹辰捧夀觴一時冠葢總成行萱從薊北還新夢梅到淮南有蚤香寓客館看東野線望慈闈著老萊裳稀齡只在明年是春酒親持笑上堂答成户部汝從一日看君或兩過相思還問夜如何西風烏鳥聽時切南國梅花夢裏多吾道也知元尚白此心空有賁如皤舊傳康濟無它術數􅊦緼絪是太和次崔世興西郊韻炎風吹雨滿山陽時在淮安正想西園七月涼醫國自知投藥苦登山猶怪賦詩忙篇章獨得君多有几杖相從我亦嘗撫巻匆匆又陳迹江湖回首寸心長途中次白㕘議輔之舟行數日逺塵歊秋旱長河潦未消程趣漕兵無邸閣報傳候吏有津橋道傍垂棗全供鳥野外飛蝗半食苗幾度觀風入村落輿人堪誦不堪謠登旴𣅿山憶陳明之汴泗南來見此山米翁書在翠峰間唐人漫詫僧歸塔宋代曽悲使出闗新訃忽迷雲樹碧舊題空拭雨苔斑欲登髙處誰相伴黄鳥聲中一嘯還和李方伯惟誠西湖煙樹曉依微正是平軒憶我時采石眺緣仙客晩金山留為故鄉遲席隨爽氣真成畫筆冩幽懐不當詩它日别情君記否映江樓上酒盈巵劉廣德介夫至千里緘書兩日前今朝丰采復依然金蓮寺裏觀風地白鹿齋中聽雨年夜雪夢回開小逕秋濤觀罷乏平川梅花已有真消息不用江南驛使傳十賢祠用唐人韻千年祠宇此重開獨為諸賢酹一杯澗石不隨龍化去嶺雲還與鶴歸來春風谷逺嚶嚶鳥夜雨庭深㸃㸃苔聽罷雅歌賓客醉共敎童子汲泉回又用唐人韻九峰迴處石泉幽逝者應知感舊遊萬里風煙吾白首千年林壑此清流松筠無恙時方晩黍稷惟馨嵗有秋却憶匡廬歌嘯地幾回春草鹿􅊯􅊯除夜雨爆竹聲中破積隂東風庭院晩沈沈閒評經世何人手老惜流年此夜心宸極有臨香几近慈闈無恙酒杯深呼童起聽南軒雨却報梅花已滿林寄秦提學國聲憲學名官媿我曽得君相繼價逾増鎔金有製元隨可璞玉無形已付能河廣正誇杭一葦崧髙還愛駐雙藤許州品士亭如在校罷諸生請試登李惟正燕予通州漕府感舊有述追懷張中丞邦鎮舊館苔荒郭外坡己巳冬予寓此四十餘日故人相約又來過昔年盟有鶯聲在它夜詩如樹影何東道意勤三設燕南風調逺一賡歌却懷襄野經行地沙草茫茫隔潞河送呉方伯獻之赴山西三月行旌度太行和風甘雨百花香呉公舊政曽於漢晉國餘民本自唐雙闕每瞻星北極諸邦兼領甸西方不須久作江湖念回首從容是廟堂雨坐有懷蕭蕭風雨不知春獨坐東亭感慨頻四海有懷非我力百年無愧是誰身翠留竹節心期逺紅入梅花眼界新尚覺平生詩興在短吟須寄社中人曉發南浦西山南浦隔江流又作新春第一遊舟趂微風斜渡水輿穿宿霧漫經邱此行更切真才望何處還多麗景收東向匡廬興無限五峰青㸃白雲頭得錢希翁詩簡雲厓傳得步虚歌回首蒼生奈爾何觴酒誰家延北海瓣香它日謝東坡江湖秋水瞳兼碧花鳥春風鬢獨皤共説陶潛能避俗却將心事託荆軻贈周作之别來風㫖轉深微雨雪青燈坐掩扉江晩不堪滕閣眺春初應及楚帆歸尋常未必鍾期少五十何妨伯玉非它夜南沙重下榻匡山雲尚在征衣次作之鄱湖木落天雨霜故人西來故意長劇談今古每半夜漫閱乾坤還一陽也知白鹿昔年夢却憶紫陽何處鄉勸君且束舊詩巻回首春風踏去航奉次少傅徐公内閣賞芍藥五雲輕閣鳳樓隂春入雕闌故故深培植敢忘明主力調和真見老臣心彭城譜絶看新續魏國盟寒許重尋却與長安添紙價詞林傳和賞花吟謝少傅公惠梅子誰將碧玉錬成丸寒逼人間瑪瑙盤數顆忽分元老賜十年如在故山看清含曉露真消渴老向春風常帶酸嘉實秖應金鼎内調和功在頌皆難呌巖次陳户部嘉言師子逾江漫作竒此山真有物司之懸藤不與雲俱化浮石應隨鳥共馳郡將遊來曽易榜談廣信嘗改為笑巖民曹别去肯留詩山僧莫訝登臨晩日落髙天為我遲聞呉甯菴轉南京學士二首山水江南是舊遊公來誰不擬仙舟髙陵雲護鍾山曉清禁星連閣道秋新制有詞全逼漢舊章無恙正從周封君老向荆溪上十日三書慰白頭清風每有江東興此地我知公欲來天上靈槎連震澤人間嘉樹近蓬萊風雲長護宣麻署日月遙臨視草臺聞道老槐當卧閣北扉回首是三台張家灣東遇王㕘政德華晉溪北上我南遊潞水東頭半日留何處可忘君父念此行須為廟堂謀百年雅頌知能夏千里歌謳望有秋指日王師收戰績勿言江左舊風流釋菜濓溪書院貽王僉憲景昭一脈濓溪萬古天江州名自道州傳有神真與泉俱活無象還留月自圓將濟晩舟猶滯在未成春服已悠然東風昨報新消息許我重栽玉井蓮謁東滙澤陳先生祠圑山㘭裏奠公堂何意重來致瓣香史及闕文憐誤豕禮將求野幸存羊心精已與經行世德義元堪社在鄉尚欠新碑書嵗月祠官稱秩有封章陳方伯晉菴輓詞歸雲堂下雨毶毶哭寄長歌為晉菴詩律獨追唐逸響史評常陋晉清談入㕘台鼎階無幾退謝藩垣疏有三百嵗髙名碑石在松隂十里錫山南過南康突爾匡廬又眼前白籠雲氣碧籠煙天留風景都無恙我與山靈故有緣晴雨漫須詢五老寒暄忽已計三年獨憐渴思今如許為汲開先寺裏泉見五老峰倚櫂看山夘到辰白雲何意不隨人久要未恨相逢晩逺望還輸獨對真獨對亭在五老峰下予所作坐客眼青髙踞榻飛仙鬟碧淺籠巾它年問答應多事一笑而今共出塵予至廬山有與五老問答詩讀成布衣祭忠文成器餘姚人正統末聞劉忠愍死獄即邑中龍泉山頂為文祭之祭畢以餕頒諸同志其文歴述古今權奸之禍凡二千餘言人謂之祭忠文今其地謂祭忠壇萬古興亡淚滿箋一壇遙憶祭忠年大書筆在慿誰執髙調歌沈待我傳無地可投湘水裔有天應照越山顛布衣閔世尤堪弔何處松楸是墓田括王勃詩髙臺迢遰絶浮埃俯瞰長安四望開綠樹搖風春澹蕩赤城映日曉崔嵬倡家今夜銀鞍去戚里它年翠葢來不用哀歌對明月柏梁銅柏總莓苔送楊衢州磐秋晩山城别駕臨水清石淨萬峰深風迴祥鳳輕千仞日轉甘棠愛寸隂吾道百年皆此地斯民三代復何心趙公祠下瞻趨地共訝今來又一琴憶東林精舍寄示華生雲東林寺裏舊書堂三十年來野草荒百囀未忘初鳥韻一株猶剰晩柑香山懷龍阜神俱逺水問梅村脈故長寄語雲生為磨石客中新記已成章舟中有見憶老母老梅花吐北堂前春酒初成婦薦筵事與志違頻易地心為形役幾經年天恩於物真能厚子道如臣敢自偏檢罷計書方靜坐不堪鄉語過呉船兩過德州未謁董子祠詩以志過地産醇儒郡有光兩來猶未謁祠堂春秋義已傳遷史誼利心曽辨粤王拜位定依庭柏影薦儀空託沚蘋香孤城回首風塵裏讀罷遺書送夕陽憶母手線縫衣欲問寒慈顔時向夢中看世間盡道為官好天下無如别母難讀罷家音添鬢白書成國事剰心丹青燈自照塼河夜回首江南路渺漫再至德州八月中嘗寓永慶寺數日奉使南來又德州僧堂還記舊淹留星明北極天初霽風掃中原霧已收野曠尚餘千里水漕荒應負一年秋諮詢未盡皇華體賦罷䍧羊獨倚樓滄州聞官軍之捷寄兵侍陸公露檄傳來捷是真滄州南望正勞神功成魯國追戎地斷許唐年入蔡人有夢維魚應得水此風何草不回春北辰瞻仰朝廷近欲擬韓詩獻紫宸再過清獻祠江迴春水沒荒磯石上看詩記舊題吾道百年開白日公心千古映清溪鶴留古貌何妨瘦松長新枝尚恨低却憶昔遊如昨日楚雲遙接越東西次呉太史雪中見寄玉河東下似山隂騎馬如船雪滿襟吏散偶忘前日約詩來真見故人心寒侵松骨知多少春入梅腮定淺深欲賦瓊瑤報佳貺獨憐才短負知音弔李憩菴公墓次莊定山蕭蕭宰木晝呼風舊壠新阡北又東防墓未須修孔氏瀧岡真合表崇公兩朝一德功何自五嵗三封眷未終更愛頌聲金石在碧天無際水無窮聞陳行之訃俗學如俳到十分玉溪髙興漫超羣著書筆自何時閣曳杖歌從昨夜聞絶壁倚雲青未了落花帶雪白還紛哀吟一曲無人和擬向西山更哭君贈祝惟貞致仕南還次陳一䕫鶴骨稜稜苦為詩年來此癖已成竒與君撫巻俱陳迹及我登壇竟後期聽鳥有情嗟反哺折花無語贈將離文星夜夜天南極千里長吟寄所思通州留别李都憲惟正潞河堤上望渾河諸老追隨幾度過春興有餘三月小夕談無數十年多東郊正爾歌靈雨南浦何須賦淥波邊馬不嘶青草濶中丞問俗意如何白鹿洞三首五老峰前數畆宮坐慿雲水鎮南東山人骨相千年外洞主心期一賦中題壁定知誰不朽望洋真覺我難窮太山頂上蓬萊近何處青鸞欲御風青山坐我對青衫弔古情多漫與談眠鹿已無人主洞卧龍空有地名菴百年講坐慚虚左萬里驅車願指南吹醒清風天未晩共誰長笑破煙嵐風雨崇朝洗宿嵐古壇髙倚五峰南坐看雲氣秋生壁卧聽泉聲夜繞菴杖履正堪成雅集絃歌猶恐落清談殷勤好語來遊客莫遣飛塵上舊衫送邵僉憲用之復任山東滇海歸來老使君東行還共泰山雲州兼青兖雙旌去天近滄瀛一道分何處秦碑猶可識它年漢詔漫曽聞須公髙攬澄清轡馬首西風日未曛送周工部元弼水部官憐初拜日金陵地憶舊遊時未應嵗月閒供吏最是江山巧索詩秋色催人移棹急客懷逢雨出郊遲靜中經濟堪料理笑把清樽有所期雨坐漫述是日郭仁宏寄小像至鏡中愁鬢欲成皤新畫應慚郭泰和花謝曉風方恨急麥收春雨竟嫌多曲房辟濕頻燒术單裌生寒重易羅滿院青枝飛燕子扣門時有客相過容春堂前集巻六
