body:
  text: 容春堂續集巻十二明邵寳撰序二十七首序陳氏忠孝録序宋常州通判陳公炤以德祐乙亥死於城守贈直寳章閣朝奉大夫越六十有九年元至正甲申修宋遼金三史修撰余公闕檢公之事于樞府載籍暨諸野史未之見也重於執筆公曽孫修撰顯曾時方布衣被徵上書史館諸公意甚懇至㑹檢史庫得公事之始末甚詳傳於是乎立君子謂寳章公忠修撰公孝寳章有遺事若干巻修撰有昭先堂稿若干巻藏于家國朝𢎞治初修撰七世孫天澤始合二編將梓之君子爲之題曰忠孝録既而天澤卒梓不果又二十有七年天澤從子訓手録而藏焉請序於某某十五六時嘗詣天澤天澤出二編者視某某始獲知二公大節于今四十餘年又得尚論之烏乎公之忠在一郡而其時則闗於宋之故者大矣當是時力孤援絶勢不能全公則死矣其授命不屈之跡宜若無知焉者然上戴下履臨焉質焉固亦有神明者在是故侍㒒出自血口能道之塵朽中發故牘可覆視也此豈人力也哉由今觀之修撰公盡力於國史未定之前而天澤諸君又襲藏於家集將逸之際其小大易難固不可以等論然使凡爲君子之後者有修撰之志則爲修撰不然各視其力與時而圗其祖烈之永亦可以言孝矣雖然此以家論也若以國則節如寳章公者史氏當爲天下圗之不啻如修撰焉而或諉諸其子孫之有亡則烏乎可見素先生詩集後序世有詩人之詩有非詩人之詩非詩人之詩而才情風致音調格律皆詩人也則謂之詩人也亦宜曷爲而謂之非詩人之詩也有所重焉者在爾七月周公之詩也巻阿召公之詩也說者謂萬世法程在是離騷屈原之詩也説者謂風雅再變爲後世詞賦之祖然千載而下稱周公者曰聖稱召公者曰賢稱屈原者曰忠而不曰詩人有所重焉者在則不敢以所輕者加之其固然哉今致政右都御史見素先生莆田林公天才高邁尚友千古天下之稱德學者歸焉稱經濟者歸焉稱風節者歸焉公之望於天下重矣而公夙好吟咏大篇短章傳播海内視漢以下諸名家所謂代不數人者翺翔驅馳未知誰歟後先下上而况今之人乎今之論詩人者固不能不先公也而稱且不敢公亦不欲自命乃今之集而公聽之何居盖吾嘗聞公初以秋官郎言事左遷乆而長憲湖南以疾歸越數年起佐南臺未幾巡視江西以憂歸又數年起靖蜀寇功成乃老今又數年年七十而望繫乎天下益重其間四十餘年所至有詩其時與地皆可考焉而所謂性情禮義者於是乎在公在山中時取而讀之其所感者深矣矧公盛德謙虚凡天下之所稱者退然不居賔友過從絶口世事而獨以詩相娯即謂之詩人公其辭諸乎公之績在朝廷國史書之金石弦歌播而傳之是詩之傳將非其羽翼乎此固集之者之心也而或謂以其所輕而加乎其所重亦過矣集凡十有四卷刻於呉縣尹西蜀高君公次今致政少傅䆳菴楊公既為之序而公之甥今太倉知州黄君廷宣復屬某數言於後某獲侍公三十餘年雖未敢謂知公幸竊誦公之詩與聞天下之論於是乎言其文若干卷别有刻者兹不著重刻陸宣公集序陸宣公集二十四巻嘉興守徐君子謙之所重刻也子謙謂公爲郡先哲欲圗表章之以風乎士者厥既修其祠祀復念其遺集殘缺將有重刻之舉太學生項鎮郡人也出其家藏善本更以通鑑考其事之先後而次第焉爲制誥十卷爲奏草七巻爲奏議七卷而子謙之志於是乎成子謙義其舉也則以書屬鎮來請序昔文公朱子稱公經濟之才而我先正正學先生謂求士於二千載間功業赫然而心行於聖賢之道不倍者五人曰諸葛武侯曰韓魏公曰范文正公曰司馬温公而公居其一則公所謂經濟者可知己夫經濟之稱乎才者尚矣而本於道者爲難故惟有道者爲能通天下之志不能通天下之志則動而不知其不可亂也賾而不知其不可惡也欲求事情之切固有不可得者而况不倍於道哉是故由後世而視三代其才之難無足異者間有之則公其人也公初居翰林論思播告禆益𢎞多所謂功業者固於是乎在至其相而當國顧若少焉盖以間於讒佞之故非公之才前後爾殊也不然則諸作具在孰非可徵者哉孟子曰尚論古之人誦其詩讀其書不知其人可乎是以論其世也某不敏敢竊附尚論之義爲子謙復子謙名盈貴溪人以進士爲名御史擢今官嘗見其章疏文告盖於公得師焉其所爲政亦無媿其言云園亭倡和詩序園亭漫興詩正德丙子先師李文正公與今致政少傅邃菴先生楊公倡和之作也時文正公致政家居邃菴公在内閣更觀迭誦間亦傳於人人或一二首或四三首而未能得其全故膾炙有遺味焉越三年侍御天台葉君按我江南於邃菴公所見而録之遂託銅版模焉以遺諸同嗜者惟詩出於大君子是謂大雅然天下之人以尊慕其道德文章之故有不聞聞則誦之甚習自其地而觀之抑亦有若風焉者乎傳之臺閣采之江湖其歸一也侍御君蓋有見矣君自戊寅秋始至厯諸郡縣捄敝恤災圖艱應遽君子謂之得體而登臨弔古且有昔人觀風之意予於是乎蓋徵之詩凡若干首倡先和後大司馬喬公嘗手録之今本實於是出云東麓詩序山於江之南自五嶺數千里厯三衢至天目是來鍾爲金陵東迤北若干里爲潤之北固又東若干里爲丹陽之嘉山其東嶄焉截立曠焉平衍凡五里爲孟瀆其下有石逾瀆之東二里乃有山特起焉其名曰孤塵北東枕江循江東下凡十有五里而止其東南則江海之交常之靖江蘇之崇明皆隠隠在望論者謂北固諸山爲金陵之餘脉至孤塵而極盖堪輿家亦云孤塵之東麓是惟今湖廣按察副使惲君功甫之祖之墓又二里有岡中高其下坡陀凡三起伏始寛而平凡一里所者功甫卜而阡焉以葬其室蕭安人于今十有八年矣又東北若干步有泉出焉東流入于江泉之上功甫亭焉又上有石峒紆逕而登者數仞其傍有石如砥方可五尺上有古異人迹前爲田百畝水匯其中爲方池釣且濯皆宜於斯功甫將爲堂以老而樂哉之邱則内子之兆固其所也功甫在公嘗屬畫史圗之朝夕披覽以自怡焉遂自號東麓居士都憲陳秦二公侍御毛君皆貽之詩從而賦者又若干人功甫書來以圗及詩請序於予予讀而嘆焉君子之節莫大於進退尤莫大於死生明於進退爲哲明於死生爲達唯哲也故未倦而思休惟達也故未衰而思歸洒乎其若遺飄然其若忘情之所發其能已諸君子觀東麓之詩而公甫之節可知已東麓轉而東南距江岸二里有邱嵬然廣可三畆者曰黄山國初有得石碣於土穴者其題曰漢梁王相國惲子冬之墓蓋惲之始祖云又轉而南五里爲九龍山晉唐以來惲氏族葬其麓宋進士諱文之墓亦在焉因并書之郡守王侯考績詩序我郡守王侯之將考績於朝也邑令丞暨吾黨君子若三老有行義者皆問予曰子亦有以賀侯乎予謂之曰三載考績古之制也今行之我侯之績在郡惠在民狀在部使者覈在天官卿而簡在天子最奏則有封錫之詔有遷擢之命吾之賀之將於是乎在兹行也某也病不能餞又何賀爲曰今吏外服者其績之獻率違其時部使者難之也侯以四年而遂行焉於今爲難何故不賀曰昔者侯領郡命於朝嘗受六察之籍而部使者歳時稽之侯於是六者修矣而行之以仁持之以亷申之以共四年之中二荒一兵憂虞荐至廩貸城守侯之精慮蓋有出於朝夕之外者而侯故裕如也蓋吾民受侯之德者多矣部使者惟侯之留以應艱遽非得已也比歳報功必有美言焉列郡舉才必有特書焉凡所以淹侯者將以大屬於侯也侯之進退政則皆國事則皆民遲速惟時不知所賀曰吾聞部使者凡再上侯至是將陟之内則臺省外則藩臬皆惟侯宜抑侯嘗稱疾乞休既至闕下將無申請乎吾斯恐吾民之不終惠也子不侯賀則何以圖之曰是皆非吾所敢與也爲國而徵則有若黄覇之在潁川爲民而借則有若寇恂之在河内皆漢之故也朝之政虞周之成也時方須人漢之故能無采諸侯歸志則逸矣其如廟堂之議何曰雖然子不能留侯必有以贈侯者曰不敏何敢蓋嘗爲侯筮之遇漸之巽其象曰鴻漸於磐飲食衎衎吉磐大石也自干而磐進而益安其上未已不樂何為侯行如必欲予贈也吾將以是於是諸人者有頌有歌有風有謡大篇短章鄉貢進士華諫企説皆萃諸巻可展而誦也遂以予言爲先又予既序所以贈郡守王侯者野人或挹慧山泉注之瓶瓶寘石子數个焉以爲侯贈而問辭於予予謂之曰而以水贈何也曰古也有志山下出泉静而清也侯之德似之是以獻焉以盥以飲惟侯之需曰何哉其以寘石子也曰水之性静則定動則撓定則清澆則濁其理然也是故溪澗之水不如泉江河之水不如溪澗今瓶焉將之走數千里而至京師或舟而川或車而途撞擊震撼不勝其撓猶之出溪澗而入江湖也是故不得已而石焉以鎮之在山之清庶幾其存乎易曰介于石蓋古人之訓如此茍水乎獻而不石乎侑是背古訓而不誠於侯也吾則何敢然則何以辭爲曰吾聞贈侯者皆以詩吾儕小人不能詩而以水水無言非辭何以將之曰若而言可以爲詩矣夫水以象德賦而比也而出於而民風也有頌之意焉而終之以規是可以爲詩矣雖然尚有未盡者言水之體而不及其用吾請爲而足之書曰若歳大旱用汝作霖雨易曰井冽寒泉食又曰井收勿幕皆水之用也神而明之存乎其人水哉水哉瓶焉已哉於是太學生華時正在坐方圖所以贈侯者聞予言恐野人之不能述之也請書之簡予三辭焉再肅而後執筆直道編序直道編者故福建按察僉事姑蘇陳公之孫怡爲公述也公沒而墓碑出既而傳譜表記弔祭諸作歳益以盛公之子唐府教授寧孫永定知縣恱繼欲纂焉未果至怡始克成之故禮部尚書呉公爲題今名蓋世所謂家集者也公在永樂中以翰林庶吉士爲河南參議坐事適田均州者十年當宣德初起爲監察御史出按江西以論學被讒闔門繫詔獄五年父母兄弟瘐死者數人正綂初復爲御史出按湖廣奏發遼王不法論死械繫一年改御史南京㑹天變又指劾法司亂法如不獲已蓋公之節如此乃若其事則於國體大矣今觀其所爲作者自館閣至於山林皆當世名筆特傳信史之法於是乎存焉君子謂夫書也天下之書也陳氏之書也與哉夫公之正色危言可能也其厯三黜瀕九死而不悔愈强不可能也凡論公者已悉某獨念文正范公於公爲鄉先進公所自期宜於斯焉在矣由今而觀所謂感激論天下事奮不顧身者公實有之卒之艱虞困頓以直道自成固若有遺志焉者然執是以稱不朽於後世亦可謂無媿爾矣抑於是可以見讒邪之情焉可以見疏逺之勢焉青蠅之刺遐遺之戒有志世道者孰不慨然於斯然則所謂天下之書也者不尤信哉某生也晩不及見公頃讀是編竊有所感因怡請序而輒及之張文僖公集序太子太保禮部尚書旴江張公既卒之五年而柏崖集出其子今浙江左布政使元錫校録而刻焉者也刻成賜謚之命適至遂以名之謂某嘗視學江西有斯文之誼伻來以集請序某以公前軰顧鄙陋不敢爲先者辭焉元錫再告至於三乃受而讀之烏乎文之難言乆矣君子操槧肆筆孰不志於行逺哉往往僅得百一焉抑有由也是故有才而無學則陳而弗稽有學而無識則擇而弗鑒有識而無氣則發而弗充有氣而無法則御而弗範才出於天學成於人識與氣固如其才然可養也學則有法參而稽之㑹而通之亦存乎人具是數者則文於是乎成有不爲爲則必傳傳則必逺固然莫之遏也然臺閣山林同詞異體學士政人同體異致兼之難兼而各底其所尤難烏乎文之難言乆矣公少稟雋敏壮登大廷魁天下士既入翰林好學弗倦自諸經至子史羣籍罔不淹貫識與年俱氣日昌衍從容矩度大肆厥詞盖自講筵敷對史館纂叙以及禮官奏復凡幾大議論幾大述作而銘功撰德施之公卿稽典陳義施之僚佐志事述情施之朋友發難折𠂻施之門人弟子以至題詠應酬閒情逸趣施之江湖鄉曲者在在有之人之所謂難者公弗有焉集是以若是富也其傳也吾知其逺也公在翰林若干年在詹府若干年在禮部若干年中忤執政左遷留都部署者若干年所至職職皆於文乎可考也是有國史及少宰圭峯公誌銘在集之外復有和唐詩若干巻柏崖公所自號也林夫人七十夀詩序林夫人某氏今大司寇見素公之配也公今年七十一夫人少一歳可謂偕老矣其子南京吏部郎中達㑹請告歸遂爲夫人夀頃過錫山問辭於予予曰祝夀莫如稱德達再拜爲予誦之予改容起敬謂達曰盛哉夫人之夀詎可涯哉惟夫人之德其小者不勝言言其大者夫人自十八歸公事其舅都憲菊莊公暨其姑黄淑人以共順聞處公之弟妹及諸姒以雍睦聞公在刑部時公弟僖從僖病痞夫人躬藥之曰吾姑所屬吾敢不謹手杵蓼仁入藥雖傷弗恤比歸預吉凶之具且出篋笥聽所取以去僖至家愈曰吾無以報吾嫂他日當服之如母耳公以諫下詔獄有校一人來紿取十金夫人曰昨餘俸金數銖今已盡矣尋又一人至曰吾直駕用刑追贓皆吾事也夫人厲聲曰吾家爲國言事何贓之追其人慚而去比公受謫欣然就道林監丞大猷聞之曰忠臣婦固如此公副憲雲南留夫人侍舅姑養及轉湖廣夫人從焉未幾亦請歸養如初公以都憲巡視江西黄淑人疾夫人不解帶者彌月比卒力治歛葬不煩諸叔公有庶子幾人夫人視如所出有所分予顧加厚焉莆俗收租穀冬初以濕故加耗夫人曰物情也爲毁耗斛族人化之頌聲作于鄉夫孝友可能也處變如素不可能也嚴正可能也處險如夷不可能也一時之惠可能也改量爲常不可能也諸子之愛可能也加分能厚不可能也觀於其大可以知其細矣惟公文章德業師表海内夫人真其配哉夫人真其配哉乃為之詩俾達歸而歌焉其詩曰莆陽之山壺山高諸峯接海翻雲濤雲莊山人天下望蹤跡在野心天朝行年七十方逍遥明詔忽起儕虁臯今年嘉耦亦七十大郎歸自南天曹一杯親獻麻姑醪客歌盛德配雅騷瑤池西望不知幾萬里天書下錫申以遐福字字皆鈞陶羣姝競奏長生曲小欄翠巘神驅鼇紫霞爲帔雲爲袍几陳雕玊鼎雉膏海拂扶桑日杲杲秋入𤣥圃天滔滔㑹看上夀再開宴九霄鸞鶴參翔翺贈郭仁宏序見素先生在浙上萬松書院語及寫照曰今之妙手難乎其人矣如武昌呉偉㤗和郭仁宏亦豈易得哉偉吾不得見仁宏吾未之識也比至江西之明年朝廷有令取善畫者仁宏與焉一日來見董中監於南昌予始見之一揖數語遂去林公之言雖未嘗不往來於心而見無由以再焉或曰仁宏既見公矣畫可以得於神既而諸生以白描像至儼然古有道之士予不敢當而人亦謂不類或曰盍畧貌焉以起其思予從之以託諸陳方伯嘉言今年正月嘉言緘坐立二小像至人曰近之矣尚未也又三月以正立大像至温共雅肅盖予日從事焉而莫能與者人謂之肖既而仁宏以書來欲得予文如昌黎之傳王承福考亭之序郭叔瞻也且曰某於二子未敢多讓公其不爲予執考亭昌黎之筆哉仁宏之自知信矣其所謂予予未敢聞韓朱百世之宗師也韓以文朱以道予生也晩夢寐摳趨方有卓爾之望仁宏其謂予何仁宏天資清絶畫參古法而多所自得其筆力甚勁健其於時隨而介遜而遂尤冠平生𢎞治初嘗逰京師時予爲郎户部多布衣交若呉郡杜謹懼男北海仇潼東之四明王珮惟德天台王奇文英王輔仁甫吾鄉陸寛宗仁無旬朔不㑹仁宏乃安在至于今始有見晩之嘆哉予於是乎有感矣作贈郭仁宏序都運張公七十夀序福建都運張公致仕歸之十年今上初元公夀七十八月八日其生之辰也其子瑭等請予文以祝之禮也公初弱冠受學經師而館諸僧寺也朝夕敬恭晨鐘夜燭寢興唯度知者謂公有志既逰庠序課業爲諸生先人曰有學既領鄉薦入太學聲名隠起而滋益共人曰有德既登進士觀政大司徒奉使逺藩事治而不勞人曰有才既授官職方出鎮山海守國東門公以其才與學施之號令布之文告以行其志以輔其德以宣聖天子之化被於逺人罔有内外人曰有政比代而歸補司寇之屬逾月而罹无妄之災或謂公盍辯焉公曰命也辯則必求求則必屈遂不辯人曰有節公判順德司馬政蕃息之餘能贊其守以古循吏之道既擢東平再擢黎平政如順德而加敏焉東平以衝黎平以夷治衝以逸治夷以簡既遭宄瑾以非辜廢起守太原未行而改今官人皆曰公將由斯以階峻陟乎既乃致政以去人曰公位不滿德夀其未可量已不然有志如公有才與學如公有德如公有政如公有節如公位不極夀其不極乎夫位人爵也夀天福也天其不終勝人乎禮七十老而傳公今老矣諸子者皆克有肖詩書冠冕公其有傳矣公其有傳矣耋矣期矣而臻上夀吾恐其未止也於是公奉詔進階嘉議大夫故夫人莫不祝之矧惟其子予以不文將爲不敏之謝念知公莫如予請遂質言之秦進士思魯公壻也時亦在坐予謂之曰何如思魯曰文患不質公之言然足以夀吾舅矣諸子具簡請書以歸邑令暢侯考績詩序嘉靖元年六月某甲子吾邑令隴西暢侯既滿三載當考績於朝於是前巡按監察御史天台葉君華州東君萊陽王君京兆許君今巡撫太子少保工部尚書兼都察院右副都御史西蜀李公繼有疏上侯嘉績矣至是將行吾黨諸大夫士餞而贈言禮也先是鄉貢進士葛豫志行來請言於二泉邵某某曰此固宜之然有長者吾不敢專乃屬吾姻友茹少叅世和遍告諸君子者而胥㑹於二泉之亭某乃言曰暢侯政成入覲清風之誦固諸君子所欲作也竊謂古稱當官有三事又稱守令有六事請分題以賦何如皆曰然於是陸臨江宗仁賦三事之清而許司訓克寛許商城朝儀賡之張都運元之賦三事之慎而許武定時正余瓊州一之賡之少參賦三事之勤而呉憲使遜之羅建寧文徽賡之蔡光禄嘉㑹賦六事之學校興者而施平樂克和尤蒼梧遂良賡之馮僉憲廷伯賦六事之田野闢者而秦京兆國瞻馬岳州惟馨盛都運堯卿賡之六事之户口増屬盛都運舜卿賡之者談司城文祥方撫州日昇也六事之盜賊息屬張户部敬止賡之者陸户部節之潘平陽之達也六事之賦役均屬談大邑文瑞賡之者吕太僕仲仁華吏部子宣也六事之詞訟簡屬顧少參與成而賡之者顧大行與新錢常山國章而曹司諫于德殿焉尚年也詩既成什復㑹于亭傳而觀焉某既卒業作而嘆曰盛哉渢渢乎三體具矣六義兼矣作者之志殆無不盡矣觀侯之德者舍是何之矣觀侯之政者舍是何之矣又嘆曰古人於祖也祝於旅也語愛莫助之不以頌而以規蓋皆有之今何爲獨不然憲臺諫院惟侯是期髙明逺大惟侯是望某不佞即欲有言其何以加于此侯偉人也執觴而聰聽之能無犁然於心者乎於是諸君子各書於冊越明日具官某序魏文靖公集序宋資政殿大學士參知政事贈太師鶴山先生文靖魏公集若干巻爲詩文凡若干首故有刻本自宋迄今凡三百餘年矣其廢缺鮮傳無足怪者今太子少保工部尚書内江李公以公蜀人爲鄉邦先正撫政之暇訪而得其什九輙用勘補以從梓事其什之一將别圖而補焉間命吾令暢子實屬序於某某晩學荒陋嚮往於公豈不勤且乆哉序則何敢雖然盖嘗尚論之矣宋之有道學也始於周子盛於兩程子邵子張子同時並作繼乃成於朱子蓋後乎孔孟千有餘年而先王仁義禮樂之懿日可復興正矣大矣精且備矣夫然故天下學者心悦而誠歸之抑亦有樂其名而歸之不由乎誠者門焉户焉騰兹多口而小人之醜惡正直者乗之是以僞學之論起焉而謗遂及乎大儒君子夫人也其皆非吾徒也已不然何偽學之禁一行遂滅跡以逃惟恐不絶至或反戈相攻也哉當是時公與西山真公二人者雖罹媢嫉屢見疏斥罷於出入而講明之功持守之力弗替益勤立朝領鎮忠言嘉政巋焉爲吾道衞翼國史立傳列之儒林爲道學之亞厥惟允哉公家食時讀書白鶴山下在靖州有鶴山書院及登政府賜第平江至厪理宗御書院額之賜所至學徒不逺趨赴蓋忌之者雖多不能勝信之者之衆且深也公之大節史傳已具君子尚論其世則所謂集云者將可無乎平江今蘇州府公生所逰死所歸藏也司空公以孤卿之重兼御史中丞撫我南甸瞻謁公祠如將見之集之傳也固其平生之志也司空公之名德海内屬焉乆矣後之視今安知不猶今之視昔乎詩曰維桑與梓必共敬止某請爲蜀人誦之又曰蔽芾甘棠勿剪勿伐某請爲蘇人誦之又曰髙山仰止景行行止某請爲天下之人誦之倪氏二先生集序國朝永樂景泰間吾錫倪氏有二先生焉祖孫相望以文章名節重於朝廷天下稱之其祖曰峻字維嶽洪武庚午舉于鄉累官至兵科都給事中亷正守道嘗上書諫佛事人以儗韓表文廟怒尋遷行人三使占城以折之至則禮折驕王尊我國體歸遂請老以正學敎後進凡十餘年卒于家學者稱静寄先生其孫曰敬字汝敬正綂戊辰進士官監察御史崛强有大節景帝末上敬天修德疏直言忤㫖謫宜山典史稍遷至右軍都督府都事從征廣西以總戎專令誘殺不署功籍歸卒京師學者稱月樓先生二先生之於吾錫可謂望矣然君子固曰天下士也非一鄉之士也蓋吾嘗論士於天下才德之辯尚矣吾不敢贅然文章才之形也而本之者德不然則汎沛曼靡而雅道微名節德之屬也而發之者才不然則徐佪鄭重而直氣沮夫然故人兼之難兼而世濟焉者尤難而况於今有若倪氏二先生者哉夫以静寄之靖共而復繼之以月樓之英邁諫垣憲府言責惟均正色危言獨立不顧雖遭斥逺間闗嶺海之死靡他其名節於古人蓋不多讓然皆名能文章而尤長於詩静寄之詩和平清適有一唱三嘆之音月樓之詩奔放豪逸有萬人獨往之氣要之於古作者各有合焉傳曰商者五帝之遺聲也齊者三代之遺聲也明乎商之音者臨事而屢斷明乎齊之音者見利而讓論詩於二先生孰爲商歟孰爲齊歟必有能辯之者烏乎錫之文獻宜無大於是矣而其集之傳乃乆缺焉者何哉鄉貢進士容静寄之𤣥孫月樓之再從諸孫也績學有高志蒐諸遺稿校録入梓而其父乆齋先生之詩附焉梓成介潘繼芳甫來請序於是乎言乆齋吾友也諱祚字相承㓜孤力學志于用世未遂而隠以卒其詩有家法其言行在予所爲傳四朝恩命録序四朝恩命録者今致政少傅兼太子太傅吏部尚書武英殿大學士䆳菴楊公之所輯也公少以神童績學翰林弱冠登進士爲中書舍人厯事憲宗孝宗武宗三朝四十有五年十二遷而至今官其命於上者在成化時則有中書勑命提學僉事勑諭在𢎞治時則有提學僉事副使勑諭左副都御史督理馬政巡茶巡撫經畧諸勑書及誥命在正德時則有總制軍務勑書再起西征總制提督軍務奨勵召還諸勑書尚書少保誥命陞官手勑及致仕褒諭諸勑書凡若干通正德初公以疾予告家居嘗録總制以前所得者通爲一卷目曰三朝榮遇又以始起家及厯官以來被薦及辭謝諸疏所䝉温㫖者爲下卷附焉既皆刻之梓矣今上嗣位賜勑遣官存問又給少傅大學士誥命公以爲不可無紀也因追録前後所得者并武宗南廵幸第賜詩十二章俱序入前巻而今得勑誥附于其後又以再起以來累上乞歸及辭謝恩命諸疏所䝉温㫖者爲續集而廷臣薦剡及謝辭章疏所䝉褒㫖者附焉通若干巻綂更今名録既成謂寳私淑晩進不鄙其愚辱以見示寳莊誦之有以見公不器之德焉有以見公素位之道焉有以見公勤勞之義焉德成於已道濟乎時而義從之義之所安道斯行焉道行而德之用博矣抑豈易言哉蓋自君子不器之説發於先聖凡能兼衆長者皆可以爲稱至要其極必識通天下之志才周天下之務動而弗動賾而弗賾而後能成天下之物可以言乎不器然君子不能自用用之在君或坐而論或起而作理與事實相成焉而不能相兼兼之者其時乎時不在我而吾之道足以應之素位而行無乎不可雖從容廟堂不動聲色而不見其逸驅馳疆場不遑暇食而不見其勞皆所以行吾之義也公於是實有之初公以文學師道稱重于朝于藩既而擢太常周旋兩京若不知有邉隅事業者及進都憲茶馬之政甫成繼之以巡撫經畧又繼之以總制而事業滿邉隅矣中忤權奸去位再起視師遄靖西夏之變入爲司徒以固邦本公於是時誠無愧於古之澤被生民功施社稷者雖然未足以盡公也葢至於位冡宰而統均弼亮之功著至於典機務而經綸爕理之功𢎞至於進師保而表儀啓沃之功宻公之於天下於是乎成而見幾勇退君子猶以爲有遺用焉然出入進退道以行之義以安之在公有固然者非生稟間氣閎深博大俊偉光明學究聖賢之藴而識明力定始終無間其何以與於此仰惟三聖重光知公深至前之敷遺後之圖任如出一心而公服休若采如處一日至於今上之存問有勑有誥又皆出恒典之外美矣盛哉雖隆古君臣相遇又曷加焉且諸剡交上稱公之賢者不謀同辭不和同聲凡所批答如嚮斯應輿論攸歸孚於上下又有不可誣者耆耇元德獨能無餘𠂻哉斯録也其侈上賜而傳諸不朽乎無窮之報固於是乎在此公自以爲家集者也乃若觀國史者將亦不能不是之參焉寳不敏竊謂非公一家之書而天下之書也旣僣以是為公復敢復為天下道之五峯遺稿序方伯秦公以文與政望於時其政之大且著者載諸金石两朝實録收之其小者士頌民歌有公論焉乃若其文陳義永言有懷必露無所叩而不應往往為吏事之飾意其必有巨編數十而公當作時多不稿即稿亦輙棄去存者什四三耳公卒之二十三年其子太學生國英檢故篋而手録焉又録於人僅得若干篇既屬潘君繼芳校而成帙則來視寳寳以公雄才博學施諸有政宜其入賛謨謀岀任經畧俾澤被海内乃遲廻郡藩而疾病及之論者謂公以英特取忌於時夫固若有然者若夫文之殘逸抑又何哉寳昔在京師隣於羅太史圭峯圭峯建昌人也於公為相知嘗論公文寳謂公始愛柳繼充之以蘇又益之以歐詩始馳騖中唐久之得其風格旣而讀杜時取而出之復參諸蘇黄以下數家故所就如此圭峯曰然然公才裕矣氣亦昌矣邁矣論者固當先之予亦曰然今是稿也出將不謂予與圭峯然乎初國英手是稿也其從兄瑞安尹國重見之曰瑞安多刻工吾將任梓事乃用書告其從弟今御史中丞國聲於湖南中丞贊之加亟且謂序宜屬寳寳生也晩於公之父修敬先生嘗拜忘年之辱至公加引重焉以齒以德公皆前輩行也序吾惡敢顧國英再請益勤遂書所嘗論者歸之公歸築草堂龍山第五峯下稿是焉藏故名公諱䕫字廷韶舉天順庚辰進士歴官南京兵部主事員外郎郎中武昌建昌知府福建參政江西右布政使致仕以卒其世裔事行具銘表諸作三山郭氏族譜序譜也者一家之書也而有關於天下一家之書曷為而關於天下也天下之史所以紀天下之事也紀天下之事則天下之人亦與載焉天下之事二在朝廷則為典禮為命討在郡邑則為風俗為德行以言乎人則内之為公卿大夫外之為士農庶品莫不出於家焉書之所載而美刺行乎其中矣而旌别存乎其中矣而因革而㑹通寓乎其中矣若是而謂非關於天下乎故天下之史得則郡邑同之其不然者史失而求之志志失而求之譜亦理勢之所必至也有家者可以不愼於譜哉譜而不詳不覈將郡邑無據焉將天下無考焉其顚倒是非以變亂名實者又不必論也是故家必有譜譜必如志志之法無他信而已矣志必有史史之法無他亦信而已矣然人鮮能之者誇與忽病之也家而無譜者十九譜而如志若史者什一譜而不如志史猶無譜也家而無譜猶無家也而何足以為天下之事之人之地也哉譜稱有志若史法者吾見亦多矣近吾得之郭君某焉君福之三山人辛巳進士時其家食也嘗從其鄉大老泉山林公治其譜也得以覽觀諸譜焉而知某之譜如志也某之譜如史也又知誇與忽之為病也内愼諸心外愼諸筆不敢以一家而自外於天下之論其自待其身與其家也重矣比來治蘇之長洲政暇有事於譜而問法於吾友都先生𤣥敬𤣥敬固知為譜而有志若史法者也郭君聞而信焉故其所載斷自所知名實相副文獻足徴君子謂之善譜間過無錫徵序於某某何以加於此哉吾素重君之為政觀於政可以知譜遂論譜之關於天下者歸之抱拙先生集序永樂宣德間錫有隱君子曰抱拙秦先生雅學篤行教授鄉里晩稱耆德為鄉飲大賔者若干年當是時有薛恒履常者有杜純守德者有馮善擇賢者有朱經公紀者皆以薦起為令為丞為學博而先生獨偃蹇丘壑以終詩咏考槃非其人邪先生之曾孫今大司徒國聲公始起家進士遂大貴以顯勲業在天下鄉之人之頌司徒公者必追稱先生天之報施善人不在其身在其子孫固有若符契者邪先生平生著述吟咏散落鄉人者往往有之其稿存於家者無幾矣司徒公既輯録得若干篇又從潘繼芳莫如山所得若干篇二君且遍訪以益之共若干篇分四巻將梓之司徒公北上别予而屬以序越三月其子鄉進士泮再告某生也晩聞先生之懿於莫澄心翁翁先生門人也於吾祖三益公嘗請文於先生為澄心贈則先生固吾曾祖行吾與司徒眞所謂累世通家者矣於乎以吾所見而徵諸吾所聞吾所傳聞觀秦氏今日之盛者固當自先生始易曰不耕穫不菑畬先生之盛德豈將為後世地哉天道不爽無庸論者而先生之詩若文必至於久而後傳則亦有數焉耳矣先生之時皇運方隆貞元之氣方醇而未醨方樸而未散故其所作典實脩雅雖詞采聲調畧而未講而道之所存蓋有餘味焉君子讀之猶可想見其惇厚忠諒之氣象於百載之前也其後之克昌也不亦宜乎先生諱樸字物初其世為宋淮海先生若干世孫其子景薫其孫霖皆以司徒公貴贈都察院右副都御史司徒公行且進秩贈典將及先生矣九峯歌序九峯歌者太師李文正公贈大司徒孫公致仕歸而作也司徒公有書屋在九峯山中得安陸之勝因號九峯居士當朝政之暇蓋嘗與文正公言之比致仕時文正公謝機務已數月矣湖南山水夫烏得無情哉其視歐陽公贈劉凝之廬山高之作可謂異世同心者矣公歸至繼陽手録寄予俾繼其聲於是予病新起實始執筆以復四方君子聞而和者益衆迄今七年總得若干篇公亦倚而和焉間嘗叙録成帙將傳視同志以無忘文正公曁諸君子之意伻來用書屬某數言於首公薦歴清要由少宰擢冡宰南京召入為大司徒凡若干年平生志節以古人自期而臨事精宻圖歸於正士論歸重文正公在祕閣知公特深公之歸也累疏不己文正公聞而惜焉是歌也上為天下而下致其私雖寓情山水草木之間而意則逺矣諸君子之和之也言人人殊意皆不出乎此異地相感繼自今豈無覩是編而復和之者乎公功業在國史而山林之趣則於是編焉在某病餘蕪詞方愧厠於其間何敢復致吾喙哉顧公意遠屬而其子温州君惟一以考績過我二泉山中再請益勤於是乎書送户部尚書秦公序南京兵部尚書鳳山秦公奉勑參贊機務之二月户部尚書安陸孫公請老而歸廷推屬公上俞焉公得報上辭疏以俟於家上隆㫖促之而後赴闕將行謂予當有言初公爲户部侍郎之二年通前副都御史三品九載乃擢南京禮部尚書以來人曰公自進士釋褐爲户部主事員外郎郎中凡若干年而有按察之擢公在户部叅閲章奏凡若千年蓋民生之休戚國計之舒縮邉儲之饒乏疆埸之遐邇險易漕輓之便不便孰爲經常孰爲權變進退推移考求厥中蓋瞭如也及再入爲亞卿斟酌經畫而施之有政如已試之藥有不投投必有濟而將之以盛德而受之以宏量又如長江大河莫測其際司徒之任非公其誰宜之而必南禮之之也或曰不然公邃於文學嘗提學河南稱賢宗師三禮之典是故公所宜也公至禮部甫五月有參贊之命人又曰公文武長才嘗以都御史巡撫湖廣而贊理其軍務躬綂大衆戡定寇亂南人以寧論功受賞紀頌在碑留都根本之地保釐之寄非公又誰宜之至是户部命下則又皆曰是果慰前論者之望矣公不器君子也何所不宜而於户部尤合遲任求舊之言官哉惟其人哉予聞之亦以爲然惟周官大司徒之典尚矣今户部尚書實惟其職而於古不能無所異同所謂析敷典於宗伯者不與焉天下之事若權衡在縣低昻萬變厥有定分有才而無學才則不經有學而無識學則不達有識而無業識則不切有業而無繹業則不廣故遇事而高談者有矣率坐是數者而莫之遂也而一是茍簡之弊又乗之以起雖一邑一郡不可以理况天下乎予昔爲郎嘗獲與公同侍太原東山洪洞靈寳數公每燕居論事必曰曲成而繼之曰不失其正蓋所謂經權者於是乎在公行矣朝廷有所舉置待公而行無小大無易難徴之疇昔之所已試而槩之吾心將有不合者乎有不合則從而思之或仍之惟其宜或更張之亦惟其宜皆厯試之力也如是焉而或撓之吾有執之而已矣天子聖明能無從乎然非有才如公有學有識如公有業而能思如公有盛德宏量而敡厯有年如公其孰與於此某也何敢以是望之今兹之歳東南之飢極矣予憂居且病不敢致吾私敢以天下爲公計之公以天下爲心烏得遺東南哉公曰此固吾舊寮之言也適鄉大夫士有贈言者遂書以爲序無錫過氏族譜序過氏之祖始於宋徐王郡馬公孟玊郡馬公以上不可得而知矣自郡馬公扈髙宗蹕始來江之南長子殿帥炳從駕居杭第二子焸留無錫景雲鄉居焉是爲始遷之祖自焸至我外祖時明府君九世矣盖在宋季者若干世在勝國者若千世在我明者若干世世有所分在外郡者若干支在外縣者若干支在外鄉者若干支總凡若干百人族之蕃衍可謂盛矣舊未有譜六世仲銘府君嘗一修之至十世野舟府君又嘗一修之而未克就藁藏故篋遺至其孫輯始克成之自野舟而下又四世矣前乎逸者不可不求後乎生者不可不續乃以屬諸十三世孫棟執筆從事棟嘗請法于寳寳以吾邵氏譜編于文内翰徵仲者授焉既月且旬遂克成編始用蘇氏法參之以歐陽氏法圖焉表焉傳焉而碑志等文附焉盖先之以圖若掌之指次之以表若指之屈次之以傳若面之覿次之以文若聲音之接譬之於史紀傳編年殆兼之矣於乎如是而後昭穆序如是而後宗祖尊如是而後倫理明如是而後恩義惇如是而後文獻足譜於是乎可觀矣雖然此正族之法也族正則家齊矣自家而要之於身自身而要之於心一人正則一家正一家正則一族正合羣族無不正天下之正亦於是乎在夫譜不可以不修尚矣徒修而無本亦焉用是爲哉寳過氏之甥也祖猶吾祖也宗猶吾宗也族猶吾族也譜之序雖不敏吾烏乎辭諸夫是以爲之僣論如此若夫過以國姓實自有夏之世不可考矣亦不必考也即今之譜而補之續之以衍之於無窮敢再拜以告其後之人其散處於三呉兩浙者或宗於殿帥别有譜焉不書胡氏正德集序正德集若干卷蘇州守胡君世甫之所著也蓋戊辰至辛巳凡十有四年君自翰林出佐嘉定州召爲南京户部員外郎吏部郎擢守安慶凡五徙厥官四易厥地而蘇州未與焉總之今名志其時也其門人太學生江隂徐中孚請而梓之君子觀政於文文曷爲而可以觀政也政與文皆出於學深於學斯深於文斯深於政矣然則觀文於政可乎政固有不出於學者而何以觀之故觀政於文可觀文於政不可之人也吾見亦屢矣近吾得之君焉君天資高明前知師古而後不屑於今之人者書自六籍之外非兩漢以上無讀也極其所見有獨抱遺經之志君往歳以公事至無錫予始與游二泉山中君視予所著往往出人意表比守安慶以來又得讀於椷寄而斯集也乃今見之蔚乎雅哉視古作者蓋以登其録矣君昔在嘉定吾不及知己留省事簡無君之爲者安慶當兵荒之餘而不見其艱蘇州居賦之㑹而不見其劇從容時措視古政人殆無與讓君之文何其似君之政也曷不觀君子之學乎學古人之學而文有不如古者乎而政有不如古者乎文出於學有用之文也政出於學有本之政也由今以往君之任當進而益顯以要以言乎文尚有大制作焉以言乎政尚有大舉置焉待君而爲之者若今之所至其何以盡君哉而觀之也雖然觀諸今而來者可知己徐生請序遂書之君名纉宗别號可泉世甫其字也陜之隴西人左觽序予昔讀左傳蓋志於求經故於其辭不求甚解非不欲解也思之不得故遂已之嘗歎杜子美所謂讀書難字過者之不誣壬午夏仲暑雨連月齋居無事乃屬塾師高子明取而讀焉予隠几聽之遇難解處則稽之疏義而參諸他書縱横推度往往有得得輙呼筆記之於簡是秋讀畢叙録成帙凡若干條疎陋之見不知於丘明之意果有得歟否也抑諸生佔畢或亦可爲之資乎故名之曰左觽俾里塾藏之觽解結之具也叙養晦夀涂封君封試監察御史涂翁鳯占字應吉别號養晦直諒莊雅自壯至于老鄉邦稱之無異辭者其少也孝而聰警年十九痛父邱山翁逺逰而沒于蜀冐險奔焉至則以力不能歸其喪也且得吉壤遂葬其地事母喻得子道甚母卒且葬以逺故不能合乃嘆曰合葬非古吾將援焉非得已也厝之室東之地側而廬墓朝夕慟哭致毁少習易長於吟咏居家訓子弟業詩書而治園田時以吟咏娯情誘善疾惡義形於色明决練達平心率物人訟曲直不之官而之翁者比比有媿不敢見望閭而返者既有子女女擇所歸子分所業御史夢卜相其冢嗣也既第進士命其仲治家曰汝事吾事季逰庠序治經學曰汝紹而兄論者謂翁不越厥分而好修自成稱其所號養晦者嘉靖改元夢卜既入臺爲試御史㑹有徽號恩典念父母春秋高而未得與也乃與同官十九人上疏以請上從之翁與其配楊孺人皆受封如制今年且耋矣而康强如耆艾者夢卜以廣東巡按之節將復命于朝便道過家稱夀先是具事狀專使請予爲叙藉手以拜予昔視學江西與聞御史之進今既能其官而請文不持一物亷介得憲臣體可以觀孝矣君子曰養晦有道乎養晦有道明而已矣順而已矣晦也者時之所不能無也故時乎晦也天且不能違之而况於人乎夫晦於德爲貞於歳爲冬於日爲夜其於人也爲處爲黙爲遜爲隠其究爲主静君子所以順乎時也及夫時之顯也行焉大行焉亦未嘗有所加焉是故晦逆境也惟順爲能俟之不然則否然非明於消息盈虚之道者其孰能與於此詩曰遵養時晦武王且然而况於人乎又曰既明且哲以保其身養晦有道其在斯乎其在斯乎涂翁其近之矣王元信切字正譜序萬籟生於動復動之端也故黄鍾得聲氣之元有氣而後有聲有聲而字從之字不足以盡聲聲而不當其字則字不職職字不職職而能物天下之物乎字有母母呼子應而反切之語介於其間四聲七音於是乎出昔人擬字訣二十六皆從天韻蓋所謂陽起於復者其端甚微而其極至於無窮是故鞮鞻可譯鳥獸可解况堂堂之夏聲哉王君元信㓜便韻語中歳静居益有造焉嘗取所謂韻母者日事吟諷乆而覺其未盡乃爲譜如左又取周氏千字文一一反切俾聲韻皆叶各歸于所蓋若以爲例然凡佔畢者得之置之几格豈不有與矣哉律呂之未敢輕議尚矣然或謂是爲小節而忽焉亦非君子之志也予嘗謂律和聲和以天也今於切字亦云鶴坡奏稿序鶴坡奏稿四卷凡三十五通監察御史朱君士光錄其所上以藏於家者也自正德丙子至嘉靖甲申凡九年歴南北二臺内而京城外而諸郡邑凡若干差遣其所言者皆在去年冬廵節至無錫謂予舊知特出以視予擊節而歎焉歐陽子有言天下事惟宰相可行之諫官可言之然言之道有二曰直曰諷直而不激斯謂之直不然則訐諷而不狥斯謂之諷不然則諛諷所以行其直也古之善諌者率不出是雖然知而言者存乎忠言而盡者存乎誠誠而通者存乎識通而博者存乎學博而貫且辯者存乎才非言之難忠與誠之難也才與學與識之難也五者不具其何以與於此哉今觀諸疏上自宗社乘輿次及執政下至閭閻邊徼得失利害皆究極幾微而要其流弊蓋關於天下之故大矣昌言盈廷侃侃正色指斥忌諱不避險危而自牖之道行乎其間且其文出入漢宋從容大篇率能盡其所欲言繁無冗語簡無缺詞始而讀之不覺其入也繼而繹之不覺其孚且沃也聖明在上有言如此能無從乎即有未從能不嘉答之乎臺端輕重舎士光其誰歸它日超而逹諸上位居可行之地執此以往而貞恒以始終之其於天下也何有予昔視學江西得士光於文字間蓋知其頴異素矣别來數十年乃不知其造詣建立如是予衰病林居無能為世道效力於是乎有國有人焉之感遂書諸首簡以歸士光其以為何如也秦氏兩生更字序秦生汶予甥也與其兄濓學於予予喜其業有益欲字稱之而怪其有所雷同也兩生因告其父韋軒君請予更焉許之濓曰楚南汶曰齊南或曰其然哉殆疆域之志爾於義何居不曰有所志則有所思乎濓出道州楚地也其南有蒼梧之山焉望蒼梧者能無舜之思乎汶出萊蕪縣齊地也其南有龜䝉鳬繹之山焉望龜䝉鳬繹者能無周公孔子之思乎因其名志乎其地而千古之思係之二南之為義大矣或曰濓周子所産汶閔子所嘗逰也曷不是之思也舜至矣周孔大矣重華之陳于魯于道之變葢昔人之志則然矣周若閔舜周孔之徒也吾敢忘諸乎容春堂續集卷十二
