body:
  text: 容春堂别集卷五明邵寶撰序十三首送儲考功赴南京序士之有大抱負者而其功業或不能大成非其人之不能自用則用之者之過耳善自用者守正而不知其他故恆難於用之善用人者或常或變要使人之安於所用二者蓋相成焉而每不相值是故士有非常之抱負而不能成赫赫之功業者衆矣進士儲君靜夫以明經發解㑹試俱第一而廷試亦在上第與唱名其科名甚髙然其年方二十有八甚少才髙而學富作為文辭清達典雅其聲華又甚盛夫人不愕然自驚則夸然自滿靜夫不然其得之若固有而居之若無其擬於古人者方欿然其不足而處乎今之進退得失者又裕然其有餘君子以是知靜夫有大抱負而善於自用可以卜其功業之大成也然吾觀靜夫介介有守且多疾病不任勞使以常處靜夫任之以列侍從司風紀則靜夫必有以自見者或不得其職去或力不勝任不能事事去則靜夫雖有大抱負不過立一節成一名焉耳夫一節一名豈不美哉抱負之大者固不願其功業之小成也今年六月靜夫選於天官得南京吏部考功主事夫南京國家根本之地去天子在所逺出入朝省之勞凡減於京師什伍而考功職在執筆以察羣有司賢賢而否否拔異而别同在他人或難之在靜夫則易稱耳夫事不勞則靜夫可任職易稱則靜夫可食是不以常處靜夫而以變處靜夫可謂善用靜夫矣靜夫豈固難於用哉是故養靜夫之抱負而需其功業之大成者其在斯舉也夫夫大成靜夫於靜夫無所加小成靜夫於靜夫無所損然能用之而不害其自用之難棄其小而成其大此君子之所願於靜夫者而亦靜夫之意也寶辱與靜夫同年而知且厚於其行也故序其所以自用與其所以用之者他日將觀其成焉送江西按察使陸公序正德丁卯春正月浙江按察副使吳郡陸公全卿擢江西按察使江西於天下為大藩某前以按察副使奉敕督學其地嘗登南曷滕王閣讀韓昌黎所為記愛其中稱御史中丞太原王公有所謂八州之人前所不便及所願欲而不得者公至之日皆罷行之大者驛聞小者立變春生秋殺陽開隂閉令修於庭户數日之間而人自得於湖山千里之外之語蓋王公時觀察江南西道於境內無所不當問罷其所當罷行其所當行者存乎其職而驛聞立變皆于至之日者則存乎其力與才至於生殺開閉數日而令修人得縱橫引抑從容豫暇若無事然非經綸素具知是非而不恤成敗知得失而不顧利鈍者不能與於此王公之設施吾不得而知然由昌黎所稱則其規模可謂偉矣今江西所屬郡視王公時為廣數年以來文繁於上法玩於中吏慢民偷於下租逋訟滯盜蔓奸滋千蟊百蠧或盤結而難紆或汚穢而難濯或變幻而難測或崛彊而難服在在而是不可縷數唐之觀察今之按察也夫安得如斯人者為吾目前之一快也哉繼而移官浙江得與吾陸公為寮友從政之餘接其論議而觀其所為竊謂公蓋其人有以紓吾昔之所歎至是公有兹命公其往矣昌黎公文故在公試讀之是數語者將不有若為公而設者乎夫醫者之用藥溫涼寒熱因病而投期於效焉而已茍講之未明候之未審備之未預一旦從事鮮有不謬者矣君子之政所謂生殺開閉者何以異是天下皆然獨江西也哉公更以是思之公吳郡望族起家進士由御史再遷至今官博雅清修文學法比克知體要而加之以深思濟之以遠度一時名公卿皆以公輔相望其為御史出按于閩閩人頌之于汴汴人頌之入典中臺章奏天下稱允浙江之政蓋有餘力焉吾知其優為於江西也公行寮友洪公克毅輩皆有贈言之意某不佞遂僭以是書之松石詩序松石詩者吾表舅太原守東洛張先生為鄒翁永章壽也翁名柷字永章别號松石今年壽八十鄉之諸縉紳以翁長者為之慶焉東洛與翁最戚於是乎詩今世之言壽者於物必曰松曰石而翁以自託於名字之外其心必謂浮靡之不如貞朴脆薄之不如堅重也故有取焉若昔人韋弦之佩者則其平生所為殆類於是嵗寒之期將不在是乎孔子曰仁者樂山松與石者山之所有也得山之氣以生故其德也於山是同翁好仁者樂山以及松石歌松石之詩則翁樂之凡壽翁者宜先於是又曰仁者靜壽翁者欲稱其德舍是又何以哉豫知翁久故東洛以序屬然不能諛也聊是以復復為之歌曰挺兮如松偃兮如石若人年兮千復百石有膏兮松有液人采服兮眼雙碧登秀巖兮倚喬柯把瑶觴兮發長歌彼仙人兮如我何送郡博王先生赴湖學序王先生洛人也以進士乙科來教江之南由江隂遭艱再起至吾錫居若干年擢掌湖州府教論者謂先生在錫得寬柔以教之道夫地有南北而風氣隨之士生其間俗以習成往往喜同惡異故南士吏于北則强其俗以南北士吏于南則强其俗以北甚至易巾帽變聲稱改體數極其力而未己不知君子之為政固不在是而況教乎教之道莫大於彞倫綱常莫先於詩書訓典先生於是二者尊之崇之罔敢怠遑且濟之以華博成之以忠朴是以言而聽之行而效之不勞夏楚翕然無後者若夫小節細故則惟俗是因不强焉故凡在庠序者咸慶得賢師而邑之大夫士又以得賢友慶亦固其宜哉今年夏先生將報最天官適被兹命大夫士若某官某公者須贈言於子夫湖之學宋安定胡先生嘗是蒞矣其法始于一方終于天下至于今猶稱之不衰是誠所謂中正之教固無南北之偏也先生行其將以錫之教教湖士邪抑將起而尋安定之遺規邪諸公必有以告先生者諸公曰是在先生請書以贈之辟纑課讀詩序婦人之於家道大矣豈特主中饋範內壼先業之隆替後嗣之賢否將有賴焉故婦道猶臣道也臣之事君平時則以坤厚之德代終王事不幸而邦家多難則以永貞之德仗大節明大義操大機屹然如山確然如金斷然如蓍龜卒收靖夷之功夫是之謂賢臣惟婦人亦然主中饋範內壼其常也承有家衰運撫幼孤而教之使先業絶而復延子孫有成式其變也處變而不失其常此家之賢婦夫之賢妻子之賢母不亦可以樹風聲可以助政道哉吾邑有醫士曰潘尚古氏聲名方殷而早世遺孤繼芳甫十嵗厥母范碩人實藥莊先生五世孫也㷀㷀相依而家又甚貧尚古之嗣岌岌乎殆哉碩人撫之稍長即令攻醫以繼其世又讀書學文以從儒者之列晝夜課之不遺餘力服食屢乏紡績以供於是繼芳克有成功鄉之士咸曰尚古有子矣又曰不有賢母不至此於是乎作辟纑課讀之詩繼芳執詩感泣又遍求諸縉紳咸作之而屬序於寶曰否則作者之志不傳寶嘗論碩人之賢不惟其處常之難而惟其處變之難所以處變者不難於養子而難於教子教焉而至於辟纑課讀尤教之善者也則其紹先世之緒啓後人之賢功有在矣詩以辟纑起美哉乎作者之志何患乎不傳雖然傳者詩也所以傳者人也人重則詩重人輕則詩輕侃為賢相而陶母截髮之賢著修為大儒而歐陽太夫人畫荻之賢聞繼芳能賢雖不詩也猶可以傳而況諸作之洋洋乎寶亦幼孤思答慈教而未能感繼芳之志故相勉以此非敢僭言於君子之右也潘尚古追挽詩序挽之有詩紼歌之遺也而兼述其人之德以寓悼惜懷思之志有誄之道焉有吊之情焉今之為挽者大率以是然或即遠之餘墓草不知其幾宿矣而君子之挽也猶繼有作此其人必有大可悼惜大可懷思者而豈偶然以致之哉吾邑有潘君尚古者用儒飾醫而加之願朴鄉人愛之重之年僅四十六遂以病卒愛重而能言者挽之挽之不及又從而追之蓋自始殁迄今凡若干年詩之積者凡若干首所謂誄且吊者咸具然以其不皆出於一時故其子繼芳甫裒為巨册題曰八哀餘意蓋所以志挽之變也而尚古君之德于是為益彰矣豫嘗讀杜子美八哀詩而考其所謂八人者則王公以下皆有勛伐昭於海內而鄭司户亦獲與焉古之論人者固惟其人不問其位之崇卑也今尚古雖無司户之位而司户之所為在君或有不屑者使子美可起能不為之增欷也哉夫紼不可以復執而挽猶可以再歌以今之詞存古之意合誄與吊而一出之當之者有光作之者無愧裒之者克孝是皆可叙而傳也矧寶與繼芳甫定交最久且深於其母范氏貞節之詩既為序之至是書來屬序斯册豈得而辭邪若尚古之行雜陳諸作間一覽之可以悉也故今特舉其略云送吳荆州序今年夏户部郎中吳君汝和擢守荆州同僚大夫士謀所以贈君者而屬筆於寶寶竊聞之荆天下之要衝也自為郡以來稱賢守者凡若干人矣而南軒先生則有儒者之政焉當是時既修其治又尚論古人而慨然有感於曲江公故作樓題扁若恨不能與之同世讀晦翁之所記者猶可想見其髙山景行之餘也君兹行也吾不遑問其他其蒞政之暇亦將興南軒之思乎思乎其人則凡其言動嗜好莫不想像而求之況其所嚮慕者哉吾不知君之汲汲於南軒者亦猶南軒之汲汲於曲江否也君素負才氣有應世之略而飾以文學其在户部厯三階凡八年任難事當劇司動無弗稱蓋灼見夫今之事而有意於古人者聞二公之風而覩其遐蹟欲勿奮然也難矣故吾於君之行而亟問焉抑獨惜夫曲江之在天寶去相而假守於此卒不得以有為南軒雖再起為守嘗有為矣而淳熙之際亦不能盡其所藴故君子之志於天下者至于今猶不滿焉今之時豈其時哉其難易順逆必有能辨之者吾固將以是賀君之行也雖然時不同而政同政不同而心同故在亂則思所以弭之在治則思所以保之此古今賢者之所事事也君烏得無意哉吾嘗觀曲江之在荆平居暇日登臨賦詠蓋皆翛然有出塵之想至其傷時感事寤嘆隱憂未嘗一日不在於朝廷而惟恐其道之終不行也其為心如此若南軒一日去貪吏十四人首劾舍賊之黨禮遇諸將勉以忠義隨事諭民具為條教暇日延見諸生尤惓惓於講學乃其政之大者君誠有意於二公之為守且能念夫時之有幸不幸也則凡可以弭亂保治者不能不為而為之不得不力昔人所謂雄據上流表裏襄漢者若增重焉而承流宣化之責真可與輔相者並豈特稱賢於一荆州哉寶偶有感於斯故因諸公之命敢盡言之先是君以寶嘗為許有所詢焉某皆不敢以告是區區者非大計所在不足以當天下之要衝也襲芳續録序靜修鄒處士之卒也鄉人哀之縉紳先生有述作焉其子拙隱君與其弟利卿集而為書曰襲芳録既傳於人矣越若干年拙隱卒鄉人哀之如哀靜修也縉紳先生又有述作焉視靜修不加少其子益謀于其諸父利卿亦為書以傳曰襲芳續録豫嘗讀襲芳録得靜修之為人今觀續録何拙隱之肖靜修至是哉世稱富家者往往以利賈怨出入閧訟之場彊俠弱諂介于權貴求免僇禍無少暇逸靜修獨以惠自將鄉人懷焉推為巨人長者故彼方奔走道路而靜修則幅巾野服逍遙林泉修孝義之節敦詩禮之文若與俗不相涉者厥亦異哉鄒為宋道鄉忠公裔孫其在吾錫居龍涇而以行義稱者曰桂堂翁伯惟曰元堂翁洪昭曰柏軒翁以善至靜修而盛奕世相承皆忠厚恭儉以行其惠凡蠲租己責振窮恤匱修廢舉滯有德于鄉人甚深且久人之慕鄒氏若孺子之於保母也靜修之子僅得庸衆人猶將敬而愛之況賢如吾拙隱者乎拙隱年未及耆其忠厚恭儉以行其惠者蓋無忝於世德而本之以孝義益之以詩禮論德者謂有靜修之風今則己矣縉紳先生所以道鄉人之哀者顧能減於靜修也哉録之續録之其為書異其所以為書同跡是而觀益為孝子利卿為弟弟而拙隱之德於是為益光矣詩録諸風史傳獨行是録也君子抑不能無取焉益吾舅氏梧岡過公之甥也頃利卿以益請序遂書歸之拙隱諱愚字智卿嘗以義受官階承事郎其行之詳具在録中送葉潮州序司徒副郎葉君廷璽既擢潮州之一月諸嘗同官者燕以餞之君起而須言衆遂相顧以余君同署也謂余宜為豫惟君昔以名進士出宰髙安御吏養人夙有聲稱及召為司徒之屬兩遷厥階稽閲籍載監督儲運不弛不察用歸于理若君之才而僅以之守郡蓋所謂愛莫助之者況潮遠在南海萬里之外其風俗人情豫雖觀于圖志而未能悉也即欲贈君其何詞之有獨念夫古今吏於潮者唐稱韓公宋稱陳公二公之政它不悉舉其於鱷也一則祭而逐之一則捕而戮之豈故若是異哉蓋韓之鱷出於冥頑不可弗諭諭之伺其化者仁以行義也陳之鱷類於怙終不可不懲懲之絶其惡者義以行仁也仁義之用同物異施施之庶政率由是道雖天下可也獨潮乎哉君行矣今之潮猶古之潮也有鱷如惡溪之冥頑則以韓之祭祭焉有鱷如萬江之怙終則以陳之戮戮焉若其無也蓄韓之詞斂陳之鋒以相安於平康之域抑亦未害其為善學古人也以是推之吾民仁以涵之義以制之靜以待之時以措之書稱三德正直剛柔此天下之政也雖然地有近遠時有順逆事半功倍往往以之若二公者皆以事出且自北而南間關嶺海食飲居起所不宜者多矣此固所謂遠且逆者而其所成乃章章如是君所居與潮比境而是行實出推擢以地不若二公之遠以時不若二公之逆今之潮何患不如古之潮哉葉君曰斯言也可以我贈矣於是乎書芹軒詩序𢎞治癸丑春寶自許入覲京師得㑹吾同鄉縉紳諸公自吾師蒿庵俞先生下凡若干人皆相率為芹軒詩曰此吾鄉友顧君之所居也賦之將以為贈寶竊問其所以名之意則又皆曰采芹之說見於詩言其誠也獻芹之事傳諸史言其忠也誠與忠合斯可以為人矣某於斯取之吾黨於斯賦之寶聞而惑焉夫芹也者物之至薄者也昔人之所以薦於鬼神羞於王公者蓋不知其為薄也不惟不知其為薄也且以為美焉是故采之是故獻之如此謂之誠如此謂之忠千載相傳以為美談盛事至于今不衰使其設心以為物雖薄也吾姑取之以薦以羞則將流於不誠不忠之歸君子奚取哉某之於芹其諸異乎古之芹矣雖然郭之巾謝之扇慕之效之抑不可謂不知所重者也以吾之不可學柳下惠之可古之善學者蓋如此然則某亦求其誠與忠而已孰為厚焉孰為薄焉茍誠與忠皆古人之芹也諸公詩既成什顧無序之者聞寶言乃命書之以為某告重刋鄒忠公文集序吾錫有鄒忠公之裔孫曰翎字時用者以公文集舊板刓弊將重刻焉而屬寶為序寶錫産也於公為後學蓋仰止者久矣顧舊集之序李忠定公實為之則何有於寶之言哉然嘗論人臣有言責者以言為忠言而關於天下之綱常知忤而弗恤知患而弗辟尤忠之大者也若公在宋論立后事蓋得於是矣當是時章蔡兩奸前後嗣相公再被竄謫甫歸而遽病以卒未能盡其所欲為者君子於是乎惜焉當公之赴新州也陽翟田晝迎諸途有士所當為未止此之言蓋所以望於公者甚重且遠卒之直節正氣久益堅定至於垂絶之際一見龜山猶以國事為問使天假之年則其所為當不止是矣蓋聞公嘗受學程門得中庸慎獨之要故所立如此然則節惠以忠蓋舉公之大者言之而豈足以盡公也哉古人論尚友之道必誦詩讀書而論乎其世若斯集者皆公平生之言詩可誦書可讀而世亦因以可見論者謂公謇而樂達而經辨而默其言之成文者當亦似之雖然公之文莫大於立后一疏則己毁矣其在當時既以起讒致禍而今所傳真僞異同誰與辨者君子能無感於斯乎時用素敦禮義而斯舉尤知所重故併及之壽丁母序正德丁卯秋九月吾門人丁延年仁夫既畢京闈試歸而謁豫於杭吾知仁夫學經甚習而為文辨博宜取髙第久矣邇乃連進連屈識者為之不平兹其來也吾意其將泄其怨尤鳴其抑鬱於豫而仁夫自起居外曾無一語及場屋事既而以其母孺人明年壽七十將率其弟舜年武年等稱觴致祝請豫為之辭其言曰吾母端重有則自入吾門逮事吾祖父母稱冡婦者若干年其孝慈之行孚于上下教吾兄松年業進士未成而延年與武年繼為庠生延年等夙夜黽勉圖獲祿養以承母志而未能焉今母七十矣顧何以藉手為壽哉豫聞而作曰仁夫斯言也足以壽母矣夫親以子顯子之顯親以文以行文行具矣則自外至者其得與否蓋不足深論子獨不見夫農乎農有美田而勤稼穡一不得年人曰已乎曰未也姑待之再不得年人曰已乎曰未也姑待之三不得年人曰已乎又曰未也姑待之既而有年大有年連收三嵗之利穰穰盈室祭祀賓客有餘用焉於是向之勸己者顧以為頌天下之事其久屈而伸固亦若是也哉仁夫與其弟某夫譬之於農所謂美田而勤稼穡者有年大有年之慶將不逺矣古之人有竇儼儀有宋郊祁者皆兄弟也今也安知不在丁氏母知德者也誦豫言其志能無悅乎藉手為壽莫大於是請為仁夫書之容春堂别集卷五
