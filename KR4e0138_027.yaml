body:
  text: 容春堂後集卷六明邵寳撰碣一首石表記一首銘一首俟歸銘一首塔銘一首墓碣銘二首李府君碣正德丙寅予自江西提學按察兩浙前蘭溪教諭武縁李璧以父憂服闋復除仁和持東山公手書見予里第予進與坐語璧起再拜泣出所為父誌銘以墓表請予感而諾之今八年矣至是璧同考應天還道錫山乃申請焉時予得請侍飬有疾初愈例謝文字獨念璧敏而好古常病鄉射儀節未備又以詩有燕饗通用之樂而無其聲譜爰自考定皆成書可誦此非俗學之士所肯為者卓哉乎璧之志也有子如此而可不知其父哉乃為叙論俾歸篆於碣其文曰府君諱芳字廷澤姓李氏世為廣西南寧武縁人曾祖回住祖慶祥父貴榮皆不仕貴榮有士行晦跡民間邑令祁陽竇道源用古力田有行義者禮禮之訪以民事府君生有美質甞受經於外舅曾氏年四十而力窘於贍始應都司辟為承差成化末授潮陽北山驛丞七年以疾告歸歸九年卒年六十一子二人長瓘次即璧以進士乙榜授今官其葬也在邑東五鳯村讓田嶺之原廷澤性孝甞自逺歸見父有病容牽衣為孺子泣不止見者色動及翁卒哀毁逾禮邑俗尚火葬薄棺無槨比屋皆然或謂廷澤盍從俗乎廷澤哭而作曰吾忍哉吾焚吾親也吾無室廬耶吾葬吾親忍不以槨也豈不量力固當勉之耳於是為棺若干寸又為之槨躬輦石負炭卜地營壙以襄事焉平居謹言慎行嚴於齋疾遇諸天變必焚香坐省良久乃復當少壯時尚論古人見非力不食者慕之爰即隙地數畆為圃雜植果茗旦暮躬治焉倦則休於松下哦古人詩取酒獨酌微醉則已論者謂有古人風致云於乎武縁尚火葬其來久矣廷澤生長於斯獨變而之禮葢資富者猶難之而況空乏者乎事出於識成於志識及而志從之俗固不能勝焉若廷澤者使其長一郡邑其於民俗當有所補而僅止乎是是固可恨論人者徃徃惟位之高下將可乎哉鄒室成氏墳前石表記徐塘鄒君漢陽葬其室成氏於唐墓祖塋之次户部郎中錢君世恩既為之銘復謂墳前有表而缺焉無文無以彰其賢也乃屬其從子諫為狀以其孤某來請成之先本淮陽人宋南渡時來居無錫開化鄉自是數世鄉稱善族國朝正統間有曰元中者生子曰秩字景高自邑庠貢而升諸太學官永康縣丞其子曰珏字世美為邑諸生娶吳太僕永貞之女久未有子有女子子一人成是也成生四歲而吳沒七歲而世美沒祖母應閔其孤也擇而得漢陽遂許妻焉年十六舘之於室居無何成顧漢陽曰子事父母婦事舅姑人之恒道也易是為異然而有不得已者吾姑家居於鄉伯氏諸姒事之舅役於公城居為多汝以子職侍吾將佐焉而亦弗失吾祖母之依君以為何如漢陽曰然乃脫簮珥助漢陽作室自舘徙居之其於姑錢日饋以僕旬問以媵時省以躬久之諸子且長成乃復佐漢陽治鄉第以歸或請其故曰市習成靡鄉習成朴吾斯為吾子計耳姑没後數年舅亦没成兩佐治喪皆謹於是應在饋問省如于其姑既葬則别室祠之父母與焉曰吾祖母所以舘甥我者為吾親之不食也吾父母不于吾祠將誰祠諸烏乎推父母之愛於舅姑則邇室以養反舅姑之愛於父母則别祠以薦出於情而權於義得禮之變焉此其天資固有過於尋常者哉鄒為錫望族其先出宋忠公浩之弟泂葢十有三世而至用章長子曰鵬字圖南甞任臨江推官其季即漢陽其名鵾稱克家子例授蘓州衛指揮僉事鄉之人謂成不媿鄒氏之婦吾觀諸其大而知輿言之允也於是乎書他若稱慈稱惠於族姻者多矣以有誌銘故不書諫漢陽仲兄某之子其行已慎而義其為狀葢不誣云故楊秋林配陳氏墓前石表銘有序秋林楊君卒葬龍山石埠之原越若干年正德丁卯某月某日其配陳卒又七年其從子蒙以其嗣孫冲葬焉於是秋林墓地病於水乃卜遷而南凡百歩許合葬如禮題名之碣不書孺人禮也蒙恐貞德弗昭復樹石表墓前奉陳從弟用濟狀介秋林友玉林潘君來請銘之某祖母贈淑人秋林從女兄也秋林資富而務學居囂而習隱既冠有室猶劬書無倦充其志蓋將以詩自名時諸閭右方孜孜營利奢麗同流君獨退然布素惟博購古書史圖畫庋閣一堂日坐其中披誦如諸生時從鄉先生長者請益焉諸老顧曰君吾友也皆忘其年而與之交暇則古衣冠登山飲泉高歌李杜諸作聲振林壑望之如神仙中人蓋其風度曠逸如此比卒年財二十有八而已陳歸秋林若干年産一男越歲而殤父母舅姑及内外姻戚皆憐之既除䘮誓死守節處一室三十餘年紀綱諸僕各有分業用禮自衛嚴莫可犯卒年五十九初以舅姑命立從子乾之子浚奉秋林祀後浚兄渭死則俾浚歸後乾而立蒙子洵陳卒後三年洵又死乃立冲冲洵弟也秋林諱謨字孟賢楊其氏世為無錫望族父素庵諱霆母魏氏其卒為成化乙未陳居邇楊氏而族望相埒世有詩書故工部員外郎葵庵先生以詞翰圖繪妙一時者其伯父也父公益母許氏陳初寡時年二十七越五十不改節於制當旌有司將有事焉以死而止亦制也烏乎其命也夫雖然他日志郡邑者將收之其亦有不朽者在則非制所拘也秋林詩長於律絅庵李先生評其得意處上逼大歴才子惜其遺藁今不復存而單章片詞流落社中者後之人或能收拾而傳之乎葬之年為正德癸酉其月甲子其日甲申銘曰烏乎秋林才而弗年昌其詩而未傳婦節孔堅如璧斯全後死及泉無媿厥天斯合斯遷有邱隆然石表在前吊者視旃梅邊潘翁俟歸銘有序俟歸銘者二泉居士邵某為梅邉潘翁作也於是翁年九十矣而精力倍壯夫時徒歩入九龍山中飲泉采藥見者異之初翁以醫鳴於邑既乃謝去不事葛巾布衣遊縉紳間晩以高年應詔受冠帶中庭有蠟梅一樹相傳為其高祖手植迄今百數十年而歲華不衰翁愛而培之予初舉進士還因以梅邉號翁且為之記故人遂以稱翁焉翁兄弟三人其仲繼德先卒翁獨與其季繼善居歲時奉先祀唯謹先世書畫器玩必珎藏其先有失去者力求復之世交之家歲時過從久而不渝論者謂有國初敦朴風成化丙午一疾幾殆既起為詩自慰卞郎中華伯陳方伯朝用諸公聞而和之自是以家事屬繼善日習靜自頥故其壽如此配王氏無出年三十九以成化乙酉先卒越五年己丑葬開原鄉祖塋之次翁歸將合焉翁名繼賢字俊卿潘其氏也潘自宋以來為錫族望高祖仁仲元無錫州醫學教授曽祖克誠太醫院醫士永樂中甞從文廟北巡至其祖韞輝醫術益精父時助世其業翁之望葢稱其父云翁一日走告予曰古人謂死歸脩身以俟之吾媿於是而竊慕焉子以吾銘翁生洪熙乙巳閏七月十三日其歸之年月日虚其左方將書之銘曰老為逸民以年受服貞馨者梅比我墻屋不厭爾生亦胡諱死升邱擬歸銘者泉史惠山釋知微子塔銘惠山釋圓顯初號卧雲晩歲予以吾儒言字之曰知微子姓陳氏世居富安鄉負表橋父淑母顧氏知微為其次子幼有慧性每言欲為釋有星士過之言如其志與羣兒處見有捕鳥雀踐蟲蟻者輙蹙然曰微物亦命何忍傷之父母異焉年若干遣入惠山寺南隱房禮虚庵之徒元為弟子越四年成化丙戌上祠部給牒祝髪歸遍究釋典朝誦暮繹以虚庵為師時瑨覺義楚石方住惠山高簡自負諸僧鮮當其意一見知微輙以法器期之虚庵因遣學於秦行義高梅庵二先生講聞論孟大義兼事吟咏於是虚庵年高倦勤事歸知微以才僧稱𢎞治丁巳寺住持缺衆舉知微知微曰此雖小事進必以正故事有僧録檄無檄非正也遂走京師領檄而歸既五載復念曰士君子以知止為高況吾僧乎即謝事歸南隱既而以山志缺手搜諸舊蹟質諸潘玉林莫南沙二先生為書一編予為定著刋布所謂惠山記者是也又為惠山集若干卷知微歸以闕距其生正統己巳七月十八日為壽若干其從釋在天順癸未至是凡若干年知微徒一人曰眀睿眀睿徒性純性純徒海深海深徒中定中定徒大㑹葢五傳皆經知微指教予世墓山之聽松庵徃來山中因與知微遊及作精舎則更宻邇而過從益數聞劉宋時有開山僧名顯者居華山精舎即南隱舊址今知微復之而名適與同以彼法觀豈所謂前後身者邪虚庵名覺性字海中後楚石住山大夫士多與之遊虚庵塔在南隱西南白石塢之原知微塔又南若干歩銘曰知微曷氏負耒橋陳自宋迄今代有令人子慧自童薄商鄙農乃謝父母釋氏是從釋氏言心亦復言性子樂聞之養慧於静名山名泉有師有友入侍出游望起於久言以吾書能自求益知進知退壯勞老逸釋墓為塔銘乃屬吾吾非退之子文暢徒吾弗能圖承事郎浦君墓碣銘正德丙子三月十有五日浦君均萬忽病中風以卒於是季子禾試於察院提學張侍御方稱於衆禾以君病告歸走五十里至家猶及未瞑然不能言矣君篤於教子先一日得禾所試文喜而誦焉而遽至此予聞而傷之至是將葬其子榖等既得誌於都太僕元敬復以碣之石未有文也禾乃自述狀及都誌來請先六年庚午予以都御史致仕還自漕臺實始識君時予倡浚泉之議方與諸士族籍而計貲君首以白金若干歸董役者既予再歸而病聞君以重役將訟焉予語人曰無庸將自濟君聞之輙受役去君殆强於好義者哉誌稱君好赴人之急甞繫獄獄有商誣於盜無以自白將自盡君止之出為言於官商既釋欲以女歸君君正色曰汝何見吾淺邪蘓郡有掾死獄喪不能歸其妻泣行於道君見之罄所持錢數千畀焉鄰家傭病死或將誣焉以要重賄君曰是不可使逞力為辯之事遂寢歲饑勸分里胥受賂濫及中人之家比至君鄉君捽其首數之以其賄而擾民詞色俱厲里胥謝之道見暴屍君收而瘞諸石窒山下遂治為義塚云凡是予皆無間𤣥敬抑有予所見而誌未及載者特著之論者稱君俠然君生治世俠之跡不多見無亦有其心乎君諱億號成齋浦其姓均萬其字甞以賑饑令受承事郎階世為無錫人初居延祥鄉再徙前澗今稱前澗浦氏高祖賢曾祖祺祖㴵皆以朴稱於鄉父瓛博渉書史母顧氏繼華氏君初配錢氏繼室以陳氏子五人長即榖待引禮舎人次􅀈國子生次穉次即禾縣學生次稱女子二人壻為錢粲華有臨孫五人遺珠貫珠明珠還珠貢珠孫女七人長許嫁錢某次錢某餘幼君之卒距其生景泰甲戌二月十五日為年六十有三葬以今年戊寅三月三日石窒山之西原其墓也兆與錢合銘曰於斯乎有山磊磊維石其横庚庚鋌鋌其直君産其傍好義以彊言磬辨若厥聲載揚而復是焉藏不遐有尚尤君文卿墓碣銘予病起之歲里有宋禮部尚書遂初先生之後曰尤君文卿者介馬大常來請雪篷詩於予予問之文卿對曰昔之日吾甞乗扁舟出姑蘓西南盡吳之境觀潮於錢塘又西歴富春艤釣臺下吊子陵之祠遡蘭谿而上至三衢乃沿而東於是歲寒雨雪孤篷蕭然自謂兹遊之勝也因名吾居以志不忘吳寗庵張企齋二先生皆甞賦之矣予竒焉亦賦之以歸越明年乙亥君卒又三年戊寅乃葬其子基介其妻之父瘦竹陸翁來請銘予念夫君市居而趣江湖且荒寒揺落中獨若有得是可知其人矣按顧行人與新狀君於遂初為十三世孫在國朝曰舜仲斯道大年者君曽祖祖父也母為鄧氏君幼秀敏稍長遊鄉校壯有幹蠱稱初與弟同産比分率讓以取中歲以經學教基基業日進君則自慰遂優游以老君諱煥文卿其字世為無錫人配盧氏後君一年卒子男三長堂次即基縣學生次坦女一適高遜孫男五愚魯蒙訥魯訥俱學生其季幼未名女六長適王琨次適李賔餘在室曽孫男女各一葬之日為三月甲寅邑開原鄉游來塢君祖塋在焉今葬其側與盧氏合兆盧稱君之配其族於君里亦相望銘曰繄若祖兮遂初尤箕兮裘兮幾百秋嗟夫君兮好脩碣吾銘兮兹邱尹府君墓碣銘永新尹府君嘉言既卒之十有二年其配孺人高氏以疾卒於其子建陽知縣衮之官舎衮以喪歸暨其弟翰林庶吉士襄啓府君兆合葬焉碣於墳前題之曰尹府君之墓孺人不書禮也初府君墓未有銘襄甞自為狀請追銘於予至是終制北上又以為請按狀府君諱謨别號松隂尹其氏嘉言其字世居永新國初有羅命者生溟生溟生時裕娶於彭實生府君府君少好學通經史大義賦近體詩徃徃有竒句執筆作字必法於古在鄉曲中居然儒生既而時裕當督鄉稅府君曰父勤于役而子弗能代讀書奚為遂棄其學而從之葢不勝其瘁而識者知其中固耿耿無所累也數年行益檢飭稱端雅士家故凉府君初無意營治久之益落遂挾貲遊江淮間弛本收息息固微復有貧而負者府君嘆曰是固吾所欲周也而忍廹之乎即探囊中劵焚焉南之襄漢禱於太和山而歸於是二子衮襄皆知學府君曰是固吾事擇良師友從之講業悉商貲為共費躬校諸書訛闕句讀之鈎提之以授二子曰是宜熟記是宜深思日以為常常焚香危坐與二子俱誦曰此收心法吾故身率之晩年以家事屬其弟諒日惟觀書有㑹於心輙書座右蓋忠惠直諒知德者有公論焉高亦永新善族孺人柔静端確得訓于其父某母歐陽氏年十八歸府君事舅姑者若干年敬共以順又若干年而府君卒平生寡言絶遊聞古貞孝遺事輙稱以詔卑幼其教子如府君之志没身不衰衮領乙卯鄉觧甲子襄發觧第一當偕試禮部襄以孺人獨居請留侍焉人謂襄才而氣銳有連㨗之勢皆勸之行襄曰兄長宜先仕襄固當留孺人曰然比就衮養始至官舎蕭然視之莫異也因以苦節勵衮其知義如此府君卒𢎞治某甲子某月某日年五十有六孺人卒正德壬申十一月二十七日年六十有五子男二人長即衮今為䕫州府通判次即襄進士改翰林庶吉士女一人適吕珊孫男四人祖愛祖憲祖慶祖懋墓以府君治命卜所居東若干歩廟山嶺之原其葬也府君以癸亥十二月二十七日孺人以癸酉十二月二十日銘曰幼不卒學壯不卒遊嗟若人兮好脩人莫我知我無尤有子可教歸而求後死十年銘此邱嗟若人兮鄉誰儔容春堂後集卷六
