body:
  text: 容春堂續集巻七明邵寳撰奏疏七首奏疏乞終養疏都察院右副都御史致仕臣邵謹奏為陳情乞恩終養事臣以庸陋仰荷朝廷作養由進士厯任許州知州户部員外郎郎中江西按察司副使浙江按察使右布政使湖廣左布政使正徳四年正月内蒙陞都察院右副都御史總督漕運本年十月内總兵官平江伯陳熊為事以臣不曽糾舉得回原籍致仕感激聖恩無由報答今者朝廷誅殲兇奸維新庶政收遺起廢猥及臣寳命廵撫貴州地方臣雖駑鈍當即驅馳以效犬馬之用但臣有廹切至情輙敢冐昧陳乞先臣溥生臣三歳不幸早世臣母過氏教育臣至今日母年七十歲臣年五十一歲無弟無子歴任中外二十餘年臣母一向隨任先因孤苦成病寒暑悲憂隨感即發向在江西因臣視學逺離蚤夜思念一病幾殆比時具本乞終養間適有浙江之命僉謂去家不逺不可輕辭於是勉强奉母赴任繼至湖廣則催科政急繼至淮安則轉輸事殷不敢言私去年秋冬臣自淮安赴京議事臣母思念臣切舊疾加増痰氣攻心眩暈顛越日夜呻吟幸得醫官人等百方救治比臣南還尚在床褥轎臥登舟抵家數月病凡五發發即増重臣侍奉湯藥朝不保暮當此之時臣若逺離萬一不諱其將誰歸臣嘗念天下事有相濟理有曲全故雖難處而無害於義向使臣或有弟承歡或有子代養臣縱遠離猶可恃此無恐今臣兩世一身母子為命離别之際暌違之餘有不忍言者臣以一心公私兩用懷親廢事是謂不忠不忠敗政忘親從事是謂不孝不孝傷化其名不同為罪則一聖明之朝何取於臣而俾厠羣寮之末哉伏惟新政之初正申明忠孝以勵人心之日臣之區區必在諒察顧嚴命下臨恐蹈避難之罪左慮右顧不能自處勉强奉母扶輿登舟前去行事但髙山峻嶺日久路長母病且老不知何以為計惟君父為臣子之天窮則號籲固不能自己也如䝉俯察微忱乞勑吏部容臣照舊致仕另選賢能以任巡撫則臣母衰弱餘年不至失所臣感激聖恩而圖報於他日者當有在矣乃若臣才踈行劣叨竊禄位養士治民功効罔著正宜投閒置散而今年六月以來兩足風濕行履不便事上接下俱有妨礙理當自陳特以母身為重未敢先言臣不勝迫切祈懇之至為此具本令義男邵吉親賫謹具奏聞伏候勑㫖正德五年十二月十一日通政司官奏奉聖㫖吏部知道欽此第二疏欽差巡撫貴州地方兼理軍務都察院右副都御史臣邵謹奏為陳情乞恩養病侍親事臣自前歲䝉恩致仕回家左足感患風濕不便行履者數月仰荷聖明起廢畀以巡撫之任比因母老有疾疏乞終養兼列臣病之狀既而勑符繼至不敢寧居十二月内力疾奉母南行間關水陸隨路醫治稍愈復進今年二月間行至中途忽聞有户部侍郎提督倉場之命臣感激之餘追念兹行臣母病體衰弱不勝勞頓計無可全之理幸賴聖明在上體悉隱微再造厥命恩徳深厚莫知所報但臣母舊患痰氣等證因勞屢發發輙増劇臣患風濕亦復時發未能趨事臣雖至愚仰思俯念亦知君親上下之分家國重輕之義前日之請非不得已豈敢上凟今地非前比而母子私情與前無異感恩圖報固切素懷量力就列尤深愚慮惟義所安則臣之分竊以官員養病舊行有例人子侍親新頒有詔臣於二者倘荷聖恩得處其一庶幾以公遂私情法兩全天地曲成之望實在於此如䝉特勑吏部檢臣前奏早見施行則母全一日之生子免終身之悔皆皇上所賜區區犬馬之力臣於他日不敢不勉臣不勝廹切懇欵之至為此具本令義男邵旺親齎謹具奏聞伏候勅㫖正德六年四月二十二日通政司官奏奉聖㫖邵寳已有成命了着上𦂳前來供職不允所請吏部知道欽此第三疏户部左侍郎臣邵謹奏為陳情乞恩致仕終養事臣由進士歴任都察院右副都御史總督漕運因事致仕正德五年九月内欽䝉起用巡撫貴州地方兼理軍務比念臣母過氏年踰七十衰病侵尋難以就養方圖陳請間勑符繼至不敢寧居勉强前去地方行事一面具本令人奏乞終養奉聖㫖吏部知道欽此節該吏部查看得臣所奏與諸司職掌面奏事例不合行臣照舊管事如果母老不能遠離户内再無以次人丁侍養遇有公務赴京自陳照例施行臣至湖廣長沙府醴陵縣忽聞欽陞本部右侍郎提督倉場還至江西南昌府具本令人再以終養為請節奉聖㫖不允所請吏部知道欽此備行到臣時臣母病在身只得留養於家臣乃單身北上不意臣母自臣别後思臣傷感舊病舉發服藥調理日復一日未見輕減實是不能遠離臣節次得書憂念無己竊見在朝大小諸臣或父在或母在或父母俱在者各有子孫在家奉養獨臣母生臣甫及三歲父即棄背臣今無兄無弟無子兩世一身形單影隻實是再無以次人丁侍養且臣母所患心氣病證或一月一發或兩月一發呻吟呌號連日累夜聲徹隣室當此之時倘有不虞將誰付託是以臣於朝署公事之餘退處孤館泣對僮僕方寸煩亂至忘寢食近日以來舊患怔忡翻嘔腿足麻痛等證不時發作雖欲勉效勤勞而情緒荒忽事多曠廢子道既虧臣職尤闕書稱用咎臣之謂矣如䝉聖慈念臣孤苦無與為比特勑吏部查照臣累次所陳情悃放臣致仕回還原籍侍養老母以終餘年臣不勝感戴天恩之至為此具本親齎謹具奏聞伏候勑㫖正德七年三月十九日通政司奏奉聖㫖邵寳為母乞歸情詞懇切但係用人之際着照舊用心辦事不允所辭吏部知道欽此第四疏户部左侍郎臣邵謹奏為懇乞天恩致仕終養事臣近以母老有疾别無以次人丁侍養具本陳情懇乞終養欽奉聖㫖邵寳為母乞歸情詞懇切但係用人之際着照舊用心辦事不允所辭吏部知道欽此欽遵臣聞命感激繼以悚懼竊念人子有親而仕常變不同若一身之外有兄弟子孫以及羣從居可依棲行可仗託此其常也數者咸無焉是之謂變臣寳不幸罹是仰惟皇上垂慈下照至形情詞懇切之語則所以體悉臣者至矣盡矣臣復何言惟臣父棄世時臣在孩提不知執䘮迄今思之恍如夢寐悔恨無極今幸有母竊禄為養而晩節不終孟子所謂不可以為人者臣之謂也聖明在上用人雖切亦何以臣為哉方今羣賢滿朝如臣不肖焉能有無其在臣家母無二子所係甚重伏惟皇上建極作人大以成大既屬諸經濟之才小以成小亦遂其俯仰之分天地曲成之心於是為至臣故不能自己竊有望焉載念昔在江西母病嘗殆臣時視學出外得報回司備聞母呌號顛頓之狀憂悔並切具本令人奏乞終養巡撫都御史張本謂皇上初政不宜以私上凟既差人阻回於途仍留久任提學奏下吏部尚可查檢比來又經數年臣母老病比前増倍臣之嗣續望而未得臣母之憂復有出於疾病之外者是以臣於正徳五年一請終養六年再請及今三請不敢以悚懼中止况臣積憂成病如前本所陳皆非藥石可療昨於四月初四日得三月初七日家書云臣母於二月初十日被跌傷重至今臥床不能行履臣當此時何以堪處如䝉聖慈念臣事因切己情本由衷特勑吏部放臣回還終養臣母俾兩地之憂病釋於相見之間一家之命脉全於幾危之際皆皇上曲成之恩也臣無任迫切俟命之至為此具本親齎謹具奏聞伏候勑㫖正德七年五月初八日通政司官奏次日奉聖㫖邵寳以母老有疾懇乞歸養有㫖慰留了今又再申前請准暫回省視着上𦂳前來供職吏部知道欽此第五疏戶部左侍郎臣邵寳謹奏為母老有疾無人侍養乞允前請致仕終養事臣以母過氏年逾七十久患病證止臣一子臣又無子無所依託節於正徳五六年備列情狀乞致仕終養累䝉溫詔慰留供職今年五月内復具疏懇請伏䝉聖慈垂鑒暫准省視仍着上𦂳前來供職臣聞命感激當即起程還家與母相見咸謂此行實出殊典恩之所及雖止一身一家而天下之為母子者莫不感悦顧臣庸愚陋劣何以當此初意省視之餘即趨供職不意臣未到家之時寇警流傳在在震悚臣母衰弱餘生先是被跌傷重伏枕數月至是憂懼内傷藥不能愈况舉目四顧臥榻之外惟臣孤身無兄無弟無子固猶前日也欲起同行則病不能强欲留獨處則憂何以堪憂病相仍必至危殆臣將何以自處哉仰惟皇上以仁體物以義制事方臣待罪部署既荷俯察以遂其私則臣今與母生離之苦豈以遐逺不加體念哉臣竊觀聖朝凡諸臣乞終養者查與例合無不俞允其在大臣亦有終養如都御史高明者臣之不肖雖非明比而母子為命之情比明具慶者尤切况臣新患風濕兩足麻痛難於行履當此之時正宜推賢讓能仰承宵旰用人之意如䝉皇上鑒臣苦情特勑吏部容臣致仕終養臣母另選賢能以充厥任庶幾立愛惟親推恩自近將見天地之間無物不得其所非特臣一身一家之幸也臣不勝披瀝祈幸之至為此具本令義男邵旺親齎謹具奏聞伏候勑㫖正徳七年九月初八日通政司官奏次日奉聖㫖邵寳既奏稱母老有疾情詞懇切准他侍養他母病痊之日有司奏來起用吏部知道欽此第六疏欽准侍養原任戸部左侍郎臣邵謹奏為陳情乞恩辭免重任仍容侍養事臣係直隸常州府無錫縣人由進士歴任戸部左侍郎正徳七年九月乞恩奏䝉欽准侍養正徳十四年九月初十日准吏部咨節該本部題奉聖㫖邵寳陞南京禮部尚書欽此欽遵備咨到臣臣聞命感激繼以兢惕除即日扶疾叩頭外臣惟宗伯任隆司存三禮留都地重職備六卿顧臣才徳既非其人而臣之情事又有必不能舍者臣之軀力又有實不能勝者天寵雖臨敢輙叨冒外干輿論下貽後艱竊念臣三歲而孤賴母過氏教育以至今日先因臣母年踰七十疾病交攻臣惟一身無弟無子臣累具疏乞歸照例終養比䝉聖慈憫臣孤苦至情特廣殊恩准臣侍養是惟大造之仁使臣母子各遂其所凡臣母得以茍延數年之命者皆皇上之賜也今臣母年至八十神志耄昏體力頽弱病在床褥每發輙危久近之期有不忍言者臣於此時可一日而離側乎若奉以就禄則自臣家抵部水陸計四百里顧臣母病勢如此道途困頓必不能堪儻由此以致不起則是養事靡終顧速其壽以負我皇上前日曲成之恩臣之不孝莫大於此尚何能强顔就列與聞邦禮乎况臣自正徳八年正月十八日得患中風病證左手足痿痺醫治數月稍得輕減而筋骨之間外强中滯迄今數年歳時家禮拜起艱難湏藉扶掖若不自知止勉造班行行禮之際一時隕越勢必有之臣不足論實恐重負聖明㧞擢之意臣誠愚昧進思退省慙懼交并敢不吐露以祈寛假伏望皇上俯察臣前所陳之情特賜收回成命仍勑吏部容臣照舊侍養臣母别選賢能以補前缺萬一犬馬餘年稍後臣母當從諸臣少䇿駑鈍以圖涓埃之報臣不勝祈懇迫切之至為此具本令義男邵壽親賫謹具奏聞伏候勑㫖正徳十六年五月十五日奉聖㫖卿才行老成特兹簡任先朝已有成命不允所辭着上𦂳到任管事吏部知道欽此第七疏南京禮部尚書臣邵謹奏為仰承恩命俯切母私陳情懇乞終養以圖後效事正徳十六年七月初一日准本部咨准南京吏部咨准吏部咨先該臣奏欽奉聖㫖卿才行老成特兹簡任先朝已有成命不允所辭着上𦂳到任管事吏部知道欽此欽遵備咨到臣臣叩頭伏讀之餘不勝感激之至不勝惶愧之至不勝憂懼之至恭惟皇上聖徳龍飛代天理物總攬乾綱聰明四逹旬月之間庶政一新海内風動乃者起廢振遐猥及臣寳閭里懽呼士夫賛慶皆謂千載難逢之嘉㑹臣之感激孰大於此臣以諸生進身歴官中外三十餘年碌碌班序少壯之時尚不如人今年逾六十衰病侵凌其何以充任使從諸大夫後乎臣之惶愧孰大於此臣於此時分當踊躍奔走勉䇿駑鈍少竭涓埃之報顧臣三歳而孤臣母過氏撫養臣至今日臣母六十衰病七十加病時逆瑾初敗起臣於休致由副都御史再遷戶部左侍郎臣念無弟無子養無所託臣於正徳五六年是以有終養之請比䝉先朝念臣累疏懇切准令照例侍養臣歸之八年南京禮部尚書員缺吏部查照前巡按監察御史唐鳯儀葉忠節上便養薦章會官推舉起臣前職時臣母年八十病體如舊臣是以陳情辭免再申終養之請去年正月臣母加患中風病證卧起便旋不離床褥今年二月側聞吏部題奉先帝有終養之命方切欣幸近於四月中旬前病加重勺糜匕藥不能入口屢絶屢甦舉家號泣誠不自意數日之後畧進食飲幸存殘喘即今氣息奄奄朝不保暮臣方寸迷亂欲舍而獨行則既難於訣別若奉以偕往則又難於動移况臣先於侍養還家之明年輒病中風雖幸茍全而左髀右足外攣中滯拜起艱難禮先謁陵以病足必不能堪五里之步趨禮重進表以病髀必不能堪十里之騎導他如此類尚多强而行之倘臨事隕越得罪滋大再惟邦禮攸司實關神人上下夙夜寅清臣方有愧於斯而内危病母外怯病軀二念交縈實有不能單心從事仰禆新政之萬一者臣之憂懼孰大於此若慮冐瀆宸嚴不於此時再申情悃是臣不誠於君上也臣誠至愚何以自處伏望皇上鑒臣感激思奮之深衷察臣惶愧圖報之誠意矜臣憂懼不能自處之苦情特賜收回成命別授賢能容臣照舊侍養終母餘年臣若未死或承乏一官犬馬之力不敢不勉報劉日短臣不敢言然聖明在上體物不遺臣亦何忍不言以負吾親哉惟皇上哀矜而曲成之則生死肉骨皆天地之賜也臣不勝激切披瀝之至為此具本令義男邵夀親賫謹具奏聞伏候勅㫖正徳十六年八月初日通政司官奏本月十二日奉聖㫖朕以卿才行老成新政之初特兹起用既累乞終養孝誠懇切勉從所請着有司以禮存問待親終之日來說吏部知道欽此容春堂續集巻七
