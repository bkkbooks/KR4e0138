body:
  text: 容春堂續集巻三明卲寳撰七言律百五十二首七言律雨坐初春煙雨似梅天牆角梅花尚索然病客有情常夢野閒人無事漫占年永縈淺碧連城外草送輕青到檻前聞道憂民新令尹幾廻騎馬勸耕田忽憶江西湖南時風景用前韻漫道呉天似楚天四時風雨一蕭然滕王閣下維舟地黄鶴樓中聽笛年春色漸回梅放後秋聲應盡鴈歸前東山屐在堪乘興閒送清泉下石田雨中寄浦文玉用前韻時文玉為予評訂學史風雨無端莫問天新編讀罷自欣然寸心敢謂能千古一話真應勝十年江郭鳩聲春笠外山牕梅影暮燈前明朝獨上鵞湖棹回首蘼蕪滿野田春日無緒泉亭書院俱缺一至次浦文玉山行用杜韻仲春風日尚微寒兩月多愁懶戴冠雨後花催連夜賞雪中山憶隔年看雲開平野還盤谷石轉清流更激湍物色有餘情緒少幾時慈壼報平安春水夀王郡侯懷李樓前春水深郡公多暇重登臨長江對我一盃酒白日在天千古心筆無留翰漢老吏詩有餘才唐正音年來初度未須祝手植甘棠新作隂送顧行人與新奉使真随八月槎南風五月又辭家松花露溢離亭酒石子泉將客路茶北極朝廷瞻象魏中原藩省賦皇華明年再攬澄清轡獨聽民謡到海涯久雨熟盡黄梅雨不休出門何處覔滄洲勢傾底柱河全㵼氣塞歸墟海逆流圃史空傳葵有日田家長嘆麥無秋𣺌然舟楫吾安往古華山前一倚樓秋夜月流雲竇影庭柯今夜風於昨夜多我病未堪空酒在秋聲如此奈愁何人言每信天無漏世事真看地有波三嘆朱弦誰聽者幾回擊節杜陵歌野色黃泥橋西溪岸斜東風吹水擁溪沙杜陵藥餌長隨我韓子詩書正滿家何處不看懸磬室有人還着替舟槎渙然亭外當時路只隔南涯與北涯秋夜宿惠山精舍惠山草堂秋夜清道人夜坐聽泉聲中庭不見古松影西嶺却遮新月明一里松菴期信宿十年鹿洞夢孤征明朝藜杖須將去從我閒行三兩生得如山和章再用前韻落日空山鐘磬清隔溪時聽櫂歌聲小橋再渡覺身徤高閣一登增眼明望極江湖雲北去夢囘歲月鴈南征黄花亦是秋風客儘辦寒香對老生九日過國臣弟南莊鳯皇墩下扣柴關籬落黄花手自攀適野亦堪酬令節避髙應不到名山情多更欲臨流坐興盡真拚載月還最喜晩來風色定小橋回首碧灣灣寄顧台州華玉秋晩懷人思欲荒東南江水隔錢塘山髙故近台三象郡僻真懸海一方他日曾看周砥柱何時能翦召甘棠觀風定有新詩句願托王生為寄將新春庭草猶枯漸有情簷聲如雨雪初晴緣江積凍朝尋徑匝市浮煙午出城風信巳非前九烈月華應為上元明梅花兩樹香如許誤道詩人在冉涇得章司成楓山先生書司成書自道卿傳千里楓山越四年風雨夢從初起處江湖心在未歸前數盤谷可容君築萬里門曽泊我船聞説臨風多感慨乾坤囘首一茫然戊寅八月以容春集託喬司馬寄王中丞虎谷越歳司馬以集還因得中丞之訃隔歲書囘不拆封驚聞虎谷失髯翁風騷遼濶遺音在江漢蕭條老眼空壯志欲從汾左右汾謂文清薛公清聲曾動陜西東虎谷嘗以言事謫官陜州既而擢陜西提學僉事七年又洒柴墟淚屈指交㳺俯仰中柴墟儲公卒今七年矣吾悲虎谷猶悲柴墟也守溪公惠洞庭新茶侑以長句奉謝洞庭春茗過湖來閣老新詩手自裁錫谷泉應將撱石玉川風欲問蓬萊竹罏縱有僧堪借梧几曾無客與陪何日山中尋舊約莫釐高處一登臺悼沈提學休翁江東回首復湖南到處春風許我㕘萬里無槎心獨往千鈞有筆力能堪鳯皇臺逺空魂夢黄鶴樓髙絶笑談最憶牽衣相别地碧瞳如水鬢䰐鬖予自湖南之漕臺翁手予腰帶笑謂其子曰我江南有此秀才松壇午坐與送茶諸僧竹裏風來生晝凉况逢時節近端陽也知城外塵能少却道山中日更長雲壑飛泉頻倚杖松壇磐石漫焚香老僧供茗渾忘味好向嵩峰問溥光答姜士元用舒國裳韻歸舟不見急流難曾向嚴灘濯我冠何處世情非灔澦幾時塵夢不漪瀾漪瀾惠泉堂名山中松子秋還落海上桃根晩更蟠遥想棲賢山名雲霧裏定依北斗望長安用杜韻寄李劔州病餘岑寂向林邱消息欣傳李劔州蜀道巳通今四海禹疆還識古諸侯孤城力起千家市短劄情隨萬里舟我亦舊遊忘未得夢魂長繞紫薇樓紫薇樓在浙藩答陳憲使文鳴過訪不遇黃梅雨過綠秧齊日向山莊路不迷萬里仙槎還海上十年清夢幾湖西太行碑刻看新打嶽麓書籤憶舊題謝客也知非此客却教泉釀負蒸藜文鳴報書久不至江船連夜發蓉湖三宿封書報尚無夏榻夢魂便客少晩輿游興對僧孤驚風驟雨常懷楚逆瑾煽虐時文鳴同官湖南麗水佳山又過吳欲向詩囊問竒句𤓰州囘首𣺌煙蕪和喬司馬三首梅花水梅花不見見清㾗何處還堪索笑言雲影逗風俱澹蕩波聲流月自潺湲湖山韻絶弦長斷洛浦香銷珮獨存春到江南無限樹不須臨水賦招魂觀音山觀音閣下江水深閣上丹崖知幾尋安能羽翼一飛上獨凭闌干時放吟鳥去却留雲棧影潮來還起石鐘音十年老眼今如夢遥為巖翁重此臨雞鳴山鐘山西引一峯高雲磴盤紆歩不勞畫裏樓臺復鐘鼓望中城市有林皋江流入海初奔放世路懷人更鬱陶却倚崔嵬發長嘯松風何處起秋濤夏吏部于中以諌除名訪予里第予避暑山中聞而賦此南歸吏部一方巾冉水東頭訪病人萬里孤槎浮海夢片言九死報君身風從逺道來應好暑向深山避却真從此著書應滿室草堂深閉楚江春舒翰林國裳過錫病不能來其人來言之病客舟中不著巾山中而我亦懷人平生温飽元非志萬死艱危尚有身風力南溟㸔獨近潮聲東海聽初真也知夢轉滄江晩正想臚傳玉殿春萬汝信與國裳同舟用韻再寄一封書上幾沾巾道路爭傳國有人雲霧政勤瞻斗念風波還重渡江身吳門晩樹舟邊近楚澤秋蘭珮後真却憶匡廬弦誦地五峯囘首不勝春晩涼晩凉幽興為誰多聞道靈旗巳渡河露咽微吟還蟋蟀雨添新韻到蕖荷牕前夢醒風初定枕上詩成月己過從此炎蒸應盡退不須頻問夜如何寄莫如山五更夢醒憶南沙只尺天分路兩涯詩草往來憑稚子春光深淺問梅花節臨雨水初飛雪路阻山泉未試茶畫裏西湖皆幻景似聞高興在東家得如山和章兼荷踏雪見過用前韻雪後相過屐印沙美人望不在天涯九峯西照雙溪水萬樹東風一夜花天台客去方燖橘陽羡書來未寄茶留得山翁曾共醉數盃今雨對詩家送朱工部請告歸上虞記得逢君在樂平新凉庭院碧梧清周官六典曾司冦禹貢三江又水衡澤國烟波吟裏興雲林風日病餘情西興渡口猶囘首聞道秋潮昨夜生寄張汝立别來風雨夢初醒兩對山中春草庭江漢無情衰可墨王陽明平江西汝立嘗叅軍事春秋有法簡能青筆將㸃易勞君送先以象管筆二寄予為㸃易之用琴欲賡歌起我聽聞道儒臺虛席在何時尊酒海天亭送施克和之平樂行盡瀟湘問吏郵青山廻處古昭州自知宦寓應如水誰道刑官便是秋身在江湖頻望闕道經岳鄂兩登樓三年憲召君當起莫指蒼梧賦逺遊送錢昌言赴順寧經府萬里滇南郡幕行先從水道問郵程乾坤何往非臣所朝夕難違是子情晩日每看山外影寒江猶聽霧中聲獨憐泰伯祠前别數㸃梅花照眼明喜冬官錢士𢎞訪予惠山草堂公來猶記十年前我在山中正浚泉陸羽水經應入妙盧仝茶力漫通仙閒邊夢亦尋常見病後詩曾一再傳他日風雩還有約滄浪歌罷采金蓮杭方伯世卿登我龍山不克奉陪百里荆溪十載違相逢誰道舊情非病如夢裏予初寤畫在詩中子亦歸兩地青山歌響應一星南極望依微憑君再訂登高約聽罷滄浪共振衣九月一日九月一日初度辰謝客來訪山中人坐臨舊石談還舊茗試新泉味更新㸃易筆如周入夢讀書臺與李為隣高邱逺海詩家興我亦東馳萬里神壽少傅邃翁先生七十百年師執邃庵翁幾向門牆拜下風多士鈞陶鳴鐸外累朝經濟掛冠中時將老矣江山在興本超然出處同莫道隠園真可隠廟堂端合坐姬公送施漸之平樂省親瀟湘洞庭涵太空詩人行色在胸中石鐘舟畔三江月鐵笛樓前五夜風衡岳鴈囘程可計蒼梧雲盡望無窮憑將一勺龍泉水逺向昭州壽乃翁晝坐偶成兩月慳詩到社中日長應負綠陰風病多自笑藥無力歩少不知笻有功五里汲泉將石子一春戒酒謝山翁故人送筆能留在㸃易臺高對晩峯㸃易臺八首答張侍御汝立象筆雙緘自吉州書題㸃易逺相投老來已悟浮生夢病後兼忘應世籌磴入烟霞須策杖臺窮雲海勝登樓憑誰凈掃焚香石千仭岡頭拜孔周海天亭畔卜幽居三古精神一卷書象管搦殘硃未落松梢滴盡露還餘姓同康節希何敢年過蘧瑗化不如月出東山時起我獨憑高處問盈虛桐樹扶疎蔭石臺巉巖西望更崔嵬日流雲影前峰去風送泉聲别澗來鴻漸茗從閒客試李紳書自少年開晩凉每有風雩興隨意鄰僧坐碧苔高臺百尺臨蒼茫白雲𣺌𣺌溪泱泱松垂一枝去地近草碧千里兼天長有時巖頂起清籟何物澗邊生異香操鉛㸃易者誰子老矣羲文心未忘萬壑風雲萬壑濤人間天上在巖嶅邱園掩映松楸密臺殿參差鸛鶴高僻地自堪成晩節浮名真合付秋毫野翁錯指丹崖是應怪頻來杖屨勞百年佳興獨登臺草結為堂白日開雲暝氣連東海石風睛光動北山萊故應壁立千尋在安得泉分一道來老衲似知天假我手移松樹夾庭栽金蓮池水即滄浪白石岡雲接草堂竹合鳳簫難起調樹留蟲篆不成行百原泉上風神逺五老峯前夢寐長萬卷相看纔數畫漫勞書客問芸香觀水長懷子在川衣冠時向古壇前蓍從上蔡無真種圖到希夷有别傳客送屐聲雲裏徑僧將瓢影月中泉閒來凖擬忘言久莫問新詩月幾篇次韻答鵞湖費公清時誰敢愛深山風雨應慙厦萬間東國儘容原憲病自謂西京猶放涑翁閒謂公詩傳秘閣歌盈耳藥進慈闈笑强顔烏鳥情真天鑒在一封已達九重關代柬寄劉司徒平生青眼老司徒兩地暄凉一字無經濟有才空歲月登臨何處不江湖百年第宅長安市千古衣冠洛社圖久矣吾衰還病母舊逰囘首𣺌雲蕪追悼杜檉居檉翁書斷幾經年忍見哀音到耳邊夢裏關山猶阻在畫中人物竟蕭然逰追司馬纔千里隱比東方但一㕓獨爱高談驚鬼膽江湖風雨不堪傳侍御東君来言大司馬洪洞韓公問訊志感二首柱史傳來洪洞語病夫心事有公知東曹疏筆還誰執西野吟笻也自支千里寒暄音似玉百年憂樂鬢如絲風吹凉雨清茶罷正是懷人欲渴時太行雲逺獨懐人近古風流大耋身時公年八十二一代典刑千百世兩朝平格二三臣夢廻曹省燈無影詩到山林筆有神更喜清亷衛㕘政白頭情話正相鄰聞申詔侍養喜而有述一封書奏再踰年温詔春來忽自天此日益知親壽逺何人敢望聖恩偏新銜承乏催無駕舊祿留餘養有田最是衰遲慚報稱山中常檢白雲篇九月一日㸃易臺新成登而觀之又得一石如臺漫賦臺成㸃易試高秋更愛真臺在上頭石小似看千仞立雲多還許一方留飄然野歩長隨鶴何處機心不見鷗分付山僧種松樹曲肱閒送翠陰流九日與暢大夫以下八君子登臺述事上盡高臺復有臺海天睛眼逐雲廻徑當轉處還逢石坐得便時本藉苔風雨重陽初掩靄乾坤吾道政徘徊縣公自送江州酒更許山僧供茗來十月朢日馮按察邀予登璨山髙處觀廬仙丹井至于新築中䑓上䑓述興二首行過青山復璨山幾層雲磴幾松關中巖泉落龍猶卧上界壇高鶴未還十月風清雙篴逺五湖波濶一舟閒憑君着我題名處應在丹崖萬仞間幾年高興擬登臺此日肩輿偶上來畫裏水曾誇震澤望中山欲問蓬萊風神似與仙靈遇蹤跡從教野老猜日暮不須