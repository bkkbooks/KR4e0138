懸老樹冬逾勁畦引清流歲不荒久矣吾衰還䇿杖西巖北望拜焚香平生心性愛寛閒又作新堂傍舊山雲石巧當斜徑處露泉時滴小池間老來書策元非課世上功名豈有關我不絶塵塵自絶翛然晨往夕忘還送浦麗水文玉十年麗水我曾逰又賦新詩送縣侯山戢兵戈金在穴海通舟楫盬成邱有人俎豆如諸葛何處弦歌不子游且莫易看循吏傳幾多風采待君収立春日奉太夫人酒春迎元旦先一日壽祝慈闈過百年新製銀壺金出存問恩似海舊懸金榜筆如椽折梅侑坐香初媚縷菜供盤碧更鮮不用萊衣頻拜舞賜袍光彩照堂前元宵後山行一畨料峭一畨和正月東風望後多雲倚詩壇仍几杖雪殘燈市剰笙歌鬢愁對鏡添霜雪酒愛停盃起綠波畫到垂枝難着筆吾吟如此老松何贈林以永侍御林君以永上書諫佛左遷道敝邑以書問予草堂予適避冗之堠陽未能奉㑹輒賦小詩用謝疎簡予近以見素公命為邵州祠記知君世為詳故及之石亭寺下始逢君疏出留臺慰所聞海郡南遷唐更逺沙門西逆漢初勤百年山屐三時雨五月江船萬里雲歸見素翁應感嘆邵州新廟薦清芬寄俞國昌㕘政都諫才名動六科山東方岳亦峩峩班違清切天還近歩入寛閒地更多幾處殘碑猶鳥跡何年幻市不鯨波文莊亦為軍儲出關塞而今尚有歌文莊謂葉亞卿嘗以都諫遷叅政督軍儲於北邊十六日悔未及月華呈同賞諸君子睡魔酣處月曾華向我翻嫌見者誇地下不知光是日天邊空指色如霞晩來真合歸誰咎老去猶將拜此嘉何許廣寒堪問信氷輪冉冉海東涯送殷時衡應貢之京澤宫春貢起英才三䇿彤庭晝日開驥力正當千里道鳳威須傍九成臺珠從海上原無價木到江南故有材賦得長楊多諷在願因清燕奏蓬萊毘陵城外夜泊有懷半溪郡公天寧寺下晩維舟出郭相迎有郡侯百里路頻紆皂葢十年夢已落滄洲向來風雨增多病今日江湖謝逺憂春野初晴詩景濶遲公同上惠山樓多稼亭有作多稼亭東細路斜郡侯於此再留茶前人後人事相感昨日今日春有涯壁記尚看全石在郊觀猶恨短墻遮數株霜柏皆孤直更著寒梅一樹花素翁宿我山堂晨起奉呈二首堂成忽枉司空駕坐倚斜陽對海天近處自便泉與石靜中真愛日如年多情欲下南歸榻有夢還隨北去船迤邐到京春已暮薰風歌裏和虞弦别自金溪二十秋春風忽起草堂幽兩行西服江西四川仍青野一卧東山遂白頭廊廟合興新揖讓衣冠爭羨古風流遥知今夜懐人地應在江南勝槩樓别後奉寄司空勸駕朝天去而我望如天上來何處春風木榻下山中白日草堂開考亭最少立朝日范老真多濟世才南極文星今北極易臺囘首是三台山堂雨坐用懷王郡公韻東行到海復廻舟百姓方歌郭細侯風幔正懸山上月雨帆猶隔水中洲已知平野無遺病誰信豐年有隠憂一望江湖俱在眼吾堂還媿范公樓喜王山長至在超然堂作山長南來如舊約初成春服又新堂清泉偶怪乾時細白日真從靜裏長雲外諸峯輕露碧風前百草暗傳香近將定性書重檢㸃易臺高坐夕陽素翁詩来内改一聨乃復次韻以答賞罷松庵二老松山靈應識古儀容徐行日轉池邊樹静對雲生江上峯憲節秋風傷舊别郊壇春雨憶初逢年來謝病滄洲逺只有懷賢意未慵尹舜弼訪我二泉書院詩以叙别七年離恨忽消除更愛清言數起予士品故從三代後文章誰許六經餘春深水國舟還淺夜静山齋榻又虚欲問星槎何日返廟廊新舘正渠渠聽髙子明讀春秋傳老去劬書愛目光朝吟暮誦得高郎一聲何處鳳歌逺萬古不如麟筆長晏子宅邊南市熟羲皇夢裡北牕凉應須七日登山去望闕巖前拜瓣香送程副使用素翁韻赤壁舟移一夜風十年晤語幾囘同向來鳴是周岡鳳何處乘非漢道驄伊洛淵源新浚後江湖幽隠舊逰中遥知素老相逢地太白樓高月滿篷山中初夏山中初夏漸清和聽罷樵歌又牧歌曉暝暫疑青野窄午晴偏覺綠陰多閒從㸃易無僧到逺為徵文有客過詩興撩人歸興緩東峰明月夜如何督府楊侯鋭見訪督府新銜舊總戎獨將一郡障江東圖南預誓三年日逐北兼乘兩夜風何處解揚能致命向來余闕未成功千秋誰秉昌黎筆聞道平淮論已公偶讀羅圭峰所為張宗伯墓銘因感羅之知己情見乎詞磁龜山裏訪君時坐對青燈各鬢絲經國念深非我任作人心苦有天知晩驚妖鵩從何處秋逐冥鴻信所之只尺寗庵空墓草旴江囘首不勝悲王近至有悼四明山下得狐邱爭似并州是釣逰布褐江湖俄及晩棘闈風雨幾經秋劉蕡有䇿空留廟王粲多情獨倚樓忽報近郎還北上愁心江上送孤舟聞顧氏兩封君奉詔加三命之服詔許衣冠與子同百年昆弟兩仙翁雲司象簡瞻趨外薇省金魚映帶中清世箕裘還作地名家弦誦已成風向來錦軸絲綸在請看平生教育功聽雨數月長懐聽雨心道人今夜坐應深誰知北斗廻元氣我愛南風和好音况復五湖俱入海莫須三日始為霖麥秋時節陰晴半時有鳩聲出逺林與王山長行精舍中閒從山長到山中獨上高臺眼欲空泉未出巖聲在石雲初落沼影隨風退藏自得衰年計逰息何妨靜坐功莫道堂前無長物數峯青㸃海天東得浦麗水訃方怪伻來得起居訃音新到重愁予銘旌長路晨風裏燈火空衙暮雨餘視篆獨憐三日淺讀書真恨一生虚早春山舘觴君地再誦離歌淚滿裾謝守溪翁致洞庭新茶及羅紋箋雨齋無客自焚香百里雙緘有使將思渴為公嫌茗少才慳於我愧箋長晩來絲鬢忘禪榻湖上青山帶草堂莫道滄洲天逺矣一星南極夜光芒盛别駕還自叙州蜀道歸與鬢未皤叙州功比漢州多金魚初拜明廷賜彤管還収野老歌嘉客可人來只尺大夫能賦興如何相逢且問東皋子澤被横江尚有波横江在叙州陸方伯東皋嘗為守至今稱儒吏焉予與方伯知久故見而首問之懷山中草堂十日不到超然堂泉聲隔竹高雲凉山中本愛白日静臺下已謝青春忙行支削棘立高處坐隠槁梧窮大方祇須假我三伏盡滄浪歌裏棹相將寄南都三友五清劉光祿不接詩筒又兩年留都風月思依然交游南省論文外識在中州品士前江上興難移棹訪山中懐每廢書眠司空問罷還醫客囘首三山半倚天雙溪汪司成七年清夢幾雙溪囘首賢關帝闕西雲漢為章常獨詠江山留勝更誰題龍飛郢楚真嘉㑹鳳下岐周亦暫棲一曲南風又宣父知音何處問昌黎鈐岡嚴翰長神仙官府在蓬壺學士文章贊聖謨靜裏經綸書四部公餘記注賦三都星辰閣道懐前此風月鈐岡認故吾豈不懷人如室逺東南煙水自江湖寄湖南賑使吳中丞兼柬秦中丞鳳山呉蒼梧人以兩書不報見責故代柬以謝兩年未報嶺南書却向湖南候起居赤壁山高三國後洞庭波濶九歌餘樓臨江渚曾招鶴節過鄉關不問魚淮海相逢同弔古岳陽囘首意何如用前韻寄秦中丞一介南來得兩書高秋松菊自幽居君才江漢兵荒後吾道山林疾病餘憲節故應隨有鶴儒餐真合食無魚瓣香為致華容否夢裏懐人玉不如嘗託中丞以香帛弔東山公寄毛侍御汝厲時按湖南直指南廵獨寄書新春長憶過山居雷霆虩虩雙星畔江漢滔滔六月餘清世敢聞歌有鳳豐年真願夢維魚白沙玉峽相逢地二十年來一日如山中答喬司馬用前韻新詩閒向竹間書司馬題緘問索居晩渚愛看鷗立處寒空愁聽鴈來餘客須報簡呼毛穎僧促供茶扣木魚山水娛情忘未得病懷不是渴相如代柬留王郡公用前韻微恙求歸已上書西川幽夢落溪居觀風歩逺春耕畔治獄心勞夜燭餘高調欲將公比鳳閒情敢謂我知魚莫言借㓂非今事召杜從來父母如得九峯書後晉溪繼之書來一日兩尚書病客江南正索居湖海逺懐千里共山林幽興七年餘答君豈謂真能石知我何妨不是魚却憶當時東省地九峯心亦晉溪如夜熱晩來坐愛一軒空酷熱偏教苦病翁夜影空憐花裏月秋聲安得樹間風耳聞暑雨咨方切指計炎蒸伏正中柳岸陰多舟似屋共誰長嘯五湖東鄒光懋為我復先世所藏畫詩代簡謝吳綾三尺黄癡畫珍襲元從存一齋五十七年慈母念尋常一笑故人來版留蘇氏情尤著記屬昌黎手自裁對客焚香還再拜雕盤擎向影堂開存一先曾祖府君齋名雕盤亦先世物失而復得者也曬書二首連日曬書如曬麥人間耕學本來同一經偶爾頭垂白萬卷徒然腹自空今古遺文隨世變聖賢精義與天通漫酬賓客無虚問鄉里猶傳邵二翁二翁謂吾曾大父存一先生也散帙容春舊舘東今年事與去年同何人解使風驅暑吾道真逢日麗空靈藥一丸非手製仙槎萬里有心通長懐五老峯前地曾與藏書作主翁除夜述懐次楊長史慈闈春酒夜圍爐一卧江南幾歲除天上星辰囘鳳厯人間風俗競桃符夢分殿席思周燕病缺庭班愧華呼最愛東鄰楊右史獨將詩句起潛夫送華方伯文光峨眉風采動閩關使命新從闕下還部檄誤投川道路行旌遄度越江山風謡又逐旬宣駕獻納曾聞侍從班而我亦懐薇省地兩峯囘首海雲間西庵西庵一里路逶迤乗興行看石上詩松問栽年無應者水尋來處有逢時竹罏故是茶經缺藜杖真於野服宜珍重前修㳺賞地青山應笑我生遲施平樂還自京師亟来問余余病未能亟答也先之以詩兩看去鴈一來鴻今雨丰姿舊雨同老欲致君還讀律逺將之郡更觀風瓣香且弔唐廷尉武進唐復由大理正守平樂有善政尊酒仍賡陸放翁稍待秋清予病减煑茶題竹聽松庵名東海棠六首道上無心問喘牛海棠花下歩還休崇光空照三更燭定惠真維兩日舟己巳歲予在黄州補種海棠於定惠院因留兩日梅褪殘粧煩曉畫柳縈新態恨春囚尋常有眼能青白桃李紛紛麓更邱筆鋒誰似坦屠牛吟對花仙也合休劒閣認宗纔有棧蓬壺覔祖已無舟人憐避地庭為客天恐傾城院與囚畫史莫教輕着筆明妃千古怨青邱春去空勞挽萬牛名花一賞便應休夢魂曾入唐人苑色相元從蜀道舟力少須扶新起睡情多欲訴舊覊囚東君玉汝真為殿風雨明朝綠滿邱草徑晴嬉孺子牛花經新雨是天休李三郎畔頻移座黄四娘邊漫繫舟畫筆可無才㸃染詩家愁有韻拘囚吟餘再讀青年賦予十九時曾作惜海棠賦却笑楊園猗畝邱春聲初聽盎中牛已分花開到此休但使韻能廻俗駕未論材可作仙舟雲横極浦愁湘佩雨暗長門泣漢囚千古麗情誰買得榆錢空有積如邱竹院深無礪角牛佳人舞罷此畨休沉吟欲掩班姬扇蕩漾真乗蔡女舟魂入巫山疑楚夢神逰銅雀失吳囚千秋事往風流在莫更凄凉弔古邱近作海棠詩苦多用事而於情態顧畧焉今以禁體物例作一首為詩家道之野裝蕭散欲騎牛獨為看花興未休香霧有情籠月榭綵霞無數寄風舟祇憂絶色天將忌且喜殊方地不囚愁賦陽春應坐汝誰將太白上高邱諸君子和章既衆予戲為海棠答之任教呼馬復呼牛桃李無言我合休暮雨空遺湘浦玦春風還造渭川舟瑶臺偃蹇三秋夢金屋嬋娟萬古囚誰為諸公醒醉眼翠松蒼竹傍雲邱為文玉乞花有詩見謝次韻答之送花無奈乞醯何伐木今翻種樹歌别舘不愁三舍逺比鄰猶怪一牆多觀從菩蕾君須記賞到芳菲我亦過獨愛雙松如二客蕭然長日對吟窩盧侍御師邵書来言黃州定惠院海棠今歲甚盛此花余十一年前補植也師邵有作感而和之齊安花滿海棠枝書到真勝夢見之已喜栽培猶有地却憐吟賞不同時江邊一舸還誰問坡後千年又此詩若論品題吾晩矣為君聊復倒清巵與顧氏昆季飲海天亭復至繡嶺草堂日日溪邊艤釣槎偶將尊酒㑹詩家草亭坐處聊題竹松閣登時復煑茶杜老幽居常閴寂謝卿群從總清華班荆莫問西峯日明發雲山各一涯時與新將北上别後述事他年曾泛日邊槎囘首青山幾夢家林窄尚容千挺竹圃荒猶剩一株茶聽松有茶園今廢矣竹中尚有一本漫勞藥餌扶吾病豈有文章為國華詩句未成歸棹促故人書到海南涯時林主事以乃翁見素書至雨後登華氏東岡為看分秧有此來雨前纔得一登臺水波白㸃羣羣鳥烟徑黄垂樹樹梅南渚風生歌調起北山雲盡畫圖開獨憐丰麥今無望賦罷田家閣酒杯代簡尤蒼梧蒼梧遂良以予六十辭慶作詩見貽用韻答之時蒼梧年亦六十矣歲行六十復庚辰林下相看各逺塵已遂還家君有地未成報國我何人高歌緣酒應須醉細字青燈尚可親漫道梅花堪介壽雪晴初見九峰春王郡公命善權僧訪予山中因遣僧圓金馳謝郡守題書走客僧惠山方丈路登登東坡興逺公真是彭澤風高我未能皂葢來時隨一鶴青松陰處駐雙藤此情久待成圖畫獨倚西樓望不勝作詩後圓金来報車從臨我繡嶺草堂欲追候之已無及矣復次韻以謝不敏竹罏久矣待公來應識賔筵賦有萊肯信晝廻松閣夢却聞客到草堂開一時詩已留僧刻三子情如為我陪三子謂吕太僕及顧氏二叅議分付山靈知歳月蘭亭今日正流杯吳星士道光來自許州聞其談舊事感而有作布衣初拂洛京塵猶是當年從我身半夜話窮三十載一時指屈數千人鳯皇鶡雀元非誤桃李甘棠久更真試問社倉南樹木㡬囘秋雨幾囘春甥孫彌月忽人送方竹至遂以名之我得甥孫髪始裁君山方竹忽南來清竒本應超凡相敬義真含作聖胎彌月未名如有待兩枝隨柬便須開也知此物能扶老不為虚聲重楚材夕佳樓為楊元平賦山氣佳看日夕時主人樓上賦陶詩峯廻落照松聲迥城閣浮烟鶴影遲萬古竒觀留晩在百年高興許秋知明朝更擬開東牖笑對咸郎引酒巵次曹司諫謝新闢山路獨將盃酒酹山靈癖向山林愧老生何限險夷俱往事但關邪正尚多情草隨路闢愁為間泉逐渠流喜不盈諫院有詩如勸力嚶嚶鳴鳥是佳聲思東為王世臣題其祖夔州公號東齋其父公宜君號東臯世臣因號思東以志不忘二東風度未銷沉一字興思總德音晨舘披吟真自力晩田耕穫亦何心伐檀興逺羞飡素運甓勞多歎惜陰莫道夔州無厚植門前芳桂已成林容春堂續集卷三
