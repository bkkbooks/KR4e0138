body:
  text: 容春堂别集巻四明邵寶撰七言絶十二首七言律二十七首將至安仁豫齋來迓相逢休訝便論詩海月江雲掩映時三十年前歌調在一聲還許野鷗知將至信州寄冰溪信州山水故多情當我來時雨却晴有客南樓正高坐憑將短句代通名途中即事野花不識春風力春亦無心為野花自色自形紅更白祗添詩景與詩家新置觀泉巾新製山巾近玉臺正堪泉上咏歸來鑑中莫笑東坡影八九年前手自裁怡琴圖為唐勉之賦二首有弦不若無弦妙人以聲音我以心坐對南風天籟起更於何處覔吾琴八十一絲聲太古伯牙山水伯牙知尋常袖手休經鼓那得黄金鑄子期與孔半癡觀予公服小像野人不是廟廊人袍笏他年偶在身昨夜山中看畫本半癡偏説以吾真謝南沙送江魚江魚入饌故人心萱草堂前夜雨深每羡杜陵歌白白只今尤愛色如金贈李聴鶴握手論心廿載前山人骨相半神仙而今青眼還相見笑指喬松不問年題黄明甫扇小江波接大江波江上潮聲入夢多賦得新詩來慰我溪人爭道濯纓歌贈周松月曉起空庭月在松恵山寺裏正鳴鐘詩人訪我來何早第七峰前一短笻顯公房夜坐兩宿禪房不問禪夜深無事足高眠西山松竹東山月共作清凉到榻前寄賀黄門先生萬丈毉閭萬丈雲白頭何地可尋君懶招海賈非無謂笑荅山靈似有聞秋水竿留巢父在春風榻與管寜分數封再檢先朝疏望斷天涯坐夕曛晩酌呉太史新第用送呉中孚韻晩凉乘月到新居庭院無塵意有餘不信故人千里隔可教今夜一尊虚清風六月仍留巻滛雨三秋未報書水接長空山滿地天涯有客獨知予遊山不果用前韻自解兼寄寗庵相逢應笑我癡頑誰到宜興不到山乘興更期三載後題名真擬萬峰間舊遊隨處皆成漫勝槩平生未放閒莫作尋常詩話道有人天上正思還過昌山用歐陽圭齋韻江自袁來一道斜萬山回首正思家游雲潤足滋胷臆活水清堪潄齒牙薄暮更聞林外鳥餘春猶見道傍花鈴岡高處多奇觀已辦明朝踏軟沙談秋雲輓詞雲到秋來懶作霖飛飛何處竟銷沈聴琴未了鍾期興許劒長懐季札心兩郡事曽歸史館百年名合傳儒林新碑高倚游來塢時有行人下馬尋詠竹茶罏次匏翁雨過春山滿汲泉舊僧罏在好烹煎緇塵性絶甄陶外烈火心降汗竹前白雪翻時群蟹沫碧雲烝處一龍眠調元固有商家鼎不出山林道已全别都昌師生三宿淹留四廟前諸生日日候開船情深東道天留客心急南風夜夢仙剛道舊遊如傳舍漫看新賞又賔筵沙邊回首人堪畫青隱團山水接烟望白鹿不克至白鹿山人舊結庵勝遊寥濶思何堪也知雲壑風泉在却與田夫野老𠫭十里輿從雙澗北三間亭對五峰南宗儒更想瞻依地高座凝塵共一龕奉寄沈提學先生二首千里書來十載心廬峰回首洞庭深杜陵故有江頭興楚客今非澤畔吟赤壁紫簫仍響應白雲黄鶴竟銷沈鍾期亦是人間耳只向無人聴處尋草堂白下幾相尋春燕秋鴻逺竟沈魯國尚存周樂譜呉歌還和楚人吟閒隨酒榼山山勝老向書檠夜夜深他日一言君誤矣百年高誼獨銘心遊龜峯倚空秀色獨青蒼久擬登臨始得償徑似天旋深更曲峰如人立正兼方飛潜有象元奇幻開闔無機亦善藏却竚山門窮衆妙不知僧語落荒唐白鹿洞懐蘇虚齋虚齋遊處我還遊每見新詩石上留對月幽懐雙榻晩乘風高興一槎秋九齡度逺何湏問安定功多却許收欲向匡峯望巫峽楚天雲盡有江流寄謝陳中丞御河流水逐潮廻南去風帆不用催千里驅馳勞逺計百年經畧見雄才地當海浦非他鎮城倚天津復此臺病眼臨分重回首拱辰樓逈曉烟開送黄夢弼還江隂儒吏風流又在今尋常嚬笑見君心車前獨許花迎斾堂下長留鶴聴琴紫極自連諸宿近白雲猶阻一江深明年欲問鸞棲地天照西臺柏有隂寄儲靜夫太僕未出都門便憶君滄波𣺌𣺌海陵雲船如米芾誰當泊榻似陳蕃我合分塞北兵戈方用武江東尊酒自論文不堪畫鷁催南發楊子灣頭日正曛謁鄴侯祠井道而今政有功瓣香來吊鄴侯宫龍収雲雨秋空碧鴻起江山夕照紅朱紱漫傳封拜後白衣真想指揮中石池千古寒泉在歌罷滄浪一鑑空留别惟誠左轄西湖方了舊襟期懶和三湘贈别詩冰鑑百年誰爾相汪陂千頃子吾師登臨興逸山僧識經國心勞野老知回眼江天人似玉東風還寄古梅枝贈劉瑞州用齊用陸東臯先生在許州贈予韻長安别後懷君甚下馬頻過太法師曲沃政看重布日横渠書憶舊談時憂深未覺江湖逺望切真嫌道路遲若問東山今嶺外暮雲千里隔心期東山謂司馬公時巡撫兩廣蓋用齊知己也聞周文化擢憲使天上新傳憲長書向來人望果非虚十年劒試磨霜後百鑑堂開捲雨餘風月一庭元自在湖山千里竟何如我車半識江西路荆棘湏公次第除荅朱廷補二首春風三月動新袍泉上歸來興頗豪流水有情雙澗逺浮雲無數九峰高醉顔不是燒丹苦病骨猶堪藝圃勞日夕懷人何處是草亭烟水註離騷知子才名日月深宫花真合一枝簮理從後宋能超㧞文到先秦已浸滛百戰力囬千里足九成丹熟一丸心明時莫嘆遭逢晩六行賔興古即今偶飲野翁莊有懷翁他日相與之雅情見乎詞用元人韻相逢館下屢賔階卷有新詩許我開鬢未及年皤似雪眼將入道碧於苔良工心苦春收藥佳客盟寒晩折梅酒罷題詩脩竹上鄰僧猶待野翁來追次秦中齋先生韻贈潘玉林不見中齋見此詩玉林高榻雨絲絲白蓮社裏曽為客黄石祠前自得師方外未應無野史世間元亦有儒醫墓銘久閟西原草到處逢人説母慈雨中荅楊澹成舊堤潰盡水奔徂腹疾春來我未蘇萬厦庇人心本有一車載鬼事非無病深難與醫求艾苦極聊為子弄雛明日隂晴何處卜漫將耕穫對田夫又荅雨突雲衝勢未徂黄樓誰助長公蘇雷師此日威何有風伯他年訟可無竈引坎蛙將故侣簷飛巢燕困新雛長歌欲墮填河淚萬里東南一病夫寄錢子推是日子推宿山中病不登山夢到山也知高興在松闗雲隨社老看碑去風送鄰僧供茗還無石似龍還畫葛有崖如玉合書顔更煩題我新精舍脩竹千竿屋數間分宜道中鍾山洪口望鈴岡十里縈紆水石長鷗鳥自忘爭席老桃花曽誤問津郎督師節逺憑催鷁視學碑荒媿憇裳此去勝遊湏記取春風三月過瀟湘聞李絅庵計逢人每問李蓉湖晩興春來倩杖扶畫有幅巾真稱爾傳無椽筆枉教吾全歸地擬諸君子終養天成一丈夫他日遺文何處覔平生碑板滿東呉過清江訪彭雲田相逢忽訝鬢成絲藥籠聞多貯紫芝汝潁舊遊如説夢江湖今雨又論詩碧分草色開新社紅入桃花滿故枝田事有秋何必問白雲元與此心期容春堂别集巻四
