body:
  text: 容春堂後集卷五明邵寶撰墓志銘十四首華室鄒氏墓志銘鄒華皆錫巨族相婚姻久矣鄒出宋道鄉忠公華之望則有若晉孝子寶者鄒於忠公十有一世矣在國朝有曰璋字伯惟以力田孝弟聞者鄒之大父也父普字洪道母周氏鄒生有淑質三歲喪母鞠於祖母孫以謹承愛繼母鍾愛之如孫於是洪道與諸兄同居諸子女日習華侈鄒獨不屑效年十八歸鵝湖華封君守莊之子文耀封君性凝重嫡姑楊氏佐以肅鄒事之得婦道甚時封君自鵝湖遷今塗林田廬草創而內外交侮文耀侍封君應役於公鄒侍楊紡績於家計其功如古所謂月得四十有五日者少暇則説小學故事以代談笑祖姑鄒居故宅鄒侍楊偕省罔寒暑間鄒稱其孝封君晚委家事於文耀鄒實專內事黜華勵勤業日以裕凡時祀治具必躬或勸屬諸媵婢鄒曰非敬也凡延師教子其所稱贄必以手治縑布或曰物乏歟奚用是為鄒曰不然將吾誠耳其知義如此每義舉必稟楊命楊意所欲輒先加惠其所不欲必婉勸以致焉嘗念洪道翁晚居蠡湖别墅雖自以為適而逺於家人力勸以返比卒得正寢之道鄒之力也鍾母病疽卒當暑穢甚鄒親飯含不厭君子稱鄒善事舅姑必及是謂之有本娣從參政於官鄒獨事封君暨楊久於壽康有與焉楊病勞於侍楊沒封君繼之子婦錢又繼之文耀又繼之不勝哀而病未幾卒卒之日為正德甲戌正月己巳後文耀四越月距其生正統己巳十月五日年六十有六子男四人長球先卒娶談氏繼朱氏次琳亦先卒娶梅氏次瓉娶鄒氏繼錢氏俱先卒今聘王氏次瑫庶出孫男三人長磐聘鄒氏次礎次確女一人許嫁鄒崇慶華自孝子二十七傳為諱璞者在元授晉冀屯田總管不就其子子舉任功德司都事子舉生彥清别號栖碧彥清生公愷别號貞固皆處士於文耀為高曾祖公愷子仲諄孫思濟世有惠德封君思濟第五子也以子參政貴封户科給事中配楊氏封孺人參政名昶文耀母弟在諫垣有直聲謂鄒孝書來自蜀屬余銘瓉卜卒之明年十二月二十有一日葬鄒於塗林西原之祖塋合文耀兆銘曰瞿瞿封君其子克肖若人維婦亦克遵教於宗乎有耀華冢婦鄒氏墓志銘錫之鄒皆系於宋忠公浩之弟洞自洞至國朝餘杭知縣可逹凡五世可逹子景懋娶武進李氏生二女鄒其長也長歸於華為文吉甫配華之望以晉孝子寶舊矣其在近世以肥遁稱者則有若貞固處士某貞固之玄孫守正號能亢宗文吉名佑為守正冢子鄒甫十七來歸族之人皆謂間於禮儀時守正翁強且習事見祠堂祭薦曰豐且潔矣維冢婦故見賔客供具曰隆且飾矣維冢婦故及視其物曰魚肉爾曰棗栗爾無珍異者及其衣服皆然他器具無不然則又喜曰何此婦能遵我貞固家教哉於是景懋衰矣其仲女適文吉從弟文高者聚而謀曰弱弟侍鰥翁某等逺莫能朝夕奈何乃各告其夫稟命尊長築室黃塘西以居景懋贍以田若干畝日饋月省凡若干年而其弟某長還翁於家以卒鄉人謂是舉也義且有禮焉先是鄒育而不再以嗣為憂告文吉曰盍圖諸文吉未應守正翁曰婦言是也故海虞曹氏二室於文吉連得子女鄒愛如已出鄒病嘗劇議散其資賄文吉意鄒私其女也勸勿他及鄒曰承宗者子顧可輕乎遂均與之先子後女鄒在華凡若干年中歲有族訟文吉父子兄弟奔走在外不遑內顧鄒以其姑吕力持其家比訟畢守正翁曰吾可以逸矣鄒相文吉力家政為翁圖逸者無不至晚當舅姑及夫凡三喪繼舉咸襄既而事歸其子蓋凡若干年至正德癸酉夏五月十一日以疾卒壽七十有七男女四人鄒出者為一女適鄒炯曹出者為二男曰鯨娶鄒氏曰崇聖先夭為一女適錢仁術孫男七延壽延禧延齡延慶延祚延福延祿女孫五俱幼鯨以卒之又明年十二月二十日葬於椿楓山之原合文吉兆鄉葬之一月介吾門人錢諷以銘請為之狀者李虞衡汝璧豫最其事為銘銘曰養不以父加諸翁惠不以女加諸子君子謂夫鄒也士而不婦蓋徴諸此喻君惟敏墓志銘正德十年十有二月二十有一日喻户部義葬其父惟敏君於錫麓之先塋先是君以四月十有七日卒越三月義聞報歸自京師至是襄事而請銘於豫義始魁鄉試有文譽既舉進士授今官端慎加焉其在苫次銜哀讀禮豫重嘉之於是乎銘君諱鋭别號鶴隱惟敏其字喻其氏也其先祥符人宋工部員外郎玉泉先生樗自桐廬徙居無錫十二世至君君高祖中曾祖升祖綸父山母陳氏君生秀偉沈毅童如成人祖嬰末疾扶而后能起哺而后能食君侍之者十寒暑而終人謂慈孫既有室暨厥兄弟各事事以孝養厥父母長姊嫁賀賀有急君極力周濟姊卒於家歸其喪於賀葬之父病君親嘗湯藥侍食與衣唯謹比卒君方卜葬地其季弟鎮以誣繫郡獄君力為訟雪而內持其家葬以故緩及弟釋歸父夢君曰錫山下有地南某北某東西某可以厝我越明日君往訪得之母異焉曰我義同穴即當從之君力解乃止越數月母無疾卒合葬之日會者以為談既而謀諸兄曰先玉泉為宋名臣傳在國史祠在鄉賢嗣德在我後人義資可教教而成吾望塞矣兄笑曰人言弟癯如鶴沖霄之翼不以自試而望而子乎由是以經學課義晨夜無遺力間語之曰恕人量廣審事蠱成將而勿亂見而勿貪我深念此而未能有得爾其識之數歲義學進試得魁選人方賀君君曰未也揚休樹烈不有先逹者乎比得進士人又賀君君曰未也秉德守道不有古君子者乎先玉泉遺矩其易武諸其易武諸於是君遘痰鬱之疾力貽義書固以玉泉為朂邑大夫以登科報至君猶北向就榻叩首曰君恩渥矣何以當之蓋去卒七日耳其知禮如此先卒一日揖其配吳與訣曰語大兒無忘初心復謂諸子曰善事女母事咨女兄無逺邇小大君壽六十有三子男五長即義户部主事次禮次遜次信皆吳出次敬别出女二適張貴馮鵬亦吳出孫女一受楊涇聘凡君之行豫得之鄉貢進士楊君致時狀者與所聞皆合銘曰粵若玉泉流衍於錫既久而𢎞將川將澤維源之長亦導者之力我銘識哉尚觀其極明封徵仕郎府軍衛經歷李君墓志銘君諱玉字韞之李其氏也以子蓁貴封府軍衛經歷階徵仕郎其先居武進馬迹山七世祖得十在宋慶歷間稱有行義者四傳至肅君之大父也當元季盜起山人負湖險尤縱劫掠有以所得遺肅肅輒麾叱之曰吾即餓死不願受此且復諭以利害蓋什有一二改焉或犯而匿官謂其籍附肅下乃於肅之子徵之肅大呼於山曰若為不義罪不自承而以纍人乎其人聞而嘆曰是固嘗諭我善言者吾忍負諸乃出就死其感人如此肅生名名娶某氏生君既長以馬迹居湖中地不勝民且出入風濤非便逾湖而西為宜興地山深水清中多腴田盍往居焉遂卜城南為今居力穡起家加以儉勤漸致饒裕既乃命其伯子共役於官其季輔之而以仲為諸生或遊於庠或耕於野初有中人産晚年乃纍巨萬然觀其室廬則朴而固其衣服則素而雅其飲食則約而恆其童僕皆恂恂如也論者謂之本富擬諸漢力田云既而諸孫漸長禮延孰師以經學教之每鄉人燕集輒相與談故事以自鑒戒復命諸子孫出聽或侮之則以理自遣始雖不平終則若罔聞者每有令輸粟自旌門至冠帶皆辭之或問其故曰吾樂吾耕他非所望也於是蓁例入太學為京朝官耕樂之名遂傳於人名卿大夫為之賦詩者若干人今大學士丹徒靳公為記蓋蓁志也而君之所存彰矣君卒以正德甲戌四月二十有二日距其生正統丁巳十二月二十有六日為春秋七十有八配徐氏封孺人有子男三人長華義官次即蓁歷官府軍衛經歷終寧海州同知次萃例授鎮江衛千户先二年卒女子一人適吳輝孫男八人鑰鈇鉞欽鎬鈞鑑鉉鑰鎬皆太學生女四人長適談蓁次黃元次邑庠生黃廷璿次吳士曽孫男四人女二人君卒之明年乙亥三月十有六日葬龍潭嚴墓之陽蓁以華言來乞銘豫昔為户部今少宗伯寧庵吳公在翰林豫燕飲其第嘗見蓁焉今不見者十有六年矣豫病餘有感於斯而鎬也又吾門人華從龍友也為之申懇不已乃按庠生卜某狀而為銘銘曰始家具區載卜陽羡去險即夷厥心乃見山邪水邪我耕其中終焉一邱繼我其封之鍾恭人墓志銘恭人鍾氏都察院右副都御史致仕魏公士華之配也初公以進士為太常博士恭人始封孺人既而為御史為湖廣按察副使按察使江西雲南布政使至今官副使一考有異政恭人受誥得今號恭人出慈溪名族大父曰霈父曰綸皆鄉望也母章氏恭人生有淑質幼能誦詩書笄而歸以孝稱於舅姑以肅睦稱於娣姒宗姻於是公在庠校未幾登進士第歷官中外凡三十五年自臬以前恭人皆從藩以後則留於家其從也公有內助其留也公無內顧君子謂是封也稱公嘗夜讀恭人侍無怠適至雞鳴詩公笑曰爾若而人哉恭人曰何敢然敢不勉比在官恭人嘗謂公曰祿當求稱若食浮於人君愧之吾亦愧之公頷謝焉公二兄一弟先後暨其室早世遺孤女四人男一人恭人母之婚嫁惟時不惟其儀惟其教人謂其儀可能也其教不可能也恭人既封猶績或曰何自苦如此則舉古人鴆毒之言為謝非令節望祝不御命服燕服雅而必飭急於周乏自族姻至於鄰黨蓋多感其惠者公屢為豫言今讀楊方伯名父所為狀無間於公恭人卒於正德辛未十有二月一日距其生天順辛巳十有一月九日年才五十有一子男二人長光嗣太學生娶周氏次充嗣娶余氏女二人長歸名父之子孫斯次聘於禮部郎中向中美之子璲孫男幾人恭人之卒公巡撫貴州越二年癸酉十二月二十日公歸而葬之至是公命光嗣請銘豫在湖廣與公為東西寮政暇胥會嘗辱有有道之褒因公以及其室固亦不能靳也銘曰妻道配地成以代終魏宗有慶賢哉伯鍾孰謂無儀嘉號載封孺人維孺恭人維恭有考德音吾銘是徵西園毛府君墓志銘西園毛府君英懋者故翰林修撰一峰羅先生之故人也其卒之三十有七年其子聮珮始謀銘於一峰之介子今江隂學諭幹幹吾門人也頃以狀來再拜請曰先生惠念先君宜無靳此豫惟一峰不可見矣見其子且聞其所與者之詳如見一峰於今也豫烏能無情哉初一峰謝病歸卜隱於金牛之洞金牛去邑百里而逺英懋方遜地以居趨而往見一峰一峰曰若人知我乎英懋曰何敢公天下士也公在斯敢不朝夕几杖一峰與之言久而遂契如友既而弟子自逺至者日衆英懋曰盍我乎館既而裹糧有乏者英懋曰盍我乎饔飱每一峰講授必侍如弟子弟子固曰吾師之執也其所居室有扁西園清隱者一峰嘗為之記云府君諱徹毛其姓英懋其字西園其别號吉之永豐人自宋以來代有令人其幾世祖某與信國文公同時且獲交焉其書劄有存者英懋生六年而父某沒母某氏繼之又五年而有祖之喪且夭其兄祖母劉躬撫以長讀書好義為鄉善人事劉以孝聞既而喪焉以慎聞祀焉以敬聞於是歲積有餘以惠聞宗黨皆德之有圖其地而欲傷之者多遜弗免西園於是乎遷又有以稅役纍者英懋出粟五百為償其逋天順壬午飢病瘴者十無一生英懋周旋其間藥而起者棺而掩者凡若干人歲憫道暍屋於衝濟以茶粥有道出寧都嶺谷峻深虎出不測英懋闢而甓之凡里五十飢則發大飢大發荐飢荐發蓋英懋之平生如此晚見一峰識進而行益力焉嘗於金牛洞建春臺書院贍以茅坪之田比沒且屬其子聮珮勿壞君子聞而稱之聮珮嘗於空坑建相石亭表信國遺迹亦英懋遺訓也英懋配彭氏先卒繼而室者五蕭程王劉蘧子男六人珮琦輯璋玻璦女一人適程昭竒孫男十人女四人曾孫十二人卒以成化某甲子年五十有九越明年某甲子某月某日葬陂頭山之原從先兆也銘曰金牛閴而一峰壁而將若人覿而逖而逖而我心惄而退庵張君墓志銘君先豫受書於蒿庵俞先生比豫及門先生猶稱其勤豫初還自許州君在庠有聲邑大姓延為經師見豫喜道俞門事豫再還自京師則君已謝進取不事豫問焉君曰吾年且艾恥與後俊爭名矣居數年其子賢舉鄉試豫聞之嘆曰君不自顯能使子無顯乎未幾豫侍養還則君受命服矣豫問焉曰此賑飢令也豫有少積方圖散焉馮令知我以義言激之豫不敢辭既而辭服令謂我矯是以不卒辭也又若干年而君卒先卒之二年豫卧病聞君月與姻友為奕之會每集道觀奕且酒以為樂或登臺倚樓聽羽人奏遊仙之曲終日忘返豫謂君蓋能忘所謂世情者君廣顙隆凖髫年如老成人日誦數百言尋以家故輟學後復自奮以成從君遊者多有聞君事父母繼母孝與兄及諸季友有析産後資其殮葬者或召還鞠之各置之所君疾亟勉起坐與家人訣戒諸子孫如平生又曰人之將死多談鬼魅豫嘗謂之誣今信誣矣君諱仲方張其氏式之其字退庵其别號也君高祖茂茂生友新友新生道敘道敘生孟庸是為君父孟庸娶崔氏有子五人君其二也君生景泰癸酉六月二十七日卒正德丙子正月十四日年六十四配惠氏子男三長即賢娶陳次德娶于次忠娶袁女亦三長適唐珤次適苖龍其幼者庶出受鄒某聘孫男七承祿聘趙承福聘許承祥聘浦承爵聘尤承壽聘俞承祚承寵未聘女四長受邑庠生尤魯聘次受談有倫聘餘幼君卒之明年丁丑某月某日賢等葬君惠山祖塋之次先期介吾門人鄉進士丁仁夫來以銘請豫乃托喻主事宜之狀敘而為之銘銘曰于嗟君兮經以師子子方進旃而君則止君兮君兮瞑以此兮故上高訓導徐君東之墓志銘君長於豫豫夙知君至江西而深豫去江西之明年君以母病乞致仕巡按御史某重其去遲留未決君一日入告曰某也才地無復用理公乃過為計乎惟速之一日則惟吾母一日之幸御史感焉遂允之過浙臬語豫甚詳越七年豫以侍養歸尋疾君來問歲至再今年忽得君訃豫哭之以詩亟遣人弔其孤越數月君弟鴻以其孤本及壻潘溱來告葬且出假主事子辛狀請銘烏乎君嘗以吏為屬謂豫知已而稱門生銘其能辭君諱淮字東之别號靜軒徐其氏也系出漢南州高士稚元有諱燁者仕為常州路織染局提領因籍武進於君為高祖曾祖用國朝以明醫徵祖遂醫學正科父鎔母黃氏君幼警敏成童能屬文弱冠為郡庠諸生有才望於是君之世父文式以進士及第為翰林編修沒未久而君繼起嘗居學舍鄰雞入焉君為文逐之名之曰雞斷人有傳者君尤究心世務識出流輩不啻倍蓰上官問焉則對疑焉則釋侃侃必盡君凡八舉不利始應𢎞治戊午嵗貢以母老請就祿得訓導江西上高居八年母病失明遂有致仕之請君為教務盡道理歲時贄物一無所問貧者顧有資焉凡君所指授多就矩度豫嘗上君狀於巡撫都憲林張二公林公三檄君署縣皆辭張公至首旌勞之進必與坐語退送之門蓋前此未之有也按治諸御史暨藩臬長二皆然事在瑞州府志君初無子有女許嫁潘溱溱孤君挈之上高躬督教之既而子本生若干年而君歸歸數年得軟足疾又六年丁母之喪喪畢而足亦少愈然卒不良於行鄉大夫為逸老會強致君偕君不至雖飲不樂也今郡守宜賔王侯高君之節以俸米檄縣即君家為問君子謂王侯知人君詩長於選淡而有思文亦典則所著有靜軒稿藏於家君生景泰丙子八月三十日卒於正德丁丑五月二十七日得年六十有二配楊氏子男一即本側室陸氏出娶庠生袁儒女儒袁州府通判前太常典簿嵩子也女一即溱婦墓在某之原從先兆也葬以卒之年某月某日銘曰以官為師道固在我彼徒利云我則不可位卑言昌其譽孔揚歸病且愈而弗卒杖於鄉云胡不傷梅坡張君配郭氏墓志銘張太學生輜以其父梅坡君意來請銘其母郭之墓手自為狀亦父命也郭為吾里先輩諸城公之女子幼嘗及見公公沒久矣其女且老而豫銘焉能無感乎抑張氏父子之屬之懇尤不能辭也蓋狀之稱曰吾母氏郭吾外祖父諸城知縣炅以鄉貢士初官黃巖訓導外祖母彭實生母於黃巖母幼穎惠貞靜未幾彭亡事繼母錢如母年十七歸吾父時吾祖父怡庵府君已沒母恨弗及事常自嘆曰傷哉命也女吾無母婦吾無舅傷哉命也繼之以泣春秋享祀供饋必親婢請代不可曰此不用吾誠孰用吾誠者奉吾祖母鄧躬紉裳衣食飲嘗而後進祖母多疾信禱而畏藥母順其志蓋三十餘年如一日卒而殮葬祭皆相父以禮初吾父生十三年而孤家盡於火母甫歸即脫簮珥以佐日用比業稍復父好居室且多致賔客或曰費盍止諸母曰止而弗聽如婦順何吾固重吾言也何氏姊死有孤在抱母曰盍我為養既長曰盍我為娶成氏姊死有遺孤三母曰盍我為教遷而鄰焉舅氏昆季雖異出皆助其嫁娶至於延師集友自吾屢試屢黜至卒業太學贄幣館穀歲勤無倦母以哭妹致疾疾革矚輜曰汝知諺所謂將軍柱者乎汝是已蓋不肖得於見於聞者如此吾母生正統己巳三月三日卒於正德乙亥三月二十八日壽七十子一即不肖輜吾婦章布政參議常熟某字公女女五長適義民過錫次適成浩次適何滋次適太學生王舉先卒其次側室出適義民朱珣孫男一曰㦢娶義興堵指揮邦寧孫女女一適同里楊著都憲宜間公諸孫也墓在長腰山東灣新阡葬以卒之又明年十二月十一日蓋狀之稱如此梅坡君名某字某云銘曰知母者子孝子不誣維其不誣是以為逺圖兮錢伯子墓志銘華蓋出宋戴公宋子氏也今其族在天下無錫為蕃且盛近齋君文逺華之良也鄉有南北錢族望與華埒而世相婚姻近齋娶於北錢而與南錢味泉翁孟濬雅相重故子氏歸翁之介子世喬越若干年年三十四以疾卒於是近齋病初愈聞之哀甚圖所以銘其葬者乃命子之弟鄉進士企説為狀來請子貞慎儉勤織絍縫浣合古女則近齋之父聽竹公嘗謂諸子曰之子有家其宜哉及歸事味泉翁暨嫡姑楊氏及姑馬氏皆稱之如聽竹言世喬兄世徵長且倍或疑其難為弟也子曰何虞第盡弟耳屢以無相猶為世喬勸卒稱弟弟世徵沒有孤女子携以歸育之與已女等於是子有子矣世喬在太學庶子詢者方娠其母以舉不舉請于子子曰此莫非吾嗣若之何不舉既生育之與已子等母錢早世每歸寧則依依祖母之側而致愛敬於近齋若在室然候問之嫗日屬於途少聞不安節則戚戚不寧其垂絶也戒家人曰吾父病聞吾死能無重傷其心乎報之毋遽烏乎子誠賢哉子有二子曰訪聘鄒邦美女其次即詢聘華企益女女一受華騰霄子甚聘子卒以正德乙亥十月六日越二年丁丑閏十二月十四日世喬以葬於舅姑之墓之側鄉曰垂慶原曰某原世喬名榞太學生其請銘也吾友浦君文玉實以企尹來豫辭焉文玉曰子也少敢勤公筆公儻念其賢而夭無亦賜一言以慰其父兄夫子乎豫感焉乃敘吾昔聞於世喬之從兄户部君與今狀所稱尤賢者一二事而繫之以銘銘曰吁嗟子兮死懼傷親生如之何生亦無幾而淑也則多吁嗟子兮鄒君肅端暨妻錢氏合葬銘有序正德丙子冬十月二十二日泰伯里鄒君肅端卒是夕其妻錢氏亦卒明年丁丑冬某月某日其子契葬君於寧山祖塋之次錢氏合焉禮也鄉葬之一日契從其妻之父鄉進士朱君廷補來請銘其族叔祖南豐訓導惠之為之狀君諱辨姓鄒氏肅端字也晚授承事郎其曾祖洪昭其祖以善其父德字輔之其母周氏其兄弟三人君為之長錢與君生同年月歸若干年年皆六十有一子一即契孫男三某某某女一君幼警敏讀書能強記稍長習於儀弱冠家事及焉於是輔之嬰心疾久矣居常忽忽非人情不可測君入承顔色出應門户調劑􅀈縫歸於成務人殆不知輔之之為病者蓋如是若干年而周卒又若干年輔之卒先是母念弟貧君生為館之死為之葬念妹寡養之終身及其女不衰故周卒無遺憾者兩弟請異室君以田園室廬圖書服器僕從舟輿馬牛物而三之以弟恱為恱曰此吾母之命也吾父雖病志亦宜然吾何敢不承𢎞治中飢君入粟當受服辭不可則請以族老之有行義者一人受之正德初勸分令再下君乃受服君年三十餘錢與諸媵皆無子乃議所後昭穆敘矣或以親踈為言君曰行之弗可瀆也為父子也無瀆於行而以嗣雖踈不猶愈於需乎於是君從弟勳之子契方在襁君卜日告族人抱而見於祠堂擇傅而育之既而朝有建議著之令者與君志合君曰吾固謂當有是論者謂君前善處父後善處子錢有相之道婦德於是為大鄒宋忠公浩之弟洞之後錢祖吳越武肅王鏐錢之父曰惟實圓通之望也母華氏南齊孝子某之裔蓋無錫稱三舊族者銘曰道在邇兮變則難人不於斯兮又將奚觀維處之善兮維質之美亦維心之安孰爾淺兮肅端明故山東冠縣知縣楊君墓志銘君諱溢字宗謙姓楊氏别號晉齋世為武進前黃里人曽祖名之祖仲文父厚自號卷石母錢氏君生十九年遊郡庠纍應鄉試以廩膳生應例入太學𢎞治己酉舉於應天丙辰舉進士觀都察院政尋選浙江會稽知縣癸亥當入覲上官有擬調君者會稽故難治君亦厭之遂自陳吏部冠縣於是乎調居幾年丁母憂歸會逆瑾用事凡官嘗調者悉罷之吏部請凡出甲科優於學者改遷教授凡若干人君與焉於是君服闋未起明年瑾敗還君故職召檄至君力辭致其事郡縣不能強也初卷石翁病疽時天大寒醫難為治君日夕侍手拭弗替至以口吮旬月乃愈翁謂君孝楊故大族君以上同居者五世君鄉舉後從兄弟十有二人物故者六七君恐食指日繁規業或弛為前人纍乃用古異室禮謀析焉公平周悉退無後言論者謂君知義會試得報賀者在門君獨慿闌流涕或問之君曰吾先人教子望在今日而弗之及也奈何弗悲母喪屏浮屠不用惟墓事是隆郡守連世昌稱重之逺適野送其葬君在會稽有積逋當追君寧受殿考弗為加亟在冠縣專任德教興學勸農竊攘屏却民皆感恱比君歸遮道留弗得追送百餘里君宦情素薄聞罷且調夷然不少為意晚幸得謝治後圃為池臺客至則相與哦燕終日客去蕭然獨坐書䇿筆硯不去左右自謂老生故態所著有災祥便覽晉齋藁藏於家君卒正德丙子四月十七日距其生景泰庚午九月二十四日得年六十七配錢氏初無子以從弟愷之子城嗣繼而側室潘生子墉與城為二城娶朱南康啓東女墉娶唐給事用思女女三皆錢出長適陳僉憲某字孫邑庠生誠次適王都憲希曾子中書舍人忭次適孔少參宏章子密孫男六銑聘太學生夏元吉女鋭聘太學生賀汝勉女錡鎜某某未聘女孫四長受白康敏公孫誨聘次受蔣侍御元貞子瑫聘次受太學生王文貞子某聘餘幼君葬以卒之明年丁丑十二月二日墓在原塘新阡君所自卜也君舉進士之嵗豫同考會試蓋識君久矣至是城墉以周僉憲仲鳴狀來乞銘吾甥吳汝憲君從甥孫也實相城墉以請銘曰前稽後冠孰易孰難無於地觀當於民觀或仕或已何愠何喜觀無於人無亦於己延陵之野井彼有疇或勤敷災而什乃五收伊嗣歲之秋明故中憲大夫浙江按察司副使高君墓志銘正德辛未豫在户部奉命兼僉都御史視漕舟於北河時曾唯高君以郎中從明年壬申君擢浙江按察副使又五年丙子君考績京師歸道得疾六月一日至丹陽南數里卒其兄江西按察僉事舜穆逆其喪歸越三年戊寅三月三日葬於黃山先塋之次舜穆手為狀來以銘請烏乎豫知君者豫不銘而誰哉君諱貫曾唯其字别號恕齋系出齊公子高後世居濟南之歷城初祖宋銀青光祿大夫逸民扈蹕而南至江隂留籍焉七傳至江隂州教授雲卿支屬寖衍鄉稱其居曰高巷又三傳入國朝曰升之者當兵亂後再立門户於君為高祖曾祖彥恆祖鵬運有孝行父某號希庵績學未舉以君貴纍贈户部員外郎母邵氏纍封太宜人君生符夢祥色氣英偉與羣兒嬉獨被繡襦為統領之狀見者異之弱冠入縣庠與舜穆並有文名偕舉乙卯鄉試已未得進士尋以省母告歸辛酉授工部都水主事分治三沽諸閘多所興革其大者釐正蕭碭豐沛滕五邑歲役夫修昭陽湖隄滙泉以濟漕涸又修沽頭南北隄為橫流蔽民田獲利流移復歸事具所著黃河圖纂往來怙勢者聞風斂戢隱然為河渠重者三年乙丑改刑部廣東司實分治禁衛君取舍重輕惟法民用不寃丙寅奉命録囚江北諸郡進署員外郎六品再考實授員外郎戊辰進署郎中時宄瑾熖方熾君矢共職不阿有百户張福者訟而抗往訴之瑾瑾下君詔獄既而邀重賄將復之君謝不應遂謫知遼州君因俗為政歸之禮法若修復廢墜往往有出常格者庚午瑾誅遷户部廣西司員外郎民攀泣留履以詔恩加贈封典辛未進浙江司署郎中是秋劉賊焚掠運舟君時從豫以敏習為諸同事所推事在部牘君之遷副使也劉賊方南擾江隂而江西賊且奔突浙境君過家即之官會巡視都御史陶公初至君巡衢嚴道首劾參將李某失機按察使缺君署篆數月憲度貞肅同官有以門禁故至大詬者君不為變既而其人以他事逮下詔獄詞濫及君卒不果逮中監某在市舶雅敬重君比遷鎮守意屬心膂而君顧疏之於是請託之弊不戒而息舉廉黜貪各得其情御史上君狀既考最進階日且超擢而君不可起矣君英敏方毅孝友夙成臨利害不惑敏遜好學仕而益勤在沽頭遼州日有程課且進諸生而講業之其在户部為尚書孫公侍郎喬公所知凡大題奏必屬君以藁君欲置義田顧力不足乃始以百畝而自為計大略謂斗石之粟十之助可十人猶愈求豐而俟也痛希庵不逮養焚黃之日伏冢悲慟久之事邵太宜人昕夕以歡舜穆官江西嘗以法忤勢家時其入覲圖搆黜之或告君使為行賂祈遷君不聽見執政力辨不辟會舜穆以靖冦進右參議致仕君喜曰事白矣比還浙遇所搆者峻絶之曰吾不能匿兄怨與見也弟贄以鄉貢知崇安而卒長其孤女而嫁之妹適邵孔述為之資送二女許嫁固違富室之請皆歸之士人君生成化丙戌十二月八日年五十有一娶陳氏德稱其配纍封宜人嗣子季生於屬為再從子聘陳氏女三人長歸吳淳次許薛文治而夭其一方在抱側室某出也所著有恕齋藁藏於家銘曰爰有利器若古干將既貞且剛于盤于錯亦既屢嘗盍歸上方以辟無良天也胡然而中道戕厥則何病器之者之傷明贈承德郎刑部主事李君暨三配合葬銘有序正德丙子夏六月某日吾郡守李侯廷重之繼母張氏以疾卒於官舍秋七月廷重以其喪還開州於是其父贈承德郎刑部主事以誠君葬州南慶祖鎮之東原若干年矣初君配吳氏先葬於斯繼室贈安人孫氏亦從焉張氏其再繼也歸若干年而君卒至是又若干年乃合葬禮也廷重孫出也張實育之幼忘其孤長能力於學比舉進士知蘇之長洲縣張就之養相廉勸慎嚴若父師居二年當逆瑾用事濫逮廷重下詔獄邑民憐其貧也斂白金若干將遺張往賂求免張聞之曰吾兒無罪今欲加焉若權姦何進退有命賂焉用之如以賂滋益罪也謝不許既而釋未幾用部使者薦召為刑部主事尋署員外郎郎中擢知東昌府以才調常州張訓之如長洲君朴諒疏豁性喜飲酒不可羈以事或勸殖産不聽獨知教子廷重生六年入鄉校至君卒凡十年課督歲加臨終猶以屬張張謹志之不忘故今稱廷重賢者必及張謂之能母君姓李氏諱成以誠字也世為大名之開州人歷宋元至今鄉稱巨族祖寬有士行父敬尤好義母賀氏君生正統辛酉十一月十一日卒𢎞治乙卯正月三十日年五十五三配皆開州人吳蚤世孫慈惠宜家卒時年三十八後以廷重貴偕君受贈張生景泰乙亥六月二十日年六十二子男一人即廷重名珏娶秦氏封安人孫男二昜旭女二皆幼君與吳孫葬各以時今啓而合在丙子某月某日廷重將行乃為狀屬李訓導時鳯來以墓銘請豫知廷重久矣而能勿重其所生也哉且合葬重事也銘惡乎辭銘曰顓頊之墟泉流沄沄民重矜節太史實云我思古人而銘李君君墓巋而三耦從之永世以不墮容春堂後集卷五
