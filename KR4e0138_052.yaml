body:
  text: 容春堂續集巻十六明邵寶撰墓誌銘三十七首墓誌銘大明故光禄大夫柱國少傅兼太子太傅戸部尚書武英殿大學士致仕贈太傅諡文恪王公墓誌銘嘉靖三年三月十一日少傅王公卒於吳城里第於是公致仕歸十五年矣先是上即位遣行人即其家存問勑有全徳盛名海内推重之語公上謝疏進講學勤政二篇上嘉納焉官一子為中書舍人越三年又遣有司存問恩禮隆重時方仰之至是訃聞上為輟視朝一日賜賻米及布命諭祭者九贈太傅諡文恪仍命工部治葬事比葬其子延喆等以其長女壻徐侍讀子容將屬銘于寶寶以公國元老銘宜館閣大筆且公鄉郡固有作者奚宜至於寶哉延喆曰先公遺命也先公知公深矣寶乃不敢辭公諱鏊字濟之姓王氏別號守溪晩更拙叟學者稱震澤先生其先自汴扈宋南渡諱百八者始家吳之洞庭山曽祖伯英祖惟道考朝用光化知縣皆以公貴贈如公官曽祖妣陸氏祖妣葉氏妣葉氏皆一品夫人公自幼穎悟不凡年十六隨父在國學始課舉業落筆過人有傳其論䇿於文莊葉公公大竒之曰此子他日忠肅乎忠肅鹽山公諡也公與同姓且嫌名故稱之於是聲名動京師有屈年與行引為友奚元啓者居二年歸游吳庠凡考必居首陳提學天台先生尤以天下士期之甲午試應天第一主司謂安得東坡復出至全録其論䇿不易一字乙未㑹試第一廷對䇿入衆擬第一執政有忌其言直而抑之者諉曰文太長難讀也冢宰尹公讀之遂置第一甲第三初授翰林編修孝宗初開經筵充展書官憲宗實錄成陞右諭徳用徐文靖公薦為侍講學士尋進日講以宫寮選兼左諭徳尋陞少詹事兼侍讀學士擢吏部侍郎丁外艱去終喪復任命兼國史副總裁繼命以其官兼翰林學士入閣典機務進戸部尚書文淵閣大學士國史總裁同知經筵事再進今官勲柱國階光禄大夫致仕公在翰林益肆力於學閉門讀書避遠權勢如恐不及士請業者逺近踵至惟中貴弟姪皆絶之在經筵雅志啓沃每講至天理人欲之際及君子小人之用舍必詳必懇上方春出游後苑左右諌不聽公講無逸至文王不敢盤于游田反覆規諫上悚聽為之罷遊仍傳飭内侍廣今日講官意指爾爾好為之云云東宫將出閣司馬鈞陽馬公疏請選正人以端國本詔㑹議至公名同聲曰此真其人遂以為首吏部闕侍郎侍郎韓公攝事以公與夀寧故有連既貴而能逺之其正可敬也首薦而用之在吏部抑躁奬恬清簡得體北兵入塞上籌邊八事議論激切侵權倖始雖尼之後多施用大學士餘姚謝公以災異求退舉公與吳文定自代時論稱允武宗諒闇時公協韓司徒將率諸文武大臣伏闕請誅内侍導荒遊者永成等八人以除亂本疏首當屬冢宰焦公焦辭乃屬韓疏入上大驚怒欲庇八人内閣持不可俄有㫖召公等至左順門中官傳諭甚厲衆相視莫敢發言司禮榮乃曰上言卿等所言罷宴樂勤政事皆當從之惟八人者不可去公曰八人不去亂本何由而除天下何由而治且今日之舉果何為乎侃侃不屈韓亦危言繼之榮等語塞為慰言而罷國論倚以為重既而八人者乞憐於上歸咎岳一人斥之南京尋用八人分布要路瑾入柄司禮而内閣劉謝二公皆去詔補其缺衆推焦公及公公雖以前言見忌然重違公議遂俱入閣時李文正公尚辭疾不出焦公每事推公上見公班尚書後因進公戸部尚書文淵閣大學士公以資淺辭不許未幾賜蟒衣玉帶公聞尚寶崔璿郎中張瑋副使姚祥以微眚被枷瀕死亟言於瑾曰士夫可殺不可辱今既辱之又殺之吾亦何顔復立於此由是三人者皆得釋韓公雖逐瑾銜未已必欲置之死無敢言者公言韓清徳粹行海内所知今無故加罪恐不能服人不聽㑹廷中得匿名書斥瑾罪惡瑾意稍戢韓得紓焉亦以公前言故先是應詔舉經明行修六七輩有餘姚人者瑾欲因是逮謝公并及劉公公與文正公力救乃已司馬華容劉公被逮將坐以激變土官岑氏罪死公曰岑不卒叛何變之激劉得減死或言都憲石淙楊公在陜西築牆太勞費瑾信之屢以為言公曰今安得文學政事作人有功如楊某者為國修邊奈何罪之廢后吳氏之喪將祕不發公不可瑾曰何以成服公曰雖然葬不可苟也景泰汪妃薨於邸時疑其禮曰妃廢不以罪當追復故號葬以妃祭以后皆從之時中外權悉歸瑾公初開誠與之言間亦見聽及焦事媕阿議乃不合瑾益狂悖横厲禍流縉紳公救之不能得蹙然見顔面瑾望見之曰王先生居高位何乃爾哉公再疏求去甚情而懇或以公咈瑾意虞有竒禍公曰吾自省無咎何畏彼哉瑾使邏者詗公以公絶贄幣報瑾笑曰過矣於是公疏至三上許焉賜璽書乗傳以歸嵗夫月米具給當時以為異數云公立朝三十餘年廉正守道恒如一日史館諤諤有所可否不少徇總裁意經筵之進以不及執政門故遲之然公望重終不能抑也主考南畿知有典法不知權勢絶關節蔑震撼隠然為吾黨重先後㑹試再為同考主考尤稱公嚴能得人教諸吉士不惟其業亦惟身率以道稱能成人論者擬諸泰山喬嶽蓋坐鎮之功大矣而東山之望晩繫天下尤重惇叙慎修持身持家表裏周浹讀書著文樂以忘老雖士夫雅博清玩一不屑意人莫敢干以私者公稟少怯臨事接物或不能無動於心偶讀程子明理治懼克巳治怒二言箴以警焉及涵養既久進講奏對從容詳雅得告君之體觀公之成者未嘗不三嘆於斯其為文先愛三蘇才思川湧援筆如不能止既自超蛻力追古作自昌黎上遡秦漢駸駸乎㡬矣論起衰者歸之嘗言吾文得法於孟子君子曰信雄而辯鬯而雅晩精理學論辯多古人未發詩蕭散清逸有王岑風格書法清勁自成得晉唐筆意所著有震澤集震澤編震澤長語紀聞各若干巻公卒時距其生景泰七年八月十七日夀六十九配吳氏繼張氏俱贈一品夫人子男四長即延喆中書舍人次延素南京中軍都督府都事次延陵郡諸生次延昭女五長歸侍讀子容名縉次歸貴州都司都事朱希召次歸諸生邵鑾俱先卒次歸中書舍人靳懋仁其季受諸生嚴濡聘孫男三女二墓在東洞庭梁家山之原葬之日為明年乙酉正月元日庚申銘曰明至中葉道與時升君子觀國人焉是徵我求其人憲孝之世偉哉王公植我元氣公有忠義文章以宣成化制䇿𢎞治經筵在正徳初少宰入輔彼宄濟奸公心獨苦先是伏闕偕二三臣請劒未許徇國以身公如砥柱百撼靡動平生二箴况也自誦豈無加秩少傅尚書奭裕未足伊任有餘時方倚公公去則亟僉曰貞哉亦有殊錫公在廟堂鼎實棟隆公在山林斗揭嶽崇公既老矣猶望其起公亦夀矣而祝未已震澤萬頃莫釐千尋英靈還止山高水深明故嘉議大夫山東按察使吳公墓誌銘公歸自山東之九年嘉靖壬午十二月某甲子卒于家先是二十日吾初遭太淑人之喪公亟來弔及予袒括時公尚無恙既而聞公病未㡬訃至予哀病不能弔且懼虛不敢弔也又明年甲申八月望日其子輅軾等來告葬問其日曰十二月甲寅也問其墓曰青山之原先人與公遊而指畫焉者也輅等以治命于是焉營卜亦惟吉問銘曰公知先人輅是以告銘不於公又將焉圖某曰然我固知公銘吾宜為之公諱學字遜之别號海洲晩更夢鶴吳之先蓋出延陵季子自公八世祖萬一至曽祖得淵祖潛皆歛徳市隠父晟號古愚倜儻有才畧以公貴封監察御史母司馬氏贈孺人公生脩榦偉儀器局不凡十八遊邑庠博覽羣籍發為文章新意渙發戴恭簡公為御史提學屢加稱賞成化癸夘領應天鄉薦明年甲辰登進士第觀政兵部授行人司行人若干年丁繼母陳孺人憂服闋簡擢四川道監察御史清戎雲貴繼之河南巡按丁古愚翁憂奔歸服闋例罷官再起補河南道辛未監殿試擢山東按察副使兵備曹州以功加三品俸尋擢按察使二年乃致其事云行人至河南大同使事外咨謀考覈得觀風體峻却贈賄至不敢出在四川道承詔偕東兵科進道彭刑部濟物㑹鞫雲南失機事稱量情法衆服其斷雲貴戎籍久弊公從容搜剔詳而不瑣辨而不刻約所得㡬什伍以上仍條上數事今著為令於是詔大臣舉朝官可任按察使者公與焉還朝以恩例進階文林郎勑有經術良才抗章獻納之褒兼掌貴州道事巡捕畿内盜賊時當朝㑹道梗以夷河南宗藩閹鎮怙挾害政一裁以法首疏論買牡丹及差官勘地擾人停之其諸激揚舉劾尤得憲體時洛陽劉公在内閣鈞陽馬公為司馬皆以鄉人言稱之古愚之喪公以不及視歛哀慕依依服闋久未行逆瑾謂踰制也勒家居久之瑾誅起補河南道風采如故曹州當南北畿及河南山東之衝霸州流賊奔突焚刼其勢方熾㑹黄陵岡三埽決於河水司空湯隂李公知公之才請勑公兼理之凡山東河南及大名若干州縣皆受節制兵備兼治河自公始公畢精從事且募精壯旁伏邀擊斬若干人俘若干人招撫脅從者㡬千人時埽功亦成總制軍務都御史陸公績於是乎有加俸公益為逺規創建教場立法訓練至今遵之山東當兵荒之餘獄多久繫辯誣決滯不伺終日監癸酉鄉試力賛公道是冬朝正聞有怨家將假手以甘心焉者公即上疏請老許之初公之家居也養晦一室題曰松雲鶴逸至是歸乃搆別墅益為清勝又為菊花莊於近地極山林之樂蓋不知老之將至也公頎然朝著間旅行參立在在出人頭地議論英發驚動坐客或扣其藴則自厯代史傳所載成敗之跡外至當世之務若山經地志及神仙内養之術皆能究極領要詩篇翰墨落筆健爽大書尤得晦翁筆法落落鄉里間前後數十年事古愚翁曲為承順與弟問同居久而後析於諸子均撫且教無嫡庶前後未第時門人以受經顯者若侯徳明朱顯卿吳起明陳元甫盛舜卿輩凡若干人所著有海洲稿若干巻藏於家公之卒距其生天順丁丑五月二十七日享春秋六十有八配方氏贈孺人先公三十四年卒繼武進卞氏封孺人男五人長時蚤世次即輅太學生次冕亦蚤世皆方孺人出次即軾側室王出初為庠生後以例授蘇州衞千戸次轍卞孺人出功授錦衣衞百戸女三歸李榮鄒鼎鄒金孫男三相保殤繼夘應夘孫女亦三許嫁賈時亨華某茹霖方孺人先葬濂涇今遷祔焉狀出俞㕘政國昌以予所知徵之皆信銘曰九尺之軀公才允如公兮卿兮於公有餘長憲東臬而遂歸歟蓋君子猶恨人望之虛也青山之原公斯是樂何以銘公我懐逸鶴太孺人秦氏墓誌銘太孺人秦氏江西右布政使中齋公之仲女詹事府詹事兼翰林院侍讀學士贈禮部右侍郎龍臯陸公之冢婦常州府學生贈中書舍人君諱含章字以貞之妻中書舍人宏道之母以宏道貴受今封孺人出沈恭人年二十一歸中書君不及事其姑池宜人事舅詹事公暨繼姑姚宜人得婦道甚至舉以為諸女訓詹事公為諭徳久在告以史事被召起家政歸中書君中書游郡庠遂及孺人逺供近問外需内應無所缺又以餘力樹拓産業詹事公安焉既而姚宜人卒京邸詹事公繼之中書君奔往迎其喪歸號慟成疾而猶力於禮葬畢亦卒孺人才三十一有幼叔七人女妹三人長者方髫少者尚抱迺育迺教迺聘迺娶迺字迺嫁皆于孺人孺人積瘁病痿不能居起嘗曰吾未亡人而罹斯疾生不如死第諸孤無託奈何乃力疾自奮嚴内肅外紀渙僕輯惰婢各置之所退無怨言經理區畫以濟日用保有初業曰叔多業少政恐未能益耳况可損乎越數年諸叔成室乃以其業析於是宏道孤弱孺人訓之嚴不以慈廢謂之曰讀書不成名猶不讀也陸氏世經相傳至爾而絶其謂之何宏道以祖廕授今官行藝稱之皆曰陸氏有後孺人之教也叔巽章以南京戸部員外郎卒於官孺人哭之慟曰吾育孤數十年方幸此叔有官慰地下人天乎何奪之速也病間宏道歸省見之喜比疾且革聞叔奎章鄉試不利則泫然泣謂宏道曰門戸當衰乃如此乎人謂孺人知家世大計儗諸偉丈夫者孺人聞之曰吾受諸孤之託於諸少姑如親受先舅之命吾為此懼是故欣戚係焉敢以毋事廢嫂分乎君子以是益重之孺人孝敬仁恕敏慧詳密備諸女徳家政外恒有惠心於人卒之日里媪鄰嫗多感泣者且幼從布政公涉書史大義詩章字畫至於圖繪耳目所及輙能手應然不求工亦不時作唯娣姒姊妹間或索得之今什一存者猶繫閨門之思云孺人聞封命數月而卒是惟嘉靖壬午十月十七日年五十七越中書君卒二十六年矣宏道以茶山祖塋病於水卜新阡於劉莊村以卒之又明年甲申十一月二十四日葬焉初孺人治命欲遷中書君合之宏道念體魄久安不敢輕議咨于其舅太學君國英製衾衣棺歛如祔禮孺人子男一人即宏道娶王氏故中書舍人昪女也女一人適江山知縣吳仲仲慶府長史山子今方被召命孫男二人長韶聘宜興陳國子道生女次頀聘無錫盛國子宣卿女女二人長聘于蔣保寧益子同和次聘于宜興堵國子祐子僑秦系出宋國史編修淮海先生之子湛由晉陵而遷無錫布政公諱䕫字廷韶文學政事時稱名臣公之孫汶予季女壻也故宏道從太學君來請銘銘曰華厥宗亦華厥歸非貴富之席惟禮義之依有從罔違遭家多難而能勿壞于嗟孺人於壼敎乎有輝封太宜人夏母包氏墓誌銘封太宜人包氏福建左布政使夏如山從夀之母也嘉靖癸未春二月二十五日夀終於家時布政朝京師還至鎮江聞訃去其卒之日才二旬耳布政以不得面承遺命與含與歛有終天之恨焉越明年甲申十一月四日啓其父贈奉直大夫戸部員外郎訥菴公之兆於范莊祖塋奉宜人之柩合葬焉先二月來請銘予於夏氏夙有姻誼布政予友也銘其能辭諸按布政所自為狀宜人姓包氏寔宋龍圖閣學士孝肅公拯之後孝肅孫欽靖康中自合肥徙句容再徙江隂六傳曰天麟登咸淳博學宏詞科勝國時辟世著書累徵不起有易書詩春秋四經傳義行於世門旌於朝曰耆徳里稱於鄉人曰文林與夏氏族望相埓又六傳曰士初讀書有文慷慨尚氣節者宜人之父也娶富杯陶氏克配無違徳宜人之母也宜人幼柔靜敏慧不妄言笑能通小學列女傳大義女紅尤有巧思姆教外自得為多性至孝母病不食宜人亦不食病已乃復於是納訥菴公聘甫笄而父母繼喪哀慟屢絶厥既來歸孝敬儉勤克相家政舅小靜公善吟咏樂與江湖名士遊姑趙性嚴有法宜人事之凡供饋必致腆潔而自奉則節約數倍婦事之執無輟寒暑生殖資焉故並得其歡心奉直公博物多藝能不屑生業性毅直好面折人過宜人每勸之曰事非著已奈何以是賈怨於人邪家人有小過多掩覆之而隂為戒勑賔祭之供皆先事而治舅姑繼病且卒宜人於醫禱歛窆佐奉直公皆極其力娣姒間白首無違言念父母殁久或言及之輙悲咽不止時遣其子上塚灌奠友愛伯兄餽問時繼陳氏妹貧而無子移其家隣焉養之終身殁為禮葬布政方齓口授小學故事數十條稍長動以儀節為訓夜績課讀漏過數刻乃休蓋數年無倦色比布政以癸丑進士授工部主事三年考最宜人初封安人鄉人榮之亦無驕容越某年布政以戸部郎中終奉直公喪將起復而有哭子之戚因移疾家居久之正徳初逆瑾擅權禍延縉紳宜人勸之行布政至京師果坐除名其歸也宜人稱命以慰之布政忘退宜人亦安焉獨嵗時屏冠帔不復御强進之第曰不耐煩不耐煩及追奪令下笑曰吾固知必有是也瑾誅後有詔起廢宜人進今封丁丑春布政以湖廣㕘議歸自考績㑹喪其弟上疏乞終養不許將再上宜人致書誡曰國恩不可不報吾雖老矣然尚無恙無吾以也於是宜人踰七十親率媵婢力作機杼之聲徹於庭戸或勸少休曰吾性樂此豈能袖手高坐邪最晩益好施予于親黨之匱者尤厚橋梁道路或言修建無弗助者布政在藩自少㕘三遷至左轄守官如初而業益殷皆宜人經營注記而綱紀之僕為之盡力不見其賾即有之亦不厭也其臨事裁決譬諸丈夫亦稱偉達佃夫傭婦表裏感服有由然哉太宜人卒距其生正統癸亥九月二十四日夀八十一子男二長即布政使從夀娶周氏封安人贈宜人繼徐氏封宜人次從聖娶許氏先卒女三長適周濂次適趙慎先卒次適何惠孫男三正邑庠生娶王氏先卒禋娶王氏祐娶趙氏女一聘于華子信曽孫男一霖娶陳氏太宜人久勞於家喪葬婚嫁比時具物有奉直公所不及知者趙氏女有孤女無依命其婦子而嫁之正婦寡視之加一等以成其節禋也孤既配焉而復為之築室其勤劬不啻其父之存者蓋凡濟家之屯而遺休於後人事不止此此其大者耳方伯謹志之不敢忘故既致其狀復泣而告予者如此予聞而悲之奉直公諱某字某初封承徳郎工部主事與安人竝命今封乃再命云銘曰夏有夀母出宋名臣婉婉令則君子是嬪方伯軒軒母教維最肅肅敬共懇懇慈惠老猶箴黹耋且枲麻將使我子體國忘家母没子歸曽未越月含歛弗躬終天之闕子成臣道慰哉母心兹邱世世其始自今外舅秋竹翁墓誌銘翁吾妻淑人之父也初寶生三年而孤六年吾祖母楊淑人謂吾母過太淑人曰兒一身繫宗祊盍蚤求婚求婚於親舊間皆以寶貧且弱鮮有欣然諾者媒氏告翁翁曰但須看女壻耳一見遂許之或言翁鄰於善相者李翁必其言故不然則翁之得於李翁者深矣翁笑而不言自吾妻入吾門從吾仕中外再受封命至於今四十六年寶感翁之知未嘗一日忘於懐也翁性伉質氣兀兀不能下人有不當其意者雖遇之不揖也且好面折人過聲朗朗累數百言不少假知言者謂之辨知徳者謂之直翁亦自負屢稱於人年三十四十生業遂落浮湛鄉曲者數年五十薄遊江湖北至大梁東厯徐兖濟汶徳景滄瀛至于京師歸隠迹倉庾間浩然自得久之亦謝去不事寶在官嵗有所餽為翁夀翁輒藏不用間減息以應人之貸子本流轉初有數十金晩至數百乃益省縮為儉節視少年日如出二人蓋凡若干遷始定今居中嵗喪吾外姑談孺人遂不繼室獨與如媵一人者金氏居六十而裕然七十而充然八十四而灑然以終初病痰越月病日進乃瞑卒之日鄉鄰無不嘆息泣下者先是三年壬午有司以高年承詔予粟帛或勸之受服翁稱徳以謝之縣大夫有事於春秋嵗歸賑焉翁姓顧氏諱節字公節秋竹其別號也高祖文曽祖廉祖守仁父永吉母吳氏子男四人二人早卒一人生七月抱繼於人今存者一人曰宏亦且耆矣女四人淑人為之長次歸吳鯨皆談出也其二人金氏出壻周訓侯相孫男一人曰相女孫一人歸魏金翁故人祖孝之孫也曽孫一人曰後翁卒以嘉靖乙酉二月二十九日戊午寶方病足輿而視殮既乃卜地慧山河滸之原以是年八月十五日壬寅㑹宏等葬焉談以𢎞治壬戌葬其西北若干步所于今二十有四年矣遷而祔之禮也亦惟病於水故銘曰慧爽以始狷介以終矯枉之過今人古同誰歟知者于嗟乎公張宜人華氏墓誌銘張宜人華氏今致政福建都轉運使企齋公之繼室也少公十一年年若干歸公時公方舉于鄉尋第進士授職方主事分鎮山海關改刑部調順徳通判稍遷東平知州黎平知府逆瑾時罷官瑾誅後復起補太原未赴擢今官歸宜人皆從之稱公之賢者必及宜人蓋凡若干年又家居若干年嘉靖甲申七月十七日疽發背卒自娣姒以下至家衆男女哭之皆哀鄉隣之婦無不泣下者君子以是觀徳焉宜人諱貞字懿則華其氏先封安人宜人其再命所封號也華為無錫大族其出為春秋宋戴公之後其望則齊孝子寶其宗則宋處士原泉原泉自中州來居隆亭至宜人之高祖知漳州府徳基若干世矣曽祖璿武康令祖公謐父成文成文娶于鄒氏而生宜人鄒蚤世宜人鞠於祖母惠其長姑之嫁松石鄒翁者尤愛之惠遂以宜人屬之姆焉鄒率以女徳教以女紅皆習而成章㑹公喪元配過氏遺子璵甫三朞時公之母鄧宜人卒若干年矣公之父贈東平知州養浩翁聞宜人而聘焉既笄來歸視璵如己出左右提抱朝夕不置或謂宜人他日有子能如此乎宜人微笑不答既而子女繼生於璵尤篤知州翁喪宜人以生不識母嫁不及姑幸事其舅而不終也哀毁特甚在山海守官箴如公公無門慮順徳東平馬夫供億私衙甚厚若有例然然亦往往夤緣為奸利宜人知其然雖一菜果非公命不受於是苞苴女謁皆絶黎平孤懸徼外子女隨行者恒以瘴厲為憂宜人温言解之而勤慎益至麻縷絲枲日不去手蓋六年如初惟閔窮周乏不以遐廢鄉人謫平越者貧不能存將粥其女宜人惻然感之資以俸餘感謝而去比公東歸其人歸女舟中公曰同姓得無嫌乎宜人曰然然吾不忍其終淪於夷鄉也遂攜以歸撫教備至長乃嫁之逆瑾以微眚逮公下詔獄時子瑭隨行或欺其少惴以竒禍賺取白金若干兩瑭不得已假諸人而與之公歸宜人極力償焉蓋累嵗乃足脫簪珥節服食展轉稱貸畧無愠色福建任才五月商廖某輩三十餘人願以先貸羨餘九百金為公贐公不受强之至再公以舊責尚逋意少持之宜人曰此雖商物而數籍于官必却之是公用文告藩司藩司别取而用之五年後御史徵籍見其文而未見所歸攝公往理未至而事已白矣公還宜人喜曰果若吾言當其時若苟取之何以再入閩乎宜人夙夜在官以清共忠亮相於公者多矣此其大者宜人莊重寡言笑不尚華飾年未三十即屏粉黛弗御曰吾以真率事人何假此為與娣姒五人統家指數百同食四十年無間言宗黨姻戚待之唯恭内外婢僕嚴而有恩怒不失言喜不失色念華氏淪喪葬父後即奉考妣二主祠于别室嵗時修薦不缺曰吾後人念我或世繼之不然於子祭於孫止亦無憾矣男女婚嫁比時具物長幼均一豐不至侈薄不至闕凡女紅皆自手製不以煩公蓋公所自為狀如此予素聞宜人於公今讀其狀益重之宜人卒距其生天順甲申六月十四日年六十一子男四人長即璵娶施氏先三年卒次即瑭娶陳氏繼王氏次琳娶楊氏次理娶趙氏琳理皆邑庠生女三人長歸華綵次太學生蔣沂又次歸鄉貢士秦泮泮今大司徒鳯山公之冢子也孫男七人長鑾娶徐氏次釴娶余氏次鉦次鎮次録次鉞俱聘華氏一幼女孫四人長適過較次聘于華欽欽夭今在室又次聘于華墺王成學曽孫男二曰孝曰順墓在萬安鄉張臯莊之新阡北去司馬墩凡百步所葬之日為卒之明年正月庚申知州翁諱禶字廷美世望於江隂之流璜猶華氏之在無錫也翁舘於鄧氏遂卜無錫之洛社居焉公名愷字元之企齋其別號也翁於吾外祖為表兄弟故予謂企齋舅企齋謂予甥宜人母行也銘是以屬予銘曰有子吾育無異與因叶有官吾從無夷與艱叶君子偕徳而不偕年于嗟乎天明贈承徳郎戸部主事劉君墓誌銘戸部主事劉燁然公幹至吳自狀其父贈主事君遺事謁予曰先人葬未有銘兹將追刻之而納諸墓敢以為請再而益勤予念其誠遂銘之君諱汝楫字濟之薊之遵化人世𨽻寛河衞戎籍曽祖景山祖汶洛南訓導父清以順天貢士官平度州同知改遼州在國學時生君於外舍君幼岐嶷不群日記數千言遼州偶與人論隠義君從旁應曰出某書遼州駭而問焉知閱之書肆其慧如此稍長知為文執筆立就又能自竄改成章驚其長老且習於騎射出數百里不介群旅道途所見口占為詩亦往往可誦久之以幹蠱不卒舉業益務為辯博諸子史外樹藝之要下及馬牛醫術莫不領畧於是遼州自平度丁憂起復改官三年以勞得末疾君勸歸休寮友謂遼州方五十七疾且未甚力尼之君戚然曰疾以廢政可一日從居乎寮友顧益高君君遂為陳於監司得請乃歸歸未㡬卒弟某敏而放君繩之問學遂克成立為士類推重鄉里謂君友而知教君有三子各以其材而授之業仲子燦然治田伯炯然季燁然遊庠序嘗曰吾耕且讀皆有託矣因自號樂叟久之未效復嘆曰吾何樂焉因更號退叟燦然行田間歸以鄰侵疆告君曰汝不聞乎終身讓畔不失一段炯然蚤世燁然再試不利君箴于壁以警之甚切丙子燁然舉于順天君初得疾報至喜稍愈明年禮部試雖疾病報至又喜及得進士例許歸省君喜甚呼燁然至榻前語之曰此汝祖勤一生而未得者汝今得之以為易乎難乎思其難而圖報於上是惟汝事汝知之乎平居恬淡慈惠侃侃群居不以詞色悅人公門市井絶無君跡惟存交重義忍事退步為素所念耳晩益遺落世事與散逸六七人為真率㑹以至於老周亟貸乏不責其償於邑人多有之嘗道拾一釵視之金也頃之一婦人皇皇然來詢焉而知其物遂還之又郊行見二婦人遺囊於地拾而閱之則有綾履數雙俾亟收去乃新婦還自歸寧將奉其舅姑者二事久稱於人燁然登第時或夢君簪賜燕花人謂君遺休及其子云君卒正徳十二年十月二十七日距其生景泰六年二月二十三日夀若干配王氏山西布政㕘議昭之女封太安人子三人即炯然燦然燁然也孫男二人坤坦女三人長適王儒餘俱幼墓在縣西張家莊祖塋之次葬以卒之年十二月十六日燁然既終喪授官之二年以徽號恩贈君如其官階承徳郎銘曰可以宦學而不卒事士行終身其葬以士銘以贈官有官有階錫自今始其來未涯明中順大夫常州府知府陳侯墓誌銘嘉靖四年冬十有一月十有二日我郡守虚庵陳侯暴疾以卒寮屬師生至於鄉大夫士皆哭之慟其仲子悟含殮成殯將以其喪歸葬乃屬侯同年友徐臨江用中㑹毛司諌式之輩胥議為狀而惲憲副功甫走百里至錫山於寶問銘將刻石歸納之壙功甫言曰悟也守喪不敢離次敢代之請予素重侯聞侯之喪驚悲位哭至是益有感焉烏乎世有斯人而止於斯乎侯而不銘則誰歟可銘者侯諱實字秀卿世為廣東瓊山人曽大父士聰大父䕃父昭以侯貴贈監察御史母黄氏封孺人侯童時重厚不好弄十七游邑庠嶷然如老成人屬文多切理致二十八舉𢎞治壬戌進士始通朝籍即以疾謁告歸尋遭監察公喪服闋未起逆瑾矯詔例勒除名若干年瑾敗起為南京江西道御史時内臣趙蘭以内㫖採珠於合浦騷民黷貨侯劾罷之尋以母喪去服闋復除廣西道辛巳出按應天徽寧諸郡舉刺無所遺蕪湖有沙灘民業葦利中貴有事其地者奪而有之侯奏還焉民感激至為立生祠嘉靖改元簡擢知我常州侯至嚴㕘見之儀謹文移之式而於前政不擅更張誠待群吏裕處諸邑政有禮存刑有教寓規為逺大而不屑近小朞月間上孚下悅稱循良者同然一詞嵗值大侵民率走死無弔巡撫請發内帑銀分賑不足侯憂之甚檢庫中得羨餘無名錢若干萬緡將盡發以益之主者曰此故以供郡中燕饋諸雜需者也奈何發之侯曰庫皆公錢賑饑與燕饋孰輕重緩急即日令糴穀貯之倉或勸勸分富室侯謝不聽曰人各為家勸猶歛也如吾心何是冬有年侯大慰悅浙東海道倭人入貢與民交貨群鬬殺人都指揮以下驅焉而被害者一人傷者若干人事聞於朝朝議守者不豫欲置重法上遣都給事中劉君㑹巡按御史王君臨覈之二君以侯法家檄與其事侯言倭來以貢不以宼事出不虞安能豫之雖然官以備名亦不能無罪焉若加重法則過矣至於士卒於主將死不赴救自有常法亦不可加重二君上如侯議上從之侯既歸常病士習之浮靡也欲以正學倡之謂宋龜山楊先生嘗與鄒道鄉數君子講明程學於常留寓甚久親炙私淑故有淵源乃謀建書院於城之西隅以祀龜山配以道鄉而下十人榜曰道南取程伯子送龜山語也事在予所為記中君子謂是舉也正而逺抑有黙寢勢家侵地之謀焉其他積弊數事次第搜革或談及修船累人輒為興歎方圖處之而今不可作矣烏乎惜哉侯卒之年距其始生才五十一甲子而已侯自筮仕以來家居日長立朝日少故涵養深久廉靜沉邃徳與年進而未見其止初侯未有常州之擢陳御史原習過我言侯自經學外嘗取古方書及星厯地理諸家書時一玩習若有偏悟獨解者往往與知者談之平居無浮言妄動事必有則其既擢而將至也前守王㕘政誕敷言侯精密平恕每以古人自期非教所及為吾常民賀之近見吾門人胡㕘政誨之來自海南兵備言侯平居孝友内外無間言從弟容死遺孤二人哀而育之真稱猶子長為成室有田數百畝嵗入取給賔祭日用餘悉分諸宗族土官某犯法以數千金匄侯言緩死侯峻拒之接人周浹誠懇聽其言論如飲醇酒無不量滿不色喜怒遇賤夫無誰何聲雖燕昵不狎隠曲不䙝至於臨財則斬斬焉若將凂之人亦不敢以非禮至者嘗語同志曰學莫先於辨義利以養心志養定則事到處便能灑然無礙此方是學彼口詩書而庸違者陋矣鄉人稱侯徳者至擬諸聖賢之徒善人君子不足論也今以三子之言徵諸狀所稱尤信侯平生不輕作文字在瓊時亦有虛庵集數巻配朱氏卒繼吳氏贈封皆孺人子男二人皆文雅克肖長忭郡庠生次即悟侯喪歸以今年閏十二月六日越某年某月某日葬焉墓在某原侯喪三日巡按監察御史朱君在蘇聞訃而傷之署郡中公文數言曰古人之心曰循吏之政曰日計不足嵗計有餘蓋若為之誄者繼聞以未及薦侯為恨行將為請䘏典云銘曰前為御史大體是持後為郡守循吏我師實徳在民而民不知涕洟悲誄没乃見之聖賢之徒鄉評則有載徵我銘侯死不朽楊戸部東川墓誌銘嘉靖甲申八月二十二日東川楊戸部淮卒于京邸先是七月十四日東川以大禮議未決偕同官具疏繼諸大臣及臺諫言之越明日伏闕候命未得衆號慟失聲上怒命執其疏首八人餘人固伏不退命俱執送詔獄而東川以典篆待罪其署越三日詔杖于廷人三十東川出病創卧一月餘稍愈尋劇至是不起年三十八烏乎傷哉初東川以進士為山東司主事差監出納者凡四先京倉繼淮安水次繼通州倉最後内十庫皆有中官同事京倉胥卒積弊久且膠蔓東川奮發一革之淮安倉革中官茶果之需江南北納戸稱快通倉革囤基及額外席草之費家人無所取薪至易于市内庫勤慎清苦無與為比一茶外悉絶中官供饋雖饑餓不恤也庫夫故有六十人民苦役冗而公不勝蠧奏而裁之去二十人留四十人秩滿考最受勑進階承徳郎推恩封贈如典尋署某司員外郎未㡬實授擢署廣東司郎中前司徒九峯孫公今司徒鳯山秦公皆謂才且共事多與之可否公勤廉慎書上上考制詞稱之君子曰允而莫大乎一死之為烈也烏乎傷哉東川年十八游邑庠文譽日起正徳癸酉舉應天鄉試明年甲戌㑹試下第卒業南雍友海内名士文譽又益振㑹課經義數百篇稿傳四方丁丑登進士觀政禮部奉詔歸省踰年始受官至于今七年而已中經二室之喪重於請告未嘗一歸其慎如此東川氣體臞弱殆不勝衣當伏闕時或漏言能自逸者可免不然且不測東川曰某小臣勉焉效愚聞禍而逃非初心也何以立朝或勸之至再卒不變以及於難烏乎傷哉於是囊空無貲家人賣屋以歛其繼室周氏先六月病卒尚殯城外子女幼弱㡬不克歸鳯山公為經紀焉乃克歸巡按御史高安朱君士光為文屬縣長吏祭之且佐其墓役越明年乙酉閏十二月六日其父元正葬之於龍山世墓之次與二室合兆東川諱淮姓楊氏别號果齋東川其字也世為無錫望族曽大父汝潤以上繼掌鄉賦有隂徳於民其大父東耕翁日初尤稱惇厚近古父元正號圭峯讀書有家訓封承徳郎戸部主事母殷氏雲南左布政使序賔公之曽孫贈太安人繼母王氏封安人妻高氏繼室周氏贈封皆如之子男二人長曰重高出也聘鄒元敬之女次曰衷出其媵姚女二人長許嫁秦國彞之子滂次許嫁華企容之孫承祥亦高出也東川之祖母過吾母太淑人長姊也予與元正為姨兄弟東川少嘗學于予予悲東川甚於人人哭而為之銘其妹之夫張琳君鳴狀之予所知者固不待狀也銘曰烏乎東川其生也廉其死也忠忠不幸死於生益融廩如清風東川之墓不惟其生惟其死故明故即墨知縣陳君墓誌銘陳君瑶光既謝即墨之政而歸泥水也於是其子萬言以丁丑進士為湖州府推擢貳守吾常君從迎養至焉居數月而疾作遂卒於官舍貳守奉其喪歸以葬而屬吾令陳君名世問銘於予湖廣按察副使惲君功甫為之狀予未識君而於貳守則在湖時已聞其賢矣況其情也懇其辭也哀能無言乎按狀君諱璟別號璞庵瑶光其字也其先浙之富陽人永樂中曽祖原舉明經起任泥水教諭愛其風土遂家焉以伯子銓貴贈兵部職方主事其仲子鈍以鄉舉任大名教授是為君祖父浩入貲受服樂善好施卓為鄉望娶於何而生君君性沈篤坦夷不設畛域蚤嵗即能文典顯平易如其為人長游邑庠力學漸進文加明贍而體制如初司徒藁城石公時為縣令每季考輒重品鑒曰有若人而不登高科者乎八試汴闈始克舉既卒業太學歸家食者數年母病亟侍湯藥踰月衣不解帶比卒極哀毁制中不與外事惟後學請益則口授手畫亹亹無倦故殊才而多成時貳守方十餘嵗君見其敏也尤加磨礪恒以布帛菽粟為文理當然召立膝前面為筆削痛懲雕琢浮靡之習至於持身尤嚴喻警要其功自求放心始俾謹志之不忘蓋三試禮闈始就即墨之選即墨濵海窮邑逋稅動踰數年君下車惻然念之量為品第有力者督之先輸力薄者寛焉期㑹校督或施鞭朴流涕臨之是以民有佛子之稱所乗肩輿當承足處鐵系絶令代之以繩曰是無失足已矣焉用鐵為邏卒送所獲盜至君憫其饑也先飼以食而後曲探其情或不矢鞭之數十然且泣曰傷哉非饑寒不至此稍涉疑直遣之去即不可貸亦惟拘繫以聽自斃居三年積勞成疾郡守謂其太寛君知不合遂懇請於監司以歸既歸若脫重負而超然物外者家山後有小圃雜植花竹親友過從飲而忘情往往大醉前疾加劇焉至常再劇而醫不可為矣先卒念父在家不得面訣恍惚中呼不絶聲者三日其愛親之篤如此卒為嘉靖甲申二月三十日距其生成化庚寅某月日享年五十有五配談氏有内助之道子三長即萬言次萬里次萬方女三長適鄉貢士宋官次適雒守情次適季瀛孫男三守忠守愚守恕女孫四其長者聘於同邑李氏餘皆幼葬以又明年三月十八日墓在邑金泉鄉之陽銘曰世宦之族賔興以官政行即墨體歸于寛君子知仁于是乎觀賦歸未㡬而遽蓋棺謂天難諶繼有衣冠我銘葬君九原其安乎莫貞母茹氏墓誌銘母吾友莫君水亭之妻也生十九年歸水亭越十二年水亭病卒母寡居四十一年年七十乃卒初寡時其舅澄心翁没七年矣嫡姑金安人在堂少姑黄從之叔氏南沙君方同堂居先奉金安人命以其仲子同為水亭後母於是守節撫同稱未亡人閨門若公府其心古井水如也晩喜佛齋稱其澹素其卒也自妣氏以下無不哭且誄者是故謂之貞而繫以母君子之志也母節應著令人謂同方舉進士宜需封典故未及舉而今已矣君子有遺望焉母姓茹氏諱珍如世居無錫惠山之南曰山南茹氏宣徳間曰思蘭者生仲美有鄉望其子明徳游庠序久學行有聞累舉未第而卒母之考也其配為雲林族裔倪氏生二女而母為仲母幼時明徳翁讀書恒坐之側至堯典釐降召南樛木必反覆說示大義稍長習女紅仍㸃校小學使讀之母性既淑又習聞禮訓比歸水亭澄心翁已末疾矣金安人亦病羸臥母左右視湯藥唯謹二老皆賢之澄心翁卒水亭與其弟承家雖英邁振奮而性卞急外侮且至母承之以順屢有規諷既乃積勞成疾度不能起於是有立同之議嘗置同懷中謂母曰兒幸長與黄母相依居比卒母哀毁踰節金安人恐其病也乃迎倪母與處然竟以鬱故病痰發往往厲同幼多厄撫摩備至及就外傳退必程其功少懈則稱外祖之勤以勗之此外無所事事媵婢之使棗脩之問亦不輕至婚姻家金安人卒後諸子各有室食指多至不能給或勸母與叔氏析産母曰吾嗣子賢否未可知産無庸析同以正徳癸酉舉于鄉母泣謂之曰汝父有後矣吾復何恨然去此一步非吾所也汝即有禄吾豈能汝從邪蓋自初寡至是臥起一室日躬紡績以率媵媪間則取書以觀食每數月不肉衣或數年有澣無易若為戒然者同請少變則曰為汝費且違吾性何居嫁時衣吾尚有之第華美非吾宜耳其勤約明達如此同應鄉試者三㑹試者五卒業南雍者兩越嵗途裝舘費皆紀綱自母男女小大尺帛寸絲無不手出至於果核菜茹必儲以需曰同未有禄叔晩年持家不節能無累乎節令若生辰傷感却賀平居即有喜怒而無嬉詈水亭亡逺榻枕猶設如生媵侍逮年皆善嫁之姻黨告乏寧自損弗靳同既下丙戌第序及銓矣忽心動而疑之㑹術者云喪應不出嵗乃兼程歸母尚無恙見同至喜惟幸失意後不致疾再稱是以慰而已長至且近以家人闕冬衣材夜猶治布勞觸故疾加劇臥而彊藥顧同曰吾不能見汝為官矣二孫何在當令讀書遂不復言越宿而絶母嘗生一女不育同娶吾姨弟封戸部主事楊元正女有孫男二人長啓陶聘華氏其次曰啓陳女孫一人許嫁華復初母卒為丙戌十一月十三日同請于叔父即以其年十二月二十四日啓水亭兆合焉墓在龍山馬家灣之原即澄心翁塋次也先數日南沙以同請銘水亭與吾同學契誼之篤猶南沙也今其妻之葬有不銘銘非吾而誰哉乃以同所述茹之世及母内行序而銘之水亭諱潛字如起水亭其所自號也莫之世在澄心翁表誌水亭行在予所為傳銘曰三十而寡七十而終從容以貞教子成功有妻如此有顯者子于嗟水亭不謂殀死從弟婦王仲姬墓誌銘仲姬氏王吾從弟國臣之妻也其先世以神保顯于宋季于勝國揚靈江湖間至賜提㸃稱號入國朝猶著正統間有舉進士為州二守者而神道衰矣蓋族望於沙頭者二百年仲姬父溥娶華氏生五女姬行為仲相攸得國臣二十年來歸事其舅西園翁及姑過安人得婦道甚西園豪逸好客仲姬奉以周旋往往先意曲致蓋三十年不衰時世業漸落田租所入僅僅自給仲姬或脫簮珥以益之中更兩喪相國臣襄事惟治國臣五十病痰仲姬醫禱交致驚憂恍忽朝不虞夕耳失聰者久之凡國臣起居飲食必躬戒僕侍守閉戸牖候進几杖舟輿出入尤勤計慮凡家事一一代理白而行之有田在南郭課僮奴力耕節豐預歉無甚匱乏國臣殆忘其為病也先是國臣壯未有子仲姬憂之國臣以世規重置側室有媵侍二三人仲姬日夕命視寢亹亹去世之妬者逺甚及四十始請父命以其弟國政子烈後焉烈夭乃及其弟熈教愛兼至不啻所生人不知為繼也視諸子勲熊尤篤宗婣内外禮以飾情義以制恩而出之以信無弗敬且愛者嘉靖四年二月二十有七日病痰暴卒年六十有二國臣號慟仆地再絶再蘇久之猶初喪也論者謂國臣伉儷能以共和始終越明年十月十有一日辛酉國臣以熙葬仲姬于南塘九里舖之新阡熙聘太學生秦坤靜夫女靜夫今致仕應天府通判國瞻之子也國瞻國臣皆王氏壻也婚是以議將葬國臣請銘乃據勲所為狀序而銘之國臣名珠其曽大父存朴公為吾曽大父存一公之從兄存朴生靜庵靜庵生西園西園諱濂字惟澄過安人則吾先妣太淑人之再從妹也國政名璣銘曰上獲其姑下獲其夫而勤於後圖姑則終矣奈何先夫而徂于嗟乎夫夫之悲將無已夫錢府君近仁墓誌銘府君姓錢氏諱木別號尚朴近仁其字也按其家乗系出吳越忠獻王佐三傳至諱進者由嘉興徙無錫之湖頭又六傳至國良再徙今垂慶鄉之馬橋曽祖曰友聞祖曰孟昭父曰澤字民膏娶于吕而生近仁幼穎敏長魁梧莊黙於世故多了了每讀書得大意輒以時事證之往往出師授外父異之曰兒如此必昌吾家鄉人器重之者無間於其父之言未冠出應門戸無上下小大畫一井井父以事繫郡獄期年乃白歸值疫家衆皆罹焉府君獨力周旋以濟與庶弟桓友愛如幼時當析産欲悉讓舊居而別為卜築父喜而從之父没庶弟者亦死葬畢撫孤姪不啻弟之存也事老母尤極其力時饑飽寒燠如于其身嘗榻臥堂左率僮僕備旦夕呼召蓋二十年如一嵗姊妹有垂老若寡居者恒迎致於家以悦母心故母享遐壽知者稱之治家最名有法凡圃荒垣圮器用敝壞其修飭也必預而序家衆男女外事耕耘内事織維皆有程課等其勞逸而賞罰有差既諭而退無不意服家以日昌大夫士有過焉者皆即事而嘆賞之比其再裕也則治園圃為池沼亭館求奇石名木樹焉購書畫以實之親賢樂善其情藹如也時貧族有稱貸償不盡者輒弛焉隣若佃亦如之念恤老弱久而成規子長量授之業三年而徵其成於是長子昌期以例入太學而近仁病矣昌期辭不敢行近仁促之行亟領部牒以歸歸見近仁喜而忘其疾久之手一編授之凡家事當行與否人可用不可用皆在焉曰以是治家他日呼其少子曰吾有言已告而兄矣言之之一月卒實丙戌七月二十一日蓋病而徙正寢麾婦女不得近者已月餘矣距其生成化丁酉十二月十日得年五十先是有司屢有勸分令君輒輸貲如數而終辭冠帶至是以士服歛配鄒繼過皆先卒今繼者阮子男三人長即昌期次昌邦次昌國一女嫁俞粲孫男五璠璧瑾璘琮女五墓在其鄉新涇祖隴之東原葬以其年十二月六日與過氏合兆鄉葬之二月昌期奉其師鴻臚丞錢君元抑狀介吾姻友談文英來請銘元抑之言曰吾與近仁講族好久情雖甚篤然不敢重誣故人以欺君子也幸卒賜之銘予自為童子往來於吾尊姑之夫景婁翁所蓋嘗聞近仁祖父之名矣今念昌期意勤遂諾而銘焉銘曰以令入貲而不受官士服以歛没也則安為家有規允稱世族新涇之原鬱哉喬木殷令人張氏墓誌銘信豐訓導殷時衡之妻張令人之葬也先期時衡介薛襄甫氏來以銘請令人吾祖母皇贈淑人楊氏之從甥也且予於殷氏有世誼遂諾而為之其詞曰張氏之先自泰遷錫世以醫名士望奕奕止齋深造為學者師遺書在篋玉亭繼之玉亭配楊素庵之女是生令人性合内矩言徳既備功容亦修中閨孔密聲從風流殷有美材雲溪之子方伯曽孫佐名衡字世姻且邇稔知令人乃託媒氏六禮序陳笄字來歸為婦為介孝敬自持益勤不懈室盈和氣庭絶間言姑失疾痿祖忘病癎喪哀葬治薦祀腆潔課婢治生昕夕毖劼分序戚疏禮應凶吉舘闢于南鄰廓于西貲自室出用廣厥棲衡君曰賢雲翁曰孝不出中閨事歸意料雲翁病亟君試應天令人馳報兼程東旋躬聴遺言視歛與含向非令人將無遺憾君貢于廷分教􅓺宫驅馳嶺北邑曰信豐子旦孩提曰庶猶嫡抱持逺行我意何極告君我留為君鞠兒君安教事無以家為子疹阽危躬抱臥起兒幸得生令人痡矣病起倉卒醫如之何訃達君所有淚滂沱君南曰歸君心孔悲有殯在室雖痛曷追是嵗壬午嘉靖初改距其始生成化丁亥六數壬丁五十六載子旦秀敏今十一齡聘女於談為大邑甥有女子三壻皆士人孟恩氏吳仲穉氏陳季曰秦瀚有冠有紳越嵗丙戌葬柯山墓月曰壬辰日曰甲午旦衰絰杖君以臨穴母子夫妻率道不越我為作銘曰維君故薶之幽堂以告千古張母劉孺人墓銘代姑養姑復躬姑養良人罔愆亦厥攸相維恩之褒之乃維子訓之尚後有徵哉我銘以葬戸部郎中錢君墓銘有崇兹邱湖山之塢藏焉者誰曰仲恩甫維仲恩甫志古孝忠夙則耿耿翼翼其恭進不忘親載疏載陳既歸乃慰曰非我身退不忘國而憂而色奮其往如曰非我力死有遺念國邪家邪我懐仲恩湖天無涯國子生鄒光懋墓銘道鄉逺矣南山在前松石之畔士服翩翩誦書執禮文采爛焉既入太學師尊友賢舎升既上次乃及銓亨衢伊邇而年胡弗延吁嗟乎天孝子秦君墓銘有淑乃門里風以敦維厥兄考訓是攸存維文有苑叶孰委不源世則尚矣淮海之孫江西布政司左㕘政白君墓銘驟其翰如曰千里駒中蹶于衢乃行徐徐既稅乃車力則有餘謂是虛譽其孰不虚華文輔墓銘有菀者林堠陽之野盛極而分尚多秀者或翹而竦或叢而蟠陽蘗隂柯衡從萬端宫室車船下至什器苟中斧尋工師不棄我銘文輔曷是之陳國稱喬木我思古人莫母龔氏墓銘子之學也母教之勤子之仕也母教之共吾子之觀而知其母之功維養未終昊天無窮是維子之衷陳母都節婦墓銘士有苦節亦有艱貞誰謂婦徳不以是成徳成而終良人其從懋哉邦家教子之功鄒天恩妻華氏墓銘母病兮女歸女不歸兮母心悲女不歸兮吁其死矣母之悲兮曷維其已誄有兄兮葬有夫子錢母王太宜人墓銘耋老加封維母之禄乃三哭婦四為子哭子仲歸養卒也溘先孝哉慈也胡為乎天葉母應氏墓銘葬維其從祭以子豐敦孝起共自里若郡不惟其宗于嗟乎孺人之風旌表孝子養恬秦公墓銘孝皇詔服憲祖旌門一念之孝兩朝之恩方伯有弟貞靖有子允乎恬哉鄉評如史大耋之年嗣復多賢君子觀公可以知天懷徳陳君墓銘天下賢師陳慈谿氏再世諸孫亦稱鄉士有子廷揚名進于鄉簮纓繼繼世澤孔長澤之長矣有父有子我銘不誣鄉評如史兵部員外郎莫公繼室何安人墓銘命服在躬抱節以終上無負矣安人之封下見君子如故相從孰曰未旌已樹之風我銘幽宫張宜人徐氏墓銘於繼畊乎善養於祁州乎善相於濮州乎善讓讓之正以成其子相之共以成其夫養之厚以成其舅姑吁嗟宜人其婦人之模也夫白淑人楊氏墓銘宗稽于古曰漢太尉家望于今曰明太傅淑女令妻式承恩數匪文之䕃而進以武我作銘詩則維賢故嗟嗟兹邱其永無斁叶賀府君墓銘賀自慶改漢侍中純避清河諱厯世相因給事尚書允中在宋姑蘇丹陽望逺益重厥緒繩繩府君是承隂徳在我訓子以經我識其子乃銘其父千載兹邱有治無斁馬室人黄氏墓銘賈繼司馬同出於過曷賈不復馬恩則多黄繼馬室育且蕃碩中道而亡心賈未釋我銘於斯復蓋有時九原茫茫知乎不知思約鄒君墓銘良士瞿瞿兮艾猶好脩旬我賡吟兮月從我逰數日不見而死兮成千秋嗟良士兮我銘兹邱鄒夀母惠孺人墓銘母以夀稱維徳之成亦惟家之慶叶繼今繩繩惟母徳是承維曽維𤣥至于雲仍維我銘是徵鴻臚寺通事華君世宣墓銘絶域之使漢重其人不使而擯其難也均君有使才於擯乎試茫茫島夷使有餘地乃孝乃弟本之則深復有獨行如王少林一命未霑年不盈艾我銘葬君申之以慨萊州守秋雲談公墓銘維徳為澤如春空雲孰閼其施而俾不均公雲能密公雲能同其所不能雲尚之風微雨而虹秋容滿林為儀為章雲兮何心龍山之陽雲有真宅時止時行與化無極承事郎楊君元平墓銘力田孝弟在漢有科君生其時當如之何入貲助邊不補郎選今非漢制君曷自見天巧溢發㳺戲之餘藝哉藝哉君屑自居歸從先人官繫之義我銘兹邱以白君志容春堂續集巻十六
