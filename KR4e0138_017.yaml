body:
  text: 容春堂前集卷十七明邵寶撰志銘十五首明故浙江布政使司右參政楊君墓志銘正德丁卯十一月某日浙江右參政楊君以疾卒于官先是豫往視疾君強起坐呻吟中猶及國事豫謂君志尚未衰即為延醫吳中醫至而君卒烏乎悲哉越數日其子江等來自山西將奉其喪歸遂以楊杭州溫甫狀來請銘豫自𢎞治甲寅識君户部迄今十餘年相知為深今又與聞君殯事銘其能辭君諱竒字秀夫姓楊氏別號松坡山西潞州白林人也其先自平定州徙今居几若干世矣以畜蕃息號萬羊楊氏髙祖雲曾祖源祖潔繼業而隱至其父能以鄉進士選武昌同知擢東昌知府母宜人牛氏君頴敏絶人十歲能文有老成語長老稱為竒童弱冠名起諸生間成化庚子中鄉舉髙第録有刻文明年辛丑得進士授户部河南清吏司主事簡使犒軍于獨石督鹽于長蘆受芻于京場選緡于內帑廉公平簡後先一軌戊申𢎞治改元君應詔上裕國安民疏未幾奉敕處置居庸紫荆諸邊關軍餉君上疏極言足食足兵之法在端澄本源有侵貴近語道聞繼母趙宜人喪即日奔歸繼丁東昌公憂壬子起復為福建司主事癸丑進四川司員外郎有淮揚督漕九江造舟河南視災之使具建聲迹甲寅進陜西司郎中時甘肅弗靖君奉敕整督軍餉將行上疏言邊備七事上嘉納之至則今太宰許公以都御史撫其地與君同事許公素器君於是益重焉事竣還朝有白金文綺之賜大司徒周公以君才任劇調雲南司尋以薦擢守嘉興改夔州夔在四川地僻民厖君為書諭之俾敦孝友尚禮義延問父老民所苦與所利即罷行之月朔視學進弟子問業有師道焉人士咸慕至作生祠民飲江水以逺汲為艱君議鑿井出郡門數尺即得美泉民以君姓目之居五年擢兩浙鹽運使剔弊講利方有績效前太宰馬公以浙事簡改君兩淮君以浙治之升鹽賦五十餘萬崇墉固藏人無虞焉明年擢參政講畫經理將有施設而乃止是知者重惜之君性孝事繼母如母軒坦爽朗不妄笑語政暇輒讀書晚好史漢及韓栁文且以課子君面白如玉軀幹魁偉鬚眉秀麗君子謂君才略於是為稱君卒距其生為春秋五十有幾配王氏封宜人側室李氏有男子五人長江次潛溉澍沂女一適貢士澤州裴爵孫男二夔鳳墓在某村之原其葬之日為卒之明年某月甲子銘曰事以才濟其充在氣氣正則宏宜廣厥施公庸弗地公享弗年可知者人不可者天忠言在朝惠政在野西餉東鹺罔不效者君纊將屬其氣勃如將為雲噓將為雨濡公有孫子君慶萃止公終弗終其發伊始周徵君墓志銘月窗周君以醫士被徵居京師二年將有官竟託疾去去若干年病卒其子敷等寓絅菴李君狀來乞銘謂君治命銘必屬知者故及寶君自壯嵗業醫三吳人抱疾求拯者舟輿僕馬行隨止候無虛時蓋不啻有權位者君無問富貧疏戚惟以急緩為先後窮日夜冒寒與暑應之賢者孤窮者尤加之意視疾可否輒見喜憂衆所難易君或反之已而果然所至不暇授藥惟片紙書方畀之及其愈也不校其報即報之視其力有受不受顧或周恤其食飲以為常及君被徵寶方舉進士與君比館始公卿大夫聞君名爭延致之觀其貌朴聽其言質若不為異者及見其治疾多自出意見參以古法效者十九於是皆折節下君君應人之求如在其鄉贈以金帛輒辭辭弗獲則買書以歸嘗語人曰病不能死生藥不能生死吾盡吾心耳聞者益重之此皆寶所親見君所謂知者寶誠是也烏可不銘君幼孤育於祖某臨終摩其頂謂曰吾家有世德殆發於爾爾長須仕不仕則為醫庶以及物我名爾濟廣比長以母老重違養絶意進取乃往學醫於甘露金孟昭氏金一見竒之妻以女且館焉君肆力諸經及劉張李朱四氏之學隱度類推折𠂻於經間得異書輒手録口誦之蓋既盡金之道而多自得又往質疑於吳中諸老諸老樂為之盡又從瘍疹婦人三科專者各得其傳於是其道大成論者謂有國初名醫之風凡遇疾必謂其人曰某專是某專是蓋歷致之既至率如君言其決死生有預言於二三年者衆始或疑終則心服君天性孝友念父弗逮養養母誠至母沒即謝諸求治病者曰吾親不能治而暇及它人乎越數年強之乃起伯兄老君亦老弟道不衰表外舅金氏之墓人謂君能用厚酬知焉平生義形色辭救患解紛惟恐不逮正統末王師捕閩冦道于錫吏方重斂君徑言于帥禁之民得不擾家惟先竈二祀餘悉斥去對客亹亹談不少倦間有吟咏耻作新巧嘗曰不本性情句雖工非詩也晚復故居作春和堂於右偏中庋經史數千卷日事讎校復斟酌古今驗方為書若干卷以授其子君卒弔而哭者若干人君諱紘以祖所命名為字後以字行自號月窗其先家金陵十三世祖湛宋戎州通判六傳至國子學正亢學正子泰德祐間嘗糾衆抗元兵恆慕嶽武穆李中節文信國之為人故以其姓名三子曰思文者君髙祖也始遷晉陵懷德鄉元季避兵遷錫梅李鄉曾祖恭甫倜儻自好與張尚書籌王學士達逰此君祖所謂世德者祖仲端父惟慶母許氏君生洪熙乙已四月甲子卒𢎞治丁已五月甲子享春秋七十有三配金氏先卒子四人敷敔牧其一人先卒曰斆孫男六騂驎龐驌騋驊女五墓在上福鄉九里之原與金合兆葬越卒之二年己未某月某日銘曰活人以醫奚異於政志尚義從且官乃病鄉人望歸都人願留彼有政者能若是不君功在人報在孫子何所求君君藏在此莫母金孺人墓碣銘并序𢎞治己未寶在京師聞莫母金孺人之喪既寓詞以奠之越明年庚申寶以提學之命侍母還錫則孺人已葬而墓銘出矣其子止復屬銘其墓前之碣烏乎碣可不銘也孺人之行不可不述也凡孺人氏諱里世及其行之詳具載張黎平志其大而合於古人足以勵俗者宜特著焉始孺人之在室也嘗讀女誡諸書能通其義及其聲畫然未嘗舉筆以書曰非我事也既歸於莫相澄心翁事姑顧孺人愛敬兼至時翁與伯仲同居娣娣姒姒孺人屬由以誠色不獨承意不獨致及異門户或議所養孺人曰我事也獨奉以居顧疾痿興居須人孺人任焉雖汚褻不敢託媵婢顧沒禮以飾情鄉人善翁必及孺人翁英邁曠達多置古圖器孺人不以為費招致賔客日滿座不以為濫餽遺諸姻友家遍嵗繼不以為繁於是資少裕乃建祠堂置師孰章采日進翁治其外孺人理其內二婚三嫁備物協儀又撫孤姪甥男女婚嫁皆得其所凡內外藥病者衣寒者食餓者棺殮者墓葬者各若干人孺人與力焉翁憂嗣孺人憂甚勸之妾妾有子越三月孺人亦子子即止賢而有文人謂仁厚之報教子為學恆以向上規䇿聞有老儒先生必令親近曰是固有益一日子侍醫入頭容太俯比醫退召謂之曰頭不可太俯後乃不太俯其嚴如此事至咨翁翁亡語其子必舉翁庭誡命師其意為之烏乎古人以無非無儀為婦人之德夫豈惡夫儀哉有儀而以自放中饋之外少一預焉乃厲之階固不若無儀之為愈耳若孺人者可謂有儀矣而閨門之行施及里閭又不止無非而已者此寶所以謂不可不述也寶幼學于陳俞二先生與孺人之子同業知孺人為詳敢述其大孺人子二曰潛庶出長止三月先十三年卒銘曰詩咏樛木孺人以之學而弗藝孝敬自持爰相其夫先民是師相而弗專曰職在斯職斯德斯墓道有碑質哉我詞王府君妻韓氏墓志銘韓氏諱某户部員外郎濟之祖母也王韓皆永平灤州人韓歸于王為府君配諱曰顯字彥明以父叔死綏例𨽻戎邳州又以詔占河間籍河間之王自府君始而韓實相之其始有家曰我其用儉食不兼味衣不重色裁製屬紩不委人酒醢肴核雖精潔無殄羡餘以需緩急及稍裕曰惠可施矣賑窮恤匱視力所能內外小大獲濟者甚衆既而曰家以法立身率子女僮婢時作則作時息則息下至犬豕雞鶩馬驢狸狌類皆置之所乳孳滿前不亂羣行又曰有家矣有子孫矣烏可無教於是濟方丱角力課之學無晝夜無寒暑助勤警惰必躬必悉於季也亦然性純誠寡言笑不揣摩為欺亦不喜誦佛嘗遭子喪家衆疑喪禮曰惟稱勿陋勿侈勿遺議而已其大識類此晚病畏惑先由哭夫過毁甫愈而有子之慟遂弗能復常一人侍左右栗栗終日然骨血臟氣皆無恙牙止脫一髮半白間生黑者人謂之夀徵蓋自始病越若干年𢎞治戊午正月某日乃卒得夀九十七未卒也鄰代之禱既卒也鄉相之哀君子以為無愧古賢婦云一子某先卒孫男二長即濟丁未進士其次曰某女三人歸勾升吳明樊景昭曾孫四體乾崇復中泰充豫女二受徐玠郝元進聘濟聞訃承重將以某月某日葬于郡西南三里鐵燈竿水裔與府君合兆乃持主事劉君用熙狀介郎中王君廷玉須銘銘曰一婦為德隆其門孰畀之夀天攸存子不及葬葬者孫在今則見後則聞惟兹水裔惟其墳有石志逺無庸文崔道器墓志銘道器諱文崔其氏道器其字世為許之臨潁人父慶娶于徐生道器幼孤力學在諸生中以節義自許其為文奔放飛動不受繩墨𢎞治壬子領河南鄉舉第一三試禮部連得乙榜當授學職皆辭不就奉母氏卒業太學居嵗餘母忽思歸道器將以疾請行未果其子進辰乃先歸焉道器憂思發病而卒卒之日為己未十二月癸卯年止四十惜哉道器娶楊氏子三進辰其長次進卯進未女一於是囊無一錢老母寡婦相對慟哭其友人編修賈鳴和太學生馬全卿邢文祥王潤夫輩具衣棺斂之進士河隂許本謙以其喪歸臨潁之某原葬焉嵗庚申某月某日豫昔守許道器於豫嘗有講學之雅痛其亡感其友之義不能獨默也買石刻銘以附許內諸其墓銘曰盛氣偉詞縱橫以陳吾知其文亦知其人有志未酬而遽殞其身烏乎天叶哉黃宜人方氏墓志銘户部員外郎黃君顒既受誥封其母方氏為宜人未幾宜人以疾卒其父封員外郎廷立翁寓書報顒時顒來自歸省才期月執書大慟曰養未豐夀未極命也病不獲侍死不獲斂何子之能為於是哀毁不能起起而圖所以葬者謂銘為重乃奉刑部主事鄭君汝華狀屬寶銘寶與顒同官知其凝重介特允如汝華之論而大受久要尤獨許焉則其母之葬也可不銘哉按狀宜人方氏世為莆人其祖某其父某其母朱氏其歸于黃配廷立名某其子男一人即顒由進士纍今官娶某氏女一人適林珙其孫男女各二人其封始為安人繼以詔恩進今號其夀七十有八其生永樂癸卯七月甲子其卒𢎞治已未九月甲子其葬庚申月曰某甲子日曰某甲子其墓在某山之原其行在銘銘曰詩稱窈窕宜人有之內言弗聞外事弗知奢麗同流於我淡而用父事舅用母事姑兄弟娣姒賔友其夫儉以處貧允為家法曰祀曰燕則罔有乏有子克教以孝以忠人利其祿我愧其封言誨簡申益懋始終宜人之功惟兹為盛其德謂何曰惟孝敬知德者稱知功者録我銘于幽為百世告喬母陳氏墓志銘喬母陳氏順天宛平人年若干入樂平喬氏佐路宜人事職方公能以時飢渴進食飲涼溫製裘衣又善候晨朝為職方公起居節以不憂宜人宜人以同生視之生鴻臚主簿宜又生容遂亞宜人為喬氏母職方父工部侍郎公為先朝大臣職方當蔭以既貴止則屬宜人子貢士宗宗弟考功郎中字時皆以業進士止乃以屬鴻臚故母常訓飭鴻臚從二兄學且曰汝有官者二兄所遺也事之不可不謹職方公卒于官母從宜人率諸孤以其喪歸樂平葬之越若干年宜人繼卒既葬貢士以舉考功以官偕至京師未幾鴻臚亦需次喬之門户盡屬于母容佐之而已而施報無失禮而間範無失度蓋若丈夫之為者鴻臚入寺初母一來視之忽念諸塋暨田廬容一人或不勝亟督鴻臚為治歸具貢士考功交留皆不聽竟歸歸一年年五十而舊疾風眩大作遂不復起𢎞治戊午正月某日也鴻臚得報請以某年月日葬母于樂平某之原從職方公兆後若干步禮也貢士以寶為考功同年進士屬宜請銘銘曰賢而銘有子而銘烏乎來者庶其有徵乎明故江西按察司經歷姚君墓志銘𢎞治癸亥十一月十四日江西按察司經歷姚君以疾卒於官祿不足以具凡斂事撫巡以下諸公有憫而賻之者乃克成斂先是其子臣將歸應試適君疾未果今奉喪歸以君治命寓書請銘而吾僚任公特為緘致意蓋為之速之豫昨在贑聞君沒也既重悲悼讀臣之書銘其能已哉君諱衡字平夫姚其姓松江華亭人髙祖端以樂善曾祖太亨以好義人到于今稱之祖世傑父瓊行各類其祖鄉有評焉瓊配吳氏生君君生而俊特補邑庠生勤苦勵學凡幾試應天始得舉又五不利禮部乃授今官平生重廉耻一參謁取豫必審為貢士時有故人李某以御史左遷丞其邑見其涼於資也謀為之助君謝不可及在官七年妻子數口莫能給每貸粟於同官同官某諷君稍通君謝不能憲長陸公欲以君言補吏君謝不敢後羅周二公繼長憲每論及君未嘗不稱賢也巡撫都憲韓公以微眚逮君留嶺北者數月君還無怨言且稱韓厚德不置烏乎今士大夫受知於人方深德之一論議稍不合退輒詆訾若積仇然聞君之風可以少愧矣君恂恂雅飭言若不能出口至論人賢否事是非顧無少爽使假之年由是起守一州佐一府當有可觀者而僅止此惜哉君卒之日凡在官者皆哀之為詩而弔之者若干人君夀五十一配嚴氏子男二長魁次即臣方業進士有才志女五曹恕丁文華二庠生及張瑚其壻也最少者未行孫男二曰莘曰磻女一墓在邑界溪之原其葬為卒之明年某月某日云銘曰行已有耻君其謂矣衆方譸張嘗獨喟矣謂我祿馨穢贈賄矣銘而可傳君不愧矣秦一誠夀藏銘有序一誠先生秦君邦哲年未及老而自為墓之志復屬其友邵某曰某無德恐後人重誣我故自志之敢假銘于執事以信吾志某與其達且共也乃問其所曰錫之西南有山靣湖曰某山左曰某山右曰某山吾祖葬於是吾父葬於是吾亦將於是終焉問何以營曰坎足容槨槨足容棺封之四尺如是而已問何以表曰吾以太學久次例請一官將安表哉雖然君命也請書曰明從仕郎徐州判官秦某之墓問何以志曰志吾始吾始生之年則正統丙辰也其月甲子其日甲子始入學則某年也始升太學則某年也始注選籍則某年也始授從仕之命則某年也其月日皆有之不必詳乃若吾世其先開封人也宋學士少遊之子湛紹聖間通判常州乃籍武進新塘鄉是為譜始通判七傳至諱瑞五徙于錫之胡埭是為族始又九傳至曾祖諱彥和徙邑城鳯光橋是為宗始祖諱子成甥于王氏因徙沙頭生先君諱景輝配李氏於是而有我焉是為吾始吾終未可知可知者四男三女先室馮出者男為儀偉侃伸偉舉于鄉伸縣學生女歸同邑惠思恭武進徐朝瑞繼室焦一女歸陸德孫男五坦坤堅城培孫女五長歸華黼吾所知者止此或徼福於吾祖父有延且大者非吾敢知也某曰君之自志云爾雖然君有隱行請并志之君謝不欲某乃為之銘君名勵邦哲其字一誠其齋名人因稱之云銘曰神凝志定靜以伺命命之修邪吾水吾丘吾其逰邪逰不有息止吾斯極豈吾則然先民有言自古在昔薑母鄭氏墓志銘薑母以母稱有子芳也芳之父曰某教芳有法母實佐之芳以𢎞治乙卯鄉魁丙辰會試乙榜授廬陵縣學教諭迎母養焉越七年癸亥某月某日卒芳奉其喪歸蘭溪將以某年某月某日葬某山之原道經南昌衰絰門辭而去且屬其友南昌府學訓導董遵乞豫為銘芳歸復屬其從兄僉憲仁夫以書再請比至廬陵問芳于諸生咸曰芳介特有局斆學弗怠言必稱母母喜亦喜母愠亦愠可謂能孝烏乎吾固謂芳賢也觀于芳可以知母矣先是芳嘗被閩藩校文之聘有以貨求關節者逺抵芳舍自童僕以上皆有賄芳白于母執而法之當是時母縱不動于利或少矜其懇必不聽芳若是毅且奮也非賢而能之乎豫方圖上芳行遽聞芳之戚也念無以慰芳者輒書其大而繫之銘若其幽隱之德遵固能文當別為書之母諱某姓鄭氏金華人曾祖某祖某父某母某氏生十七年歸于薑逮事于舅姑舅為徽州府經歷贈某州知州諱某姑曰贈宜人某氏母夀八十有幾子男五人芳其第三也女一人孫男若干人銘曰齊宗周屬耦嘉而育誨子逮祿夀有為歌喪有為哭銘母于幽為人母告潘母范氏墓志銘范為錢塘世家宋西臺御史劾賈似道貶瓊州後歸隱不受元聘世稱藥莊先生諱景文者母之五世祖也藥莊子起之為無錫州學教授卒葬鄧莊因家焉起之子曰致用元湖廣行省都事子景年娶呂氏生母諱宜字秉義愛而擇配久之歸潘時覲為繼室時覲諱贄號尚古系出榮陽自宋徽猷閣待制栻始居無錫世以儒醫名至時覲父松丘翁士望益振翁配俞氏為户部尚書漙之女有家教內政甚嚴母入門時松丘已歿事俞甚謹俞嘗病母日夕左右雖浣滌必躬俞曰婦能是吾可不藥也俞歿相尚古行喪禮愛元配余所遺二女如已出有媵李以同生處之未幾尚古卒子緒生十年矣母以節義自誓力勤針薾以易粟布衣敝食粗撙節支持內外姻黨吉凶無失禮既而教緒攻醫既知指要復謂曰醫不通儒伎耳乃命師鄉先生習古文詞檢篋中得遺書數百卷手畀之每夜績課讀煢煢燈火間形影相依閭里談之緒方弱冠聲名隱起邑大姓聘孰師者歸焉束修之入足以供嵗母益率以儉節且為經紀最晚有田百畝又復其故廬君子謂是皆母力也為作辟纑之詩一時和者凡若干人七十至八十縉紳兩致慶為詩又若干篇𢎞治乙丑上登極推恩養老有絹綿米肉之賜是年十二月四日忽遘疾卒遺命殮葬母用僧道母生永樂丁酉三月十六日年二十四歸潘氏孀居五十二年凡為夀八十有九子男一即緒娶吳氏繼姚氏女三嫁彭雲沖周永年陳尚文孫男三針邑庠生娶沈氏簡娶周氏符娶秦氏曽孫男二穆稷女一母之卒也豫還自江西緒以墓銘為屬今葬有期緘致莫君如山所為狀來遂次第其事而為之銘墓在邑西龍山祖塋之次葬為卒之又明年丁卯二月十日銘曰為莊之後代興聞人亦有令淑為潘氏嬪時當孤貧功在訓子辟纑數章是詩維史子也孔材有斆朋來良人弗逮母心懷哉髙年賜帛如歸我禭葬母有銘請以紀歲貢士唐君墓志銘今年春正月吾寮友萬僉憲世和請豫銘其妻之父曰貢士唐君者之墓蓋君自成化戊子北行卒於宿遷遂葬其地𢎞治甲寅世和始以其柩歸藤成葬焉而銘尚缺是故為請初君年十七以天順壬午舉廣西鄉試甲申丙戌再落禮部戊子之行將赴已丑試也有同貢士蒼梧劉棨者與偕君之病也實寓宿遷醫者王某家臨終泣謂劉曰吾死無子誰返吾骨者劉力窘莫知所出時其邑沈某始發解過家聞而往弔謂劉曰唐某不幸死道路請以朋友之義於我殯乃共買棺葬之學傍蔡氏西圃於是君之室陀氏生女才二嵗越若干年乃適世和為繼室世和辛卯貢士也少君二年嘗識君每與士夫道君卒時事則歎曰吾舅葬而未成當於我歸當是時劉以進士令于閩倅于海南舉藤人莫可問者擬過宿遷問諸沈沈以進士纍官僉憲方在滇南亦莫可問既而世和舉進士則沈歸矣過而問焉曰固在是然必詢王某乃審其遊于外又莫可問也又若干年世和為御史南京考績過之問如它日蔡氏走告其處王某曰信世和設奠拜哭啓而函之以行至藤卜地曰谷原封樹如法君子謂君於是乎瞑君諱英字德輝唐其氏世居藤之禢洲其父曰漢文富甲于鄉君幼有敏聲始舉時某郡守蒼梧陀君超見而竒之故陀歸于君君生正統丙寅五月五日年止二十三卒戊子十二月其日失之葬亦失日久故也銘而納諸墓為今年乙丑銘曰征凶之罹殯者其友孰歸君喪于二紀後有女得士為名御史或徵斯銘詎謂無子太安人李氏墓志銘太安人李氏九江劉守璣之母也𢎞治壬戌十二月某甲子卒于家越明年正月某甲子訃至九江九江即日去郡伻來以書告曰璣不孝母卒弗及斂將及葬焉先生知我敢以銘請惟地逺請莫能再也謹伺于境幸即圖之於是豫方視學瑞州瑞州九江舊治郡也其僚吏師生聞母之喪莫不為九江哀之其請于豫者其懇如九江之請之也九江之賢斯亦足徵已某昔與九江同官户部知其貞純端重可進諸古君子比來守瑞而豫適蒞兹又見其有盜不忍戕之化蓋嘗推賢其母矣生吾賢之沒吾宜銘之故不復辭九江每為豫言吾母歸吾先人逮事吾曾祖母趙孺人以能養稱嘗歸寧見新物輒不食曰吾太姑未嘗也吾外祖母張淑人別具而餽之以為常趙孺人嗜韭葅雖冬月必夙戒弗缺其它稱是事吾祖母任孺人如曽祖母在諸婦間未嘗自多至諸卑幼恆掩其過其有隱言知其能容也亦密吐之蚤聞吾外祖都運府君以古詩教子輒記不忘及璣能誦猶口授陶淵明責子數篇其靜專如此性惡奢靡衣至數浣平居出不踰閨逰不及庭晚受封命始與內外諸母旬月為會命服而與鄉人榮之璣初為縣嘗迎至曲沃未幾語璣曰養有汝兄在汝力而官遂歸歸若干年而吾先人卒家政及焉今屢迎之不復能至矣九江時在户部雖以缺養為恨然尚兾其年未艾也而今有是九江其能為懷哉母諱某世為咸寧人其父長蘆都運同知諱真其配封户部主事諱某生幾子存者二曰某曰璣璣舉辛丑進士知曲沃縣擢户部主事員外郎至今官太安人之命主事時恩也孫男幾人女幾母生永樂辛丑夀若干其葬也合户部兆墓在某地其日為卒之幾年幾月某甲子銘曰德吾修之命用休之史將收之非古莊惠吾其孰逑之哉傅母俞氏壙銘有序吾邵有為傅母三世者曰俞氏邑之開原鄉人少侍吾祖母楊安人歸吾祖三益府君府君處之側室凡二十一年府君卒又八年安人卒乃與吾母過太宜人居又四十三年年八十三以老疾卒于冉涇里第蓋自成化甲辰寶舉進士授許州知州九遷至副都御史總督漕事出入中外凡二十六年母以吾室顧宜人奉過太宜人就養上下大小罔不宜之優之以稱曰母云楊安人既生吾父贈知州府君母承命保抱有傅之道安人卒時母才三十餘或以無子勸之再適母謝焉曰有而人在蓋謂某也於是寶幼弱孤苦衆方危之莫不謂母失計母不為變母平居寡言笑在閨門中端靜專確大義所在它人力爭弗得母從容一語怨妬為釋即遇凶悍竟莫敢犯初寶為諸生母被粗茹淡若將終身及寶既貴有祿矣母猶不改其素其它雖殊禮若固有也君子謂母類嘗學問者母始傳吾父繼則寶及亡妹珍奴繼則吾女嫁華珉吳憲及許秦汶者三人蓋其恩如古慈母而三世焉者古亦希矣故其歿也吾母暨吾室哭之慟族姻內外下至童僕無不悲泣者先是母在淮安漕府嘗疾病寶方朝京師比歸母喜病少差至是始瞑烏乎母不負吾卲氏寶也方恨無以報母而今者致仕之命乃成吾故山臨穴之願顧非天哉母卒為正德五年四月一日越十二日葬惠山聽松菴竹園西北去先墓二百步過太宜人以銘命寶寶三益府君之冢孫也稱母者若為吾父言之從尊也其曰傅蓋取諸子師之義云銘曰慈母如母母實近之三世一心為貞婦師義尊其生禮隆其死墓焉春秋厥亦有人於此王淑人楊氏墓志銘有僕者致其主王童子節言若曰節先祖都憲府君暨先父中書君繼以沒節也幼惟吾祖母淑人實鞠以生今淑人卒且葬節未習於禮我叔祖揮使君謂宜有銘公辱世交節也弱不能赴門下敢託某以請言訖跽進揮使君書繼出陳禮部子引所為狀豫讀而悲之既而揮使君來請如前先是都憲公之葬寶弔諸其墓時中舍衰絰從事今其母淑人卒而中舍亡矣有遺孤為喪主而銘焉是屬能無述乎按狀淑人姓楊氏世為無錫人贈都察院右副都御史元振其曾祖也父理以義授承事郎娶龔氏生淑人長歸武進王氏為南京吏部尚書文肅公之冢婦其配諱沂字希曽由成化乙未進士歷禮部主事員外郎郎中擢山東參政布政使至都察院右副都御史巡撫畿內真定諸郡故淑人初封安人再進宜人至今號淑人之初歸也文肅公在留都都憲公自家以饋不愆厥時淑人實相之及都憲公官京師淑人不以逺廢問每文肅公入朝將迎承體甚悉文肅公曰婦哉婦哉中朝稱孝焉文肅公夫人吳生都憲公十年而沒繼夫人孫鞠視都憲公甚恩淑人相都憲公事之孝敬兼至人並賢之都憲公性介確在官恆以不韙是懼凡朝謁夙興淑人必先晝則戒童僕鑰門唯謹俟退食乃啓其在藩也亦然淑人生子升將冠而殤側室子忭即中書也淑人親教以成後季室有子淑人日撫抱不置及都憲公例當廕子淑人曰忭既以祖廕小子何敢當昔先公嘗以姑氏之言廕從子矣君能繼先公之志乎都憲公乃上疏請録揮使君子文炳為太學生後都憲公卒於真定淑人以喪歸故事撫屬及所過郡縣率有賻淑人皆謝不受曰君生也以不賄聞死吾忍忘之中舍自京師奔喪逾淮而及淑人戒襄事以禮有家事曰問吾子及中舍沒則曰問吾叔氏御家衆嚴食指逾百庭無間言平居無華飾重味至宗姻戚黨有困者樂施不靳也淑人卒以正德辛未十二月十八日距其生正統戊辰四月二十三日年六十有四子二升既殤未及娶次即忭娶楊知縣溢女次祥炳聘楊文朗女女一適張廷瑋孫男二長即童子節聘華氏䇿亦聘華女五陸宏道黃萬善張喬張愈其壻也都憲公敕葬在郡城南三橋之側至是合葬銘曰庶子是子謂敬其夫從子是子謂順其姑維恩與義終身是圖沒從中丞曰德不孤亶其然乎容春堂前集卷十七
