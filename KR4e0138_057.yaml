body:
  text: 容春堂别集卷二明邵寶撰古詩十四首贈劉用熙次白巖三首友道久寥落每嘆知音希伐木歌故在山蹊草離離吾昔游京國數公幸相依惠我以明德不啻食與衣尚論古之人未敢輕生譏劉公湖南彥元思更洞微瑤琴出故匣朱絃映星徽一唱僅三歎誰歟領其幾君志在纂述不見朱與緋紛紛競前進江湖固君宜彼庸不知君愛惜徒爾為君行視郡符謝病勤公移猶舉一二政闔郡懷威慈尺疏告天子揚帆指雲磯譬如善御者君其範我馳豫言指江水欺君有如斯我昔在東省君來語時時遠窮姚姒上微言折羣辭黃卷獨與對執筆分從違季通難書易夙為晦翁知豈知世途內嫫母憎西施君行督淮賦琴鶴相追隨著書數萬言鳶魚見潜飛别去願努力名山以為期他日唐一經作者非君誰江水日夜流春來兩涯滿君家釣磯邊直鈎自昏旦爭席者何人忘機不知譴登高望中原周道元坦坦啓蓍得明占山水互成蹇八音正諧和還愛磬立辨啇歌盡離騷反和誰子善虞陛垂衣裳孔庭進瑚璉青雲乃君宜野處無乃舛知音滿乾坤有力競推挽傷哉附勢繁尚矣言利罕衡門閉青春矻矻事修纂回思白巖詩同心利金斷我懷如白巖聞詩色堪赧我昨造君廬食飲方衎衎階除鳥雀鳴鹿也遊町疃天籟時一聲泠風動羣窽昔聞卧龍翁長嘯比樂管尚論三代下斯人實冠冕客從隆中來遺我書一卷與君共展之疾讀不可緩春氣日以深江漢日以遠贈處古有規勿憚吾侃侃笑指東山巔松枝正堪晚欵鶴鶴如避世人與世真落落道人如鶴心肯以鶴待鶴鶴賔我為主珍重一飲啄有粟唯恐粗有水唯恐濁吾吟鶴亦鳴吾舞鶴亦躍雖無語言交臆對知鶴樂不然徒粟水鶴兮在寥廓送張東白先生赴南京太常嵗癸亥學士張車白先生既終制于家有命即拜南京太常卿五月某日將浮大江而東某從藩臬諸君設祖江上賦詩為别其詩曰張公經綸資海內望所屬如雲夙從龍退復卧巖谷尋常都市中人擬丹崖玉靜觀極幽深渾噩書數屋清風動冠紳門生滿南服兩朝三大制承命入天祿椽筆追典謨名冠作者録三年未嘗淹一官不啻足先憂激深𠂻時騁江湖目琴髙獨聽音棊老傍觀局翻然讀禮餘有命領宗祝南都今鎬豐陵廟故祗肅公心對神明行哉副宸曯恭惟聖祖靈陟降在於穆百年禮與樂舊典行可復皇思任老成至治期從欲論道贊鴻猷舍公又焉卜寄黃肇慶長歌杜甫詩懷人渺雲樹悠哉兩地心乃不阻途路我於黃民曹深識離别趣民曹去多年江湖各烟霧憂懷對高旻實以天下故一官分計司未足云遭遇堂堂司徒堂建明蓋嘗屢觀其章奏間時出艱險句極力排權豪傾𠂻寫貞素濟時挾經綸談笑亦兹寓别來勞我心如水日東注昨聞祥琴調雲衢復將騖信州吳越衝我駕久停步所冀承清言慰我夙瞻顧汛掃玉山亭擬坐今宿度奈何消息稀令人益生慕我往君乃來一㑹真有數三復鵝湖書恨倚前軒柱邇得肇慶除報書道應誤勸君行勿遲南海方勤戍送李惟正秋氣驅炎歊長途向清凉有客别我去千里東南行叶客也試臺吏經綸乃中藏詔歸荷君賜慈母方在堂囊空無長物雜遝羅羣芳腰懸古時劒一拂萬丈光登山桂作屩涉水蘭為槳瞻依略東岱靡靡逾河梁挽之竟莫留欣然倒壷觴問客不我答興歌漫成章激昂露𠂻曲古意何悠揚餘音未斷絶起視高雲翔雲翔不能定目極秋天長我聞壯其意欲贈何所將珍重復珍重此意願勿忘都昌阻風用陳后山韻與諸生北風朝將東濛濛復江雨雲谷淡還濃匡廬渺何許水神本無心似為行人怒望望落星灣只尺不可渡左蠡懸孤崖古號險阻所猛夫縱當前焉用力扼虎憶當嵐光開詩景恣探取風雩寄晴峰㸃也吾與汝晦明固有時今昔異聞覩布泉水雙紳爐峰烟一縷船窗坐無聊令人邈懷古悠悠黃鶴樓遠思孰能禦寧辭酒杯寬更愛詩律冨江氛有恆占倚津問行賈冥冥白映空洞庭浸全楚南風一轉移至日堪指數諸生故多情侍我同笑語大哉天地間茫茫分散聚題詩記淹留知者書付與望廬山昔年登少室我眼凌北州邇來十年餘復作匡廬遊匡廬表南服盤據長江流望之百里外勢與雲俱浮五老未能辨懷仙入冥搜明朝杖碧玉飛上髙峰頭止酒和邃庵先生戒酒如障川豈不立可止但恐矯杜心變在太過裏無量垂明文萬古師孔子不可善學可聞詩為公喜維時月在寅嵗事從兹起誰云小大殊謹始同一理我方醉公醇乃辱謂知己來者公得之往者吾過矣在德不在酒公量日無涘答公述周書尚克羞饋祀用韻再答我方困於酒因君亦思止公心周誥前興在陶詩裏嘗觀復初爻端拜顏氏子所貴進我德寧顧俗憎喜但恐言語多口過從兹起聖賢本在人濁醪空妙理麴生雖可交終然不如已公能透此關不止自止矣如操有舵舟何患江無涘願勿逾此心恆若承大祀聞錢希翁訃海鶴奄以逝海天邈難招髙鳴尚我耳尋聲竟寥寥伊昔來鳴初居然破羣囂中鳴發天妙寡和多見嘲老心在萬里有林不成巢彩鳳雲冥冥青田草蕭蕭哀音天弗聞引吭徒為勞乃今蛻世紛復得返逍遙仙骨當不朽我銘瘞江臯奉寄東山先生一杖兩童子朝出及暮歸野服取自適不須製荷衣放鶴湖上山釣魚水中磯花開復鳴鳥相對各忘機衛河舟中河水日以縮河栁日以黃凛風吹杲日草上餘殘霜漕舟返從北牽挽何匆忙相逢問前路羣盜勢且張山東數千里何人不奔亡我師一當百直氣浮劍鋩萬全待時至左次非翺翔我筮遇坤乾方長欣初陽剝極行見復彼哉孰能當所嗟六合中真元化痍瘡欲哭復吞聲短歌不成章容春堂别集卷二
