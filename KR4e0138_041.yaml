body:
  text: 容春堂續集卷五明邵寳撰七言絶句百二十三首七言絶句得湛司成書甘泉一劄自金陵我正題詩寄兩僧詩到白沙難着語海天亭上望南鵬送劉介夫二首瘞卷邱邊秋草多兩知亭下客頻過故人三宿還辭去獨聽滄浪奈水何炎荒蜀道官途長何處風光不飽嘗鹿洞舊游時入夢煩君為我賦新堂贈馮廷伯看竹何湏問主人主人讀易已忘春一聲啼鳥山居静境似桃源不避秦寄山寺讀書諸友錫山南下舊僧居賢者今來借讀書門鑰自收橋板斷要教遊客笑人迂題畫三首南湖秋接洞庭波湖上閒人草結窩白晝清風足幽夢月明時復和漁歌待月東岡十載前曾教短許謂東廬和詩篇而今舊話休重論自倚秋光對海天藍水飛流界玉峯風聲寒落隔溪松道人細味悲秋句日落空江聞遠鐘題王元章梅巻五陵豪客梅華筆寫盡江南萬古春莫向尋常乞題品赤城山下有詩人寄天台友人天台峯下杖從容曽是江東五馬公若問兒童歌舞地敬亭山色畫圖中聞周用仁言襄甫作詩遣瘧詩以問之古聞詩句曽驅瘧石老今誇筆有神莫道幽明非一理若能驚鬼定驚人借觀楷木杖于成汝從詩以還之楷木天然理最端孔林千古挺高寒誰將規作扶衰杖合與周模一様看模木在周公墓上故云月中對菊口占二絶先是兩家僮種菊數本是夜又索於南鄰既至東鄰聞之繼送亦至即雨中往觀者也雨中曽向東鄰看月下南鄰又送來數本秋花千古興一尊須為故人開南鄰索菊東鄰送只欠江州酒榼來數月苦心三日賞一般清艶兩家開為俞實齋題畫予識實齋在吾外叔祖時亨府君之舘于今四十九年矣過我請題予烏得無情哉履齋畫裏實齋堂四十餘年故意長我識渭陽情更切西風岸藻不勝黄謝趙良伯送竹二首種竹無時亦漫談厭乾惡濕竟誰堪貞元兩字生生本何事山人不解參三十八竿真碧玉湘妃淚㸃尚斑斑冉涇東畔書臺上行見千年老鳯還答如山南沙亭上有書來安得新晴月滿臺賦罷豳詩對風雨江天漠漠鳥雙廻志喜答文玉用前韻彭蠡波平陽鳥來滕王依舊水中臺䖍州兵速神旗復安慶城堅賊艦廻文玉見月用前韻復之二首雨聲初静月光來知有高人獨上臺我亦夢遊天柱頂長歌風動綵雲廻桂花巖下月初來上盡層樓復上臺塔畔烟收星錯落城邊露下水縈廻忽聞㸃易臺泉出㸃易硃聞滴露研忽傳此地有原泉莫言一滴無多水㸃盡乾坤是盡年試曲水正月已盡二月來梅花半落杏初開山中新作蘭亭水明日同人試一盃王中書畫菊石庵畫竹妙古今菊也亦復鈎其深相逢莫認花顔靣同是歲寒君子心新泉雜詩六首瘞卷碑邊泉水生一泓環繞似多情文章本是乾坤秀光上星辰潤下行久旱驚看此地泉涓涓未便到山田野人不作爲霖夢為語隣僧莫浪傳山人愛泉泉出山泠泠聲在白雲間有情無情不湏問泉與山人心共閒清看滴滴松梢露静愛源源石罅泉滴滴休誇天上水源源湏識地中天上方得石石如臺下界泉從石竇來欲向中間斜作磴磴邊松樹任僧栽滴露泉邊聽玉聲萬峯無籟晝琤琤報時不用蓮花漏一息中涵萬古情秋日山中聽泉石縫汩汩池泠泠下池聲似上池聽天一生生今若此八峯雲霧一峯青陸全卿夜過錫代東二首公曾寄我惠山詩謂我憂時論自竒欲向歸舟更披寫五更寒卧不聞知回首羊腸謝險途歸來還自舊陳湖他年故有尋僧興何處青山酒一壺王中書為祖上人寫翻經圖松庵僧請題志感誰識翻經祖上人中書畫裏見來真當時客有先公在不見風儀獨愴神先公謂吾高伯祖履旋高祖履素二府君也與祖上人為方外交中書作畫其時哉其時哉後百卅年嘉靖改元二月七日識為馮廷伯題畫二首八極周流皆我神世間爭愛夢中春憑君莫向痴人說誰信無身是有身茫茫碧海上無天何處乘槎不是仙囬首漢廷千載矣令人却憶問津年謝王郡公送鹿書院初成路亦開呦呦鹿自郡堂來廿年却醒廬山夢春草還生㸃易臺月巖巖巖千仞江邊石海月髙時影在波有客吹簫非赤壁主人高興夜如何讀馮廷伯元始剰語三絶會當子午全無象子到中間一㸃生從此乾坤還日月此天先後自分明太極生人人㑹談但能知二不知三誰將拈出三中一還與濂溪老子叅纔怪多言言已多風來水面便生波不如跳出樊籠去獨和堯夫擊壤歌呉蜀勝遊西入岷嶓東到海長江萬里似銀河憑誰為問乗槎客天上人間樂柰何種蘭謝趙宜興九畹滋蘭自楚人草荒茅塞幾千春而今乞得山中種老眼看來種種真和丁仁夫夢中憶渙然亭三子從容侍一亭夜深燈火共談經因君却愧蒿庵意曽許春風㸃瑟聲喜鵲圖他年屢為占慈母母亦屢占遊子歸今日中庭無一事閒看風色亦依稀諼草圖百年日短子心長我為諼花愛此觴今日東湖圖畫裏綵衣春酒慶當場春日觀畫於成汝從宅龍眠獵騎雲湖菊筆底風神眼底稀春日石魚湖上雪坐憐清賞幾添衣錢元抑春日過訪用文内翰韻四首舊隱歸來已十年風波囘首幾推遷如聞野史新評在勇退人今又姓錢記得湖南節偶停曾將新政問朝廷草蔬解后衡山子相對琅函眼共青中年筆硯未曽荒新稿相將滿舊堂湖上行人時指㸃錢家村是鄭公鄉東風吹草正忻忻又向前庭迓故人一道清泉千挺竹與君還約看山春壽九十翁楊守愚天順年初仁壽堂宏治年中人瑞坊九十四年還此老仰看前輩益輝光仁壽堂者京師茹氏有翁年百四歲時英宗復辟賜髙年服聞翁名既賜之復命京兆燕之然後召見便殿仍命六卿往賀堂為是作人瑞坊者太倉毛翁年百歲時撫按諸公為之建也其孫文簡公澄以狀元位大宗伯翁亦受贈如其官云答王子春留别二首歲晩山林萬木空獨行長向老松東迂夫最愛寛閒地未肯尋源到水窮清静平生性所偏晩年經濟敢求全堯仁浩蕩元無界何處山林不是天醉石次韻太湖之南多秀峰湖船偶載過蓮蓉何當移至三峯下㕘我千年䨇古松戯贈秦國英君家竹林鄰我林隔牆共保歲寒心一畨雷雨籜龍起貽我數莖千萬金山中送春三絶三月中旬已送春薔薇架畔木香新能黄能紫非無色終與東風隔一塵留春不住送春歸多事楊花㸃客衣有興重來那用約青山白髪久忘機苦雨却憐新水漲喜晴還怪野花開野花徑畔春將去新水橋邊晩未回墨竹舊稍新葉緑毿毿四十分中已得三剛道清隂猶未遍徑邊時有客來㕘題竹枝壽鳯山司徒梅花道人寫竹枝湘江風動碧雲時一緘北為司徒壽如向初筵歌菉猗山僧惠燈誦昔人詩因次其韻静清深處許吾閒朝看雲來暮看還涇上再歌倪老句邵家亭子面西山聞管大夫祈晴之勤口占用致愛助却蓋褰裳走雨中風雷壇下露丹𠂻病夫少亦叨民社今日低頭欲拜公蘭畹尤翁以蘓巾為貺奉謝貽我蘇巾果姓蘇畹翁亦本舊相呼明朝戴我臨泉水更覺巾名似屬吾雨中與葉美春雨中客不到超然留待中秋看月圓一酌清泉數杯酒古衣冠坐對青天僧歌山中來往幾年年侍有雙僧不論禪我句僧歌還擊節隔林風葉送流泉咏梅花菊籬落秋芳本自華色香况復似梅花誤將栗里先生舘認作孤山處士家贈董道卿三絶舊時品士亭前客却到呉山獨慰予風月東湖佳興在一方青竹數行書校書幾度入廬峯題遍雲泉石畔松髙座只今塵滿壁夢中猶憶講時鐘迎飬東西有老親魚羮不負著書人百年道眼風山老留得門牆一脉春山中感事二首羽人鍊將衊忠賢神道猶能四百年到此術應隨數盡秪留清洌在山泉當時本藉忠賢重却為忠賢覺厲誣舊廟已空新廟静睢陽囘首隔江蕪為勳姪題元人詩畫前輩風流畫裏詩六人異代不同時清平一曲多春興只許金華太史知送陳嘉猷赴朱氏舘五里湖南御史家春星寒帶草堂斜太邱今在臯比席日與諸生泳聖涯山中看梅簡如山襄甫三首山中梅比城中早却為春寒也較遲多事鄰僧添轉語梅遲應待老夫詩牆角踈花兩樹香春風滋味已先嘗便教萬樹連山谷不似衝寒意更長觀梅出郭看燈還到處春風興獨關不識沙翁偕石老有無佳句及青山題畫鳯凰不至幾千秋儀羽胡然在石頭筆底是真還是幻定應清夢到西周留周文起宿齋中曉起有客宿宿春風中吾將作傳如倉公蓉湖藥室似董奉一色杏花千樹紅送黄司訓春江淥凈帶晴煙曉發蒼梧萬里船酒盡長亭賓客散有人極目楚南天觀滄浪吟卷正德己卯冬予遭逆瑾之難在東朝房聽旨三江毛先生過我論詩竟日乃去以滄浪卷欲觀未得為缺今日偶得之追念疇昔情見乎詞滄浪吟巻三江話助我論詩到日斜邏卒屢過賔客静不知門外有風沙與馬天常留别汪倫送我不如君君到嚴州路亦分莫道桃花潭水淺回頭還薄富春雲月正四日至山中曉出城門望九峯風光處處與人逢不知雪後春多少繡嶺庭前看種松與石泉我醉欲眠君且坐君如倦坐亦歸休明朝有意抱琴至歌我風梧滿院秋贈陸中書宏道玉貌星瞳近侍臣禮經讀罷謁楓宸蘇州巷口宫詹舘猶憶光風坐裏春約吴丁二友登超然堂遇雨不果五更風雨阻遊人樹杪重泉枉自新最愛南塘兩門客晩年於我獨情親壽知微子七十禪心僧臘共青山幾見游雲去復還縱是古希休便道静中已透百年關索松枝于楊正甫口占代柬每看燈市搭松枝清在燈光映月時石埠年年挑不盡今年剛得一篇詩次盧師陳感事一絶五月新堤築未成低田愁聽桔橰聲只因多却黄梅雨不是人間地不平問彭明府之疾兩月無聊謝簿書金莖露遠渴相如二泉病客尤踈懶只有題緘為起居畫鳯鳯凰不見已多年回首西康思杳然珍重錢郎移竹意庭前雨露是堯天畫蝶借得春風便作狂不知夢裏是蒙莊世間更有癡人在塗盡朱鉛竟日忙得蘭畹和章再用前韻畫裏巾曽見大蘇短簷高桶舊相呼直須喚醒千年夢赤壁舟中認故吾題畫二首半山臺殿倚秋空仙馭荒唐野樹紅興到孤舟更何處天留高閣惠泉東仙家樓閣海中桃麗日晴雲鶴羽高正是聖明開壽域八荒民物共甄陶廬山覽秀四詠慕蓮匡廬北有蓮花峯濂翁曽此留行蹤請君試論愛蓮說今日看花同不同懷鹿曽與觀山到此中西來雲影接南峯千年洞在無眠鹿却憶多情少鶴翁瞻龍石如龍卧也誰瞞道眼無從物外觀弔罷武侯雲滿澗西郊却怪雨來難尋栗菊花似與寄奴仇草外秋風傍古郵下馬不湏歌舊曲九原應重感行休米老拜石圖伊人一拜石逾高僕僕長勤笏與袍我亦低頭敬貞介焚香時復向巖嶅偶聞書香少愛新書楮墨香不辭書價借錢償坐來精舍還懷舊海鶴詩中萬巻堂予二十歲時海鶴寓予家嘗題先世畫有萬巻一堂邀我共之句鵞湖先生以閒居二絶見寄次韻奉答黄閣歸來鬢未華一緘今與故人誇呌巖東下江如練猶憶維舟傍荻花經綸收却不論功樓閣新成碧倚空讀罷黄庭時䇿杖還從野老賦魚蟲冬日山行與從者二僧肩輿乗興入山中晴愛西風帶北風指㸃聽松庵外路冬青樹老子初紅遊從俗客不如僧此語吾聞識者曽今日山中逢二子袈裟風引路登登壬申冬歸遇今太宰陸水村謂予曰公歸山行從以俗客不如僧也今思之信然陶節婦節婦史㕘將春之伯祖母也年二十一而寡能守節以撫夫之㓜弟襲世職指揮再傳至春進都指揮論者歸功焉節婦壽八十二嘗受貞婦之旌云靖江千里建高牙元是湖南老將家一髪千鈞傳壽地祖姑貞節已褒嘉以蜜术問南沙醫家白术重天台郡守曽將蜜浸來嚼罷不知香滿室桃花流水夢瑤臺山中雜詩一派泉分九竅流地中竅竅盡通幽行人到此腸堪斷不用松風滿月樓八年月㑹七人同山水之間一醉翁就裏園翁更竒絶每留餘興托恢公秋華十詠次如山木樨小山歌罷剰條柯漫道香多色未多千古廣寒真賞在滿天風露夜如何雞冠文裝簇簇向晨稠長送星光過孟陬縱是無聲報昏曉也應有色紀春秋玉簮湘妃髻畔有遺瓊却傍秋風草上生莫為投桃浪相報貞心須待月華明孩兒菊菊名非菊恨虚聞中有幽香為解紛采采秋風籬落畔獨嫌荒草欲教芸錦燈翹翹楚楚復茸茸每向無人覔處通野客不知蓮炬美曉行剛愛錦為容秋海棠離離秋草綴紅芳春睡初醒又晩粧不是嬌姿解愁絶人間人自有柔腸黄葵花到秋葵淺着黄有根還自保無傷野人寸赤能如此應託芹𠂻獻上方金錢子母錢成不用蚨朝朝庭下見金夫采來若也堪沽酒道上人人醉欲扶大蓼秋風夢逐楚江蘋誰向堦前幻此身最是九歌收不盡年年相對怨騷人鴈來紅中秋月下墮紅雲濯濯清波錦有紋剛道鴈來顔色好更堪江上日初曛書姚雪牕扇閒來何處獨幽尋牕對西峯雪正深萬巻三冬非浪語今人心即古人心贈惠訓術秋山甲子須臾信矣無人間元亦有蓬壺等閒悟得循環理坐倚高松看海枯為顧西津題畫太古小年山日長幽人夢醒坐焚香東津有客至未至亂石灘頭繫野航古琴為外舅題流水高山不在琴無聲那得有知音長松落落秋風裏吹盡凡縁剰此心容春堂續集巻五
