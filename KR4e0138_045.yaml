body:
  text: 容春堂續集卷九明邵寶撰雜著四十三首雜著題丁户部舉墜録始元德以督漕出豫聞其在儀真也喜曰儀真江船入漕之始也有事於是宜哉既兩月曰何久也未幾元德書來道復廢閘之故如所著客對者甚詳豫乃嘆曰甚哉元德之勤於事也劉晏所謂一水不通思荷鍤先往者元德有之夫水不利而後有閘閘不利而後有堰閘焉不如勿閘堰焉不如勿堰固夫人之情也吾嘗見夫閘堰並建其人必至於廢閘而任堰堰之利歸於群小違則口騰騰則人聽惑焉故也惑莫大於水之泄茍圖復焉非心目兩至議未有能定者然而處乎閘者不悉則此之舉顧若為彼之地舉置之不常厥亦有由也哉元德於是乎蓋得之他日至清江浦視其堰與閘於儀真同歟異歟必有所以辨而處之者病夫亦願聞焉題故人書劄卷丙戌歲五月酷熱再越旬未已某居侍養堂西偏靜坐對水石簋不敢有所事事偶檢舊篋得數十年以來所䝉于士夫君子簡劄凡數百通遂命表貼于壁周旋觀覽疇昔之誼惻然感之凡所規戒不敢不承所奬與者愧莫能當也既而命工裝束成卷分為四類凡若干軸蓋師尊官長為前輩行者若干人同年同官同事為輩行者若干人門生故吏為後輩行者若干人通家子弟鄉里晚進又若干人各以爵號字行標於卷首他日每至山中精舍則擕三數卷與鄰僧野老共觀之庶幾故人猶在目中無存亡離合今昔遠邇之間也不亦一快矣哉跋陸放翁詩卷豫讀放翁晨起詩至餘年亦自惜未忍付酒杯之句心蓋戚戚焉烏乎年不我與久矣有我與者尤當為年惜之不然惜年何為他日讀放翁傳亦云是卷為徐陶陸氏家藏今收者光遠跋先師西涯公石刻華山圖歌卷吾友夏如山既刻我文正公先生所書華山圖歌于石復自湖南以墨本來屬某志之未及志而其人持去江行遇盜失焉如山惜之甚則以石本來屬志如初始吾事先生見先生握管而運肘以揮也以為與知其妙也退見墨本輒易視之况石本乎今先生不可作矣墨本在天地間又亡其一矣於是乎始知石本之重也傳曰雖無老成人猶有典刑又曰禮失而求之野野而可求安得典刑如此歌之有石本乎某是以重歎之跋沈大理草書汝明吾祖母贈淑人楊氏之父尚朴公字也公嫡出惟吾祖母一人故擇而歸吾祖贈都御史三益府君其嫡出亦惟吾父贈都御史純和府君一人吾祖既卒吾父繼之越八年淑人亦棄孤孫追惟外氏之德世不能忘常以公之手澤無所於覩為恨近過公諸孫䝉乃得見沈雲間草書有稱公字者某烏得無情哉乞而藏諸時展焉以永吾思固亦吾之分也跋顔魯公帖此帖其魯公真蹟乎吾嘗見坐位帖石本其筆勢與此正類而起筆收筆處尤非超妙入神者不能到然宋以後名書家亦往往能搨之袁文清謂米海嶽臨坐位帖猛厲奇偉不能無失於魯公此帖於魯公乃加圓活清潤焉文清可起不知以為何如也吾友文蔚遠寄來觀焚香再拜連臨數紙書而歸之如其題首以俟君子跋尤氏世譜後吾嘗入五賢祠見遂初先生尤公之主為之起敬及觀邑志見遊來山有遂初之墓為之興歎今俸也持其世譜來謁得一讀之為之生感於乎族以譜傳世以人守尤之後能無意乎跋嶽峰卷觀藩省之嶽峯者當觀諸諫垣觀諌垣之嶽峯者當觀諸野寺野寺尚其志諫垣尚其言藩省尚其政政止於斯而已乎吾將通觀之跋潘氏所藏倪雲林畫潘松泉愈倪雲林之子之疾雲林寫梧竹草亭圖并題詩以贈之越四十年王中書友石見而賞焉謂其運意入妙品題識之餘追想不已前輩風流固如此哉繼芳松泉之𤣥孫也請志於豫繼芳徒知松泉之名以雲林之圖而重雲林之圖以友石之賞而重而不知豫之言未足為諸公輕重也汲汲於志無乃惑歟松泉妙於醫雲林高於隱友石賢於介其所以為重者固於是乎在跋碧山吟社詩卷碧山吟社吾邑之盛事也其地在慧山之麓若氷洞之前黃公澗之上陸子泉之右謂之名勝其時在成化之末𢎞治之初謂之全盛謂之承平其人皆一時隱君子為修敬秦翁景暘為竹石陸翁懋成為梅庵高翁惟清為遜庵陳翁天澤為杏軒黃翁公祿為聽玊楊翁叔理為絅庵李翁舜明為玊溪陳翁行之為北野施翁彥清為玊林潘翁繼芳謂之文雅謂之耆俊而秋林陳公進之歸自工部氷壑盛公時望歸自都臺中齊秦公廷韶歸自江藩亦時時一至不在常數其㑹則惟論詩詩成有燕肴核數盤飯一盂酒八九行而已於是三原王端毅公方在撫院亦聞風而願見焉其重如此蓋如是者若干年而修敬卒諸老相繼淪謝今存者惟繼芳一人能談其事聞者猶歆慕之欲繼之而莫能繼也蓋是時修敬素有鄉望且其為約甚嚴十人之外不參以俗客雖盛暑祁寒必各以其服至不䙝不散一㑹一詩必命題必具藁若為課然者夫是以能久而繼之難也今考其年絅庵八十有六修敬八十有五遜庵八十有三竹石八十有二梅庵七十有九杏軒七十有三聽玊七十有二玊溪六十有九北野六十有一皆可謂夀矣而玊林今年八十有二康强如六十七十者其壽尚未可量也此卷為繼芳所藏中亦有社外作者某於諸老皆及見之比方仕於朝未能操几杖以從焉所謂歆慕之者蓋甚於人人辛巳歲大司徒秦公被召過家訪我二泉書院嘗同至吟社徘徊久之今見此卷吾且老矣烏能無情哉於是乎識五賢遺像木刻跋正德辛巳某既刻先師文正公手書五賢事略於石其真蹟襲藏如故每一展閲輒嘆石刻之不能得其妙也越五年丙戌吾堂寢火真蹟遂毁幸存石刻不啻真蹟乃奉以藏諸家廟仍翻刻於木以便摸搨某病且衰矣追念舊德能無重感乎是歲日長至門人邵某焚香三肅識於容春精舍為劉鴻臚跋湛司成文卷甘泉先生以道德為師其在南雍謝絶應酬文字某衰病閒居見亦罕矣今於毅齊公處乃見所為家藏集序者從容乎大篇磊落乎大書毅齊何以得此於甘泉哉甘泉謂致多之難豫謂致多非難也致其所難致者是謂難耳其甘泉之文之謂乎三復起敬識而歸之恭書誥命碑隂國朝推恩之典所以體孝而旌賢勸功也一品上及曾祖二品三品及祖四品至七品及於父母雖著令攸存皆惟其人乃稱不然則歉不然則負有人心者宜於此焉自知之臣寶庸陋初以成化甲辰進士承乏許州知州越八年凡舉於撫按者十有一章始擢户部貟外郎視古循良邈不可望乃被誥贈我先臣溥為許州知州封臣母過氏為太宜人拜命以來周旋部署歷踐藩臬又越十有六年承乏都臺之佐總漕中邦方勉圖報稱未及數月內忤宄瑾久羈荐罰卒遣致仕家居瑾誅後起廢巡撫貴州尋遷户部侍郎又以詔恩贈我祖考臣鎬為右副都御史祖妣楊氏為淑人先臣加贈如祖而臣母加封太淑人於是臣以母病請終養既䝉皇上俞允且詔有司以禮存問㑹上三宫尊號進臣母太夫人服色顧臣之否德罔庸何以當此仰惟祖宗典法之隆孝廟恩禮之厚毅皇帝覃布之勤皇上眷顧之重臣以病子侍衰母既缺寸補復荷曲成履地戴天措躬無所孔子曰君使臣以禮臣事君以忠忠則未效而叨冒上施至于再三雖深愧懼如報稱何兹營太淑人壽藏成謹以再䝉誥詞刻之豐碑樹于神道與兹山永永無極臣不佞敢拜手稽首識于下方書張山先塋碣後自我七世祖容春府君之葬於張山也于今幾二百年矣天順以前我曾祖存一府君實任守視之責府君沒時寶生甫三歲又數年始聞於諸祖諸父一造而識焉比為諸生舉鄉試歲乃一省及登進士歷官中外曠不省者十餘年舊木伐於族人殆盡至領臬藩歸謁而傷之乃補植如故烏乎容春之澤遠矣冉涇之第既失而復張山之墓亦既荒而修寶雖不肖不敢不勉然已晚矣上視存一之志得無重愧乎歲己卯冬立石墓下以表神道追念先德泫然流涕於是乎書張山惠山之支峯也其勢南出至是而旋焉墓當旋處葬者凡六人為容春府君其妣錢氏為六世祖谷祥府君其妣張氏為六世叔祖谷禎府君為五世祖仲容府君蓋鄭太常雍言撰惠山阡記云書太淑人墓碣左方先都憲府君以士禮葬聽松北原之六十年嘉靖壬午冬十二月二日先母太淑人卒越明年癸未冬十月十日葬繡嶺之原去北原二百十有六步而間二垣先是三年卜壽藏於斯也實惟府君兆逼於鄰之故或議遷合以體魄既安弗敢從也爰遵太淑人治命以大夫禮棺而衣冠卜日告府君於北原奉迎以如繡嶺比葬合焉嶺首上右傳曰魂氣無不之也於彼乎祖於此乎配密邇周旋將自今乎神道之門題以府君而碣之題亦先焉逹太淑人之志也烏乎寶不孝豈得已哉知禮君子有罪我者其敢辭諸書陳靜齊新定周易古文音義後易有聖人之道四焉辭其一也而所以為辭者三曰文也音也義也義之不明而能談易者寡矣文而或誤則弗便於覽觀音而或訛則弗便於誦習覽觀誦習之弗便亦講義之纍也靜齊先生讀易而有自得之妙是以參伍考訂旁求諸家而定於獨見於文於音於義刋正近本一復於古非稽古精深大有造詣其何以與於此哉雖然有古人之目而后能知古之文有古人之耳而后能知古之音有古人之心而后能知古之義先生所望於今之學者至矣愚不敏雖老矣尚有假年之心焉敬覩新編能無躍然者乎書宛丘陳氏譜族之有譜猶國之有史郡邑之有志國有人焉而史重郡邑有人焉而志重族無人焉譜雖不作可也即作之亦奚以為重哉吾錫陳氏世儒也系出陳之宛丘居吾常者若干世矣在宋有寶章公照以死節稱在勝國有國史公顯曾以文學稱或以稱其孝皆天下士也入國朝以來若休休居士伯雨若靜庵尚簡遜庵天澤皆不求聞逹而教授鄉里蓋國士也下是群從皆敦詩習禮不失為鄉士以言乎族可以稱有人焉譜烏乎不作哉作之者誰曰伯雨既而續之者訓也豫愛其儒之克世足以為族重也讀其譜為書其端而歸之請太淑人貞節碑文於少傅守溪王公狀封太淑人吾母過氏無錫黃藻里人宋宗室徐王郡馬孟玊若干世孫隱德相承至於我外祖時明翁娶於周涇周氏而生吾母於女行為季慈惠溫良共儉詳雅年十九歸我先考贈奉直大夫許州知州加通議大夫都察院右副都御史純和府君諱溥字惟淵明年生寶又三年先君不幸病卒時吾母年二十二寶方三歲母保護惟謹既除喪諸父有利吾産者百方震凌將奪之節母不為變既而分産爭取金帛竒玩母獨取先曾祖存一府君手校先世遺書千餘卷昌言曰吾冢婦也此書當與吾兒讀之襲而庋之牀頂於是寶六歲母告吾祖母楊淑人禮聘吾妻今淑人顧然以愛故尚未令就外傅寶九歲始延里師七十三翁王先生俾授句讀繼遣從陳俞二先生受經學尋遊邑庠比寶二十一中應天鄉試試春官不利卒業太學凡數年間母鬻舊産暨諸服飾共給殆盡寶二十五得進士明年授許州知州迎母就養封太宜人歷升户部貟外郎郎中江西提學按察副使浙江按察使右布政使湖廣左布政使都察院右副都御史總督漕運領鎮淮安母自四十六至七十凡二十五年皆就養時寶以逆瑾屬劾平江不聽矯詔勒致仕家居越數月起巡撫貴州勉奉母以行至長沙有户部侍郎之召而還於是母年七十一病衰不能就養矣再疏請終養未許寶至京師數月又再請終養詔許省視抵家三月又請詔許侍養於是以詔例誥進今號又八年寶進南京禮部尚書疏辭逾年未報吏部以請得先帝俞㫖越三月今上即祚復詔起用疏辭許之且命有司以禮存問於是母年八十有一惟吾母太淑人貞心保孤壯老安節如一日例以先封未被旌典先是封太淑人之誥有矧豫風紀之臣上有貞節之母之語大哉皇言所以旌吾母宜無大於是者蓋嘗作奉詔侍養之堂於家稱誥詞而記之兹者仰荷殊典榮寵至極於誥詞有光焉擬請於有道君子作貞節母之碑刻之貞珉奉揚我聖天子之德意於家於邦永永無疆惟先生鄉邦先逹道德文章海內宗師如斯碑者不于公請而于誰哉某也朝夕母側不敢遠離而病艱起居只尺之書不腆之幣謹屬諸姻友華邦特詣山中舊第私於下執事者寶不敏誤辱執事與進久矣於是請也或者其無距乎敢布腹心謹狀不宣再請先考贈都御史府君神道碑銘於少師石齊楊公事狀先考諱溥字惟淵吾先祖三益府君之冢子也於吾曽祖存一府君為冢孫母楊氏生二十年而娶吾母今封太淑人過氏越三年以疾卒年二十三而已先君孝友謙慎從里師誦習孝經小學論孟諸書皆能通其大意以父祖在凡百家事未敢自遂觀其志者知為端人也其卒也鄉先生李舜明題其銘旌曰純和生今祠堂主用之時寶才三歲越十八年成化庚子寶舉于鄉又越三年甲辰寶得進士官許州知州先君誥贈如寶官階奉直大夫既寶纍擢户部員外郎郎中江西提學按察副使浙江按察使右布政使湖廣左布政使都察院右副都御史總督漕運致仕再起為户部侍郎先君以詔恩贈右副都御史階通議大夫及寶進今官既病而愈始得焚黃于廟惟生我之德昊天罔極童子無知音容笑語雖得之老母亦不能詳且切矣嗚呼痛哉昔在壬申某請養東歸嘗具事行以墓表之文請於下執事比䝉不棄賜之允諾繼以國事方殷不敢私瀆近託秦亞卿乘間申請承猶記憶用是敢致下忱倘䝉終念惠以神道碑銘永為泉壤之光不勝感幸之至其家世大略具太師李文正公容春精舍記及今大學士熊峰石公所撰先祖碑文今節録别楮惟并覽而少采焉存一府君嘗受學於周正言士衡先生得春秋之指諸經子史多所淹貫稱鄉先生故特舉之臨書無任悚息謹狀叙廬山景畫豫八九歲時從諸伯叔父謁墓聽松庵輒訪王中書所寓别室見所謂廬山畫壁者習聞歎羡之言而未見其妙比弱冠領鄉薦始知賞識而壁燬於火矣會試東歸有莫能再見之恨越二十年提學江西往來廬山下追憶畫壁如在夢中益重疇昔之感又十年以户侍請告歸臥病冉涇客以是圖見貽豫披玩之畫壁宛然不忍釋手烏乎中書之筆不可復見矣得見是圖亦可矣抑是圖作者不知何人意其在中書之前乎中書畫品妙一時見而愛之且欲求勝焉興致所到經營摸擬有不能己者耳不然何其峰巒林麓亭臺人物洪纎曲折無一不似也昔之人作事必有所本觀乎小可以知其大矣豫於是重有感焉遂志於下方或曰此盛子昭氏筆也叙竹茶罏洪武壬午春友石公以病目寓惠山聽松庵目愈圖廬山於秋濤軒壁其友潘克誠氏往觀之於是有竹工自湖州至庵僧性海與友石以古制命為茶罏友石有詩咏之一時諸名公繼作成卷永樂初性海住虎丘留以為克誠别蓋在潘氏者六十餘年成化間楊謨孟賢見而愛之撫玩不已潘之孫某者慨然曰此豈珍於昌黎之畫而吾獨不能歸諸好者乎乃以畀孟賢孟賢卒之三年秦方伯廷韶以郡守報政還自武昌遂為僧撰疏語白諸孟賢之兄孟敬取而歸焉吾聞諸吾母姨之夫東耕翁云形叙是山也為九龍第三峯昔人謂之繡嶺其發原蓋逺就其近而觀之首垂𤣥武而委脉於坤是謂金水行龍聳如流如凡三數起伏迤邐至丁北轉下行又三數起伏乃穴是謂丁山癸向左盻龍翔右顧虎伏兩峯夾澗流界左右然以金微且淺法宜即窩之弦而兆焉其堂則䄄敷席展衆山斯止諸水來㑹蓄瀦回抱其案則數峯麗秀若拱若獻近逺前列是非所謂內閉五行外藏八風者乎於斯焉兆唯世德君子乎宜山人熊鰲云筮述正德辛巳月建己酉日在癸亥某以王山長宗元筮太夫人壽藏於繡嶺之岡於是諸山人雜相者一年矣中岡有梔一樹爰以為凖筮其右若干步所遇既濟宗元曰不吉某曰墓欲久逺而以亂終可乎筮其左若干步所遇觀宗元曰是差勝某曰四隂逼陽幾於剝矣其愈幾何筮其左若干步所遇睽宗元曰睽離不可用也某曰此大事小事之吉其何可當之乃筮其右稍下若干步所遇需其辭曰有孚光亨貞吉利涉大川某曰止兆其在斯乎此吾先世之祉也太夫人之德也吾舍是何之焉且四占皆靜合於坤德需有俟之道焉於壽藏為稱神告我矣宗元曰然某遂再拜以奉筮辭叙筮己卯六月江西變起警及于江之南史以周易筮之遇觀之坤曰無咎客詰之對曰風行地上虛而有聲或將靡焉然巽木也坤土也時云秋矣木克於金實落材亡同復於土且有黃裳之象焉雖野戰皆血而土無分裂觀之坤亦坤之觀五君位也君位在德德曰好生一念動天而况於人乎故曰君子旡咎君子有不在位者上是也事無與焉咎將焉生故又曰君子旡咎叙萱萎事豫得告而歸植萱於容春軒前歲輒滋長至百餘本五六月間其花最盛觀者稱焉癸未春豫居太淑人憂見萱之初茁也戚然有人亡之嘆欲拔去之未果至四月之閠則枯死過半其未死者亦萎黃憔瘁不莖不蕊烏乎異哉其知豫心哉或曰久亢故耳數年間亢亦屢矣而未嘗死也且並植者不止此此以亢死他卉則謂之何有知無知重傷豫心欲歌而不能成音故筆之簡叙陳長史事天台陳完以鄉舉任涇縣教諭嘗與同寮及諸生分膳夫銀內一人多銀一錢已去矣既而少者來告完曰多在此遂封一錢與之其人曰多者在某人皆知之先生本不多今以與某某安敢受完曰吾實偶多汝若不受盍棄諸水乎遂棄諸涇縣官送百金來修學完詢其所由來知為贓罰遂却之其辭曰吾聖人有靈决不欲以此物修其宫况廟學亦不大壞不修可也卒返之於時士論咸服凡諸生家有訟不之有司但至明倫堂一白得完一言皆服而退後以風憲召擢國子博士終河南某府長史叙內承運庫進銀事𢎞治己未豫為户部廣西司郎中尚書太原周文端公以內庫缺珍珠請行廣東鎮巡官采取免差內臣仍擬於太倉庫進銀二十萬備買辦上從之豫以初主是議率主事六人送入左順門內庫人設木䦨稱閲太監龍壽視庫人從事焉事畢庫人出皆搜檢於欄口壽出亦如之至豫等六人出則不搜檢豫問諸庫人對曰此舊制也凡文官不搜檢豫退而語諸同官曰朝廷待文官至矣我輩而誣上行私黷於貨利者不亦自負以負朝廷哉帝王官家天下論古也有志二帝官天下三王家天下曷為謂之官也傳諸賢而不傳諸子也曷為謂之家也傳諸子而不傳諸賢也曷不謂之子天下乎有子則世焉無子則及焉要之不出乎家而已矣不必必歸諸子故也官天下者公於一世而不必於一家家天下者公於一家而不必於一身此二帝三王之道所以為盛也父沒子繼親受之命此事之常無庸論者乃若兄終弟及以兄道命之乎以君道命之也君道即父道也以君道命之則弟以臣道承之以父道命之則弟以子道承之而弟道固在其中矣以一身具三道焉曷為為之後而不遂為之子也昭昭穆穆有定分焉故也况為之後而子焉者為其嗣之絶也今也有萬世之廟則有萬世之祀其宗也固時享之其祧也亦歲祫之其為有後孰大於是而必為之子乎且君之及也必以嫡宗之繼也必以支以支而及非及也以嫡而繼非繼也是以宗法自諸侯别子始有之然則禮傳所謂諸侯及其太祖天子及其始祖之所自出者何也明其統之尊也故宗雖不及於天子諸侯而統不能不系之也夫是謂之正統夫既後正統矣則於所生何以不得顧也夫既後正統矣則正統在我以正統而復承小宗可乎然則名何為而不可易也孔子曰必也正名乎名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則民無所措手足是故名雖不可易而正統之尊固不可干也是故正統之祭之廟不敢與也正統之薦之祠不敢入也無已而為之别室側焉而不敢並也孟子曰諸侯之禮吾未學也况天子之禮乎是故名當稱則稱之道當隆則隆之分當嚴則嚴之禮也然則名之當稱固知之矣所謂道當隆則隆之者何居以伯父而有祖之道者也所謂分當嚴則嚴之者何居以伯父而有君之道者也然則何以隆之何以嚴之亦曰别嫌明微於廟庭饗祀之時敦孝起敬於宫闈省謁之際無所不用其誠而已矣論古今書劄古人書劄必自手出今之世始有代寫者非官冗則病不能執筆耳然因此二者遂因循以為常蓋惡勞好逸人之大情不甚相遠故也僕自為藩臬入臺省東歸而病不親翰墨者餘十年或以為俗或以為簡皆未得吾情獨以為懶者得之若吾同年徐興之每作一柬必用官印連作三數紙擇一紙用之計人得之必裝潢為卷為冊以傳不朽此其意與吾意又大相反吾老矣俗與簡豈可令人常加我哉喪畢之日亦將親㺯筆墨如古人故事但荒詞拙翰重識者之笑是又不能不自顧也溽暑坐齊中聊試此與知己商之珠璣兩弟字說珠照十二乘者魏人誇之君子以為弗四臣若也臣以亮治珠可無臣不可無謂臣為珠其天下之真珠矣是故珠字曰臣唐虞設璣以象天天之有政與人無異而恆垂以示人觀璣以協天璣之所在政之所在也是故璣字曰政於乎充為臣之節以叙群倫是亦為臣端為政之本以酬庶物是亦為政是故臣曰國臣政曰國政夫豈逺哉樂易說夫易何為者也夫易以言乎地則險之對也出乎易則入於險矣以言乎事則難之反也出乎易則入乎難矣吾聞君子務遠且大者而先難後獲夫易則何樂之有易曰乾以易知易知則可久可久則賢人之德中庸尚居易俟命孟子惡在易求難舍易不居而惟難之求吾恐日行乎險途非順受之正矣進退狼狽天下之遠且大者將曷從而求之哉况一意先難探賾從危用力于不可為之地而無從容自得之益如後獲何是故夫易君子居之然非知之則莫之能焉知而不樂猶未知也是故夫易君子樂之故曰知之者不如好之者好之者不如樂之者惟其樂之至是以居之安惟其居之安是以有所不存存之必專有所不行行之必果故曰親其親長其長而天下平此所謂逺且大者也所謂後獲者也吾姻弟秦君國和自號樂易其知此道矣或謂國和之先大父誥封武昌公自號修敬君子稱其得持身之道其先君詔旌孝子公自號養恬君子稱其得治心之道國和乃不是之務乎國和通經學古既有所得矣其於儒先所謂入道莫如敬養心莫善於寡欲者亦既聞且佩之矣其意必以為易雖非敬而易者敬之基易雖非恬而易者恬之地茍舍此不務而入乎險難則憧憧往來儳焉如不終日夫敬也雖欲修之烏得而修之左右維谷冰履淵涉憂虞且至夫恬也雖欲養之烏得而養之惟易也故靜靜則敬可修惟易也故安安則恬可養以是持身以是治心聖賢之典祖父之訓於是乎在是樂也以國和觀之蓋天下之至樂也故擇不處仁君子以為不智不居易者其謂之何或謂國和舉于鄉歌鹿鳴而貢于天子㑹天下士試于春官將登廷而奉大對以其所學被諸四海一舉不利至于再禮也再舉不利至于三禮也三舉不利至于不一舉而期必得焉亦禮也今自丁丑越庚辰癸未至今丙戌皆辭勸駕而不行何居前是問之則稱曰吾父耋矣今也問之則稱曰吾母之年猶吾父也而病且久矣彼天下之就試者夫獨無親乎故有謂之固者亦有謂之異者樂易者固如是乎雖然豫於是乎知國和之真能樂夫易矣夫有親而受子之養天下之逹道也矧乎耋老衰病如國和之父母者而可逺逰乎國和一身致用雖急而于親也朝不虞夕固不能須㬰離也若是而違衆獨留于家其跡似矯其行似勉而其道則出于易矣不然忍心强出萬冀一得而以榮親為辭縱得之冒險犯難不亦甚乎而况未必得乎而孰謂夫樂易者為之哉蓋豫嘗論國和者如此而未以語人今歲在乙酉國和初生丙戌之辰屇矣其子四人曰淮曰漳曰瀚曰涵者並逰庠序而學有聲焉者也兹欲稱觴以慶焉而問辭于豫豫謂之曰辭莫大於頌頌莫大於德德莫大於實實莫大於義義莫大乎辨請以吾所論者致之何如四子者再拜曰先生之言足以壽吾親矣又再拜奉簡請書以歸二雨辨邵子閔雨齊居偶聞王生言嘆知之晚也作二雨辨雲興於山勃然滿盈既藴而隆以雨者山雲之雨也謂之河雨雲興於海倐然彌漫既翕而盛以雨者海雲之雨也謂之潮雨海雲之雨乘風以行雷鳴則止山雲之雨挾雷以動風吹則散此其大凡也海雨夏少而秋多山雨夏多而秋少亦各宜之易是為變而無雷大矣天台王子春云避客對正德己卯寶幸及始生甲子有慶客至將避之客曰何哉子所以避者寶拜手曰寶所以避者有三太淑人在堂寶不敢言老不敢言老則不敢言慶一也凡慶始於子孫寶未有子太淑人方憂之舉觴之際能無動心乎且夫客皆愛寶者也慶畢而出必繼之以嘆嘆以終慶則如勿慶二也禮尚往來寶病軀不能與慶吊者七年矣受而不答可乎三也子以為何如客曰然客退遂書之簡以告他客對問建塔者錫山建塔或問邵子曰建塔可乎曰可或曰不建塔可乎曰可或曰子邑之望也塔建不建子皆曰可何居曰今之為建塔之說者曰大拜也曰大魁也以大拜則吾官近焉吾而曰建人將謂吾有大拜之望爾也以大魁則吾無子焉吾而曰不建人將謂吾無大魁之望吾是以皆無與焉或曰昔范文正公舍其南園以益學宫曰說者謂兹地當世出宰相與其私於一家不若公於一郡子獨無是心乎何見之小也曰范公何人也其心胸德量何如也其言固由𠂻也吾視范公殆不能為之執鞭獨於建塔則曰吾效范公得無自欺而欺人乎是以不敢也問者退遂書於冊對客語某居太淑人之喪有勸乞葬或乞祭不自乞請于郡縣撫巡可也者對曰何敢某居官無狀不必言言勞則副都御史左右侍郎兩任三品僅十有七月耳不應著令非令而乞若吾親何且某病不能起拜計闋服後即有任使必辭今歲乞恩明歲辭官在朋友且不可况君上乎此某所以不敢也勸者退輒書之對客閒談汴城相國寺宋故剎也今巋然靈光者惟佛殿九間甚巨且工有無木不雕無石不刻之稱故老傳聞宋以京師無他形勝特為此以觀逺人僧每對客輒言之豫在許時三有事於場屋皆寓寺中嘗戲謂同年許昌言曰此寺寂寥久矣惟以一殿驕人耳昌言笑謂此語甚奇又轉語客以資談謔吾惠山之泉本以清冽名天下今或欲邀貴客輒以飲泉為辭留連終日以長聲勢如謂吾邑徒以一泉媚人不亦可乎豫語山僧屢矣惜不能如昌言之領解耳雖然亦無使佳客聞之以重吾泉之纍也對唁者某衰病且老矣而乃罹此災變是天以警我抑以進吾德也德莫大於義利之辨辨莫先於辭受之際茍辭受以義而不以利視平生無改焉則吾德之進於是乎在若曰吾無室矣無衣服矣無器用矣不問可否至則受之不亦愧吾平生乎是天以成吾而吾自敗之也某雖衰病且老矣敢不自勵哉敢不自勵哉三月前吾無上事因暇而叙吾平生辭受之節作辭饋志是殆若有讖焉其藁尚存今録於左與愛我君子者觀之慕闕里言嗟乎闕里之不得謁也豈非平生之缺典哉初㑹試再北上以力弗贍固不必論抑有他日之望焉及舉進士領許州東歸省太淑人急未能往也比自户部出提學江西奉太淑人同行至濟上水溢壞舟又未能往及為都御史督漕朝京師當逆瑾用事時致仕東歸又未能往再起請歸養寇滿齊魯之間又未能往瞻望䝉嶧萬古之思於是乎切至今數年夢寐猶不忘也偶見黃巖鍾生言近與陳中丞文鳴謁闕里而還有餘感焉然老矣雖甚慊其可追乎觀泉雜言豫初得泉於海天亭後石壁之下略加浚焉視其窪日長一寸豫喜焉為長渠深池復竅其坎湍以節宣之意其源源不已也不知寸寸積之數日而滿滿而瀉之數刻遂盡渠絶池涸無所於繼既乃即其窪之上石稍平處鑿為圓穴徑三寸圍九寸深五寸於是其穴常盈如水精之在盤也烏乎昔之規近乎大受今之規近乎小知小而局則漏大而虛則荒舍小而圖大未有能副者也雖然盍亦求其源乎故曰涓涓不絶將成江河懲漏而戒荒吾於一物得二義焉擬命使存問儀注先期二日戒灑掃薰薌告於家廟戒司賔以寶一人祗承君命敬不在賓恐有踈慢故先期一日設香案于侍養之堂中設臣寶候立位於東階下拜位於中庭聽存問位於香案前設燕命使席於容春精舍本日早臣寶公服執笏候於門外命使將至出迓於里門東臣寶隨命物入敬視陳設畢退立於階位西向引贊導使者入從中階升堂立於香案東北西南向贊者從之通贊唱行存問禮引贊唱詣拜位導臣寶至通贊唱四拜引贊唱詣聽存問位導臣寶升自東階至引贊唱跪使者致詞曰聖天子以太淑人病體未安先生纍乞終養孝誠懇切有詔著有司以禮存問某等敬致兹休命臣寶敬對曰臣母老病臣乞終養何敢希天之寵今者欽䝉聖恩詔賜禮問臣母子不勝感戴之至引贊唱叩頭三叩頭畢引贊唱復位導臣寶自西階降至引贊唱詣拜位通贊唱四拜唱禮畢引贊導使者出臣寶隨送至門外拜叩頭使者不顧司賓邀入精舍臣寶入敬收禮物告於太淑人畢乃至精舍陪燕越明日熟其腥薦於家廟辛巳十一月二十日知府臣王教來致命用之二十一日知縣臣暢華來致命同三世傅母塜碣三世傅母孰謂謂先祖妣贈淑人楊氏之媵俞也何以稱乎三世也楊淑人既生吾先考贈都憲府君吾祖考贈都憲府君乃命俞傅之及先考娶吾先妣過太淑人寶生三年而孤太淑人請於楊淑人又以傅命俞及某冠有室顧淑人生二男三女以傅請於太淑人太淑人屬俞如楊淑人之故二男不幸繼殤三女有家皆方懋婦事俞蓋有功焉凡歷三世壽八十有四貞肅慈良一德終始無愧古所謂傅母者云是之稱爾母病於淮安漕府比某致仕奉而東歸卒於小寢踰月以葬於斯適當今卜太淑人壽藏隧道之左位置惟允俞葬正德庚午四月十二日某為之志越十有四年太淑人葬於是乎碣凡志所書者不書五世守僧廬碑永樂初我高伯祖伯完暨我高祖叔安二府君卜葬我五世祖試知州府君配馬宜人於惠山聽松庵之北原也庵僧普真及其徒懷祖實以地歸之既葬遂屬之守高祖而下昭穆叙葬至于今凡四世百三十餘年矣乃今卜我先妣太淑人之兆於庵益邇僧宗燁惠燈惠文歸地且守如先世故事惟昔以士今以大夫式廓益增歲事益殷乃以賻布之餘買田十畝歸之申勸勤事三人者於性海為七傳繼之者圓金方益圓覺其徒也田為直白金三十兩契皆有副與僧自今至於世世我後人無敢言取僧亦無敢言鬻其胥顧兹碑跋雲山别意圖卷右吾邑諸先輩為郡推姚景衡初貢時贈也蓋一時名勝皆在焉其諸孫希逺偶因莫如山言得於吳鷹揚所遂裝飾如故而請觀於豫時如山與潘繼芳皆在坐繼芳人言其字若别號以及履歷蓋不知者無幾相與仰嘆者久之烏乎一鄉之士作於先者盛矣其間有天下士乎是在尚論者寶晚進也仰止之餘輒書其末容春堂續集卷九
