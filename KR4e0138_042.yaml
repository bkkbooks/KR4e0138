body:
  text: 容春堂續集卷六明邵寶撰奏議五首奏議擬祀先儒狀欽差提督學校江西等處提刑按察司副使邵題為建言崇祀先儒事竊照先儒陳澔係江西南康府都昌縣人自其祖父世治禮經至澔尤力探索深有所得嘗著集說一書傳在學者我太宗文皇帝纂修大全特取其書與程頥朱熹蔡沈胡安國易書詩春秋傳義頒布天下列聖相承至我皇上經筵進講及教人取士亦皆用之若斯人者可謂有功於聖經矣顧以隱處山林名迹湮晦未䝉異典然鄉邦後進景仰風聲如承指授片言單詞互相傳録所居之地山名學堂至今稱之本縣官吏師生耆老人等既以鄉賢羣祠於學又别建祠堂一所專奉澔主其德行道誼孚被於人即是可見竊聞成化年間節該太常寺少卿兼翰林院侍讀學士劉定之建議謂澔釋經之功雖未敢擬程朱亦可以次胡蔡欲比何休賈逵范􅑔杜預等例請從祀先聖廟庭臣愚竊謂論澔釋經如學士劉定之之言品藻已當參之鄉評又如前所云者伏惟聖明在上中和建極制作方興朝野儒紳考究禮學仰禆盛治者在在有之秩澔之祀其於奬勵所係甚大如蒙皇上俯從臣言特勑禮部轉行府縣即今建祠堂賜以春秋二祭定其祝號品式以時舉行庶於聖明表章采擇之意愈有光輝而後學亦知所興起矣緣係建言崇祀先儒事理未敢擅便謹題請㫖會議狀欽差總督漕運都察院右副都御史臣邵為處置糧運事今將正德五年漕運應議事件開坐具題伏候勑旨計開一明賞罰以振漕綱臣等議得漕運為國重事軍兌民交繁劇渙散若非賞罰允當則漕綱不立徒勞無成但違誤交兌非軍機重情不過止照常例施行以此人不警畏體得江南州縣俱有糧長江北亦有大户各預期徴納未嘗後時中被貪懦掌印管糧官縱容私家收受輕齎經營花費直至五六月間方才買米又多插和沙水糠穀不肯在倉曬揚逼軍就船領兌途間經過三伏蒸浥腐爛包陪纍債違限問罪黜罷降級有司官員糧長大户安坐如故合無今後司府州縣秋糧照例十月開倉先將管糧官并糧長大戶職名報知漕運衙門次將收過在倉糧數申報如有違誤管糧官照例革去冠帶住俸戴罪完兌仍各拘的親家屬監併完日疏放甚者經該管糧官五品以下就便拿問四品以上具奏提問照見行事例發落糧長大戶如有前弊從重問治若㸃僉不公放富差貧罪坐正官至於運官俱要年裏及正月終畢集水次將已到官軍職名船糧數目開報有司閲實取印信公文執照各差人赴漕運衙門報知一面較斛開兌兌完開船仍每年於派糧時議將水程日數列為圖格給與各幫官收掌令其自到水次投文開倉較斛驗米曬揚交兌兌完起程過淮到京起糧及中途守風等項行至地方日填一格同原給幫帖赴部查考參究事完賫回漕運衙門銷繳無故違誤運官照例住俸問罪若有司交兌遲延將運官分豁罪歸有司以上罰典既已懲怠中間有司管糧等官亦有勤慎供職先期辦集者若不稍加甄别未免涇渭同流反為貪懦誤事者所笑將使人人解體無復奮勵之志合無自正德五年為始有司管糧等官若有年裏完糧在倉又係乾潔無弊軍船一到就行交兌者聽運官呈報漕運衙門行移彼處土司量為旌奬二年不誤者加禮舉行三年不誤者聽轉行吏部定議升用一審徵折以通漕法臣竊惟古者為賦量地遠近定其重輕今之折徵亦當略倣此意以為通融之計查得河南山東去京師為近民糧可以徴收本色起運京倉而歲撥薊州二十四萬石內將一十四萬石每石折銀六錢解納江西浙江湖廣等處去京師為遠可以徴收折色解赴薊州而交兌本色運赴京倉逺者載重近者賫輕揆之事情誠為未便今若將該運薊州折銀之數改撥江西湖廣等處每石加耗六斗六升兩尖該米一斗共米一石七斗六升量折銀八錢除六錢作正解赴薊州多餘二錢以一十四萬石計之共多銀二萬八千兩若遇災免支運可充一十八萬六千六百餘石腳價解送漕運衙門轉發淮安府官庫收候取用却將河南山東原派薊州折銀之數兌運本色赴京通二倉上納以補前數彼此便利一舉兩得誠為通融之道以後薊州倉若用本色仍照舊例派兌運納及查歲漕數內支運七十萬石遞年相襲改兌軍得耗資民免運費亦稱便利今若酌量每年將江西浙江二布政司改兌糧二十萬石每石加耗折銀七錢除五錢五分仍令漕運官軍解送户部轉送太倉交收外銀一錢五分充作腳價令軍於水次倉支運二十萬石則於歲額四百萬石之外折銀解京之數又添二十萬石且水次倉糧不致積腐而江湖漕卒少紓跋涉之勞一舉三得通融之道又在於斯以上二項就令空出軍船於本處支給行糧駕至支兌水次領運合無自正德五年定擬分派一防河患以逺漕慮據工部管閘兼管河道主事王寵呈依奉勘得黃河水勢自宏治七年修理之後向在清河口入淮宏治十八年北徙三百里至宿遷縣小口至正德三年又北徙三百里至徐州小浮橋正德四年六月又北徙一百二十里至沛縣飛雲橋俱入漕河因單豐二縣河窄水流漫溢將原築黃陵岡隄岸尚家東衝决三口共長二百二十步尚家西衝三口共長三百二十步溫家口衝决二百八十步喚家口衝决一百二十二步各丈尺不等致令曹單二縣軍民田廬多被淹沒豐縣城郭被水圍繞兩岸相對闊百餘里無法疏濬自六月以後其水隨消隨長諸口既被衝决若經魚臺縣塌場口入漕河則有利無害若經巨野陽穀二縣故道則濟寧安平運河難保無虞等因并畫圖呈繳到臣案照先該臣等以催儧糧運經臨直隸徐州地方因見小浮橋河汴合流處水已淺涸詢訪官吏人等皆云河道北徙沛縣南徙亳州查得山東兖州府曹單等縣地方原有賈魯故河一道西北自直隸東明縣黃陵岡等處南至哈只等口長一百二十餘里上通河南原武等縣古蹟黃河正統間河决滎陽經曹州等處衝决沙灣運河欽命大臣修治復其故道宏治五年復决黃陵岡等處直趨安平鎮奪汶入海運道被患蒙欽命內外大臣起倩軍民夫役將黃陵岡等處决口築塞繼於河北五里築一大隄長一百三十里兩邊密栽卧栁以固根基復於臨河築一小隄自黃陵岡起東南至單縣浮岡集長一百八十里障蔽大隄以防崩潰沿隄各立鋪舍僉㸃夫老巡視防守隨時修理實為逺慮數年之間居民獲安漕河寧順臣等愚見河既遷動竊慮昔年所築黃陵岡大小二隄水勢逼近萬一决潰非但害於居民而運道必將復受其患隨據曹縣備開揭帖如臣等所慮尤恐未的已經行仰本官親詣踏勘備呈如前臣等竊惟水性無恆而黃河遷徙尤難定據今既衝决如此所幸秋暮水消未成大患若非預為之防來年春夏水溢或有巨野陽穀之决患不可測合無轉行山東河南鎮巡并都布按三司各委能幹熟知水利官員前去黃河上源再行逐一踏勘要見河水此時果從何處流行勢將何往定議應疏應塞處所作急起倩軍民夫役趂此水消時月預期疏塞以杜將來之患其原設夫老人等嚴加戒飭日夜從事慎終如始不許因循怠玩致民曲防竊决以小妨大以私害公若或工程重大遽難措集興修明白會議奏處一議水次以定漕兌據遮洋把總運糧署都指揮僉事陸潮呈開奉到議單內該山東都司把總運糧署都指揮僉事李正呈山東遮洋兩總歲運山東河南兩布政司粟米共三十萬石例該小灘鎮水次交兌緣衛河來源微細全藉漳河相合運船始通宏治間漳河上流沙淤逼水别去漕運衙門奏行工部委官疏濬引水合流接濟運道近來仍復淤塞盤剝勞費旗軍受害蒙漕運衙門議得兩省納糧州縣俱係陸路轉輸艱難多於臨清糴米雇船裝回水次常被無藉之徒兜攬因而竊取插和况交兌之際正春初水淺運船不堪重載旋交旋般仍送臨清沿河寄囤候完通載北上往復耽延軍民俱不稱便合無自正德四年為始將山東河南原在小灘水次兌軍糧米通改臨清水次就令管倉主事監兌戶部會議照舊其河道行工部疏通開坐具題節奉聖㫖水次改兌准行一年如果便利再行議處欽此欽遵今歲值天亢旱小灘以南無水接濟雖費工力亦難疏通幸改臨清交兌船無淺阻委的便利但小灘鎮交兌年久居民開集互市又得包攬侵漁并賃地之利今輒改移不遂所欲或生異議而臨清係衝要地方弊因事起亦不能無伏乞議處永為定例等因到臣臣等看係原奉欽依再行議處事理合無定議應否因革施行一均加耗以一漕規據遮洋把總運糧署都指揮僉事陸潮呈據南京水軍左等衛運糧指揮等官唐輔等呈備旗軍梁道仙等狀告遮洋一總兌運山東河南本色糧米一十萬石赴薊州倉上納彼時舊倉近便運船不費盤剝又省車價每正糧一石止與耗米三斗兩尖其後倉移城內深入窵遠遇水淺涸運船止泊舊倉河下雇車入城原議耗米不勾腳價纍軍陪補且如本總與山東官軍同一水次彼則每石得耗米三斗一升兩尖赴京通二倉交納每石明加七升遮洋等官得三斗兩尖赴薊州倉交納每石却加八升少得一升多納一升併虧二升之數兩總程途以直沽分界山東運船到張家灣三百餘里上京陸路止六十里尚稱不敷遮洋船涉海盤河將及千里內多淺阻雇剝繁難及至舊倉又有陸路八十餘里加以帶運布花二十萬匹斤除包水旱腳價驗出不堪買陪折納兼要貼助本運改兌以致纍損疲憊苦不勝言且有司徴糧凡稱兌運止是一例未嘗分别遮洋耗少減派小民利歸糧里害纍貧軍等因到臣臣等議得兌糧加耗有等蓋為道途逺近所費不同是以多寡均足其用今遮洋官軍先因倉臨水次故比裏河少耗一升最為允當其後改倉入城陸路車腳所費過於京倉又加包陪帶運布花腳價并買補折納之數委的虧纍合無將遮洋官軍領兌山東河南二省糧米照依裏河官軍一例加耗二斗一升到倉交納亦照京通二倉明加七升一督辦料以嚴漕計據湖廣江西都司把總運糧都指揮等官史春楊鋭呈稱本總歲造淺船例該軍三民七出辦料價給軍成造民七料銀先年俱是本布政司隔年預派府州縣徴解本司收候官軍支領造船近年以來所司不遵舊規直待臨期分派各司府州縣出辦仍令官軍領文自去關取及到各州縣旋派里甲徴收快則守至次年三四月遲則五六月甚至二三年不得完給其軍三料銀衛所官員作弊僉撥貧難軍餘出辦拖缺難追或侵欺那移妄行破調尤為遲慢造船官軍恐誤裝運只得加利借債完造又據浙江都司把總運糧并督造委官署都指揮僉事張奎楊輅亦呈浙江布政司造船料銀往往過期如溫台金華等衛所正德三年冬該領料銀至次年六七月間方才給發致使缺船裝運遲誤交兌有司反稱軍船不到水次參行各該上司督責被其負纍據江南直隸把總運糧指揮郭冕呈鎮常二府并鎮江衛船料遞年遲誤又據管厰委官指揮王本等呈清江提舉司該造中都南京江北直隸三總運船例關領杭州蕪湖二處抽分木價蘇淮揚三府人匠工價銀兩打造查得杭州抽分厰缺正德二年木價銀三百七十餘兩蕪湖抽分厰缺正德三年木價銀九千五百四十兩淮安等三府自宏治十年起至正德三年止共缺木價銀三萬五百餘兩每遇造船纍軍加利賖借物料成造各呈前來臣等除照例通行催儹外議得前項料銀該十一月以裏給料十二月造船正月船完如料價派徴所屬不敷司府查將在官銀兩照數借支明立文案待後補還若過期不給料價經該誤事官員住俸年終不給聽漕運衙門參行各巡撫巡按官提問屢有奉行事例但各該軍民官司歲久因循任其遲延侵那此蓋各處通弊非獨湖廣浙江等處為然且如南京各衛料銀恃以京衛自成化八九年拖缺到今動以萬計雖是年年差官查催止將近年料銀搪塞餘俱任意破調及照杭蕪二處抽分木價專為供造運船近來那移别用遂使缺料造船纍軍尤甚今於前例若不再加申嚴則其弊日滋京儲愈誤合無工部行移各該司府州縣衛所今後料銀俱限十月中旬徴完開報漕運衙門行移造船衛所差官前去支領若過十一月初旬不完不報聽漕運衙門參提首領官吏問罪月終不完先將各該掌印官截日住俸完日申請關支年終不完參奏拿問文職三年連誤者行移吏部以備考察軍職行各該巡撫按衙門革去見任其各布政司務要照舊先期行令所屬徴解本司收貯聽候支領南京料銀亦照舊春自二三月秋自八九月差官解淮告驗轉發造船違者一體參究住俸問罪仍將先年拖缺料銀陸續設法補納及行各該抽分委官將前拖缺之數作急補完以後務將額定木價專聽造船支用依期給領年終照例奉報一清逋逃以足漕額據江北直隸把總運糧指揮僉事吳鎰呈備直隸徐州左衛運糧指揮張璉呈本衛左等五所運糧旗軍原係湖廣武昌右護衛宣德六年調今衛原籍俱武昌等府興國等州縣人三戶垜充田産家業多遺在彼止是輪流一人赴衛應當在營或有一二生息役滿隨即帶回以此在營餘丁數少成化二十一年為因逃故數無軍駕運蒙漕運衙門奏差本衛指揮王憲賫冊前去湖廣公同司府官員清解一千餘名撥補赴運深為濟用到今二十餘年漸有逃故查得本衛原額全伍旗軍共五千六百六十二名奉例開調别衛一千三百二十三名見在食糧京操運糧雜差止有一千二百八十一名運軍一千七百七十六名見在止有一千一百七十八名逃故包運五百九十八名雖一年一次發冊清勾迄今數年全無解到致使每船見軍多者不上五七名實為負纍呈乞轉逹會議照依先年事例差官賫冊原籍清解補伍駕運等因到臣臣等議得漕法每船軍十名內一名管船一名掌綱司文簿一名攔頭一名扶柁設若數內有一名疾病止得五名牽挽日夜勞苦無時休息今照所呈見軍不上五七名人少差多委的負纍不堪糧運之遲實由於此各該有司清軍官員奉兵部發冊清勾視為常事任憑里書人等欺隱破調揑報搪塞不但徐州左衛為然其餘衛所大率類此合無行令缺軍衛所將各年逃故運軍自祖貫址充發來歷查對清切造冊差人賫送兵部轉送都察院發清軍御史督同布按二司府州縣清軍官員照名挨拿起解如正身不獲先將的親壯丁連妻解赴漕運衙門審發各衛駕船儧運務足原額仍定議有司清軍官清解分數以為殿最從吏部施行若衛所并領運官將解到新軍逼害逃竄以致仍前缺伍照役占軍人事例降級充軍俱發邊方遇革不宥申明儧運事宜狀戶部左侍郎臣邵謹題為申請計處糧運事即日以漕運糧船來遲恐遭凍阻本部議奏節該欽奉聖㫖著再帶郎中一員前去依擬隨宜般運收寄欽此除欽遵外臣訪得糧船後幫尚在濟寧上下比之往年最為遲滯以天時則寒沍將臨以地方則寇攘方熾以人力則奔走已疲羣心惶惶觀望畏却皆以無可奈何為諉當此之時督漕官員都御史先該本部題准免其赴京議事總兵參將相繼儧運未知的在何處若以年例會議迫期不照先年督運既完然後赴京故事輒先前進不得與今差去官屬協力催儧恐勢分體漫未克有濟以臣愚見欲行總兵官於濟寧迤北最後船所嚴督把總等官催儧各船前者必至德州後者必至臨清參將於德州迤北稍前船所嚴督把總等官催儧各船前者必至通州後者必至天津各會今差官員依擬般運收寄臣與原差督運及今帶郎中往來提調庶幾分任責成各有統紀後先接續彼此齊一而無急遽失序之患其明年漕運應議事件理不可誤合行漕運衙門先期差人齎奏以憑會議臣又見得沿河一帶地方因遭盜賊荼毒居守官民多以逃生為計行運官軍亦以畏死為心視諸公務皆為末節都不省顧臣今前去欲比往年以常例調防衛之卒以常法處違誤之人勢既輕於軍興事尤重於法比雖竭心思恐難應遽臣近由南來親覩其然不能自默如蒙皇上軫念國計之重時事之艱特勑本部將臣所陳再加議擬俾可施行臣當夙夜驅馳仰塞明命緣前項事宜非臣所敢專擅為此除咨本部外具本謹題請㫖糾舉運官狀戶部左侍郎臣邵謹題為奉命催儧糧船舉大義以糾運官事近據本部署郎中崔旻呈查得本年九月初五日濟寧州地方被大夥流賊燒燬糧船數目備呈到臣仰思國計不勝驚愓除具題處置外參看得漕運官軍值此流賊有不能不避之勢有不容不敵之義有不當不用之法有不可不體之情必酌於此而行之此朝廷不得不舉之事臣愚不敢不言之職也蓋此賊嘯聚人衆馳突數千里內攻城掠野莫有攖其鋒者顧此運軍固非其敵此所謂不能不避之勢也但軍至十萬之衆既有都御史總兵參將為統制又有把總都指揮等官分領之又有指揮千百户等官管押之大小相承居則有衛行則有次導前距後儼然行師之規為各官者儋爵食祿孰無是分尊君親上孰無是心死衆死制孰無是責此所謂不容不敵之義也今或圖便以先或偷安而後遂致卒伍乖方紀律失序軍不足道未聞何官以智而全何官以勇而傷何官以義而死荒忙披靡實與建置軍運之初意不副即今山東等處被賊攻圍失事地方自府州縣至守巡兵備巡撫等官見蒙差官查勘論罪臣愚竊謂漕運都御史總兵參將體同巡撫把總都指揮等官體同藩臬指揮千百户等官體同守令以次較比其罪惟均倘以力之不敵縱而不問則何所懲以為他日責成之地哉此所謂不當不用之法也然各處兌運軍船到遲則罪在軍民糧納遲則罪在民若水旱災傷奏報失時以致派豁相戾則罪在有司官吏向者漕運衙門雖經議准立法稽查緣地逺時促卒之罪無所歸人不知警况各處衛所軍無完伍船無完具料無完價口無完糧身無完衣棄逺父母妻子終歲勤動不得休息加以繁科重斂叢於一身如此而責死力可乎此所謂不可不體之情也臣待罪計司奉命督運惟兹事關朝廷竊有所見不敢不言如蒙乞勑部院大臣詳議其是行移新任總督右都御史張縉將把總等官逐一查勘職名并失事實跡明白的確照例於運事畢日拏問治罪總兵參將任大責重亦合請命行法庶幾分義昭明政令振肅自時厥後雖有玩心不敢復作仍勑本部每年例差監兌官員務選精練之人令其親詣各水次從實查勘除依限交兌外若有遲誤者必根究所由或在軍或在民或在官吏指實參奏係軍職行漕運衙門係民職行各該巡按御史各提問如律照例發落不許視為泛常茍且塞責其軍伍船料衣糧缺少及一應科斂宿弊明詔各該衙門速為處置嚴加禁約使上下相安遷善遠罪漸復漕規之舊天下幸甚緣係奉命催儧糧船舉大義以紏運官事理未敢擅便為此具本專差典吏宋漢親齎謹題請㫖建言漕事狀戶部左侍郎臣邵謹題為廣咨詢以補漕政事臣即日奉命處置糧船前到裏河一帶地方竊見盜賊縱橫大肆威虐運道廢厄莫甚於此然在我之政弊而當補所至訪察頗得一二大者臣昔承乏部屬繼總漕司舊有所聞於今粗合是以忘其迂陋竊有獻焉蓋徙薪之計既失於前畜艾之圖敢忘於後伏惟聖明裁察緣事關興革未敢擅便為此今將所言事件開坐具本順差典吏宋漢親齎謹題請㫖計開一糧運遲滯歲所謂四百萬石者頃因兵荒折減借留不能全至京師蓋數年於今矣其始也由議派遲議派遲故徴收遲徴收遲故交兌遲交兌遲則運之遲也勢有必然者且加以民貧軍困官玩吏偷而兵荒之變又出意外論者皆知其弊然臣嘗觀我朝運法至是凡肆變國初因元海運後兼陸運至永樂間漕渠始定而海陸俱罷當時所謂法者即今支運是也故有淮徐臨德水次四倉以受民間輸納運軍者於斯領焉歸於京通二倉雖遇災傷民有免徴而軍無免運支者不必出當年之民納納者不必供當年之軍支蓋通數年以為裒益雖歲有豐凶而常數不缺及支變為兌繼而又有改兌向也轉輸今也直達派徴兌納叢於一歲之中於是軍無餘力而缺於常數豈得已哉若今南有非常之水北有非常之寇則又不待論也當是之時所謂變通者無他不過漸復支運之法而已支法之難難在腳價不足則糧不自行其理然也茍能預處腳價以擬兵荒之事於舊例支運七十萬石之外每遇兌缺則支以補之歲必不失四百萬石之數此於國計為便而或者猶有軍民俱不便之說此則存乎監倉之人焉爾亦不可不慮而處之也但事體重大非一人所敢獨議乞下公卿臺諫集議其當而見之施行修滯補弊莫大於此一臣昔在漕司見漕之為政有河渠有舟楫有卒伍而支兌轉輸統領稽查賞罰黜陟行乎其間其多至於億萬人其逺至於數千里而總督都御史提督總兵協同參將三人者實領其事茍非久任雖有聰明才智凡百事端方講求而未及舉行既舉行而未及稽考則亦何以責其成功哉况心懷立異事尚更新數易之弊尤有難盡言者先年少保于謙巡撫河南尚書周忱巡撫江南都御史韓雍巡撫江西兩廣皆多歷年所其在漕運都御史王竑陳泰陳濂皆先後兩任故能有成功今總督等官有缺乞勑吏兵二部慎簡其人其人既得必假以歲月俾得展布四體治官如家益圖久逺收歲計之功若其官階資深則遷望重則遷功懋則遷遷其官不遷其地庶幾人法並任臣前謂支運者可以無弊矣一各衛所運船既有旗軍領運有指揮千百户管押把總都指揮等官又為之率領而總兵參將統焉行以幫行止以幫止進退遲速百凡稟命蓋即行師之規近年以來把總都指揮等官及各衛所指揮千百戶不思糧運為重或爭快便急趨以先或圖安逸緩行而後船有幫次而人無紀律比之民運反為雜亂遇淺則止遇險則止遇盜警則止運事遲誤其來漸矣而莫有甚於此時者乞勑漕運總督都御史等官申明約束俾把總各率其屬指揮千百户等官各隨該衛所船幫不得先後暫離淺則併力牽挽險則併力救援盜警則併力拒敵敢有不遵號令者一以軍法從事書曰有備無患此之謂也一人之論運河者皆曰三洪之難又曰五十四閘之難臣愚則曰洪閘既有定制又有専官或可以人力勝而北有白河南有清河中有開河地漫水淺雖曰無洪之險無閘之阻而為力實難擔閣糧船正在於此今既設有管河郎中二員必其住劄之地南則徐州北則河西務俾專意於清白二河約其漫流歸於一道而往來提督不失舊職其管泉主事住劄寧陽仍令不妨原職常在開河一帶因時濬積水利壩拘車戽隨宜處置以通糧運其寧陽等處泉源每處原有人夫十名一老人領之近年以來舊泉涸者無所於濬而夫老如故至於新泉又無夫老濬之舍舊圖新以彼易此此雖小節然任其事者亦當究心乞勑工部行令所司講而行焉乃若黃河特為運道之害臣前年會議嘗有建白工部方議修舉臣今故未言之非顧小而忘其大也一儀真有羅四橋閘瓜州有通江閘清江有新莊閘閘之用以時啓閉於壩為便然儀瓜二閘有泄水之患故議者權其利害欲大塞之若新莊閘之在清江其行久矣頃者淤壅自閘口至板閘四十餘里凡往來船隻必由淮安東關過壩沿泝淮流七八十里始克有濟其覆溺者往往有之於是濬而從閘便莫甚焉但黃河之水近年以來數派南流皆㑹於此此閘既開水必內灌而沙土隨之灌灌不已其塞可立而待也莫若候今年大水既退之後於新莊去處築一巨壩俾與清口對岸而渡雖車盤勞費而流沙淤塞之患可以少免伺黃河北分之日然後議復舊閘臣嘗有見於此今年夏阻風信宿益信其然乞敕漕運衙門將臣所擬再加詳議而後從事至於淮南漕道諸闕塘疏泄之宜則有常規在時修葺之耳臣故不敢贅論一闕債為漕之弊久矣其初由於口價不敷及闕費浩繁科斂瑣屑之故及歸闕費於勢家日盤月積利復生利或相倍蓰至於無算此天下之人所共痛心者也前兵闕劉大夏為户部侍郎時有闕欲其督闕曰使我為之只好半年便可退休闕疑而問焉大夏曰不能追債耳比闕見袁州軍運債多談者蹙額搖首而計莫也於是乃知前言不誣然比債之闕莫闕備乞闕助漕司闕銀兩每年闕際遇闕補助不使至於無闕不得已寧請於朝照先年事例假借於太倉焉其亦可也仍乞嚴斂物餽送之禁申帶貨津助之例以加惠軍士若科條節目請闕議而行之非臣所敢擬也一裏河儹運始於平江侯陳瑄工部尚書宋禮志記備載不可誣也淮安清江浦故有瑄祠秩諸祀典而禮獨湮沒無聞識者恨之今工部建議禮部覆奏幸蒙聖明肇舉祠祀昔之恨者莫不稱快但今山東地方災盜相仍所司未能修舉蓋猶缺典也且瑄之後平江伯熊近以無辜削爵從戎至追及其誥劵今雖公道昭明悉復其舊瑄如有知震懼之餘雖有祠祀未遑休享乞敕禮部申行山東所司伺兵事少暇將宋禮祠堂依擬修舉仍専馳介使少齎香帛親詣瑄祠以慰其靈亦鼓舞漕士之一端也容春堂續集卷六
