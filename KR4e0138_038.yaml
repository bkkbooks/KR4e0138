body:
  text: 容春堂續集卷二明邵寶撰五言律八十八首五言排律二首五言絶句六十四首五言律春雪獨坐春雷還見雪二月不勝寒山色愁頻望梅花笑獨看窖蒲柔怯盎畦菜凍羞盤庭草靑如許因渠更倚欄紅梅未開用春雪韻紅梅才兩蕊猶自茹春寒出以希爭覩開應半好看正憐香入坐未論實登盤笑我迂狂甚巡簷更倚欄風雨阻山行柬如山偶約山中路其如風雨何花期憐客甫茗事負僧陀栁岸漁翁艇松坡牧竪簑此時應入畫無計一相過喜子春至用前韻千里天台客重來喜奈何郡傳一手劄時顧台州華玊有書寺問兩頭陀寒山拾得事在天台野史操無簡山人卧有簑隔年期故在不放仲春過别時嘗約二月至此哭楊長史宗周五更哭聲起已矣嘆斯人留劍還知樹回槎已失津榻懸新月夜社散故山春咫尺橋東路相過獨愴神張提學留精舍三日别去詩以寄之欲盡平生語匆匆客又東山中三夜月江上片時風荒徑芟方始寒泉汲未窮逢人詢我病莫論著書功明水草堂次守溪王公韻澤國連平野青山路始分草堂斜帶水石徑細穿雲月谷三更籟風漪萬古文主人招舞鶴時起白鷗羣述喜聞道鑾輿返南來兩報同浮雲開北極久雨轉東風病力慈闈下歡聲醉社中惟應操短簡日課著書功贈吳道士羽人偶相過野服帶烟霞處處山中藥年年海上槎尋常聊作客三十早辭家何日天風便蓬萊海一涯寄惲憲副功甫八載荆南使憂勤欲白頭歌聲斫地劒行色濟川舟嵗月空成晚江湖况及秋平生范老記一讀一登樓寄夏參議如山書破來鴻在情深奈鼠何黃花十月雨白草九江波雲夢荆人獵瀟湘屈子歌淹留君太久吾道竟蹉跎避暑山中答莫如山殘暑未受遣有詩來故人數行猶覺少三復不知頻竹徑留題近松壇入夢新朝聞參贊語傳慰到慈親林見素翁寄沙魚翼翁簡云為海天亭對月之助遠致沙魚翼山亭見海天銀絲抽出細韭葉藉來鮮製法留新簡嘗時賦短篇若人南斗重風味亦堪傳月夜長懷七月望赤壁有人遊此夜復明月吾亭如小舟笛聲兼籟起槎影帶星流客動登高興台峯最上頭避客避客遊山館高秋霽景鮮方修初服地况近始生年雲影秋潭底松枝晚閣前老僧迷眼界謂我羽衣仙出郭雪後行南郭茅堂處處開漫投新嵗刺偶接故人杯徑指梅如迓簾看燕欲來溪橋回首地塔倚少城隈過惠麓勝寺遊人少春深不見春茶留僧供淡草喚客愁頻野望時時極途號字字真吾衰敢忘世無語獨傷神登東岡舒嘯亭復之厚本庵庵華氏先邱也舒嘯東臯上翛然見麥秋短籬花氣暖深樹鳥聲幽家報源源至賓齊信信留多情還弔古斜日到林邱喜何梓材至入城先過我應只為論詩思在停雲地情如泛雪時風前歌更激雨後句偏竒避暑松隂石相逢不可期送王子春還天台天台人欲去把酒問桃花履向山中石裾凌海上霞一經終遁世數畒自成家更作明年約春泉共煮茶二月八夜月匏翁嘗有坐月詩自七日至十六日共十首豫今年正月八日欲效為之繼以連隂弗克遂也二月八夜月光復佳而晴色勝常乃作此詩期每夜用韻如匏翁馬不知天意如何耳此夜看明月新晴光滿庭草邊留雨碧樹杪失煙青世事停杯問書聲隔院聽從今漸圓滿夜夜照東亭九夜月此夜看明月黃昏正可庭微生酒波淥輕引燭烟青小酌元無約高歌若有聽開軒步清影梧竹兩亭亭十夜月此夜看明月從東漸過庭一方心共白獨對眼逾青即有簾能卷那無笛可聽梅花未全放詩在影中亭十三夜月此夜看明月還過昨夜庭梅於溪上白山是雨前青光霽真堪坐隂晴不可聽明朝詩客去何處憶吾亭十四夜月此夜看明月懸如鏡在庭即令心境白安得鬢絲青槎客他年到裳歌何處聽馮誰紀佳興十日六登亭觀泉和葉巡按柱史心如水觀風及我泉評於唐客外詩在宋人先寒響回雲壑春流帶野煙閒來駐驄馬入寺不參禪西郭新霽行西郭青疇接野泉小車隨水曲高屋指雲邊山沐欣今雨湖颴憶去年浩歌乘夜月何日泛溪船冬日與王元信訪許東廬於梅里携我平生友東廬訪故人近來身更健靜裏趣愈真白屋支新柱烏紗戴舊巾不須談世事談罷恐傷神青山道中踏月青山路青山半白雲千峯如速客數月已期君林籟隨風息潮光隔渚分登臺問泉水滴滴細還聞送張汝立二首塵海風波定山林徑路深閒情能對酒雅調尚留琴隔嵗論文地平生㸃易心歸舟經玊峽老樹晚蕭森山中方獨吟客至共登臨城塔回高鳥溪帆送逺林乘槎如有約坐樹亦何心明日東吳道相思遲爾音田司諫白硯聞道端溪上佳人類玊成墨蒸雲氣重硃滴露華淸皓皓憐長濯庚庚陋大橫公心如皎日自爾獻承明次顧與成聞與新報安得從容語春風轉殺機尋常忘地分只尺冒天威抗志通排闥驚魂逐裭衣他年看碣石滄海一雲磯雨雨坐才三日晴逰已一冬壯懷淹閣茗潤色對庭松泥阻東山屐雲沉北寺鐘何當擁衾起微旭在簾櫳山中聽泉秋日山亭上觀泉坐夕曛先聲虛谷應餘瀝小池分滴滴初疑露源源半接雲載歌雲谷句樵子隔溪聞存問後奉陪郡守王公小燕泉亭公問無風安得有落葉者或曰泉聲也豫遂賦此落葉聲到耳流泉歌吹餘日斜群客醉山靜一堂虛能聽今逢子無言夙起豫廬陵方在坐何處問環滁次韻王郡公除夕二首郡閣還除夕青燈酒獨斟時情新舊厯物色短長吟草野欣風動蓂階愛雪侵梅花如索笑詩思若為禁屢得徴黃報還憐借寇身清聲無漢吏惠思有周人漏轉公庭午香凝燕寢春召棠歌滿路赤子孰非親清狂贈郭仁𢎞萬古清誰聖吾希敢諱狂甘心從飯顆散髮和滄浪避世譏門磬聞仙問海航尚餘詩畫在珍賞動遐方秋鏡堂湖水明如鏡秋來虛映空塵消凉雨後天在古堂中巫峽簾猶逺澄江練自工載歌收潦句為問主人翁吳封君送茶笋人憶荆溪上茶來穀雨前兩封專走僕七碗或通仙露籜兼將笋風漪已試泉正月中封君嘗飲泉於此東坡詩句在歌罷一泠然屬邵翁種蒲於石片石能還水移來楚水濵仙家九節草吾室數莖春蒼溢空江露青消老眼塵憑誰了兹事西郭有閒人移竹醉日堪移竹南枝記得真寸金還有土片玉已無塵挺挺數君子巖巖一丈人明年春雨後請看籜龍鱗孟訓堂談文通再遷厥居至我冉涇之東扁之日孟訓歸其功於母夫人也豫嘉其志為作是詩三遷胎教後孟母古無前一念機能轉千秋語尚傳慈親真達者才子本超然禮樂吾方短東鄰愧爾賢西郭雨行冒雨行西郭遙聞山下泉林回俄鷺起草際即雲邊入寺應疑客逢農且賀年登臺望東渚箇箇泊漁船次答馬巡按留别逹也非吾事高樓鳥欲窠湖光迎月起壁影送雲過秋老徑邊竹春深洞口蘿勘書多暇日時和野人歌山南道中慣行山北路今日偶山南丹井他年汲羽人何處參野田棲晚穀溪樹落寒潭近午天風起重湖破宿嵐送過司訓赴天台浙左皆名郡惟台更古風群經藝閣上多士杏壇中祿在休嗟老文成且送窮深山饒大木陰庇海天東贈牛總戎舊鎮新荒路新銜督府官九重親授節萬里獨登壇逺計胸中定先聲檄外歡請看傳令日風采動旗竿謝王郡公惠響器留别君謝江湖器山林安用之魚龍迎舊節虎豹避清時劄至起三肅銜成試一吹平生知我意惟有此泉知壽薛同庵七十草堂風雨晝嘉客且醇醪老去心猶壯狂來興轉高酒杯寬處放詩客醉時豪昨夜懸明鏡靑靑照鬢毛春日新晴濕烟飛不起春雨夜來深草色才如染花枝半未禁過門無俗客擊壤有新吟獨坐東亭下熙然太古心寄題理夢齊理夢復理夢夢如江水長逹生迷化蝶玩世託炊粱忽起湯虀口仍留冰炭腸醉醒都兩字畢竟不如忘哭虛庵陳郡侯二首不見古循吏見公良慰心野陰多種樹門靜絶懷金客醉曹參酒童便閲道琴道南營建處深謝勢家侵半溪辭我去半溪謂前守王誕敷也極口謂公賢素履元隨地幽居不愧天留臺分道日賜告養痾年一見醇醪醉先聲不浪傳施雪谷七十我少君三嵗看君冠且昏漫從今老數已入古稀論詩價隨時長醫名與齒尊有官無吏事真樂荷殊恩謝管令尹請春酒春酒勤相召其如病足何坐慚推我先揖恐答賔多懶性容清世狂吟和雅歌縣堂亷陛逺十載不曾過月夜懷素翁南海滄波逺東山宿霧深清秋連夜月吾道百年心勿藥聞新報無弦對古琴相思不相見青壁一千尋病足初愈足欣初愈行嫌柱杖多吾詩惟望雨客論漫懸河山墅棊邊屐江城矢復戈園亭饒竹樹風晚興如何山中偶成二首古寺名泉畔鐘鳴客到初溪山春日晝花柳老人輿逺眺招無鶴閒居食有魚臥雲呼不起苔隱石牀書無期還隔夜春事共逰初徑仄花薰蓋坡平草藉輿山僧勞供茗野客許提魚新句推敲處摩挲石上書樹兒埋之明日視冢還有感老年悲不得慟哭付長歌也自吾庭在其如嘉樹何山林逰興少風雨夢魂多最是傷心處新邱在澗阿曉起用前韻苦調無饒語長歌復短歌寒知春每爾雨問夜如何僻巷門常靜新晴客漸多感時驚物色青草長東阿華從龍往祇陀讀書詩以問之别我詩仍物先天第一花新春乘野艇斜日到僧家雨化曾無力風光漸有涯相過知不逺石鼎試新茶送錢以正再赴太醫院有術能醫國無階可致身孤槎沽海月瘦馬洛京塵心苦書檠夜情欣藥籠春千秋夔契外岐伯是何人送莫典史堂上親雙老天涯客早歸他年毛義檄此日老萊衣晴嶺穿雲易風灘上水稀曾聞巡按語未艾獨知幾超然堂送麗水酒後漫述登臺兼賞雨且送逺行人此日尊前醉殊方别後春紅雲天北極青野海西濵高處君明眼臨分懶重陳聞茹令人卒追憶水亭子豫友水亭莫如起卒四十餘年矣近得厥配茹訃感念疇昔不能無言水亭能共老也屬古稀年此日歌無地他時哭有天言猶如白日見已及黃泉手植西岡樹霜清月正圓曉起拭眼將觀雪翻成聽雨吟暑寒元有候天地亦何心嶺灑松間細邱沾麥處深幾時還集霰三白抵千金送馮少府震澤連三郡官程百里船哦松多隙地監水有餘天惠博春欣作征寬夜穩眠民風堪采處時致乃翁前送莫江陵古來雄勝地今送令君遊星宿連中極江山據上游政從平處善學向靜中優春雨桑麻緑時登郭外樓送吳經厯從韶武衛參文吏西川控貴陽塞平宵檄少幕靜晝吟長江漢才難盡風雲志未忘量移還有地宣力答君王送陸海鹽以昭佐令鹽官去嚴程向海邊千家成邑地一命濟人年晚聽弦歌市春行斥鹵田南康弓冶在異政有超遷葺跨塘橋成橋誇東西岸道當南北衝若非今日補幾廢昔人功風送難驅石天全欲斷虹從兹舟騎客相顧笑談中獨坐獨坐復獨坐清齊起自朝囂從閒處却飽向靜中消客徑遙通市鄰家近隔橋西林聞絡緯幽興晚來饒避客山堂臥起生日之明日臥起聞清磬悠然與境忘秋高山寺靜夕霽海天長避客還逄客餘觴更洗觴老僧知我意隔水和滄浪詠梅花菊有菊䝉梅姓寒香亦近之淵明方待酒和靖已成詩雪未滋清骨霜還剩碧枝世間多品彚嵗晚汝偏竒送李司訓宗文之建昌山水旴江郡諸生喜得師吾遊曾此地君去不同時仙觀真卿筆鄉倉晦父碑相尋還有暇為我弔磁龜謂羅景鳴吏侍金蓮池上偶成藉草仍移坐臨池看水流松陰知日午萍色報霜秋渠曲僧廊轉波澄佛殿浮上方時供茗與客共淹留風雨之夕子春將别寫懷别思逢風雨無堂漫置觴客嫌冬日短主恨越天長老硯三傳世寒燈十起陽西興回首地吳樹正蒼茫冬日偶過聽松南院丈室東移去南房自一家樹留不盡葉菊有欲殘花日昃壺添酒烟消竈熟茶閒行甘淡味休向俗人誇歸途再用前韻談餘方外士乘興到禪家雲盡長依竹山寒不見花客留新卷墨僧試舊罏茶世味吾癡在無官處處誇送王䝉夜深猶誦讀扶我出風烟水陸仍千里門墻未一年課程雖應舉科級本希賢明嵗春風裏還來飲此泉敬止為姚江湯夢卜賦夢卜東甌忠武王裔孫也信國河山誓濠梁水木心東來三世近北望兩江深兩江謂錢塘楊子繼别還成譜承休欲嗣音詩人桑梓意時託短長吟與豐城夏宗選叙别别子劔江上相逢二十秋鹽車終厄驥漁艇不驚鷗招隱歌空谷酬知賦逺遊我無徐孺榻山館缺淹留壽陸野雲八十稱大耊年來又此翁相人能法眼謂我有仙風世事清談裏家聲逺譜中笑看蘭桂長黃髮碧雙瞳次杜地官遊惠山閒登山閣上縱目九峯巔有興還題石多情更飲泉雲棲追舊夢詳見超然堂記風景入新聮異地應同調吾曾守潁川杜君扶溝人與許州比境故云從龍之祗陀林讀書欲往送之不果用韻致意雲林曾榻處數里到君家松結千年頂梅留二月花情知資浩博力欲謝浮誇忽起懷人思悠然天一涯五言排律追次西涯先生寄題疊嶂樓涯老題詩在居然見此樓書郵何日到碑刻幾人留樹色分淮甸江聲接楚流吾登方恨晚誰賦不悲秋六代孤鴻沒三山片石浮村墟多佛塔野水有漁舟吳越連諸郡荆揚跨兩州歲年齊始建風景白曾遊謝眺亭偏古嚴陵石最幽儻非公一語千載若為酬題畫壽周秉道鬱鬱顧山樹青連東海天幾家能卜世此老夙稱賢大隱非居市長生不問仙騎迎侯子左鞭讓祖生先蘭已充佳佩芹將薦御筵舟橫江北渚劔倚斗南躔傳業書籤萬生涯食指千初心三島日晚興五湖烟榻下欣留客旌招恥赴田少微知此野大耊值今年獨鶴吟笻畔群鷗釣石邊慕親題感怙懷世賦思𤣥人士緇冠雅兒郎綵服鮮夜深銷短燭冬暖謝輕綿永日方嘉燕清風復大篇賢甥獻春酒侑以惠山泉五言絶句螢過樓還繞井入戶更深深老可觀書卷惟應照我心蛩隱隱復悠悠蟲鳴早應秋夜凉人未寢草露濕階頭菜二首菜以甜為姓應須老圃知苦心誰氏子更道饉如飴此根真可咬不用問康侯鼎鼐非君事徒能白相頭紫薇花簇簇繁纓色誰教媚早秋省臣今白首還憶浙中樓絡緯絡緯復絡緯一蟲還一蟲年年聲不斷未了禦寒功蘭天風一夜霜蕭然見秋野蘭蕙化為茅亦有不化者菊秋菊有黃花萬古長如此誰知栗里風却勝南陽水雪兔山川雪糢糊明視明如月高秋夜氣清猶懷廣寒闕洗石二首汲水洗石牀上有唐時字不用太兮明恐損莓苔翠石上聽松聲松化石不老移石就新松新松數人抱春日訪知微門焉未應詩以嘲之剝啄應松聲客去僧未起僧病一春過老却山中杞小雨過海天亭前飲酒山風吹雨霽藉草對鄰僧回首淹留地白雲知幾層偶過聽松聽竹間泉削壁皴斧痕下有洞如屋積鐵不知年時許莓苔緑寄司徒孫九峯二首江漢雲重阻秋風白髮多相思不相見木落洞庭波老節曾相倚虛心幾歲寒九龍山下夢夜夜楚江干王山長歸越燈前酌别四首陳榻事巳陳不用再三瀆君去閉山齊歲寒兩竿竹君如蜀山人我愧程叔子往來皆可書山中無野史㸃㸃易未了山中年復年期君弄春水早渡越江船鹿洞本無洞鵝湖亦無湖勿謂吾臺小中涵太極圖題畫二首溪上有梅花歲寒心不老不見履齊翁山中幾春草微月生西嶺淸光日漸多直從圓處滿試問夜如何鄰竹萬玊栽非易千金買更難題詩問東老須向歲寒看待月二首夜夜待月明每被浮雲苦今夜天無雲月明本如古月從東海來待月吟正苦素娥本無心不管人今古雪林冬老繁華盡山深雪滿林瀟然茅屋下千古嵗寒心警齊林居事幽討長誦敬齊針客至論今古時興䇿勵心書石泉畫石泉作溪山信意復信手知音者後溪興在梁溪口月下推篷看梅卷梅花本幽貞月下更竒絶推篷何處舟孤山夜來雪觀泉有感陽城居晉鄙薰德幾千人我亦山林久觀泉愧我巾䝉齊鄒君世泰别號䝉齊兹館於吾仲弟璣為諸子師豫喜其有養正之心也為賦二首涓涓山下水日夜逰從東䇿杖臨流者曾聞說聖功有美道鄉孫學道如學海海水即吾泉山下真源在冉涇書院十二詠曾侍亭寶初歸養時作也中有屏泥金作仲尼居曾子侍像蓋竊有希賢之志焉歸養荷天恩孔訓聞自少不敏請事斯如聞提耳詔容春閣在曾侍亭右中庋舊藏書凡若干卷扁曰容春精舍先師文正公八分書也一堂容萬卷長憶鶴翁詩高閣日增崇老至不自知燕居亭即曾侍亭後軒也以朝夕於斯故名之其扁為喬太宰白巖篆客退解冠裳坐我北軒下我銘揭西楹時時一瞻顧存一齊與燕居亭對中置文正公所著吾曾祖府君存一齊銘府君小像歲時一懸之以展瞻敬先民遞傳恭惟一益親切齊居誦新銘敬對不敢䙝嘉樹亭在容春閣南其制㕔事也以文正公有此二篆字故扁之楓山章先生嘗有記今石刻在存一齊吾庭有嘉樹種自容春翁百年益封殖人歌召南風八角臺以石子為之在存一齊前上有八卦象山中作㸃易臺實始於此齊前壘石臺臺有八卦象山中㸃易時如坐兹臺上蘭畹在八角臺西其數凡九每畹藝蘭九本凡八十一本舊傳宜興山中蘭移栽他處止花一年故欲以多勝之滋蘭自騷人香草以比德九畹如井田惟馨亦充塞思濂沼在曾侍亭右甃石為之中種荷花故有濂溪之思焉上有小石梁以通往來蓮有君子德愛多知者鮮淨植起香風汚泥任淺深光霽橋即所謂小石梁也觀蓮憶濂翁因得風月趣忽然光霽生乃在過橋處靜深徑新植竹數十挺徑當其前故名新竹依舊徑竹長徑益深青春白晝永愛爾君子心圭冕二石在曾侍亭前左如植圭右如露冕石出東野山其形各有似如冕復如圭堂名稱曾侍雪浪石菖蒲在嘉樹亭前石自四川來與坡翁名齊者類今種蒲其上立石㿽中如屛之狀故又名屏蒲坡翁愛兹石銘在蓮花盆吾以種菖蒲珍重如前聞慧山書院十五詠忠定祠忠定宋丞相李公網也公之先邵武人自其祖始居無錫其父修撰公夔及母吳令人皆葬湛峴山公嘗廬焉自號梁溪居士亦鄉先生也故祠梁溪深十尋湛峴高萬武我作李公祠春秋薦牲酤湍澗在忠定祠右泉自十賢祠下至此凡厯六池以匯再越一池則下田矣水是以湍七池流且匯一水猶在山縈回忽成文至此將下田野橋湍澗之上山水衝而成汪北轉為别澗當轉處橋焉雜木石為之殊有野致亂石衝徑來徒杠接石砌拔斷謝遊人水淺人猶揭雲階由野橋有徑西上夾樹松柏迤邐三百步許復門焉故曰雲階石磴穿雲上懸崖自此升誰言風可御須信氣堪乘靜清深處入雲階門而上地位清迥仰見山色如在只尺厯級而門泉且邇矣曰靜清者取周子通書語也何處靜而清䝉泉出山下觀物本無心一原窮萬化海天亭亭東北向在泉之前因思其所歸故名之有記兀坐山亭下悠然海上天歸墟無盡藏須記始流年超然堂堂在海天亭左其向略同前臨平野及蓮蓉湖逺對江陰之定山有百尺之樓之觀焉三十年前豫在許州夢登尚書臺有此題額因榜之今望中所見皆與夢叶詳在豫記夢中得嘉名卅載乃斯宇珍重病餘身優遊荷天豫吟松個即超然堂左室也風來松有聲灑灑當左個我吟本無心松亦何心和詠竹個即超然堂右室也二個皆夢中所見新栽竹數竿竿竿挺蒼玉我歌竹和之步轉闌干曲泉齊即超然堂後軒也齊作而泉忽出其前今名滴露因以先師文正公所書二大字之出山如在山名齊敢忘本鑑裏看靑天不為泥沙混㸃易臺在泉齊之南滴露泉之北以石為之上有一圓石象太極二嶞石象兩儀四嶞石象四象臺有八角則卦形也見素先生登而贊焉刻太極石上有象本通𤣥義不在句讀道人坐高臺忘言對蒼岫滴露泉在㸃易堂南壁下其來甚微滴而不留故取唐人詩語名之滴滴出石間初疑松上露㸃易日有程還應周天度兩知亭在超然堂左南向中奉文正公石刻畫像先曽祖存一府君像刻嵌石壁先友希翁所作渙然亭銘嵌左壁曰兩知者取文正公贈豫東歸詩我歌泉和兩知音意也天涯一歸客海內兩知音萬古泉聲在應知此老心瘞卷邱在㸃易臺右中藏江西視學時小試文三萬餘卷甃石為邱豫銘其上吾道方施行懷之不勝卷故物穴名山虹光起遐眷望闕巖直海天亭西上紆徑數百步出松柏間有巖焉巖頂有平石可西北望某時至焉則人扶以拜祝曰萬壽無疆因作石香爐篆刻其上云云登巖道中有數黃石錯立徑側豫大書刻之曰山水之間曰風塵之表曰人間天上東南海一隅天闕勤望眼登拜想氤氳殿上香爐篆除夕勳姪送紅酒紅酒桃花色東風吹更鮮將情來舊宅送喜入新年遣暑四事淸泉白石子置之古銅簋泉出此山中石來漢江水兩峯瀉寒泉石菴得意筆懸之堂西偏白日風蕭瑟淨掃席間地周旋僅函丈矮几置中央坐愛罏烟上楛槎種菖蒲盆水半欲沒露珠上葉稍愛爾仙靈物容春堂續集卷二
