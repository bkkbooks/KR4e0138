  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0138_WYG_008-1a, image: WYG1258/WYG1258-0073a.png}
body:
  text: 容春堂前集卷八明邵寶撰七言絶句四十九首夜贈陳都司衛水東流起白波樓船燈火聽漁歌仙翁本是乘槎客風雨其如此夜何觀東山草堂賦墨本湖南劉是江東謝千古清風兩草堂歸去有詞涯老在人間漫許晉文章天台圖東南佳勝是天台劉阮當年亦偶來仙藥有無君莫問山中桃似世間開白蓮小畫新雨池塘透晚涼蜻蜓飛處白蓮香江南風景堪圖畫怪得龍臯欲斷腸龍臯陸宮詹先生别號先曽賦此畫蟾山鬼一腳臧三耳物幻人誣或有之剛道老蟇能蝕月玊川吟後到今疑西溪書屋為張邦穀題西溪又是太湖西東望龍峯路不迷我有草堂泉石畔十年雲月夢栖栖贈王翁惇史曽聞古有之風流猶在漢文時聖朝恩典還三代笑對峩冠咏壽詩贈徐東之姓名已上古靈章却憶江南水竹鄉憂似唐衢無涕淚古松隂裏嘯聲長製觀泉巾新製山巾似玊臺正堪泉上咏歸來鏡中莫笑東坡影八九年前手自裁客有持寧菴詩至山中者次韻贈之山中十里緑陰長新漲浮浮架石梁賦罷蒹葭掩僧舍午風銷盡佛前香贈周山人曉起空庭月在松慧山寺裡正鳴鐘詩翁訪我來何蚤第七峯前一短笻知微房夜坐兩宿禪房不問禪夜深無事足高眠西山松竹東山月共作清涼到榻前答周作之禪心聞説定多年却問東巡御史船我正厭聽西北事渙然亭上對鷗眠宿梅洲秋水清如雪下船黃花半委月猶懸枕當星劔看牛斗鶴下雲汀流石泉琵琶亭二首世間夫婦似君臣門外天涯語是真一曲琵琶皆掩涕無人傳與買茶人草堂卜築傍東林老去尋山恐未深江上琵琶自秋月如何却有世間心圓通寺石乳峯前雷雨來圓通寺裏咏茶杯明朝又向東林去山路新晴花正開留别婁誠善新詩贈我勝千金病閣青燈字字心正在溪冰山玉處月明還聽老龍吟喜晴二首山行愁雨水愁風兩月風中更雨中今日一帆天送我晴湖如鑑夕陽紅萬山深處古寧州五日真成十載逰千古濂翁招不返翠雲亭上看江流拜石圖風騷回首一茫然漫浪如公亦可憐懶是拜人偏拜石至今猶説米家顚畫鳩鵲巢何處樹深深葦有新叢水有潯乍雨忽晴天未定恐將消息誤知音南康寄陳分巡希冉時希冉之九江一日矣江上春風酒一壺南來擬共對鄱湖夜深獨聽廬山雨却放詩人賦小孤題畫扁舟風水弄殘春畫裏江南恐未真不見當年何竹鶴山青雲白正愁人辛丒下第還重過開利寺奔走塵途已半年扁舟重繫寺門前分明記得離家日古殿寒燈月滿天哭亡兒德孫哭兒淚盡眼將枯忽憶兒名又誤呼燈影隔簾明月落斷腸愁殺樹頭烏和儲靜夫宦途回首各風煙浪説春江有渡船珍重寄書千里意高秋一鴈落雲邊食角黍懷古湘江千里碧連天緑遍芳洲草似煙餐盡落英人不見青蘆包黍自年年過湖兩洲相對五丈許十里灣灣下湖水借問舟人誰所為年年水落長如此謝巡按使來問疾且惠米藜杖無如病足何山中書枕兩旬多廩人忽致霜臺貺飯罷魚羮一放歌觀松雪書淵明飲酒詩墨花春灑水晶宮漫寫陶詩豈醉中莫道柴桑非我地筆端真有晉人風奉次涯翁老師惠內法酒黃封甕上又加封珍賜由來出上供我願慈顏如此酒一番春色一番濃寄莫如山二首八月風吹漢水槎江東回首更思家南沙亭上人如玊賦罷清秋菊有華亭倚南沙石作山鳳凰巢處竹斑斑執經時有門人到萬卷樓中不閉關小舟東海西陲震澤東杏花雨過藕花風世間多少江湖險不到蓬窗午夢中與客談竹茶爐二首松下煎茶試古罏濤聲隱隱起風湖老僧妙思禪機外燒盡山泉竹未枯彭澤無弦浪撫琴琅琊山水醉翁心漫將罏火論茶味雲隱松菴午夢深謝浦文玊送黃雀及蟹蘆花風送稻花香湖上秋來味故長黃雀能黃蟹能紫不知何地更鱸鄉雨中偶成午聽浪浪晚未休蕭然六月忽如秋東曹吏散文書靜間對階除看水流為華汝德題畫二首小橋南北總春風多少詩情杖屨中高閣卷簾還坐我天涯芳草更無窮山中雲起不知山坐聽流泉盡日間短壑青松涼似水却疑天上在人間奉和西涯先生春日書懷二絶遊人競逐賞花辰却有西堂獨臥身江草江花春夢外題詩聊遣夢中春江南春雨慰田家夏雨如春免踏車夢到江南心亦到不知春在紫薇花雲溪卷半為溪水半為雲元是山中一氣分莫道無心時出岫滄浪歌似有心聞過馮公嶺衣濕才知馬入雲隔峯人語半相聞前行共指桃花寨巨石如碑不見文將至安仁秦擇之來迓滄浪水清濯我纓隔江如聽棹歌聲故人相見笑相問一夜月明三載情將至廣信寄婁誠善二月書來自蔡登南樓病榻幾青燈靈山雨後明如許渴思令人一夜增溪晴數日覺灘多坐聽潺湲和棹歌却到安流山有月獨吟如此晚涼何都昌瞻陶母像窮巷欣來長者車淹留深愧食無魚青絲一縷并刀下挽得中原九鼎餘泊儲潭儲潭廟前春水深春雲帶雨晝陰陰撞鐘擊鼓禮神去一十八灘行路心花石潭阻雨南方多雨北多風風雨多時各惱公二十年來南北路幾回風雨憶江東容春堂前集卷八
