body:
  text: 容春堂後集卷九明邵寶撰辭十四古樂府七古詩四十三歌十四行二禽言一涯翁先生七十壽辭有序正德十有一年歲在丙子吾師今致政少師西涯先生李公壽躋七十七十禮稱老平格之得天於是乎始寶也疏逖莫能庭祝敢為之辭辭曰燕山高曰湘水深凡二章公楚人也實産於燕師傅三朝道濟天下凡天下之勝惟公儀範所臨文翰所及莫不繫以為重而况生焉世焉公所敬止焉者哉興而祝焉宜也祝而不頌天下之人固有頌之者矣燕山髙九重宫闕相岧嶤台斗錯落聨層霄下有碧海深且漻閬風中峙瀛周遭萬里咫尺通虹橋群仙相望手可招煙光霞彩夕復朝清氣磅薄無塵囂降神維嶽生賢豪童年冠目兹遊敖偉如元凱逢唐堯自天題賜雲錦袍維帝有制手所操斟酌元氣回招搖坐令四海妖氛消鏗然大雅鳴鈞韶晚開緑野方逍遙壽公何以燕山髙湘水深來明一穴逺可尋蒼梧九疑雲氣隂雲飛入溪升復沈分為三湘流古今東行洞庭西有潯白沙碧石清人心復有菉竹如球琳雲陽先生多德音又厯數世達者興叶文章道德宗儒林玉堂不啻臺千金昔嘗南遊和楚吟歸挾天漢為商霖正聲尚在薰風琴舊相居洛海內欽雲山千里空北南老人星照衡陽岑何以壽公湘水深樂間園十二辭為夏如山賦其一峯何為兮天中倚泬寥兮凌長風既崔嵬兮又凝重與灝氣兮流通憺靜對兮終日雲飛來兮相從其二仙之來兮何從繄海上兮山中眷吾巖兮戾止雲在下兮容容仙欲去兮復容與靈雨灑兮飄風其三朝登兮仁峯夕倚兮仙洞思江湖兮茫茫孰舊遊兮非夢折瑶華兮坐長謡聊終日兮逍遙其四思古人兮勞心登吾臺兮望遠岑吹參差兮誰和風泉泠兮成音其五謇吾漱兮此潭懷惠泉兮冽以甘孰云遠兮百里嘗西都兮海南聽滄浪兮未極悵何在兮餘酣其六峯西轉兮徑長澗將斷兮有梁指南巖兮飛瀑駕青雲兮東行武陵兮天台何處兮瑶臺其七折湘竹兮結桂枝建芳馨兮庭墀風被被兮露離離招隱士兮未來指秋中兮為期其八左柏兮右竹徑中通兮山麓積雪兮斫冰挺森森兮蒼以菉往復還兮相忘若有人兮如玉其九出巉巖兮寬平參離坐兮石枰閴無人兮空谷若時聞兮有聲彼柯兮何物邈千秋兮冥冥其十攸然兮洋洋豫之觀兮未荒彼何為兮于棠尾頳兮孔勞豫為爾兮鬱陶彼何為兮于濠坐豫石兮太息水潺湲兮日西夕其十一此有室兮深以藏耿獨見兮天光晨昭昭兮萬象夕煌煌兮八荒羌靜虛兮既久誰之懷兮蒙莊其十二天蒼蒼兮山青近若接兮橑楹矌豫望兮何極孰有目兮無情諒遐觀兮終古豫誰虞兮隂以晴明妃辭妾行入氊帳寵愛非漢宫妾心有恨千古無終窮妾生漢宫人妾死漢陵土君王不知妾妾心良獨苦去有路還無期君命妾焉逃之我思古人非我時我恨婁奉春不恨毛畫師羲皇謡無懷民葛天民夢邪真天下無邦我有身有身可醉亦可貧我將用此全吾神歸來賦成江有津茫茫海內皆風塵菊花吾秋栁吾春先生非邪誰謂羲皇人銅槃謠銅槃古色如碧石泉水清清石子白我方苦熱坐南風童子持來置前席手弄石子兮水生波擊銅槃兮發清歌炎威焚如如我何伊葛歎漢鼎三分湯七十里莘野輟耕卧龍亦起夫何為乎殷興劉圯有臣無君猶君無臣玄德非天錫彼禪乎復何人出師二表徒為陳伊邪葛邪伯仲皆天民采芝曲采芝復采芝避秦不避劉山中壯且老幸見兵戈休亦聞張子房苦為天下謀垂死得一見况從仁者遊歸歟返吾所已矣吾何求行過首陽嶺下有兩荒邱再拜謝夷齊吾道非公儔天馬來讀史記作天馬來來何方易有占乃爾荒先烏孫後大宛馬是非天近逺使端廣民怨多天不聞如馬何三千牘讀史記作三千牘二月讀君何勞臣何瀆申公言言不在多止輒乙今如何右呂獒左無逸不如對此朝還夕以梅溪集贈浦文玉贈君一編書作者古君子書中何所云君行自知此雪寒冰載塗依依别桑梓高天望羽儀一日千萬里雙松圖託根共山谷貞德元不孤天聲自相和泠然覺迷塗煙雲日往來映此古貌臞尚友千載人賢哉二大夫贈顧少參與成病餘羡人健如人視神仙焚香坐長日簾閣薰風前聞君錢塘行想望潮海天湖船弄煙水舊事今幾年君行吳山重壯觀歸新篇秋清力當健我亦觀吾泉謝人送菊北風晚颼颼寒香入我屋問渠何方來嘉園慧山麓山人為華謀如鄰意先卜謂我城中居蕭然數竿竹主人抱秋懷須爾媚幽獨爾華爛如金我竹森如玉微醉和陶吟臨風有餘馥芟笋於園戒僕成章長懷采伏靈燈夜及松霽山中無經綸幽事亦可意雨餘竹有萌頭角日以鋭佳報得山人玉汝勤我計芟繁載筠籠兩童不勝舁新稍復何如雙松與兄弟園有雙松數百年矣贈吳山人淵明酒以逃陸羽乃茶癖千載兩高人同心不同迹山人鴻漸流有具隨我適采新試名泉吾山屢為客水火自成功居然得真液細啜對山僧永此風月夕山人竹為罏曽賞王友石九原誰起之邀君共壇席泉流茗復春山人眼長碧我歌柴桑詞把酒一浮白心逺翁自宜興來過我精舍野服蕭然從以一鹿茶罷遂行曰吾將遊吳中諸山越數日復過此乃書此為贈翁以能茗聞而豫先言酒尚古也鶴飢鶴飢不啄溷長鳴振林柯主人自謀道粟貴如爾何野老饋牟麥升斗云已多呼鶴就庭沼飲之以清波汝壽未易量無為歎蹉跎觀荷永言四首鑿池種荷花東引冉涇水辟如築堂壇于焉待君子南風動清漪正好看花時君子有難進花開故遲遲花開淡有姿有香亦清逺可望不可親時舒復時卷夕坐當花前懷人思悠然玉井起作者詩成已千年種蒲於稿菌之上山中有野人故出三秀族胡然朝暮姿乃夢長生籙澗邊有仙靈九節碧如玉偶就山人居清貞兩無歇久要見平生虛心願為谷匪石良自知餘子真碌碌薰風梅雨餘仙衣動新緑浮遊水中央千春隔塵俗詠銅槃水石東坡得怪石逺寄僧供佛我石乃不然作我齋中物我有古銅槃俗事久相屈以石貯其中載挹泉滭沸朱碧照清波古色一何蔚吾齋本幽貞復此為除祓弄丸思古人敢謂能髣佛白日生高寒長夏破煩鬱我心非佛心萬事惟四勿水止石無為勻圓亦強倔歌罷一掀髯南風正披拂夏日書事二首清泉浸白石瑩在古銅槃銅槃照眼碧赤日生高寒銅槃色朱緑石子白如玉客從山中來挹我泉一掬為楊元平題畫秋華淡有姿有香亦堪佩若當春風時為蘭復為蕙悠然山澤間金紫豈不貴石丈有新盟南山正相對寄壽秦一誠昔年有竒士遇子金陵中授子長生訣玄談入洪濛相期以無期有地還相逢爾來四十年間居仰遐風大耋忽復屆緑髮雙青瞳可望不可即渺如湖上峯我生晚習隱謝病東山東靜虛拙乃逸夢見濂溪翁遙將惠泉水從子巢雲松贈劉衢州數里衢東郭望望清獻祠願言艤君棹載誦東坡碑趙子不可作江水清漣漪焚香佇清夜矢心亦陳詞琴亡古調存鶴去歸何時吊古有餘感吾心自吾師衢州太守劉君擢自大理寺正南來過無錫顧豫容春精舍問政辭焉以暗請文辭焉以荒然衢豫舊遊也君豫舊知也賦衢之故以為君贈豫能已乎三一亭詩為俞吏科作暇登西岡亭我懷欒共子有言感豫𠂻千載猶仰止生三事之一誰能不由此出為升堂由入為趨庭鯉廊廟復江湖蒼生共憂喜俯仰天地間念念何時已所不盡吾心有如此溪水俞司諫國昌作亭於盛河之上蓋遊息地也而所題榜乃獨取夫欒共子之言此而克念安往不克念哉豫於是得觀人之道焉故推其意而詩之送顧台州君從西南來復向東南去會稽望九疑愁雲蔽江渚禹穴閴無聲欲與神靈語台州海冥冥金城獨高據雙旌動文星共識君來處君來何所將東風共時雨寄語台州人君歸願無遽見松子手種雙松樹直我庭前楹一年松花開三年松子生松子初辭花青青復青青日看日漸長勻圓自天生一粒成一樹森然遍郊坰聽松聽松復聽松松聲在高閣閣成四十年聽者今如昨風來春濤生風去秋濤落當其無風時蕭然亦微作聰者聽於斯冥心對寥廓和浦文玉觀水四首新晴出郭門四野惟一水憶自庚午年雨恆嘗見此坐我天上身江南畫船裏陶謝空遐思今有桂巖子仁人解憂時智者愛觀水具區接三江雲濤故如此浩蕩千古懷長嘯江湖裏載酌山下泉從吾者誰子篝燈照伏靈明月淡如水風從松頂來古樂安置此山空夜氣清僧龕白雲裏稍伺秋雨餘還期采松子萬壑正橫流我方浚泉水山靈如有知應笑我為此我泉亦何心一道蒼茫裏滄浪復滄浪野歌聽孺子答顧與成九日缺登山南郊我行獨緬懷謫仙人秋聲北窗竹世事吾不聞吾道卷堪掬碌碌朝市間他年亦干祿風帽倚斜暉霜鐘應虛谷千古滄洲情江天起群鶩白酒本無情偏許陶巾漉與成過我論詩再用前韻南山多白雲日我媚幽獨杖藜或西山涼隂夢風竹渴思山下泉迤邐手自掬原田黍稷馨飢鶴如得祿行歌𥅆史篇我亦願為谷湖天明晚霞何心共飛鶩有客似醇醪飲我不須漉與成與與新復至今辰復何辰二妙來不獨短刺方在門清風已深竹袖中有珠璣投我忽盈掬伯仲皆文星胡不照天祿城居自山林足音喜空谷相送冉涇涯雲洲起雙鶩回首見遊魚寒潭淨如漉答浦文玉惠蓮房盈盈水上華垂垂露中實數應經天星不止摽梅七虛傳周董飴真嘗楚萍蜜置之萱草間吾親何固必珍重泛清泠薦以雕盤漆又答文玉三首君子哉若人千古此聲實玉如丸復丸初筮得陽七苦心中自藏有房不營蜜尚友濂溪翁泛交亦何必坐我小耶溪相看眼如漆根撥幸知花自謂將食實高才迥絶塵名先建安七清甘入人脾霜餘啖新蜜褎然首王廷天定真可必禮樂三千言縱橫墨如漆無才甘退藏觀頥自求實吾道負蒼生敢擬作者七月夜照松苓霜秋割崖蜜蓮房自君投知味我應必報君此山泉無勞問膠漆晚坐有懷新雨晴新月明道人移坐臨前庭東鄰偶有琅璈聲牆西雙鶴相和鳴欣然起步春衣輕石子階邉莎草生松花欲黃蒲葉青可人不來空復情豫作是詩已客問可人謂誰豫謂几旬月而一問焉者皆是也蓋三年之病可以觀情矣題畫江上春潮晚來惡水氣冥冥接籬落忽看此景如此圖却怪當年何竹鶴天風吹雲山雨收明日焉知不如昨蓉湖望眼盡鄱湖幾向東岡坐高閣我冠我冠吊尚書吳公也寶聞公事於徐文靖公久矣今其玄孫鳯翔以忠節録來載諷群言賦而歸之生我冠死我冠我冠不毁我璧完于嗟乎公乃蓋棺給孤寺中白骨寒蜀道難於天臣心有如鐡生前未致尉陀書死後空還蘇武節于嗟兹遊亦竒絶萬古清風一秦越醉石為王翁賦湖上秋容淡如拭有人時卧林間石石邉有路通醉鄉夢邪真邪人不識人有託物無情石可醉亦可醒一聲何處滄浪清志孝詩并序里人唐公常以其父墓當山水之衝而力不能改圖也每至墓則哭不已復自鉗以志罪矢之曰墓不治即死不釋蓋七年而卒家人請釋不可聞者哀之卒後若干年其子勉之始克修墓或告二泉邵某某述其意作詩名之曰志孝詩曰人謂墳可遷我無買山錢水不可虞澗道可易我有隻手不可轉石石可轉知何時我弗是圖安用我為我自鉗矢山鬼我圖不能有如水生無期死有子鉗不釋生終釋死有客贈傳神張澤民有客來從東海湄筆弄丹青自得師囊中二像示我亦草草我於斯人如見之溪翁本豐頷匏翁故多髭有神乃在髭頷外豫嘗得之朝省委蛇時客之此藝何太竒客言我先祖曽荷文皇知百年貌得幾名士至今海內聲猶馳不才方愧裘與箕今豫為親歸早卧江南野有形未能圗有影何須寫君今傳我神誰謂非我者君歸海上超世塵應將此紙持示人尋常倘有知我者謂我今吾真未真送蕭户部水衡之司天下七算舟通楮時制同京師南來四千里滸墅實當吳會中地官主事延平彥鸞棲舊在吳江縣政平如水起歌謠今之歌謠乃重見司徒榷課歲有常數或不經寧惠商太原周公有是語至今傳誦盈廟堂蕭君不苛亦不縱隱然名為司徒重江邉野老閲人多獨汲山泉逺相送𢎞治中太原公在户部人有言九江分司縱邏卒擾商者或曰不然則有漏稅之弊公曰與其擾也寧漏時豫為郎中實聞之寄題黃鶴樓秦中丞國聲以涯翁長句索和用韻為復時沈休翁亦以和篇寄至片雲不向琴臺泊鶚渚飛來共黃鶴黃鶴千年尚未歸惟見高樓倚寥廓有磯嶻嵲非人鑿磯上臨觀何繹絡長史杯緣庾老停謫仙筆為崔郎閣內方迤邐大别峯逺樹中開夏后宫朝宗江漢直趨海天津地脈應流通登髙能賦亦餘事天子有使將觀風西涯老作動千古白首載歌還沈翁都臺駐節吾鄉彥五十功名猶未半不轉常持匪石心無涯每出如流翰匡廬雲隱具區濤我放扁舟君不見清秋貽我洞庭歌手墨新題溢緘靣君詩原是杜中人吏在漢廷稱老練馮君莫向棟邉懸恐露精光射星漢題畫近山如城人可住逺山如屏帶煙霧天際孤舟何處來雲中指點津頭樹客至桃源花正春回首空嗟相見暮蒼壁丹崖幾萬尋飛鳥回旋不知路路逢樵者問山名山深只為無名故中有青蓮今古青時向幽人一披露馮生學畫舉業餘胸中塵土先掃除清秋此幅展向我請我茅筆縱橫書南沙風韻杜陵後隨物賦形吾不如七曲灣足舊句七曲灣七曲灣邵家亭子靣西山亭荒久矣山長在一百餘年俯仰間吾亭今復此不見鶴飛還見山如見古人顔青青千萬古來往白雲間策杖臨流水重歌七曲灣思萱為吳太學輅作伊昔母在萱正華兒呼母應春滿家而今見花不見母家道猶春兒獨苦苦心對花花亦愁慟哭披圖春復秋潘氏兩壽歌伯翁九十常登山城中策杖猶等間仲翁七十不覺老笑談出口人絶倒兩翁本是神仙流青囊傳世真箕裘二十年前古稀酒伯翁杯落仲翁手小山雨露年年春庭前已有折桂人先人種德如種樹蠟梅花放春佳處從今凖擬開壽筵千二百年如一年君不見兄酬弟勸歌且祝玉林季弟詩如玉九峯書院歌涯翁先生為孫司徒作九峯書院歌司徒南還至揚州書來索和乃用韻為復司徒歸歟秋月九江上尋山厯厖糾九峯何在郢城西此景更無他處有誰將群物名飛走取類應出前人口為雞為馬為象獅指點相呼故非偶烏嶺焦山自色形逺為神仙近慈母方牀若為野人懸斷舸不勞津吏守公心好靜復好竒孰謂傷廉本無取書堂清敞據中區曲徑煙蘿舒復紐雲開畫障當南榮泉送琴聲入西牖别來想像三十年清夢幾回詩幾首鑑湖不用乞新恩故物今還落公手九峯髣佛在壺中一笑春風共醇酒謝安卧不負東山杜甫望常依北斗携滿青囊采藥多坐溫白石觀棊久香山老者復何人此老此峯皆壽耇涯翁大作合磨崖為問山靈汝知否謝徐員外送石子歌秋官西來自三衢贈我石子舁十夫問渠安所收拾此急水灘頭激浪餘君何太勞我太迂誰知古意皆可書世間竒貨玉與珠我獨愛此珠玉如君看磊磊復落落長短圓方不須鑿萬壑千巖雨送來沙與揩磨波與濯皎然潔素蔚然青夏造殷因亦惟錯尋常碌碌未足論顧我一卷方華嶽我行兩浙西復東布帆幾揚嚴灘風一罌置此二三子澄清激濁膠無功而今萬輩皆我潤潤澤不與他山同便將羅列階左右朝夕相看作良友坦然函丈堅且久君不見一畨雨洗一畨明中涵雲氣上應星寶萱堂歌為華文逺作寶萱堂前春酒香東風吹花初日長諸郎將兒壽壽母賔階有客森成行具區西來入海去流到鵝湖未能遽乾坤匯澤同餘波正似君家慶鍾處君不見宜男有種春無涯一年一觴如此花焦山歌林廷元提學山西嘗作金山行送之黎乾德有風憲之召乃作焦山歌二山天下之勝二君同遊於斯而繼起登內外臺豫知山且知二君於是乎言焦山古稱浮玉山乃在南徐東北江波之間長江西來萬餘里地將到海天為關金山古金鼇與此相伯仲髙通鳥道兩崔嵬深入龍宫一空洞壯哉大觀乾坤中滄溟有際天無窮吐吞兮星日呼吸兮風雲有時變怪起雷雨滿盈之動成晦蒙上觀北斗定天極下指地勢惟兹水上之雙峯吾嘗濟瓜州弭京口鼓楫中流屢回首仙翁招我上金山指點焦山引杯酒君不見百川四瀆先江河安流爭似驚濤多中河底柱復碣石江山非此如此逝者何子登臺我歌此吾道茫茫正如水青山歌陸德以昭欲刻豫舊遊華藏寺詩于石豫愧乎其傳也雪中偶興作青山歌與之是山有宋張俊墓故擬諸桓山云吾聞太湖之上郡山叢參差一碧皆摩空兹山乃獨擅名字兩洞庭北夫椒東南條西來幾經絡東將到海還盤薄左旋右引真有情古色疑從天上落望湖亭如一巢小萬頃煙濤連樹杪七十二峯名者誰今古興亡雲杳杳援琴曽和桓山歌斷碑破冢如豫何振衣獨上最髙處滄浪調逺清風多舊詔歸來病新起拭目江湖千萬里丹邱信有在人間兹山兹山無乃是老僧報我山花春題詩為報山中人它日歌詞已陳迹謂君再拂湖邉石吾嘗一題少室三匡廬不知山靈謂我今何如謝莫如山惠菖蒲歌我有二竒石來自上下鍾是時我行自南復之東二物真相從樓船習習生清風邇來數年委置庭草叢新春有客贈我石其數與物皆相同問之云來自蜀中殊形異狀不可以模寫大抵荒崖絶壁自天生質非一日復有長江之水朝夕相撞舂其間歲月不知幾千百乃成造化之神功東坡雪浪何似者吾此四物無乃堪弟兄有客謂豫言此石置之盆可種九節仙靈草南沙偶來觀謂客言誠好我將致之時尚早早聞扣門聲一童手持抱即令童子洗石分種之如送仙人上蓬島走筆謝南沙清貞願相保世上瓊瑤何足寶中秋客歌東廬至邀南沙今夕中秋月有華古竒石下有幽花惠山泉水荆溪茶酒名且出仙壇麻客皆能賦無喧譁南沙未來東廬去抗手掉頭不肯住興在王猷放舟處雪月皆堪入詩句東廬去後南沙來草堂獨對秋星開晚雲冉冉生蒼苔我行中庭往復回鶴聲報客慰我懷海月東生酒在杯亦有瀾菴在我齋今夕不樂何為哉我題詩如作史明日揮毫二三紙東報東廬公南報南沙子天趣園十景歌地官蕭九成作園于延平里第之旁名曰天趣園有景十皆自成也二泉子為之作歌歌曰石壁巉巖天斫成一屏萬古長青青蕭園卜鄰得正直誰謂與立天無情磐石坦然在平地四望煙霞以為際數人共坐尚有餘下布莓苔作文罽原泉混混何處來白虹委地聲鳴雷水哉有本故如是清泠未受人間埃曲水流隨石渠曲曲曲春風動新淥觴泛蘭亭客如玊方池水亦瀦為方汪洋數頃涵天光昔人曽賦半畒塘今也有客歌滄浪水碓有機非作巧終古周旋曽未了尋常成物不言勞更復何心較多少釣磯垂釣者何人千秋再覩磻溪春水清見石魚可數旁有間地堪經綸丹穴于今亦何有有窟如屋大於斗罏鼎已亡存杵臼應是山靈為訶守漱清軒外水漣漪仰高亭前山崛竒丹青盡物不盡意意在地官南望時蓉溪書屋歌都憲金公奉使還自江西訪豫冉涇之上出涯翁先生蓉溪書屋記相示想望風景不可得見情見乎辭綿州城東結書屋秋晚芙蓉花簇簇主人他日一歸來手檢牙籖三萬軸花謝花開清夢遙主人執法立中朝門前不植淵明栁觀裏曽歌禹錫桃主人懷思客賦詩此是諸郎擢第時西曹法吏春秋筆東閣儒臣雅頌詞君不見劒閣巉巖去天近左右峯巒相控引回首蓉溪雲隱隱松棚歌奉次涯翁先生涯翁壯遊盡南東品題到處皆留蹤老間逸事情亦鍾筆底雲氣成巃嵸乾坤竒觀此卷中有歌落落稱棚松眼前煙霧如鬱蔥野無夏屋胡為幪胡不梁柱明光宫君子若人能固窮周旋地占五十弓脫去塵土將騰空上辭鸛鶴下蛇蟲天留竒崛當嚴冬實看糾結虛玲瓏蟠根定與東海通不然何以遊群龍在淵在陸天機同多言莫如圖畫工神品妙得吟哦功使君驄馬纓垂紅偶入野寺披蒙茸間將手剔古苔封行遍天涯亡是公幾回世上兒成翁青雲後擁風前衝工師過眼徒憧憧豈復斤斧遭樵童松兮如鳥已出籠時來貴客僧鳴鐘尋常曲直嗟麻蓬誰將此物驚盲聾涯翁詩成五色虹突然平地起危峯南來吏牘兼詩筒知音千里如相逢雅哉淇澳非衛風太白山人歌為關西孫太初賦山人西從太白來東南勝覽窮天台鳯歌落落復自和笑問楚狂安在哉江陵曽見子微否道骨仙風子真有神遊八極偕者誰江上聽潮何太久山人西望幾回首石室高寒逼星斗六月爭傳雪未消萬峰誰遣雲長守南來遺我方山冠何以報之青竹竿杜陵詩人不可作擊節虛堂風雨寒再作太白山人歌吾聞太白之山倚西極華嶽崚嶒勢相敵上凌剛風太古雪尚寒下撫蒼茫鳥無力吁嗟兹山有徑不與終南通士將避世往往遊其中超厯萬壑巢雲松伊昔丈人負芻者危言曾動河汾公至今談塵流清風孫君關中豪仰止兹山高自稱山人巾葛白布袍入山靜坐觀衆妙出指八極將翔翺胸有五色文眼底無青紫名家自視出杜陵走筆題詩乃如史子長有語稱董生季主何心譏賈子邇來五見江東春南尋禹穴能知津相逢下我東野拜何人復謂秦無人我作山人歌物色其奈山人何山林歲年晚江海風雨多山人不歸太白空嵯峨水北山莊圗歌近來善學孟端畫眼中吾許張臨湘臨湘病後作此幅樹色慘淡山蒼蒼水北山人好事者要我題詩惠泉下秋林逝矣不可招臨湘臨湘亦其亞菊有黃華夜榻深長吟偶坐吾玉林樽前擊節與未已誰能和以無絃琴聽松庵裏廬山壁少日相看眼雙碧酒酣且作山人歌莫向山僧問疇昔金山行送林提學之山西大江之中有峯崔嵬屹然獨立不可動百川到此皆縈回乾坤風氣與水相移推來今往古無斷續中間有闔復有開順流直瀉忽此突然者儼如玄圭錫禹戴履參三才吾聞岷山導江東沱北匯茫然兩涯瞿塘誰為峽灧澦誰為堆洞庭東去小孤小又東千里行繞鳯凰之髙臺南徐望海只尺是青天如宇置此坳堂杯兹峯非柱亦非碣清泠隔絶人間埃神宫佛剎半參倚唐鐫宋刻剝落生莓苔蛟龍隱盤窟鸞鵠栖懸崖上摩蒼茫下臨空洞兮不可以測度但見海有西户江有東南隈一山二水理應爾嗟此卷石直從何地天將來水神夜戒百靈護萬騎驅逐疾走如銜枚吁嗟乎尾閭去終日崑崙幾時回振陵風雨潮汐爭喧豗大哉吾道一逝者夫何為乎有瀾日倒波今頽若非藉此作孤障彼狂且悍將誰與之裁吾人定力如此石滄桑不變此石無傾隤送君須上最高處商聲擊石開君懷太行絶頂更回首一航東海何如哉貘皮行成化癸卯冬豫伺春試于京邸茹新寧自蜀來覲假我貘皮一寢處者兩越月而還之蓋至于今正德乙亥三十有二年矣而猶往來于懷也九月之晦巴東尹黃章遣其子以是物來歸慨然有感焉越明日將考成我家廟齋宿容春精舍遂以藉寢物異且適喜而有作曰貘皮行客從巴東至遺我一獸皮觀之非虎非熊羆三十年前嘗見之貘哉貘哉古白澤蜀中諸山多窟宅嚼鐡復吞銅他物更何擇獨出不知雲霧深狂奔但恨林原窄辟邪亦袪濕此語自古聞今夕何夕來吾門貘乎貘乎汝誠武吾將高坐論斯文禽言看蠶看火昨夜小姑今夜我夜不能眠晝不坐火弗戒兮蠶受禍無絲可無綿可蠶死慘那看蠶看火容春堂後集卷九
