body:
  text: 容春堂别集卷六明邵寶撰記九首施氏所得五犬老文記施氏醫名吾邑國朝以來凡傳四世其行業徴於贈謝之文文有出諸大老者曰廬陵楊文貞公則某府君得之曰海虞吳文恪公則某府君得之四明楊文懿公毗陵王文肅公今少師長沙李公則某府君得之蓋百餘年間以醫功得文多矣而莫有顯於是者世相授受守為家寶不敢褻視乃者克欽之室火而毁焉君子之吊施氏有不問其資器而以是為悲者况其家之人哉雖然諸老之作既以書諸卷軸必有集以傳一家之藏固不若傳之天下之為廣也旅􅋙稱物曰德之致是文在施氏殆此之謂歟然則施之子孫自顧行業如其祖父則文之來也當有後諸老而作者矣第遺澤所存不能無感於得失者而或謂豫文之足以識也無乃惑乎施之良今多業儒而為醫學訓科曰諫字克忠者能世其家實請豫文云水西半隱記武進王君希程為贈太子太保吏部尚書文肅公之仲子讀書善吟詠雅崇世德君子與之間以性癖山水而太夫人在堂不敢遠遊也乃於其世第之西運河之涯為燕居焉倣唐王龜永逹里故事題曰水西半隱而屬記于豫豫未嘗遊嘗觀其所自叙堂曰閒止則取諸陶靖節氏有求志之義館曰聚星則取諸陳太丘氏有麗澤之義齊曰弦則取諸董安于氏且考訓也有戒偏之義臨山為池曰小西湖具六橋三洞之勝作軒其上曰影娥則取諸白樂天氏蘇子瞻氏而隱居之觀盛矣惟古之人藏修游息皆謂之學王君自謂山水之癖凡今所為覩名思義於古人之所謂學皆弗畔焉而可謂之癖乎且夫山水者仁智者之所樂也仁以居之智以行之而夀樂之效見焉以是奉其太夫人則孝莫大於是癖乎癖乎吾猶恐君之不深也九京有知文肅公以為何如居之中又有扉為納春徑為流香居為懶雲閣為都翠亭為賔秀皆有景趣可書豫書其大者故略焉由第以往凡一里許有小艇曰泛宅者少司空豫軒沈先生嘗記之其事可互見云務本堂記林泉處士鄒翁顯之營新居於塘莊之上祠寢齊室儼然古有家者之遺制務本堂者其燕居也寶雖未獲造翁之堂然往往聞翁於其壻主客錢君君之謂翁也玩易攻詩文以濟質禮以處贏事親愈愈喪而皇皇葬而顓顓其處諸伯仲皆篤恩義有田數千畝課家衆耕之又以其餘業諸無田者豐年取其租如約饑則減之大饑則又減之或遂不取其貸人而取息也如其取租焉希齊先生知德君子也他日論翁如主客言故寶常擬翁之為人殆漢世所謂孝弟力田有行義者今觀其名堂蓋平生自立之地故欲昭示子孫而期於無窮亦可謂知所務哉夫翁之業民也而其行則士也士之行莫大於孝弟行義而民之業莫先於力田外是二者蓋亦末矣今夫終嵗勤動絫粒而積量積而出自心計貨殖者視之則為己拙居家正德居鄉布惠如恐不及視軒舉藻麗之徒亦誠自少矣而校實要終則有在此而不在彼者即使彼幸而利此不幸而不利而天之所以叙倫而厚生者固在是也本可不務乎業以是基行以是植身以率之世以守之豈惟式于厥家哉語曰是亦為政翁之謂矣雖然德惠之孚久而感通天道不誣翁之後出而效用以輔政者安知無人乎然則務本之義大矣嗚呼其在斯堂邪在斯人也主客以記請於是乎書鄒氏莊東新居記漕河貫錫城東南流左涯有支渠二曰伯瀆沈瀆皆經吳郡以入于海二瀆之間有水通焉曰觀涇涇之西有小水五咸北入里餘而止界其地為五總良田二千畝有竒於其鄉為沃壤為奧區為勝槩是曰塘莊鄒氏世有之成化間柏軒府君以其中四十畒與其子林泉翁翁廣其傍為第於中由龍涇遷居之將繼營其左右以居其五子者未就而翁沒正德戊辰塘莊第火始有異室之議率翁之志其季昭伯以行當得左左實臨觀涇初觀涇之地柏軒屬意林泉昭伯思卒成之顧林泉始大厥構弗敢易圖欲多積以需念母惠孺人久處旁舍乃即其地為基什之一倣塘莊而營焉門之內前後㕔限以中門又為堂三而重屋殿之傍翼周繚有內有外規飾整嚴選工擇材計益經久自經始期年而落成取其舊扁曰力田世家曰迎薰曰正德曰崇禮者揭諸㕔堂不忘考訓也中一堂未名其姊之夫户部郎中錢君世恩為之題曰養志蓋嘉昭伯懋於行業以勤多助故居成而母志說有養之道焉爾也君子以為善頌昭伯謝不敢當則介其孰賔周君仲章來請於二泉邵某某謂之曰昭伯其何遜哉昔者孟子之稱曾子蓋嘗云爾矣然天下之人志不皆晢而為親同養不皆參而為子同故君子之言飬者莫大於行而業次之行修則不辱業崇則不乏此固為人親者之志也凡昭伯之素其不此之務乎雖然志一也於生曰養昭伯於母之謂也於沒曰繼昭伯於父之謂也欲知昭伯者請觀於斯作新居記十峯樓記明府尤君遂良還自崇陽作樓于居第之西靣龍山為牖山之九峰近在几席君對之若賔主焉有客過之為之題曰十峰之樓君以告豫豫始疑其名與數今知之矣蓋峰之在山其為土為石初無異也然平而為麓起而為岡伏而為塢虛而為谷盈而為邱各形其形而各名其名勢則然矣乃若突然而髙其名為峯峰蓋不自知為峰也而峰之名歸之夫人亦何以異是哉他不暇論試以君言之其為諸生于邑固邑之人也迄其明經博史成章而逹焉舉于京闈而文名著游於辟雍而學業廣試於銓曹而治理通宰於劇邑而政務舉至於檄撫夷而展變通之略疏防邉而悉預備之宜遠人懷之中朝談之譬之於山其所謂突然而髙者非邪君不自知而人之望之固如此故雖謂之峰可也昔之人有以山而擬諸人者若五老若仙人若玉女之類蓋多有之由是觀之謂之為峰顧不可哉以道觀物物我無間名之在此猶在彼也而况於數之多寡又何足計乎是故以一參九不見其為不足以九乘一不見其為有餘問之九峰九峰無言問之尤君君指九峰作而笑曰有是哉請書為記周氏畫記畫竹一幅九龍山人王孟端氏寫寄邑人周翁恭甫者也翁藏于家傳至其孫某而失之翁之曾孫紘别號月窗以儒醫名東南於某為從子思其祖之故屢求之未得一日江隂朱世芳氏病而求治於月窗月窗巳之世芳酬以金不受聞是畫在其壻某所乃以歸之月窗喜曰此吾求而未得者雖千金何以加哉即日持歸懸堂上與其子若孫序拜然後觀觀畢告于祠堂藏之唯謹君子謂月窗於是乎孝傳曰春秋陳其宗器孝子之道也凡器皆然而况德之致哉九龍墨妙人所珍愛然其人清介特甚雖方尺之紙不輕授人恭甫翁豪宕好義有古烈士風九龍所贈頌祝寓焉而又重之以詩兹豫所謂庶幾德之致者故月窗因其失也極力求之求之既得則欣欣焉若獲拱璧不知千金之為重也其有以夫月窗有才弗施乃專其用於醫施不責報有儒者之德是畫之復君子不謂數焉夫始以德致終以德復周氏之慶於是乎在凡其子孫者宜何如寶之月窗之子敷牧恐久而又失請記于豫二子者之孝猶月窗之孝也畫失不知年月其復也在某年某月又若干年二泉邵某記鳳山書屋記鳳山書屋者封户部主事卑牧秦先生之所築也自始築至今凡若干年矣其為制也臨流為門依林為垣幽雅朴儉望之知為儒者之宮矧所謂鳳山者當其前左若有相顧之狀而烟霞草木發光露彩播散芳澤日相尋於軒窗焉先生讀書其中得於山者不為少矣乃追惟其祖某府君始築之意而扁其堂曰鳳山書屋其子戶部君國聲以其意告于邵某某按縣志鳳山在邑西若干里其為名不可知然天下之山以是名者衆矣或以形稱或以跡傳其無故而加之者亦比比也豈不以鳳之為物長百鳥而瑞王者號稱四靈故託名以重焉耳吾嘗即是而求鳳之德猶龍之德然龍以潜為隱以飛為顯而鳳也則異於是隱也以翔見也以下其為用不同而係乎時者一也故君子施遠而博跡近而光輝其為澤如龍為瑞如鳳而龍德大矣先生觀兹山豈無感於鳳哉又嘗考諸先生幼讀古書守道自樂邱園之義至晚不渝蓋所謂翔于千仞者覽德而下鳴岡棲梧則付之其子且將有羣雛出焉殊形而一德隨時而為用誠無愧於鳳矣其為感也當在於是是則山之名不可知而先生之取於鳳殆亦詩之興歟而不必深論也雖然晦翁於南康嘗以澗中黃石狀如卧龍故為庵而祠諸葛因名起義遂有潜見之感則先生之取於鳳者亦豈無謂哉戶部君豫同官且同志文章政事素重于人而言必稱父於是記也尤惓惓焉可以觀德矣是為記錢氏軍將山世墓記惟軍將山濵于震澤盤亘三十里為錫西南鎮其間以塢名者什數軍將獨為深衍南唐時嘗駐兵焉蓋其勢若帳之回合故又曰軍帳山之勝以是惟錢氏墳于兹山凡若干世矣其正峰為吳越忠獻王八世孫承奉進所葬蓋其子寬甫治之其右則承奉以上凡六世其左則承奉以下凡三世惟甲仗塢去正峰東北五里乃寬甫葬所當元季時寬甫資雄于鄉有遠慮焉故擇僻地且為疑冢至其元孫伯剛始距祖塋二百武黃泥嶺者左右列葬伯剛子惟義孫孟溥實皆在左餘若某某則右焉孟溥號南邱纍贈奉議大夫工部郎中今户部郎中某之父也戶部既葬奉直公若干年而其室鄒宜人卒又卜軍將支岡稍北東面曰長寧塢者營新阡焉通神衛䙝既門既垣祗饗備息乃堂乃廬碑刻誥勑以榮上賜池梁于前阡制斯備又前四百步有匯焉巨石為橋凡錢氏諸塋道悉於斯㑹揭以慶源之名重先世舊題也又東四百武有山若覆釜者實與阡對又三百武曰赤石嶺傍峻中夷為道千武廣丈有二尺夾道竪華表其前東南五百武東北八百武皆瀕于水自上望之諸山環堵而平田千畝湖波浩然見華表間僉謂得山水之宜為諸塋最先是豫督漕淮上户部東歸過之與論先塋之理嘗以水隱為恨今既得是載思豫言乃卜吉從事踰年而成則以記屬豫豫觀户部之先武肅忠懿諸王忠孝之節著于前代寬甫以下諸公德義之懿栽植加焉奉議公質直好義敦詩說禮惟先是崇篤生戶部賢而能文有政于官既衍而繁復登而顯徴諸地道先閟後發可信不誣傳曰公侯之子必復其始豫不佞請以天道復焉正峰右後則伯剛之弟伯和暨其孫某之墓近墓有成性寺寺稍前右為龍泉塢則為户部兄鴻臚序班世端之墓又右西為桃花塢稍南為白茅嶺則户部之伯祖惟常世父孟清之墓合諸前墓凡為封若干所其貧不成域者尤衆蓋自始葬迄今歷祀三百族凡若干人烏乎可謂盛矣寺有石泉最甘冽上祠龍神曰孚澤禱雨輒應天順間有司請錫寺額錢氏以山百畝田六十畝贍其僧因建祠堂奉諸錢主兹亦墓事所繫故附書之東湖書院記東湖書院者廣東按察僉事梧州吳公廷舉之所建也院在州東門外南臨潯灕二江北負大雲山山之下公三代先塋在焉有水出山半左右夾流前匯為池池方數畝其曰小東湖者公名之也公之先為湖廣嘉魚人嘉魚有東湖既取以名又以扁夫院者蓋志不忘其先也抑有尚友之道焉昔宋周元公茂叔嘗濯纓江州蓮花峰下樂其水之清也遂寓以濓溪之號濓溪出道州去江州幾千餘里蓮峰之水非濓溪之水也然自道觀之則孔子之所謂逝者如斯孟子之所謂有本者如是者固未嘗異也故觀道有術莫切於水得於水而不泥於水此有道者之大觀也吾於元公見之大雲之於東湖其亦類是矣夫公之學道從可知巳然遠而望其故鄉則得水木之義近而邇其先塋則廣風木之思旁以招引後學而退將自養焉一舉數得是皆道中之事也矧院之為勝負山嚮水草木魚鳥之觀日陳于前登堂曠如入室奧如經書圖史取諸左右無不應手而摳趨其間皆鄉里秀敏之士士不遠千里束負而至者又時有之以是尚友古人夫豈僣且誇哉公博學好古有猷有為由邑而郡夙著名績豫蓋聞之久矣頃者以二守北上道出江右始因吾寮友范君世和得傾蓋焉比任雲間伻來請記時宏治甲子也越六年正德己巳乃克執筆蓋院之詳公自有記豫特論公之志以告學者云容春堂别集卷六
