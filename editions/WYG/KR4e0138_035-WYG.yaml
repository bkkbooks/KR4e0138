body:
  text: 容春堂後集巻十四明邵寳撰書簡三十九首辭人稱泉翁某幼也孤育且教於母太淑人太淑人子惟某某請告歸養養不能具物而以心承焉比歸而病重累親心病幸愈矣然親心猶未能忘焉每見吾色煦則悦言揚則悦歩健則悦不然則否由是自計無以為悦者我思古人於老萊氏得我心焉推類而效之蓋無不為也然吾年踰五望六矣距夫古人之稱老者行将及之病非親所悦而悦老乎泉翁之稱吾甚不願聞於吾親也古者親在􅁪言不稱老老不可諱而若諱焉豈惟避尊亦将以悦之而已矣且翁之為稱有齒之謂也有子之謂也未老而翁未父而翁将以為禮禮固如是乎世固有重人之德而翁之者謂之義起我於何有諸君子之稱我固将以尊我敬我也尊我敬我而不悦於吾親某也懼敢辭吾聞之也幼名冠字五十以伯仲中古之道也如以吾名出吾先大夫而不欲斥之凡有教焉伯仲焉可也否則官稱之如太史公行亦可也否則地稱之如東門栁下亦可也何必翁我哉某也媿敢以請惟重為吾親圗之某再拜與侯明府世卿某久病人也頃丁元德還自京師忽有起用之説君侯聞之以語某曰某公某公皆云然某時具以情告君侯君侯亦旣憐而聽之矣今聞前説尚有未已者敢不再告凡用人者必量而後行不行而後量一曰量才二曰量志三曰量力某也不才不能用於世固矣而人不謂然者蓋自筮仕以來在許州嘗從事勸課矣入為户部屬嘗從事章奏矣及出江西又嘗從事程試矣若是者皆粗跡也施之當時僅可逭責而巳而可謂才乎其于臬于藩于漕不久而去之且獲咎焉又不必論也若今之地則非昔之比矣以昔所為而施之於今可乎此吾所謂量才者乃槩之事實而知其必然非泛為謙遜云爾某旣不才重以母老且病無人侍養於是懇乞南歸歸及半年某得危疾大驚母心病乃有甚於前者繼而濕痰叢脾釀為中泄流為下腫旬發月作越二年未嘗愈也嘗少間見某病餘習行於庭必戒童僕隨之此何心哉當是時有不言離朝言離則夕以病夕言離則朝以病病乗衰至愈将無日侍養之缺猶前日也兹艱日思百念俱灰又可知矣蓋區區今日之志如此而望其有為乎哉此吾所謂量志者猶夫才之謂也惟我疾之初起痰涎壅盛口眼喎斜左手足不舉是為中風在醫書蓋第一證也説者謂闕無㡬全卽全矣不戒則復復則不可藥是故虞死者數日虞廢者數月旣而稍愈人曰非中風也類中風也類云者謂諸證同之也諸證旣同所謂不戒則復者有不同之乎凡我姻友近者以言逺者以書不曰戒勞則曰戒怒戒勞者曰雖詩文亦不可作為其損心精也詩文不可而可簿書乎戒怒者曰童僕有過不宜作嗔為其動肝火也童僕不可而可吏民乎或謂可出出将奚若舟行則不任夫眩也輿行則不任夫頓也人猶可相也至於迓命謝恩朝㕘陵謁拜跽興伏亦将扶於人乎不可也凡此大節下至交承應接發言行事氣不隨心必多舛誤至是而后退處舘舎曰吾疾又作此養病地邪此吾所謂量力者亦猶夫才與志之謂也是豈惟吾知之人皆知之特不肎言耳不言可也而欲强之何居且某宦學餘三十年矣勉彊從事少圖建立豈非平生之願哉顧以情事如此不能自副故甘守知止之戒以終養吾親期免大戾而已譬之卜宅者髙堂巨室旣不能為僅就一偶小築以庇風雨蓋吾才與志與力有固然者客有見者曰曷不髙堂巨室之圖也意則盛矣茍不自量起而從客将見髙且巨者不可得成而所謂小築廢且及之矣此吾於君侯之説所以未敢竊聞也或曰起用在人辭免在巳子何執之堅也里有為酒食以召客者其隣一人病不飲酒或謂之曰某将召子其人以不飲謝或曰無庸盍俟其至而辭之在彼有禮在此有辭不亦可乎其人曰吾旣聞召於子辭而有俟不若先之之為誠也他日病愈可飲酒有不召召斯徃矣君子謂斯人也確吾不自量将不媿斯人乎元德過我言與君侯同某時語之不盡至為書謝焉大意謂某有不可起者三不能起者二比以書草呈諸君侯君侯覽之并讀吾請養諸疏憮然太息曰由𠂻之言也由𠂻之言也今何則異於是某嘗聞之君天也天之恩誰敢不懷敢不圗報然報之不能而徒自病焉以及於親亦豈天之所願於物者哉某之情固私情也昔也請而俯從仰荷天德天之罔極實于我心犬馬後圖敢望而未敢期此吾所以事天者也君侯以為何如君侯與某相見雖晩而相知實深凡吾之情宜有不俟乎言者今也言之諄複豈得巳哉豈得已哉惟君侯重圖之某再拜與王衛書昨賢友來言江隂夏鴻臚欲須鄙文為范宰頌已託賢友辭之今又以禮幣來何不量也此文有不可作者三病力不與焉劉給事紘吾門人也先是治於江隂嘗脩學宫其士德之其死也追思之不置癸酉歲方生謨介吾姻友施君克榮張君元玉來請學記吾病不能作而心未嘗忘也今此作焉人謂吾何其不可一也吾令侯侯善政為諸邑最邑人之戴侯如赤子之於慈母也吾邑人也未嘗有一言稱之而顧稱於他人其無乃非心之安歟其不可二也范宰之政吾不能知而一見之雅前此未之有也君子愧未同之言未識而文以歸何居其不可三也有是三不可者卽使彊健亦難執筆而况病餘閒居則何能辦此邪煩為我謝夏君勿訝勿訝所辱厚儀已附返錦之義賢友知之與林鎮江金星士還得手書深慰馳望昨見桂丹徒蕚又得起居之悉始某為州於許日承候上官自謂不見其慢旣而為藩為臬廵行郡縣日接下官亦自謂不見其慢間以語黃伯望伯望曰此亦是公過處某不謂其言為然今於京口近事始知吾過之為過也蕚也簡率而近傲吾惟蕚之責蕚亦受咎無後言蕚還因為之請教而成之将惟執事者是望始而相違終而相成無損於事而足以増光盛德亦君子所屑為也吾子亮之涯翁石刻諒置之得所可為江山賀矣秋深千萬保重復羅二守昨辱手教以忠義祠碑銘見委此一郡之盛舉某雖不文豈不欲勉彊執筆附名於不朽哉第兩月前吾邑侯侯圖刻忠義之錄秦中丞國聲嘗屬首序已諾而為之矣兹又銘焉是多言也其何以為兹祠有無且宫未考而碑先之何居是以不敢承命楊驛丞所致幣物即託返璧兹復具啓謝不敏焉惟君侯亮之與桂丹徒蕚即日得手書知近况甚慰馳想昨㑹徐夏官熊侍御所言略同今之時何時哉君子之政固當有深長思者矣白石公南行時以避嫌故不曽相見回途未知見否倘來時當為之盡也此事始末吾不能詳以為恩歟則不可以成美受諸已以為怨歟則不可以分謗望諸人行事在我成事在天無小大一也令兄書意真切足見家庭之素但事有不可直遂者水到渠成慎勿輕發以重口語也今之人成人者少而幸樂以敗人者多逆心遜志之間至理在焉千萬加念令兄書南去人便當自復之雅惠良感客有過京口者非手書雖言若近是亦不可信至囑至囑與謝兵備德温承專人垂問兼致果酒之惠病餘閒居曷勝感慰所諭欲為我浚敝里之池此池故冉涇也蓋淤塞者百餘年矣風水家皆言宜通之不然亦宜深之浚云浚云固我所願而不敢請焉者也第所議開官河既以歲荒民窮而止矣今乃有事於吾池可乎以吾池之故而速官謗於吾子吾不為也昨已力止縣官縣官亦既聽之矣恐吾子之有後令也專此為復某與吾子相知自江西于東陽而深于廵按而尤深子之知吾猶吾之知子也千萬相體餘留靣旣某再拜復張都運企齋數日三辱手劄未即奉荅非敢略也蓋有待也龍杰之為豈惟得罪于官府鄉黨哉龍也則得罪于其祖父戒軒先生于其伯父觀省先生杰也則得罪其外祖父西山翁三君子者如有知也則謂之何某初意欲置之法旣而憫龍父老杰母寡又惟今之時盡法為難而獨盡于此吾不忍焉若就執而中止則不卒法之名又歸于官與其上有遺法無寧下有餘情是故遲廻數日欲追其所得餘利買書送學官薄示懲媿而或者又以其家貧甚來告於是告諸邑大夫不竟其事其所備書價各令以其十之二具酒饌告罪于其祖父伯父外祖父之墓其餘歸其老父寡母此皆聞命于執事而后竊議以處之者抑閒居順應敢以老之将至而忘學哉執事知我久因復請教其将以為何如也人還幸示數字餘不多及某再拜荅吳憲使遜之伏靈拜賜感感神仙之説不出吾日用間公言蓋得之矣行當請其精蘊開我固陋耳但獵心或萌於十年而矜字未消於一載心之難操有如此者安道於東坡之云未知果能副否况區區病餘之人乎媿悚無已晝寝起讀來教附此為謝荅華世宏昨承左顧以令親寗庵吳公六十壽序見委寗庵吾平生知已也此文吾所當作但病餘戒勞久謝文字而壽序行序尤為首戒以是違意于姻友者多矣至於寗庵乃不違焉人謂之何寗庵為當今文章名家由翰長而位宗伯其人其地皆甚尊重而茍欲為文以致其側是固夫人所難也而况不敏如某者哉某以病子侍老母仰荷上德定省之餘雖不廢書策亦不過代奕以消遣耳豈敢大書巨軸歸諸中朝呈于公卿大夫之前哉所惠嘉果即已祗受其禮幣義當返錦友桐再來何不量也丁仁夫知我者當亦以吾言為然也春間得甯庵書一緘内有戒作詩文一節其為我甚厚也兹用錄奉一覽餘不具荅浦文玉恒暘之後繼以恒雨且當禾成之秋所謂惟嵗而不惟月與日者也鄙人閒居不敢與知國抑不能知吾身乎某病人也元氣之耗久矣雖憂且勞将何損焉是故憂徒憂也勞徒勞也君子弗貴也所諭西銘之疑其将廣吾意歟否邪蓋嘗觀之西銘之指以事親而明事天之道者也天下之無所逃者二天也親也二者蓋等焉昔者申生之被䜛而将見殺也或謂之行申生曰天下豈有無父之國哉吾何行如之此則所謂無所逃者當是時辨不辨皆不害於無所逃也雖然死辨與死不辨則有間矣是故謂之共以事親言之共非純孝而孝者必共以事天言之共非純仁而仁者必共申生之共在無所逃不在辨不辨也西銘之意蓋得之春秋世之責申生者曰筮之從不知諫也曰玦之佩不知讓也曰胙之進不知嘗也至於被䜛而後圖小則傷親心大則虧親德無一可者獨其無所逃之共則質之天地而無愧耳夫知親之無所逃則知天之無所逃矣由是脩身以伺之自有不能已者此固仁人孝子之變也蓋至於申生而極焉而或者猶備責於申生亦春秋之法也非西銘之指也病後畏苦思甚媿來辱簾閣坐雨一日三秋想吾子同此懷也慕歌山華之作改字殊勝鄙作亦改過如别本煩再為一評之其他諸作乃病新起時所為以志慮精力相校於今何如也幸無吝一及其甚無謂者直抹之可也餘俟靣悉柬侯明府世卿日者䝉遣醫官諌率醫生輅存問吾老母蓋推廣德意而為之也老母老而多病某也賜告侍養于兹久矣未聞是舉也今是之舉情見乎文義著于禮一舉動文告間而使朝廷稀濶曠蕩之恩流動照耀於天地間凡在聞見莫不為我賛慶而况吾母子哉拜嘉之餘即日徃謝禮也而某也病餘力弱尚未能焉為是感懼敢令小壻憲先道此意而三薫三沐再拜堂下病愈之日蓋有不敢後者惟明府鑒之諫與輅姻舊也以執事之命來是邑大夫之使也執事所稱朝廷之命也諌與輅亦朝廷之使也敢不敬歟觴酒豆肉坐二人者於堂而酬獻之禮也會有齋事斯未之能行也知禮者愧之某亦愧之敢不告罪惟明府重亮之十月十一日某再拜復侯明府䝉顧夫四人命供轎役仰見體悉之至病餘不出三年于今今向愈矣然尚未能出雖吾從卿大夫之後禮不徒行今之日無所用之故不敢受也抑又有嫌不可不謹者昔某請養南歸時道路尚未靖或謂大司徒孫公曰邵公行盍差一辨事官託公務乗傳以從孫公曰請養私事也例無乗傳今從以乗傳之官未免稍由驛逓無乃非邵公之所安乎予聞而謝之君子以為知禮大臣致政則有輿卒恩出于上請養非致仕比也然無所事事而燕居私第跡則近之無卒而以為有卒方之乗傳其嫌不尤大乎夫禮所以别嫌也某雖不敏不敢不勉四人者昨即遣回恐明公未亮吾意敢終布之明公愛我以德處我以禮其無使彼僕僕徒徃復也某再拜與施克忠近承邑大夫以朝廷舊命命執事偕張尚質存問老母此殊典也某不勝感激之至適有齋事未能具觴豆以勞從者蓋媿歉者累日矣二十一日薄具蔬酌敢屈過我燕坐少時用申㣲敬繼自今每三月一舉得如此二三十年則我母子之幸也感恩之餘亦豈敢忘侯侯與執事之盛意哉是日陪者惟一二知已附此以告太淑人生日辭賀者老母以齋事甫畢志在戒殺生日不欲燕客且謂某病餘力弱執事為難故命某辭諸執事執事其亮吾母之情無重勞玉趾重我簡慢之罪也某無任惶悚十一月十六日某再拜復唐廵按䝉遣驛丞垂問謹拜雅意之重秋暑未退惟節哀是祝病餘草草不具與喻宜之病餘閒居客有過訪者皆云吾子讀禮甚勤鄙人聞之不勝希濶之歎即日欲徃慰焉而力未能也兹有數語以書将之前日香帕之惠何汲汲也欲辭未果附此奉聞秋雨以風千萬自愛復桂子實别後賤體稍徤惟七月間數日微恙耳忽得手書知尊堂壽康吾子之還其為慰多矣及觀所與豸史公書備悉所厯之苦臨别匆匆之言乃猶記之邪茍可記也則可行也吾言無出此矣青田之行何時邪未中千萬保重令兄子朴煩道鄙意簡莫如山某承朝命贈我祖考加贈我考二府君皆副都御史某病起因循未即行焚黃之禮今将奉主安於新建家廟欲先易書以俟是月二十八日卜云惟吉敢假大筆為光重之惟先生世篤道誼幼偕問學必無外也病餘未能躬造四拜以請他日容敬謝焉與徐東之新府主到任遣小壻憲舍姪勲持書代見復令退謁長者凡可以教二生者幸無隱也長者之前卑㓜侍坐禮也過遜以起傲非所望於髙明也某再拜復張提學冬間聞朝廷以吾友學行端雅回巡浙成命命以南畿學政君子稱得師者同然一詞僕與有光多矣新春承手翰垂問兼領厚幣藥物之惠今科舉事迫計日從事尚恐不足乃復懸念於僕何勤厚也嫌疑之秋不欲以書通姑此附謝僕尚乏嗣雖有壻及從子在教下隨衆進止不敢他望倘别有以吾名言者幸痛絶之吾豈以吾所惡者求諸人哉知我者必能信我也僕以病子侍衰母凡來翰所稱於僕何有端居静思徒増媿歎耳若吾友所處上有明詔逺有聖謨近有令祖家法僕何加焉昔者僕赴江西王儀制汝言嘗有詩見贈曰職在文章官在憲政宜嚴肅教宜寛僕深得其力請為吾友誦之涯翁老師所諭之言已拜聞矣有便幸為轉達感佩之意餘惟節勞為斯丈愛重不具與諸庠友月朔辱顧弊廬某病餘晏起雖勉出肅客而為席供茗竟以衆廢兹遣人致謝幸鑒亮之荅拜巡撫小状某抱病閒居適辱都斾光臨慰問勤厚拜送之餘即詣行臺拜謝禮也但賤軀雖幸茍全而足力尚弱登降堦墀殊未安委或扶以進非入公門之道缺然莫舉尤不自寧兹以舟詣臺前躬致尺牘于閽人謹謝不敏惟垂亮焉是望與華世靜所湏江東神祠記其事頗難立説潜溪公旣有作吾安得而辭諸所惠書畫已收訖玉盞并雕漆盤輙用返璧寒家無金玉酒器惟老母七十之慶嘗造白金爵二嘉賔至時一出之餘惟尋常瓦器而已今置此其中殊為未稱且酬酢之際主客相顧恐或失墜甚者形於色詞酒以合歡獻将敬也而可以懼心擾之乎古之君子無不用玉者某非其人也茍得而藏焉求稱損德懼壞累心其如玉何其如玉何且今先君之所嘗御吾有不忍之心焉是故返之玉乎玉乎非不知其貴也煩檢而命諸典器者人還仍希手書見報不悉荅楊淡成辱示年厯執事平生厯履蓋畧具於斯矣其可傳無可疑也雖然尚未盡也史法貴簡譜書貴詳詳而或厭其冗綱而目之可也此雖出於門人亦恐湏老筆耳夀文之類宜附七十歲下前此廷試所對策及所上疏各附其年亦宜之門人私淑者可以收亦可以無收大抵執事之可傳者固在已不在人也惟髙明裁之昨偶作詩六七章附此請教病餘值炎暑亦聊以自遣而已無大意義吳尚書名雲洪武初使雲南與王子充先後死節者也餘不悉復王郡守書華生回辱手書若将詢政於不肖者且云先是欲遣庠生致之寳病餘閒居之人何足以與此然所謂寓教化於刑罰者此君子之所用心而執事乃首及此吾郡生靈之福也敢不敬賛但受状太多之説某比緣病餘少與人接蓋未嘗聞之然以理觀之民之有情赴訴于上審而聽焉明者固有則矣徒多勞人茍簡便巳皆君子所不為也而謂執事為之乎雖然定輕重者存乎審别情偽者存乎聽聽得而刑罰加焉善人安而滛人懼則所謂教化者固於是乎在書曰明於五刑以弼五教刑期于無刑惟執事重留意焉繼自今将見徳化之大行也某雖不敏敢不以告昔者某承乏按察兩浙凡訟詞發聽于府州縣者其紙尾有刻印之言曰無畏健訟而務調停無惡越訴而起忿疾偏原告者非也拘成案者亦非也惟公惟明歸於至當而已矣一得之愚敢附以獻不知髙明亦有取乎否也和陶詩詞意俱雅淡可誦敢謝示教之及外涯翁先生詩刻一幅奉覽餘不敢瀆即辰新春惟為民加愛不宣復張提學憲節由毘陵之江隂屢辱書劄於我厚矣繼聞在姑蘇就醫藥欲遣人徃問以嫌故未果手書自吳江來諭及吾師涯翁續藁之序若以義分當歸於僕者僕雖愚亦豈不知此哉第公門髙第在舘閣臺省者方彬彬其盛僕病餘閒居固當遜避若冐然為之重為公之文之累人其謂我何行将閉户思索倘得成藁當與髙明商確之卽日未敢奉諾也敝藁忍媿就梓蓋重違雅意耳然非得吾友一言以冠其端恐無所藉以為重者幸終惠之不然雖刻成决不印行也以嫌故不敢遣人專凟諒知已能亮之郡守邑丞皆措督惟謹而胡通守尤切留意但刻工已選擇數人開局於我西圃計日論功旣不欲遲又不欲其速也所費已勾十分之八或不煩再畫矣東巡不知返斾何日惠山試茗之約終遂否乎餘伺靣布不具三月十二日某再拜復張提學書昨辱過我精舍山水増重多矣所諭祭田時供之外固可為脩理之助但利之所在衆共趨焉病餘之人恐動心氣敢辭之且昔年在撫州嘗止諸生爭占寺基今受此是人已異致後先殊情也敢固辭之其精舍從屋亦以是故不欲尺寸之益請勿留念是望惟脩學及五賢祠及名宦祠事卽乞與王郡守議行精舍禁約條件亦希早發下昨已拜懇兹不多瀆又昨精舍夜坐聞祭田之歸初亦未見不可旣而思之我精舍自有田三十餘畒足以供祭若復益此是利之也利之弗逺如尚德何是以敢固辭之且屬本縣以公文申達吾友誠愛我宜聽吾辭亟令罷免不然外則損名内則動氣執事愛我反以病我也将焉用之如不吾信雖勤百致决不敢取戴天履地字字由𠂻惠山之靈實聞吾言惟髙明亮之又某啓昨得手教聽吾辭田喜慰無已守溪翁文字在區區誠所謂不敢請耳固所願也者此吾友之力然非再之三之恐亦未易得也莫李二生有禮有辭稱提學之使敢附以聞數日斗熱忽凉校文之餘萬萬自愛不悉與張提學縣吏還自揚州得手書感慰無已守溪公文字承欲再速此必得之道公嘗與莫李二生言集如刋出不拘多寡須得一觀兹印出二本奉上幸為轉達此間不可徑送故也田屋聽辭閒居心甚灑落吾友之惠也范同知承委脩學公勤嚴慎治官如家分人興事所用工力就委其人顧用而以價給之将見不勞一夫不陪一錢數月之間四五十年之廢墜可以興復矣此皆吾友之力鄙人幸觀其成亦與光耀多矣但事有權宜范倅不敢徑處者亦煩聽其禀白愈見停當僕昨亦以尊意相告彼已倍奮精力倘公文中更加鼎言尤作興之道也向熱萬萬加愛餘不具復喬司馬先生問精舍状承問及精舍所在敢不敬復精舎在無錫城東南隅冉涇之上卽吾七世祖元處士容春府君舊居也傳二世别徙南塘居以漸圮繼而屬他姓𢎞治戊午某贖而復之四周為垣中為堂三間扁曰容春精舍容春者先世軒名也吾師涯翁先生嘗為之記正德壬申某侍養歸自户部稍加益焉奉母居之未㡬别建于其西為堂寝於是某病初愈乃卽精舍靜坐飲藥暇則取古書哦誦自適客至輙以起居弗良謝不見不得謝或便服見於斯盖自癸酉至今凡五年丙子春提學侍御張君汝立至見門之未有扁也遂大書曰二泉書院某謝不敏當乃用吾師篆書二泉精舍四字扁之末復署曰門生某立旣而張君又欲藉執事為吾重也於是乎有記之請精舍中為堂三間仍扁曰容春精舎吾師八分書前堂五間中為厨二十庋古今書籍萬餘巻扁曰泉齋吾師真書二堂之間為庭庭中立黿山石一左右植松四株梅二株竹數竿堂左直前門為燕居亭中懸仲尼燕居之像堂右為曲徑通家廟以達堂寝毎晨興候吾母起居于寝出于堂謁家廟乃至燕居亭瞻謁先聖退就精舎蓋日例如此精舍門左為冉涇橋引弓河水自東來其西為隂渠通弦河惠泉及震澤時復注焉題其側曰源頭活水由橋至渠所凡數百歩某久坐而困時野服策杖游於其上雖在城市有山林之趣每見稱於野人云其在惠山則侍御徐君子謙重建李忠定祠因為予作講堂焉亦曰二泉精舍謹復上林見素先生書廷元提學南還曽奉状起居計久徹左右矣兹輙有所瀆敝縣廟學自成化間脩建迄今㡬六十年矣朽壞傾圮日甚一日有司者雖時有葺補僅以文應故而已抑且沮於無貲不能大有興作今年春提學張侍御鰲山毁諸尼及女冠寺觀材石孔良田亦多美僉議佃賃某獨謂盍以脩學提學然之乃屬范同知澤專督成事顧兹盛舉必得名世大君子一言記之大書深刻垂示久逺且為他日郡邑志増重伏惟先生斯文山斗制作邁古不朽之託舍執事其誰哉王知府教實聞鄙言謹遣生員張珤具書幣躬詣台府僣干下僕幸舉如椽之筆特撰記文一通付珤賫回立石宮牆之下以慰官吏師生之望若愚劣倡議亦獲附名焉此尤竊計執事之能念之而不待喋喋者惟執事圖之珤将行陳㕘政至伏領教劄雅儀委以先祠記文某雖不敏敢不勉力謹附以知秋暑殊烈病餘覺困南望瞻企無任惓惓謹状不宣荅王郡公近辱光顧因論及老母壽藏事遂有山中之請不意風雨奄至且有嫌避竟不果邀罪過罪過是日返舎懷仰盛德口占一詩方圖録呈而使者猥臨敬捧手書詢及名宦祠祀某生也晩於先正諸賢雖嘗粗渉志傳未及檢詳乃遽欲一一品詳以為去留之地不惟不敢亦有不能今若以志傳再加閲視有績而著者祠焉其止載姓名厯任者不與則於公論将亦無所愧矣至於近時諸公見存者不敢議亦未當議其已淪逝者成化以來惟聞劉侯鈺有孝廉之行華侯仲賢有詳慎之政姚侯文灝有好古愛民之心而孫侯仁有脩城之績與去任李侯嵩同此外非所敢知也惟廬陵周公忱以侍郎麻城鄒公來學以副都御史三原王公恕以尚書莆田彭公韶以副都御史前後巡撫南畿皆有功德稱為名臣義當秩祀但數公位在八座九列奉命臨我郡邑今以時代與郡守貳並列而尸祝之於國朝體統無乃不可乎祠不以禮猶不祠也死者有知其誰享之明公以秋臺重望辱守敝邦下車以來凡理民訟首敦教化而以身先之朞月之間亦旣風行四境矣兹復及此此固古君子之用心而不可與俗人言者也惟執事更以古籍㕘之輿論折𠂻自已惟禮惟義成此盛舉某病且衰得及見焉亦豈非一大快哉數日困於秋暑賤體殊倦使者索報急謹此附聞春間聞申嚴鄉飲酒禮士論稱快而有司為邪人所挾竟亦無所釐革必欲得寔取縣官及年深将貢生員重甘結状申達提學衙門其庻㡬乎二事體類故敢僣及惟髙明亮之謹状不宣荅侯職方近施克和人便曽具状起居計将達矣華琢還領手教感慰無已即日審尊堂太夫人髙壽樂康曷勝遥賀老母亦粗安賤體僅扶持過日趨走興拜强而未能别紙所諭二公愛我則有矣謂之知我尚未也如再言執事其必為我加沮遏之力乎九華石日靜對如執事在時聽松竹園直上僧人厨房之後已為老母卜壽藏蓋自執事臨行一言啓之因請江西熊山人者成之僧價五十之數秋來漸植松栢老母戒勿亟也此執事所欲聞敢報餘事不足言時事不敢言鄉里事不暇言也惟髙明亮之八月二十二日某再拜與秦國英某再拜状上韋軒先生親家喪次昨聞令閫夫人之喪亟徃吊焉時未改服未能成吊兹聞既改服矣顧區區病餘艱於拜凡喪皆未能吊於是又将缺焉而懼失禮也敢此為謝諭秦汶病可以廢禮不可以廢心齋戒内居飲藥保身時一徃與於奠不能拜不拜不能哭禮之變也與施子羽某復子羽文學世契足下辱示擬古之作燈下快讀數過知吾子好古之篤也好古而能誦其言者吾見之矣能為其言者蓋鮮能為其言者吾見之矣而能似之者尤鮮何者才識不足以副乎其志鮮固無足怪也而今乃見吾子之有是作也能無畏乎繼自今吾願吾子之求乎古人之心也言之而古也行之而古也吾所謂好古之篤者又将於是乎在二詩皆有風致而語尤清麗秦城北斗一句居然杜法但魚書三川不識所謂耳適落新堂草草為復暇日相過當靣盡之與劉提學姜生來致嘉惠再讀手書夙誼宛如且生述雅意甚勤且悉不敏何可當也鄉歸為老母非敢為髙今病尚未復不起固自吾所所諭過矣悚愧悚愧生還附此為謝數年契濶之情千里傾注之思前書及道卿盡之兹不再也兩浙文教望公深矣千萬留意十二月二十一日容春堂後集巻十四
