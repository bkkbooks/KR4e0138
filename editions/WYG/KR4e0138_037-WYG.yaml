body:
  text: 容春堂續集巻一明邵寳撰辭賦五十首古詩二十九首歌行二十九首辭賦見海賦邑博莆陽鄭君大節以其所自號見海者屬予為記予再詢焉而莫得其指遂托客語賦之君名士烈以武爵遜其弟而自力於學夙爲莆君子所重今敎吾錫諸生以爲得師焉鄭子世居閩海之壖朝夕出逰與海周旋乃以見海名乎其室意若自誇謂人莫識客或問焉鄭子曰惟物無筭而目有涯人習所見遂忘其他故依山者友於麋鹿濵水者侣於魚蝦越潮群弄蜀日旅譁相齊人之於管晏見或幾乎坎蛙我非河伯方以自懼而奚敢誇哉客曰海於兩間爲物最鉅乾端是涵坤倪是據子既見之觀超寰宇胡不日逰高明而卑以自喻非海若之見嗤乃心何疑乃言何遽鄭子曰海兮海兮源源西來吾莫知其所從茫茫東逰吾莫知其所窮徒望洋兮極目渺十渚兮三峯而况乎桑枝之日鵬背之風彼有謂夫蠡測將吾見兮無同客笑謂鄭子曰吁有是哉岷嶓崑崙其上無垠尾閭歸墟其下無餘孰泝源兮㳂委見大海之非水乎今夫一勺非少九澤非多海兮雖大如道眼何子不聞乎孟曰如是孔曰如斯子能求之海兮汝師於是鄭子歛衽其容有改對客矢詞謂予不忱有如此海思山翁辭草經言何首烏二百年者號曰山翁予采之山中未得也故思之山中人兮踰上壽飲石泉兮臥巖竇女蘿衣兮薜荔裳朝飱霞兮夕白雲以為覆百草紛兮與鄰予獨友兮三秀世莫知兮已哉孰姓予兮何首山中人兮予所求夢悠悠兮繇昭昭叶操予鍤兮登高邱聊盡日兮延竚招松喬兮千秋山中人兮盍從我逰水仙若有人兮江之中委翠帶兮含天風歛玉顔兮掩春露婉清揚兮誰容漢之北兮湘之東將帝子兮吾從汀有蘭兮岸有芷恨千古兮如水雲莊十石辭見素公之作雲莊也其下上左右前後有石維十其名刻皆出公意張元玉以請文見公得逹觀焉歸以語寶寶聞之如陟降其間石為之辭仰高有石兮山巓咫尺兮青天日延企兮愁予何星辰兮渺然一快左予顧兮騁懷下方忽兮雲開坐商謡兮擊石見雙鶴兮飛來臨滄山北顧兮又東雲冥冥兮海濛濛扶桑睠兮安在空嘆息兮桴翁雲莊山蒼蒼兮白雲白楊風兮夕曛懷伊人兮終古秋吾黍兮春芹見素洞夫何為兮此峯中砑然兮有容雲紛紛兮在下欲躋攀兮焉從青野雲際兮山麓原離離兮芳菉天風起兮樵歌思幽人兮在谷碧山目窅窅兮天涯岑遥碧兮参差望重華兮未極渺何方兮九疑後樂夙逰兮四方江湖兮廟堂睠兹洞兮吾老何憂心兮可忘隱屛晨篲兮墓前夕次兮墓左有石兮如屛棲棲兮隱我拱北有石兮應星萬古兮北向夕下拜兮老臣有天臨兮在上徐太史薜荔園辭十三首思樂堂為山兮旣仞為池兮亦尋宛水石兮斯在昔之人兮此心水汪汪兮石磊磊嗟伊人兮不待堂旣構兮像懸我山嶽兮池海水鑑樓樓吾俯兮清流流之匯兮幽幽日徘徊兮延佇將舎此兮焉求風竹軒庭翛翛兮踈竹廻巖風兮鳴玉軒吾倚兮無言羌獨歌兮淇澳蕉石亭蕉被被兮石矗矗紛滿亭兮芳菉芳菉兮柰何懐佳人兮蹉跎觀耕臺臺登登兮山上田畇畇兮山下叶穡日力兮君欣君復閔兮農之苦薔薇洞菉葉兮朱英叶洞窈窕兮若房悵青春兮遲暮猶有寄兮餘芳荷池采采兮荷華西之渚兮東涯水天風兮香逺淹中洲兮日斜留月峯月明兮峯景旣東兮復西指佳期兮夕騁扣環竇兮栖栖通泠橋澗將斷兮有石下潺湲兮玉聲歩旣度兮返顧予焉知兮何情花源武陵胡然兮震澤隈花與水兮㳂復洄悵尋源兮不見見水流兮花開石假山屹有峯兮湖之中石際水兮叢叢彼日夕兮浪以風於我石兮撞舂猗兹望兮南東誰此池兮此峯峯之下兮湖通盍觀兮焉從善齊物兮若翁柏屏結瓊枝兮若屏歲云暮兮青青春風起兮烟霧翠為雨兮載零釣磯有磯兮水濵俯幽藻兮青蘋魚鱗鱗兮迎予夢烟月兮千春天齊淵東方有淵名天齊一氣下上降復躋乾坤生意從東肇何處山川非地竅漢家八神宗者淵有祠稱天今幾年巍巍惟天山嶽嶽巫史紛紛不知錯軒轅塜黄帝已仙今有塜武皇一語群臣􅋏衣冠葬者對謂誰千載似為方士俑諛臣誕謾不足非有塜豈徒冠與衣董生汲直乃安在牖納空嗟失此機嵩呼曲何處聲聲萬歲帝升中神靈㑹谷中人或有呼新垣平何代無萬歲聲嘗屢見楚東城漢前殿帝方信臣敢疑嘯也歌樵牧知二馬篇燕昭王容皝燕主慕生馬銅鑄像死馬金買骨生像未置門死骨終埋窟國當冀野君知馬一心眞一心假一稱驥德一招賢異事流傳今幾年但聞當時有郭隗焉知後世無優旃明妃怨無金賂畫師幸免入宫妬誰知出塞愁却以無金故望望紫臺沙萬里妾無一生有二死一死絶呼韓一死謝天子謀身不易謀國難只尺眼迷青與丹琵琶合向婁生彈臥龍起鼎三兮臥龍起表兩陳臥龍死老龍躍方未遐少龍變乃為蛇臥龍噓已成雲雲不雨天昏昏萬古恨臣無君君謂後主飲酒歸來歸來飲酒飲酒東風吹緑門前柳春光媚人我何有夢中境醉中身百年自作羲皇人山人歸白衣山人入山去黄衣山人留不住臨别無言還有心有言不似無言深山深人逺心只尺雲去雲來本無跡相見無期兩相憶饒娥哭父溺死女死哭醜􅁼從尸浮應有神為戮人心誠水神靈溺者今何限不聞號慟聲水怪水怪方縱横讀元史大都圖籍帝使收羣儒秉筆誰春秋仲尼可作史可修如不可作遷固之例吾當求不然吾將為夏游蜂塜嘆一蜂存衆蜂止一蜂亡衆蜂死塜纍然胡有此一蜂君衆蜂臣誰謂蜂不如人棄兒嘆棄兒水中兒不沈揮篙指水恨不深妻罵夫忍心餓死死明日溺死死在今妻罵夫眞忍心繡嶺壽藏四景左石有石有石其形厖厖且偃蹇名宜牀篆題者冰刻自唐介我雙松左夀宫叶風來松間如鼓簧客撫斯坐長蒼蒼右松松兮離立兄及弟矣二龍乗雲獨未離乎地也古亦有言維德不孤賢哉大夫我作壽域宜有此夫前泉我泉我池源源其來叶我池我泉不絶涓涓旣清且漣匯于我前何千百年後嶺嶺兮如屏孰為之繡彼桃萬株厥亦惟舊山之蒼蒼朝煙夕霞千載武陵非仙家邪寄題湖南汲福井方伯周公儀視我井記有作昔之日此井竭今之日此井渫水由地中功上出叶徃來汲汲寒泉洌六月焚如道無渇叶君不見朝宗江漢在此州水哉能止還能流召棠蔽芾今歌周觀水謠東南風湖水生西北風湖水落昨日今日皆天風不見水徃來但見郊原成一壑海深如不容洪流横復縱都水使者難施功三江不為江震澤不為澤岳陽何處樓長嘯洞庭窄君不見山東不雨夏接春赤地千里還愁人秋日謁張中丞廟有感睢陽令錫陰廟唐室功宗我明詔公神如水行地中掘井得泉本無竅萬古丹心天日照君不見毘陵在宋唐睢陽巋然保障東海傍至今遺恨國不弔忠義祠前一瓣香題買糕陳孝子巻昨日一糕今日一糕明日又一糕三年不為乆卅里不爲遙仙人不在楊涇橋靈藥不在葫蘆瓢苦哉孝子心一念通神霄代風答台人謠台人謠纔十五字而天道炎凉人事貧富之感委曲殆盡且含蓄不露得諷之體焉孰謂詩不出人心哉夜坐聞王生子春誦之輙為代答台人謠云風風何不公胡奏差家過夏我家過冬風風無不公高堂若無夏破屋元有冬荆葵嘆麥萎太半荆葵多不獨稂莠妨嘉禾荆葵作粉堪食餓稂莠稂莠無一可嗟彼小人無才為稂莠有才為荆葵大都害君子觀物興予悲荆葵多勿復道四蟲恣食三秋老周文襄公頌我懷文襄古之遺愛去公百年典型猶在惟遺愛一言寔自仲尼稱鄭之僑今千載餘繼者何少子産初政人欲殺之歌者如水及再歌也又恐其死公之始至白地有謠經營宣力二紀三朝茍利於民遑䘏在已我思古人子産哉是儗名山嘉樹孰非甘棠勿翦勿代公貌在堂我門于題於戲不忘古詩修廟學詩翼美郡丞范侯也侯以御史張君檄有事於我廟學亟成而度諸生歸德焉翼翼廟學維邑于教弦斯誦斯自昔斯肇有宫有牆有壇有堂孰今斯荒乃或不蘉御史來視盍修曰亟彼淫是􅇌亦維我職我其敢解叶我材孰資其萃有丘叶孰其我釐維范侯是咨􅁮􅁮范侯維秦之彦旣左京尹徴文考獻乃躬克踐矧是政先侯不是共侯曰爾吏爾徒爾工曰斯斯石曰斯斯木乃楹乃桷枉矯端復乃髹乃涂乃朱乃緑祭有麗牲射有栖鵠古人有言勿亟日成侯旬侯月亦莫我愆程源源泮水下通于溪我廟維東我學維西有峩者閣登登其階叶共維聖謨式崇于丌是訓是稽旣考乃畢有酒芬苾有禮秩秩有碑紀功惟長御史之筆御史崇正詔有德音我侯承只式如其心庻士向風叶維我衣冠其觀繼繼就不侯䋲而未克旣小子作詩敢曰能雅是篆是歌以告來者翼九章三章章八句三章章九句一章四句二章章五句春思集古四首老母方病辭疏未報緬懐良友其一感物多情思借問此何時朝霞開宿霧高楊拂地垂日華川上動流鶯復在兹上山采瓊蕋君在天一涯其二丹霞蔽陽景白水滿春塘庭中有竒樹含英揚輝光逍遙獨延佇仰視浮雲翔東風搖百草渥露沾我裳其三維昔逢休明朝逰登鳳閣端飾相招擕未嘗廢丘壑且還讀我書極望無崖􅔌遙心逐奔龍雙闕百餘尺幽緘候君開晦明如歲隔盈盈一水間勤思終遙夕其四靑春速天機時與賞心遇閨草含碧滋開花已匝樹風簾入雙燕緬映石壁素物我俱忘懷媿無古人度集古寄浦文玉十載朝雲陛長安㳺上才猶憶嚴冬月蕭條江上來暮春和氣應獻䇿抒中懐阿閣麗朝日鳳鳥方翔廻豈不念良友遠在天一涯我亦疲我夢登登九成臺春晩獨歩萋萋春草繁夕隂結空幙升月照簾櫳曠野增寥索纖纖如玉鈎夜移河漢落衆星環北辰悠悠方儀廓安得恒逍遙㳺原采蕭藿春日獨坐暮春和氣應養痾亦園中心跡雙寂寞唘扉靣江南叶一觴雖獨進情深意彌重桃李成蹊徑青林結㝠濛愛而不可見永懐求羊蹤斸笋一斸復一斸山中笋如玉籜龍有嘉名頭角方簇簇朝露晞午風清磬旁紛郁納之紫筠籠瓊茅以為束持歸獻慈親一笑不知肉答盛漢臣不見希齋翁門人見水石别我十年餘新詩慰春夕高空藹晴雲君才似張籍又如帆風江千里指南極山中有流泉曲處堪布席一盃欲共君古風乆寥寂新泉效李白體閒人有幽賞乃在山下泉水聲六月冷白石凈娟娟倚杖對青壁上有瑤柯懸海天三百里一勺方流涓仙人陸鴻漸遺世已千年芳骨如可起褁茗談烹煎懐五老峰寄趙愽士立之落落復落落泛舟蓉湖西安得五綵虹上聲架天作長梯南望瀑布水舒巻靑雲齊上有五老者翺翔紫雲霓具寄一書札浩思極㝠棲楚謠對芳草蒼然夕烟迷觀泉巾織騣復織騣制此頭上巾有名合從我我是觀泉人無纓不須濯山中况無塵百坡既已夥一角亦非眞蕭蕭九峯雨秋風送凉新吾自愛吾物悠然夢千春靜懐人譏不能休我患不能仕仕豈簿領間所執諒有以古人復何人渠恥予亦恥老恨㓜學踈病怪虛名起聖明無遐遺只尺千萬里儻念將母艱綵衣又兹始秋夜青天一片月萬古中秋期我生自能視六十一遇之孩童不足論弱冠始有知有酒不能飲而况能吟詩天道有隂晴世途多别離高思華峰頂曠憶滄江湄幽居未成徃對影空嗟而今逢聖明運適我病起時東亭海雲散寒光益軒墀邀我平生友清尊復在斯今夕如不樂問君欲奚為題鄒氏恒貞巻恒貞有吉占易為婦人告從一亦何占我心匪陵谷五十被旌書六十受多福之母古碩人百年潔如玊熊女詩西平張氏女未嫁而哭夫以死予在許嘗為傳之今見少傅王公所為熊氏女傳其事蓋類予於是悲夫二女之不幸而嘆其貞義之皆過人也遂託言為詩以附傳後庶幾萬有一於女之心乎其詩曰古人重掛劔為不負初心妾身非劔比一諾千黄金誰謂妾無言有言出母口誰謂妾無書有書出父手未見悲益深空房甘獨守白日一何遲黄泉一何逺妾豈不愛生所恨從姑晩衛女先我心適齊不中返㸃易臺待月十一夜作待月月在天待明不待上月明松影來風靜流泉響與客談羲文乾坤入指掌山中本無塵况有出塵想雲崕去我近只尺三百丈歸歟興未䦨月色隨藜杖遺慕為許直賦父死兒未生兒生不知父問母父形容十問還九誤一念自提孩哀哀到遲暮我作遺慕篇悲歌動行路和陶韻何司空燕泉作委心亭於部署摘陶詩中語和韻四首見寄用韻復之眞想摘經曲阿語壯志邁千古盡讀天下書北登黄金臺四顧意曠如獻䇿見天子致身在雲衢喬木凌霄漢落落影扶踈周行數萬里翺翔復縈紆叙遷歴中外令望長有餘横流須巨石公也孫不居渠渠猶夏屋建業亦多魚眞想和陶什不為韻語拘俯仰天地間何方不籧廬遙情摘游斜川語無才有積病我負二宜休五十為親養懇乞江東逰入愛萱草榮出欣泉水流野服聽滄浪近有忘機鷗前時堂中人今為山下丘一拜扶兩僕敢望夔龍儔豈不念上德萬一涓埃酬長揖謁廷陛此事今有不近歩亦藜杖遙情抱幽憂柴桑有遺矩吾當此中求宿好摘行􅂗口語闕上有千竿竹碧影翻堦墀我歸自南省方當靜脩時挈我二三友講斯復㳺斯晝誦掩虛室夕眺摩殘碑古琴弄淇澳賡以南風詞别去三十載徃徃夢見之圃蔬未足歎傷哉草離離西㳺且北覧何以慰夙期雲生志復舊作堂請新規我昔寓白鹿嘗以圖志來叶願言植嘉木綠隂散繁枝媿兹未能賦聊作林堂詩巨然山寺圖用虞邵庵韻古寺據崇嶺亦復設逺關中有苦行僧終歲不下山長松結深靄釐然界塵寰雙瀑落懸厓澗聲日潺湲殿堂棲古佛長有雲半間閣登一縱目目過心自閒朝送白雲去暮迎白雲還夢藥詩數月前夢一人戴唐巾倚石壁坐俯而謂予曰子之疾得地癭服之可愈也予進問癭字狀遂畫予手中予寤而檢之方書未見也遍訪諸老醫亦莫之識近蕪湖㩁司有吏來偶問及焉而得其出處形象并服食方法禁忌越明日有來獻者予感夢之應似有神人主之遂作是詩醉後謝山翁夢中聞地癭仙人戴唐巾飄飄髪垂領口誦復掌畫除子舊疾疢覺來檢草經逢人輙言請爾來數月餘笑我捕風影人從蕪湖來自謂能記省此物出巴陵近始露茫頴不知掘者誰殆如金出礦或將湯液之神功在俄頃某也病中風不死亦天幸林居十五年吾亦愛吾脛從兹矢長服不敢一日屏謝馮僉憲惠文石昔見石如松今見石如竹如松紋在皮如竹紋在肉縱横金錯刀凌亂錦一幅置之山亭中為案比靑玊焚香對初陽古書時展讀問之贈者誰仙人粲山麓欲報何所將寒泉手堪掬石如松皮者在淅江紫薇樓前煎茶寄吳封君濁醪有妙理清茶尤苦心采茶陽羡陽汲泉惠山隂秋水碧如玊百沸成黄金此中亦何味請聼希聲琴陸羽乆僊去千載空遺音盧仝不言法七盌最獨深吳翁二子流清風起山林陶匏介罏竹煎竟還自斟京師一飲我再飲荆溪潯邇來雖褁寄烹事吾誰任報君一罌水撱石仍中沈臨發更致語新火君當尋歌行石牀行石牀故在惠山寺佛殿前成化初邵縣丞性移置聽松庵予以隔􅉹有二老松又移置其下惠山石牀古有之聲聲松子金風時皮休題詩李氷篆千秋并作山中竒山庵之名本縁此石也移來應偶爾遊人玩侮等尋常識者共憐非所止牆西松樹幾百春大圍三人小二人此松此石雅相友乾坤無心物有神二泉山人愛觀物謂物皆然胡獨不立破頽垣遣徃叅却笑他年兩湮鬱君不見赤松子黄石公姓名乆落荒唐中酒酣擊節發清嘯春深繡嶺廻天風寄題閣老費公至樂樓黄閣仙人天上還幽興却寄溪山間横林深處起重屋别有眼界非塵寰群溪東來向西去流到龍溪兩傾注白雲飛盡見三峯政在先生倚闌處乾坤一覧萬古心北南名勝皆登臨子長胷次仲淹思每與山水增高深豈知几案有至樂歐老詩如爲公作先人種樹今數圍槐影重重松落落陽春坐我還清秋靜觀萬物成天游半江露白月照水兩涯草碧雲生洲我行湖東數過此尚憶清揚在中沚病餘偶接季方書世事茫茫公老矣歲月無端白髪多江湖地逺心如何蒼生未起謝安臥溪上徃來空棹歌三門行送劉學正赴陜州劉君景儀司吾鍚訓八年今之陜也作三門行送之三門舊傳即底柱都太僕造而觀焉始知二山近而不相屬頃嘗為予言故因以起興云君不見黄河之水從西來東行萬里到陜郡有石横亘勢欲廻天敎禹鑿三門開百川風雨萬壑雷下孰為之挽上孰爲之推當時神禹何不一鑿去留此險阻胡為哉𤣥敬爲予言神門在中人北際鬼門居南不可濟水爭石闘兩無情地險天生難盡棄乾坤萬古一竒觀節宣亦爲狂瀾計不然下此復有底柱山形如灔澦當江間應愁一倒不復還識者觀風似觀水作人之道固如此寥寥古調數千年靑眼高歌對吾子赤壁圖歌次西涯先生韻為華生雲作長江無聲動吹萬月上東山度河漢東坡詞賦思千秋客吹洞簫如發難興亡有恨客心苦不獨曹吳堪扼腕漢家心腹已摧傷手足安能相救扞猛風東來水倒流南軍北軍忽相亂天公助順不助逆若論成功猶未半華容道逺老瞞愁周郎渡江江有㟁朝宗江漢本無心蜀浪吴潮各分散巴丘哀罷又瘴鄉為國意忘天下患後人弔古對江山坐遣胷中置氷炭洞蕭聲盡客何言似笑老生談熟爛百年水月坡翁心泛泛不知身在竄明朝酒醒賦初成白雪調高歌欲斷西涯居士今東坡逝矣歲星今幾換畫圖流轉到東吳詩句人將史書看華生况是知音人擊節向余三賞歎壽毛都憲礪庵毛公新領鄖陽之命自滁陽歸候敕符於吳於是公壽七十其壻太學生秦君國英請予言􅂟之予病餘荒落無以應塞輙用已􅆗嵗壽少傅守溪公詩韻為賦一章俾汶也歌之以侑觴獻且致予餞贈之𠂻焉汶予甥公外孫也功名早擬登麟閣中歲歸來問林壑臨觀何處不江湖范老文如為公作方今才望誰如公鄖陽節鉞南畿同十年朝野均勞後四省兵民總制中江漢朝宗兩支水公心耿耿眞如此折衝千里笑談餘某也曾聞古君子公無上書稱引年我爲公歌峴水篇羊公杜公各片石更道人間别有仙中原之民望公乆過我山中還飲酒前年曾壽守溪翁侑者罌泉詩一首春來江上多風波船如天上聞公過白雲黄鶴武昌渚試看東流今若何尚書臺紀夢次萬晦之韻許有尚書䑓在臨潁之野其風景予嘗聞諸故老而未之見也一夕予夢至焉寤以告客萬晦之晦之紀之以詩盖于今二十有八年矣正德庚辰予作㸃易臺於惠山之麓恍然如夢中所見故次晦之韻亦以紀事云昔之夢似今之所吾臺誰謂前無古尋常灌莽接松楸突出烟霞三百武青雲有階人可得輕舉尤須藉風伯小池新引露泉清大筆深刋厓石白海天佳氣從東來一滴萬古眞水哉金春玊應碧山靜道人對此方心齋西嶺東峰擁前後一方眞與乾坤乆危厓鐵笛夜凄清城市茫茫失塵垢高丘逺海謫仙詩歌聲入雲雲欲飛先天有易本無畫誰向清溪問㸃為贈東湖東湖來自東海涯到山先拜梁溪祠梁溪先生千載士文章德業眞吾師前公來時未有此我歸方浚吾泉水此時此地復此泉靑眼相看更吾子草蔬一飯正愧予野人忽饋深溪魚􅇥烹入饌肥且碩此事眞合牽聮書泉傍有臺名㸃易昔夢依稀尚能憶高丘逺海謫仙詩歌對滄茫兩無極平生知己主一翁幾回墓草經秋風因之尚論文莊葉遺錄今誰問水東次王郡公煎茶行今之詩伯溪上翁六年為郡聲隆崇一清如水比泉德餘興却慕茶仙風貪夫見公不自省公眼白兮心非瞢詩來遣吏問茶法茶法酒法將無同酒成麯糵過乃敝酒之甘苦茶淡濃竹爐石鼎文具耳妙手只在調和中大才於物無不可豈以一藝稱詩工何時鼎鼐入公手漢室行徵黄次公惠山泉上節屢駐甘棠勿伐何叢叢公雖愛酒不如晉茶乎誰許唐人仝二泉山人愛泉者欲茶每與山僧假芝歌未已復茶歌共喜山中得風雅飲公醇者西坡篤讀書茶經猶不足烹煎未解吾何言願乞吳翁為君告吾泉上人不欲多西推山瀑東江波仲尼飲水别無法此味不知今若何壽華封君七十其子江隂少府入覲過家得稱觴焉請題以祝之文華侍書凡幾年權閹斥逐江南田翰林有子領京薦飄然同上嘉興船事定移家還輦轂清風如水人如玊百年共肅世守之雅稱東藩畫中竹君不見諫垣回首江湖長南極星高北極光向來夷險何足道萊衣春酒封君堂謝王郡公惠風折古柏用杜韻郡公書致郡堂柏珍重眞勝二千石若非風雨起秋潮此地何人敢䋲尺歲寒尚有不㧞者此兩三株何足惜相知相饋惟此物公也清亷心愈白鄙人謝病江水東方爲吾親營壽宫貞節碑成閣老筆鬼神訶䕶靑山空客來勸我作亭子少蔽上雨兼傍風工師求木苦無力得此立可觀成功小者為檻大者棟材之良矣情尤重召伯風能為我留杜陵詩不愁誰送亭前故有兩危柯松可鶴巢梧可鳳公材自合柱明堂厯盡氷霜終大用題畫竹石澗潺潺楚江曲上有猗猗萬竿菉天風時來起衆音如金如玉皆無心縈廻成文妙天下物理相資不相假聽之未足觀有餘春雲匝地秋天虛我行瀟湘數千里此景隨人何迤邐誰其圖者琴川翁造化又在生綃中披圖忽憶舊遊處九疑如烟水東注壽毛夫人見母之母如見母恨不百歲還千秋此心眞似南山石有酒深如東海流毛夫人秦母母德儷中丞眞作友汶也受恩獨良厚果錢藥餌逺勞心衣線誰云不親手礪翁致政方一年夫人七十開壽筵兩階班出諸孫後百里心懸二卣前一詞我為汶稱祝二老高堂雙碧玉庭蘭有茁桂亦芳鳳在梧桐鸞在竹題畫千峰萬峰雲復雲瀑布上自天河分峯頭五老鎭長在􅊯􅊯鹿鳴猶聲聞問之此境是何地無乃廬麓鄱湖濆平生愛此難再到空羡畫筆超塵群世人笑我太迂癖有眼錯認南康軍蘇門少室亦曾厯卅年别後勞心魂黄樓滕閣近城市大觀祗在江東奔畫中所見皆不類烟霞入望徒紛紛君不見跫然空谷慰岑寂相契于心不于跡楊郎擊節似知音大軸巻還江上客題呉従周狻猊圖厖然大物名狻猊丹青何處貌得之曾聞宣德有此貢流沙萬里牽來時茜紅􅉊毺金鎻絡壯士如雲共揮霍銅睛鐵額照上林守有嗇夫拘有柙熊欄豹檻海子傍狎視群獸如群羊尋常莫試縱擒手此物驕悍無能當上林風高秋日暮野心應爾關西路左鉗右掣不得行一吼乾坤為誰怒今人豢虎古豢龍雲沈風鬰皆無功狻猊狻猊嗟爾非龍復非虎飽食兀兀將安庸君不見孝宗𢎞治初春秋西人貢獅南海頭數行詔下直遣去中國聖人歌我周擒虎行柱史朱君士光按治至宜興下擒虎令三日間得一豹二虎謂虎之首骨可為枕以祛風也逺以致予且曰願得擒虎行以旌某之功君之功猛於虎者大矣元夕燈下漫作是詞以寄之一日擒一豹兩日擒兩虎繡衣使者到荆溪三日盡知民病苦使君詔縣令縣令召獵戸賞格高懸網新補盡道使君仁且武使君謂父老汝邑昔有周處公力與蛟虎爭長雄不知名落三害中斬蛟殺虎翻然改行収竒功今人古人性本同彼哉名在丹書欲焚者能言擒虎自效吾其從甲能獨當乙併力所不汝貸有如此溪石一鼔再作聲如風雷山谷響應林木摧醜類欲逃安徃哉一虎復一虎一豹復一豹從今日日聞飛報君不見山南山北行人多爭和使君擒虎歌何處鄉村愁政苛兩節婦詩為毛黄門賦姑哭良人十載前婦哭良人十載後夜深星月入空帷一盞青燈兩相守姑前孀居二十四婦後孀居一十八誰言人事有易難兩節相成竟頏頡姑心竹有莭婦心井無波文章師傅史遷筆姑兮婦兮千載名不磨許道寧秋山晴嵐圖春山嵐重秋山少宿霧浮烟亦昬曉千峯萬峯爽氣生望入虛無俱縹緲畫圖到此須寫眞許君筆力眞能神丹丘博士有巨眼謂是晚年尤可人題詩更得鹿塲子萬里秋旻雙决眥本來靣目見蒼厓籠罩誰加青與紫乾坤無心四時改萬變消沉一眞在古人觀物復今人秋色無端幾千載君不見鄒君得此愛如玉長巻裝潢更犀軸何當携上九龍巓南望湖天送孤鶩擇庵贈周用仁用仁初號澤庵予為易之以擇十一年於今矣今秋之仲吾從子勳德其起危病也為擇庵圖請予詩以謝勳病時其世父國臣及其父國政荒惑不知所出用仁謂予曰此固易為耳飲吾藥三日後當復常矣旣而果然用仁於是有仁者之功矣非其初之能擇何以與此不知用仁以為何如時高子明在坐為予㸃韻擇庵擇術如擇鄰家傳醫道能通神庵中讀書二十載養得滿腔多是春春來沴氣方流轉擇庵出門無近逺獨將一㸃天地心厲鬼聞之亦遄返吾家諸子婉清揚一疾偶到沉痾鄉擇庵謂此不足治坐令二竪違膏肓我為題詩當金帛聲動東阡與西陌杏林紅映橘泉清回首龍峯片雲白雙松圖壽司徒秦公一春三寄壽公詩未盡平生愛公意清秋忽展雙松圖於我初心乃深契喬柯落落生澗阿下䕃流泉上雲氣萬古長撑雨露天四時平視冰霜地問誰作者宋季人一幅生綃墨尚新題詩千里應尊酒歲寒標格當靑春君不見司徒嘉績奏三載只尺天顔眞簡在麟袍玉帶照貞姿四海人方仰風采喻太安人七十秋官郎中純孝人慈闈中有希齡親昔從北闕乞南省板輿迎共金陵春春光媚人鄉只尺輿出都門指無錫翟冠象服對諸孫百有千年未終極山花有芳溪有鮮野人時送來堂前郎中東望拜南極九峯靑映滄溟天司㓂所司彛典繫平反為仁斷為義郎中持此答慈闈萬古萱花一生意君不見西望瑶池降王母畫圖今乃在人間人間懿德不勝述一覧春風生笑顔爲莫臨安曰純題畫千峰亂􅍓岐山靑秋天悵望開翠屏乾坤何處下鳴鳥野人漫謂山雞形姫公召伯日以逺世道江河幾流轉生綃數尺懸我前萬古愁懐一消遣南溪之上桐樹林君家樓高溪水深而翁登我歌且嘯有招不來傷我心君遊江湖倘竒遇黄陵廟下舟曾住雲隱蒼梧柰望何獨有東流可分付耆英圖歌壽錢東湖八十宋之洛社唐香山清風長在天地間元豐遺像十三子千古勳名問青史西都回首但靑山五百餘年那有此檉社曾臨鄭奐圖風流今落錢東湖東湖晚隱東海上天送烟霞入屏障年來大耋慶生辰嘉客登堂還揖讓唐人蕭散宋人雅異代衣冠不相假君不見文潞公富韓公好賢眞有緇衣風曠世相感難相逢前有香山居士後有東湖翁讀書堂在虞山東虹飛丹井湖波紅千二百歲逍遥中春滿東郊圖贈㳺二尹東郊昨夜春風起千挺琅玕烟雨裏籜龍隠地驚新雷踴躍出土如相催舊榦凌雲方未艾新枝頭角居然在章江西來浪捲空此君得水應為龍丞哉負君君自玉哦松之餘無不足我昔知君今更深為君題畫輸君心君不見息齋墨妙君須識虛心如竹貞如石惠山雜歌六首踏踏兒郎從老翁惠山寺裏看新鐘問道新鐘幾時撞九秋霜落樹頭紅簫皷迎神神下山香煙滿路送神還安得村村無病苦靈泉不動廟門閒聼松庵裏雙古松松下石牀蒼蘚封洗却苔痕看古刻志書傳是米南宫漪瀾堂下水長流暮暮朝朝客未休縱有茶經無陸羽空教煎白老僧頭登登山路轉山阿須向仙人洞口過澗水滿時青草短巖花深處白雲多南祠忠定北文襄千古青山兩瓣香莫問前朝松栢樹祗今何處有甘棠容春堂續集巻一
