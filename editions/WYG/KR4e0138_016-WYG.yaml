body:
  text: 容春堂前集巻十六明邵寳撰碑七首南樂縣倉頡廟碑銘南樂王矦汝昭為邑之明年改建倉頡氏之廟廟成樹碑中庭以麗牲焉因刻嵗月而屬寳書之寳未嘗習古文其何敢執筆于斯惟頡為黄帝史臣實始造鳥跡之書厥後變為古文古文變籀籀變而大篆而小篆而𨽻𨽻之變為真為行為草由今之真行草而視古文則逺甚矣然其形聲之類皆頡之遺也顧雖不敢抑何能忘贊頌哉夫頡始制文以代結繩萬世宗之宗之則宜祀之然而后稷以榖勾龍以土萬世通祀而頡也不與烏乎頡而上有伏羲氏伏羲氏八卦文之肇也頡而下有仲尼氏仲尼氏六經文之成也頡之功孰與二聖故萬世知二聖之功頡不與焉豈其下於稷與龍哉或曰微頡斯文亦有制者世運之相承不得不然頡奚其功雖然頡為之是頡之功也况飲食必祭示不忘本古之道也而操簡握管記事立言者獨可以不知頡乎物原其初事究其所從始頡既不得通祀兹其故邦廟其可不崇王矦之政於是為大矣矦名徳無錫人銘曰維魏之西維衞之東有神斯宮曰倉頡氏維文之宗矦行其庭慨其蕪落仍而有作宮以妥神贊頌在碑惟頡之功惟天之機惟物之象惟民之宜前羲後尼建立三極頡於其間亦克有力相彼鳥跡在古猶今頡神雖亡其存者心斯宫斯享尚時歆之漢愍帝碑世有存之足以為亂賊之戒者君子存之有不毁則無以懲夫人而示天下後世者君子必毁也於其毁也而有所易黜其不正以歸於正者君子則以義起焉此皆關於萬世之綱常而不專為往事之褒貶蓋天下之公論而非一人之私心也古今簒竊之雄首稱曹魏其惡有不待論者始其為禪受也實在許之繁城寳自領郡得逹觀其故都有壇焉曰禪受皆誇詡之迹有碑焉曰禪受皆矯誣之詞千載而下指而笑之讀而唾之者不謀同心不和同聲此所謂存之皆以為亂賊之戒者存之可也其地有廟焉以祠魏文南靣帝服儼然臨之雖易姓改物彼亦有不能泯者然當其親為簒竊之地而舎此與彼則凡彼之所謀以欺後世者今皆墮其智計之中吾恐儒先筆削之㫖終託之於空言而亂臣賊子將益無所忌此所謂不毁則無以懲夫人而示天下後世者毁之可也壇固存也碑固存也而獨毁其廟則它日必有復舉以奉之者卒亦何貴於此舉動哉謂宜易所祠以祠漢之愍帝而其臣孔融配焉彼以其新此以其故若將驅而逐之撥而反之使奸雄之徒不得一日立乎其地此所謂於其毁也而有所易黜其不正以歸於正者以義起焉可也愍之孱弱勢同寄生然猶天下之君也融雖意廣才踈而忠言義色至不容於賊操亦足以愧夫北面稱臣上表勸進者矣帝不稱獻而稱愍從昭烈所諡且漢之君非魏之所得諡也凡此皆所謂以義而起者烏乎君臣之分有大防焉順逆之際有大法焉彼奸邪之所不敢動於惡即動焉猶必有以文之豈獨懼夫天下之將攻之哉亦以大防大法之所在雖後世有不得而逃也若曹氏之於漢是也然當時郡國之中既無一人仗義執言揚旗伐鼓以討其簒竊之罪而在廷在野又無一人登西山蹈東海以明大義於天下蓋畏威附勢無足恠者至於後世之君子亦以空言無補因仍茍且視大防大法而不一顧念焉抑獨何哉存其所宜存毁其所宜毁而易其所宜易此吾軰讀春秋學孔子者事也况職在守土乎是故寳雖不敏不敢讓雖不韙不敢辭常州府修城碑常於江南為望郡郡之有城創自晉太康初逮後唐天祐間始築所謂羅城者我髙皇帝初平江南命御史大夫中山矦湯公和以重兵鎮其地乃改築新城周十里有畸視羅城損五之三今城是也然多括用舊甓未底于固及海内既定撤去鎮兵城壞不治者於是百五十年矣成化間都守孫矦仁嘗修之乆而復壞間奉修理之詔上下具文知深慮者亦鮮蓋郡境南接于南京東為三吳之門又東北距于江又北西通于京口實惟江南要地然自平時觀之則所謂腹裏也因循相視無足恠者正徳六年冬監察御史渤海李矦某來守兹郡登而觀之毅然欲修焉時北方群盗方馳突中原論者率以長江限隔邈乎惟風馬牛不相及故有以過慮議矦者矦曰吾豈惟斯盜是為哉有備無患古之道也民縱吾怨吾固當任之乃具白于廵撫都御史某公某廵按御史原君某清戎御史某君某廵捕御史某君某厥既得報則與同知羅矦某通判陳矦某温矦某謝矦某推官粟矦某協心經畫擇日興事時則咸謂之斷財以産率為白金若干兩功以力授為徒庸若平夫事以才任為統領若干人程以籍定寸度尺分各有差等凡若干丈時則咸謂之均率作自躬懲怠勸勤朝夕弗懈時則咸謂之勤自始事三越月而畢樓櫓扉閎濠陴闉堞髙深整宻視舊加倍屹為壯觀東西行者皆稱美焉時則咸謂之敏然過慮之議猶若未盡息者未幾北盜以窮故舎騎入江奪諸關東下越京口是來暴于孟瀆于魏村于申港合攻江陰門焉以動我部治將有窺我江南之勢警報流傳民大驚擾矦曰我城固矣吾其親率吏士民兵拒之江上相而禽之矦至江隂運謀倡力竒攻正守以折賊衝賊既衂遂引而東又泝而西越月餘再至將殊死决戰矦復如江隂備禦益嚴賊不敢邇於是官軍適至提督都御史陸公某遂由江隂發舟師殱渠魁于狼山賊乃盡滅當是時使城不先完則矦將自守不暇焉能出百里外以抗劇賊即出焉日惴惴内顧焉能周旋展布有兹成功且江陰既全郡斯固矣常郡固則江浙諸郡斯免於驅突矣夫修一城而蔽江浙千里之衝矦之功其一郡之功乎君子謂矦知幾能豫於是乎哲雖微冦固將頌之蓋其功之所徵者逺矣先是城成郡之大夫士謀所以紀矦績者乃因户部郎中劉君乾軰上京師致書屬為記寳時奉詔省母南還受書于途方將以不敏遜既而抵郡適覩厥成敢以見聞序而詩之俾刻諸石其詩曰常維大邦望于江左東浙西淮為喉襟所有城巋焉乆壞弗修衆方是玩有識以憂越歴三紀功歸我矦矦始令民民則譊譊謂矦我浚謂矦我勞勞我筋膂浚我脂膏矦曰佚道彼則曷知乃令乃期親登以麾民趨矦事孔力且時矦曰勤止手拊摩之城既成矣民則寧矣謂矦平矣謂矦明矣天塹湯湯突有巨冦門我江邑將襲我後矦覩我城腹心在斯我拒于江運我體肢載冦載却王師適來叶出竒應遽殄彼鯨鯢矦歸視郡有墉有池斯池斯墉民心攸繫國我壯威士我増氣矦師于江實維長城先幾是圖神相我誠重門禦暴自古在昔四方底平矦與有績憲憲我矦政則多有城哉城哉其與不朽慧山浚泉碑銘正徳五年春三月錫人浚慧山之泉秋八月功成先是正統間廵撫周文襄公嘗浚之其後屢葺屢壞至是而極縉紳諸君子方圖再浚而寳歸自漕臺適與聞焉既求士之敏者董厥工作乃與匠石左右達觀究厥敝原為新功始詢謀僉同用書告諸望族各助厥貲而後即事凡為池三為渠二為亭為堂各一而三賢之祠故在泉上今益為十賢而新之縣大夫請助以菑故謝焉至是凡五閱月而泉之流行猶前日也諸君子既觀厥成則以記命寳惟慧泉為天下髙品尚矣然其來也同源而異穴或發則汍或發則檻三池匯之而石渠隂貫乎其間蓋約濫節迅以成泉徳古之為是者可謂知水矣是故上池淵然中池瑩然下池浩然為觀不同而水之狀於是畧具粤自陸子品之之後觀且飲者日衆以盛甚者驛致長安通名嶺海之外夫豈偶然乎哉雖然時而浚之則存乎人譬之天道有燮理之功譬之人事有更化之理浚之為義亦大矣是以君子重圖之今是役也有渠以通有池以蓄有亭若堂以為之觀無侈無廢克協于舊其規畫所就論者謂邑有人焉寳不敏謹以嵗月勒之於碑復為詩以歌之總其費為白金若干兩督工之士為龔時亨楊正甫莫利卿其助之者之名具于碑隂凡若干人為書者吳大章而往來宣勤則潘繼芳及僧圓顯定昌云其詩曰邃彼原泉慧山之下維僧若冰肇浚自古謂配中泠允哉其伍我錫彼金有子維母孰不來飲孰不來觀贊嘆咏歌井冽以寒孰閼我流石崩木蠧匪泉則敝敝以是故人亦有言清斯濯纓棄而弗滌豈泉之情錫人協義與我浚功維物有理變極則通維雲蒸蒸維石齒齒泉流其間終古弗止有徳匪泉則時予之耻我詩于碑以頌其成泉哉泉哉與時偕清潮河川石牆碑銘潮河川古北口邊關也其險以水關之北舊為棄地今司空湯隂李公鐩昔以亞卿兼御史中丞經畧諸邊始因山作石牆為内外限水流其中與牆相際牆内之東南有堡以居戍卒號曰新營君子謂疆圉之守於是為固然是堡去川纔若干歩嵗六七月沙漠諸水絶川是來奔放横決堡受衝激居用弗寧牧耕兼病冦惟不至至則罔禦正徳辛未春今御史中丞蕪湖李公貢以整飭之命來顧瞻起憂思終司空公之功乃謀於分守太監呂公安暨叅將都指揮僉事章君縉屬某官某等循川之東壘石為南北牆若干丈又折而西為牆若干丈屬于山麓約川南流自始事暨訖功不越一月為費白金㡬百兩或以其事之細而功之易也竊相謂曰此何足為有無哉既而大水至遇牆而止則又相謂曰壯矣哉是牆之為力也水不我貽害而我設險繼自今即有冦其若我何分守以下諸君子樹石川上用紀公績以示乆逺謂寶知公使來請銘吾嘗聞𢎞治間為潮河之役者既大且難而功弗時叙人之始而疑者非以此乎不知天下之事為大于細圖難于易其道尚矣而人或忽之非公察㣲知要其孰能與於此然其初也雖易而為謀甚艱其究也雖細而為功甚鉅蓋於司空公有光焉揆之古義固當特書之公學通古今而恭慎端雅望在中外此實未足盡公而不可謂非公事也乃作銘曰維石斯牆維水斯坊洪流溢川是距是當無我毁傷誰其作之功不可忘人謂中丞斯坊斯堤自北而南復東以西尺度有稽惟川是依不我為壑固哉山溪彼視我險自我則夷川有恒流弗牆曷害突其來如厥功斯在維司空之成中丞之載中丞受命殿我北門備禦有武綏懐有文耆歌童謡溢我見聞牆哉牆哉亦與永存華氏墓門碑銘錫山華氏有以義旌門于墓者曰某處士諱某字仲諄於是其卒若干年矣曷為旌之蓋𢎞治壬子之饑其孫曰守吉者出粟若干石助賑于公例得書其門曰義民守吉謝不敢當則為狀請于廵撫都御史佀公曰吾祖某義人也吾斯舉吾祖之遺也願輟吾門之旌旌門于祖墓公從之夫旌門于墓制歟非制也非制而從之何居為其能崇祖也凡崇祖者則從之乎崇祖而不違其實斯從之矣春秋書諸侯葬獨蔡桓舉爵說者謂蔡季之賢知請諡也故人臣以不誣其君為忠人子以不誣其父為孝孫之於祖猶子之於父也若處士者慈良樸茂承其祖訓而廣義于鄉嘗減田租以寛佃力歲為粟三百餘石其它事稱是者尤衆然其生也莫為舉之其沒也莫為表之至于其孫始因助賑之旌而請門于墓所謂義民云者則固其所當稱也夫是之謂不違其實從之不亦可乎雖然曷為不請于上荒政也荒政之不必請也奈何荒政非出於得已茍非得已則矯擅之罪且猶甘之古之人有行之者汲黯韓韶是也况祖孫異名而同義門墓異地而同旌舎此就彼曾無加損而廵撫又以便宜行之乎是故旌于門制也旌門于墓非制也義也義以從民而不外於制惇彛成裕一舉而衆知勸雖未請猶請也君子謂是門也可以傳矣不可弗志門成於出粟之幾年甲子守吉嘗請予記至是載請予不能辭既叙其事遂為作銘守吉名禎以字行平生好義不愧其祖事具錢主客所為傳云銘曰宅里表善維周則然亦有封墓曰崇忠賢忠賢尚哉善著者義華以孝稱維義亦世仲諄維祖守吉其孫孫孫去聲義名請歸于尊尊弗茍推義則多有匪墓樹門曷圖厥乆中丞奉詔撫我南畿謂是可從我有便宜有伉斯門松楸是翼上榜下碑載其義蹟孰無義心在昔猶今遐孰終遺幽孰終沉我銘昭之百世其欽膠山重建宋丞相贈太師諡忠定李公祠堂碑寶既祠忠定李公于惠山尚徳書院而膠山寺故祠復以重建之成來告蓋鄉人安國為之頃常走書請記于淮隂漕府寳有感焉而諾之於今期月矣惟公為宋名臣寳自弱冠即知景慕有執鞭之願比讀史傳乃知公邵武人自其祖始居吾錫於是心益嚮往之𢎞治十有三年秋寳以提學命便道過家往謁公祠至則廢壞已乆僧以木主寓泉亭上肅寳再拜而退當時欲圖修復無所於屬獨陸永思者捨田七畝以為供具蓋慨嘆者乆之今兹之舉實吾志之所欲也於其成也烏得無言哉按郡志山在邑東三十里梁太清初寺於其麓宋紹興間公請為墳刹改崇親報徳之額嗣是遂祠公焉其取重於世實以公故則吾錫之人修而復之固以義起禮者而或以公非錫産為疑不知公家於錫由祖以下閲歴三世其父殿撰公夔暨母吳令人先後皆葬湛峴山公廬墓其地手植松栢萬株詳見公父母墓銘及公行狀蓋公生長宦學於斯凡若干年最後乃有祠命因薨於福故其自稱必以梁溪又以名其文集由是觀之公為寓賢邪為鄉先生邪蓋嘗考公㓜有大志見於登城禦宼之時而宣和大水之論知道君子如陳了齋者深所期重至其立朝有識有才有權有量而本之以忠謀出之以正氣在靖康竭扶持之力在建炎舉修攘之政在紹興建恢復之議不幸而屢見忌沮則其所以復君父之仇正華夷之分而上無媿於聖賢者不過章䟽計畫之間而已然於此有隱功焉而非君子莫之知也後數十年錫與邵武並舉其祠至于今廢而復興則是非之公固無古今之間而天定之能勝人果不可誣也審矣不然若秦賈之子孫固有易譜匿像避而之他者亦獨何哉第兹祠之復僧既無力而大夫士之有力者亦莫或為省乃俾安氏獨任其費此亦理數之極若天有以啓其衷者爾昔永康徐元徳敎授邵學首議建公祠晦庵朱子為記深嘉予之况國無元徳之責者哉國又欲割田十有三畆與陸氏所捨同𨽻寺僧為春秋私祀之需顧未有主獻者君子謂宜謀於公之族裔焉茍卒行之其事益可尚已寳晩且愚無晦庵之筆以論著公之盛烈而因以見修復之勤特為書其麗牲之碑用紀嵗月且為迎送神詞俾祠公者歌之亦少以慰公云爾祠之建始於正徳四年八月六日明年九月九日落成時寺僧可清等奉祠事其迎神曰公何之兮勤我招望雲旗兮凌江潮公蟬冠兮綘服指舊丘兮逰敖朝騰駕兮水裔夕弭節兮山椒西有惠兮東有膠潔我尊兮醇醪跂英靈兮未下闐歌聲兮鼓簫宛懷公兮心勞其送神曰公將去兮何從望閩山兮南東公重帆兮雙楫駕海濤兮天風睠舊逰兮斯在手嘗植兮萬松惠之泉兮膠之峯儼翼翼兮新宫靈倐彼兮忽此雲廻翔兮太空嵗復嵗兮來降叶容春堂前集卷十六
