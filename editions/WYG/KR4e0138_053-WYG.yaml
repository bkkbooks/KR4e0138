body:
  text: 容春堂續集巻十七明邵寶撰書簡五十首書簡與浦文玉書三月初聞報音以久屈少伸甚為桂巖喜之既而以桂巖之所抱負與僕之所期望者竊論之則又有未滿焉然尚有一著在吾知吾言之不終負也世卿企説起明還三辱手書雅惠極感愛念㑹老母疾甚賤疾亦發作雖嘗薄致賀忱并短柬託令郎附上然亦遲矣某退計將遂但衰颯閒居平生知己如桂巖者又逺在天上言而無質倡而無和其為私恨亦甚不淺或者桂巖亦有此意邪省著實而留心嗣事謹聞命矣學史未敢出竊效古人三瓦不成之意高置之閣幸勿語人以重吾過也殿元之報秋中側耳以聴聞有良便力疾布此亮之亮之令郎道徵自高第後區畫應酬縝密持重學問之名益著恐所欲聞餘惟為斯文自愛不具辭暢侯致鄉飲酒饌簡昨辱遣庖人致鄉飲之饌某以禮以義不當與於斯燕而敢受斯饌哉輒已返飱敢此附謝所謂禮者以分所謂義者以徳不敢為虚讓也某庚午致仕還高大夫嘗召之某有詩辭之非今日為然也亮之亮之上洪洞韓司馬去秋巡按東君過敝邑某方卧病東君固欲相見親至内榻首稱執事垂問勤惓諄藹如復侍几杖某也不才昔忝屬吏之末違逺以來愧負尊教多矣而先生長者顧猶記存如此哉感極生愧莫可云喻兹因東君還朝輒附謝忱外初聞東君言感而有述别楮稿呈幸覽而擲之餘惟為天下愛重以享平格之福謹啟不宣與吳輅昨聞瀾庵言汝乗欲以令弟墓銘見屬在世交固所不辭但此文當令翁自為之蓋父子之情青年夭折深痛極悲與夫幽行細事行於家庭而未露於外者皆非他人所能道也古之人如昌黎之於滂挐今之人如西涯之於先同皆自為之其文故在讀之使人悲感非自為之何以至此幸以此意達諸令翁揮筆成之於恩於義於是乎盡吾初聞葬期即意其然矣非今日欲辭之而故為是言也亮之亮之復顧與成書昨辱枉顧言及推封之典此莫大之恩為人孫曽者之所深願也但僕以老母衰病不得已而有乞本求終養而䝉許侍養越八年即家而進尚書再辭而存問及於老母前此皆未之有也某也庸陋方以叨竊為愧為懼而敢復聞此言乎執事之意厚矣盛矣已銘之心矣願更勿以為言倘有言者亦望止之先曽祖存一先生博學守禮鄉人至今誦之干著令而叨異數九原有知其能安乎昔劉東山忠宣公官三品時其子自家致書求乞恩廕叙公笑曰此固國典然待賢大臣及有功者吾豈敢哉某時在坐未嘗不歎服也況若今日之事出於著令之外者哉某則何敢某則何敢亮之亮之與吳廉訪書前日顧與成所云推封之典所謂不得不可以為悅者是日至晩而見定明日始決辭之愚意具復與成書今録奉覽恐執事之在念故也為人臣者不以非所當得而加於君是為忠為人子者不以非所當得而加於父是為孝吾讀春秋聞之素矣雖有他說不敢聞矣不悉奉寄司寇見素公簡顧郎中還領詩教繼而林僉事至特致垂問之命先生何惓惓於鄙人也起居之餘敢附以謝聞寓朝房言者曰不久將復辭去先生以禮義為進退風采動天下行將納約塞違上輔君徳言人之所難言不特邦禁是治其於邦禁必將信道詘邪執人之所難執以答天下之望不久之志其必不然某不敏敢附以告惟先生亮之老母過夏無恙先生之所欲聞也敢附以聞謹啟不宣答王郡公簡二首答書後舊患濕氣忽發作閣足據榻乃得卒業公詩遂一一批評如別録謹以附納公古循吏也故其為詩往往上希古人凡此諸作有近杜者有近盛唐中唐者有近宋諸名家者晩唐及元人無有也但中間時出今人句語有志於古者宜一切去之以求近古一字未鍛必鍛之一句未調必調之久久成熟有不為苟為之當前無古人矣雖然選詩詞意有不可入歌行者歌行詞意有不可入律詩者蓋古今之別如此以古入近體可也以近體入古無乃病於雅乎高明於此聞之熟矣某辱知己不敢不盡愚耳諸所批評亦惟率一時之見信之疑之皆不可輕亮之亮之又再辱誨劄仰見惓惓愛厚之意康侯之說可謂老成長逺之慮矣但止不分門路亦未足繫寺僧之心須買田數畝與之俾日供灑掃嵗任修理申之以官法重之以刻石庶㡬可久耳二門已完完呈亦遞縣矣雷丞攝篆政頗可觀民亦頗服吾正不欲以此擾之彼亦相知者多吾之不欲擾之亦猶不欲擾執事之意也昨至山中口占二絶附上一笑擲之門刻之作専俟發下以圖嵌石於壁此則千金之惠也至懇至懇外舊稿數首附覽亦可一笑耳不具復李巡撫簡即日惟台履清勝甚慰瞻企風雨之變事關天下而江南尤切執事江南之司命也諸疏所陳某也望之久矣兹領台翰及副藁深合愚衷固亦輿論所在也讀之起敬讀之起敬水功告成民得息肩矣而執事猶惓惓在念譬之用刑其所謂得情而哀矜勿喜者乎仁人君子之用心固如是哉所諭輓詩當勉執筆詩成之日容具藁上使旋輒此奉復伏惟亮之不宣復雷少府家童還聞欲有所處以為巷門之助者盛意深感之但執事以京朝官左遷外邑今奉臺檄攝我邑事操持施設甚服人心吾方望其大振治官之體以警流俗豈敢以山林迂僻之事重累清徳而招怨取謗於人哉一夫一物不敢相瀆實以是故處助之念幸黙已之若已施行而僕辭免焉又恐仰拂尊意不若泯於無跡之為貴也自丙辰至今三十年間僕以興作辭於官府者多矣今書藁具在別楮奉呈如賜覽觀則知吾今日之言固平生之志也亮之亮之柬喬太宰自執事入朝逾年僅再奉啓實惟邦治政繁不敢溷瀆之故非傾仰之情殊於留都時也高明必能亮之近者福建僉事吳昂還自進表備述垂問懇欵感慰之餘因舍親夏如山便輒此布謝老母衰病殊甚但餐進碗粥是以僅延喘息某也無能為力日深愧懼不敢不告夀藏石門將成欲乞大篆竢徳之邱如碗口大四字以為千古光重不知近來亦執此筆否破例而慨惠之託九峯公寄下至懇至懇餘惟為天下珍重是祝復馮廷伯柬讀筠谷賦知公之才之雄偉奇麗焉讀白沙言纂序知公之識之超邁圓融焉讀元始剰語知公之精思妙契種種出人焉公之所稟何英邁宏濶如是哉敢不歛袵敢不避席青燈獨對輒敢提之鈎之命家童楷注原藁以復有一二鄙見亦不敢不附也太極之論大矣朱子曰萬物體統一太極又曰一物各具一太極知其體統又必知其各具者而後太極之理可全也儒者之論固如此為佛為仙亦存乎人而已矣固不必强而同之也高明亮之若欲刻梓以傳則纂要序宜首焉筠谷賦次之要語序又次之野朴序又次之南海短跋不録可也剰語更須參伍考訂複者去之前人所已道者去之雖未道而言涉戲侮經傳者去之言不必多惟其精妙而已矣況謂之内學方厭多言政不宜如是喋喋也雖然此自鄙見而言也不知高明以為何如柬少師石齋楊公某罪逆深重不自隕滅上累吾母久病纒綿竟至大故仰負聖明曲容侍養之恩優賜存問之禮履地戴天無所喘伏顧以送終事重不敢即死兹將以冬十月朔勉圖襄事惟是闡幽發潛託之貞珉以為不朽圖者舎大君子有徳於不肖者又焉告之念惟昔者嘗以先人隧道之碑干於下執事矣母以坤從之徳不敢立碑亦不敢再有所瀆倘辱惠念愚誠俯廑大筆少采吾母事行於先人碑文中畧著數語俾合祔之後同垂不朽某也不孝之罪庶㡬逭萬分一而執事之大徳真可與生成者等矣荒迷中言不盡意謹託舊僚孫九峯及吾姻友秦國聲代道衷懇伏惟亮之外具菲儀不敢言禮惟以侑緘而已更希叱納某無任悲哀惶迫之至謹啓不宣復莫藴卿簡令兄繼令母夫人而喪賢昆季為服甚難禮曰斬衰之喪既虞卒哭遭齊衰之喪輕者包重者特又曰三年之喪既練矣有期之喪既葬矣則帶其故葛帶絰期之絰服其功衰此皆謂既葬且練者言也今母喪在殯而兄喪繼之恐難從其說聞既製齊服而哭之矣則反斬衰之服禮也喪既有主藴卿等乃衆主人耳況古人拜賔不必於殯宫為衆主人者拜於外寢之前可也惟有事於兄之殯宫則服齊衰畢事而出則斬也固其所也服反則杖在其中矣非拜弔兄之賔杖烏乎而可去也男子重乎首則要絰為輕或畧倣古人輕者包之意帶齊衰之帶弔賔已則止其亦可乎昨㑹南沙令叔亦嘗以此告之兹得書問輒以為復初聞令兄喪時吾不勝世誼之感至今猶怏怏無已哀次中弔書未敢發也亮之亮之不次請銘於守溪王公啓春中辱枉駕弔奠先母不勝哀感之至兹者墓事苟完卜以冬十月朔勉襄大事惟是幽堂之銘必得名世之筆足以信今傳後如執事者庶㡬可為先母不朽執事以斯文垂念引進於某者多矣久矣去嵗貞節之碑之請既獲不靳於母之生前發潛表微寧忍靳於死後而不以慰不肖之望哉昔韓昌黎於太原王公既誌之復碑之不以為煩先母雖不敢上希太原而區區借重執事之心固不減其子之於昌黎也敢援此以瀆惟執事矜而圖之荒遽不次答毛夢哲日吾之請文於令先大夫三江公也實以公名徳文章重於天下而蘇常比境有同鄉之義焉且昔在文正公門下相與周旋數年知我實深誨我實多先母之表固有不能不屬於公者既發書而聞公疾蓋日虞之鳯山公書至則亦謂然未㡬鳯山又託其撫州兄語我曰公雖疾一聞吾言即慨然許之方用自慰家童書至自京師謂公得請南還書幣投於楊村舟中於是日問郵人將伺過此衰絰申懇於舟次而吾友夾馬營之書至矣烏乎公之不夀天下之慟也吾文之不得命也而何忍聞幣之返哉況病間而諾鳯山力疾而道受吾書公情厚矣雖文未刻石其刻諸吾心也深矣吾友雖致之吾其能受諸請遂以為賻既面語使者恐其未能悉吾言也輒此為復喪三年不弔禮也吾將附諸曽子子張之義望柩而一哭焉行即至矣寄陳郡公近辱臨弔不勝感慰苫次中姓名不祥不敢具狀稱賀已面謝不敏矣側聞初政嚴重為民造福之地端在於此即日江南恒暘極矣執事遍走群望祈禱精誠吾民罔不聞知罔不感戴更乞留意於囹圄之中察其疾病淹滯各為之所勿謂一人一事不足以上干和氣也況小小災傷奏報尚宜早行如此大災郡縣親民各宜徑奏若待申達撫按總類轉奏不無遲延致誤覆勘緩不及時民病日甚雖有智者不能善其後矣執事以古道治郡某雖憂居輒犯禮法私於下吏惟執事推廣而速行之吾民幸甚荒遽不次亮之亮之簡巡撫李司空即日伏承都斾經臨敝邑某竊伏苫芐加以旱毒之餘瘡瘍為患不能匍匐道左稽顙百拜以謝前日臨弔之徳敢謝不敏執事憂勤為國雖無時不存諒未有如今年者今年之旱耋老之人之所未識也始之一春之無雨而三時之無雨繼之六月之無雨又繼之故至有近秋不蒔者近秋不蒔則終不蒔而已矣地去河逺車戽雖勤而水不能達智窮力盡坐以待荒此豈人之情也哉是故瀕河之地尚有可觀跬步異狀至數百步而極矣岡麓不必論也執事其必聞且見之矣伏惟大展經國之䇿大者疏聞待報小者便宜施行少紓東南億萬蒼生之苦以救國家所謂財賦之區者其奏報分數必從實而極言之以為計司遞減之地蓋凡益之道必自下始執事其計之熟矣而區區復以聞者老生常談固事理之所在也某近憂先妣襄事而遂及於逺者大者不於執事告而又誰告哉越冒禮法悚仄尤深伏紙惴惴復鳯山司徒家童回伏領台翰捧讀之餘再聞口述尊諭知執事體念我苦情自一人以下無不為之懇達委曲周至雖一時詔㫖槩以大臣體面未遂所圖而感徳之私則無窮極成我之恩與生我等公之謂矣然天下無不拜之官而積疾在足無不扶之拜除闕謝陛見決不能外只南京望謝諸禮亦難勉强此情終當再瀆九重始終成就不能無望於執事也令郎來輒此道謝北向長揖以代百拜伏惟亮之復毛司諫式之近辱枉顧以郡公意命作道南書院記此文題目甚大非所敢承而郡公及執事之意至専且切又不敢不承也況病餘情緒尤難勉强別後即執筆具稿凡三易而未能成章兹用録呈願與高明圖之幸指索疵瘢明白示下俾稿出之後不為大方取笑是亦執事事也若但為形迹不肯見示則豈所以望於執事者哉正學編節略編次得體只如此刋行足以為書院増重不必廣求詩詞效時俗之態反損雅正之體也凡書之刋不在多寡求其允而已矣秋暑作惡力疾草草不共備幸惟亮之正學編節略小引序事而又嚴正暢雅誠與題目相稱三復之餘竊有管見輒具于後請尊裁之柬管明府五首今日辰刻傳言執事將行重陽存問之禮於僕斯禮也春初朱巡按士光有疏為我代請休致所乞恩典數事而存問與焉疏既上而本郡公文至臺乃以即吉行郡致餽其詞亦曰存問既而報下未允則所乞恩典皆未宜舉前所舉者謂一時之事可也而可繼舉之乎執事乃以令節欲再舉之意則盛矣於禮於法㫁乎不宜某若以重違邑主之意勉强受之非所以敬君命守臣節體憲檄之道也有識者其謂某何倉卒聞命未及致詞亟遣家童往見執事以情告焉乃䝉俯聽終賜停止君子愛人以徳其執事之謂矣敢不敬謝伏惟亮之又昨得司徒秦公寄至災免抄呈仰荷聖天子軫念元元深仁厚徳江南之民可以少蘇賢大夫憂民之念可以少慰矣但有災而詳懇以上者巡撫巡按之事也奏下而議擬覆請者司徒之職也聞災而即為減免者聖天子之恩也今恩既下矣則斟酌派撥重重輕輕各惟其當務俾下有實惠上無虛施舍賢大夫其誰望哉大抵人各為家惟知利己不顧損人避重就輕百巧千奸無所不至惟賢大夫誠以求之明以照之而留心其間庶克有濟不然而以常例施行吾未見其可也此外更望推廣徳意凡百皆從寛儉以成朝廷矜恤之惠此則不敢望於他有司而獨有望於賢大夫者賢大夫能不留意哉所謂從寛者如避差追徵之類是也此等奸民固為可惡懲之固宜但嵗當荒歉徵雖不同同出於民寛於此而急於彼民之不堪一也倘察院問及以此為對不亦可乎巡按公既肯懇切為民抗疏其聞此言當無不聽矣所謂從儉者如往來供饋之類是也敝邑不幸路當衝要往來使客既要人夫皂𨽻又要支應下程此賢大夫所熟見而深患之者也但人夫皂𨽻勢不可減而支應下程或可從儉此亦遇荒節用之一端也凡為有司者皆難而進士為州縣者尤難觀望之下蓋以言乎禮貌太簡則謂之傲太恭則謂之謟以言乎禮物太輕則為之嗇太重則謂之奢退有譏言往往而是某嘗為州素知此苦敢不以告凡此二者惟賢大夫留意焉且九月上旬災議初起民心惶惶而巡撫又有別意當此之時某以病居鄙人雖不敢上告天子而下告司徒告巡撫告巡按告郡守告賢大夫逺託筆劄近託話言無所不用其情今既得請何敢不再告哉賢大夫朔望垂訪禮意加隆於不肖者至矣某雖衰朽能不知少答雅意哉況避差等項寒家所無固亦無嫌可避也於此不言則謂之何惟賢大夫留神聰聽焉賢大夫春秋鼎盛聰明過人燭奸則奸不能遁其情發弊則弊不能匿其跡威行如秋仁行如春此其時也他日立朝而追論及此豈非一盛事哉臨楮惓惓外聞虛庵郡公訃數詩代哭別楮録上更希覽教餘不及悉又昨辱惠陳公墓誌二幅并烏薪八包時以久隂不曽到先太淑人墓所處分墓道事衝泥一行未得面領然感激則深矣輒此奉謝是日在墓門忽見壽官六人者跪伏乞哀某細思之此等老人増年冒寵固為可惡然必須揭查黄冊一冊不出至於二冊二冊不出直至初報冊之時必可見矣若洗改之迹尤為難隠如此施行乃可懲奸弊以絶後來蓋奉詔優老題目甚大況有巡按批詞此亦為政者之所當謹也某在許州嘗如此一行除真正者外革去數人承知愛之厚輒敢奉告可否惟命不敢必也又某所撰文襄公頌輒用刻石敢以墨本呈覽幸有所教也更希命督工者嵌諸祠壁萬萬更有閒事附告西城裏門用木檠駕勢將傾壓行人必有當其患者南門跨塘橋券傍傾卸二石亦將傾壓失今不修必至大壞阻滯運舟他日大造不惟所費浩繁而作壩甚難運舟無處轉行此二者皆當先事為之西門且只拆去如南門可也跨塘橋須尋巧匠有機力者設法修補亦可支持免倒某先墓在惠山舊居在南門每肩輿出門中小舟過橋下心甚危之故不敢不告也以此時而談此事迂僻可笑惟聰者能聽之耳臨楮真切又鼠雀之事重誣我賢大夫損我政體深為可畏然小人之害君子猶君子之欲去小人也此固常勢無足深論而扶陽抑隂持憲者當自有道其於執事之盛徳善政亨途榮進烏能為累哉昔者某在許州嘗兩遭此方伯陸先生手書下慰以為君子進徳之地而面告巡按則願為某出結狀昨䝉下顧已述以奉告矣兹敢申之惟循常以理庶政安靜以鎮群心具情狀申開以破奸謀整巻籍案候以備旁照此亦君子所以應小人之道也此外必有乗機歸怨於人邀功於己者此則當嚴以處之善以答之如曹㕘之待客飲以醇酒勿聽可也賢大夫持己有守有為治民有禮有法今亦豈無知己如陸方伯者哉高明於此必有定見而某猶以為言者詩人愛莫助之之意也亮之亮之柬費少傅鵝湖春間家童還自都下領教劄伏承執事知某衰病苦情力賛聖明凡所以成吾之退者周悉深至誠所謂生死肉骨者也雖以區區誠欵未能格天而某感念盛徳如實遂所圖者雖百口不能罄心之所藏也某之艱於拜起實以正徳癸酉中風所積非若他人暴感濕氣而然老醫云年近七十血氣既衰病踰一紀血氣已定如此行動直至終焉而已若欲趨走興俯如中年時雖有三年之艾其如彼何哉今雖未敢遽陳而決難就列自知甚明自分甚足繼自今所望以終成吾之退者非明公其誰也敢不敬謝撫按繼上二章因親見重膇之狀故其發於詞者體悉甚至但所乞恩典太過其分而巡撫又以草茅撰述輒瀆聖覽上懼得罪下恐貽笑自聞報以來悚仄無措幸賴聖明在上不加譴罰皆明公扶持之力也敢不再謝即日秋暑凌人蟲災傷穡衰弱無聊因馮生便輒此附答以布下忱伏惟亮之謹啓不宣答朱巡按士光八首承専遣郡掾齎手教及災傷奏稿見示急讀一過言言為國字字為民而筆力又足以發難寫之意古來柱下史觀民風者亦不是過九重必重起南顧之念矣十四日顧郎中與新去已曽具柬并蟲圖達鳯山公渠家正坐災重之鄉經國之餘能不留意乎朝廷所倚賴者撫按二公此而不信又烏乎信但不知撫公意如何耳所示觀海集及九日逰𤣥墓諸作詞意古雅風韻流動真足以上追古人何政事叢脞之餘有此高興也才力之優一至是乎病夫於此不啻一頭地之讓矣容細讀過再柬以復且來使備述至意禮貌勤渠又足以窺愛念之至適因先母墓柏屏傷壞乗舟往視晩歸匆率草草附謝不盡所懷幸惟亮之又數日前承示湖上佳章復書後三復之餘不勝歛袵大抵諸作皆出入盛唐老杜直逼宋人高處元人纎巧之習脱畧殆盡但聲調之間更須留意則美善兼盡矣此一得之愚莫助之愛於知己處不能自已者亮之亮之敝府蟲傷事承懇切上聞再讀疏詞孰不興嘆孰不興感如此年分徵免遲速係乎朝廷者既未可必而催科寛猛出於官府者又未可期調停鎮定存乎其人不知郡守朝覲可以援例一奏免乎以愚觀之災傷之疏前乎既懇則後乎此奏似不可無也偶有所見不能不言蓋亦郡邑諸鄉士夫之意而民情之公也惟高明裁之外讀湖上諸作一詩附錄清覽倘辱和章尤出望外餘不多瀆又即日辱遣吏齎手帖并佳作見示見為民之誠心焉見哀死之厚徳焉見善善之餘意焉諷詠之次不勝感念佳作與鄙作即圖以小刻成冊傳諸人人用彰陳守重於觀風君子也如此亦足以見激揚之一端矣秋糧寛免之餘承留意派撥數郡生靈之幸也輒此附謝載讀著存録又見世徳之逺紹成之美顯揚之篤雖不文能無言乎但須分與一題庶可専心思慮交代既緩當盡愚以復也巻冊俱如命用印章付去吏幸檢納之餘不多具又逺辱専吏以草書高和送行諸作見貽世誼夙心具見於此深愧衰老無以稱所奬借耳諸所更定皆出人意表而翰墨超脱起筆住筆皆不費力其得于淳化帖者深矣但此帖於今絶少佳者清江若大典嘗云戲魚堂帖尤佳不知吾友曽見否乎所謂杜句者謂詞意之佳與杜無異猶曰唐句宋句云耳昔人有誤書舉燭而讀者以為高明薦賢其此類邪然三復誦之益見佳句之高邁矣嘆賞無已無已跋語情意藹然筆力徤爽實與詩稱而推重太過令人益不敢當吾山益高吾泉益清其有賴於斯乎多言不足為謝也數日隂寒中人甚難調理佳巻尚未書得臨楮惓惓不具又承惠酥橘皆珍品也重以手翰垂問兼示下顧之期感感不可云喻但初二日是東川郎中發引恐不能久聽清談僕欲肩輿往送其喪至西門順路徑至二泉精舍焚香煮茗以候之清談竟日而返是日不必至我冉徑也臨行時再當一屈觀我容春精舍不識何如捉船害人商賈不通地方清野某在家數年目實見之而無可與言者軍人之弊又為漕運并侍郎寄囤時所廉問而知者今讀奏詞深切軍民之弊一舉而貽惠無窮若部中再能推類施行以除運軍債累科擾之害則軍民誰不稱快哉奏到之日鳯山公必有所處某亦當致莫助之愛也東川鄉賢之舉諸生曽呈本學不知學中公文曽徹覽否此機㑹不可失也遣官送喪更希留意餘不多具又承虎骨之惠即日與諸姻友共觀之且嘆且駭以為山林間有此惡物其有識者則謂巡按公於異物且然況醜類在吾人者乎其能驅除無疑矣既高懸臥房前以辟妖邪待其肉盡骨乾計較作枕是夕偶得小興遂有所作如別楮方圖寄覽而趙令送蘭使者適至乃具稿託焉一覽之餘當有益我者矣聞趙令懼於威重或因香草為我一少霽乎彼知香草之可貴或亦改過之一機也昨刻工何球去曽附上片楮計已到矣凡諸公事皆不敢與聞除害去惡有賛無阻此區區之素志也亮之亮之又某再拜匆匆一㑹遂成逺別莫能攀送柰何柰何詩曰愛莫助之某之告子者惟誦此而已老病人扶再拜難少陵此言若為我設決不能居官明矣況口角垂涎甚至汚鬚沾襟如此態度尚可自取厭惡於人乎故人知我者雖有之然未有相照以心如子者也還朝立臺端凡可以成吾之退者幸加之意焉以終去嵗特疏之意萬鈞之力於是乎在非不知薦舉之多可以得聲名題覆之重可以得恩典然此二者縱得之亦無益於病體與老獨今皆不復望矣惟蚤得休退凡百可以自遂耳非士光莫可告者亮之亮之代公者許道長先生素不相識不敢望公之愛我得因公而知我之志足矣然亦不能無望於鼎言也臨楮惘惘不具備又春中方得憲節渡江之報而邸報繼至文章政事風節才望如吾士光當得超擢而顧以資格序遷士夫聞之莫不失望不特相知者為然也越兩月乃得吏田春寄至手劄并途中諸詩知已了繼室事及抵家百凡平吉為慰出處事亦大矣士光人望所屬於此未宜草草也湖南徐都憲用和亦自中臺出守淮安不五年而遂巡撫其地若以功名論之亦豈久妨賢者路哉賢者必有所處矣春殘動履更崛强正合人言脚頭遲者而流涎不止老態病態於是為著得吾友為世道効力吾衰亦有光矣千萬珍重董新昌便輒此與趙秀水逺辱遣使齎厚儀申少陽祠記之請雖不敏能不終前日之諾乎但積疾畏勞且冬月傷熱不能近筆硯且少陽人品甚高此文體面甚大須放寛限從容了還庶逺不負葉公近不負吾子也人旋輒此奉復謝管令遣庠生來請鄉飲適承諸公枉顧以賢大夫管侯之意欲請僕與鄉飲酒者聞命悚仄未知所對退而思之斯禮也正徳庚午某以都御史致仕還自漕臺縣令馮侯嘗請之僕以徳不敢當作詩謝焉既而請侍養歸自戸部積疾家居縣令暢侯又嘗請之某辭焉以書不惟以徳之不敢當而又以分之未敢與也二侯聽之其事皆止今某以分則非馮侯之時以徳則猶暢侯之時也而加之積疾重膇平居見客一拜猶難若欲揖讓周旋於賔介之間以稱禮制必不能矣雖賢大夫不遺衰老誠意懇切至勞二三君子即我病榻致殷勤焉在某則何敢承之諸公知我久矣而前此之辭也皆所習聞者也幸為我轉謝不敏焉不録偃蹇之罪則病夫之幸多矣邑博兩先生亦煩道此意萬萬前言面告不盡而繼之以此亮之與㳺少尹向凂瀆令族弟買壽木兹特奉價幸為致之木須真正老辣當風馨香入水沈重此其槩也諒令弟必能為賢友用心賢友必能為我用心存乎心目之間者豈吾言所能盡哉但以義言之其價不得過先太淑人之數此固吾人子之道向已面告矣亮之亮之謝令君送賔興燕儀啓即日伏惟呦呦鳴鹿既隆秋試之賔筵渺渺搏鵬復重春闈之勸駕凡兹盛典皆出賢侯某也衰朽餘生乃辱寵召齒當祭酒而徳不堪勝心欲登堂而力未克副方懐深愧又辱盛儀既勉拜嘉敢忘趨謝未任奔走聊托簡書冀原偃蹇之大愆以成靜退之小節謹狀不宣與萬汝信提學逺辱専使見問重以厚幣且有乙酉二録之寄故意藹然豈勝感念秋科得人方賀教道之振而惓惓之懐且以士風浮靡欲還之淳樸斯言也其為吾道幸也大矣夫内外本末之辨豈難知哉轉移感動之機固有黙寓於聲色文字之外而不拘拘於條格標目之間者矣且浙東西十一郡俗以地殊亦以人異抑揚進退隨材成就因時變通此其為功可以嵗計而不可以日吾友當自得之兩浙提學前有崑山張公後有華亭張公吾聞之而未得其悉彼中故老當有能言之者吾友亦可一訪之乎立賢無方此自古第一義也請為吾友一誦之吏索報急匆匆附謝兼布區區臨楮真切千萬為斯文愛重不悉與勲姪向所見批㸃禮記集說端直精密種種不苟深嘆有學者之意今以容春集二冊煩一批㸃之圈抹諸法唯意所適閒居對之亦可一消豁也奉柬巡撫陳公三月初伏䝉枉顧儀物兼隆情誼藹然無異疇昔曷勝感激別後因鄉事避嫌不敢奉狀起居衰病閒居分所宜爾雖涉於疎慢不敢逃罪也頃辱賜鈞牌假舟求醫事未能遂切念撫院公文久滯在篋於跡未安謹託縣官封齎繳納因寓啓事以謝不敏伏惟鑒之外文襄公頌新刻一紙附上請教公祠與吾書院鄰並書院中忠定祠癸未嵗䝉梧山公撥賜門子一名而公祠尚缺瞻見匆匆未及奉告如䝉鈞命量加撥給有慰吾民遺愛之思向者都元敬之喪執事惟以顧華玉一言即以鈞牌從事不待有司申報華玉為吾道之深賛盛徳今此事能如此施行更覺優重某病足日甚不惟起拜艱難而越檻下階亦須攙扶老衰之狀可畏可嘆非復相見時之比矣惟公愛我敢不一布餘惟為國為民愛重以慰惓惓謹啓不宣復申太守伏承専遣上幕逺致手書委以前守陳公衣冠墓記此吾民忠厚之舉賢府主不忘前政之心所當敬諾者也但陳公墓誌某已執筆兹復見委不無重複欲固辭之而使者勤惓再致尊命某亦重違謹拜禮幣之辱衰病之餘幸少假時月當具稿請教使旋専此上覆伏惟亮之柬涂侍御夢卜去嵗承過訪至今感念近辱書來索養晦文字僕於尊翁固所欲為但寒廬近被火災焚毁蕩盡心緒鬱鬱不能執筆本欲辭謝因専使極求文之懇素書得持憲之體於我有光撥冗遣悶勉强成篇復因使者力請親書草草寫成小巻其冊葉亦託善書者書之俱附來使上納秦提舉䝉扶持之徳甚大某亦知感相見之日當為下拜也被火之詳具在寄秦司徒書今附一通覽之能不為我増嘆乎北上想在來嵗夏秋間諸凡不盡簡馬天常樹去庭空雲消天淨孤㙮在東夕陽在西國政在坐斯時斯景可無東泉觀松共一眺乎復劉郡推某不徳致災前月二十日夜中堂起火延燒前後堂寢俱盡是時某方就寢驚起披衣匍匐出走僅以身免雖勉强遣慰而舊物煨燼亦豈能忘情哉逺辱手書専使垂弔兼惠厚儀不勝感念賤體受驚之後於日前積疾益加沈滯家廟祇告之時雖人扶亦不能拜止行揖禮而已此固常理無足道者且某平生以虛名為累幼而無父老而無子晩嵗家居日夕兢惕猶乃罹兹災禍時方修省不暇而何敢聞名世達尊之稱乎況堯湯水旱引喻太過尤非所敢聞者然厚意之辱不敢不拜也敢因謝狀少布區區伏惟亮之亮之復巡撫陳公某不徳致災出舍降服之餘伏承専使惠以華緘厚幣下唁我私且䝉鈞牌行縣奬借過重禮數優崇縣長吏仰體盛徳即時率僚屬躬至寒廬鄉里來觀莫不賛慶顧衰病餘生何以當此惟有銘刻而已兹因原差舍人回京敢布此少致謝忱伏惟亮之所示新編周易古文音義展巻莊誦仰見稽古精深識見超越序文之委豈不敏所敢承哉稍伺小構告成身體安息心慮靜寧端居獨坐操鉛卒業少窺編輯微意或能執筆賛述一二請教左右亦非敢為序也即日賤軀遭變以來精神加憒氣體益滯動必人扶如七八十者福分淺薄之人固其所也辱執事愛念之至敢附以聞草草具啓更惟照原是望某無任惶悚謹啓不宣與劉介夫兩知亭者為先師文正公作也壁嵌公像其名取諸公寄惠山第二泉歌結語我歌泉和兩知音吁嗟乎誰哉更識泉齋心者公之知予猶予之知介夫也吾嘗語介夫介夫聞之久矣是亭也非介夫誰當記之復許巡按憲節駐敝邑謁廟後一日䝉遣管尹即寒舍存慰微聞執事有䘏災愛助之意感激在心未敢言謝未敢言辭乃至蘇數日始見批發本縣申文有發帑優䘏之舉是不容於不謝抑不容於不辭也執事垂念衰病曲及我私盛徳至矣感生於心謝形於言固夫人之情也但筆劄有不能盡耳某以不徳致災恐懼修省降服出舍勢有不得不然而禮亦有宜然者方將收拾燼餘勉建小屋以為棲止豈敢勤天子之詔使明文發帑以為私家助哉若遂受而不辭適足以増吾不徳以重天怒非衰老之人之分也某自憂病以來罹兹禍慘匍匐奔走僅以身免新驚切心舊疾加甚拜難自起動必人扶自分必不能再就班行為國効力顧以虛名謬致禮敬於人即有分福亦自消折執事按我江南為國持憲綱紀振肅韓子所謂令施於庭戸數日之間而人自得於湖山千里之外者執事有之某也病臥田里受賜多矣況管尹公明廉威以禮法為治其於不肖時有儀問月有旅謁聞災之後制衣繼粟假力給用尤為勤至此皆賢使臣觀風之化使某得從容修葺以復舊規田租不足繼以文幣文幣不足繼以稱貸庶㡬自附詩人伐檀之義餘年殘喘少延一日則一日之安也乃若帑物一錢片楮不敢領受伏望愛人以徳體物以誠再賜指揮以止前令則千金之惠不足為厚矣某於執事雖未荆識然聲譽聞於縉紳風采傳之道途舉置覩諸建白貞心雅操表裏周浹為日久矣比來得之尤切某雖不敏且老矣抑豈敢自外哉伏惟亮之昔者巡撫都憲四明朱公瑄安成彭公禮宜春張公鳯巡按侍御華州東子郊提學侍御安成張子鼇山皆嘗有餽某以義辭之皆䝉見允今者被災後數日客有以辭受為言者某嘗舉以告之客退錄其語并舊作辭餽志為一通以應他客之問兹敢以所錄語別幅呈上如賜覽觀亦足見某之所存矣答吳郎中克學某不徳致災逺辱手書専使垂唁兼惠寒衣之材斯文之情世交之誼可謂兼至矣敢不拜謝且書中以先太淑人生在牀褥未易抱持没在柩殯則未易舁舉信矣哉不幸中之幸也他人慰解之詞多矣而未有親切如此者敢不再拜煨燼之餘筆硯荒落草草奉復外小詩附上請教亦以見事變之有數也亮之亮之容春堂續集卷十七
