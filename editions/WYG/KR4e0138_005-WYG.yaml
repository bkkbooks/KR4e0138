body:
  text: 容春堂前集巻五明邵寶撰五言絶句三十七首匏翁東莊雜咏東城有圃城東偏石梁度幽徑隠然見東城不見東山勝竹田楚雲夢瀟湘衞水歌淇澳呉城有竹田亦有人如玉南港南渡通西湖晩多漁艇宿人家深樹中青煙起茅屋桑洲汲溪灌桑樹葉多蠶亦稠衣被盡天下美哉真此洲全真館何處適餘興尋師談道經隔橋雲滿屋鐘磬晩泠泠耕息軒隴上閲耕罷北牎清臥風豳詩讀未了夢已見周公鶴洞老鶴愛雲栖石洞自天鑿秋風時一聲飛雲散寥廓朱櫻徑葉間綴朱實實落綠成隂一步還一摘不知苔徑深曲池曲池如曲江水清花可憐池上木芙蓉紅映池中蓮題畫日暮風雨惡咫尺不可去危橋下馬過猶勝無橋處湖上口占二首不到西湖上于今二十年相逢多白髪山色只如前又畫船入西湖風光正春暮指㸃兩峰雲先尋岳王墓松下作二首泉流古松下松影流不去時方望雲霓誰留卧龍住又孤笛横秋江一聲山月白蘆花起天風蕭瑟溪南北題畫二首銀河天上來不復上天去千載乘槎人應迷問津處又偶來坐松下愛此流泉聲雲山隔遙浦悠然空復情春江曲春色將歸去江南草正新南風亦何意偏腦欲歸人有待芳洲草青青雲水半吞吐前船已過湖還聽後船櫓寄呉嗣業茶香鄰酒國知味各稱仙何日攜茶具雲山共我泉題文徵明畫于畫見書法蕭然無滯情君看片石畔叢竹忽生生雨過獨坐暑雨過不盡斜陽穿濕雲雷聲近還逺隠隠隔江聞為錢忠言題畫偶艤北來櫂淮隂聽晩鐘明朝渡江去秋浦采芙蓉和溪為程進士賦家住萬山中雲峰翠幾重東山朝日出望見海霞紅集句不寐清風何飄颻左盻澄江湘天髙萬物肅松柏鬱芒芒通波激柱渚大道夷且長願為雙鳴鶴施翮起髙翔遇王㕘政汝言蘭澤多芳草引領遙相晞河漢清且淺愁思當告誰我有一尊酒客從逺方來臨河濯長纓樂飲不知疲努力崇明徳餘光照我衣述懷東園桃與李白日忽蹉跎左右珮雙璜徙倚引芳柯寒衣欲誰待春風扇微和齊心同所願結根太山阿有所思蘭榮一何晩向風長嘆息褰裳欲從之磷磷水中石西遊咸陽中入道逢深識駕鴻乘紫煙髙舉振六翮聞時事有感集李四首松柏本孤直翠綠如芙蓉獨立自蕭飋楚山邈千重安知天漢上乘雲駕輕鴻沈嘆終永夕世無洗耳翁又吾衰竟誰陳焉得偶君子倚樓青雲端千春隔江水大雅思文王行行未能已鸑鷟有時鳴雄斷自天啟又長鯨正崔嵬世路有屈曲自挾兩青龍揮手折若木沿芳劇春洲鳳饑不啄粟樓船幾時迴秋露白如玉又明月出海底迴風送天聲寳劒雙蛟龍虚步躡太清雲卧遊八極三公運權衡努力保霜雪羣才屬休明舟中懷李方伯惟誠集杜二絶老去才難盡秋天憶射雕白鷗波浩蕩寒水不成潮又海内知名士如公復幾人千秋一拭淚鼓柂視青旻容春堂前集巻五
