body:
  text: 容春堂前集巻七明邵寶撰七言律詩九十六首鳳陽謁陵鬱葱佳氣接邱壇陵在圜丘南真向乾坤得大觀歳舉留都周冊祝月遊原廟漢衣冠九重陟降天應近萬世栽培地本寛瞻仰不勝心頌在無疆休與泰山安雪中賞紅梅奉次涯翁先生時邃翁擕酒共飲懐麓堂二首淺絳英英忽滿枝春風到此復何之正憐與雪相逢地却訝如人欲醉時南國已通千里信西湖空負一生詩白頭二老青燈夜笑對江東綠酒巵江南春色渺無涯借得芳枝似酒賖㸃染已經元老手品題還許大方家丹心獨對年年樹玉貌空傳處處花雪夜門深清夢逺敢將桃李向人誇又疊前韻荅邃翁先生二首誰寄江南第一枝歲寒如有物司之天於北道留餘地人為東君惜後時太素風流難入畫半酣顔色最禁詩平生鼎鼐心知在且共西堂雪夜巵金鼉山畔洞庭涯咫尺寒香道路賖雪夜不迴仙客棹春風元在相君家地應有律能生黍天亦多情為雨花投我瓊瑶何以報擬將歸向北堂誇雪酒為孫司徒賦奉次涯翁先生元酒曾聞侑大烹釀來寒雪品尤清也知承露能髙致須信藏冰為曲成光動夜盃如有物暖銷春罋本無聲相看莫謂人間味一滴先天萬古情得見素公書素老書來蜀道長洞庭春水正茫茫出羣才本安危寄習隠心應去住忘䕫府孤城看落日杜陵野客夢滄浪逺人欲挽難為計共指方平像在堂寄李提學獻吉鐵柱宫前春水深幾迴清夢憶登臨新亭有客還題壁舊曲何年為入琴髙士榻虛人似玉此君堂小地如金近來又讀宗儒記回首匡廬萬古心文廟陪祀次栁方伯拱之惠風入夜細吹衣坐愛宫牆咫尺違星破宻雲看漸朗塵消凍雨恨猶微夢餘真覩殷楹奠語次空傳㸃瑟希此意欲從何處道東堂燈火兩冠巍時林方伯同齋登滕王閣望盡江湖極目天滕王樓閣尚巍然雲中帆影寒流外雪後簾光夕照前它日賦曽傾客坐何人遊更挾飛仙廟堂逺念諸公在回首層霄北斗懸袁州謁韓文公祠一上春臺草陸離忽瞻遺像起遐思江山恨少滕王賦風水愁多二女祠石廪不知雲去地雷塘猶想雨來時慿君莫引飛鴻望萬里騎龍任所之次白洲公時公起撫治鄖陽且臨峴首弔羊公回首台階近九重千丈厓堪供巨筆一桮酒為慶竒逢謝安山卧曽江左召伯風行又陜東麟閣崢嶸它日地丹青能寫漢臣功奉次東山公在廣元夕觀燈韻尋常詩句亦黎元垂老丹心照海門且以數桮酬客興何曽一飯忘君恩漏聲入夜風全靜燈影乘春月半昏聞説總戎多解事漫將歌吹過江村別廬山山北山南幾度遊春風到處得相留鹿聽李渤祠前曉菊采陶潜宅畔秋星落半湖蒼島出泉分雙澗白雲流五峰明月新亭興它夜江天獨倚樓歸興六首曽從渡口賦桃花辛丑下第歸有過桃花口詩客路風光幾歳華州郡十年還入省漕渠數月竟思家星辰近聽趨朝履河漢虛隨奉使槎斜日倚樓滄海上雲山回首一長嗟東歸詔許省慈親瀛海西頭問舊津宿麥穗餘三月餉枯楊皮盡幾家新平生酒慕蘇門老康節詩有曰美酒飲敎微醉後予嘗愛其意故云它日羮憐潁谷人聞道王師頻報捷中原今已息風塵鎮日衝風起九河沽潮東上不勝波雲䝉日影當晡宻雨送雷聲入夜多野史一書還夏五客燈十載幾連􅌪新涼却動江南思卧看青山聽櫂歌漕堤楊栁昔人功六月清陰處處同東國共看歸海水南船方趂過淮風尋常民俗兵興後百萬軍儲歳輓中我有瓣香何所致禮官新祀宋司空艤櫂來看治水碑沙灣堤上蚤涼時漢防故跡嗟誰志禹貢全書媿我師予十五時從俞蒿菴先生受尚書在諸生中獨不許予讀禹貢撮要因舉武功治水事以期之後三十年總督漕運未能成功於是乎媿焉䥫柱尚存塵漠漠鹽舟不至草離離憂勤更憶東山老白髮江村一短藜湖上飛雲小作陰龍神祠下水流深河渠未預千年計闕里徒勤萬古心久擬徃謁未果驛報正愁聞魯警是日聞有小冦在東平櫂歌初喜聽呉音松江糧船至順流東下三千里一笑清風忽滿襟分司夜閱巻肯信行臺是隠居手寒中夜尚披書冰霜氣逼庭初靜星斗光臨户正虛漫道相人如相馬極知觀理似觀魚九重方切真才念獨對青燈意有餘青雲峰用元人韻眼中感慨幾千秋第一峰春翠欲流跡為古人須下馬興當今日可登樓冰霜以後花兼鳥山水之間縣復州采得寒梅香滿袖更從江上問横舟建昌道中見杏花臨川梅花尚在眼旴江忽復杏花紅山行逺近百里外春色淺深三日中有力已能知夜雨無心那復問東風明朝又向南豐路却聽鶯聲處處同小溪道中春雲收雨寂無功詩景依稀在眼中南去驛連分水䫈北來船趁上江風細泉落磵深成碧幽徑垂花淺著紅玉枕有名何處是令人却憶白沙翁送金潮萬壑清冰貯玉壺相逢却訝是塵途頴師妙已傳琴操米老竒還託畫圖白馬五陵初入薊綠楊三月又歸呉憑誰為賦行吟地雲滿青山月滿湖寄姚都水秀夫疏浚功成數十州東南應免九重憂奈何水部稱多病却向鵝湖訪舊遊燕䫈暄涼憑候鴈楚江晴雨問鳴鳩草𤣥聞有平生意須及揚雄未白頭答潘維本官忙十日九在省客邸勞君過幾迴片紙漫投今世刺千金曽弔舊時臺江長雲外鴻還去秋老山中菊正開却憶湖南湖北地和君詩罷一徘徊聞三原公訃二首五朝進退盛明時四海瞻依百辟師散地尚堪棲老鳳格人真合擬元龜紫宸陛逺星辰切綠野堂深日月遲韓富勲勞司馬望大書誰作墓前碑載起登廷七十餘兩童疋馬老生如四夷相問相司馬千載獨知師敬輿咫尺天回書侃侃萬間人庇屋渠渠典刑已矣遺文在西望三原淚滿裾還自長沙未有述作謝沈休翁休翁謂予是行必多述作於是乎愧謂我南行大有詩鄙人何敢與聞之瀟湘尚憶虞巡地雲夢寧知楚獵時木落洞庭秋復爾鶴來赤壁夜何其登髙坐待浮雲盡回首青天見九疑過長沙不得謁賈祠巨筆誰修漢一經治安策已動天聽奠無可藉茅空白采不堪紉草正青舊井定通瀍北水新祠真應斗南星獨憐鵩鳥翻為瑞萬古清風滿石亭生日和答王河南公濟新植甘棠未作陰生辰忽向冗時臨人間樂事還萊綵天上佳音有傳霖近不可親鷗似玉淡猶堪賞菊如金岳樓記在何能讀慚愧希文萬古心答魏憲使士華用公濟韻二首三禮周旋起一經鳯皇鳴動九重聽愛雲曽袖匡廬白題石還磨劒閣青范記讀餘心耿耿楚騷歌罷鬢星星長沙回首相思極路隔湘東幾驛亭閒倚船窗看水經滄浪歌起隔江聽霜臺簡自它年白雨寺燈猶昨夜青秋水南湖千萬頃晩雲北斗四三星重陽己負登髙約何處尋盟更有亭次魏士華韻岳州道中嬾賦新詩記所經誰歟能為我歌聽日生涼色荒荒白山露寒姿疊疊青晩席洗􅘑分急水夜船檛鼓視明星長沙有約君先到何處登髙倚草亭新祥宫漫述亦用前韻懶聽道士誦仙經却愛吹笙隔院聽江上雲應無數白雨中山亦有時青囊琴正迓來今雨匣劒還將拭舊星莫道深秋佳趣少菊邉修竹故亭亭邃菴先生約登金山世間誰信有瀛洲竒冠江南第一州龍窟不知何事露星槎真向幾時浮石分砥柱還孤注水入滄溟正急流更上留雲窮望眼海風吹浪晩颼颼留别沈休翁湖南㑹本自江東二十餘年氣味同此去春違丰采外向來心在簡書中杜陵門徑還今雨司馬衣冠更古風西望武昌江漢表雲連黄鶴倚晴空追悼匏菴公天夀斯文為國華枯藤瘦樹著新葩無書謝客門長靜有夢懷人室未遐十字誰題君子墓一編自許大方家梧桐髙倚菴前月鳴鳥寥寥噪暮鴉答陳提學文鳴楚帆連日阻南東到處魚羮老母同春水穏當新漲後晩山青在舊遊中宦情於我聊今日師道如公自古風遙想樓船吟眺處瀟湘千里一虛空采石登謫仙樓濟上登樓已十年兹樓興在未登前何人不道詩能聖昔日空傳酒解仙舟楫心期風乍起屋梁顔色月猶懸畱題詎敢輕磨石萬古江山一慨然望廬山用舊韻曽從王守問山菴神思飛馳不自堪有意一亭擕客賞無言五老擬禪㕘朝宗江漢心初北夢寐煙霞眼正南我憶舊遊多述作慿誰刻向卧龍龕舟中望九華山用李韻微雨初收草似茵九華山色欲迎人援琴正恠知音少傾葢何妨識面新溪汎綠波纔隔夜樹垂青子又餘春風濤宦海今如許何處尋仙問出塵龍興寺述事時王晉溪同遊佛殿莊嚴似法宫聖恩偏注此山中南朝寺在俱凡界西竺僧來自祖風畫棟本連陵樹碧綺疏曽映苑花紅題名幸與司徒後恠得行旌懶向東舟中讀匏翁詩不見此翁還此詩讀詩真想對翁時峰迴深谷樹重疊渚漾輕波草陸離載道絃歌鄒魯國旅庭彛鼎孔周祠平生海月菴中興應許藤床竹几知齊安晩泊時榮藩初之國偕二司迎之漫向東坡問雪堂雪殘寒日正荒荒地名自是因人重客思那勝為國忙萬古江流從禹貢一時風力有周郎召南曽賦甘棠樹誰遣春陰遍楚鄉謁蘇祠用前韻去公千載我登堂春草離離若與荒雨露不知天地闊江山應笑古今忙官銜漫逐三司使民瘼愁聞百里郎何處有靈還可弔舊遊隨地是吾鄉時黄岡縣知縣以民事來白望東萊墓内白亭邊墓道開瓣香深擬拜東萊風雩有象公何在棠樹無歌我却來兩月近思真定本千年大事未終裁白雲回首山中寺寒日荒荒徑滿苔觀誠意伯像于處州一代元功百世豪遺容瞻處麗陽髙天留湯沐田無稅人效明禋澗有毛莘野不妨初就桀草廬猶恨未誅曹萬峰指㸃青田路斷石枯松望眼勞山中夢希翁江濤夜寒公不來予為文祭翁有廬山之陽有堂有壇遲公不來江濤夜寒之語公來入夢亦竒哉百年知己惟心在萬事隨人可力回望久更無誰下榻興多惟有獨登臺欲將五老峰頭樹移向西湖崦裏栽山中懷楊儀部周九江云得儀部書有遊廬山之興未得登君野興堂兩年清夢獨難忘笑談每怪逢僧健文字猶嫌應客忙山月掛松真灑落海雲迎鶴更昻藏呉天楚地同秋水老盡蒹葭一夜霜讀釣臺集用陳白沙韻二首莫將身世較行藏釣石能増處士光青眼屢煩真主顧白頭端為故人昻雲歸故䫈龍應懶蘋委空江水亦香九鼎一絲形迹外儘敎俗客笑荒唐從來自信任人疑一寸丹心付所知白石有情依古廟青苔無賴上殘碑芝從商䫈猶知主魚向磻溪已得師未到桐江空仰止數章新和白沙詩石鐘山九江怒逼蠡濤東獨受舂撞萬竅空人籟總輸天與地石聲還藉水兼風數椽僧結雲厓上一舸仙乘夜月中何處别尋呉季子只留餘地待銘功九江靖忠書院歳時江郡薦江蘋異代衣冠畧近真九死竟還唐社稷一生惟識晉君臣菊松尚擬它年晩桃李聊増此地春莫道近來公論少廟門題額是何人廣信遇龎大㕘元化兩省分司偶此同不堪信宿又西東衣冠元重藩臣體議論猶多國士風春殿香煙趨北闕夜堂燈火坐南宫它年更有相逄地又引鵝湖入話中送馬㕘議公御之陜西外省元兼内六曹使君西去更賢勞迎舟風助黄流急隨馬雲分華嶽髙逺道誰敎歌憇茇豐年獨遣問啼號一尊未盡臨岐思寒日荒荒滿節旄夜坐懷劉用熙蘆泉本是神仙骨誤落人間識者稀聽竹每聫風雨榻涉江曽製芰荷衣臺荒薊北千金築帆逺呉西一鶴飛寒日蕭蕭那可度慿君預拂釣魚磯送工侍徐公致政南還途中有作祖帳東門久不陳古人髙致又今人闕庭回首風光逺岐路闗心雨色新圖畫應傳千萬本經綸方倚二三臣送君濯髮滄溟水晩節堂前戴角巾吉水遇王敬止用送盛斯徵韻江聲初靜晩風輕千里闗山可計程獨立已為它日重相逢真使故人榮望窮螮蝀雲猶宻歌罷滄浪水正清笑折梅花對搖落不須楊栁管離情送喻祁陽時永州南隔洞庭深令尹之官動楚吟展驥誰憐龎氏足捕蛇偏感栁矦心行春駕逺歌盈路簾晝庭閒政在琴何日徵書君莫問東風郊野看棠隂送張淳安羽清才徃徃愛君詩百里為郎奈别離州縣未為吾道屈江湖真見此行宜水連晩渡寜辭逺春入山城却恨遲更愛公餘多古意蛟峰髙處讀遺碑髙梁寺次趙栗夫韻春晴方喜入山深古寺髙梁故故尋江上詩囊連日興雨中禪榻隔年心竹藏幽徑雲初合松倚髙壇月正臨指㸃匡廬何處是萬峰回首問東林謁闗公廟許州本來報効非心事死後英魂肯再遊白日在天書一紙清風如水廟千秋伏橋有志寜臣趙左袒無期獨為劉半部邱明真得力兒曹空解頌君侯謁子産祠一上髙臺萬古情相君何在但留名論經孔孟真褒貶世到春秋有戰爭西北封疆猶接晉東南形勢直吞荆如今想像馳詞地廬井荒茫畫不成大忠祠慈元殿上朔風侵講罷孤臣淚雨深行在更無南去路中興猶有北來心一言竟免青衣辱萬古終悲白壁沈世亂經綸亦何濟大忠祠下柏森森贈李天瑞癸丒十二月廿一日天瑞自京師還過許留三日别去用西涯先生韻坐聽寒漏二更餘一榻全勝兩地書愁到幾時慿我解病從今日為君除雪泥滿地淹行李雲島如天阻卜居莫怪明朝欲投轄江湖回首鴈應疏哭天瑞百年豪氣未消磨北騎南航苦更多戀闕有懐隨口是乞祠無計奈身何山連巴蜀雲層瘴春入瀟湘水漫波最是遊魂招不得隔江愁聽楚人歌送萬晦之南陽有約欲相尋回首清風别潁陰魯望江湖從故態少陵花鳥負初心詩邀佳境雲隨杖夢破殘更月在琴歇馬煩君問諸葛草廬無徑落華深登九江郡城樓潯陽之東東城樓秋日喜陪諸老遊水深已失江九派雲逺還容山一頭西風爽氣自荆益南極清光當斗牛有懐晩在蓮峰下千古美人周道州餘干東岡咏懐一首用虞邵菴韻誌稱晦翁弔趙忠定嘗館于此始注離騷焉晦翁之注騷意固有在盖以屈原比忠定故詩中及之宋人冠冕謂忠定也東岡正在行臺東我登其巔西日紅宋人冠冕竟誰作吳地舟航元自通康山戰罷蛟無穴鄱水禱回龍有宫千秋莫問注騷事宿莽洲邊雲接空輓婁一齋諒一齋吾提學蓮塘先生之伯兄也且獲交于其冢子元善是故不能無言顧言之不能盡哀耳它年曾讀一齋書夢入雲山問起居前輩風流猶有此古人門户竟何如鵝湖絶筆留真跡洛社深衣復故袪哭罷蓮塘還再慟玉峰髙塜兩渠渠次楊邃菴先生留别二首時先生提學陜西百尺髙臺傍寺門杜陵秋興此猶存贈行獨愧清風句留坐還依古樹根星共北辰雙闕近山連西岳一峰尊明朝旌節投何處望斷秦雲眼欲昏雨餘風葉飛長林使君别去愁難任也知鳴鐸自天意肯謂乘軺非我心燕山青連北極近渭水東入黄河深請看祖席半門下它日被褐今朝簮次王朝言有懷自遣坐新涼晝漏沈沈靜裏長千里鄉闗頻入望兩年朝省漫隨行雲迷晩渚花猶隠風入秋林樹亦狂我憶美人元不逺蒹葭空賦露為霜武寜分司次見素公韻萬山旌節破風煙細草承輿軟似綿蒔稻有歌春鳥和采桑無侶晩蠶眠兩旬廬岳仍回眼百里洪厓漫拍肩讀罷妙詞清不寐夜深猶憶對莆田聞李兵備訃鬱孤臺下鴞夜啼白日慘慘愁雲低三年戎幕庾嶺北萬里旅櫬巫峰西江湖落落歳復月風雨蕭蕭山更溪平生勤事數行墨回首敎場秋草迷阻風用杜韻畫舫乘春滿載書阻風聊傍野洲居此時獨坐愛騎鶴何處老翁來賣魚飛雲漫逐海鷗逺鳴雨漸敲江樹疎莫言散局有底急湖上草深方待鋤次韻答萬晦之逢君在許復京師幾向天涯歎别離南客詎無莊鷃適北人那有召棠思江湖興逺新居定風月情多舊榻知野寺梅花堪折未欲慿尊酒侑臨岐别白鹿五老峰前雙澗流洞門草長鹿呦呦深雲似與春長住細雨何妨午未收千里客懷頻出使數年吏事半藏修明朝我放東風棹分付山靈管素秋通州相城呈同事諸公二首眼中形勢盡登臨前輩經營亦苦心一道星河天廩近千年風氣水門深驛亭東去多遼使商舶南來半越吟漕計經春定何似長安三月米如金肩輿南浦復西邱盡日淹留為此州雲隠層城纔見塔水漫孤渡偶逢舟林風力淺花能晩山雨聲遲麥未秋最是中丞憂國計幾回獨立向東流乞終養未許乞歸未許奈親何帝里風光夢裏過三月春寒青草短五湖天逺白雲多客囊衣在縫猶宻驛騎書來字欲磨聖主恩深臣分淺百年心事兩蹉跎弔林和靖墓賦得梅花萬古傳水濱孤塚却蕭然閒雲於我心俱隠老鶴如人骨半仙朝市尚餘觀物地兒童不省入城年小橋東去今成路回首中洲但暮煙謁于肅愍祠祠前春霧隠緋袍隔嶺松聲應海濤伯紀空勤恢復計子儀還重廓清勞我將薄奠成三獻誰作長歌寄一號西望岳墳纔數里白雲湖上兩峰髙五老峰匡廬山頭五老人晩歲纔見羲皇民雪䝉綠髮不改色雲映蒼顔真入神豈無北海未須避自有南極堪為鄰吾亭擬結白鹿上獨對一杯公莫嗔聞侍養命喜而有述五疏纔䝉一語俞拜扶老母望天除孤孀節操劬勞外獨苦心情喜懼餘寛處栽花占月令靜中檢藥印方書東風吹綠長春徑不羨潘家有板輿重陽答錢户部晴日重陽冗裏過百年佳節幾蹉跎山當對靣愁登逺客有知心恨别多白髪此僧聊爾耳僧圓顯同登黄花明日又如何滄浪濯足非吾敢敢謂春湖勝王珂松風閣贈方崑山用顧與成韻石鼎詩成向我歌聽松樓外竹為􅌪風煙逸望三江逺湖海清談一夜多雲近不知山是否雨深還問月如何相逢莫訝辭官蚤鬢髮蕭蕭短更皤寄題邵憲副東邱娯晩亭荆南溪水水東頭憲使歸來訪故邱綠野竟忘裴晉國香山真識白江州風塵迹逺新圖畫山水情深舊釣遊我有一尊思共醉扁舟將趁菊花秋山中答黄明甫謾乞新詩續舊詩小江髙興老僧知旌馳嶺外觀風地榻寄山中聽雨時泉近不勞將石子雲深惟許偃松枝浩歌一曲滄浪月萬古心期酒在巵夜泊鄔子聞雷有感鳴雨乍過江茫然龍津驛前還泊船柝聲欲罷雞且呌鄉信未來吾獨眠沙邊白鷗手可掣湖上碧草夢相牽明星照水看漸隠春隂冉冉生雲煙謁嚴先生祠碧石離離草色新富春山下幾回春漫將賣菜辭求益本為觀魚得任真三代道亡還此有兩生心在更何人客星亭倚浮雲外未許漁翁來卜鄰容春堂前集巻七
