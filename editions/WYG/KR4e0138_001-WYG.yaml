body:
  text: 容春堂前集巻一明邵寳撰辭賦十首毁龍骨辭𢎞治癸丑夏五月鄭州某鎭地陷若干丈水暴出民以為有神物焉逺近爭赴祈禱巫獲厚利六月許州小趙鎭有巫言龍骨出土中縱口道禍福以誑愚俗將如鄭州之為者知州邵寳恐其久而惑衆也乃取所謂龍骨者毁之於庭杖巫而遣之復作此辭以貽州人俾勿惑辭曰變化風雨兮上下于天古人有言兮維龍則然龍曷能然兮乘氣與時斯以體乾尺窟兮非淵勺水兮非川彼朽骨兮幾何嵗年擊鼓兮田田巫舞兮翩翩士女㑹兮如㕓龍無靈兮胡托彼傳龍有靈兮彼胡制旃骨則何罪兮巫之愆逐彼巫兮毁斯骨為吾民兮辟妖物荆蠻操彼有物兮不可以取我有心兮不可以語不可以語兮安可以處荆蠻渺兮何許逝將徂兮終我攸宇吁嗟乎茍獲我心兮孰非我所哀秦封君辭𢎞治乙夘春修敬先生秦公卒越二月訃聞於京師寳既有詩以哀之及讀其墓碑感鄉人私謚之公也復為之辭以洩予情公寳大父行能忘年而與之進所以規誨寳者多矣辭曰違先生蓋數載兮忽南向以興嗟望碧山而不可徃兮𣺌愁雲於天涯問九原之安在兮慨德音之永遐維先生之明哲兮固神啟而天賦筮遇履而之無妄兮曰坦坦其幽素服蘭菊而佩蘅兮歩前修以為度春與秋其汲汲兮恐嵗年之遲暮惟至美不能以終秘兮於燦發於文章窺門牆乎漢魏兮諧律吕於中唐揮賈涕於太息兮舒孫嘯於獨傷知先生謂為逸民兮不知者曰其忘世言博利以為仁兮守善藏以為智維厥子之登庸兮亦詎非先生之所施繄太邱之率物兮樹東京之髙風越𢎞景之退處兮乃託迹於神農衆剪剪於尋丈兮亦孰能知夫所從苟此志之不愆兮又何分乎達與窮始趨塗之各異兮終要歸以皆同徵孟生之為貞兮附陶氏之為靖曰輿情其既公兮信棺蓋而後定彼曷其獨不死兮顧偷生之為幸嗚呼先生兮庶其得正悵余懷之無聊兮掩遺編以長謡極四方與上下兮肆逺索而旁招典刑遼濶兮里社蕭條彼水之澨兮山之椒先生不歸兮使我心勞思胡公賦𢎞治丙辰春三月蒿菴俞先生將赴長興敎諭謂其門人邵寳曰此安定先生之舊遊也吾何以哉寳謹述其意作思胡公賦賦曰凌具區之驚濤兮越苕溪而又南惟湖之為郡兮留海陵之餘馣余束書以廷斆兮瞻前脩而増慚髙余冠之峩峩兮儼翼翼乎余席紛左右其來趨兮曰將考於古昔彼負姱而無成兮孰云非余之攸責嘅夫人其既逺兮或庶幾焉見之鼂登堂而夕下兮顧庭草之陸離地猶故而人則非兮余曷云其弗思豈話言之不可傳兮將遺則之難服寧産材之固殊兮何千古而公獨體與用其並修兮文與行其兼篤念余方慊於斯兮亦曷為而能淑指湖波以矢言兮情糾結乎余腸采溪毛以為俎兮酌山泉以為觴率青衿以將薦兮跽陳詞而願享平聲靈洋洋以若臨兮清風颯其吹衱羌愈思其奈之何兮退將修乎余業疏淳源而導之兮芟末習於枝葉庶冰藍其有望兮允余懷之能愜噫嘻休乎猗哉湖山共兮盤紆湖水滙兮涵濡湖人秀兮繁且都湖之師兮公何可無公既逝兮吾道則孤孰起公兮予將與之為徒歸雲賦賦曰歸雲寳竊擬以為少師謙齋先生徐公贈也公道德文章勲庸惠澤著於三朝大被四海太史書之太常紀之有非小子所敢與聞者獨其歸也悟易象之消息隨時事而巻舒蓋於天道有得焉爰託諸雲致詞於祖膚寸之言敢謂知先生哉其辭曰海江之間荆溪之濆元氣之㑹蒸而為雲始觸合以成象忽變化而生雯爾乃辭巖謝谷逾林邁陸或當陽以晞或臨泉以沐迤邐上征若有推轂挽之弗遲從之弗速已而攀日月㕘星辰弭東井濟西津望華蓋出軒轅歘儵布展紛郁輪囷瞻望為慶經綸以屯其出也無心其化也有神蓋妙乎其未易陳也若嵗大旱苗則槁矣雲於是時從龍而起請命帝閽以為張弛帝曰雲哉汝其翼予乃自帝庭騰鼓蹈厲顧視六合一息萬里召江靈於南津麾河伯於北渚飛亷前導豐隆後從揮霍左右頃刻異同晻靄泱鬱滿盈太空微而為驟而為涷沛而為霖無逺弗遍無隠弗窮百榖薿薿庶草芃芃郊原生色山川發容解暵紓虐轉沴召豐或曰風伯惟汝之績伯曰雲哉於我何力或曰雷師維汝之威師曰雲哉於我何為雲曰否否維帝之命飛龍在天實操其柄貪天為功人將予病爰返初服爰指舊林恬愉𤣥黙用全吾眞追山人之駕依野客之巾霞與為侶岫與為賓泯若弗跡蕩乎無垠葢將以無窮為門太初為鄰而東山之望猶有繫於天下之人也乃有歌者曰雲之游兮山之幽兮雲之凝兮山之㵾兮維雲在阿適且有儀旋兮盤兮委兮蛇兮雲兮雲兮奈爾何兮觀泉賦維暮春者邵子歩自廬麓觀於龍池既觀而憩於是賦之夫龍池之上中峰凌霄雙泉下垂名曰瀑布若颺若飈若奔若馳浸星綴漢破雲截霓孰從而速孰阻而遲此天下之至竒也及其中也迴澗轉谷放乎至足強弩釋機輕車旋轂鯨舞於潮龍戰於陸千雷萬霆神藏鬼伏蓋吾聞諸古人至是而得寓目焉又其下也石壁四立淵淵其潭其廣可度而深不可探納之滙之其量有涵濯之而清酌之而甘清不可䙝甘不可婪乃溢而流紆徐百折隂洞之竇陽崖之缺潺潺湲湲滔滔決決吾嘗見其行也而未見其輟也乃若日星開朗動盪元精玉作之色金作之聲載歌滄浪以舒幽情厥或霧霾晦䝉呼吸變化既鬱而洩呌號怒罵大資經綸小入圖畫一日之内四時之中北南西東隨觀異容發太極祕妙地天通詰之莫辨測之莫窮非川上翁其將焉從邪山僧執筆請書於石予何言哉一笑而擲毁淫祠頌中丞林公巡視江西之一月檄毁諸寺觀神廟弗在典與志者有司聞公風義奉行唯謹時寳舟由臨江入袁河見土木像浮水而下後先沓至乃嘆曰自狄梁公後不見此舉幾百年矣而公毅然行之不俟終日非信道篤而自知明者其孰能之公昔在朝嘗止建寺語忤權要得禍幾斃後在雲南又嘗毁諸佛像蓋其闢邪崇正之念平生所存如此而非出於一時之感也夫安得不力哉頌曰卓哉林公心與道謀是衞是距以邪為仇昔在先朝有寺將建孰不惜之而莫敢諫公書千言佛骨之遺曰有殃咎臣身不辭赦公復公惟明天子僉曰異哉一生九死公節滇南其氣益昌曰毁斯毁神伏鬼藏公來江西諏民之瘼飲之食之培善剗惡公曰汝吏民愚罔覺􅃕人求神日谷以壑粤若帝舜絶地天通降禮折刑民協於衷我非為異期古是同國憲斯在汝罔弗共吏奉公檄夙夜惟力靡逺弗臨靡深弗即曰火而焚曰水而流美石良材學宫是修唐有狄公嘗事斯舉太史書之君子所予公心正直與神明居凡此邪慝弗怒而除除其邪慝一崇我正曰士曰民肅肅於政民耕於郊士誦於庠雖賞不竊維禎維祥天子曰某汝入予輔士民曰嗟奪我父母奪我父母而弗敢留公在帝傍天下之休弔趙烈婦賦烈婦事予聞之志傳舊矣兹讀請祀疏而有感焉乃為賦以弔之賦曰慨孤城之無守兮忽井里之繹騷虎豹肆而逐人兮衆有家其焉逃孰不有夫兮為妻有舅姑兮為婦幸瞬息之苟生兮寧節義之是顧相宫牆之深邃兮或彼冦之弗求抱厥嬰以相從兮亦詎謂夫善謀彼碩人其曷見兮譚猶存予何敢死禍既殱於一家兮尚安之予舍此矧淫言之屢加兮初奚有於冶容惟一死之莫得兮恐予貞之弗終幸白刃之倐及兮免奔走之顛沛也矢九原以自歸兮見死者之無愧也惟日月之下照兮心耿耿其自明縱血流之弗跡兮將天光而並熒嗟女婦之在家兮猶臣子之在國彼朝梁而暮燕兮吾綱常其安屬惟此志之靡定兮謂夫音無夫而非夫或為雄兮投閣或為陵兮荅書蹈水火而必死兮雖愚者之能覩彼待姆與候符兮何為心之獨苦嗟罹盜其猶水火兮曠然感於今古嗚呼噫嘻魂兮曷歸入有懿親兮出將從夫古姬天㝠㝠兮魂不迷忽反顧於新宫兮増千載之涕洟樛木頌太恭人范氏今太常少卿兼翰林侍讀靳先生充道之母也太恭人歸贈太常公累娠不育公以為憂時太恭人方壯憂之甚屢請貳室而公弗從不期年太恭人有娠而太常生嗚呼婦之從人其重在嗣嗣之弗立祀將焉依故樛木之仁國風載焉太恭人之葬太常逺以墓銘見貽寳不佞考論其德竊最是事乃為樛木頌曰婉婉恭人維古淑媛慈惠貞良以從所天我嗣恐遲我心孔悲烝然夙夜念茲在茲我室于人嗣實由我我嗣未成非貳其可我卜我貳如弗獲已知嗣之重孰人孰已娶有不告我卜曷謀我貳既諧唯子之求母心何心心乎靳宗一念格天鬼神其從唯母是心吾道所向善養可王休容可相為家有子為國生賢匪庶而嫡孰知其然子賢維何克俊有德維邦之楨海内維則源源祿養夀母於堂良人乃瞑昭哉寵光咎三凶詞贈行人司副偶軒黄公某以行人奉使海外至羊嶼孤山大風激水石觸舟壞公乃溺死事在成化某甲子至於今談者哀之近讀司冦彭公所為誌銘予重悲焉凡中朝有事外國者必妙選超卓之士蓋孔門專對之許漢廷絶域之徵自昔則然矣行人公在莆若子賤在魯稱君子者無間言乃遭竒禍嗚呼悲哉予也鄙無能為公不朽竊怪風與水與石三者相值致茲慘烈肆斥為三凶詞以咎之詞曰嘻其甚哉風兮何烈水兮何激石何崛頑與風水擊三凶相朋賊我國士俾有一良酷不若是先生維善人維國紀綱虎符龍節王命是將而汝海弗航嘻其甚哉任載者水司動者風底柱頽波石哉爾功汝各有神曷其㝠曚水不可回風不可捕惟石可求而險不可渡乾坤茫茫孰知其故人亦有言泰山鴻毛殤子彭鏗孰公短長孰公重輕彼風水石有情無情曽何足徵我作咎詞以洩不平嗚呼先生容春堂前集巻一
