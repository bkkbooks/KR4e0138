body:
  text: 容春堂前集卷十五明邵寶撰表傳七首明故文林郎陽山縣知縣殷君墓表君初赴陽山道出江西㑹予於按察分司三日而別予舉仲尼忠信篤敬之訓為君誦之君志素定聞予言益自信不疑君平生有天下之慮每論治必曰嚴明其諸區畫無巨細一於整肅見寛弛之俗痛叱之不容口君自十二入邑庠受經于其姑之夫都御史冰壑盛公退與其外兄江西布政使中齋秦公訂質疑義學日有進然累困塲屋至四十二始膺貢卒業大學其為文雖時體必叅古法曰不如是不能過人評品精覈不隨人髙下此皆予所知及是為政往往相類獨其識大進無苛察之弊與昔頓異陽山𨽻廣之連州古所謂天下窮處君能不鄙夷其民始至即為講律令俾知趨避又大書為善最樂四字印給之有兄弟爭田者倣蘇清河故事反覆開諭皆感泣去凡死囚必求生道不得已焚香告天而後成獄獄中置一響板約曰寃未達者擊之有所召集書片紙于門皆如期至數月間恩信旁達逺近胥嚮而君以勞感瘴竟不起君病時吏民禱無虛日又走百里求醫連州及其没也市巷哭達于野君處事接物行以理遂止以理屈是非可否無少隱假與君㳺者始若難合終則浹洽至數十年弗替君諱貴字南金別號惺齋世為無鍚人永樂間有以進士累官至雲南布政使諱序者君之伯祖也君父縉母某氏君其仲子配莫氏先卒繼鮑氏有子二人曰聘臣莫出其別出曰夢臣女若干孫男女若干所著有惺齋集藏于家君生某年某月某日卒某年某月某日年六十一葬以卒之又明年某月某日墓在某地從先兆也君之䘮過杭予哭之慟聘臣等以墓表請遂為之其行之詳在其内弟莫如山誌銘者可互見也予嘗觀君論政似崔寔憂時似賈誼勤小物似江禄惇夫婦之愛似白居易篤朋友之義如李若谷落落儕輩中謂之迂者什人而九蓋至於陽山而後信焉士之於世修之已難孚之人尤難固如是哉後之欲知君者請徵於是是為表明故朝列大夫湖廣布政司右叅議華君墓表君諱山字仁甫別號靜菴華其氏也華自春秋來代有顯人至晉以孝稱者曰寶鍚諸華宗之入國朝以進士起家者若干人實自君始君年二十一舉于鄉三試禮部登成化乙未髙第釋褐知許州以父䘮去服除遷南京兵部武選員外郎再遷職方郎中以繼母䘮去服除改刑部擢湖廣右叅議奉勅提督太和山諸宫觀兼撫民分守居二年乃自請致仕以歸是為正徳丁卯又五年壬申以疾卒年六十有六子男三人伯頥季賁皆庠生其仲觀義官女一人歸庠生錢萃孫男女六人父季芳甫贈奉直大夫南京兵部員外郎母夏氏贈宜人繼母婁氏封太宜人室王氏贈宜人繼室施氏封宜人君子謂君以榮始終其葬也既有銘者其子頥等復立石墓前因其舅施君克和持莫君如山狀請予表之鄉士大夫類知君忠朴謙厚然君固亦有激發抗直者初君在許有王僉事塤之子某者司馬馬公壻也犯法當死董僉事齡欲曲全之君入分司庭辯至免冠籲天頓首不已董媿謝卒抵于法鈞鄰于許徽藩國焉許有奸民兩以地往獻凡若干頃君執不予董長史彛見許濠有荷華之觀肆言欲請之君曰是不可以言爭即日令决其水荷乃不華民免於擾臨潁民史經左誘其尹指盜誣人尹故為執政者友監司庇焉因减史罪君請附誣告致死人律上下稱允其在兵部先為武選後武選缺官君以職方郎中攝其事稽世閲人遷代紀襲惟覈惟法不少徇其在刑部能以安静息請託在湖廣尤著介特襄陽民馮成以罪减死當戍邊乆訟避遣君立遣之蔓逮者始獲安業道士有怙勢冐領度牒踰禮部數者君置之法鄖陽飢廩無以賑君為發襄陽粟或以擅告不聽房山為流民藪新作縣治而未城君曰非備也亟請城之其他事類是者尚多若愷弟近民者則固君所長弗論也君文學雅醇舉以易經而旁熟蔡氏書傳許政暇時為諸生講説無倦季芳甫夙以慤稱母初生君其父夏翁素知星術謂此子後當貴稍長學于魏茂之氏有勤敏稱其族之望曰時濟者於君為伯父行遂携以歸與其子珵珏同師講授後珵以貢官光禄署丞珏以進士累官南京吏部郎中而君為先登㮄于里門鄉人為時濟翁侈談之季芳沒于許須材弗得民吳茂者年七十餘矣有蜀材將為身圖乃以歸君季芳於是乎殮論者謂可以觀君惠焉君之請致仕也或曰有進階例少事竈媚可得之君曰此固以待恬退者兹欲附焉而乃用媚乎故歸以舊官其善退如此烏乎今之君子以成進士為榮君出而守郡入而分曹再出佐藩皆可以行志之地故不惟鄉人榮之而邦家咸榮之至於未老而請優㳺以終又古今之所謂榮者雖然榮而茍得之君子不貴也若君者庶幾無媿於榮焉爾矣吾故知君特為書其大者俾刻于石有過君墓而欲知其人者請於斯觀之李天瑞傳天瑞諱文祥姓李氏天瑞字也世為湖廣麻城人祖某正統壬戌進士累官山西布政使父某成化己丑進士歴陜西叅政叅政公配趙氏生天瑞五六歲即露頭角及就傅授以書多誦强記應口屬對輒能驚人十三能文十五學春秋書其簡曰學不到聖賢終為人下二十中鄉試髙第卒業南雍愈力於學登丁未進士以風義自持一時名士多與友善見沉浮世事者輒叱詈之上即阼上新政疏要在一權立法進賢黜奸廣言納諫語過切直疏入數日召詣左順門中人傳詰疏中中興再造等語以為不祥天瑞從容對命既而得㫖俾佐劇縣遂補咸寧丞至謁上官有欲門見之者天瑞郤立不進曰庭叅有禮此非其所上官改容禮之廵撫欲調守城卒從廵而民壯代守天瑞悉放民壯卒不果出凡居數月民吏畏服或言天瑞不宜外補上意解時三原王公再起掌銓因奏召還關中父老擁道號泣監司有所餽者悉謝不受人以孟子宋薛兼金為言天瑞曰孟子大賢必有所處吾寧過中不敢假以自欺也既至授職方主事居十八日中書舍人吉人以言下詔獄乃有媒蘖天瑞妄議朝政者於是被逮成狀下法司擬罪主者承望比附加重天瑞曰天下後世公義固在復何恨哉誣伏不辭中外寃之既而有欲指媒蘖者以訟其人懼乃密解從輕降興隆衞經歴興隆處苗夷間為雲貴要衝途有給遞疆有竊攘上慢下抗名分蕩然天瑞立法均差復招致寨長申斷塲禁雖異種部落亦凜然知畏相戒無犯提學吳副使檄兼學事天瑞首新文廟簿正祭品置田以供博選俊秀分齋肄業親為講説鄰境士聞風來逰者若干人俗尚邪術病必禱鬼喪必奉佛天瑞集僧巫火其書器遣就常業或以歲旱請召方士天瑞曰毋吾自禱之卜日齋戒將有事於群望是夜雨厥明徒跣走龍洞大雨及還乃止都御史鄧公廷瓉奉命征苗咨訪兵畧大竒其才以憲職薦天瑞曰昔以言出今以軍功進不可固辭不得乃請賫表京師因圖告歸疏兩上不許即日南還大雪中行數百里至商城曲河冰陷隕焉有司出諸冰中殯之弟文禎奔赴以其䘮歸𦵏于蔡家園之原天瑞少有大志讀書積學晝夜不息其在家敦行孝友施及宗姻至於義所未安輒侃侃正論辭受取予一審於義好分別是非寡合少容人頗稱傲亦不之恤及更事乆深自抑損每以浮名為慮凡有議論原古證今具有條緒於文亦然詩尚精婉所著有檢齋稿若干卷生男一曰京元夭死女二年三十論曰古有磊落竒偉之士天瑞殆其人哉方天瑞弱冠時精神氣槩殆將傲睨一世及遲回顛頓曾不少變而持之益堅其執禮似簡盡職似矯守法似刻非君子鮮能知之若夫歛華就實每恐規模太廣而才力弗逮不以自沮而必求往進咸寧之振奮興隆之綜理亦可觀矣充是心也何所不至而遽至於是豈非天哉先是天瑞雪中過予於許留三日而別論講經史旁及時事以至詞章翰墨無不品評自謂慕古用心極苦恐不能夀已而果然豈非天哉烏乎天之於才生之固難而卒自戕之果何為哉果何為哉史直菴傳直菴諱塤字元諧以子貴累封奉議大夫户部郎中姓史氏世為溧陽人係出周太史佚漢有諱恭者用外戚恩得矦其三子季元封平臺傳三世曰崇光武初遷青冀刺史以軍功改溧陽矦遂居溧陽終漢世世爵有功徳其地因廟食焉今謂之祖矦吳晉之際嵩爽等列爵數人唐宋以來代有顯者元敎諭大用為直菴五世祖生敎授和卿和卿生彦剛彦剛生舜安舜安生仲和號東莊東莊娶于周生直菴五歲而孤甫弱冠即有樹立之志每以不逮養父歲時祭祀流涕不已卒與弟某勤儉自勵復還故業既而祖矦廟田侵于鄉人訟而取之又念從兄源有戰没之忠從父辰有刲股之孝祖姑貞有沈淵之烈創祠於祖矦廟傍曰三節時矦族繁衍滿鄉邑居湖埭者且百餘家直菴行尊行稱朝夕省閲善者有勸不善者有戒戒之不從㑹衆撻之以是湖埭之史鮮犯法者平生剛直好義有巨室匿群盜直菴靣叱之巨室嗾盜刺焉盜至不忍害而去景泰天順間連三嵗歉直菴悉發貸里人後不能償不少校遇乏者輒周之雖妻子僅足而恒以為急故無疏戚近逺皆以長者稱之其家法暗合古人為君子所取者尤多年七十一以𢎞治丁未四月某日卒子三人學孳孚學舉進士今官郎中以治行稱孫三人論曰予與郎中君為同官嘗聞其道溧陽矦譜系甚悉又嘗聞其三節祠之故各為詩紀之及觀吳太史述直菴翁事行乃知世徳之後猶有人焉經著象賢傳論復始不可誣也使翁不自立以懷先古則所謂祖矦廟者且將廢墜況三節乎由是觀之翁惟無所遇故止於是茍有所遇其可書當有尤大者矣雖然翁不自見以歸其子孫豈有量哉豈有量哉厲青田傳青田諱昇字文振別號雪菴無錫人由縣學諸生升太學選青田知縣居若干年致其事歸鄉士大夫稱之曰青田君自為諸生耿介不妄言笑於辭受雖小不茍論事是非人賢否執所見不少狥人故或迂之或固之而識者謂其有古人風青田居萬山中與福建接壤間更葉宼民貧以猾號稱難治君治若甚易蓋得昔人羣吏奴㒒百姓妻子之意君初至民有周姓者與盤石衛軍某訟五年矣君聽之數語遂服出而哭曰厲公早至豈有是乆獄哉邑八都地報銀礦發監司臨焉議嵗以貢有術者謂山木潤秀所産必廣公直前曰吾聞金能尅木信若人言金氣盛矣木何得秀潤如此監司猶未信同官勤君從之君曰如吾民何申辯數四必寢乃已鎮守中貴嵗以礦一至其邑所費不貲君於饋不缺禮而已至其他費歲率省昔之半由是民安其業君乃勸學興賢旌舉節孝禮文亦彬彬焉先是知縣金川謝某有善政民嘗以君並論君屢請老輒留于民適朝京師故得遂請民聞之欲追留之而君至家矣於是既為立碑復建祠祠之及没衆設祭哭於祠所著有雪菴集子一人曰得秀二泉卲寶氏曰仲尼告子張忠信篤敬雖蠻貃之邦行矣青田為浙東岩邑而厲君為之遺愛在民去而思之沒而弔之若不能解于心庶幾得乎是者不然此豈聲音笑貎所能為哉君歸未及年人尤嘉其恬退於是青田之名益著予按察兩浙適青田諸生以史事見詢君遺蹟蓋無間吾鄉評云張氏女傳張氏女秀汝寧西平人父文嘗為慈利主簿女年十七許嫁同邑尹氏子琳越明年琳病死女聞訃易服悲哀若已嫁者塟之日請于父母往送焉臨穴慿棺痛哭幾絶及反復請即尹當喪父母許之疏食麤衣日夕侍靈几左右未嘗離一歩舅姑不忍也微勸以他適女曰是何言歟誓死為謝一日聞嫡母宋疾甚亟歸問焉宋思鹿羮女知不可求乃濳刲股肉作羮以進宋疾遂愈女復至尹氏所居守如故又五年以疾卒年二十六先是廵撫都御史無錫楊叔璣廵按御史武進薛志淵皆嘗遣使存問且令有司月給米一石既而有司請旌表事下禮部以不應例罷及其卒也逺近見聞莫不悼惜二族長老暨鄉人耆碩合議塟之從琳兆謂之女志廵撫復為文遣官祭其墓越十有三年予來守許許於西平比境前吏目薛悅之以告予為之傳云論曰盧予家有言女之情以接見而恩生成婦而義重乃若張女秀蓋所謂生有未見之悲死有非婦之痛者而恩義如此其加于人豈啻一等哉昔衞女嫁齊太子中道太子死問傅母曰且往當喪喪畢女不肯歸終之以死此與張女事若相類然張女未至中道且不問於傅母其天資又當過之况專於夫或衰於親出於庶或忽於嫡人情皆然而女也獨能不偏重焉使其被以關雎之化而得薫陶之素則其進而之於中行也殆不難哉東山公前傳東山公姓劉氏名某字時雍岳之華容人其先自宋都統寶從岳武穆平湖南武穆死棄官居華容十一傳至松巖公某歴官按察副使實生公公㓜時楊文定公見而器之為定今名稍長學于黎文僖公領湖廣鄉薦第一登甲申進士改翰林庶吉士與今大學士西涯李公輩十八人同時有文學名授職方主事進車駕郎中嘗奉使山東河南上救荒事宜若干條皆切時務未幾尚書項公忠以職方事劇乃請調公職方公按章酬應動中事㑹時有中官用事獻取交南策以中㫖索永樂中調軍數急公故匿其籍使者旁午吏數被捶若弗聞者獨徐以利害告尚書余公子俊力言沮之事遂寢朝鮮使者為隣境所邀刼請改貢道中官有朝鮮人為之地事下兵部議將從之公曰朝鮮貢自鴉骨關由遼陽經廣寧過前屯而後入山海迂回四三大鎮此祖宗微意今若自鴨緑江抵前屯山海路太徑恐貽他日憂卒不從敵數入雲中邊帥失律中外震驚調發戰守日無虛時每一報至尚書必曰劉郎中云何所言輙行行輙獲效時右侍郎缺中官有欲薦公者遣人言于尚書冀一往見公巽辭謝之然猶迫趣不已乃自求外尋出為福建叅政奉勅廵海海道兵乆弛而倉儲既于勢盜卒難就理公曰在得人耳謀於鎮廵首選衞所軍政官而擇其尤者總諸水寨兵造戰哨船各若干艘緩急異用葺倉計儲立收支法寨設一舘而親督察之不半年海道肅然琉球商舶遭風漂至平海守者私于閫帥以犯邊報欲勦之而取其財兵且集矣公廉得其情遣數人乘小艇招其首領厚恤而遣之衆始譁然後竟信服陞廣東右布政使適黄賊初靖財匱費繁有司城從化縣累年不就民尤患之公究事體節費便民擇人授之逾月而城成先是廣西泗城州官族弄兵方命兵部議撫諭之不服則繼以兵謂是行非公不可公承檄即往反覆曉譬先恩信次福禍詞懇意至數月間叛者大悟胥戕以滅兵竟不用既還廣東後山宼作督府檄公率兵平之公恐延及脅從乃下生擒之令有所獲則集土人審實乃斬因而得生者過半嘗過崖山弔大忠祠念宋慈元后陵寢無主輒泫然曰后與陸張二臣同死國今大忠有祠而慈元不祀忽諸於義弗稱謀於白沙陳公甫為之立廟人感其義不日而就轉浙江左布政使在浙甫八月吏蠧漸革而用法優裕犯者不怨於是河決張秋擢公右副都御史治焉公既至乃集山東河南二省守臣議以事關運道莫敢適主公曰河性猛悍張秋乃下流喉襟未可輒治治於上流分導南行復築長堤以禦横波且防大名山東之患候其循軌而後決可塞也遂疏孫家渡河三十里四府營河十里築長堤起河南胙城盡徐州經滑長垣東明曹單諸縣長三百六十里量能任功敷和宣勤五旬而事竣㑹上命内外臣來乃於張秋口南開河三里通運舟及冬水涸而塞之已而決塞悉如公初議有勅就勞且召之還加賜羊酒金綺公曰兹惟天意某敢貧以為功聞者益重之論功進左副都御史佐院事公疏辭不許轉户部右侍郎再轉左侍郎又兩疏乞歸不許越一年敵逼雲中上谷上命兼左僉都御史往理兵餉公以内地芻糧不能出關出關者率以銀易之利歸勢家乃擬奏减價寛民別設倉於近地募商給軍率以時直由是宿弊濳去什九有三便焉及條上他便宜皆從之未㡬還朝居數月移疾乞歸疏再上不許而同朝亦多願留者公堅卧三請僅得予告因自為夀藏記叙其平生履歴嵗月刻石以歸曰恐後人溢美我重地下累耳君子謂公不伐之心逺及身後况其生乎其可謂忠且朴矣公釋褐迄請老凡三十五年所至士服民懷有所為皆願盡力至於權貴强悍號稱難處者公夷然與之無不得其愛慕至有終身焉者接引士類寸善片長每自以為不及憂時憫俗形於色辭事關國家利病斷斷不易而周旋其間必求濟而后已嘗以先世二宗屬族疏散墓幾弗可識作敦本堂嵗舉二祭祭畢有燕以合族人且為家規誦燕所敎子讀書兼力農務常命督耕雨中曰習勤忘勞習逸成惰吾困之將以益之也或勸公為子乞恩公曰此固國典然以待賢有功者某何敢哉公為詩文有自得之趣敷奏覆議操筆立就而明白切要轉折流通足以動人有東山集若干卷公二子長曰祖生次曰祖修賛曰寳㓜聞公名而未獲識及至京師則聞西涯李公謂公乃昔人所謂與物無競臨事有為者退竊自嘆安得一接風采以慰平生而今乃得朝夕承候叅之所聞信不誣也公敭歴中外八遷厥官靖宼者三行邊者二治水者一皆天下之所謂難事而從容暇豫以能有成功其所不為又皆夫人所未及見且不敢執者由是觀之則其所養亦足暴於天下矣乃若壯而奮庸老而委順而皆不失已焉非盛徳其能與於斯詩稱明哲書敘孝恭公有之而或乃謂古今人不相及豈其然哉豈其然哉容春堂前集卷十五
