body:
  text: 容春堂後集巻十二明邵寳撰七言律一百三十首白石草堂奉次涯翁先生二首涯翁先生為林鎮江廷元題白石草堂詩䟦肓将至江南二泉見之其能黜焉之語輙用韻以歸廷元情見乎辭北望長安近日邊春風函丈憶當年新題歲月經綸外晩節乾坤杖几前詩巻有情多汲引門牆何日更延緣朝來忽對林京口却道西堂别是天草堂回首海雲邊舊路依稀㡬隔年白石峯髙幽興裏滄江水濶大方前閒來月櫂頻乗夢老去雲巢再結縁領得涯翁新墨去文星長照斗南天又用前韻寄林鎮江詩興時來案牘邊故山風物自年年淥分一水橋南北青擁群峯屋後前明月半窻空有夢清風兩腋竟何縁秪應獨上金山寺吟倚滄江萬里天雨坐用舊韻簷溜聲聞隱几邊去年多雨復今年林臯緑樹層城外江浦黃梅五月前夜榻長懸須雅客晝簾深下謝塵縁西山雲氣東山月他日容春亦此天靜中寫懷用前韻策杖山邊復水邊病餘翻喜得長年風光共逐初晴後春色還憐未雨前何處乾坤堪一嘯平生泉石本多縁閒來獨上西樓望古華峰髙正倚天寄崔工侍民瞻用前韻郴州南望楚雲邊顔色長懷别我年嶺北春從梅折後衡陽書在鴈歸前雪淹夜榻無佳興己巳冬在東朝房月照秋槎有勝緣乙丑秋在江西滕王閣病起萊衣方再舞晩風吹雨過梅天荅朱雲厓何梅壑復用前韻腹笥便便不姓邊暮年詩興似青年一春風雨題緘外萬古江山放筆前壑倚梅花真入畫雲生厓石自成縁晩凉相過須乗興酒在清罇月在天又荅林鎮江麻姑山下石磯邊艤櫂逢君是此年落月夢長千里外歸雲心逺九峯前東曹吏牘忙中事南國詩筒病後縁公暇漫從江郭眺滄浪歌起白鷗天壽涯翁老師用癸酉守歲韻濯纓歌罷水無塵靜裏乾坤太古春藜杖有情隨興逺綵毫無象與時新星辰又值初生日山斗同瞻未老身白髪門生江海上捧觴真羡在庭人閒居用舊韻短牆隔斷市橋塵地為容春早得春春雨却扶嘉樹老草堂方舞綵衣新經綸不入間邊夢筆硯長隨病後身剛愛緑隂簾閣坐抱琴驚見扣門人書院新成再用前韻二首小堂開向綠隂邊故老相過問徃年水接少陵新檻外草生茂叔舊庭前山從西望城纔隔溪自東行路亦縁㣲醉獨歌人莫訝春衣初試晩晴天書策重繙架上塵兩年多負病中春手将筆試初知徤心與盤銘㡬見新方得養親真愛日未成報國敢輕身冉涇門巷深如許擊節髙歌不和人秋夜與東泉瀾庵坐月病起尋詩此夜多隔簾月竹弄婆娑燈光相對知人否酒戒未開如夜何它日更期天淡蕩去年猶憶雨滂沱西風吹綻東籬菊湏向花前一浩歌病起山行半年病足懶登山咫尺烟霞夢寐間再到欲題新歲月相逢爭識舊容顔流過亂石清泉靜飛盡浮雲翠壁間漫道坐來多渴思一茶還待老僧還寒日懷卧雲上人用昌黎韻病餘情緒還無頼久擬臨泉洗宿埃載酒定須三宿返送茶時復一僧來身從白日風時避眼到青山雪處廻為問西齋懸榻地荒雲和葉㡬堆堆甲戌正月三日山行次史敏甫萬壑春姿一夜還畫船載酒共㸔山泉經古寺自雙澗亭倚危峯還㡬間真樂竟須同客醉浮生何必羡僧閒南巖更得和風早笑索梅花不作慳徐用中寓松風閣詩以為問舞雩何處問髙壇松閣春風晩帶寒病起不須操几杖詩成剛在凭䦨干榻縁徐孺初教下罏為王郎試索㸔我欲坐君聽古調隔牆還有玉千竿雨中漫成陽春門外水田田野老歌聲逺近連雨應雪來曽計日月從星在故占天漫㸔東渚横孤艇久擬南風振五絃更愛亭前新種竹一畨沾灑一森然寄許東廬老去詩篇興若何一春城郭少經過隂憐緑樹風偏好濕怪黃梅雨太多靜力更憑閒打整狂心都逐病消磨勞君問訊無堪報㣲醉亭前獨放歌㣲醉亭在容春精舍取康節詩意荅桂子朴南行将母㡳須悲浙水灘髙恐到遲秋月春花皆我夢海風江雨此何時孟郊心苦吟遊子韓老情多賦别知儘把新懷對難弟玉峯回首思㝠迷聞李四順訃百年家學有箕裘晩擢髙科仕亦優北斗望中心鳯闕西山歸處首狐丘一封誥尚虛新墓萬巻書還滿舊樓最是渠南亭子在黃梅細雨不勝秋次楊淡成去年鴈早曽聞賦今賦還聞鴈晩來信入上林雲有路居空彭蠡水無陔獨㸔黃菊疑秦令未獵長楊媿漢才莫道喘牛非我問飯牛歌罷自生哀贈邊伯山教授㸔盡長安一日花還從八月返星槎儒官故冷師模重宦路雖迂國體華地接蘇湖風有自天空蓬閬海無涯棟梁榱桷皆時用歌向先生不是誇送費鵝湖先生歸鉛山歸興乗秋度玉山始知佳境在人間雲鴻影外江湖逺臯鶴聲中日月間秘閣文章天下手都門圗畫老臣顔感公相問無能荅病客江南正掩闗壽賈封君上壽人膺太史封白頭林下慶遭逢清時恩典隆冠冕令子文章重鼎鐘鳩杖晩扶閒處立兕觥春映醉時容仁源不在南陽水莫問今生菊㡬叢正徳甲戌秋賈翰長鳴和書來言其尊甫封君壽九十請詩慶之封君予在許時所敬愛者詩之慶其能已諸時予病新起有詩而未克書越二年丙子秋七月望始克書以歸屋舟為京口錢宗玉賦風波懶逐世浮沈小閣憑虛敞素襟采藥每牽浮海夢乗槎聊遣濟川心水能載覆旁觀久天與周旋獨坐深聞道江南船似屋中泠何地覔㠶隂幽居四詠涯翁老師近寄至園亭四詩正與幽居景物相合依韻寫意聊以自適他日有便将呈焉請教樹色乍濃還淡弄朝暉樹色依稀定是非樓上望回川厯厯城隂遮斷路微微曉雲有影團傾蓋春水無波淥染衣獨坐懷人心正逺天空渭北鴈初歸花香花氣絪緼共煖風誰從起處問西東偶來似與游絲下却散還隨夢蝶空曲檻有時應獨駐幽居何地不相通等閒擬得涯翁句已落人間色相中鳥聲一鳥不鳴山可憐更憐鳴鳥過簷前友聲信有如鸎語喜報曽聞是鵲傳南國音成非别調北牕夢醒正閒眠近來習靜心初定獨把無聲寄五絃鶴舞誤向丹邱共羽流多情今得此亭幽長鳴似與髙人語屢舞誰於醉客求風羽九逵能抗晩野心萬里欲橫秋試将衣袖閒招引轉盡花隂意未休自和幽居四詠昨和四詩以專詠物而畧於所見兹復用韻如左晩晴無物不含暉此樹天将悅我非一碧故㴠秋水凈半黃初着曉霜微吟隨望逺長憑几情憶隂多坐解衣莫道寂寥誰與共天風時引白雲歸忽有幽香共午風小春庭院菊籬東一絲何處來應逺百和無端界本空漫道芝蘭隨物化真聞黍稷與神通麓堂地隔四千里三嘆餘情數紙中綠樹春聲正自憐秋深幽鳥復庭前谷中音似聞人語池上書應為客傳短調自須風静聽多情誰起日髙眠閒來漫擬成新曲長嘯臨流付一絃饒州遣鶴剰風流小圃新開竹徑幽見影淺将於水監聞聲髙欲自天求圖中恨識青田晩夢裏疑㸔赤壁秋莫向主人撩醉眼病餘如我且須休寄吳憲使濂涇草堂清可憐幽期已在立秋前社中詩自無新什方外書應有别傳野曠正堪乗月歩日髙猶為避風眠伯牙山水鍾期耳萬古知音不在絃壽涯翁老師甲戌有詩酒託黎判簿轉上秋九月始達故詩中首謝之緘詩到已過弧辰十月書回墨尚新獨樂園成身未老靜觀心在物皆春千鈞筆試三盃酒數仞牆趨四海人古華山泉深更逺年年持此慶生申壽吳憲使憲使吳海洲開六十之燕某初勿藥未能徃稱觴謹奉春酒一尊侑之以詩東藩回首興飄然須信吾儒有列仙湖海正當初返地星辰還值始生年南山靜對陶潜菊春酒香分陸羽泉笑問丹丘何處是為君重賦逺遊篇觀紅梅次玉林韻予庭舊有梅一株故有觀梅之約客復以二株至遂以起興兩樹新從浙上來一株先向檻前開春回老榦經三月酒人酡顔定㡬盃畫筆詞鋒爭勝負花情人意兩徘徊玉林髙唱南沙和月上東山客始回清興逢春似水來紅梅花下小筵開儘将顔色降詩律獨引風情入酒盃積雪不知香逗遛落霞還與影徘徊海棠更有西軒在賞事真須第二回雪中紅梅紅入梅花淡更妍一株曽向麓堂前為春獨歩還今日與雪相違又㡬年素質已叅丹鼎客朱顔應作羽衣仙憑誰喚醒羅浮夢不信瑤池别有天得莫如山浦文玉和章復用韻一首禁體物語初陽一㸃便成妍占斷容春小閣前犀浦有招須避地海棠相見定忘年姿容漫倚雲邊客香影空傳海上仙寄語詩人休物色已知描畫不如天送梅吹殘玉笛有餘妍愁向東風問雨前共矢心情如白日長留顔色似青年㸔過春陌且從客飡盡朝霞還訪仙何處江臯可遺玦羅浮回首海南天再詠紅梅梅禁太嚴濟之以寛猶琴之有汎聲也為知音者報江頭兩株來越人却依舊樹爭鮮新竹松相與可偕老桃杏不知應妬春特書方将補月令殊色乃復煩花神倚䦨獨對東風語萬古清香真絶塵送秦中丞國聲之湖南兼呈東山先生中丞旌節自東來黃鶴樓髙倚憲臺江漢朝宗千古地風霆鼓舞一時才洞庭水濶春初渡衡嶽雲深晩正開老矣東山煩問訊蒼生回首柰何哉送華大叅文光春寒且風深坐東堂玉林翁至特索梅心送行之作即請限韻成二首兼簡劉提學老鶴風清蜀道寒使君直節動朝端峨眉月小天非逺灔澦春深水正寛今雨客懷還對榻平生交誼自勝冠益州畫像聞猶在石本憑君一寄㸔兵戈銷盡蜀江深甘雨和風使者臨寛得一分非小惠逺從三殿是佳音他年鳴鳯曽為瑞何處甘棠不作隂提學分司如我問古梅花下憶論心雨坐桃花水來花正飛鳴雨既過還烟霏道人多情自晩閣童子好事空春衣溪上芳洲白鷗劇城邊野塘青草肥山園竹萌未盈尺有僕修籬乗櫂歸陳嘉言送䨇鶴以詩遣之次韻為謝病後身輕欲御風羽人誰遣過牆東乾坤有地雲隨馭日月多情鳥出籠詩社㡬人時野服使君五馬古侯封天機動我鳴還舞更愛新巢在老松餽笋於侯明府明府有詩用韻荅之玉在山中敢自珍令君詩到便成春坡翁他日言何劇石老此庵㸔已真吾尚德書院乃九龍山人隠地山人畫竹妙今古人謂得之此中友石山人别號也巢鳯欲來先振羽籜龍方卧漸生鱗筠籠落落慙為政只餽清饞不餽貧以梅實櫻桃贈文玉文玉索詩用前餽笋韻人有相知果有珍盤中朱綠眼中春休論金鼎調還未且道筠籠贈是真試熟漫憑犀浦鳥薦新兼侑錦江鱗無端生意詩囊在報盡璚瑤正不貧得乾笋法於文玉用前韻為謝待聘多君久席珍等閒熏炙亦成春相知豈謂新時好不厭曽聞淡裏真煮石每教尋活火屠龍誰解斸生鱗庭前更有䨇梅實古鼎無勞笑我貧再荅文玉用前韻市橋櫻笋競相珍四月風光未盡春病欲自醫須此靜才難時用是吾真南山地近無叢桂滄海波深有一鱗文玉號桂巖久屈禮部數畒小園千挺竹野人家事不曽貧三荅文玉二首十載胷藏萬古珍揮毫應待殿前春群龍變化知非幻二鳥遭逢恐未真獨夜坐醒雲鶴夢長風歌動石鯨鱗古人青眼如猶在肥馬寧教笑士貧蕨芽未許殿山珍孤竹根回地底春歌菉千年風故好聞韶三月味應真滄江雷雨龍無種深谷霞烟玉有鱗漫詠杜詩還自笑數株桃樹濟誰貧追輓荘定山江浦荘生會索其先大夫定山公輓詩於予因緘見素林公詩來蓋於今十五年矣雨中無事檢而得之追感夙誼用韻成章尺疏曽聞奏玉皇上元燈火謝詞章百年不起燕臺馬萬古猶存魯廟羊劒委烟霞還嶽氣筆參星斗動江光長歌滴盡東堂雨祗缺青山一瓣香次浦文玉夏日遣懷午風清愛葛為袍銷盡爐薫政寂寥愁裏得詩如客到詩到時予晝寝方起夢中觀物笑僧驕適夢入古寺僧有以智永帖出觀者予曰於公書何如僧曰頡頏予大笑而寤三年病合投閒計十里遊辭避暑招吳海洲屢約出遊皆謝之有曲和君還自已古琴疎越未堪調待曙樓為俞司諫國昌賦次涯翁老師韻髙棟層軒帶宿霏明星耿耿見依稀天廻北斗還何指地向東方漸有暉寺下雲林僧未出城邊野水鳥初飛主人聽徹金門漏五鳯樓前候衮衣熱中和杜自遣時行風咳十人九而我欲逃還不能漫扣蘇槃弄白石且誦歐賦憎蒼蝇萬里樓臺正隱隱三年几格何仍仍所思宛宛隔秋水墨汁飛來字字冰次侯明府登濕雲亭兩載憂民太瘦生偶乗秋興試山晴路過野寺雲初濕人在危厓鶴共清有石儘堪他日頌此泉真與我心盟大夫能事登髙賦莫訝天風起斾旌次侯明府九日遊惠泉病不登髙數負秋却憐令尹此閒遊清知流水山中出逺見雲飛海上浮僧具袈裟惟茗供客過方丈有詩留秪應稼穡闗心在莫話忘機欲對鷗十四夜小酌将圓未圓天上月似老非老人間人醉時歌調㡬年復病起酒盃今夜新多情不啻共千里何地更堪容一塵明日南樓獨清詠風吹星漢欲粼粼送戴仲鶡謫嶺南和侯明府清江浦口馳詞地左順門前待報時逺道謫官何日到小臣憂國有天知鏡㸔白髪朝還掩櫂指青山晩更移老我間居復多病秋來愁和送君詩秋日侯明府見過病中三度見秋風車騎時時枉縣公野服豈堪迎上客清談真可慰深𠂻地從㤗伯風流在人與中牟惠愛同簾閣不知移日影薫爐茗盌有䨇童送趙立之應貢君門北望政如天有志元從鼓篋年嵗賦逺追三代典命題親御九重筵詩成行巻如携嶽酒盡離觴更酌泉莫向秋風逐車騎新春須上渡江船西郊觀稼奉次涯翁先生詔許明農值此年西郊垂稼正田田一時偶出遊還賦四海方詢食與眠溪水多魚供有饌野人皆酒饗無筵壽村風景誰堪擬韋杜同歸尺五天謝侯明府遣醫視老母用壬申歲聞侍飬命韻偶於文檄見都俞多少憂懷為掃除父母歌傳千載上用召杜事頌明府君臣藥在一言餘三春寸草慈親德片紙千金令尹書醫國有人吾豈敢秪從花徑導潘輿丙子元日試筆栽得野松蒼色多隔牆菉竹亦猗猗焚香掃地自我是投刺到門如客何亭上髙登移晩岫溪邊徐歩起新波去年今日曽題句和者盈屏皆可歌十四日觀燈前日方愁月負燈夜來燈月興還増橋通碧水灣灣路街覆青松處處棚海上不知蓬島隔春來漫擬廣寒登少年樂事今如夢駐馬長安㡬度曽十九日漫述用元夕韻柬坐客是日京師稱燕九吳文定嘗有詩紀事滿城風雨夜收燈草色堦前㸔漸増三載病軀纔入市一時詩興敢題棚遶門水可容舟泊負郭山須借屐登燕九有名何必問匏翁詩向薊門曽春日寄玉林春日題詩問玉林山中春色淺還深初鳴谷鳥乗風煖半吐巖花坐野隂畫舫壺觴遊客興竹罏泉水老僧心憑君為約新晴後繡嶺堂前共一吟次韻荅如山讀書曽共借東林竹上題詩歲月深千仞羽儀㸔晩霽㡬畨花信作春隂而今諸老多朙眼自古良工獨苦心我有一盃非浪致為君先唱鹿鳴吟沈方伯良臣雨中見訪以歸田數詩索和和其一以荅之歸計休論負郭田險途曽訝璧能全故人今雨非他客吾道滄洲共此年秋興䞉添三徑菊春潮不到五湖船憑君再擬相尋地數㸃閒鷗野水邊哭喻子乾數口西悲蜀道難一驄五馬舊相㸔風傳天上春光近月墮雲間海氣寒事志已脩千里郡功名俄蓋百年棺惟餘南省相知意獨取焦桐忍淚弹上巳之明日登錫山頂一首壬申歲九日嘗一登病後不意復可登也閒上東峰望五湖舊時亭榭半荒蕪山中石刻曽傳漢水上䲭夷獨弔吳南澗袈裟僧迓客西巖尊榼僕爭途五年再起登髙興問道山花識我無用登山韻送尹吉士舜弼㡬年蹤跡隔江湖冉冉春愁寄緑蕪北望京華常傍斗東來舟楫又經吳鵝湖鹿洞今何夢瀛水蓬山舊有途我憶麓堂心更切臨書翻愧一言無舜弼去張提學汝立至復用韻一首舊遊回首㡬鄱湖白鹿堂壇半欲蕪周氏圖書元自孔楚邦風壤尚連吳壯觀獨泛三江水正學先驅萬里途聞道春來多雨露山城桃李已開無春日訪莫如山不遇南郭沙邊一繫舟山亭歩轉更登樓僕知舊事問能荅客有餘情行復留背谷且㸔花獨放隔林曽聽鳥相求主人試屐今何處應在龍峰最上頭華藏寺和玉林湧金亭倚水雲髙三月餘寒尚綺袍古寺客來敲栁癭老僧門外掃松毛天風欲定還舟楫春色無端漫酒醪獨立蒼茫思何限吳山烟樹越江濤送潘侍御起溟柱史新從兩浙還清風隨鷁過吳山南方郡國廵行後北極朝廷仰望間八月秋濤虛谷震六橋春雨落花斑朝來暫艤蓉湖棹却愛沙鷗水際閒吹笛吹笛禪堂夏日長月明還憶玉河觴弟兄於我交能世山水而今㑹在鄉興逐㣲波生緑酒夢将幻景出黃粱清秋更擬酬君地髙閣松風坐夕陽四月十七日呂太僕仲仁暨諸昆季酌我于惠山禪悦院返櫂有述昔在京師嘗以中秋夜令伶人吹笛侑酒于今十有七年矣松風閣在聽松去禪悦二里午熱書事用西涯公韻公用杜韻二首矮矮牀如席地然十分晝漏七分眠銅槃水石自手弄山閣風松猶夢牽故人饋酒江浙上童子誦書秦漢邊東街鈴聲冰水過時向慈闈須買錢古澗泉如為我然松隂有石更堪眠仰髙長對山靈在習靜将勝塵務牽大孤小孤匯澤畔南髙北髙潮海邊人間山水卽風月清興到時那用錢喜得精舍地有作用杜韻寺門東北徑悠然小洞隂多鹿慣眠出地泉聲無石礙倚天松骨有蘿牽病餘杖几三年後夢裏堂壇五老邊蓮社在隣吾不入門人今助買山錢苦熱用虞邵庵韻酷暑凌人未肎休深居謝客汗還流月星影照此堂夜風雨夢回何處秋吾道江湖應久病誰歌雲漢不深憂長松古澗新精舍願與諸君裹茗遊雪洲追吊夏叔度亦用涯翁尊師韻月寒沙白水如烟興在中洲望宛然豈有機心将避世不如醫道已通仙孤舟自繫須人渡一鶴時飛為客傳雨露春來江岸濶吊君何處放湖船怡閒翁七十壽詩怡閒翁今年壽七十其子太學生昌言等以翁意請為詩予問開燕之期昌言曰翁不欲不敢以燕然則詩何為曰翁固欲之予異焉賦此以復翁吾邵出也自其先君景婁公甥于吾邵者迄今百年而徃來視他姻獨久以篤予惡能無情哉翁之欲予詩其亦此意也夫不須開燕却須詩七十年來兩好兒晨策杖時無地礙夜焚香處有天知中書宅畔雲連合羅漢祠前水滿池莫向人間問蓬島人間人以百為期中書為王友石其故宅在怡閒宅西怡閒後圃有管羅漢祠相傳管産其地正月三日小餞施克和於惠山酒間克和誦劉後村元日詩為令因用其韻再致别意是日予奉老母觀新精舍故别設于知微山房云精舎初成近惠泉幾回辰至起僧眠新正屈指今三日舊約驚心又一年慈母板輿應偶爾佳賔草飯乃居然憑君莫問山中事萬里青雲彩鷁前精舍成荅徐侍御侍御擬復命還日來觀故結語云憲臺檄至築書臺野寺東頭闢草萊新水檻前㸔正脉古松壇下賞遺材詩傳涯老能千紙酒酹山靈又一盃剛道暮春吾興在繡衣天上亦朝回春日懷僧知微今雨山中未煑茶僧房岑寂閉梅花雲心逐我俱無跡草色逢春漸有涯林徑㡬時松葉滿洞門何處竹枝斜古洞穿斜竹唐人詩也説者誤指其地故云野人持贈青藜杖欲向吟詩社裏誇寄題宜興李宗源䨇桐用吳寗庵韻䨇桐自比䨇南金地得寛閒謝斧尋吳老詩題從始植文郎圖畫已成隂霜黃碧葉秋将及月白青枝夜不禁吾樹在庭須客賦為君還作短長吟秦氏山莊用慰國英韻五峯東下見平林中老當年卜隱心龍尾白雲㸔不逺水心明月坐曽深誰家桃李春無色此地松筠晩有隂欲過荒亭橋板斷幾時香茗更相尋和荅喬司馬參賛堂髙倚碧天舊章新賀又今年野情不問山深淺春色争㸔雨後前梅栁雲霞俱物候江湖廊廟各詩篇江南二月多遊興獨放清溪愛我船觀梅病起逢春意漸寛梅花又向檻前㸔色如桃李無塵俗心與冰霜共歲寒素後也知施采易黃時纔覺作酸難東風吹雨花朝近對酒題詩政未䦨寄復張提學用舊韻兩月東廵厯四州幾多詩景待君收節從海上應遄返題為泉頭合再留湖上晩風雲未定山中春水鳥相求濯纓别有滄浪調何處蘭亭水曲流荅南沙用前韻紅梅又發舊年枝多事相尋酒與詩草木欲蕃先喜色冰霜雖老獨貞姿君歌已到能言地我賞偏於半醉時誰道忘憂但萱草北堂移此亦應宜次韻荅見素先生二首一别金谿十載餘癸亥秋郊齋猶憶識荆初丙辰春吟詩壇逺旗頻偃執法臺髙席屢虛閩嶠衣冠千里夢蜀川兵革㡬封書花籬竹徑尋常地慙愧先生問卜居寄夏徳樹用素翁見寄韻赤城别我十年餘赤城徳樹别號猶憶麻城語我初麻城謂李天瑞予知德樹以天瑞言故夜月江南鴻鴈少春風海上翠屏虛佳人空谷長勞夢逺道平生未盡書聞道草𤣥多暇日杖藜時過野翁居聞龐方伯元化訃激昻意氣欲凌雲他日同朝僅見君國論是非誰史筆諌垣輕重幾彈文山連吳楚三台近元化天台人水出江河兩紀分公嘗為河南廣西二藩信宿信州成永訣舊詩凄楚不堪聞山中訪王校書閒㸔書法到山中騎從多煩兩縣公茶鼎潤生移竹雨墨池清起落梅風閉門謝客精廬右掃榻勞僧丈室東只恐春深遊客到青松林外萬花紅連隂曉為北風開春入山中第一回亭上逺天須捲幔檻前新水欲浮盃校書客避叅軍辟問字人傳别駕來明日更邀朱趣玉黃公澗畔踏蒼苔紅梅一首用涯翁壬申歲韻紅梅䦨畔興無涯頗覺詩從去歲賖貞白心腸元絶物尋常顔色自成家品題合著孤山月行軰休論二月花剰取餘情與來歲只今誰遜復誰誇上巳日私試諸生于二泉精舍一從脩禊起流觴千載髙風尚未忘此日閒來非此客吾山佳處復吾堂卧龍庵外尋黃石活水源頭見紫陽沂上是非人莫問草亭真對海天長觀錫山塔基寄顧少叅與成東峯石塔對西峯雲去雲來俯仰中萬古不磨銘地語百年誰試補天功雷将化雨春回蟄斗避文星夜起虹何日落成須我報望湖亭上一罇同夜坐復用韻寄與成夜聞雷雨過前峯忽見浮圖在眼中最喜江城増勝槩却愁山鬼妬成功白雲影䕶無聲瀑碧海光揺不霽虹東望怡亭西劍井路人傳䜟定應同龔守誠為山于水北荘詩以訊之用玉林韻却對真山作假山白雲來徃隔松闗屐從一徑委蛇處亭在䨇峯掩映間地僻有人能㪚逸時清何物不幽閒二泉精舍長隣近日見林翁杖屨還連日在聽松冗未有詩雨中補之誰将第一扁西神竹徑新開及晩春刼火不燒無屋地海鷗如避有機人池邊水脉通時活閣上松聲聽後真聞道觀音經巻在欲從老衲話來因經為王中舍筆先髙祖伯完公有名在巻尾再用前韻一首休将冥漠問山神繡嶺花開别様春竹少千竿分兩徑松髙百尺抱三人茶罏欲試新泉在畫壁曽㸔老衲眞内翰中書前軰行閒來衰劣愧相因又用前韻專詠松風髙閣松風似有神驟如秋雨細如春病餘毎愛同遊客靜裏偏宜獨聽人已向陶廬誇地逺更於荘籟認天真眼前一片虛空界童子何知問起因雨中和荅浦文玉五月江寒晝閣清雨中草色喚愁生繫舟未問水深淺策杖還㸔雲重輕客去不知談未盡詩來剛及夢初醒百年吾道今如此何處滄浪共濯纓雨中次文玉庭下䨇松相對清東風吹花松子生四簷飛雨葛衣薄一徑帶雲藜杖輕課詩未足銷多暇戒酒非闗愛獨醒何處滄洲堪一眺已知吾道負冠纓送潘平陽東歸匝月復南遊百里封疆舊是州鴈蕩峰髙連兩越錢塘潮長及中秋琴横晝日隨鳴鶴冕露春風起卧牛更喜老親迎養便馮公輿接少微舟馮公嶺少微山皆途中所經舟輿相接舟十九輿十一之達有迎養之志因以勸之予在浙嘗有事於處故知温之道登華甥西樓用唐人韻滿天風雨獨登樓林杪清烟淡欲收雲重不知今日午月明還憶去年秋道經南郭蒲帆近望入東廬草徑幽何處新晴堪試屐溪橋北去有髙邱雨中在堠陽聞徐東之訃垂涕對客情見乎辭老來方恨少知音忽報斯人又陸沈萬里枯槎空一水百年敝帚獨千金唐衢淚盡江湖逺李渤盟寒歲月深此句指白鹿舊遊頭白門生君自道君嘗寄予詩有頭白門生之句晉陵回首重傷心雨中自堠陽還冉涇雨齋正喜故人來興盡将歸雨又催溪上船如春水坐雲中帆似楚江回傍沙白鳥時䨇下隔浦紅蕖已半開囬首東廬休惜别月明曽約共登臺一室鬱蒸今兩異他年一室焚香坐且眠門外刺常愁客入社中詩却喜人傳古盤水石堪時弄髙閣風松亦夢牽短壑層冰何處所杜陵歌罷興悠然兩精舍一在冉涇之上予日居之一在惠山泉左旬月一至焉兩精舍共二泉名惠麓清風似冉涇松倚一峰元有徑草迷七曲已無亭倪雲林為先世題畫有七曲灣邵家亭子面西山之句渠通活水門前碧嶺出浮雲屋上青剛道病餘多謝客小舟時復過西汀松風閣追次前人韻秦中齋一首一木還将古殿支真公五葉又逢師閒雲錫逺心初定凈水瓶深手自持南澗浚泉尋石竇西林望月倚松枝舊庵更有新樓閣淮海先生為作碑莫東川二首倚天松不受風揺白鶴廻翔似有招何處客來忘此閣故人詩在憶同朝采苓每帶雲䨇屐供石時添水一瓢莫道山中無語者老僧送罷又逢樵石畔青梧正有華白雲深處問僧家壁葭夢逺猶疑畫罏竹盟寒不為茶繡嶺峯回松起籟黃梅時盡雨如花流泉東入蓉湖去遙聽灘聲走碧沙松風閣坐圓金方益二僧和莫東川詩來呈用韻賞之母怪侏􅍣語雜華靜中禪却自成家石庵故有詩題竹雪老曽聞榜説茶三日天能留閣雨一盃吾亦對山花秪應便放中秋棹黃阜墩邊倚月沙寄周都憲文化病餘思見故人難東浙山川入畫㸔風雨百年多幻景江湖萬里㡬驚湍尊前每進新鳩杖篋裏還㸔舊豸冠尚憶䖍州同駐節鬱孤臺上望長安送朱推官曽從天際望蒼梧西向潯州莫問途獄訟豈應輕郡國經綸未必負江湖文書散後詩還有車服臨時牒倂無指日聽宣風憲召鬱林船石又東吳侯職方書問我冉涇聽松二精舍詩以為荅逺問容春及九峯北湖於我意偏濃幽懷自許長如石晩歲相㸔有此松石冉涇物松聽松物江上書回鄉國騎山中夢醒縣樓鐘何時更是思君地活水源頭一短笻再荅王郡公太守詩來老衲收清風長滿聽松樓為山坐雨誰三日嗟我懷人又一秋對酒且須諸客賦省耕還及早春遊最憐多稼亭前月夜夜光明照逺洲九日與諸生適南野重陽無雨慰農家我亦閒行野水涯髙嶺未登心獨徃美人不見眼誰遮雲隨風㪚千林凈溪抱村流一道斜有酒莫教都飲盡明朝還約㸔黃花過舍弟小庄復用前韻溪深竹宻兩三家樹栁為牆近北涯淺水漸容新渚出疎林猶作逺山遮路廻賈客帆初轉風急行人㡌欲斜日暮相㸔興無盡漫從舟畔采蘋花送葛泉州老稱漢吏尚青年路指南閩上越船何郡獨非盤錯地吾山元有洌寒泉田田麻麥東風雨夜夜星辰北極天行過莆陽煩問訊素翁荘在野雲邊觀馮廷伯園池湖石石丈新從湖上來君家方築水中臺百年風力誰能挽萬古雲根我更培袍笏有時真合取斧尋何處尚須裁題名未敢輕拈筆恐露精光逼斗台得羅建寧和篇復用韻一首君向江郎㸔石來馮家池上復登臺竒蹤漫謂星辰隕秀色還從雨露培杖者几須梧竹製仙家衣是薜蘿裁若教移置鐘山下何處金聲更賦台精舍奉安忠定祠七載蘋蘩也自脩聽松庵外竹林幽髙山仰止今祠宇舊事荒凉某水邱諸葛表中空漢賊考亭筆下有春秋共㸔簫鼓迎神地一道清泉萬古流容春堂後集巻十二
