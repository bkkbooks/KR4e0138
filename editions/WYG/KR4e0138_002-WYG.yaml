body:
  text: 容春堂前集巻二明邵寳撰古詩五十六首慶成侍燕嘉燕陳明堂黼座當春陽惠風拂宫扇親覩穆穆光冠簪肅趨拜共進萬夀觴簫韶叶舞佾宛然見虞唐三苗獨何為不如獸蹌蹌天髙復地厚永世垂衣裳送東山公行邊司徒始受命朝野賀得人兩邊數萬騎所望公一身公囊無芻糧公心有經綸亦有為國念對越天與神豈不知匱乏鞠躬在茲辰公復不自用乃薦一二臣遺事旁搜閱微言博咨詢稽首殿陛下丰儀動髙旻登車向西郭尊俎羅朝紳慨然盡餘酌老眼無邊塵謂公唐室晏謂公漢家恂千載有韓范公也眞其倫公有激衆義公有撫衆仁未至百草秋既至萬卉春緩急在公手瑣瑣何足陳送劉用熙今之異人劉牧龍綽有兩漢先秦風等閒蹤跡不肯露下混此世將無同或時耿耿作怪語恍忽使我難形容殷彛周鼎初出土置在清廟明堂中又如江水撞石鐘天然音調非人工蛟龍躍舞送雷雨倐歘霽景留雲松直將飛步泰華峰沐浴沆瀣觀洪濛身騎白鶴眞自適口啖紫芝猶未窮彼哉皦皦不解事唯子能固還能通我今規子復有説古來夷隘惠不恭吁嗟此别擬三載河淮合流日夜東尚友千古誰其從惠山泉歌奉次涯翁先生擊石長歌復長嘯山無人聲泉有竅詩人曽謂茲山空又聞山與南海通向來泉託山人姓公為收名名始定石池左右多檻泉東流迤邐非突還非懸公門如海納川水肯向東方遺一士出山還似在山清中有石子星之精别公無言懷獨㵼公乃題詩贈行者髙詞盡得今古竒我歌合向觀泉時年年夀公泉一酌公每書來問瀺灂援琴欲寄山中音水風吹月千里無遐心世恩席上答諸公我行西江自江東載書千里乘天風今夕何夕詩壇中碧瞳共照燈花紅歐陽居士蘇坡翁文星爛漫今古同不才有幸承諸公翰林四老儒之通宜興呉克温華亭顧士亷太倉毛憲清姑蘇呉南夫金石一振萬籟空司封金齒張進之明並兩考功太原喬希大宜興杭世卿髙堂白日懸青銅少游秦國聲才思如冥鴻江湖渺渺誰能窮職方郴陽何子元平生懷至忠每談疆埸思彎弓從容授簡錢南宫世恩總㑹諸壑歸三洪清秋攜對江上楓亦有短句隨鳴蟲雲霄北上勞湘筒夀張都運先生古之洛社在洛中其人徃矣猶髙風今之洛社名偶同乃在蓉湖之北龍峰之東中有主者心好古脫略塵網追遺蹤憶從三策獻天子釋褐登廷稱進士漫將時事寄吟哦對客揮毫思如水職方郎官領禁符觀風三輔賦兩都朝鮮使者出闗去盡道威明前所無鎭東樓髙絶雲海想見當年美丰采洞庭煙水嚴灘雲耿耿幽懷三十載人言州縣徒勞人使君所至皆陽春平生經濟有餘地萬里江湖空一身今年歸來閩海上洛社新堂舊屏障滿庭賓客燕清秋水色山光正相向先生謝客焚妙香紫微天逺雲衢長膝前觴獻森諸郎君不見黎平謠東平志回首他年皆小試願公再起再歸來手植青松看晩翠贈王生子春子從天台來衣裳帶雲氣誰知山澤臞有志在當世經史隨所詢一一見深致董生去古近髙明得超詣胡然叢猥中獨與前修契士患飢與寒大節窮愈勵論事須盡變變盡乃精義源頭濬眞泉如斯日川逝孰謂政粗迹而謂文小技所貴道在茲毫釐辨同異我行入湖南子作東歸計伯氏古逸民知我知子意明年黄鶴樓待子共光霽邃菴詩長安陌上結書屋庭院沈沈幾紆曲最深者號文宻房如度層雲入幽谷主人峩冠講且讀上遡虞唐猶未足手探元化𤣥更𤣥諸生拱侍森如玉原泉滔滔放四隩始知大雅歌穆穆聲宏以實理則然陋彼尋常事邊幅陵莪菁菁時雨沐不出户庭人望屬乍聞俎豆復軍旅平視邊隅如輦轂隠微知謹公所獨至虚生白能旁燭蘇公漫説風水渙邵子閒吟地雷復我曹淺薄徒有目辱許升堂載瞻肅行行深入得大觀何處湘南還岳麓江雨來西津渡頭江雨來雨㸃入江江水迴雲飛逐風沙走石咫尺不見東岡臺臺樹叢叢還可望臺上看江更奔放明朝擬下鄱陽船月色浮江水微浪題卧龍菴用晦翁韻此有石如龍天成諒非鑿是何空洞中雲水起復落常疑雷雨時飛舞出深壑作菴者何人清風宛如昨兩公固龍德恨也俱晩作秋霖不濟旱千載領餘酌方切憂旱懷行矣予所樂江湖極秋波長歌對冥漠至亡女七兒墓日無光兮風色寒望兒墳兮心悲酸墳有土兮土有棺兒咫尺兮欲見難澆澆墳頭酒易乾紙成灰兮散漫漫散漫漫魂不返清淚下兮盈酒􅊦題元章拜石圖為俞國昌元章玩世人低頭拜竒石或問此何為我意人不識璆琳豈有聲碣砥且無力拜如或使之但覺吾意適石竒恐未多屢拜非所惜我心不可轉萬仞立蒼壁石也倘能拜向我須屈膝今雖無膝屈有拜當以臆我今對畫圖兀坐風雨夕擊磬和新吟他年亦陳迹泉上贈錢水部八月十九日十賢祠成同社諸君徃落之方燕飲泉上而錢水部東湖適至衆賀得佳客遂以禮神之觴觴東湖東湖亦不辭也於是相與談笑終日予愛其有古風致於是乎贈君來訪我廬我方行山中命駕即我所浩興乘天風風晨與雪夕今古將無同豈在形迹間所貴心相逢我有一勺泉坐奠桑苧翁載酌持獻君侑以金芙蓉或歌滄浪篇聲在澗水東君聞乃和之擊節秋山空坐我石壇上共聽風前松寄題錢水部詩塜次沈石田韻錢翁作詩塜粤惟己巳年厥地乃舊遊山水相延緣翁詩出翁心混混眞源泉譬諸山澤臞勤修欲成仙載賡陽春調剩讀秋水篇知音孰云少三嘆聞朱絃嗟予遇君晩縦言及前賢官銜列水部詩名亦由天投簪謝明主瀼西視琴川㸃檢手所筆清興常飄然天機忌獨洩穴置還幽𤣥行將化為石萬古存貞堅尋常有匡山頭白歸青蓮韜光伺來哲古道君有焉忠定祠享歌迎神吉日蠲兮祠公佩鏘趨兮庭中湛露洒兮天風暾初發兮水東靈皇皇兮既降叶􅃫下儀兮翔龍響應谷兮鼓鐘慰予思兮公有嘉容送神神翱翔兮漸遐載白雲兮紫霞墓閩山兮天之涯錢塘兮公第梁溪兮公家陸有梁兮海有槎我思公兮咨嗟酒間短歌次呉太史延陵太史文之豪手持椽筆輕一毫卻厭漆鏤思匏陶别築壇社延風騷健如風舸凌秋濤元氣浩浩天滔滔忽入冰壑難容舠豫章言必稱禹皋下視元白等播鼗坐令萬類歸籠牢間出水碧兼金膏闗西夫子眞􅃫毛咳唾中律鳴鸞刀風吹錦服飄雙縧仙骨曽啖瑤池桃手持權衡有縱操收歛英邁胷中韜彼哉坐井吝以驕瑞物一見辟百妖裁之品藻誰能逃深許抱甕惡桔槔一日千里不覺勞何嘗仰首逢人號我喜麻直能扶蒿起家江左大布袍兩以文字魁羣髦寳鑑出匣弓辭弢東陵野人隨羽旄不飲自醉黄生醪雅終奏俗空嘈嘈不可得麾安可招自知一著良獨髙芝山寺題壁芝山草如黛青春空復過我來憩古寺落花看漸多林鶯惜芳景和我登山歌白日不可挽更奈風雨何老僧供香茗小坐成天和江公舊遊處長松罣新蘿止水一畝池流衍同江河晩峰縱髙眺番陽𣺌雲波五老近相别笑指廬山阿湘夫人用唐人韻洒淚向楚岫白雲生逺愁重華不復返江水日夜流美人美如玉春草滿汀洲望雲巻龍山一片雲萬古白未了松楸誰家墳青青倚孤嶠望雲起孝思無間昏與曉我懷狄梁公清風滿華表劒江道中我攜數巻書歌誦劒江上書中何所言一一超形象我心㑹其神源泉莫知鄉中有幾微存欲語恐添障安得凌長風趨拜濓溪丈為龍僉事致仁題畫愛汝鍾山草堂靜我欲造之無所因百年觀物自得意風吹淮水波潾潾小舟西來乘有人悠然興到山花春便須入室盡此夕滄浪一聲何處津呉太史畫册雲飛本無意鶴鳴復何心危登復長嘯我亦開吾襟雲哉承我御鶴也起我吟興至不自知天地髙且深俯仰八極中悠悠懷古今無魚沽海富魚蝦過者多買食異哉有今年茲物或幾息載歌豐年詩臨淵三太息樂安大嶺次見素公五平五仄海嶺夙孕秀登廷持忠清廿載正色立千秋和聲鳴此地屈體力吾人増光精霧瘴乆閼積霆颷初流行鶴骨瘦竦直鸞儀繁披横在北本岱岳於南聊方城萬姓忽雨潤三公眞雲輕亢作汲老揖卑為侯生迎吏屬苦切束工徒欣畨更闢異有故事推賢無遺名父老覩後恐兒童瞻先爭一語破訟牒雙聲游詩評砥柱賴獨障扶搖看髙征孔孟道雅振皋夔功竒成鑿鑿社稷計昭昭神明盟傳紀黜楚越詩歌懲舒荆雅頌古聖則春秋今王程面質祖訓若心期皇猷平誼策重國事軻書髙天氓九鼎任一摰無勞懷莘耕題郭子儀見虜圖唐之大將汾陽公天畀才略成貞忠平生信義貫金石倉卒眼底無羌戎戎來如雲驅以風我下我馬何從容諸酋羅拜誓酹酒大人先兆巫言中世稱談笑可折衝萬古一羽雲霄空龍眠居士丹青雄筆到此事眞竒逢尋常傳玩嵗復月時於敝篋騰長虹焚香坐閱精神通古來尚友只數老九原可作吾其從于嗟乎九原可作吾其從濟河謠夜過青縣作河可濟濟師不可濟濟賊賊濟避我師東入鉅野澤澤西為濟南為淮賊乎賊乎安徃哉野多罄室無青草豕突鯨奔我師老卻恨令公來不蚤天津舟中夜坐觀水河水東注海海流亦復東人言如沃焦畢竟誰能窮蓬萊不可渡萬里悲天風北斗揭西柄影落清波中耿耿欲迴瀾蕩漾涵虚空昔聞有碣石助禹成神功我將徃求之道險多蛟龍靜觀嘆逝者緬懷川上翁偶讀蓋巖傳六獸入室莫敢攖巖也追格不稅纓㒒分有死義無生家為重兮身為輕獸在途劒在手一狐殱五狼走我報主人我何有有㒒如巖主知否題太白圖仙人騎驢如騎鯨睥睨塵海思東瀛等閒相逢但叱咜誰知萬古千秋情醉來天地小於斗鞭策雷霆鬼神走豪竒自比齊東人大雅猶懷魯中叟青春想像華清宫解識仙人圖畫中滿浮淥酒喚不醒葛巾颯颯生天風山樵曲南山髙髙入雲中有隠者操斧斤上方伐木下界聞聲可聞人不可即自上求之霧濕我衣自下從之磵阻我舄縣厓如天勞我力郊壇分獻東鎭退而有述登壇禮東鎭嶪峩如在前惟皇對上帝小臣敢忘䖍沂山望海岱其髙薄雲天豈無方國祀百靈合從乾惠風自巽隅馨香偏中天明神固無語我思通幽𤣥心祈耳復聽影響若有然山東盜方蔓禾稼妨大田輯寧當自兹在在歌豐年何以明予衷素月西南懸元夕獨坐月光照燈夕清賞人所同而我獨不樂有親在江東江東豈無月白髪少懽容念子未即見厭見燈花紅冉冉天邊雲悠悠江上峰當食發長嘆何時得相從秀江舟中上水復下水昨日非今朝春江淥如酒天風澹飄搖坐數江上峰乍近忽已遙歸心如東流迤邐迎海潮長歌武夷曲和以廬山謠閒情寄芳草極目青迢迢淵明圖為邃菴先生題吾聞先生本是山中人誰遣作吏隨風塵督郵迎送亦常事浩然歸興凌秋旻孤懷每感孔明漢一咏漫及荆軻秦北窻午夢入寥廓南山秋色爭嶙峋昨非今是公自道門前五栁年年春柴桑彭澤纔尺只五老峰髙隔彭蠡片帆朝掛暮及門萬古乾坤一江水昔聞竒幻榖城石又聞清激嚴陵灘是誰為易誰為難菊松三逕地雖小鴻鵠千里天何寛三南夫子今傅相心期逺在羲皇上君不見丁夘橋邊山水深江南春暮勞歸心風雲天上濟時了我亦訪公攜我琴廬山謠用李韻廬山倚南極乾坤一髙邱絶頂有佳處可作仙人樓詔書命我訪竒品等閒卻遂平生遊白鹿洞在五老傍我來講席重鋪張青雲見彩霞生光玉聲左右泉不斷我行東峰澗有梁眼明還直西南望澄湖煙水俱蒼蒼不知乘舟者誰子望我應恨天衢長廬山如廬幾萬間與仙作主去復還黄塵滔滔似海水此山即是蓬萊山載歌唐人詩我句亦時發九江秀色行攬之楚帆風送飛鴻沒五老五老眞有情萬峰之中獨自成何時拄杖徃㕘立上呼羣仙下紫京笑攀北斗挽銀漢共洗濁世鄰太清聞錢希翁訃海鶴奄以逝海天邈難招髙鳴尚我耳尋聲竟寥寥伊昔來鳴初居然破羣囂中鳴發天妙寡和多見嘲老心在萬里有林不成巢彩􅃫雲冥冥青田草蕭蕭哀音天弗聞引吭徒為勞乃今蛻世紛復得返逍遙仙骨當不朽我銘瘞江皋人日喜晴我來洪都城人日喜初霽夙興省鐘聲起視星斗麗澄湖動晨光雲霾散天際樓臺東復西㕘差藹清氣惠風蕩前楹公餘步還憩案牘雜詩書吾事非日計獨賀陽道亨從茲破隂翳請看迴軺時春深滿庭翠新喻道中夏木交垂隂登登入山路遙峰薄雲青川原莽回互逾岡見長溪可涉亦可渡驅車獨西之磴小僅容步幽花自成姿時時竹間露仰觀天宇寛萬有悉中布我懷美一人滄江渺煙霧香爐峰懷李謫仙半空飛流天作竒謫仙之詩眞似之雲松有巢今不見但見老僧歌妙詞香爐紫煙日復夕散落平湖渺無迹九江秀色如我何我訪仙人東掛席採薇曲岐山有仁者白首思來歸願聞康衢謠不圖見戎衣渴夢北海水饑謝西山薇死從泰伯遊此志終無違感興和李懋卿三首明生又今夕浮雲亦消除風吹薄暮雨炎歊為之袪而我坐中庭洒然心靜虚浩歌古人句得意已忘書又夏日苦炎熱浩思嵩山巔清泉環左右佳木䕃後前天風有時至大音猶渾全坐此不能徃西望心獨憐又我行汝潁間陶穴猶太古譬如觀鼎彝令人變聞覩豈無好樓居巧極易摧腐回首太室山一望髙萬武寄題東林寺壁鴈門僧避胡塵來匡廬山中尋講臺誰云淨土在西竺此池自有蓮花開蓮花開開千萬朶江南君臣不疑我淵明故是避世人菊花醉揷頭上巾攢眉掉臂謝公去一杯濁酒堪全眞當年意在誰獨識虎溪笑處泉流石至今古塔依西林月落江雲樹千尺乆聞徐朝文訃見胡獻臣始信明聽得金矢有譽淮海區南征載持憲清風與之俱楚氛接腥蜃兵符雜刑書鄭僑戒水狎一日三年如慈元復祠廟儼然古文儒坐令弄潢子稍戢萑蒲餘進階始稱使滇途險仍紆方憂萬里駕坦道生悲吁君病果何似卻怪平生臞瓊瑰夙入夢邱首眞成虚瞑矣緣國事淺之誰敢歟野哭古所惡洒淚蘭陵墟楚江漁父圖有臞一夫立荒浦人云三閭問漁父楚江風景是邪非而况原心越千古原心上有先王知天地可質中無疑夫豈不解漁父意揚波歠醨焉用之物無滯礙能推移是聖者事吾何知蒼蒼故吾山湛湛故吾水宗國如何吾病矣九死侵尋無一是蒼梧帝逺天閽幽上下四方徒逺遊雲驂風駕倐萬里歸來江上令人愁長揖向漁父漁父難與謀誓將魚腹為狐邱君不見滄浪歌漁父去煙霧茫茫不知處止水池止水池芝山隂丞相初去國指水矢此心水止心亦止上有青天臨朝臨池暮臨池丞相心人不知風塵來江漢沸止水池丞相死他日之心止於此饒娥哭饒娥哭哭何為哭求見父面不圖今見屍屍浮水怪露已矣娥不知即使娥不死見屍未但已伏屍三日哭娥也終赴水娥心誠水神靈江上如聞號慟聲水怪水怪猶縱横砥柱歌黄河之水天上來越數千里龍門開龍門南東有山出是名砥柱千丈髙崒嵂水來不敢衝左右互洄潏山石巖巖復齒齒力有幾何能勝水從來元氣植根深萬古千秋此中止君不見金焦兩山控海門江水到此勢已分不如此山當河急流處驟如風馬方羣奔秋濤春漲暮撞朝擊巋獨存又不見碣石遮海道九河播合今瀾倒不如此山為障早柱哉柱哉立自天功成神禹乘舟年滄桑有變此柱終無遷于嗟乎滄桑有變此柱終無遷補洛中越歌越人夏統遊于洛遇賈充充諷之使歌統以足扣舟引聲而歌者三今亡其詞偶讀夏傳補之如左慕歌統云禹寓嵇山朝㑹萬國授化鄙邦崩殂而葬百姓咸詠遂作慕歌慕歌兮慕歌東漸兮海波海無波兮山有阿明德逺兮玉帛孔多微斯人兮吾如魚何慕歌兮慕歌河女之章統云孝女曹娥年甫十四其父墮江不得屍娥仰天哀號中流悲歎便投水死父子喪屍後乃俱出國人哀其孝義為作河女之章潮何為兮不回人何之兮不起父生兮女生父死兮女死嵗復嵗兮江濱人之心兮潮水潮水兮有聲伯姬兮有靈紛兩涯兮觀者孰父子兮無情秋冥冥兮江峰青小海唱統云伍子胥諌呉王不用見戮投海國人痛其忠烈為作小海唱潮來兮無天潮去兮何地若為憑兮斯厲彼鴟夷兮水中匪匏瓜兮焉繫潮來兮誰驅潮去兮誰殿言之流兮何從海東迴兮鏐箭潮來兮悲呉潮去兮弔越忠千古兮長寃潮復潮兮江月觀李劒州樂歌譜劒州名璧字白夫􅃫簫聲斷驚風雨十有三絃移短柱江上何人一笛横别作黄鍾起宫羽劒州劒州何苦心小懸鐘鼓髙張琴呉歌聽罷今蜀道金玉近來眞爾音擬子陵辭陵來為臣陵亦有言輔義懷仁吾喪我守臣於何有陵去為友客星犯兮日月光故人卧兮江湖長來時心去時迹山有雲兮江有石狄國老五龍夾日日不沈公門桃李皆成林狄國老伊周心遷桐辟管天下乂伊周之學春秋義狄國老忠有餘平生曽讀伊周書為唐討賊當何如如是邪不如是獨憐國老身先死鼂錯墓鼂公潁川産墓在城東隅顧茲一抔土爾來千載餘中更幾兵戈不與荒城俱公計不庇身朝議夕就誅我昔讀公傳亦嘗笑其愚豈有身後謀猶能庇邱墟大愚見深忠耿耿固不渝而況公論在信史有特書自今重封植永久期無虞八龍塚北原有荒邱纍纍亘西東相傳自古昔葬者漢八龍一蟄呼不起幽幽閟𤣥宫適野見遺蹟徘徊仰髙風于嗟此神物時用乃不終孰為神君藏孰為慈明封千秋氣不泯化為草叢叢立石當古道我意將焉窮尉氏婦婦時廬於其姑之墓三年矣子道出墓左見焉諭之使還嗟汝婦孝汝姑三年廬墓聲嗚嗚淚灑墓上柏柏樹為之枯彼反唇此廬墓此可訝兮彼可怒寸土如寸金寸寸皆婦心取汝心不取汝孝天地之間有名敎容春堂前集巻二
