body:
  text: 容春堂前集卷十九明邵寶撰書簡一十六篇賀西涯李公加太子太保啓即日伏惟某官閤下特進師垣再遷卿位三朝養望終聖學於緝熙四海仰成永天休於篤棐坐而論道啟乃沃心揚賡載之風是在今日符夢卜之兆何負斯民某早厠門生晩䝉國士報從雙闕快天日之清明賛乏一詞恨江湖之踈逺謹具啓奉賀不宣賀匏菴吳公進禮部尚書啓即日伏惟某官閤下徳義淵純文章奥雅歐陽修稱韓子異世無今司馬遷聞董生同時有古天假絲綸之重人瞻彛鼎之竒詹尹付一名儒元良攸繫宗伯典三大禮寅直是供鈞軸尤待於秉持宸旒方厪於注矚某南省門生也遥聞大拜無任欣忭之至謹具啓奉賀不宣復中丞林公書伏承廵撫之命甚為地方生靈賀然天下望入輔徳乆矣而執事又志在道徳先江湖而後廊廟吾君吾相必有所處也包孝肅連攻張方平宋郊罷之而代為三司故歐陽公有蹊田奪牛之疏執事奉詔而來與孝肅事不同且言韓公事婉不失實直不妨厚君子之道固如是爾又何疑焉寳即日由新喻之安福蓋預集諸生不可中止趨臺之期坐是遲緩萬罪萬罪尊集賜閲為敎多矣已録副本詳加校勘容當上呈其原本別差人送上伏乞檢納他書籍封在院者寳不敢與干冐威尊無任悚慄之至謹奉啓復李少叅書令郎至足見不外但執詞太謙執禮太恭寳方訝其過當不敢當及讀來敎乃若以寳有所聞知為能資益於人者寳執書惶悚益不敢當孟子曰人之患在好為人師如寳不肖其於聖賢之道志則有矣而入門進歩之方蓋茫乎未之聞也方將就有道而正焉而敢曰師云哉况令郎天資不凡家學有自固不當在弟子之列也執事斯文先達吾黨長者乃不以寶之不肖屢加引誨令郎天瑞又辱與交契之分寳也資其補益多矣然則執事之子天瑞之弟固吾之友也凡有所聞不敢不告凡有所告不敢不盡固吾之分也何必曰師曰弟子云哉是以不避冐越敢因伻旋少致區區非敢飾虛辭於尊者之前也蓋辭其所當辭任其所當任也執事亮之所賜一一拜領附此伸謝即日逺行萬惟為國自愛不宣上徐中丞先生書得邸報承執事都憲臺廵撫河南善類幸甚生靈幸甚伏惟執事為政於兹且七年矣凡治下之有識者莫不曰明習典故莫如徐公抗直不阿莫如徐公肯為百姓任怨莫如徐公而所謂清介云者則無間小大邇逺同聲一辭以是翹首企足仰望執事之為廵撫也此非為執事一人計凡以為民耳今既如所望矣旬日之間號令設施宜必有以大慰斯民之望者李子堅所謂觀聽望深聲名太盛蘇子瞻所謂恩徳已厚怨讟易生者願執事留意焉歐陽公知開封所代包孝肅以威嚴御下名震都邑公簡易循理不求赫赫之名有以包公之政勵公者公曰凡人材性不一用其所長事無不舉强其所短勢必不逮吾亦任吾所長耳源懷廵北邊鎮將尼元須與懷少有舊貪穢狼籍置酒請懷懷曰今日是懷與故人飲酒之坐非鞠獄之所也明日公庭始為使人檢鎮將罪狀之處耳既而表劾元須吕東萊曰世俗多謂公私不兩立此大不然所行若合道理則公私兩全公不敗事私不傷義夫包公以嚴肅為政未見其為不善而歐陽公乃不肯强其所短以襲其所長况政非包公之政乎源懷劾貪穢之故人東萊猶或非之况故人非若源懷之故人者乎寳愚敢以為執事初政獻焉執事裁之寳也執事之鄉晩進也於執事之榮進而賀之禮也義也然而在治屬則不敢稱賀者分也亦義也區區之心不能自已乃敢獨為此説以獻門下謂士之所以賛於公卿可也謂後進之所以效於長者亦可也惟勿以冐瀆為罪是幸復陸大叅書寳晩生且甚無似誤蒙雅愛欲引之於道徳之歸竊自幸甚以為得師策勵之餘思所以少裨盛徳者無他有所聞輒以告焉庶㡬古人愛助之心為山之喻耳近者僭以書達左右其為事蓋亦甚細非有大損益於盛徳也執事聞之即引以為過而要其咎於不主敬屈賜手書諄複不已嗚呼此豈聲音笑貎之所能為哉蓋執事於斯道實用力乆是故見之也真見之也真是故應之也速小者如此大者可知此誠古人所難今人不論也况若寳者而顧自足自欺可不可乎寳於是既重嘆服又益有以見得師之實也洧川再見曲承開諭詞色之間益和益謙隨事説理務求要歸此正儒者格致之功著實精切不間人已處非若世之號長厚者陽為受言而隂拒之也執事乃以為訑訑毋乃自疑太過乎彼固有聞人之言不問是非不考可否一則曰吾過矣二則曰吾過矣至考其行猶昔焉者真執事之罪人也執事毋乃自疑太過乎且執事之愛寳也以義寳之敬執事也亦以義夫然則雖沮拒之叱絶之繼此茍有所聞焉且將盡言以效一得而况深自引過如執事今昔之二書哉又况洧川之㑹執事能以寳之一言孜孜講求若此之鄭重哉且執事嘗曰自段南陽後惟見國賢論議又曰自一峰後肯不為世俗諛態者惟國賢此書自顧何人而敢當此執事不以為失言而以為愧悔抑又何也執事名髙天下文傳士夫澤在郡邑非一日矣所以為國為民為前修為後進者當有所處寳嘗謂天下之位不同也職不同也同此位同此職而君子居之若加重焉位若加重職若加重則上之倚之也亦加重下之望之也亦加重論議者待之亦加重紀載者求之亦加重而顧可以尋常自視哉執事畏天憫人檢身慮事其亦至矣充是心也將何所不至乎事有上下理無上下盡其下則亦可以補上之不足實能之而曰不能執事之徳於是為益光矣惟執事上念吾君下念吾民近念天下之口逺念史官之筆務進其重者焉吾黨之幸也老母撫育不肖雖免於世俗之失墜而不能至古人之成立寳之罪也比者屢厪埀問且有佳句歐陽之擬尚不敢而又有紫陽之云惶汗惶汗雖然不敢自棄也惟執事毋終棄之狀元文字今特録上望以所咏佳句足成一章大筆書之懸諸中堂寶也請吾母坐其側跪進一觴而歌之使吾母知寳也見重於大君子如此以是少慰其心而為怡神養氣之助則執事之賜也何如哉狂愚之言萬罪萬罪與李孟寅書春間病冗失於款餞負慊負慊即日抵文府起居何如容春之記實惟前輩妙詞先世遺蹟自元季至今百數十年石刻既亾墨本亦鮮雖有傳録未足取信寳切恨之成化辛丑偶與令外舅子才范君同試禮部談及斯文始知原稿尚存約以南還歸我曾未幾時子才下世繼以回禄方自感嘆以為不可復得重吾子孫之恨而去歲仲冬獲覩風采坐談之頃又知斯文重厪收護且辱慨然許以拜賜吾兄體悉人情如此凡在見聞孰不贊服髙義况寳與寒族之人宜何如感激也哉兹因甯菴先生家人之便少伸謝臆兼伺再命倘附便人尤望封識完固寳不勝惓惓答楊杭州簡前日從史還草草奉謝兹張翺去復附起居艸艸如前日也春寒惟珍愛是祝外祭兩峰文一通煩為致之靈筵炙雞絮酒逺不能具又以勤庖人非不誠於伯髙也餘伺別布復廵撫朱都憲書金吳江來辱賜書喻及坊牌寔不肖之光豈特吾族之人欲之吾鄉之人皆欲之但寳念自登第以來為州八年無一善政比入户曹又二年矣而尸素之咎倍焉安敢勞吾民費公帑以累髙明哉魯僖公新作南門春秋特書之説者以為不時韓昭矦作髙門其臣亦以時詘舉嬴為諫夫魯韓之所作者公門也一違乎時且猶不可今吳楚之間疲弊之狀不可枚舉寳何人斯能安受此也乎竊惟執事之意蓋或念及荒陋欲假是以寵之使夫有志於事業而墮頽未振如寳者皆有所激勸此亦舉措之大致也然歆慕華耀人情皆然寳若受而不辭辭而不能必止繼是以往則有轉相請託以求之者矣執事將皆從之歟將亦有不從者歟從之者既以為徳不從者則以為怨一徳一怨在執事固無與焉其出於此者則不可不少加念也或謂此一細故夫何傷抑豈知起士夫之爭益吏民之病者或在此也哉惟執事俯鑒愚衷亟輟其役則所以愛寳者視一坊之建殆什伯矣昔傅堯俞知陳師道貧懷金欲為餽聞師道言不果而去寳雖逺愧師道而執事則堯俞其人也况執事知寳寳知執事又非傅陳一日傾蓋之比自分必能見聽以成區區之志用是委曲布之戴天履地决不敢為不情之言以欺執事千萬亮察錢章靖衰廢已乆執事一顧加重多矣此公卿下士之美節也謹以為謝寳不勝惶悚與李原道得手書知愛念之悉賢者學業静中想大進惟所謂循序致精居敬持志者不可忽耳吾輩老而無成正坐此病故為賢者告之令伯先生處一緘三紙煩為尋便轉上餘不一一與髙大尹寳啓寳聞恒言不稱老人子之道也故古之人有行年七十而為兒嬉者凡以説親而已寳以母老得請歸養方懼無以為説敢自夀而稱老為哉適聞執事以賤誕之日若將有所賜焉者敢預以情告如所聞果然幸為己之寳也受徳宏矣不然是重吾不徳也惟執事重圖焉答方崑山承不逺二百里遣人為老母夀感激殊不可勝果脯如數收訖綵段不敢當即附來使返璧幸檢入之尊父母像賛亦附還愛莫揚之深負雅意浮浮記好文字周子行序激昂中見節槩任君奠文體悉中見時務非有抱負者不能為此快讀之餘不覺歛袵也五賢像已到學政録及康齋年譜煩令從者次第檢發餘惟為道愛重與林鎮江前日承過訪適出弔於華文光氏聞之亟還則從者行矣平生雅愛知感不淺不特此也郡事勞賢者始必不堪乆自有欣然處蓋為及物之速也伊川作字時甚敬曰即此是學今郡豈作字比哉况可兼學乎吾子亮之與鄭繼之正節承書問侑以多儀足感厚意昨雷且雪咎徵如此請無言賀况兹禮也朝署間亦皆告免願弗介懷也至囑至囑先像當為執筆第須遲之近夫文法于經去俗逺甚足為吾黨増重有便幸先為致謝萬萬頃所須板刻望急圖發來將以近夫所作配焉故也燈節後晴暖為㑹期未中愛重奉寄東山先生書寳自已巳冬由漕運退休南歸庚午再起辛未北上碌碌奔走無時休息乆知台候還自甘肅天佑耆徳夀康倍常顧未嘗奉只尺之書以承起居雖坐冗廢禮而愧深矣頃見何子元郎中備聞動履又亟喜慰近者得允侍養家居賴庇粗遣竊念才疎力薄不能為國馳驅而僅以一節自守仰負疇昔之誨然老母衰病舍此無可處者惟髙明必我諒也兹因母黨從戌沔陽者便謹此謝不敏往事逺矣近事不敢言來事不可知惟萬萬為斯文加愛不勝至願不宣復張廵撫書近者在京逺承敎劄感佩不淺寳兹以私養乞歸乃辱遣使慰勞且令導出撫境此固所願而不敢請者顧不肖何以得此於執事哉銘刻銘刻都斾移山東正當難為之時而一二月間規模經畫已大可觀淹一人以活一方其此謂邪昔子産從政一年輿人誦之不勝其怨及三年又誦之不勝其徳夫子産之政一也而怨徳異情何哉乆則知之深近則知之淺蓋自古則然矣然方輿人之始誦也不過曰取我衣冠而褚之田疇而伍之云耳初未嘗以私意及子産也即使政或未終而子弟之誨田疇之殖亦豈損於子産哉江南之人之於明公蓋見子産之始而未見其終者執事於此至勤天日之誓抑自待之過矣且明公才力節槩逈出時輩直道而行不避艱險廟堂之髙江湖之逺豈可謂無知徳如東山公者哉人還布謝兼附區區㐲惟亮察不具容春堂前集卷十九
