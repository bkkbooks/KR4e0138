body:
  text: 容春堂續集巻八明邵寳撰雜著九十三首雜著坤遯明夷旅雜説王晦叔曰以坤遯明夷旅四卦皆不為君位以予觀之坤分也遯明夷旅義也分以常居義由變出遯之為變太伯之至德伯夷叔齊之仁尚矣旅之變則何之哉雖然周襄魯昭辱止其身尚可言也明夷之變危闇傷人紂之惡不可言也坤之分抑尤有可言者臣疑於君而黄裳元吉此伊周所以攝君而終成其臣也或以羿奡媧武當之是與簒弑造端也豈其然哉然則坤之君安在曰乾君道也坤臣道也君君臣臣分也春秋諸賢臣論十一首周臣論曰烏乎周之德於是乎衰矣人才不復振矣雖然立隗則諫屬克則諗問鼎則對請隧則辭國無人焉誰與圖之詩曰雖無老成人尚有典刑惟此時為然又曰蔽芾甘棠勿剪勿伐召伯所茇雖欲勿思其將能乎魯臣論曰子謂子賤魯無君子者斯焉取斯魯之有君子尚矣聖人吾不敢論其髙第弟子亦不可勝述也述其大夫之賢者則有孟子所謂聖者在焉其他君違德諌若忠於公室者蓋多有之乃若死而可愍隠而可尚去而可則雖一節能使之逸乎齊臣論曰齊與魯比齊之疆非魯之所及也至於人才則魯過之公孫丑曰管仲以其君霸晏子以其君顯魯有之乎惟其無之是以過之蓋聖人之化深矣論語曰齊一變至于魯魯一變至於道吾於人才亦云晉臣論曰孟子曰所謂故國者非謂有喬木之謂也有世臣之謂也吾觀春秋國之世臣莫有盛於晉者狐先欒郤范魏韓荀羊舌樂祁此其大者也之數族者世有其人與國終始蓋他國未之有也人之言曰維楚有才晉實用之其然豈其然乎鄭臣論曰鄭介晉楚之間艱而能國亦惟諸臣是賴故伸尼善其為命亟稱子産子産而下其為才殊矣吾於七子之賦得其槩焉安得起叔譽而通論之衞臣論曰吾讀論語夫子稱賢大夫蓋多衞臣云而季子適衞亦多有所説者越自康叔武公以來培養之者久矣宋臣論曰宋文獻不足孔子蓋嘗嘆之然委質就列往往有人焉惟危也可以觀節惟遽也可以觀才孰能丕逺惟商耇成人宅心知訓者乎宜宋之不遂霸也秦臣論曰左氏稱秦穆公之用人周矣一矣夷考其人蓋寥寥焉抑又何也穆公思休容惡媢嫉而學著及其卒也取其良以殉風聲所及有所徠亦有所距吾於繞朝之言而深感之呉臣論曰呉之才何其鮮哉季札尚矣退耕延陵之野且出而歴聘于魯于齊于鄭于衞于晉其於國事蓋無與焉然則國之與立者誰歟子胥忠矣抑自楚徃者也傳曰不有君子其能國乎呉之為呉乆矣夫才蓋有之矣吾未之見也其殆通於上國也晩故其官守紀載或缺焉爾乎楚臣論曰夫人之才何國蔑有亦焉不學而孟子獨稱陳良者為其悦周公仲尼之道也茍悦周公仲尼之道則固天下之才也何楚産之有故吾論人於楚必以不得罪於春秋者先焉春秋之道周公仲尼之志也陳蔡曹虞臣論曰一國以一人重以一人輕是故蔡有季而國知謚曹有欣時而國知節陳有冶虞有之奇而國知諫不然雖多奚為讀春秋雜説八首西狩西狩孰狩哉國狩也公與乎公命而不與與則書公矣不書公知其不與也獲麟而賜虞人孰賜之也獻於公而公賜之故仲尼得觀焉獲麟於是乎書六羽八佾用於宗廟久矣而不自知其僣也至於考仲子之宮而始用六羽春秋書之幸之也而有遺憾焉諸侯之妾之用六羽猶諸侯之用八也陽生赴以卒則卒赴以弑則弑弑而赴以卒其弑也傳聞云爾也傳聞不勝簡書是以書卒以待察也比之疑獄翟泉天王何以居于翟泉哉何以入于成周哉蓋必有以之者矣而春秋不書天王天之子也天之子非天其誰與立之蓋正者如此不正者則否突然見於䇿若自天降然者聖筆亦神矣哉璵璠昭公既出意如在國何如政自之出久矣公在則祭在公公出則祭在意如服改乎仲梁懷曰改歩改玉玉改則服改矣攝祭而不改服禮也改服而祭非禮也雖然季氏以逐君成名尚何責哉季姒昭公之出岌岌乎魯將亡矣而始於季姒之一言誣起於彼不虞其厲之階於此也况公有童心而羣邪從之雖有推之挽之如叔孫昭子子家昭伯者復之難也不亦宜乎陳公子昭放驩兠於崇山此天子之所得行於天下也陳之昭楚何以得放之於越哉欒盈奔晉㑹諸侯而錮之欲其不納也昭之放安知其不他適越安得而留之楚又安得而制之子囊曰赫赫楚國撫有蠻夷奄征南海以屬諸夏蓋共王時已然矣行人春秋之時行人無定官唯其使焉而已非其官而稱行人重使也然其初使也未之稱也至於執之殺之乃始稱焉以著其罪也執有叔孫婼殺有干徵師季札論予前有論今復補其所未足者季札讓國而安於為臣故居則居出則出一毫無容心焉一毫無容心焉者臣道也春秋於其出也使則使名則名一毫無加禮焉一毫無加禮焉者所以成其臣道也成其臣道也者所以著其讓國之節也季子之讓始於壽夢之欲立而終於光之致國致國而辤於亂可能也欲立而辤於治不可能也如以讓責季札則莫如討賊討於僚乎於光乎僚則死矣光則簒矣天子方伯則無可告矣若擅興兵是以光治光也不然則札之所守固無責焉耳矣或謂使而亡焉是所以為身者重而所以為人民社稷者輕亂不我弭則自我生矣以是責焉札亦何辭之有又季子凡四讓壽夢賢之欲立以為嗣札辭不可一也諸樊既除喪致國焉札又辭而去之二也夷末卒札使而亡焉三也光刺僚而致國札不受去之延陵終身不入吴國四也四者之中始之辤父禮也泰伯之道也繼之辤兄義也叔齊之道也終之不與為簒法也叔肸之道也託使以逃逃僚也是何義哉三宜讓一不宜讓即欲讓焉必以國老自處明嫡長之義使國有所歸而已無與焉可也今也不然春秋之書其正謂此也夫讀禮雜説九首其一公儀仲子舎孫立子而檀弓弔之以免司寇惠子舎嫡立庶而子游弔之以麻衰禮歟非禮也然則二子之服之也何居将以明禮也将以明禮而自蹈於非禮可乎昔者孟子嘗以仁術為言假非禮以起問者而率人於禮近於術矣何不可之有其二帷殯非古也然則何以帷堂夫帷堂在小歛之前於死者有避惡之道焉於生者有别嫌之道焉既殯則二者皆無之矣是以帷堂而不帷殯也乃若既葬反哭雖有几筵何帷之有故曰無柩者不帷其三子為母服禮也夫為妻服亦禮也謂五服外何居母庶母也庶母於君為妾妻庶子之妻也於君為庶婦君服妻不服妾服冡婦不服庶婦君之所不服而制服焉權也故曰五服之外然則孰為在内凡君之所服者皆是也聖人於恩之中而不能無義於義之中而不能無恩五服之内外非天下之至權其孰能與於此其四喪三年不祭古之道也今之為烝嘗禘何以入於廟或謂今之居喪與古人異卒哭之後畧倣杜氏之説于主以衰于廟則墨其亦可也噫是何言歟今之居喪與古異者人自棄之非有所禁而不為也不求勉於此而徒欲并廢於彼如之何其可也且晉於殽之役子墨衰絰遂墨以葬文公得罪於萬世大矣况墨以廟祭乎然則何為而可功衰祭於主深衣薦於廟其五五月之間而易衰者三昭公之童心不度無足論者然由今觀之喪自成服至小祥而練歲則朞矣衰能無易乎今有百日而練者有六旬而練者與其蚤練不如易也易一也或易以狂或易以禮同行異情同物異道惟君子能行之其六喪有常服而所遭不能無變變之所值服之為難故服有成有受有練有除有􅎭其常也有易有包有特有重有兼其變也三日歛而成服朞小祥而練除首之絰受以功衰又朞而大祥中月而禫當其時服其服所謂常也如此是固無庸於論者惟夫斬衰之喪既虞卒哭而遭齊喪則男子有易要絰婦人有易首絰所謂包者男子有仍首絰婦人有仍要絰所謂特者斬喪既練遭大功之喪有男婦首要皆麻所謂重麻者有男婦首要皆葛所謂重葛者齊喪虞卒遭大功之喪男以功麻易齊帶之葛而首猶齊葛婦以功麻易齊首之葛而要猶齊葛所謂兼服者有斬葛齊麻以至功葛緦麻前喪既葬後喪初歛男要婦首易而兼服者彼一時也此一時也物以時變新故重輕參伍伸屈而無失乎恩義之中所謂變也又如此夫是之謂難茍類而推之則一人之身周旋五服之内雖日有變不虞也而况其常乎其七吾讀既夕禮而知古君子喪事縱縱而不凌節也蓋先三日則鼎鼎先一日則騷騷故酌以先二日既夕哭之後啓而朝祖飾棺屬引而後祖奠盡日從事所謂猶猶爾者其謂此乎其八昔予讀顔丁居喪之説而未得其情某孤也㓜固然莫之省也乃今當太淑人之喪日夕殯宮忽忽黙體始克知之烏乎母兮母兮不可作矣壽也燕慶榮也贊賀既皆不可得矣雖病而承候視醫言善惡方欣遄戚尚可得乎此猶常也雖筮而得離之頥錯愕隕越色於客而客懼尚可得乎此猶生也雖死而號慟含歛僕僕拜賔虞病疑死尚可得乎蓋不惟生之日不可再得而死之日亦不可再得矣大哉天地間日復一日予安所求哉烏乎生之不再得人能言之死之不再得予亦不知其何心不知其何以為言也記曰始死皇皇焉安得起顔丁而與之誦匪母何恃之詩哉其九成化庚子冬予為丁壽夫墓記有薄棺無槨淺土不墳之語意以壽夫既冠且應舉矣不當以殤禮葬之時秦東邱作書貽予以予言為非又謂如予言必引魯汪踦事為據予時未有以答也今讀喪服小記丈夫冠而不為殤之文乃知昔之為記有暗合焉者若以此答東邱一言足矣亦何必引汪踦哉人未多讀書而輕下筆為文難乎免於東邱之議矣越四十四年讀禮苫次追念疇昔於是乎書讀周子書雜解十二首太極二字起於孔子繫易皇極二字起於大禹第疇二極意同而指異周子曰無極而太極愚則曰有極而皇極五性感動而善惡分須以通書所論剛柔善惡中處參之立人極焉即太極之在心者讀混兮闢兮其無窮兮之言可以知先天之前後天之後矣太極是混沌氣中指出理説非混沌之外先有一太極也虚者理之原非虚無動也故曰無極而言動先於靜理必動而後見未動則未可以言理故不曰理而曰太極無極之真理也即太極也真即誠也曷不曰誠而曰真此處殆非言所能盡也孟子程叔子以命言性性之原也孔子程伯子以性言性性之實也荀揚韓諸子以氣言性性之末流也而荀子甚矣周子作太極圖如畫工畫日月日月體圓畫者只作匾體不得已也必欲盡其妙必以圓木為之推之可轉而後太極之妙著矣嘗恨格物格字解不切偶讀醫書切脉切字謂求其脉理也以切解格庶得之矣理之在天氣不得與焉及夫各正性命而寂然不動氣亦不得而與焉至於感動而發則有與於氣者矣有與於氣而氣得參焉故有善有惡瑩光也靈心之靈也理得心而能光所謂厥彰厥微匪靈弗瑩者如此彰者益彰微者亦彰是之謂瑩五性感動而善惡分此即人心道心危微之幾也毫釐有差天壤易位其在斯乎喜怒哀樂之未發謂之中中之上不加一言純粹至善無容贊矣發而皆中節謂之和和之上則先之曰皆中節曰皆中節則有不中節者矣中節者理之所發也不中節者氣之所發也人心道心於是乎觀此所謂五性感動而善惡分者也論性雜説性之理一而所以為性者五一氣而五行故也性之異其在五者之偏勝乎勝之至者熾一而滅一熾於義者滅仁其所謂義非義也刻也忍也暴也熾於智者滅禮其所謂智非智也詐也譎也奸也此所謂下愚也少勝而能反者為中人故曰中人以上可以語上也中人以下不可以語上也一偏勝之間而性之品存焉是故兼五而論氣而後氣之説全不兼五而論性可以為性乎既兼五矣雖謂不雜五氣吾不信也雖然原諸其初猶愈於覩諸其末者也覩諸其末而論性非論性也是故論性者孔子至矣孟子深矣韓子其庶幾乎善真誠辯善繼之者善之善真無極之真之真誠誠者聖人之本之誠理一也至純無惡之謂善至一無貳之謂真至實無妄之謂誠善當陽動之初真當生物之始誠又陽動生物之總稱也其理一而已矣分而言之在氣運則為善善者未成於性之稱也在妙合則為真真者未合於精之名也誠則又為二者之總稱在天地以是在聖人亦以是合而言之善之所以善真之所以真誠之所以誠其實一太極而已矣程子曰體用一原顯微無間其斯之謂歟對問性者性猶水也水未出山為雲出山而成形始命曰水論水者其於是斯得水之實矣前乎是者是以雲論水也後乎是者是以澗溪江河海論水也澗溪江河海獨非水乎雜於泥沙而非水之本也以雲論水則迂以澗溪江河海論水則陋由君子觀之寧迂無陋知此可以論性矣鄒氏貞節門銘有序正德某年庚辰某月某日無錫縣令某侯某奉詔樹貞節之門於鄒氏旌鄒母華氏也先是幾年某甲子令侯侯位以母貞節狀上于朝詔下大宗伯移御史大夫下分廵御史既詢諸邑士夫君子及鄉三老力田有行義者乃奏令位言不誣宗伯以請上命旌其門如令至是門成其子申以予嘗與聞司徒敷典之政來請銘按華氏為文潤之女年十八歸鄒為魯之妻越十年魯病卒於是華年二十有九遺孤申二嵗華既𦵏且除乃謝華飾自誓必成其孤而俟死以從焉越二十有五年年五十三嵗視其志如魯之初喪也自族黨至於姻友皆謂曰貞吾聞華起春秋至於今代有顯者晉孝子寳族於南齊者則在錫尤著於文潤為若干世祖鄒在宋忠公志完以諫為天下重魯之父佑之父蓋其弟進士泂若干世孫也文潤諱徳佑之諱賢皆有鄉望貞哉厥亦有自哉銘曰維華若鄒望於吾錫粤有鉅人自古在昔孝子以孝忠公以忠越千百年尚有餘風豈惟丈夫亦有女子天不可移有矢之死有孤呱呱抱以見姑所不能育曰豈如夫二十五年如朝與暮孑也有成維母貞故夫之初喪或虞其終資富能衞維懐清是從節不在艱亦不在裕維禮維法有素無遽國有著令表厥宅里后土皇天弗愧吾履維忠有墓維孝有祠我銘兹門古人我思寵壽堂銘有序寵壽堂者均州守茹鳴玉氏世居之堂也其名起天順初至今嘉靖改元凡六十餘年矣嘗請於太師李文正公書之頃屬其從姪福建少參世和請銘茹無錫世族自永樂初寓京師至鳴玉昆弟始以文科顯鳴玉乙卯鄉舉為今官其仲鳴鳯戊辰進士為光祿丞其季鳴金丙子鄉舉經元堂事在銘銘曰昔英皇復辟詔尊髙年京邑有老數莫與肩帝曰若人克保乃仁既袍既履以華厥身曰朕是嘉思古從珍乃命京尹筵几於府有鼓有鐘有鼎有爼既宴召見問其年幾曰臣既期又四星紀帝謂冢宰卿偕諸卿徃即其家曰賀爾榮惟憲乞言越有惇史用古凖今制自天子僉曰兹堂盍名寵壽孰其書之元老篆籀惟明天子邁五登三大哉壽域天地與參惟皇建極嚮用五福某銘玆堂為天下告㸃易臺銘有序邵子讀易九龍山中作臺而時登焉手一巻坐以終日於是正德庚辰邵子六十有一矣先是張侍御汝立歸二象筆辭曰㸃易邵子謂若有以起我者故名其臺云臺在慧泉西北其向以艮東野諸山可坐而見也銘曰易以象示再變乃辭辭不能讀何以象為㸃易有臺晩予始學敢曰盡言窺古述作俯察仰觀地厚天寛神哉不測我方盤桓我筆懸如終日弗句躍如在前求我㸃所銀壺銘臣有病母再辤召起詔問自天曰禮之以禮有白金成此酒尊酌以壽母涓滴維恩恩深且久尊維周卣臣刻銘詩臣拜稽首燕居銘如齋如尸天鑒在兹靈臺湛若吾得吾師勿忘勿助何慮何思彼憧與儳無或有之小子不敏請事於斯新泉石盆銘是泉浚始庚辰冬越辛巳歲尚未通壬午竹引自一童其秋竅石渠而東涓涓不絶將無窮其月己酉日癸巳誰其銘者泉上翁杖銘不折不撓惟汝予介不顛不危惟予汝賴汝功不誣予德不孤惟無疆是圖四杖銘昔以照夜今杖以逰我思古人三千秋兮右藜杖中虛外方汝為蒼筤於吾有光右方竹杖天台山髙石橋絶有物蔓生歴太古雪錯節奇崛不屈不折右萬年藤杖汝居孔林直哉汝膚同德異物周陵之模右楷木杖慧山寺鐘銘慧山寺鐘自景泰迄于今凡三鑄始用𤣥金若干斤於是僧圓金初為住持實屬僧明杲明曜為之按厥故而議且畫焉者則前住持僧圓顯也銘曰維金在鎔載革載從厥聲益宏允稱哉兹山之宮維良冶之功朝之聲兮群動躍若夕之聲兮群籟斁若四方下上罔不格若李文正公小像贊先是正德丙子冬某得先師文正公先生小像於吾友崔世興軸而懸諸松風之閣以便時省戊寅世興復寄大像至軸而藏諸庚辰春小像為人竊去乃臨諸大像敬贊數語屬僧圓金懸奉如故烏乎公之德天下之所同慕也彼竊者獨無此心哉而况他人乎尚相與守之勿為風雨虫䑕之所傷也以神童始以元老終師保兩朝進退從容紓紛納汚辯幾信誼力贊化原民受其賜學無標榜而有典刑四海之内濟濟門生歐未秉鈞韓不入相惟公文章千載下上贊郭詡所寫小像見素先生嘗稱泰和郭詡寫照入妙品予慕之未見也一日見於南昌東湖之上予揖之數語而退予去江西之八年諸生思予乃屬仁𢎞想像而筆焉寄予京師見者皆曰不類予愛其有有道之容未忍棄也贊而藏之諸生予懷郭史予寫貎豈予如如古儒者敬共朝夕維予夙心畫哉畫哉以為予箴見素先生小像贊江湖地遠山林日長雲霄儀羽海嶽文章危言於始勇退於中亟起遄歸晩節維共古人我思君子能國千仞丹厓一星南極錢希翁小像贊山屐登登海槎浮浮卉衣草笠焉用莵裘陋彼月旦執我春秋翁今已矣予将焉求都太僕元敬小像贊儒哉山澤吏矣滄洲吾志在史野適焉謀葢嘗慕山谷之退效子長之逰履坦坦乎萬里筆齗齗乎千秋孰能起古博謇好修者乎君其将與之作求也吴未軒像贊以言乎執禮可以為小相以言乎賦詩可以為大夫此士君子之論於君者焉可誣也然而有山以廬復陶潜之三逕有水以泛即龜䝉之五湖烏乎斯人既不可作矣今見其子若孫猶宛乎家庭之規模也矧嘗觀顔色而接風度者夫奚有於畫圖邪鍾馗畫贊二首睢陽報國之心誓而為厲終南愛君之志夢而為儺厲出一時之憤儺成千古之訛是故一言而亂賊懼厲之為功多矣鬼兮鬼兮儺其如之何哉對揚之才負于爾生辟除之力效于爾没萬古乾坤何方有物白日青天如聞咄咄抱拙秦先生像贊文儒之裔大魁之鄉偉哉碩彥於前有光德義淵純文章典則濟濟諸生罔不是式帛冠布衣卅載大賔曽孫邁訓為國名臣烏乎休哉方伯澤西杭公像贊猗歟杭公於考功見知人之藻鑒於典學見養士之脩能於藩參見旬宣之恵政於方伯見綜理之宏才遠而望之則風采之山峙近而即之則襟度之汪開久而聽其論議諷其詠歌又牢籠造化無一物而不該壯登廟廊正色揚休表表乎群士之望晩歸林壑厖眉鶴髮落落乎一方之依叶乃若好學不倦執德不囬超今人而不顧将卒造乎古君子之歸叶則予於内交之初不惟敬之而又畏叶之者也繼自今其将徃來澤之東西各躋上壽數操杖几而與之徘徊公乎其許我哉白樓呉公像贊猗歟休哉冕而衣裳佩玉鏘鏘從容廟堂偉哉呉公其邦家之光歟昔在史局書則春秋君子謂可以見公才之優昔在經幄言稱唐虞君子謂可以見公之謨訏今在内制手抉天章金追玉琢君子謂可以見公大雅之制作公所藴蓄有大於斯論道𢎞化公卿傅師夙夜宻勿黙贊萬幾君子謂必如是而後盡公之素可以副海内之所期猗歟休哉惟昔知公鄉有徐卿朝有文正國士之遇在古有之於今為盛四十餘年不負知己我思古人晏起范興蘇繼歐起某也不敏亦夙知公病違十載再見江東鶴袍犀帶公有嘉容公畫我贊以寫公𠂻猗歟休哉遂安令尤翁贊於傳有之喜怒不形物我無間昔楚之上卿嘗以是見稱於仲尼而謂之忠矣大宗伯番陽先生何乃以是稱吾遂安令尤公邪由今觀之公少舉於庠學懋而望隆壯宰於邑政通而譽豐老杖於鄉德昌而益共壽考令終况也賢子接武登庸君子曰美哉輿論攸同吾弱冠一拜於里第晩而考德吾非宗伯之從而又将焉取𠂻哉靜學孫翁贊樂田園而博山林之趣愛烟霞而恣湖海之逰十年自省一齋獨修喪親茹素如僧之持戒教子極力如農之待收斯人也葢将葛巾野服享壽考於百年而推恩封錫有隕自天其諸異乎他人之求者邪小像自贊㓜孤而怠厥修於我乎有怍晩病而省厥愆於我乎有覺易曰旡咎者善補過也吾為我誦之庶心逸而日樂也陳慎菴像贊章逢絃誦萃於一門翁生其間學成行尊抗顔南面師道以敦烏乎慎菴宋忠臣肖梅公之遺裔國初郡博休休居士之來孫也詩曰有斐君子終不可喧吾於此亦云趙學海像贊有學海之心而限於年有朝宗之心而拘於地詎遄歸乎聖賢之仁抑夙聞乎君臣之義􅂱乎其章充乎其氣藹乎詩書之流蔚乎簮纓之裔吾将見其成焉葢今之所謂偉器也夫董孝廉畵贊志之勵也友佩弦之安于心之潜也師下帷之仲舒豈姓氏之則然亦惟仁之攸居是故教郡不以士貴治邑不以民愚為親請養長揖歸歟葢有先予稱之為孝廉者君子曰允哉非譽吾将質諸風山公其以為何如也殷東原像贊以世論族公在甲乙以士論行公在叔仲濟濟冠裳渢渢弦誦以言乎居雖闤闠分一畝之宮以言乎養則田里足終歲之用葢耊老當社飲之尊而月旦起鄉評之重者也君子謂公於前無媿者方伯大父行既由隋唐之科於後無媿者乃弟令陽山猶出周漢之貢斯像也自今至於來孫其永為影堂之瞻奉也哉節菴茹公像贊孝友之行孚於家而達於鄉共惠之政兆於邑而成於省鉅人長德既為衆之所推要地髙官乃在醜而無競穎先脱於文獻之宗屣晩棄乎功名之境以言乎家則留福孔多以言乎官則去思尤永君子觀節菴之號亦可以得公之槩梗矣彼畫史者雖逼真於想像之餘固亦堂中之影也夫草亭成翁像贊有巾有巾擬宋歐陽有詞有翰出入晉唐有誦有説極於虞黄貢於王庭循周室之制分為師儒鄰蘇湖之疆興至而溢為圖畫又無愧於倪王之鄉斯人也望之者以為具神仙之骨相評之者以為稱文獻之門牆抑孰知晩膺封典冕而衣裳為山林之光也邪魁星贊二首維北有斗紀綱三辰孰主張是惟爾有神神兮無方匡域有象昭我文昌虞周之上帝車中運四國攸繫人亦有言斟酌元氣旦建東北惟爾有神開陽發祥回天下春王母獻桃圖贊粲然於西池之上者秉太隂之精纍然於東海之中者含初陽之氣二物合并恍忽有無如降自天如出從地可以望之而不可致乃有至人參乎兩間感之以神契之以意葢將開壽域於乾坤合萬物於一視超運世而上之不論乎千二百歲者也彼周穆之荒逰漢朔之劇戯又奚足計邪二泉第一流贊晦翁之詩有之碧澗日千里其在斯乎吾泉之委亦多矣此其第一流也觀水者舍是何之焉由是于溪以從川行由是于田以補雨施流哉流哉孰謂其微哉呉文定公像贊施生持公畫像來以公從子嗣業言請贊烏乎公不可復見矣得其遺像能忘言哉焚香敬瞻為之贊曰文章深厚可以參遷固於漢室德氣溫純可以追顔閔於孔庭大拜虚群望而不見其歉大魁協素論而不見其盈大雅君子老成典刑中齋秦公畫贊此畫史追寫中齋秦公之真也是雖得其巉巖磊落之像而未盡其英邁超逸之神即或近之而其方寸之地所以發為葩藻運為經綸者固不若聽其言觀其行者之為親也烏乎安得九原起斯人哉秋澗韋翁像贊惟翁為江左甲族系出呉高陵亭侯昭之後扈宋裕陵南遷自雲陽徙居無錫西谿里至元溪山徵士尤博達無方交與一時名鉅入國朝至翁益好古讀書勵行與厲雪菴陳玉溪諸老俱有古人風格隱然為東南一古君子無媿世家而高山渺絶于今不可見矣翁殁之若干年其從孫尚志以予知翁之詳持像徵言為贊俯仰今昔而感慨係之其能無言乎哉昔見翁之起居也嘗援琴而挾書今睹翁之遺像也儼髙冠而長裾抗顔為師足以範模弟子飭身率物足以表正鄉閭鄉舉大賔邑稱鉅儒葢自雪菴云亡而典刑逺玉溪沉響而製作虚秋林長逝而書畫絶以及翁之觀化而清節靡餘烏乎老成凋喪孰為起予秋髙澗枯我懐其初畫龍贊奮如其髯如瞪如其目如崝如其角叶如畫者未能見見者未能知知嘘為雲知騰為雨而乾無端而坤無倪而莫知其所之謂予不信盍徵諸仲尼乎光祿丞天台王公像贊方嚴守正不謟不驕布衣被薦卿寺遷喬觀其所事則文皇在御觀其所友則文肅同朝烏乎斯人世則遥矣吾嘗聞於其曽𤣥安得不臨風再肅而仰止於台山之髙邪余墨溪贊崛彊之節著于江漢之南子惠之政敷於䫈海之外此君子之居官所以稱乎民之師帥者也晩歸林泉棋局詩篇巧還造化而與物周旋君子以是而知乎其前謂之曰賢不其然哉不其然哉鄒秋泉像贊翁之壯也家有幹蠱之子翁之老也族有折𠂻之人忠信之行終於動物孝悌之德始於潤身近之可以稱道鄉之良系逺之可以稱讓里之逸民誰為畫者于初度辰我作贊詞祈千百春談梧月像贊薄於利也貢可譲厚於義也獄可承親允賴於養志子並傳於明經風月湛滄浪之水江湖隠少微之星朝為溪泛晩作山行吏情懶而幘㟁野興逸而舟横若使高而當焉用之相卑而守不負之丞揆諸今也果孰為重孰為輕也邪文傑筆贊叙曰韓傳毛穎託言於秦既録其功而可不知其人乎作呉興宋文傑贊諸姬之郡諸子之宗崛起湖澨為世效庸而文明之逢尔澤尔貎尔端尔𠂻無露尔鋒善始令終聿有嘉問附諸鉅工與國運而無窮汝遜不居文房有史贊者泉子蔡君習之像贊過静之以其岳翁蔡習之道服小像求予題其上乃漫書歸焉習之號如竹故末語云蚤作克家之子晩為在野之臣公府瞿瞿鄉黨恂恂衆義名而吏服獨藜杖而葛巾屐鴻阜而眺晩舫鵝津而尋春外潤以直中虚且真君自謂人之似竹或乃謂竹之似人非有識乎君子亦惡能傳其真邪從舅南湖翁像贊出青於藍蚤歲之材守黒於白晩年之識力田無求於漢科安土有聞於周易天錫壽康人稱易直噫我知其心不于其迹也彼蛇而足如虎而翼亦何為而自取夫戚戚邪容春堂續集巻八
