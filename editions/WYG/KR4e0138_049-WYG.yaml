body:
  text: 容春堂續集卷十三明邵寳撰墓表九首墓表明故山西布政司左叅議王公墓表王公廷瑞葬泰州某原之若干年其子揚州府庠生延祀始克表于其阡渡江東來請予爲文其季女壻某官某爲之狀公予同年友予爲户部郎中時又嘗同官公之墓固予所當表也况延祀再請益勤予其何辭按狀公姓王氏諱璠廷瑞其字也陜西鞏昌府寧逺縣人國初有以人才官其縣者後遂居之高祖謙曾祖仲榮祖興咸隠弗仕公之父永昇舉景泰癸酉鄉貢授河間府知事以公貴累贈奉議大夫户部郎中母賈氏贈太宜人河間四子公其季也少穎敏不凢河間竒之遣與其俊彦者游公弱冠河間當考最嘆曰吾觀吾子惟璠也偉其將以材顯乎吾髪種種尚可僕僕人下乎遂辭職去歸其鄉命公入邑庠戴恭簡公以按察副使督學見而器之㑹同舍生侵學傍隙地衆愬于官以齒推公爲先公素伉直頷之事閣不行衆更詭爲文投之縣代署公名非公意也尋覺發于巡按視原文有公名例出爲掾戴公聞之曰吾識王生豈爲是者哉然莫能救也是歳癸卯當鄉試戴公乃牒縣以掾入試遂得舉自逮事至是凡八閲月耳明年甲辰登進士第河間疾且革聞報喜曰吾願畢矣尋卒公聞訃奔歸伏地大慟以禄甫及而親不待有終天之恨焉築廬墓傍手植松楸置祀田百畆服闋奉繼母徐氏之京授户部主事監督臨清水次倉同事中貴剥尅萬狀酷流諸郡公力與之諍朞月間縛奸胥輩二十餘人皆寘於法時有真部使之稱進員外郎丁内艱服闋進郎中奉敕總理遼東糧儲兼管屯種於是邉費每告乏公杜請託謹權量尺布斗粟必親稽焉閲實使至得羡米若干萬數考以稱最奸商射利不遂者朋誣于廷公䟽上其狀下御史臺治而法之凡百十餘人故事征商額外有楮價充公用公悉罷之既還朝補貴州司奉敕儧運漕河時值某藩之國河道壅滯公夙夜乗小舟巡視衣不解帶者四十餘日上便宜數事詔皆行之人以爲便尋擢山西布政司左叅議分守冀北道冀北古雲中地敵兵出没不時戍卒餽餉恒虞不繼公多方調畫邉鎮倚爲重壬戌朝正考覈群吏鈞陽馬公在銓部方以公爲材而濠梁顧公以都御史叅㑹竟以臺評罷公馬公爭之不能屢稱于人先是山東叅議某者以分守在遼東與公不相能其兄司徒公每平之公之被黜人謂某有力焉公初被黜上䟽自叙其課績所得詞語大意謂外銓籍而信流言蒙名士以重謗請下臺司根究屬藩府暨鎮撫臣亦有上䟽留公者詔命之辨公再䟽摭臺評之失云云且謂臣猶出婦借得復歸亦無顔與娣姒相見請雪其寃而許之退事下臬司公三䟽請稽報不時上之故語益峻切㑹孝廟崩事遂寢逆瑾竊柄時有勸公赴愬者公笑謝焉曰吾以吾行之不白故忿而有言今就傍途吾之心事誰歟白者言者愧而去公在京師乆之南游至江淮愛揚爲文獻地又以女歸兵部儲郎中洵可依以家也遂卜今居未幾以疾卒年五十三論者謂公天性亢爽痛厭世之齷齪忍垢者事多直遂名以是得而謗亦隨之然夙負幹局尤習吏事使究其用當必有所樹立而僅止乎是知者惜之烏乎孔子曰人之過也各於其黨觀過斯知仁矣吾於公有感焉公自爲諸生伉直自許羣議攻人輕於一諾遂䝉不韙至落士籍及居官奉使知有國法不恤毁譽當商利交征之時獨搜刮弊端以賈羣怨察入淵魚亦或有焉而心則共且勤矣論者媒孽而指擿之公抗章自辯至于再三詞氣俱壯逮權奸當路一言投隙立可甘心於人乃退然止縮雖或勸之不爲動也公於是時寧忍一時之憤而不欲傷朝廷之大體寧受終身之玷而不欲壊士夫之大節此其心爲何如而凡前日所謂過者可一言以釋之矣然則所謂觀過知仁者吾不於公有感乎今公已矣墓之草不知凡幾宿矣公之心固有不待白而自白者予昔與公並署頗號知公惜公之心於他人殆倍焉因延祀之請於是乎表公長子某夭延祀生時公年已若干矣女若干人壻爲某某洵其季也爲吏侍文懿公從子云明故四川按察司提學副使盧君墓表監察御史盧君師邵既擢四川按察副使奉璽書提督學政取道省其父封御史某庵公於呉將行暴疾而卒又明年癸未封君以其子應圻葬之於西横山之原某官某既爲之銘又明年甲申其弟兵部主事師陳以使事歸乃立石墓上以其所自爲狀請予表之予昔請養歸之三年屢得先師文正公手書稱君之賢時君方爲御史公致政家居數相從論議比公薨而君以四川巡按過錫予始得相見師陳繼脩君好及提學再見方約㑹于山中乃愆期數日而訃至矣予方恨一弔之缺今見師陳如見君也其能已於表乎予嘗聞今之君子之論君也由其言於上者謂之貞臣由其行於下者謂之才臣由其潤於身而表章乎古人者謂之文學之臣吾徴之狀君初登進士而觀政都察院也於羣衆中獨留心吏事凡章程法比皆習而通之時都御史三山王公見其所擬吏牘驚曰此法家言老吏所不及因薦試河南道御史巡西直門繼巡東城於是武宗方鋭意北狩督宣府建行宫急而都御史某附麗承望其勢張甚君上䟽請罷行宫之役而斥某邪穢庸劣不宜任用言極激切廷中聳然比既實授清戎至東光見長寧伯某侵奪民田横歛子粒往往逮繫死詔獄君上䟽極論請釋無辜而還其侵地皆從之或言長寧貴戚權倖君清戎有職何得出位君曰風聞言事御史職也况目擊其事何可忍也巡按初至四川首劾巡撫都御史某某隂附當路黷貨殃民莫敢指斥後雖坐他事逮黜亦以君言故由是一方肅然人謂得巡按大體是故謂之貞先是巡城者務繁科條以鈎摭爲能所闗决多家人細事君曰御史所治止是邪悉縱不問所治惟宿奸巨蠧要束詳明發擿敏利譽籍籍起河間旱奏請免賦減科讁盡出所儲藏鏹貸民全活甚衆四川地逺懼獄之乆淹也檄所司月報而時遣發之朝使方取材西南又邪人迎佛亦道境内屬歳飢民不堪供輸君材擇周慎而晝夜拊循之民得不擾妖人甲善幻術能刳腹出腸胃惴人徼利又能吐火燒民廬室民益驚畏求罔不獲或捕之輙説校以逸殆不可方物君密飭各郡同日邏捕術窮皆伏其辜某郡人乙慓悍强禦椎埋自恣君虞其隂賊多黨援急或生變乃先揚好言卒以計擒殺之犍爲之蟇頥灘温江之三渡皆湍急善溺舟君擇材幹吏委以鑿治人知其去險即安而不知勞費是故謂之才君天資有大過人者性尤嗜學平居手不釋卷程文若擬古詩詞清潤圓融不事刻削而新意層出少受知於太保呉文定公太傅王文恪公都御史􅏨涇徐公入朝尤爲太師李文正公所喜有相見之晚之嘆所著有方舟聮舫二集及奏䟽詩文總若干巻藏于家按治所至以餘力建學申教大興文治薦起賢士大夫不可起者必造其廬禮焉死者弔祭其墓尤樂表章先賢嘗建董子毛公二祠及浣花三陳東坡遺直四書院家居時請立石湖書院祀宋范文穆公又求其遺像及所書田園雜興手摹勒石其中以文穆故居湖上君與鄰焉用是致景行意遇古蹟及山水竒勝處多所題詠是故謂之文學夫三者有一已爲人望而况兼而有之乎且貞而不迂濟之以敏才而不浮持之以重文學而卒歸於雅將之以德蓋不惟成章而已殆知所以裁之者故雖未見其止即其所至亦可以稱於天下矣君諱雍字師邵某甲子舉於鄉登辛未進士凡在官若干年卒是爲正德辛巳九月九日年四十有八娶薛氏贈孺人繼張氏封如之子一人即應圻女一人適陸希奭盧氏系出范陽世居蘇之崑山五世祖吉仕皇朝爲青州通判自崑徙呉縣越來溪上厯四世至士誠士誠子即封君諱綱有學行爲士夫君子所重師陳於君有師友之義故爲之圖不朽者甚勤吾於是乎感焉因并書之明孝子秦公墓表養恬秦公永孚孝行既著成化間有司上於朝而旌之越十有一年𢎞治改元孝宗皇帝詔加冠帶又三十有四年嘉靖改元公年八十七矣今上皇帝詔賜粟帛諸物明年癸未公以疾卒又明年乙酉其子鏜葬公龍山第五峯下從其父封武昌知府脩敬公之兆又明年丙戌其配張孺人卒又明年丁亥鏜也祔葬如禮而請予表其墓上之石公之葬也予既爲之銘表不已複乎予是以辭鏜稱韓子於太原王氏事固以請予乃爲之表曰烏乎此明孝子秦公之墓也其妻張氏孺人祔焉於乎天下之言德者莫大於孝也尚矣家得夫人則家重父若母莫不願以爲子也邑得夫人則邑重郡得夫人則郡重守若令莫不願以爲士爲氓也國得夫人則國重君若相莫不願郡邑之有是且日以衆多也願之故重之重之故表之所謂樹之風聲者今之道猶古之道也嗟夫刺血刲肉閭巷匹婦往往能爲之公之事蓋類焉然非其人也公生長世族有盛宋文儒淮海先生爲之逺祖有鄉稱鉅人長德封郡太守脩敬先生爲之考有名藩方伯文章政行稱重一時中齋公爲之兄公讀書㳺藝名自己致秉節醇謹好行義事由壯至于老勿替益隆稱賢士夫而孝行大矣方公之未旌也鄉上於邑邑上於郡郡上於朝固其所也脩敬素稱退讓君子於此亦聽焉至於張孺人則固與於行孝之事者也孝也者人之同心也於是乎可見矣故孝行成而衆美歸焉百福萃焉不惟人旌之而天亦申佑之公與其配皆登大耊昔也同室今也同穴可謂有終鏜爲之子有學有行以舉于鄉望于太學將薦于春官奉對大廷服列官序孫四人淮漳瀚涵者並㳺庠序文學之聲相埒也可謂有後論福者皆歸公之德蓋榮終其身而猶未艾也不亦可爲人人之勸爲聖朝清化之助哉嗟乎孝表於宅里有誥㫖在無庸賛矣其諸福德不表則人莫之知也予是以特書之秦之世在脩敬公中齋公碑表詳矣公諱旦永孚其字養恬其别號其行若生卒嵗月在予所爲志張之世爲江隂流璜望族孺人之考則封東平知州養浩先生廷美弟則今致政福建都運使企齋公元之其詳在企齋所爲志其稱貞静純懿者與予稱養恬公沈静醇朴者嫓德君子曰嘉耦允哉明故福建布政司左叅議節庵茹公墓表吾姻友節庵公既卒且葬張都運企齋爲之銘其子䨤等復以墓上之石請予表之予與公爲相知者四十餘年於今矣公之葬予既以太淑人初喪弗克與於銘今於䨤之請也能無言乎公以布衣舉應天成化庚子鄉貢𢎞治庚戌登進士第授唐縣知縣擢寧波府通判再擢江西饒州府同知推遷福建按察僉事尋遷今官遭其父新寧公喪歸服闋遂倦勤不起蓋在官凡若干年又若干年乃卒公爲進士觀兵部政以使便省新寧公於家鄉人榮之比官唐縣遂迎養焉縣有牧馬孳息爲難富人避牝牝歸於貧至鬻子女不能償公一反之民納薪于易若運載價重公既爲減五之一復四其限置集於軍城以便貿易時皆稱便雖邑多中貴家不敢以勢撓法既去而人思之寧波專司賦公至條約既具首革西軍儲積弊老奸避服出納清允乃以餘力修諸邑閘百七十所民免水患中有以公姓名之者修鄞寧二邑之學嵗歉以廵守檄賑飢全活甚衆又奉朝使檄清屯田于昌國諸衛武臣皆弗敢異同伍都憲朝信時爲郡守事必咨公公亦賛之以誠比至饒州郡守方缺公攝其事抑強扶弱惟當而清戎一事專於公者尤稱督造瓷器内臣在饒境欲以非禮屈公公從容拒之勢爲之歛饒民頼焉士以愷悌君子民之父民八字爲韻賦詩頌之在福建奉敕整飭兵備兼理屯政分巡漳南公持憲體惟肅惟慎漳有巨奸將圖巡捕爲利者公發其奸而寘之法武平有免死戍邊輾轉規避者公立遣之汀漳地介江廣羣冦負險往往發作正德己巳尤猖獗公合三省軍民兵禦且勦之擒其渠魁數人斬若干人馘若干人仍單騎造其穴開誠諭之盗皆感服上功於朝將有顯擢又奉巡視海道兼督之敕公爲叅議仍守其地㑹布政使缺巡按檄公署其事而新寧公之訃至矣君子曰詩有之靖共爾位若公者可不謂其人乎而謙以持之諒以本之温敏以出之上官以爲才且賢固其所也顧以不能追逐時好雖遷叙如常弗克大展比進臬藩又未見其止謂之何哉然所至有善政溢於人口迄于今不衰老歸其鄉優㳺康適孝友恭慎之德益著夀考令終詒謀燕翼以啟後人綽有家政若是而稱名進士爲鄉邦賢士夫於奕世衣冠有光耀焉公亦何負於平生哉公姓茹氏諱某字世和初號熈齋晚更節庵其先蓋中州人宋南渡時始居無錫元有諱元字良夫者執義不仕其所生子三人循仁處仁居仁循仁生文逹文逹生洪以書畫重一時永樂中被徵至京師與大典事授山東夀光丞卒其妻陸氏以守節旌其子即新寧公由國子生爲令尹晚以公貴敕褒之加文林郎新寧配安人金氏生公謂之南宗循仁生文中文中生敬以醫從太宗至北京從事太醫院因籍焉文中從之英廟復辟初文中以夀百有四嵗召見文華殿賜冠帶袍靴宴于順天府仍命諸卿賀于其家今其孫鄉貢進士仕者一人曰均州知州鳴玊以進士仕者二人曰光禄寺丞鳴鳳曰某官鳴金謂之北宗蓋文獻之盛如此公娶顧氏先卒贈孺人其繼楊氏封孺人爲都憲宜閒公之從孫有子三人䨤霓霦霓爲公弟世資後女若干人歸某某卒以嘉靖壬午八月五日葬以卒之又明年三月某日墓在某之原䨤先請狀於廣東按察僉事馮君廷伯公門人也故知之詳予於是乎采之其世系則又予聞之䨤䨤聞之公云封刑部主事前建安訓導徐先生墓表是惟建安訓導封刑部主事方竹徐先生之墓先生殁後若干年其配封安人陶氏卒其子臨江府知府問啓而祔焉禮也既而請表於予按狀先生姓徐氏諱玊字德卿方竹其别號也世爲鳳陽臨淮人宋南渡時徙常之武進至先生之大父承生二子伯湖州府推官敬其仲毅先生父也隠居讀書鄉稱孝友旁通醫方兼善占候嘗刲股以療父疾先生幼而好學稍長以禮經游邑庠臺試優等遂廩焉七舉應天不利而聲聞日起惲副使巍孫御史方鄒郎中輗軰數十人皆從之請業素以剛直自許郡守某性卞急多所凌傲先生於衆中獨以正言格之守亦爲之少抑由是人加敬畏乆之以貢授訓導於建安分教有方弟子請業者與之講説無異在郡庠時嘗以清苦養心行義濟世爲吾儒分内事者諭諸門人監司至者應對􅋲􅋲務盡事理不爲勢分少貶故往往有忤者且建當路衝多迎送先生弗任勞也將告歸或止之先生曰官以達志非是將焉用之人各有能有不能戾吾性以安斗粟非吾所能也遂棄官歸於是問舉進士由廣平推官擢刑部主事三載考績先生受封如其官階承德郎居三載問稱疾請告歸省乆之將遂不起先生力勸之出曰汝年尚少退其可輕言哉復以所嘗教人者數言懇切語之問佩服惟謹其文學政行重於縉紳論者歸先生之教云先生奉親以順志爲事兄卒後撫孤姪綬如己出季弟既析産而貧復挈之同居謝官後即所居種竹成圃作一室徜徉其間故舊過從周旋宴如若不知有家事者問以時事不對居若干年乃卒夀六十八陶安人武進人也其父武岡州學正永通經博學爲後進師以貢入官安人生於武岡笄而歸先生凡若干年其封今號也與先生並命又若干年年六十九卒自初歸至從官建安儉勤自持與先生無違德且有相之道焉其出奩物以助不足者不論也先生之忤上官也安人屢勸之遜及不變則又勸之亟歸無及於禍曰吾能甘淡薄無以無禄爲慮也先生之卒既襄事問起復由刑部調兵部擢知登州府繼調臨江安人皆不就迎養蓋以幼時備厯江湖風濤之險之故問屢䟽乞歸安人辭焉而疾不起矣予與先生同郡而未之識間識問以道誼爲知己既又聞先生於徐司訓東之謂其能以一節自守真有可以警流俗者使其得一郡一邑而爲之將必有以自見而民受其惠乃遲廻庠序僅領儒官以去又以直道不乆於職雖有淑人之具諸生者不多被焉其所未竟將在其子乎雖然先生之志高矣而陶安人又能安貧樂退以成之論先生者曰直而介論安人者曰順而約蓋有合於易交相愛之義予表先生能獨遺安人乎先生卒以正德乙亥八月十四日葬以丙子某月某日安人之卒則嘉靖癸未十一月二十八日也葬爲某年某月某日子男四人長學後先生若干年卒次即問次思郡庠生次辨例授冠帶女二人孫男四人女孫九人范君民澤墓表范君民澤鄉貢進士來賢之父諱霖民澤字也其先蘇郡人系出宋文正公之裔先若干世自郡城徙居常熟之福山高祖叔輝贅吕庄王氏是爲吕庄之宗曾祖文伯祖端本父崇望皆入貲受服崇望號思養尤有令聞于鄉邑娶陳氏生子六人君其仲也資貌秀碩性復警悟讀書知大義范故有物産崇望又振起之晚嵗倦勤君輟學承家弱冠如老成人凡公私應有餘力思養忘家慮焉性篤孝以母不逮養語及輙嗚咽嘗誦孟東野寸草春暉之句惻然感之故自號草心友愛兄弟寢處一室非有故不離規過朂善公於財帛來賢思養冢孫也思養瀕終嘗命以百金資其學費君竟均之其喪思養人謂之治徵文於名卿以表其墓且裒其遺稿而梓行之費自己出不以煩諸昆季㑹葬者千人君性誠直見于色辭冠服雅素舉動有儀人望之若儒者襟度坦厚其於人成美掩過解紛平怨一以平心處之卒不爲累雅好義族屬貧病姑姊妹失所割産出資賙䘏之無吝無倦至於食流莩収棄孩埋遺骼凡目所見而力能及者亦往往有之若蠲租已責則常事不論也來賢以俊異逰邑庠繼入太學尋領壬午順天鄉薦公遺書勉以逺大所居當山水勝處偕一二勝友出入觴詠有脱俗之興自三呉至于錢塘乗舟出逰徘徊弔古歸方將爲莵裘之營以自老焉無何以痰疾不起嘉靖乙酉四月二十九日也來賢卜以卒之又明年十二月三十日葬君于虞山南麓先期奉其師表叔前浙江道御史陳君狀來請表其墓上之石吾聞諸孟子君子之澤五世而斬此泛爲君子言之若夫大君子則異於是蓋文正公至于今凡若干世矣而其旁支遺裔異邑别宗亦往往有賢者出焉如民澤者况尤克念先德躬脩孝弟以自樹立於鄉里哉又况來賢方出賢科將逺大是圖其進未艾哉銘其幽不足而大書以表之爲他日地固亦宜之其諸事行具誌銘者不書曹母王孺人墓表婦人之墓無特表者曹母表焉賢而悼之也且梅隠之阡始葬者母不表則惡乎志然則何賢乎母賢其善教子也初母之夫今饒平知縣邦彦君領𢎞治戊午應天鄉薦於是其子今户科給事中懐年纔六嵗饒平三上春官及再入太學母居家躬督績學朝夕無間不知饒平之在外也比給事領癸酉鄉薦上春官歸母督之益力及登丁丑進士改翰林庶吉士讀中秘書母聞之曰是可以大成吾子之學矣既賛饒平君貽書䇿勵即遣其婦往共内事且戒之曰朝廷於諸吉士饔飱膏燭㒺不有給欲其專於學也而可溷以家事乎况今在旅汝往惟共無俾懐也有内顧憂且北門之王與東門之曹世望相埒吾之歸曹曹業方落而装出於王者先燬於火吾不敢怨躬井臼以與汝舅周旋至于今日而弗聞乎母於是蓋有餘教焉郡邑中稱善教者宜莫如母抑何悼乎給事方授官有禄饒平亦自新喻教諭擢今職母從而南朞月遇疾不起給事既未遂養又弗躬含歛其情有不勝悼者故人亦爲之悼之也給事歸以先塋地狹乃卜吉於惠山寺西梅隠後岡之原營而葬焉先是嘗請銘於今太宰藁城石公爲銘比葬復立石墓前介吾姻友秦君國英請表于予予交曹氏父子間乆不能辭也母姓王氏邑之江隂里人父某敦樸有行義母朱氏亦善教子母之弟惠以癸酉鄉薦今官廣西桂林通判母之善教蓋亦有所自云母生成化乙未九月二十五日十七歸饒平又二十八年庚辰七月二十三日卒年􅂊四十有六而已子五人長即給事懐娶徐氏其次者夭又次性娶惠氏情聘鄒氏悰聘王氏女五人其壻曰許某侯某葉某張某盛某孫男一人柯聘葛泉州女女孫四人聘于王卿氏華麟祥氏鄒炫氏鄒諲氏給事奉母之䘮以某年某月歸自饒平以卒之又明年壬午十月二十四日襄事太宰公誌列母内行如太史陳先生魯南狀尚多予以表事體大故特舉其善教所以稱母者爲後人告談太恭人錢氏墓表太恭人錢氏萊州府知府秋雲談公諱綱字憲章之配也萊州公以進士爲南京刑部主事員外郎郎中太恭人先封安人繼封宜人公擢廣信知府更萊州乃老後太恭人以子貴加封如公秩禮也公卒之十八年恭人卒其子一麟一鳯以卒之明年十二月某日葬於㳺來塢之原從公兆也浙江提學按察副使盛先生既銘其幽復樹石墓上奉建寧知府羅君狀請予表之予室顧淑人談出也且辱萊州公知乆於太恭人能無言乎按狀錢氏裔出呉越武肅王之後諱進字寛甫者自嘉禾徙無錫世居湖頭餘百年矣國初有子正子義仲益並以詩鳴蔚爲族望子正之曾孫叔簡娶張氏生太恭人幼稟聰慧父母愛之適萊州公喪其配贈宜人朱氏其父封奉政大夫南京刑部郎中采芝公謀於其配茹宜人遂聘焉厥既來歸及見叔舅僉事公泰公兄主事公經外内上下交賀得婦未幾二公繼没門户漸衰萊州公方爲諸生恭人相之績學益力天順壬午舉于鄉明年㑹試遇貢院災阽危而免恭人聞之憂以致疾且齋而祈焉甚懇公既第進士恭人之京弟坦送之歸而道卒恭人曰弟由我死盍於我殯於我葬既而䘏其寡妻至於成節被旌凡若干年不衰當公以進士使山東勞瘁成疾而幾危也泣歎而告恭人曰吾與主事兄以吾親之教皆獲登第封典未及而親年已老吾死不足惜如不瞑何既而聞有輸粟例恭人即脱簮珥勸公爲奉政公先受服焉公疾瘳授主事南京再進至郎中恭人皆奉茹宜人以養及携主事公之子一誠延師教之與其子等奉政公卒萊州公與仲兄成章庶弟絅及一誠四分其産既而恭人告公曰一誠也貧柰何乃悉推其分與之姒氏喪一誠繼之其殯葬皆於恭人乎具公之廣信恭人迎茹宜人養如南京比更萊州茹宜人已踰耊道路且逺公欲請終養恭人曰吾聞之人臣不以家事辭王事禮也吾以婦奉姑而子代父養將不可乎公獨行之任恭人家居養事修備宜人安之越二年公歸宜人年益高恭人從公同侍朝夕四年年九十有一乃終先是伯子一麟例貢需次家居其仲一鳳以鄉舉署桐廬訓導恭人謂公曰二子既登仕途君亦老矣不及時自娯將何待乎凡家事一自任之不以煩公公得逍遙林下專心著述焉凡數年卒時一麟候選都下一鳯轉教諭桂林恭人躬治喪事兼綜内外無拂禮俗比一麟等奔歸則喪具備矣服闋一麟授南京東城兵馬副指揮一鳯改進賢教諭二子交使迎養恭人曰此固吾從子時也從必於長遂之南京暇日謂其官渉刑獄因舉常勸萊州公者戒之且終以歐陽崇公求生不得死者無恨之説葢隂有祈嗣之意焉一麟泣受唯謹明年三姙皆男人謂恭人言不誣㑹一鳯遷應山知縣而歸恭人與二子各膝置其子以相娯頃之以萊州公不及見又相對泣歎臨行一鳯跪請教恭人曰公勤亷慎缺一不可吾無多言既而一麟進中兵馬指揮於是恭人有加封之典一鳯由應山調平江改四川大邑蒞任三月思恭人老謝病歸見之甚歡尋以徽號恩詔賜粟帛諸物恭人猶躬拜之一日夕食畢濯而就寢無疾而逝人謂太恭人殆神仙家所謂尸解骨蜕者葢其輕財好施天惟昭鑒之而彰其報者於是乎在此其説固未足信若夫天意則有之矣洪範五福其卒曰考終命命有定數順受而無虧斯其正矣然或臻乎其數而身罹疾疢不暴顛蹶則積痿痺痛苦百出至于不可勝而斃焉者雖上夀其得謂之考終乎由是知太恭人之得報于天者之至也是故君子必爲之表焉不然則不務德而惟神仙方外之術之求者有之甚則流於符籙之説皆指太恭人以取信豈不爲女德之累也乎太恭人卒以嘉靖癸未正月二十五日距其生正統戊午二月二十七日享夀八十有六子男二人長即一麟娶華氏贈孺人繼蔡氏封孺人次即一鳯娶呉氏女四人長適楊頥次適光禄典簿華亢次適華球次適義官華爵孫男六人愷邑庠生娶朱貢士廷補女悌聘秦貢士國和女愉聘華國子文成女忱聘華指揮騰霄女慎聘華國子國儀女其少者曰恒孫女七人長適吕國子亨夫次適茹國子釗次適華乾次聘于浦義官君萬子稱次聘于羅建寧文徽子汝推次聘于鄒指揮邦翰子應參次聘于殷司訓時衡子旦談氏自始祖夀齋由汴扈宋南渡遂家無錫數傳至封監察御史公禮禮以上世以醫名禮之子若孫始用儒顯萊州公其最盛者也文學淵􅃉其著述多行於世云明故耕雲處士董君配江浦太君杜氏合葬表耕雲處士董君克振之配江浦太君杜氏年九十五以終其葬也其子江浦知縣遵之友四川按察僉事姜君仁夫爲之銘其曰太君而繫以江浦者仁夫因江浦士夫君子之稱稱之也而遵以善政得於其人以成太君之教者蓋不待終誦而知之矣且其銘之稱有曰爲婦則婦崔氏之唐爲母則母尹氏之陳允哉言乎吾因遵而知母姜君云吾亦云再考其叙之稱其儉節共惠於太君皆常事不舉其曰耕雲没遵治喪用禮修殮法屏佛事宗戚病之太君不爲撓又曰大姑黄老而病瘡家衆疑􅋪不敢近太君羞饋候寢抑搔癢痾如他日姑陳病風手足攣巻太君任盥櫛跪榻前飼飲食煑藥爲湯抱之坐盆上熏且浴三年如一日烏乎太君之孝其他可能也其事二姑於疾如此非其心之純篤雖一時不能勉而况於乆乎其喪處士能聽其子之用禮不以宗戚言動尤有古賢母風致四十而寡望百而終子遵入官厯教與政由南昌訓導溧陽教諭乃至江浦前稱賢師後稱賢牧東西迎養太君志體兼豫凡若干年㑹以時艱辭政就教䟽上忤當道顧得瓊州感恩之調間闗海道有不遑將之嘆未幾乞終養歸相見驩甚不啻融洩焉者又凡若干年乃卒中經今上嘉靖改元與於追尊詔恩高年粟帛之賜嵗時坐慈夀堂上遵率諸孫捧觴上夀邑大夫躬來加禮談者榮之夫以太君之貞心苦節限於年令而不得與旌典命也遵學成行修屢試於有司而不得䇿名薦書以階顯仕貽太君封亦命也雖然由君子觀之今之所謂榮殆無異於旌與封者况天與之夀既若是其高且獲康寧以享之子亦老矣侍而待瞑葬銘出於知者不朽之托於是乎在近與南昌張東白先生所爲堂記逺與處士之銘於開化吾先生表於楓山章先生者存没輝映其榮多矣而其事尤難遵吾斯文知己也昔在江西有官屬師友之分既葬太君乃用書及誌刻遣其子汝俛來請表予謂處士既有表太君祔焉表則爲複然前後葬日有不可不書者第愧吾之言不足爲太君重耳其表曰明嘉靖五年十有二月二十有四日壬申江浦知縣蘭溪董遵葬其母江浦太君杜氏於東湖之墓距其父耕雲處士君葬於成化甲午十有二月庚寅凡五十三年啓而合焉禮也杜亦蘭溪人其先爲五高先生之裔其父曰景福母張氏其詳在姜誌馮氏青山阡表正德辛巳二月丙申廣東按察僉事馮廷伯遷其考贈承德郎刑部主事觀省公暨其配封太安人秦氏之柩于龍山之墓廼即青山新阡而葬焉先是𢎞治乙夘刑部公卒丙辰以葬己未秦安人卒庚申以葬既封既樹於今二十有三年或有以下濕為言者廷伯旁視而信惟是焉懼往來山之前後相求吉壤乆而後得於斯後負龍山第三峯惠山左峙璨山右掖前抱梁溪襟以重湖湖外諸山隠隠可望堪輿家曰善卜筮恊從迺勤坦墉迺肇塋域將改圖焉於是廷伯生母李安人以庚辰六月四日卒遂卜襄事左公右安人易地而兆如故李母右而稍後禮也君子謂古之人通乎幽明之故專精廟享而不修墓况於遷乎墓之遷也仁人孝子必有甚不安焉者矣凡葬言水深土厚土之不厚則水或浸淫越棺若褊祔以侵於膚勢宜有之春秋譏世室屋壊為乆不修也墓藏體魄獨可若是恝乎此廷伯所以歴詢葬師披榛涉莽䟦履嵓嶔而夙夜不遑者也馮氏世為錫望自宋信州知州夢得十一傳而至刑部公之考望江教諭戒軒先生起家布衣斆學著述彬彬成章為賢師儒公承其緒由賢科再擢而典教陽榖善誨之聲於戒軒有光晚得廷伯為名進士歴工刑户三部官至憲臺秦安人實相公教昔者二銘皆予執筆葢叙之者悉矣今兹之遷廷伯又屬予言予故約書之以告夫過而謁焉者烏乎刑部公才浮其位秦安人德稱其配而丕顯於廷伯文學政事懋著中外君子猶以為未究其用焉馮之後其將益昌乎帝錫之章賁及林麓予何敢賛一辭哉觀省刑部公之别號鄉大夫士稱之廷伯名䕫秦太安人吾邵氏之甥也李安人於令當有封而命不時受廷伯言輙悲之容春堂續集巻十三
