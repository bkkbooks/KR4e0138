body:
  text: 容春堂别集巻一明邵寳撰辭二首古詩十二首海鶴辭辛丑年在東林作尾閭洩兮終古扶桑崦嵫兮晨復莫望媺人兮未徠予周章兮四方上下孰援斗兮酌桂漿天路昧兮西風凉罾何為兮木未蛟何為兮山陽彼鳬鴈兮膏粱鳯凰翼兮焱髙翔騏驥不秣於天厩兮駑駘馳騁乎康莊鶴為物兮仙靈脱樊籠兮冥冥泬寥兮海濶而天清一聲鳴兮徹紫青應沆瀣兮未眀喚羣雞兮夢醒謂鶴兮安處時回顧兮寰宇冀萬一兮飛來竚江涓兮愁予于烈婦辭賊來賊來賊來辱我辱我不可不如殺我我身有如玉可殺不可辱倉卒無所逃一死萬事足君不見鄰家有婦忍辱随賊上馬行風塵厯盡終無生過百歩洪吊蘇墨亭我來長洪初落波波光映石機穿梭兩崖微露古鐵色絶無纖垢非人磨泊舟分司縱瞻眺喜見舊刻留東坡山人乗月作何狀猶想野服裁秋荷仙翁幻語僧解悟起成萬泡沈千渦滔滔一瀉數百里昔人浪詫談懸河髙歌激烈應山谷星斗入水皆森羅更看筆力九鼎重尋常轉挽須雙駞冬官好事取入室靈物得所方委蛇邇來霖潦復深沒勞我拂拭塵盈窠古今俯仰嘆陳跡驚湍駭浪如予何題詩草草告河伯有鬼欲壊煩撝呵費母夀歌鵝湖山前江水長梅花欲開春酒香滿堂賔客拜夀母眼中孫子森成行黒頭從子魁且相一月三書問無恙叅翁他日曾相勤吕梁碑在新亭上小叅先生為宗伯公伯父先以工部主事治吕梁洪母實從之宗伯嘗學於斯今分司有狀元亭古之世族今費宗文章科第聲隆崇願母百歳主内政再振河東栁氏風草廬三顧圗為黎推官龍題卧龍岡頭秋葉黄有人抱膝韜精光磻溪莘野今逺矣獨將道義論行藏赭衣將軍赤帝胄欲獵中原驅猛獸駕言三顧一笑同不用千金為稱夀静觀天下如觀棋擾擾紛紛徒爾為聊於要處著片語風驅電滅當何時危哉漢鼎峙三足正統奄奄在西蜀君臣魚水古所難四海焚如見雙玉管邪樂邪伊吕邪雲霄萬里天無涯可憐後主不足輔回首永安空翠華舟行漫述丁夘勘鑛在浙東戊辰湖南督逋税己巳漕師領入朝庚午幸得山中睡山中浚泉當治河數月功成自作歌歌罷還將刻山石前日功名無此多敕書臨門撫邊土上疏懇辭臣有母疏辭未逹符且來行止兩端心獨苦兒行奉母捧敕書回首江天思有餘石田畫巻為莊國賔題石田老人冩生手都從觀物心中來不須更作體物語要使花開花便開化工畫筆只毫髪懼洩天機不令發紅紅紫紫數十枝已具春秋四時法國賔神交能此翁小亭燕坐無言中池魚庭草各形色撫巻一笑披光風二泉道人不識畫随處看花付清話題詩漫欲為花評秋草菲菲滿江介輓華司勲汝和瑚璉之噐華司勲十年逺别長思君留都典籍國與立目覩成憲恢前聞司勲家世故有文臺閣省寺聨清芬民曹兩考兩書最餘興却憶江東雲自公退食絃南薰秦淮坐對波沄沄神仙中人在圗畫回首世路徒紛紜胡為異境復此分蓬萊有徑瀛無濆我懐疇昔一灑淚吟倚楚天終夕曛王宣溪先世鐵拄杖歌奉次西涯先生韻采詩先生筆如鐵鐵作拄杖如持節楚江東西往復還老興相追㡬年月擊之不折鎔不流化為何物今何州上摩星辰下入水未到周南應未休遺名在世收不去時復精光照烟霧宣溪笑和涯翁歌歌向廬山最髙處我來為爾意獨存行歌再過宣溪門杖兮杖兮誰可問望斷天涯雲滿身為許昌言員外題畫兩峯先生癖山水遊遍江南猶未已偶披此畫愛郭熙一段風烟在屏几澄湖東流中有梁轉盻却似孤山傍長松落落滴空翠草滿幽徑含春香漁舟往來日西夕自愛閒身共泉石滄浪歌罷海月髙欲起逋仙問疇昔千峯萬峯深復深白雲出入元無心鴻飛㝠㝠鶴𣺌𣺌嵗嵗東風花滿林先生有懐極馳騖瓣香每吊精忠墓小車山北還山南東將入海随烟霧胷中丘壑眼中人坡翁以後多風塵冷泉亭上一盃酒公與湖山誰主賔次楊儀部韻題陸章丘巻信州分司方曉起忽聞客報驚我耳江邊揖罷始知君何不先馳書一紙與君登第俱少年俯仰于今幾星紀中間往往見文章出入韓蘇竊欽企君才磊落滯州縣上書再至長安邸也知造物能戲人拂袖歸歟卧鄉里登臨到處興不窮手向林園植桐梓古人固有神仙流今人如君亦其比不然落筆對賔客揮霍風雲乃如此寒氷玉壺秋在懸鼎腹笑殺彭亨豕等閒解擯不足作聊復羣遊向呉市酒酣㧞劍思益豪望入湖天極茫瀰功名有地重彈冠富貴無人輕脫屣大江西南五老峯萬年青落鄱陽水山中塵逺多神仙聞君欲來招更傒載賡李白香爐篇肎後前人作山恥余官兼領白鹿洞臺石瓊瑶席雲綺停車一坐數十日跫然空谷欣聞履留君同遊君不住為君作歌歌浩矣送周憲使用杜韻人生交道無去住送君望極章江霧水如别思注壺觴侑以西山古松樹松有青枝未足竒竒在氷霜萬峰莫舊鶴仍随趙老裝新驄猶識桓郎路嶺南民物昔又今煩君為問彫疲故秋來瘴海連黄茅一洗迎風玉壺露浩歌向君擊節餘幾多鬰抱從今除古人憂樂天下耳數語請檢希文書廟堂從容他日地回首江湖雲杳如雪中題陳工部畫用蘇韻馬蹄踏遍秋風葉客懐還賞長安雪焚香小院對此圗此人此景俱清絶恍然不識是何方凍雲壓峯峯欲折草亭孤坐非君誰閒從水泡觀生滅秋林老筆逼夏圭千載風神一揮掣得來價直奚可論萬鎰黄金千綵纈羡君平生有髙趣下視塵寰真不屑明朝持此歸江南小舸乗風去如瞥也知象意君自得我為題詩皆贅說欲分半幅遮眼前剪刀安得并州鐵九江贈馮地官東曹故人東道主今雨相逢如舊雨江邊新閣速我登坐閲千帆集烟渚百年𣙜政如江風倐平忽險胡能同平涵雲日浴鳬鷺險鼓雷雨騰蛟龍我行觀風四經此野有歌謡民有史燕南楚北天茫茫青眼髙歌對吾子林泉家慶歌地官為詩夀外姑却作林泉家慶圗林泉誰歟地官舅家人大義宜從夫偉哉林泉五男子女子子孫仍倍此孺人稀夀正康彊玉樹芝蘭滿庭戺塘莊第宅森相聨板輿勝日相周旋四時和氣入盂鼎山果甘脆江魚鮮向來家法主母賢諸郎承業今蕃延詩書禮樂乆成習長似林泉未老年百年志體真兩得一盃春酒人爭先此時母也謝未許方憶林泉偕笑語朝看調膳暮問衣秋閲登禾春弄杼母兮此心上有皇天知報以諸福更百千嵗如一時賢甥地官祝在圗與詩君不見萱花叢開傍慈竹憂懐釋盡長對猗猗菉夀莫母何安人安人竹鶴之曾孫閨門尚有清風存來歸駕部甫三七又七寒暑哀聲聞哀聲未已賢聲起寂莫深幃謝羅綺花開花落經㡬春只尺中門不曾啟五花雲錦鸞廻旋一畨手展一悽然諸孫忽見少且長三子寧知後與前爾來五十開賔筵衆賔齊賦共姜篇頌興閭里傳聞地例及朝廷旌表年君不見庭中萱草梁間燕天為髙堂侑觴獻猗今之樂樂未央世間那有瑶池晏夀潘玉林七十玉林早入詩壇中及見前輩諸詩翁而今老矣復開社後生執簡爭相從年來甲子十者七鬢髪如絲眼如漆幅巾藜杖水復山晩歸更有軒容膝臘梅花開春正酣惠風日日從東南兩兄同堂三子侍西堦賔客羣來叅一盃復一盃有夀如此酒太和方絪緼造化在公手我有青蠟燭貽者廬山人照君琅玕席永此長生辰君不見庭前猗猗數竿菉誰遣稱林又名玉為君歌抑詩和之以淇澳容春堂别集巻一
