body:
  text: 容春堂後集巻七明邵寶撰神道碑銘一首墓碑銘一首墓表六首傳九首明故通奉大夫廣西左布政使龎公神道碑銘廣西左布政使龎公元化旣致仕之十有二年正德丙子十二月某日以疾卒于家明年丁丑其子櫟将卜某月某日葬公邑西芝山之原以國典當碑于神道乃手録公世系厯履為状託其姻友王生宗元來請銘公予同年友昔在𢎞治間同朝者數年嘗同考丙辰㑹試旣而公擢福建㕘政予提學江西解后於廣信信宿而别於今十有七年矣方以晤不獲再為恨豈意遽執銘筆哉宗元云宗元來時公喪未踰月櫟以状略故附程學士克勤吳都憲懋貞所嘗贈公之文來其書曰先人以公知已凡得所遺詩劄三復不已嘗歎曰如我者二泉也銘不於公而誰請哉予感乎其言乃叙而銘公諱泮别號芹齋元化字也裔出襄陽德公之後在隋有諱玉者居京兆仕唐為越總管子翀家㑹稽越十三世曰正已者宋大中祥符間為天台縣尉遂又家天台焉公髙祖伯靜號石湖居士曽祖叔圭有士行國朝洪武中被薦不起祖名瑞父繼以公貴封工科給事中母某氏封孺人公登甲辰進士丁未簡授工科給事中𢎞治乙邜擢刑科都給事中戊午有福建之擢壬戌擢河南右布政使癸亥轉廣西左布政使乙丑致仕在官凡二十餘年公在工科適暢御史亨與鎮守中官訐奏公以御史言是上疏論救之旣而京師大水又疏請弭之内監請備元宵燈料又疏請節之有傳奉取銅鼓匠者又疏請罷之時先帝明聖多見嘉納其在刑科自㕘駁外奏疏尤多如南京守備官蒋琮犯法及山東按察使楊茂元以言事得罪及僧官戒璇乗輿出入及進士徐浤等語觸吏部被黜及王威寧復起為都御史及武岡知州劉遜以藩府奏被執及刑部郎中丁哲等坐教坊司訟逮下詔獄公或獨言或率同官言之亦多見采公於是直聲日起士論歸之然憸人以不便已或有衘而流謗者先是掌刑科久者率遷卿寺之貳公擬大理丞于兩京不得擬福建亦再乃得人為公少之公顧不為意公在福建之二年鎮廵以公為才請命總督粮儲在河南首革力役之濫者事妨中貴及勢家公皆不恤在廣西以思恩土官有叛謀公檄降之近省蠻獠有乗虛竊發者軍民日虞其偪莫知所為公㧞民丁資以倉粟躬督追之賊皆遁去君子以公之政於是為大至於經理庶務葢有餘力焉而公歸矣公性坦直感激論事知有禮法不知權勢與公卿言侃侃不少屈視武将雜流尤不少假辭色間為詩文多憤發語有芹齋藁藏于家公生正統庚午享春秋六十有六配蒋氏先卒贈孺人繼李氏子男一卽櫟女三皆歸士人孫男一曰蓀銘曰吁嗟龐公廷言有恭藩政有庸職以地異乃心則同台士有節山與嶻􅑖公夙自負而終亦罔缺台山有靈永閟公穴明故南康府知府進階亞中大夫陸君墓碑銘有序南康知府陸君士𢎞得請致仕之三年𢎞治乙丑詔進階亞中大夫又七年辛未以疾卒又三年乙亥其子德等卜新阡於邑富安鄉青山之原葬焉厥旣有銘于幽復謂墓前之石未有所刻則奉其從兄今南京户部主事禮状來請初君有南康之擢也予視學江西以白鹿洞書院為朱子遺蹟圖惟新之顧學田歲入民逋吏竊勤我稽閲聞君來則喜謂諸生曰郡得賢守吾事将有託乎旣而聞君病且致仕則又相顧以歎比予東歸得一再見辛未北上君病少間力而餞予湖上葢不數月而君訃至矣年五十有八烏乎惜哉君諱廣陸其氏士𢎞其字别號新齋世居無錫梅李村君祖安字永寧國朝永樂中仕至臨清縣丞清謹有惠政於是子姓日繁析而城居臨清生民表配趙氏有子二人君其仲也民表以君貴贈承德卽户部主事趙贈安人君年二十一舉鄉試乙未卒業南雍王文肅公重其器屢稱於人已亥丁父憂𢎞治庚戌登進士第觀户部政以例歸省辛亥還部夣不利於母将告歸適公幹江南因省焉居月餘母暴病卒人謂之孝感甲寅成祔葬禮或賻之過君謝曰喪具惟稱不敢以家凡墓事雖細必躬諸子請代君曰此固所自盡也乙夘授户部山西清吏司主事尋監太倉出納夙夜共職計及竹木葦秸率不入於凶盗又疏請輸賈待用無棄無闕而人便之丁巳監兑于小灘戊午考三載稱以南便還奉父母贈敕告于墓己未廵督畿右諸倉葢所蒞地凡千餘里内鎮外邊武衛㕘錯官吏士卒及防秋戍役若干萬人皆受給于君君公平周豫畢精殫計而持之以恒事無遺奸論者才之以涿為道中議闢分司寓家人焉以便巡厯或謂君日且代矣何庸是為君曰茍便於事代者安猶吾安也卒成之㑹中官黃順辭退荘田上以賜藩邸疆侵于民司徒簡徃覈者或舉君君毅然請行立為疆之民則大悦先是畿内諸倉有飼馬菽久腐且棄或抵數給軍徃徃生怨君旣酌給更立輸賈法平糴直給有備無壞且省道費以備荒賑疏上行之庚申再考稱陞廣東司員外郎總監太倉出納於同事有紀綱焉時京城米石銀三錢而山西輸者不啻倍費君請令有司輸賈如畿倉菽法壬戌陞湖廣司郎中每裁覆章奏惟民情國計先後重輕不敢茍狥是歲南康守缺吏部上君名比命下皆稱得人君行出潞河幼子衢溺死葢於是病痰遂有歸志是冬疏乞致仕癸亥得命君歸建祠堂置祭田開塾延師几諸家政畫然畢舉或問君官政鄉人曰吾不知政觀其家可知已家居數年簡出慎交人鮮干以私每鄉大夫社飲雖甚歡狎而深長之思輙形于言旣醉則瞑坐待醒非夜不就枕平居度歩擇言審視詳聽几筵書策各有常置葢自諸生至歸自官不愆于素云君卒辛未十二月十有三日葬以乙亥三月十有五日配周氏贈安人先三十二年卒繼侯氏封安人男子八人長卽德次律皆太學生次術衡衢復從女子三人長適莫鉊故兵部員外郎曰良子也次適鄒釗次聘于吳汝愈孫男九人女孫十人銘曰巍哉廬峰表于南極彭蠡旣瀦左右引掖維山水郡天假君守君雖未之名與不朽震澤底定西瀆東江鬱乎相望七十二峰維山水鄉天錫君藏君則何與卜云其臧神依者山其行如水陟焉降焉于彼于此儉勤惟德寅恭惟謨惟君師古功在司徒水涯山麓有碑龜趺我為刻詞惟永世是圖故承事郎侯君墓表太學生侯祖德将以正德甲戌三月己未葬其父晩竹君於劉巷橋之原其姊之夫今南京通政㕘議吕君仲仁旣銘其幽復以墓上之石未有所刻乃從其父執友復軒潘翁來請翁之子貢士之達祖德受經師也實為之状君姓侯氏諱清字孟清世為錫人家于城之東隅其高祖德宗曽祖希道在勝國時繼有鄉望祖曰永常父曰文淵當我明盛時皆隱以老𢎞治初文淵以優老例受冠帶其配許氏生二子君為之長少遊鄉校敏慧善記有進取之志以親老故不克卒業乃銳意經理純藝厚殖力勤用儉田廬歲益二親樂之君備㫖甘為奉唯日不足弟澄為邑庠諸生君與異事而偕勤知者曰友中歲好為義事人有貸無不應有逋焉裁之以宜不必取盈至有棄焉者或售其産倍厥直而猶靳焉君復予之如初人不堪其忿君徐曰彼倍取而棄我倍予而得将不可乎逮典鄉賦亦惟是施之不亟不徐事恒先集漕卒歲兊于次群閧不已君至出一言皆服而退府縣有興建若河渠若橋梁若城墉倉廩必以委君及其成也罔不嘉勞焉於是身以儀著家以體持鄉之大夫士咸樂與之游嘗當祖父母父母四䘮致客累千人宗婣交際慈惠周至有不能塟者曰塋域於我不能嫁者曰資装於我寒曰於我衣饑曰於我食里中道路淤病行曰於我甓津渡險病渉曰於我梁若杠四方遊士及其門自欵燕及贈賄無失君初無子見庭中筀竹中夏而笋隂采逾茂因號晩竹自謂生子當如之而施舍益厚有是焉者曰有命者見而賀曰公神采滿容似有𠖇積者未㡬祖徳生衆以賀君君曰祖之德也因以為名祖德生十五年應例入太學克自樹立予昔見于京師而器之謂君積善之徴當在於是先是得通政君於甥舘恩義交篤至為治田建第及君舉進士位望通顯君子以為知人壬子之饑入貲助賑受服視七品階承事郎自是數與鄉飲之席晩謝世事營别舘於所居東偏山亭水榭極幽雅之趣客凡數軰以賢不以勢以知不以故徃來無期興至輙聚興盡乃已若風日晴煦雪月澄朗則泛舟山溪間亦惟是數客者俱正德辛未祖德既入選籍歸自京師明年壬申君疾是秋九月十有八日君疾病卒壽七十二配浦氏於君有相之道子男一人卽祖德女三人長壻為洧川教諭陸華次為通政君又次為周暄烏乎天道於人豈相逺哉晩竹君之始艱於嗣也人皆為之興嘆君顧坦坦靜居若無所望而家居日用為善不置譬之學者有勿忘勿助之道旣而年㡬六十竟得子子且知學人有邁徃之期以其旣徃而徴諸将來則冨貴福澤之報當無錙銖爽者吾黨有未昌厥施而厚責於天者聞君之事亦可以自觀矣哉是為表靜庵胡君墓表餘干胡君靜庵之葬也旣得銘于方伯張公矣越四年正德丙子其子守判吾常奉其友詹進士珪状請予表墓上之石予昔督學江西嘗因守而知君當其時豈知君之墓表於予哉先是戊辰歲守登進士授處州府推官便道省君於家君戒之曰官以為民無茍狥俗俗威以逞汝惟慈俗佞以折汝惟良俗競以進汝惟靜守拜受教治處三年而政成君子稱賢郡推惟慈良故然以靜故弗得於監司之好佞者用是遷官叙而弗超然靜之名聞而慈良益彰一歲兩遷今貳守蘇郡矣進且未艾予謂君之三言二效於前一效於後效於前者民誦之效於後者士大夫傳之君之教子如此雖未及受封而葛巾野服與同時諸老以子貴而被青紫者周旋田里間人之重之顧獨在君然君自視慊然有司行鄉飲酒禮以大賔請不徃或問之君曰此古之制而今用之吾之道愧於古人多矣冒然當之得無辱斯舉乎君孝友而惠鄉人有貸力所及應之不少緩卽不及亦勉副之其負焉者不較也有貸多而不忍負者以室劵授君卽日将遷君蹙然曰寧予亡貲忍使汝亡家乎立焚之烏乎此亦何媿於古人哉吾於是益重之君諱鐘字文聲靜庵其别號也其先居徽之篁墩南宋時遷婺元季遷鄱陽國初始定居餘干君曽祖煥明祖福安父髙母蔡氏繼蒋氏生正統戊午卒正德癸酉壽七十六娶霍氏宋進士震龍之後子四人長宦次富次卽守次崇先卒孫五人儉偲儒佃梅坡林居士墓表是惟梅坡林居士之墓居士生於元乙巳歲至國朝永樂己丑而卒葬于其里之東院山越五十有六年天順甲申其孫某卜吉於翠巖山之原遷塟焉今墓是也越四十有五年正德戊辰其曽孫謹夫立石墓前而以状屬歙進士胡惟學來請文越八年丙子予始書歸之按状居士諱貞字孟榦林其氏梅坡其别號也世為閩縣人居福城南津坊高曽祖俱隱不仕父允中母池氏生子四人居士其季也居士生未冠父母繼沒孤苦重以哀㡬不能生伯兄孟髙洪武間為吏部員外郎沒於官居士能撫其孤旣而以讀書聞又以能檢身持家聞於是清廉里黃巖中富室也年且耆無子惟一女淑慧通書史葢相攸者久之聞居士於媒遂舘焉黃豪曠縱酒公㡬諫弗納繼之以直朞年而志違居士嘆曰嗟乎男子不能自食顧家於婦邪乃乗間告黃曰舅子我我亦父舅然於宗嗣非計也老而子人亦有之盍圖諸乃為置側室旣又勸立從子某為嗣遂以其妻黃歸營于磕源以居不持外舘一物時祖産已屬諸兄家徒四壁立居士恬如也與黃事生業日勤未㡬移樹後山發土得錢若干田園居室日以廣有家之䂓畧備數年而産倍則周恤孤獨修舉廢墜表然為鄉望人居士性剛果儀觀脩偉於紛華一無所好獨好樹梅因號梅坡年僅四十有五子五人孫十一人深字士淵舉景㤗庚午鄉試卒官韶州府訓導曽孫十九人機楨舉成化戊子鄉試楨一名堅厯官益府伴讀樞字謹夫成化甲辰進士厯官徽州府同知𤣥孫十二人居士卒時有子矣有孫未若是多也今其曽曁𤣥蕃且才而顯如此烏乎盛哉昔歐陽子葬其考崇公之六十年始克表於瀧岡君子以為孝謹夫為居士曽孫葢厯三世百有餘年而圖其不朽於予走介數千里至於數年三請而益勤君子稱慈孫其能舍諸予於是知居士之澤逺矣烏乎居士處身義謀人之家忠其嗣之延碩冝哉明故三原縣學教諭王先生墓表松江府同知王君珝之父教諭先生卒且葬若干年矣至是其配彭氏卒訃聞于松珝奔歸将以某年某月日啓先生藏而合焉追惟先生墓未有表乃以為請予知許時珝方為諸生實與今祭酒賈君鳴和軰數人講學于予予於其請也惡能辭諸按珝所自為状先生諱俊字用章别號幽齋其先鳯陽人國朝洪武初髙祖廷懷始自霍邱遷許州祖讓父觀世守靈臺業先生生獨穎異少以禮學遊州庠儀采端凝雖被服寒素望者知為偉器與物無競而取予惟慎自書策外無他嗜好凡遇佳文字輙手録之應舉屢踣卒以貢升禮部授訓導陜西三原先生至新其矩範敦尚本實諸生爭自淬礪貧乏者顧飲食之有梁澤者年尚少先生亟稱竒才而加之教後發觧第一與張曉繼登甲第論者歸功焉同官或忌之搆謗百端先生弗為意時王端毅公方為方伯特加禮重九載考績吏部適端毅以公務至言而留之尋擢教諭士心益嚮先生有繼母迎之養焉初先生家食時嘗懇荒田二百畆閭右乗隙侵而有之子姪來告先生曰此亦非我有也其何可爭寘不問先生卒成化壬辰某月某日年五十三其葬某原為卒之明年某月某日配彭氏子男五人長某次琮諸城訓導次某次某珝其季也舉𢎞治乙夘鄉試厯知安平德州至今官所至稱治孫十八人某某某某某孫女十有一人嫁者九人曽孫十有一人𤣥孫二人彭為禮科給事中某之孫性嚴肅治家有法先生學且仕彭皆有資焉寡居凡若干年始琮迎養不就珝亦如之曰我未亾人朝不及夕逺渉何為汝惟各慎乃圖為我􅇺耳每致書珝必先官箴後及家故予在許徴故家文獻以王彭為望珝也才故與之進嘗聞先生薦於端毅重其為人而恨不及一見彭間見吾母太淑人太淑人稱其言動有禮今執筆表先生墓而彭附書焉固亦吾志也哉明故信陽州知州進階奉政大夫施君墓表信陽知州施君旣卒且葬其子庠生逢原請予表其墓上之石予時在浙藩受其状而諾之越十有二年予以侍養歸自户部始克最公事行之著者載之篇俾歸刻焉其他行具都憲徐公所為誌者不書君壮時與匏庵吳公同里閈且同㳺庠序日相講習自經學外博極群書文名並稱於人公亦雅重君後屢屈禮部惜君者徃徃援公為言旣而就選得同知許州人重惜之君在許實與予同官予政暇輙與辨質所疑君曰此在禮法云何前輩某某嘗有論云云或所行同異予酌而從事故雖一州之小有大議出焉於是南京工部侍郎海虞徐公方為藩及巡撫嘗致君而客禮之相辨質如予葢君為貢士家食且久獲遊先達諸公間故多聞如此𢎞治初修憲廟實録河南省臣徴編纂官於屬獨以歸君君寓相國寺合諸郡所上督諸生數十人校録而筆削之編成論者謂有史體許屬邑臨潁稱狡郾城稱野君以武御史檄先後掌其事各以俗為䂓民漸底訓監司才之己酉歲京運禄米先定價不足於納郡縣避嫌莫敢言者君言於巡撫徐公俾給時直民免重費太康縣民地百餘頃與藩府荘比藩卒據為荘地奏下撫按屬守巡官臨視民負寃至輙集衆以抗累歲未决君最後承檄徃民抗如初君徐諭利害且示無偏意民喜躍出舊籍君抵其境度而疆之民不失地藩卒無辭徐公患織造絲直為奸人所漁特檄君徃市于湖州物美而直省其羡歸于公於是清譽倐著徐公㑹巡按御史上公状㑹信陽缺知州遂自許州擢信陽信陽壤接湖湘軍民雜居故稱難治先是非進士若故京朝官不與而君以州貳擢初頗訝之君至召舞法吏先諭後治令出肅然衛職肆横成習君處以禮法不少假借若其同官有隙君復為分解卒致感服屯卒占民腴田聞君風悉還之有選人寓平常逆旅民姚琪者豔其妻謀死而奪之鄰人訟焉君得情於其幼孤竟抵姚罪君兼通醫學在許嘗蓄藥施民民病阽危而起者有之在信陽亦然凡此皆吾所謂事行之著者烏乎君子之於學患無其實茍實有之則前雖或屈而後不能不伸要之知已有無是繫抑亦有天道焉如施君者所負不止此而卒此焉止非天其孰為之雖然君之名在在浮于爵位人亦不能抑也固亦天哉君諱文顯字煥伯别號膚菴其先亳州人南宋時始居蘇之長洲縣國初有教授某者三傳至君父忠娶夏氏生君三歲而夏沒君鞠於祖母潘氏年若干以府學生舉成化乙酉鄉試自丙戌至甲辰㑹試連不利以經學授徒凡若干年年五十二始官許州八年之信陽又二年乃老年六十二又十㡬年年七十四以疾卒先卒之一年有詔致仕官進階或勸君易服與帶君曰吾階從五品今進正五品何用易為君為文務理勝而法宗歐陽公所著多不存稿今止存若干巻君三配初邢繼陸再繼計子六人逢惠邢出蚤世逢闕逢闕逢闕陸出逢㤗與逢原則計出也女五人孫男七人女九人曽孫男女若干人墓在某原其葬為正德戊辰九月二十五日山西布政司右㕘議致仕進階中順大夫胡公墓表吳郡陸生煥及其弟燦灼從鄉進士錢君元抑謁予表其外祖胡公之墓於是公葬逾月而太僕少卿都君𤣥敬之銘出矣予為最都君所稱之大者表之曰公少濶達急世務經學外若兵農水利無所不記注比以丙戌進士知江陵縣遂奮欲自見江陵據江漢上流民多豪俠且與藩校衛卒錯居公剔摘奸蠧一裁之法畫然就理適湖南北盗起朝命調夷兵勦之所過剽掠如盗至江陵獨俛聽公饗勞以去三年召為監察御史未㡬坐詿誤出知麻城麻城號徤訟公示之禮延問耆舊究利與害而罷行之其治如江陵而體稍異民益感化尋遷常德府同知初為守所忌久之乃更敬信有中監還自雲南舟重貨道索資送且要賄甚擾公獨率吏民徃見為欲檢其装者其人懼而去嘗攝守事㑹有詔徴黃金公以非地産不為歛檄旁午至令丞交諌不聽曰罪我之由弗汝逮也尋有詔勿徴旣而以憂去起復得處州或鑿山得銀中監請取之如官穴公上疏論之謂先王不盡利以遺民今所謂銀穴則旣有官守彼偶而得者利於㡬何而復取之且後之日安必其如今邪疏上中監奏報罷五品滿九載旣考最乃力請老時王端毅彭惠安二公在吏部知公才節而嘉其知退也請加今秩公歸杜門謝客言不及時事部使者或訪焉非强之不見見輙以病謝不荅歲請鄉飲不赴有請事者公與坐語竟日不敢言而退葢凡十餘年而病病間深靜自頥又十有四年卒烏乎公之操執感槩於江陵常徳處州壮矣及其歸也乃紆體抑志泯跡里閈約而忘貧逸而忘病又何其沈晦也若公者雖古之時葢賢之而况今哉何世無知德者讀吾表能勿起敬乎公諱琮字文德姓胡氏世為蘇之長洲人曽祖仲逺祖彦敬父晟母徐氏配闕氏無子以兄之子杲嗣有女子五人其長歸陸應賔次國子生徐孔麒次蘇州衛百户魏恩次陳柯次錢愚公病應賔迎之養卒其家遂歛以葬煥等應賔子也公善吟咏所存有東隅集者燦将傳之公墓地葬月日具都君誌不書南京工部侍郎徐公傳公諱恪字公肅世為蘇之常熟人自宋元來鉅人長者不絶國朝正統間公父敏叔從事于公為巡視少卿熊公槩巡撫侍郎周公忱所禮遇有子八人公其季也状貌魁碩凝重少好學族人有左氏傳善本公就而讀焉旬月强記殆盡景㤗丙子舉鄉試應天癸未㑹試值火公走避垣下有巨人自垣上手之得免因忽不見成化丙戌第進士簡授工科給事中首與同列論宫闈事諸内侍求領抽分公復與同列論沮中人因以其事奏屬公軰為中傷地公蒞之卒事無闕尋丁生母張憂復除前官前後論列凡若干章皆當世要務公顧自少盡削其藁陞湖廣左㕘議分守湖南道兵荒後民物彫瘵公加意撫䘏巡無停傳梁王薨嗣絶公會吳少卿道宏録其遺財監臨者将有所隱公親按籍寳器金帛各歸之所後吳坐褫職衆服公識初中監採進武當竹笋諸物他郡無與資送繼有欲旁及者公檄沮之居數年陞河南右㕘政陜西饑公督歸之粟數萬石時河南旱運夫患道險逺公乃易銀境内以畀陜人陜人亦稱便陞右布政使未㡬進左布政使時河决開封諸郡公請先浚後塞如古法旣而皆如公言藩府承奉司故無吏時徽藩有濫設者公稽令革之尋被奏劾上以公義正用書慰王申著為令巡按侵撥吏權公不少假㑹計歲入不勝費請暫減京運言甚懇悉河逼開封或奏遷藩㑹於許洛公條陳五不可事亦遂寝遷都察院右副都御史巡撫其地㑹有旱溢冰雹之災公請减秋稅且上弭災八事藩府據魯山民業公承命㑹勘議還之民户部督積逋急公疏請從緩御史李興建議割漢中鄖陽夔州數郡别置布政司事下諸撫臣議公條陳不可者五朝議韙之又以河决蘭陽害民稼請蠲其稅因㑹議上六事有忤當要語公素重風教至是修微子祠於歸德建西門豹祠於彰德道經洛南見范文正及其子忠宣墓亟為修治且請祠春秋置守户凡先賢當祠者亦皆凖令從事奉詔祭告濟瀆有浮帛之異郡縣請上之公不聽惟上弭災八事且言臣所言者一省事事有闗天下者乞命中外論列無諱葢公所建論於是漸廣且大先是中監有奉使道其地者公絶饋遺且重禮節甚或避館不見群嫉公者因嗾周藩誣公他事公疏辭且辨上知公貞臣調巡撫湖廣以示不疑公聞命卽行两河士民夾道攀送哭聲聞數十里公以湖廣舊治地益詢利與病而罷行之始至時有中使載私鹺百艘抑市于民公固持不從民得無擾湖南北蠻冦徃徃竊發公嚴責将領而按黜其尤無状者數人復䆒弊端凡用軍職必自衆舉不專聽總帥於是荐有災異公上五事多見施行論者謂公直節於河南益著居一年忽有㫖陞南京工部右侍郎或謂中監有以怨左薦者公曰吾平生惡傳奉而晩乃蒙此乎遂極言大臣進退之義引疾求去上慰勉就職一時朝論皆以公言為士夫重公至南京首抑私門役匠以紓積困怨言屢聞公不為動公以年近七十請致仕至再不允考滿赴闕㑹疾作遂力辭詔給驛歸歸一年疾愈言者以公可屬大事交疏起之不果然每得邸報聞朝政得失輙為憂喜又六年卒年七十三公愽學好文長於奏疏歲上議章公卿集朝堂見之必稱歎以為才與識稱有奏議集若干巻行于世平生引㧞士􅁼恒如弗及君子觀其所舉謂之知人位雖貴自奉不加於故在官蕭然如其在鄉三品初考當䕃子公疑所予有以仲子立孫言者卽以長孫瑑請将卒戒諸子無乞祭葬曰吾媿報稱敢復徼死後榮魏蕭山吾願學焉越一年巡按御史疏公大節為請祭葬如著令公配許氏贈淑人子四綎綰縜縚孫四長卽瑑補西安丞珝瑗琳曽孫七僑伋偁儒侍儀倫論曰烏乎徐公其殆聞范文正之風而興起者乎文正蘇人也公嘗為某言文正逺矣吾不及見吾幸得見葉文荘焉文荘聞文正而興起者也故公在河南嘗修文正之墓而請秩其杞又以文荘所著水東日記刻而傳焉烏乎文正尚矣文荘今天下士也建議者以清德正學稱之君子曰允公幼學壮仕能自得師老而未巳要其所至天下有公論焉某聞文荘於公有生晩之嘆雖然吾見公亦可矣尚何多恨為哉莫如起傳莫如起諱潜如起其字也别號水亭生無錫南里人父澄心翁讓性雅潔好自標致傾心下士有譽士夫間如起繼之人謂有澄心風初如起與弟如山同經學未㡬翁病痿家事及焉乃謝去不事旣而畢力治生經紀諸務務合矩法暇則肆意古學文好韓昌黎詩好杜工部字好歐陽率更日從諸老先生考問皆駸駸得蹊徑焉又三年翁卒與如山卜新阡龍山種樹營兆域築廬舍皆為之自躬葬之日逺近來觀咸謂之治嫡母金多疾至老益弱如起日夕問所欲有不言言無不致所居謹内外嚴若公府聞人有急輙赴救如恐後遇非意事處之夷如也年三十卒葬柎澄心翁兆配茹氏無子以如山子同嗣友人邵某曰烏乎如起已矣予昔為諸生嘗以社爼将與同事論于公如起遇諸途揖予退曰此行也不知者得無謂為肉乎君豈宜此君豈宜此予服其識如起嘗夜挫於人人為不堪厥明予訪焉語笑如他日飯予頃無㡬㣲見顔靣予服其度烏乎如起卽不壽幸至四十五十當亦有可稱者不至落落無聞如今無疑也烏乎如起久矣哉已矣尚何言哉尚何言哉絅庵李先生傳李先生名庶字舜明其先陳留人宋有諱傅者以少保儀同三司從思陵南遷始籍無錫其子琳累官敷文閣待制吏部尚書朱晦庵王梅溪登第時皆有事於廷試者也傅六傳至無錫教諭壽祖者家遭兵火悉死獨其身以事出得免自是在元凡四世不仕至先生之曽祖伯器國朝兩舉孝廉皆以疾辭與張尚書籌浦舍人長源為友祖景脩父桓仲號確軒嘗舉賢良方正不就母孟氏宋信安郡王忠厚七世孫武城知縣孔文女先生幼頴悟十二能詩確軒教以文學口授指畫巨細兼舉十八里人相推為師斆學甚勤雖大寒暑非甚病不輟鄉先正張憲副思安過確軒見所著鬼谷子魏仲先二贊大竒其才因勸治尚書與倪侍御汝敬相講益旣而以喪廢遂力攻古作自先秦两漢及唐宋諸名家無不㕘閲每操筆黙然成章不欲炫露因有絅菴之號然時時為知已者出輙相傳誦聲名隱起三吳大夫士若徐武功有貞王文肅㒜吳文定寛李太僕應禎夏方伯寅楊都憲璿盛都憲顒秦方伯䕫皆相推致嘗逰金陵志意益廣王三原恕以都御史巡撫江南禮而容之先生得師人之道而隱然自重邑大姓懇請始一應之及門士多出為顯官有欲從浮屠者立責而復之先生事父母孝存以道養没以禮葬旣除猶哀二姊貧嫠歲有所給兄弟早卒撫寡訓孤不遺餘力外氏凋喪春秋必之其墓省焉内弟無依者終身衣食之先廬久敝節用而成室與諸姪共處庭無間言朔望謁先祠退坐中堂男女㕘㑹必有戒詞為人簡重温純而義氣所激執言無忌凡諸細行人所不矜者先生獨致謹焉嘗以白金託息於人所償過数謝而返之其他多類是先生細目脩髯長身而癯冠衣整潔出入閭里見者起敬晩年望益隆郡邑長歲時存問必躬鄉人之都下者公卿多起居之所居號南樓日以先世遺書校讐其中惟詩老有社事則一徃焉治後圃結茅渠水上題曰渠南一老手書陶謝諸賢詩于壁每風日晴美幅巾藜杖行歌坐吟悠然自適人以列仙擬之正德改元詔行優老之典先生受粟肉絮帛或謂盍受服先生曰惟德稱厥年乃敢當此某於是何有卒不受先生重世德以先家蓮蓉湖晩號蓉湖漫叟所著有錫山志若干巻絅庵集若干巻評者謂其文脩婉善叙事有六一家法詩雜出諸體長短歌行則宗温李書似宋沈配趙氏宋孝王裔孫子覺戊辰進士論曰予嘗怪今之士學以求道者少豈惟道哉雖文亦然非應舉不學也先生之於文博覧群籍幽探逺騖其功倍於舉子故能超時流而上之當是時使有韓歐者為之依歸其所造詣又當何如邪先生之行深醇有則與其文稱稱先生於鄉葢未盡德焉周崇壽耇漢重賢良先生殆近之矣白吏部傳吏部司務白君坊字表之别號誠齋太子太保康敏公季子也其先世系及康敏之官階勲業有傳在國史康敏夫人蒋氏實生君君幼頴脫年十二三侍康敏公于南京偕仲兄京尹圻學于湯景賢氏為時文有竒語長老見之亟稱曰是固偉器十五就試於提學侍御婁公公曰童子何能文如是十八領應天鄉薦明年入太學又以康敏公命從大學士謝木齋尚書白怡靜二先生㳺於是康敏入總臺事進位司㓂而君謙厚自持與窮寒士齒康敏公卒君予寧家居哀不廢業旣除喪久之曰世禄古道也舍焉而科目是由則旣非古矣而必取進士何居正德初乃以資就選吏部授兵部司務勤謙自持五日一廷奏事敬共将之旣而轉吏部慎密加焉尋授登仕佐郎㑹天下諸司入覲考功問庶官治状君以所知對皆恊輿論今太宰邃庵楊公甚器之而君違太夫人久思一見弗得鬱鬱成疾壬申閏五月十一日卒于京邸年止四十配王氏子男一人誨君平生少言常侍康敏公燕居公問以時事君應口對皆有理致公嘆而異之家居時見族有貧乏者時衣食之自郡城抵無錫道凡百里一雨輙淖為行者病君甓之中有五牧白塘二津復為之梁康敏公嘗置義田建義學設藥局以惠姻戚君謂尚缺義塚吾将繼焉乃以其志告二兄将有事焉而君卒矣君在官凡若干年退朝理堂事退堂則闔户讀書日有程課其為詩文醲郁有藻思極力摹儗古人意得時徃徃類之刑科給事中同郡毛君式之知君深且久其言葢云二泉邵氏曰士之立於朝也躬起者難世繼者亦難躬起之難難於知奮世繼之難難於知約繼而稱稱斯其尤難也白君幼學壮仕循循脩雅君子稱康敏鉅人長者君為之子可謂無媿爾矣然伯仲皆歴近要崇顯君亦有地矣而年獨弗遐蓋其數如此故論者為君惜之羅孝子傳羅孝子瑋字宗器吉之吉水人其先曰復仁者國初以𢎞文舘學士從髙皇帝定天下當封辭上嘉其忠實賜歸田里其孫曰汝敬舉永樂甲申進士文皇帝始選庶吉士汝敬與焉厯官翰林至工部侍郎嘗有巡邊功孝子侍郎孫也賢而有文以䕃補太學生試銓曹優等授四川布政司經厯專理邉儲尋以母喪起復補福建擢知賔州同知常州府所至清慎有善政君子謂無媿其祖初孝子之居母喪也廬墓於螺子山下三年常隨一白犬主哀亦哀主息亦息山故無虎至是一虎渡江來周旋塋次與犬狎而不害孝子病而廬卧所杖竹倚壁生枝葉一白鴉為鳩鳴久而不去及将禫再感異夣越三日廬火有毒蟲死者五當是時墳生芝荷華生於原他日在福建有鶴五來翔與鴉來同物事具郡志自鄉達於中朝為之詩者凡若干人徐太史舜和寔序之二泉子曰予視學江西時嘗至吉水詢篤行之士於縣令丞簿博士諸生皆對曰邑稱多士尚矣今則有羅宗器其人旣而訪諸郡守倅曁鄉大夫士皆對如令言徐而求之葢忠信博雅宗族稱其孝也鄉黨稱其順也藩郡稱其理也而章逢之士又稱其文也予於是重之乃今見文獻録顧獨以孝子稱葢自其家云爾雖然孝人道之先也舉其大則小者可知已雖微動植之祥吾未嘗不以為信也孝子從子其祥吾辛酉所舉士也聞予言而然之請遂為傳以附于志倪久齋傳久齋諱柞字相承久齋其别號也姓倪氏倪為族以儒望於錫其顯者曰都給事中峻字維嶽别號静寄以鄉貢起家在太宗朝嘗上書諌事佛上試逺使之占城更稱得體晩歸教授後進多出其門曰監察御史敬字汝敬别號月樓以進士起在景㤗間直言不諱逺謫而聲益振卒官後軍都督府都事久齋給事公曾孫也甫十一齡而孤其母錢守節自誓親教之學時家貧甚至手為履以易筆劄久齋幼敏而勤每夜讀母辟纑相之嘗舉給事御史二公事以望焉久齋益自力弱冠而書史通子弟推以為師學成而仕者多有之久齋曰吾家世以經學取科第舎是則罔克繼前聞人乃從蒿庵俞先生學尚書未㡬舉業就緒群試有司一再不偶輙棄去不事益肆力斆學其為文婉而成章出入南宋諸大家詩宗唐法尤長於律真行書逼沈宋體間出所業於鄉先生鄉先生輙嘆繩不已至忘年為友於是母氏春秋髙矣乃築室學宫南涯日夕左右母恱則喜愠則懼誨則拜受責則跽謝得為子道久之母歿哀毁不自勝物以家具事以身任自殮及葬無違禮至功衰猶戚子容中鄉舉賀客在堂久齋呼而誡曰科以世重世以德重不然何賀之敢聞容拜受教今譽亦日起人謂善訓所著詩文稿若干巻藏于家平生之交長老而忘年者若王文肅㒜盛刑侍顒卞户郎榮張府推九方秦封君旭李絅庵庻錢希齋文凡若干人文肅嘗賔于塾脩敬為碧山社㑹久齋還自舘必與偕餘皆有唱和其年儕而望者自莫駕部曰良而下又凡若干人素重公府之謁憲孝二朝實録之修也以有司聘與執筆歲鄉飲以賔請辭再請赴焉卒辭之年六十六病卒明年葬某山之原壽府長史楊崇周銘之論曰久齋之稱士也宜哉初久齋博學待試葢将進効于時衆方奔騖萬冀一得若壟斷焉者比比乃獨委命靜俟翻然自止為名師儒蓋自重者如是故嘗就倪之世論之出則為靜寄為月樓處則為久齋其趣一也稱士於國殆無媿焉况一鄉乎知德君子将無改於吾之言矣毛封君傳毛封君勣字時繹常之武進人其先出河西金亂渡江有仕常州者始占籍焉至封君之曽祖福四當國初徙栁村里世業耕讀為鄉稅長其孫文明娶趙氏生封君封君幼淳敏成童習舉業講讀之餘能談前史治亂成敗之跡徃徃得其要領識者異之旣念父獨勞於家諸弟妹㛰嫁事繁家将不給乃應郡辟從事於邑六載例入貲得官從事刑部以憂歸數年授湖廣永州府倉副使倉無他儲惟受屯田子粒封君出納平允能以清約自守秩滿陞廣東潮州府石窟巡檢約巡卒舉職近民有訟多就質焉皆得理而去縣令見封君初謂其傲久乃知其自重益敬且任之居三年以疾卒封君二子長寳先卒其次為今兵科給事中憲封君卒時給事遊邑庠獨長孫詩視殮比䘮歸給事以葬于某里祖塋又二十五年給事舉進士簡擢刑科給事中又明年受勑贈封君如其官階徴仕郎配卞氏贈孺人卞出晉某官某之後世居無錫之卞家灣後徙武進白雲里孺人有女德嘗以忠孝德義訓子今少宰太倉毛先生表封君墓葢云論曰予在户部時聞尚書安陸孫公稱給事君學行端雅居諌垣為宜旣而見其章奏多闗朝廷大議侃侃有國士風以為其才志則然然必有所自者今觀封君之行愈益信之吾嘗聞封君平居嘗稱范文正公之義又嘗稱周文襄公之惠孺人與聞焉嘗與給事稱之夫安於小官固封君盛德而乃志於逺且大者如此有給事者為之後不亦宜乎予特著之以伺續郡志者兵部侍郎李公傳李公貢字惟正别號舫齋太平之蕪湖人其先系出唐西平王晟王孫㳺刺袁州遂居宜春南唐時有徙吉水谷村者十餘世至子敏始居蕪湖子敏生庭復庭復生永官諸曁訓導以公貴累贈通議大夫都察院右副都御史通議公三子長貴次賛字惟誠官至浙江左布政使季為公公生有異質稍長隨通議公在諸曁授經史為文有竒思通議期以逺到嘗舉太原王氏必做之語勵之成化己丑通議卒于官公時年十四奉其䘮歸庚子與惟誠同舉鄉試甲辰同豋進士丙午授户部主事𢎞治辛亥陞員外郎浙東大水公奉檄徃視之奏蠲其稅什伍甲寅以内艱服闋改刑部丁巳陞郎中稱良法官岐王府寮交訟獄久不决公奉勑徃聽之卒以平報辛酉陞山東按察副使有隱屯田者公理出之刻其疆于石且為差其稅時有貧富適均之頌嘗攝兵備臨清痛抑浮靡旣而分巡遼陽詢得蘭英死故曰哀哉若人烈矣及張天祥事曰寃哉誰歟白者乃碑其墓曰吾慰死者且将以激衆也於是大旱或請用巫曰旱以政致用巫何為禱醫巫閭山明日大雨居三年代去蹟在巡撫張都御史鼐旌奨疏丙寅陞福建按察使閱訟牒率千百中取數十大者聽之訟遂簡俗以競渡致鬭且殺人公以禮法禁之丁邜入覲道陞山西左布政使公至令郡邑立民膏簿以省妄費痛剔徭役弊時瑾虐方熾查盤使将誣公於法不能而止己巳以急缺諸邉巡撫召至京師禍福叵測或勸賄瑾且得美地公不可未㡬遷都察院右副都御史巡撫遼東時遼東多事瑾意以窘公遼人聞之曰此吾舊分巡公也吾得父母矣先是錦義二城以瑾奪屯地故有謀叛者公至親徃慰弭之北敵久為邉患公諭致入貢論功賜白金豸服故事巡撫都御史三品者坐總兵左時總兵都督瑾黨也欲以氣勢越公公坐不變及他不法事公多裁抑都督密嗾瑾瑾用書責公㑹大同巡撫劾有司稽邉餉瑾謂公嘗官山西罰米五百石令致仕公卽日西還寓通州僧寺卒罰乃歸於是惟誠亦以忤瑾致仕家居公日相與賦詩飲酒為樂客問時事不對庚午瑾敗詔起公巡撫順天整飭邉備當是時軍民虐於瑾者率起為盗覇賊劉六等聞公至将歸農公将單騎徃諭而先事有圍以兵者賊遂格闘多殺傷公道聞嘆憤不果諭賊自是縱横四出而覇特殘破公請繕城賑乏分截要害有斬獲必以實奏得脅從者遣之旣而官軍有他制者掘賊墓且擒其孥賊突來救圍城三匝公躬督嚴守凡㡬晝夜賊退公自劾求去上慰留之覇黨有出入禁近密通機事於賊者公廉其尤數人械送京師議皆處斬賊不復北通州新城居諸倉視舊城卑數尺舊城中通水闗弗便守禦公奏増高新城仍立舊城水闗啓閉法廷議遣三大臣閱實命工部取缺磚兵部撥休卒户部給日餉而委重於公公經畫之數月訖功事具少師長沙李公記古北口以山水為險水溢則城堡壞公度隙地作石墻百餘丈水却而敵不敢窺事具予所為序銘公所至旌廉去貪興滯補弊事多不書癸酉三年考績復疏乞歸上慰留之有才識練達之褒是秋遷兵部右侍郎公所蒞多與權貴人齟齬命下後有飛語以沮公者或諷公少事彌縫公不聽再疏得命遂歸歸八年卒公家居謝客貴客至拜謝于送不至其舘以為常先是公祖父母有贈典公至吉水焚黃于墓且為碑數通紀世德焉與宗人㑹叙久而後返小築于野日居其間讀書著文詞以自適嘗揭白鹿條教于堂俾諸子朝夕觀省公夙有文名伯仲自為友登第後與海陵儲靜夫同郡汪鼎夫徐興之吳門楊君謙盱􅇇陳明之太原喬希大上黨王應韶及寳數人者以文字相可否公詩雜出唐宋文雅而豐晩更整嚴有舫齋集若干巻公二子長曰原道補太學生次原性後惟誠邵某曰予與二李同進士惟誠在浙為同官予知其意度踈豁有寛厚長者之德惟正巡遼東予時總漕朝京師方阨於瑾聞惟正亦罹譛旣各免歸及再起予入户部視漕事北河而惟正巡畿甸予知其有行邉禦冦之勤申固郊圻之慎先㡬制物之明特立不狥物之介及陟卿亞勇退不顧予病間聞而嘉之今則已矣惜哉君子論李氏者謂惟誠近乎誠惟正近乎正予亦云㑹通君傳㑹通君姓華氏諱燧字文輝無錫人少於經史多渉獵中歲好校閱同異輙為辨證手録成帙遇老儒先生卽持以質焉或廣坐通衢髙誦不輟旣而為銅字板以繼之曰吾能㑹而通之矣乃名其所曰㑹通舘人遂以㑹通稱或丈之或君之或伯仲之皆曰㑹通云華自宋原泉至君之父守方凡若干世由隆亭而鵝湖凡三遷世有令人而幼武在元季尤以隱節著君於幼武為來孫性爽朗質直不拘小節事父能服其勞與兄文熈弟文髙相友愛父嬰足疾常寝卧君為室寝西每兄弟侍而退則誦詩於斯講禮於斯以樂親志父旣葬廬於墓側著治䘮切問祭必率諸子齊於宗子初君有世業田若干頃鄉稱本冨後以劬書故不復以經紀為務家故少落而君漠如也君居之東數里有原田積蕪君倣古井田制溝洫之疆界之葢其䂓且可觀矣㑹君疾不克就君三子塤奎璧女亦三歸錢杞鄒德謙鄒秉倫邵某氏曰吾嘗閱華氏譜始於原泉其稱出宋戴公葢譜者實云凡華皆同出漢有華陀魏有華歆晉有華嶠隋有華秋當魯襄公時齊則有華周周之後不見於傳葢微矣寳以孝著晉齊間於鄉為賢族之稱之其亦必有所自者㑹通君上下載籍考求其原著論傳疑不欲為茍從從不從於華無輕重而其志則然此其故於君大矣予故舉而論之容春堂後集巻七
