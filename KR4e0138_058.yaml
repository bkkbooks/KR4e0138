body:
  text: 容春堂别集巻三明邵寳撰五言律十首五言排律一首詞四首答楊儀部公有千秋計名山獨著書閒逢僧亦可靜問我何如儀羽青霄上原泉潦水餘和篇須早及東望正勤渠謁舒方伯于山中耆徳吾當訪山中豈漫來舊書三日約今雨一尊開健許身隨鶴閒將手植槐蒼生心未已公亦奈何哉聞胡仲光訃東野心如貎相知晩愧吾遊從閒處勝吟到妙時孤世事唐衢淚民情鄭俠圖訃來空抱恨風雨滿江湖寄題許州蔡孝子祠古澗元名揕新祠正倚津一言無盗賊千載有風神風雨林花晩蘋蘩野水春也知賢守意不獨化鄉人次南沙宿惠山寺纔閣南沙榻乘閒我又來為誰山有月從此徑無苔霜怯千年樹雲低百尺臺題名忘嵗月巖畔桂初開挽林提學林老真淵懿吾聞李檢齋每懷封事上忽聽訃音來雲氣生芸閣風聲斷柏臺江南鳴鐸地回首有餘哀檢齋謂天瑞登鈐岡仰山分逺脈此地古鈐岡星日臨疏逈風烟接混茫月移峰影動雨應峽聲長眺罷餘清興山花滿袖香哭丁玉夫携家向鄉國一水竟茫然易簀已無地横舟空有年何人收白璧他日負青氊洒淚滄江上凄凉對楚天雪中寄吳太史有雨從霄結無風滿院飛聲疑蠶婦屋光稱羽人衣空相真成界塵心暫息機懷君思難寫東望正霏霏贈陸瘦竹郡幕奔趨日誰知瘦竹公愁深相别處興逺獨歸中古篆山中石新歌水上風寗庵如我問夜夜夢江東煨橘次匏翁長安冰雪裏金橘訝團團有味須憑火多情自弄丸消融何處妙分剖個中難香似風前采色非霜後看侑觴真勝蜜出鼎或疑丹題數曾書寄盟功及燧鑚未論生與熟獨愛苦兼酸明日春陽動煩君别薦盤水調歌頭送吕憲副之雲南晴色豁雙眸玉節向南遊乍離天上宫闕聲名已到遐陬試看平生名節好似迎風寒露冰在玉壺秋萬世朝廷法度一一請從頭笑談裏使化外慕中州皇仁隨處宣布車騎肯淹留民有銜寃茹苦吏有甘刑黷貨憑我使君籌天子有明見不日召諮諏玉燭新送陸憲長之江西今嵗春王正報道大江西憲臺增勝寒生萬壑冰壺裏更明月相輝映浙江今日清風動處秋潮定捲山雨百鑑堂前為萬姓新觀聽平生志在經綸㸔案牘如山等閒酬應尚餘髙興弔孺子東湖獨穿雲徑霜嚴江淨古栢枝嵗寒逾勁有天書行召君還廟堂執政滿庭芳送林方伯考績春滿吳山花深薇省徵書將下天邊畫船開處人道似登仙不待天官書考御屏上姓字髙懸最好是甘棠蔽芾重賦召南篇江湖千萬里一驄五馬猶記當年豸冠依舊在袍錦紅鮮請㸔都臺松栢冰霜後老翠含烟重整頓胷中舟楫風日愛前川闕送司徒葉公致仕三朝元老忽賦歸來未了君王眷矚平生事滿丹青有何不足鄉里爭㸔天上人笑聲喧動西湖曲從今後山南山北到處隨吾所欲曾讀漢唐宋許多年只一本名臣録試與從頭㸃檢幾人全福天留緑野舊規模清風吹醒紅塵目任教他桃李開遍公門不如松菊容春堂别集巻三
