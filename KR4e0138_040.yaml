body:
  text: 容春堂續集卷四明卲寶撰七言律百五十七首七言律山居秋日用杜韻八首新秋景物愛山林碧樹含風正鬱森滴水下池時發響片雲度嶺漫成陰十年病後憂時鬢千仭岡頭望闕心餘興最憐東月上一峯清磬萬家砧忠定祠邊細路斜高臺百尺面清華柝聲似應雲中笛帆影虛疑海上槎老興把杯還把筆清時聞鼓不聞笳閒從滴露泉頭立開遍梧桐幾樹花湖北湖南度夕暉望中山影坐來微具區澤近九龍卧滄海雲空一鶴飛日月每將閒事遣陰晴長與夙期違清齊不獨葵堪折竹笋鮮新蕨本肥勝負機忘懶看棋江湖還為野翁悲聖朝此日真虞代循吏何人似漢時晚塢雲深看月逺秋風泉澀下田遲同心客在天南北萬里滄波正爾思不觀泉水即登山詩卷長携木石間江逆海潮窮地脉峯參星斗入天關風回碧澗千川象霜落丹崖萬古顔聞道瑶臺在霄漢野人何意問仙班觀泉巾小恰籠頭灑灑衣裳七月秋自謂雲林堪避俗不知江草解生愁無魚入饌真忘肉有鶴來巢即對鷗他日釣逰今杖屨宛然水國是山州信今傳後兩無功老去心情靜坐中夢裡巖松過急雨吟邊庭草泛光風滄波野鳥秋能白籬落幽花晚亦紅敢學少年行樂地北堂趨走未成翁綺塍五里亦逶迤北望平疇接華陂揖客共摩新石刻贈人還折古松枝履違東省聲全隱几失西堂夢不移坐久却忘歸路晚蒹葭江上露初垂懷姜僉憲若虛若虛關中人舊嘗巡按江西因問起居于雷少府故有是作西江共校薦賢書回首風塵草載餘顧我文章非晦父知君禮樂自橫渠洞前鳴鹿蘋還茁柱底降蛟窟已墟病客江南時感舊三門寥落絶雙魚馬巡按訪我山中精舍山中忽枉乘驄客千古清泉一啜餘幽興未題青竹句閒情方試白茅書觀民節已因君重經國懷還為我虛曾向許昌祠靳老汝南回首思何如次韻答馬巡按病難下拜惟投刺吏散行臺靜復扃且止共驚桓典節無寃方賴釋之刑人間故重觀風使天上元垂執法星簪筆螭頭須老手一言深望折盈庭用韻答王郡公松籟清傳閣外聲郡公詩到户初扃青溪洞逺頻紆節碧樹階深久措刑世上無心風動草天邊有象月從星平生一管春秋筆老吏曾聞在漢庭超然堂用韻答陳子引茶山居士惠山行六月虛堂晝不扃何處清風能此客向來大暑似繁刑吟笻緩待東山月征斾遄朝北斗星秋草滿前無刈者應將茂叔認吾庭山中漫述用韻千帆竟日南還北堂在危崖坐不扃玉枕為誰增地價松醪從此失天刑蒸蒸漫指雲為雨落落虛傳石是星使者采詩還自賦清風應許到彤庭山中遇靜觀一秋風日今日好我向山中看白雲觀水亭前初送客時鄒存正見訪聽松樓下又逢君放翁健筆何難試此言無詩公瑾醇醪本自醺此言無酒獨上層臺待明月綺塍歸去夜應分董侍御訪我超然堂觀風使者入松關為向閒人問太閒潦盡正憐秋後水雲深偏愛雨中山陳郎原習節指西川去馬子信陽帆朝北斗還更欲與君尋古刻南巖石上洗苔斑哭節庵歸有作髯翁哭罷正愁眠問我銘旌倍黯然時其弟世資書來問銘旌萬事百年君子論一行數字路人傳登廷奉對皆才選行省參知有政權指日生辰期不到古稀真信杜陵篇生日避客山中客有過者作詩謝之時新作精舍之街賦以興焉節近登髙新路開山中冠蓋有朋來酒因母病未敢受詩到秋清正合裁微月初懸看作鏡新泉曲引待流杯送君東上蓉湖棹青眼還留㸃易臺超然堂新種梧桐待鳯凰草年猶記夢中祥日長合有人高卧山淺還應地善藏平野星辰多夕觀少微雲霧更江鄉一聲清磬中峯起誤道朝廬近未央送秦思魯秋酌薇堂别思遐喜占春信對燈花向來武爵辭君錫此去文章為國華寒嶺喬松方挺節晚園碩果亦回芽遙知京邸承歡地剛說辭家又到家挽錢信之哭罷希翁幸見君相思長隔蕩西雲高名未向廷中薦佳句時從社外聞數約不來仍舊榻一詞難誄有新墳秋堂愁共咸郎語軍帳峯髙日易曛送周治中驥足風塵一展開士元何啻治中才勞如晉鄙陽城在清自關西伯起來書考適逢龍虎榜送行還上鳯凰臺幽明黜陟非吾事惟有新詩與子裁九月望日登顧氏山園登髙長恐主人留今雨乘閒到上頭雙眼乾坤容萬里五湖風日屬三秋舊壇荒落隨陵谷新徑逶迤入畝邱薄暮題詩下山去塔烟西接劍光浮送莫如山應王郡公纂修之聘兼柬陳廷猷歲晚携書謁郡侯侯方燕坐對春秋兩生有道時非漢二國無徴禮自周歌采康衢今日頌傳留亷吏後人修多情若問西山路古樹隂中澗水流王郡公朝正告别三年兩度謁承明亷節應多動聖情家夢未能忘緑野官針真不負蒼生有凰偶集黃非僞無鶴相隨趙亦清不用千秋尋漢典觀風人已識公卿寄山東巡撫陳中丞兩年三劄汴臺時回首東藩幾夢思疏為斯文還白鹿近聞中丞有疏欲興白鹿洞學及某舊事書從何日更青藜泰山我負登高願滄海君成望逺期相寄不煩緘魯縞漢封壇上有秦碑石瀾為天台僧明統作水向石邊方急流禪心如月照源頭百川傾注三千界一滴生成七萬秋魚躍魚潛忘密藻花開花落對閒鷗吾泉堪濯還堪飲獨聽滄浪起逺洲施平樂暨盛氏兩都運過訪超然堂我作新門待客開山中秋晚數翁來坐臨巖壑笛三弄逰返江湖酒一杯靜觀還自楚筠谷還自蜀東巖還自閩論世已非空裏閣懷人最是月中臺說蛇說虎真驚耳諸公言官之失得甚悉起聽寒泉步石臺贈徐嶽峯少參用邃翁韻二首數月旬宣疏幾通南來憂思對山翁祗緣萱幄迎非便不謂薇垣養未隆老鶴正須驚獨夜冥鴻未許遡長空北巡曾到蘇門否拜罷姚公拜邵公伊昔相知自浙中百年心事一經同斯人海嶽真鍾秀何處江湖不效忠嚴瀨水聲風激烈錢塘山色雨空濛北堂萊舞從容地識破人間道與功山中漫成李紳臺南還築臺陸羽泉西泉復開泉邊偃息看水逝臺上淹留待月來一杯對客秋將盡千古懷仙海欲回漫恐歲寒霜雪至超然堂下有紅梅送錢太常使畢還朝次韻也知晝錦非君志至樂無如使過家祝捧御名天只尺祀成殷禮國光華紫薇省下迎周節黃鶴樓前返漢槎十月東風如有意漕湖宅近大江涯懷羅台州兼柬余郡推十年雅意屬台州珍重羅侯代顧侯勘易客來緣我送采詩人去為誰收東郊靈雨春中駕北極明星海上樓政暇從容對參佐郡推元有古風流寄顧大參華玊近逢左轄問參知尚憶山中訪我時豈是西湖無好景秪緣東省有佳期一方暫試經邦手千古還紆尚友思聞說柴墟遺稿在故人已為付棠梨故人即謂東橋寄余郡推鴻賓東橋去後復文川山長能邀又二年過嶺不携清獻鶴在庭應出惠通泉半江月坐巾峯上萬古碑看闕里前二月春風來舊客還將美政向豫傳寄夏德樹赤城山房不可到但見客帶煙霞來孺子歌殘三擊節羲皇夢醒一銜杯少微夜隱江邊霧蓬島春連海上臺二月西軒重下榻可無新句為豫裁寄葉侍御一之手植松楸漸有陰三年讀禮草廬深淚緣感物沾歐表歌待成聲和舜琴海上魚龍秋共蟄山中烏鳥夜初喑起居近得黃巖令巾幘峯高玉爾音少傅王公書來謂貞節碑製有泰山之遺不勝愧歎吾碑敢學泰山碑不謂溪翁謂似之天地深恩明主詔春秋巨筆傅臣詞石鐘追動蒲牢角風榭馨香柏樹枝山鬼自今須斂避文星五夜照南離聞錢工部訃老人星照昆承水一夜頑雲忽掩光片紙仙方空入夢百年詩冢竟流芳逺逰司馬曾高覽大隱東方亦善藏待取東湖碑出後還將經濟問賢郎人日人日占人古有之淡雲疏雨日光遲梅呈紅蕊寒猶茹菜剪青絲凍欲萎野老獨斟泉釀酒繡衣還寄草堂詩冉涇橋畔元宵市步月看燈有所期榖日陰寒微雨寄友用前韻春來何處去何之江郭寒多意故遲梅亦有情爭欲吐草應無力暫如萎迎盤送菜吳人俗拔劒彈琴杜老詩最是三橋燈市近與君先訂上元期小井田成在容春精舍東三代遺風一慨然聊將幽事遣閒邊細分顔巷曾收井小灌張渠未買田荒入草茅憎隙地馨生黍稷願豐年如聞新製遒人鐸擊壤歌中見古天時巡撫靜齊先生初行鄉約故及之春日山中漫成避風避雨夢中過晴麗其如此日何坐石觀泉隨我意煮茶燒笋聽僧歌晚添積翠雲邊淺春逐殘紅草上多忽報西軒居士到向來離恨一銷磨戴進士巾山行四十年前戴此巾幾回清夢隔風塵誰知道路閒邊目還看山林病後身蓬島客參諸老社曲江圖入九峯春相逢莫道無同志見說伊川已有人畢中丞亨致仕還洛常戴進士巾出逰語人曰事還朝廷進士吾故物也其子方伯孝為豫言之坐燕居亭懷莫如山觀物年來眼近真燕居亭上有閒人雷聲連送兩朝雨花事頓消三月春木芍藥闌青草長石菖蒲沼緑波新南沙有客應同興何日相過洗渴塵新晴出郊之惠山步出西郊見暮春樹頭紅盡緑初勻上方下界無逰女北塢南岡有逸人山色倍增今雨碧泉聲轉入近池真竹根處處驚雷動忠定祠前數籜鱗山行紀事䇿杖來看雨後泉老僧相迓寺門前殘紅夢裏空三月新緑陰中又一天風轉北溪隨爽氣日衝西嶺破浮烟公孫携酒先期在更有諸君在别船送曹永平于德十載昌言動廟堂永平假守似淮陽西垂閲實初旋節東甸巡行又出疆田里情於臺省近江湖心與闕廷長漢家千石還登相消得人稱一字良送喻武昌宜之虎符龍節照洪波中老謂秦廷韶曾經此地過兩志共知文獻在百年將謂武昌何眼明每引黃樓望聽逺如聞赤壁歌况有玉泉家學在黑頭功業未蹉跎送顧泉州與新一時三守邑多賢佳報先從海上傳直諫曾驚他日震清修應比此山泉鳯凰儀羽非無地黍稷馨香是有年五馬雙旌元貴重朝廷異數况高懸寄題石龍書院石龍書院經厯黃巖黃宗賢讀書處也君以議禮遷工部員外郎辭疾東歸致書請題于是乎賦石龍巖下有人龍萬卷圖書一畝宮久信橫渠崇世祿始知若水稱仙風地當南斗瞻依處道在東山臥起中忽憶台州三憶句欲招方石慰涯翁涯翁有台州三憶詩三人者謂宗賢之祖定軒公及兩謝公也華從龍在祗陀饋鶴頂梅次韻十箇梅題鶴頂丹僧家淡泊助清酸病須入藥非無用老負調羮正未安他石倚雲風骨瘦我泉落澗露華寒報君欲搨唐人篆雨蝕莓苔跡已漫苦熱二首旱憂民物熱憂身獨臥虛堂老病人態似兒童欣水石情如野客懶衣巾雲中樹色披圖幻山下泉聲入夢頻短壑青松空在口肩輿曾不到東津若歲大旱今真逢狂魃驕舞生炎風雲霓數日無片影羅火太陽同一宮虛堂坐我獨心靜涸野憫農皆力窮群龍懶臥呼不起手弄楊枝空百童孟巡江夜遊泉上紀興和韻弭節山中為飲泉登臨亦復弔前賢天風吹酒起高興水月入詩成警聨潤下故應窮逺海靜清還獨浚微涓病夫未得相從去一見新篇一缺然寄吳東湖司空老謝尚書返舊堂百年吾道益增光洞庭南去還裴野震澤東來有召棠調劑口曾嘗藥苦經綸手復理藝香深秋一得沙羡報回首蒼梧夢轉長寄孫九峯司徒九峰山裏寄書來珍重司徒手自裁出處四朝今舊德沈酣三禮古遺材愛公欲徒吟詩社老我時登㸃易臺喜接賢郎難答拜愁看江上鴈飛回題畫壽孫九峯司徒别公十有五年來渴思紛紛不易裁南極一星猶正色蒼松萬丈本竒材誰云雪酒非春酒我愛雲臺是釣臺江上飛鴻多未達隔年須待漢槎回得雨旱氣蒸人酷如火今霄雨來何沛然坐令四境盡沾足行見百榖皆新鮮閭閻自喜得口食官府不憂徵稅錢吾徒無能却有幸齊閣日高猶自眠次朱士光見寄百年文字偶相知情到南畿按節時淮郡竟煩長孺臥長沙益起賈生悲蛾眉衆諑非今日豸角群邪有夙期千里鶴坡何處所秀江回首不勝思謝馮僉憲移竹用李文正公韻茅竹曾聞避市塵十年兩地不輕分平生直節真吾道何處清風不此君自保霜筠青似玉須留雨葉翠如雲數挑山土勤輿力西向梁溪望夕曛贈傳神吳芳逺誰家阿堵㸃能真四十餘年不數人臨穎筆端饒氣槩謂賈志泰和象外妙精神謂郭詡閒留我在心千古老遇君來貌一新骨相山林今已定不勞物色向風塵得余鴻賓簡曾聞退易不聞難六十年來繫一官風木聲中悲歲短雲鴻儀處愛天寬援琴欲鼓還清淚運甓無勞亦素餐君未棄臣臣自病𠂻情須向疏詞看喜王內翰以詩為問用韻奉謝迂僻平生敢自豪愧將虛譽動時髦籬邊秋色南山近巖畔晨香北斗高日月照應無間隙乾坤報未有絲毫感君相問無能答病足支笻重抑搔奉懷素翁先生舊隱歸來長薜蘿江湖風雨兩秋過山中歲月空閒在天下經綸奈老何酒熟漫邀鄰叟飲詩成還對社翁歌二泉病客懷思渴安得南飛酌海波月夜送客酣飲其如客去何冉涇橋畔漫經過惟君畫妙心偏苦而我居閒鬢亦皤巷柝有聲人語靜塔燈無影月明多中秋更起登臺興古華峯前一浩歌聞管大夫欲招豫鄉飲因檢壬申年辭謝髙侯見招之作用韻奉呈蒼蒼余髮視茫茫七十年將病莫當杖屨不支新步履衣冠空憶舊班行三章未已終辭闕一拜猶難敢上堂欲謝招徠賢令尹賡歌還愧昔時狂張山掃墓歸途有作山南山北掃寒烟舊冢新碑二百年紅葉似花霜醉後青山如黛雨粧前數峯影閣竿頭日十里光沉鏡裏天最喜無風溪路穩沙鷗來往候歸船喜介夫劉大參至十五年前别故人西南川陸每馳神初心道德君無負晚節山林我亦真杏樹壇邊懷舊雨梅花國裏認先春安成謂張汝立去後長懸榻詩話于今又一新日夕坐泉亭用韻坐深秋日淡娛人始信西神山名本有神詩邁尋常知子久酒開涓滴寫吾真雷聲漸鼓千峯雨苖色將回七月春瘞卷邱邊話疇昔江花江草幾回新費子美過錫病不能來遣其子來訪且索詩遂賦以贈病餘聞薦喜君來子美丙子鄉解秋卷南歸又幾回齊瑟未須論往事燕臺終不負良材朝廷禮遇應前席家世文章自上台江郭蕭條驚歲晚鳯凰池上有春雷謝朱巡按下問夢憶泉聲賦兩知賡歌先得一緘詩雪山輕重公來去河水清漣我病衰滿地江湖容白髮可人風月負青藜平生知已觀風使願共山中折桂枝㸃易臺觀泉㸃易臺南滴露泉石邊一穴水精圓方諸未挹天邊月沆瀣虛傳海上天白鶴逺來雲表外碧窗深隔洞門前晚年對此心常活何處清凉更問仙懷管司訓履違公府十年多門刺因君兩度過老母夀能成曠典郎君政不負高科晚風海上吹寒菊秋雨江南熟早禾更愛儒官成績逺手栽桃李聽弦歌送朱都事相之雲南萬里滇南帥閫開幕僚今喜得英才胸中邱壑供揮染眼底煙霞任剪裁閉戶讀書踰十載出門獻賦動三台清時戎政多參畫行見封章起憲臺閲馬跡山記寄西青山人西青山人作山記搜剔幽隱山靈愁跡緣神馬自秦漢祠追后稷經虞周尋常一水五湖老七十二峯千古秋分明圗畫在中沚美人何處心悠悠挽素庵李君愚翁風采動華陽素老相承倍有光燈火夢回吳㑹逺詩書脉引蜀川長百年棠棣聨槐棘萬里江湖即廟堂最恨楚詞招不返澧蘭香盡夜茫茫送陳原習巡蜀草年風采動臺端按節南荒六月寒漢法共推經術吏周廷元重惠文冠路當險逺行何易時向承平諫獨難攬轡觀風秋萬里峨眉山月馬前看次鄭司馬留别中朝諸老韻公去還於國有禆清風滿路出郊遲乾坤直道春秋在臣子孤忠廟社知一夕笑談真不偶百年行止復何疑二泉亭上山如畫更與詩翁作後期奉寄白巖先生東門祖道向西歸又見秋風動葛衣三晉雲山今日重二疏風致古人稀臣忠共識君為聖今是還知昨未非我病十年難下拜太行回首思依依虛庵陳郡公建道南書院書堂新建古城陰巨榜高題屬意深吾道北南還一脉斯人今古本同心妙從活水生時得樂向光風起處尋教思無窮歸有道朱弦休嘆少知音有懷彭司馬司馬西歸塞霧深近來才得便風音數千里外停雲思三十年餘伐木心寤寐不忘天咫尺經綸未了歲侵尋憑君為弔南陽墓正氣曾聞托醉吟南陽為段可久司馬之舅也送潘之逹之遂安三載平陽野有歌重來仍泝浙江波大才小試還如此舊政新民欲奈何山雨從星秋旱久海潮應月晚寒多漢廷方重循良吏五十功名鬢未皤燕俞大參國昌二宜園多時相約看芙蓉此日嘉園此客同幽徑小堂山左右茂林平圃水西東十年夢落江湖外兩世交通里閈中新製泉巾便野服迂疏應不笑衰翁雨坐閒居不敢問豐凶對客惟應賦大東慘淡野情秋望裏凄凉歲事雨聲中也知北斗隨天轉安得南箕應月從極目江湖雲萬里杖藜三嘆一衰翁兩知亭我歌泉和兩知音此是涯翁贈别心吾道在山還在水斯人如玉復如金高邱逺海天無際舊樹新亭日有陰一曲雅歌千古意欲調宮羽入瑶琴次韻送王子春兼簡赤城夏先生碧葉黃花送晚秋舊逰回首是今逰雲兼山水看隨路月帶風煙載滿舟滄海東來潮信蚤浙江南去陸程修赤城居士如相問尊酒論文恨莫由送羅員外病足稀登惠麓堂公來草木被餘光方傳惠澤流州郡獨愛昌言動廟廊秀句已鐫泉畔石清風長滿召南棠司徒分領留都計多少經綸望省郎次韻夀劉鴻臚大鴻臚劉公毅齊以考績便道過三吳訪白樓吳公及豫白樓有贈詩且致壽意豫聞而和之亦白樓之志也望隆卿寺自郎曹晝錦鄉邦駐羽旄六十再看堯陛莢尋常爭賦漢宮桃江湖大觀還龍窟雨露新恩且鳯毛東閣先生題贈處中吳回首德星高擬作賦鹿草堂於惠山精舍以無忘廬山之遊述意二首百年白鹿得竒觀雙澗風聲六月寒七里每勞千里夢豫家去惠山僅七里廬山在千里之外九峯長作五峯看惠山九龍廬山五老皆峯名兩知堂近流風在獨對亭高縮地難兩知亭在惠山獨對亭在廬山敢擬峩眉論小大山連震澤水漫漫曾向廬山賦鹿鳴呦呦千古有餘情釣逰地近憐新築弦誦風微愧老生㸃易不知吾髮短聽歌還愛此泉清偷閒尚記東曹夢花柳前川䇿杖行豫為戶部屬時嘗夢有人作試官狀誦雲淡風輕一詩為題俾豫破之豫應口對曰道體寓於物而天機自動道心託於物而天趣難名時方求嗣有祝中朝諸老皆謂佳夢今老而無應付之一慨而已秋夜宿超然堂閒愛孤雲靜愛僧山中秋夜興逾增竹通深徑清風足松倚高壇霽月曾露氣侵階驚蟋蟀雨聲入戶避蚊蠅城中望我如天上青壁丹崖知幾層中秋夜素娥無力破雲陰雲外清虛府正深今月古人空有問青天碧海亦何心靈槎渺渺應迷道仙杵沉沉已斷音九月中弦秋未盡一尊還許盍朋簪十六夜次前韻六旬炎熯兩旬陰月到中秋雨意深天上不違逢滿數人間却負望明心扁舟牛渚空勞夢一曲霓裳漫賞音佳節莫教容易度白頭今已不勝簪十八夜山堂見月又用韻坐看夕殿散凉陰山靄沉沉紫漸深病後逢秋猶有興雨餘見月已無心風回近浦留帆影籟靜中峰起磬音醉舞不知吾老矣桂花還學少時簪晚坐超然堂九月花開菊正黃今年時物應秋光無詩可擬登高賦有酒還登望逺堂徑轉東南須䇿杖巖朝西北合焚香晚林霽色紅猶淺更待西風一夜霜九月八日足許州舊句吾衰久矣杖難支隨意青山且賦詩高處登臨天亦忌清時笑傲地應疑已上二句許州作也許州舊句還須續廬嶽重逰不可期願保丹顔似黃菊年年同對野人巵諸友觀菊用韻一賞真償數月忙晚香籬落愛秋陽花中亦有清時隱林下能無野老狂淺淡色如酬世務衰遲心已謝年芳歲寒更擬題詩處和靖先生别擅場挽李封君巡撫李司空乃翁也嘉定功餘泮水波華陽規誨復誰多承休合有台衡者節惠其如窀穸何江樹影連巴國字澧蘭香入楚人歌司空勳業旗常在應與先生永不磨華生雲惠我端石侑以詩用韻答之望望端州路幾千客來剛得遇陳𤣥介心不减居山者潤色如初出水然三島東溟春渺邈一星南極夜澄鮮吾齊從此還增重合置西涯篆黻前吾有端石為黻形涯翁銘且篆之發書於鳯山有虛名為纍一言因用杜詩起句才微歲晚尚虛名一夜驚心白髮生貧有圖書應入夢老於廬屋未忘情寒凉正值風來朔霽爽還逢月出庚便作西軒依舊室餘灰掃盡地初平如山卜隱初成湖海蕭條歲月遲江東誰復問潘葵江西隱者易臺共我雙巾葛吟社添君一杖藜翼健已超塵外網眼明還看世間棊昨冬先獻希齡酒今日迎長又賦詩幸庵司馬寄節孝堂三大字至豫居被火之六日幸庵司馬自關西託鳯山司徒寄節孝堂三大字至似欲易我侍養堂名者此豈偶然之故哉愴然有感情見乎詞三字堂名萬里來舊堂名扁已成灰故人逺意真如讖乙夜融風不是災活水源頭仍里第德星懸處自書臺可憐嘉樹多憔悴春雨來時又著栽錢元抑專使來唁用前韻唁書逺自四方來獨步空階撥冷灰常慕黃虞皆有政敢言陳許不聞災病餘且曵尋詩杖忙裏還登㸃易臺殘菊經霜須愛護免從鄰圃乞春栽贈趙羽人兩地名山一羽衣兩山謂武當與茅山也十年蹤跡鶴同飛丸中日月旋遊度壇上風雷泄化機仰視三垣何朗歷傍觀五嶽亦依稀老夫久有逰仙興何處春風共采薇管大夫製雲鶴之服恤災也奉謝二首中冬特製鶴袍新來問城南失火人降服正修前古禮解衣還荷大夫仁行藏自愧名銜重辭受能忘道義真獨掩寒齊感知已縣衙回首不勝春錦袍新製自仁侯病客逢災正獨愁老鈍尚留雙石硯清寒猶問一狐裘傷心事已如雲散象德人還為鶴羞笑殺陳三空忍凍負暄真欲獻宸旒顧與成送犀帶紵履受履還帶篋笥逢災一蕩然故人帶履荷相憐欲行我已違初志在得人還看老年臺省無聲猶實地山林有夢豈通天小詩甚愧瓊瑶報又向東鄰乞簡箋宜興張天豫弔災志感西溪八月夜乘槎回首江湖幾歲華人事每逢天未定世途真嘆海無涯十年别恨還雙鬢兩世交情似一家此日風光君記取微陽初復有梅花送楊東川郎中葬風雨空山瘞玉時老親臨穴不勝悲死生大矣君臣重邱壠蕭然歲月遲君事已成從我志我銘未盡誄君辭石門冰雪肩輿險忍淚題詩慰兩兒西軒子嵗暮東還鐵岸帆開憶去年今年仍發冉涇船閒來為客真知我老去逢災不怨天嘉樹半枯猶翠葉清渠無恙自寒泉有詩已寄儒臺使還許携兒了舊編天台齊節婦百年心苦保孤難夜績空房月影寒針黹舊嘗將女史提携今乃見儒冠名家宅里何時表節婦儀刑後代看我昔觀風曾兩浙台山回首路漫漫國英秋日過我精舍淮海秋來逸興多因尋竒勝訪行窩酒憑野客浮杯勸詩聽鄰僧按節歌山日半銜雲接樹水風初起澗生波晚經苐一流泉處俯仰乾坤欲奈何如山生日避客山中豫遇之知其意不敢重違例也惟將以詩南沙避客山中日我適西來見泊船一衲逶迤傳妙句雙松寒翠倚高天儒冠道重初携杖壽酒情深但酌泉只恐清歡猶未已吟壇章什不勝編憶王山長時將渡錢塘此日君應渡浙江海天寒月照船窗久遊不作他鄉望老節寧為歉歲降越岸烟消分莽渚錢塘潦盡露濤瀧阿符未了城南課好趂春潮放曉艭答冷别駕三代遺風一慨然橫渠私計更須憐聊將松菊栽餘地漫遣山林病起年今日封疆皆禹服何時雨露不堯天使君多少甘棠意都在詩筒未盡箋辭巡按發帑之令發書有作呈邑中長二諸君子珍重霜臺念我私鬱攸悔禍歲寒時古人高誼如將見野老愁心諒亦知宋史不遺師道傳唐風猶載伐檀詩尺書逺託南郵吏再拜情深在一辭立春日郊人送小土牛至有作令尹分春到野人野人庭院本容春解開殘凍渠仍活掃盡寒灰屋乍新白日東風初起艮青天北斗又回寅鼓騰陽氣行時令四境歡聲總是真次陳御史秉衡六載巢居是此州詩中牖戶愧綢繆也知廊廟多公論敢為江湖有逺憂千里忽逢桓典馬一朝如上李膺舟吹噓幸賴東風力寸木應教重萬牛超然堂㑹飲聊述短句一笑超然上我堂向來芥蒂已全忘党園四皓非吾座洛社群英亦此觴江上共驚雲散早山中還愛水流長歲寒更有風霜在分付梅花作主張送過鉦用夏方伯韻七月潮江接渺茫送君孤棹過閩陽倚天竒石高堪仰載道清風暑不傷藩省右樞還左轄弟兄秋酌似春觴月明夜夜看南斗下有文星對逺望迎春後令君復遣伶人來侑小酌口占迎春小隊到門庭冉里橋邊草欲青舊俗新風皆在志北詞南曲總成聲大觀老去多餘景微醉年來有别亭更愛令君能俊雅歌謡行聽滿山城立春日山中與國臣弟飲泉上夜來風力苦難支曉愛晴光起海涯春在土膏初動處寒留雪凍未消時梅花偏是山中早松骨還於嶺上竒醉後一觴泉石畔漫因老弟再題詩人日七日逢人十日春無端生意政津津庭中碧地初回草市上青煙半逐塵風雨草堂他客夢雲山藜杖此時真便須乘興郊行去望裏龍峯畫裏新春日登莫氏溪山清興樓笑驚四紀再登樓畫裏青山亦白頭况我在朝還在野似渠宜夏復宜秋漏春梅柳原應蚤負郭林塘本自幽願與主人同壽域一年一話海添籌復司馬彭公書後有作公自蘭州託趙百户來問訊無書有口語録於一帖意甚惓切萬里人來不寄書簡傳口語獨相於舊堂新構風煙後逺嶺孤松雨雪時兩字平安身僅免百年衰病志終虛登山屐在難為著㸃易臺前一筍輿謁玊泉先生墓四十年來弔古心偶因勝日遂幽尋天留邱壠嗟誰掃地近厫倉幸不侵百世簪纓遺諜逺五賢俎豆古祠深玉泉兩字還須碣一束生芻有嗣音燈夕前二日觀燈屏於秦國英紫薇㕔人物殊流繪事同羊皮如紙麗青紅桃源洞口仙應幻天寶宮中女是戎宋代夢連唐代夢陶家風雜党家風小山磊磊薇㕔夜如見春星樹影中十四夜觀馮僉憲大父戒軒公手製燈屏尊壺左右鼎當中上有燈屏出祖翁政愛千缸光映月更聞雙管韻乘風一時文字飲方洽四世姻親講未窮忽報山人折梅至風雩還憶二泉東杭太僕東卿自滁陽以詩來慰次韻答之十年京國斯文誼千里滁陽一紙書老去節應惟義重世間物總是身餘還將舊篆題新樹文正公嘗題嘉樹亭三字今樹易扁不易也已作新堂換舊居彭司馬大書至堂成遂扁之更有高篇吟且諷向來愁思盡消除送黃司訓致政還廣西七年頖水賦菁莪回首蒼梧奈逺何貞節平生親力苦武階初命弟情多寄書西去愁仍積迎養東來樂已過行不可留空悵望九疑雲盡洞庭波贈郴陽何都憲子元巡撫雲南子元以太僕卿簡命巡撫雲南中朝卿大夫述其昔奉使事共為四題送之子元道錫亦以請寶遂賦以贈昆明池水絶驚波帝遣巡行意更多漢尉幾人能節制堯封何地不包羅塞逾南嶽無鴻到路比西川有鶴過從此公堂須再築向來曾擬召棠歌疆圉蕭條軫帝心職方使者奉綸音西關不杖張騫節北野真賫郭隗金秋水驊騮千里近春風苜蓿四郊深燕雲一望連秦樹䞉許山川入壯吟右述職方事朝有程書野有歌行過潁水復黃河天於斗極瞻時近風自棠陰憩處多七郡圗經隨我在百年田里謂民何尋常莫擬題名處萬仞嵩髙石可磨右述河南參政事馬卿持節甸西東騋牝長鳴起朔風冀北羣應逢伯樂魯坰才不頌僖公六師氣溢騰驤外萬國靈揚駕馭中老驥絶塵吾望在肯容毛仲並論功右述太僕少卿事追悼留鶴潘先生王子春來自天台留鶴公之子堯卿附詩致豫豫念留鶴之卒久矣悵然感之子春歸遂遺堯卿俾即公墓焚焉台海冥冥鶴不留漫從詩卷見箕裘百年星聚金陵會六郡風生岱嶽逰濠水遊魚心獨契蘇門遺草手曾收荒邱歲月休重問年少王郎已白頭秋齊為周侍御宣題炎蒸歷盡見清凉掃地焚香愛此堂苔徑斑斑經雨碧梧庭落落受霜黃西南來處占風信三五盈時看月光更有北扉堪一眺晚峯如玉正蒼蒼盜竊陳氏忠孝録稿弔其諸孫嘉猷孤忠千載賸徽音家乘而今竟陸沉片紙不遺胠篋手數行空負蓋棺心斯人自信懷無璧何地猶疑購有金四十年來方再讀為君惆悵古城陰豫十六七時嘗讀是稿於陳遜庵所文山為程達賦兩崖中有一峯懸孤鳯銜書下九天萬古文章真顯設百年風氣正回旋晉唐第宅瞻依外吳越江山指㸃前傾蓋惠泉談未了晉陵回首思悠然與徐秋官用中登松風閣先一年約登未果至是乃遂七里青山兩載心秋官為我一登臨病餘幽思泉兼石别後佳音玊更金夜雨不嫌苔徑濕春寒偏愛竹房深松風閣上君曾坐試問何如聽穎琴山中遇莫如山新春起我山中逰何處南沙亦小舟偶出總緣風日好相逢且值竹松幽故人詩在僧能誦謂中齊東川别院茶來客又留莫道匆匆難盡興稍須烟景再登樓正月二日避客山中遇雪綺塍得雪淨無塵指㸃蓉湖别有津北墅願為西道久謂時亨作我行窩也青山爭愛白頭新出城避客事非急入寺逢僧意却真梅花折來放且未東風吹手正頻頻元夕過吳永年茗坐其孫某侍而彈琴元宵處處笙歌酒此處茶杯且聽琴白髮主人應有興青天明月亦何心糗餈似鬭春盤巧燈燭渾忘夜漏深只尺桂巖成契濶誤將南市認山陰慈溪陳隱君七十其子文譽館閭江吳氏祭酒聲名海內傳百年門第故多賢要知鄉里歌椿日正值郎君折桂年月窟秋連滄海道洞庭春載越江船古稀正是期頥地不用重吟杜老篇聞孔道士訃梅鶴亭前始識君吹笙幾度坐斜曛身棲野廟兩經火夢入仙壇一駕雲石室秋風閒劔履板橋春草近祠墳尊中有酒休重寫酹向荒邱恐不聞聞母舅南湖公訃故林蕭瑟正堪悲一老而今又不遺戚里墳高空石馬仙家路僻漫雲芝音傳渭北鴻何逺魂返遼東鶴正遲五十年前吾稚子曾將論語照青藜秋海棠名姝魂返蜀天涯猶有餘姿在此花開處每依庭下石移來非自海中槎清含曉露如承雨淡對秋風更著霞檢盡圖經無族譜獨將色相借春誇秋日過水北山莊草亭長為故人開今雨無端長緑苔新刻碑從人打去舊披圖許我題來僧家磬落西峯日賈客帆回北道埃明日期君盡清興二泉亭上有茶杯水北山莊觀菊天留佳色與黃華每到秋風一拜嘉栗里地能容醉老南陽潭竟屬仙家題應有興心偏苦插豈無情鬢已華記取餘香如送客蕭蕭風徑繞籬斜知微齊席步自城西又向西風吹草徑已無泥羣分鷗鷺田田水叢露菰蒲處處堤何物老僧猶走乞幾家饑孺不號啼山齊寂寞南沙夜壺酒應須我一提寄題孫司徒壽硯堂逺向端溪水上分中書秃盡始知君尋常四友休同論千二百年何足云池入海濤還浸月島回春吹欲生雲世家爭羡文華國更許何人䇿上勳九我堂舊家門巷草堂深九我名題萬古心豈是尚書猶缺望祗應小雅有遺音乾坤自許心丹在夙夜焉知鬢雪侵最恨庭闈宛如故一回登降一沾襟與如山諸友避暑山中閒行五六七人同竹林日影松壇風客言此會舞雩下僧歌我詞盤谷中茗碗及泉元有味竹罏當暑却無功馮誰傳語知微子秋夜山房好作東登錫山退飲惠山方丈示同游諸君子獨覺登山病後難山中氣象筆曾干鏡光初動春湖緑塔影猶含夜雨寒流水暗生禪榻聽飛花輕上舞衣看興餘更問西庵路三里青松一徑寬觀水北山人新作我行窩三里青山接水雲菊花時節每尋君也知僻地真須假敢謂虛名可與聞閒處漁樵如宿約老來農圃亦徒云惟應再結吟詩社共對西神山名賦夕曛雪中答友人臘殘猶未探梅花坐愛風庭雪片斜粉米有形真入繡玉田無種亦生芽粧成山嶽添竒觀塗破藩籬見大家興比剡溪還不淺西郊吾欲駕吾車南麓為宜興徐仲和賦銅官盤據荆溪上百里相看未了青山麓平時堪别墅水涯回處更幽亭竒觀愛入仙翁洞隱跡愁干處士星我識主人因靜老謂施節推題詩遙賀草堂靈容春堂續集卷四
