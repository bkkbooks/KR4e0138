body:
  text: 容春堂前集巻十一明邵寳撰記一十八篇漢御史大夫鼂公碑隂記予既封漢御史大夫鼂公之墓而或者以公在當時以言賈禍身被顯戮非君子之所嘉予而不滿予此舉予觀漢史公始事文帝屢上書言邊事及賢良對策皆切中事機蓋謀臣之雄者迨事景帝首建削弱諸侯之議以為不如此則天子不尊宗廟不安遽以袁盎之間竟未及施以死葢公之為謀雖能料天下之變然傷於急銳而不量君志之信否其為心雖出於愛君憂國敢發天下大難之端然未聞聖賢之道而無善處之術葢為忠而過者則殺身之禍亦其有以取之歟夫忠而至於過過而至於殺身此人臣之不幸而重予之哀者也安得謂非君子之所嘉予而遂巳於斯邱之封也哉况君子之忠尤有大且純於此者則斯邱之封夫人可以興矣此又我政人之體也既以對問者遂書諸碑陰石固石梁記有義舉焉其費千金其役千夫使一人為之可乎曰有其貲而為義無不可矣然有有其貲而不能為者曰其心不好義也有其貲矣其心好義矣又有不能為者曰其識不足不知義之所在也然則千金之費千夫之役可以一人為之而常難乎其人也許州西北有鎭曰石固聚居貿易既繁且豐不啻一大縣然西通宻縣諸山山出泉流為河經其地而東春夏之交水勢衝漫不可渡秋冬亦病涉焉有議為石梁者計其費曰必千金計其役曰非千夫不可皆相顧變色莫敢先倡義官吳芳見而心動焉曰此義舉也吾一人足以為之矣乃召匠氏伐石于山採木于林鑄鐵于冶度為梁一高若干長若干闊若干凡費白金千兩日役若干夫積若干日為夫若干一不煩他人人或助之輒謝不受經始于成化丁酉之春訖工於𢎞治已酉之秋完固壯偉四方之人車而載者馬而驅者徒而負且携者皆若坦途焉知水之無害而不知梁之為利也所謂千金之費千夫之役芳一人為之不亦難哉芳有其貲而心且好義二者於芳皆不為難獨其識足以知世俗所尚浮屠老子無益之施不若斯梁之能濟人又足以知斯梁之濟也大非區區小惠比者義之所在知而必舉不疑不沮竟底于成斯其為難乎始芳為是舉適予來領郡召而奬之至是以成事告予又加奬焉民之知芳者請為記梁之興造以張芳之義舉於不朽予嘗至石固登崇岡而四望西則韓東則許北則鄭之故墟也昔者子產乘輿濟人之地依然如故而世變益逺遺風舊俗無一可問者芳也有其貲而心且好義猶若被子產之化而其識又偶有以補其所不足吾於是益嘆夫斯人之難而所謂千金之費千夫之役一人而為之者葢不足言也使其當子產之時殆必有以旌芳而處之矣予為政六年無惠於民甚愧子產顧何以處芳哉聊以是旌芳焉裴晉公祠記郾城西北五十里有鎭曰裴城唐丞相晉國公討淮西時嘗視師於此後人因以公姓命其城又以命其鎭鎭之中故有晉公祠不知其所創始蓋民之私祀祈豐禳沴往往即焉然非典也吏㒺攸司葺不葺惟民歲久且敝比寳來守許行縣道祠下慨然感之乃勸其鎭之民某稍為完修建額于門設主于堂舊者以新陋者以雅有所瞻焉又請于巡撫都御史徐公暨藩臬諸公歲役一人俾繼守勿壞且為定私祀期式主以鄉民耆老有行義者而記其事于石某按韓碑元和十二年八月丞相某至師十月丞相某入蔡然則公駐兹地僅兩月耳非有居守撫治之勤而民之敬愛一至於是豈公求民民有私於公哉誠于國故在在而感仁於人故在在而孚其車服所臨節鉞所指當有不言而喻者矣然方是時獻俘于朝立石記功卒為忌者所巾至有斵碑之舉抑不知碑可斵而其感孚於人者不可忘也不然一戾止之間而城曰裴鎭亦曰裴且祠焉至于今者亦獨何哉由此觀之則是非之在民者公於在國其在後世者公於在當時此理之固然無足恠也寳獨念公之在師與賊壘相距曽不數舍而從容暇豫若無事焉一時諸從事方且談笑為樂至形之詩咏則公素定之志夙成之謀優為之才大受之量皆於是乎見之夫惟素也故不可動惟夙也故不可撓惟優也故不可克惟大也故不可測是其克成厥功葢有不偶然者故凡有志經世之士莫不以公為望烏乎民懷其恩士服其德立於百世之上而百世之下身其地者如見其人焉寳知是祠之不朽也寳知是祠之不朽也於是乎記而復系之以迎送神辭使歌于享辭曰公將降兮兹城橫風雲兮揚靈繁歌舞兮在庭去千秋兮公如有情蠲我俎兮㫖我觥公奄去兮何鄉焱逺駕兮八荒佇城臯兮徬徨裴之城兮召之棠後千秋兮不忘省齋記王君廷貴既作齋於所居之左乃問名於嵩菴俞先生先生謂君涉世也久命之曰省君謹承之他日至京師謂寳宜為之記夫省之義大矣寳方愧此夫何言哉君居瀕太湖請以湖喻太湖者跨常蘇湖三州方數百里禹貢書之曰震澤葢水之險江南未之有加也君嘗觀其噴薄雲霧吐吞日月而舟焉出没於其間者乎方其出没也身與舟俱舟與水俱雖有懼心不知其為險也及夫在岸而觀焉則見夫舟之在水者俯如偃如突如躍如摧如仆如懸如落如而凡險之狀無不畢具於是自顧其身必謂永矢弗冒焉而或者往往又出於不知其險之地此則忽於省之之過也故夫人之所為有不類是者鮮矣可不省與雖然大川之涉夫人之所不免也理義所在豈當逆料其險而不為之中孚彖曰豚魚吉利涉大川利貞葢信而至於感豚魚信之至也而又守之以正吉與利也孰禦焉而何險之有然則君子之道固有在此而不在彼者矣君更以是省之君出望族㓜嘗被仲父萬松先生之教故行年五十而不忘求益云學古齋記人有恒言皆曰古今異宜葢古之道不能行於今猶今之道不能行於古也罍爵難以常飲籩豆難以常食弁冕難以常服書模篆籕則難於識文擬盤誥則難於喻故居今反古君子有戒焉此之謂也今有人焉能以古之道自居則人皆目之曰此君子也學古者也抑又何邪古今所異者世所同者道道之不同非道之失也人失之耳懲其所失返其所同此天地之義而吾人之彞訓也然自衆人視之則曰古之道如此哉雖口稱之貌敬之而實惡其弗巳同也一齊衆楚其將若之何於是有以古始以今終者其亦難矣雖然古之道有本有末同其本不同其末無害於古茍惟末之同而本則舍焉此羣議之所由起而古道之所以不復也故善學者得飲之正雖不罍爵未害乎古之飲也得食之正雖不籩豆未害乎古之食也得衣之正雖不弁冕不害乎古之服也得書與文之正雖不篆籕盤誥不害乎古之書與文也此善學古者也壯以是始老以是終孰其議之哉馮君忠卿以學古名齋請記于寳寳觀君之為諸生為國子為邑愽士循循然無忤於俗而處巳誨人皆無戾於道今之道由古之道也其於名齋之義可以無媿矣於是乎記涿州重建户部分司記涿有户部分司舊矣今曷為而重建之也主事陸君士𢎞圖其便焉而重建之也葢京師西南畿内數百里為都司者一為衛者十為所者二皆今所謂重鎭防秋之戌歲一集集六月而罷者又以千計軍餉民輸出納之政甚夥於是乎户部專官以分司之凡郡邑在其地者二十有四其廪禄之類皆受計焉歲更一人率以為常歴數十年上下稱便獨其居在京師而亟出亟返勢不能巳故巡歴有期弗時則怠是謂遙制稽報有籍弗親則弛是謂虚文二者相仍弊日益滋於是乎有稱不便者陸君既大剗其弊思惟久遠則莫若我居其會由兹以巡則辰發酉至可以定期會由兹以考則甲㕘乙驗可以詰蔽欺輸受于民而民便之餉給于軍而軍便之老奸宿蠧將無以容其計者惟涿北去良鄉為里七十南去保定為里二百西去易州為里百又西去紫荆視易差遠西南去唐視保定差遠去倒馬視唐又差遠所謂會者莫便於此矧其分司傍近有地可闢欲廣焉以居為力頗易於是始有重建之議乃告我太子少保尚書周公侍郎許公二公曰然君乃謂郝知州某出葦稭餘錢若干以供兹役前為門中為㕔左右為序序之西闢門再營一如前制為寢凡益地若干丈屋若干楹不費于公不歛于私不兩月而告成事使來請記寳嘗觀善為政者勤以圖功不知其勞簡以御事不知其逸要於盡職以便上下而已故當其為之不為暫輟不為遐遺怨有弗恤譽有弗嫌若恫在躬若蠱在家必竭吾心而後巳焉此古之道也陸君當積弊之后綜核經理不遺餘力而才以濟之故雖一歲之近而必慮乎百年之遠一舉而軍民兩便其於政也可謂知慕古矣是故修建常事不書兹役也政有所關故書志事變之端故書將告夫後君子俾勿壞也故書領菴記領菴者吾友長沙李君徵伯名其齋者也齋以藏脩而名以自勵焉徵伯之志也若夫領之為義則吾師涯翁先生庭訓在焉徵伯奉以周旋而猶恐其或忘乃謹屬記于寳寳嘗聞之君子之為學不難於傳而難于領領也者心有所得之謂是有機焉不可以力而强也今夫學必有所從受所從受者吾之師也師之所授者有經有傳皆古聖賢之遺聖賢者亦吾之師也吾受所授於師徒誦者謂之口學徒聽者謂之耳學徒講而且鳴焉者謂之膚學皆有所領而無得於心心之不得雖領猶無領也夫領亦豈外是數者而超然獨詣哉不外乎是而有得于心由體以措諸用無所往而不得君子之學畢矣領之義其大矣哉然曽之唯與顏之請事同一領也而所以為領者異顔以明健曽以沈潛及其成功則一也故超詣之機出於力而亦不專乎力悠悠焉則荒矻矻焉則苦泛泛焉則浮拘拘焉則固顧瞻喻倚衡運用比斵輪優游涵泳積之平生而一旦得之者葢亦存乎其人焉爾徵伯天資英邁讀書為儒上師聖賢雖從事科舉而志不為奪駸駸乎大有所造况先生之庭訓寓於名齋者又如此哉先生道德文章為世所宗葢不立門户而聖賢之學實隱然在於其躬天下後世之人皆當師之而况其子哉寳不敏既以請諸先生遂為之記葢菴無所事記者記領之說菴在其中矣無錫修縣治記無錫古望縣也嘗為州今為畿縣治居縣西偏高爽整嚴稱其為望自有縣以來徵諸志凡㡬修矣乃𢎞治丁巳進賢姜侯文魁以進士來知縣事師古循吏施于有政越明年戊午侯以政暇觀于治考敝議修曰聽事有堂既修于前人無庸予力惟堂左右有房前有儀門門之側有獄敝而宜修者三爰謀諸僚延問于師生至于民耆皆曰惟侯所為侯上其事于府于巡撫于巡按既得請於是節經發羨勸義于富量費計工擇日興事先門次房次獄拓地而廣之房加靚深門加軒宏既各就緒復因餘力濬二井於門屋而覆之以待役且訟者終事于戒石申明旌善三亭其未宜修者仍之始于巳未某月再以農輟迄今年秋乃大告成時寳有江西之命便道謁侯相與達觀之侯指戒石曰訓銘于斯及房曰吏于斯及獄曰囚于斯及門曰出入于斯斯吾修之寳曰然出入于斯者是惟民瞻其儀不可不肅也囚于斯者是惟民命其繫不可不愼也吏于斯者是惟民計其防不可不宻也訓銘于斯者是惟民明畏其顧諟不可不敬也敬民以從訓銘不忽所狎不虐所忘而飾于所由君子觀厥修可以知政矣若夫井以濟暍屋以廣蔭申明以令旌善以風政之不可廢也而皆修之政其可知哉寳以是賀侯侯遜弗居縣之人請書于碑乃作頌曰天不遠民有戒斯石維石嶷嶷維亭翼翼我侯閱之靡朝靡夕左右維史有邃其房有籍以載有牘以藏不愆不忘民之紀綱矧兹庶獄或怙或眚漢令戒瘐周刑就屏求死於生敢弗重省斯井斯屋非僑乘輿我飲我庇甘棠之餘樹聲我榜宣令我鐸我新斯亭非自我作作非自我自我振之禁以吾斷撫以吾慈政吾汝令教吾汝師朝躋于堂夕降于庭協恭于民惟史簿丞惟我斯所如新我德惟盤銘是則其則維何自新新民刻碑于門頌者邦人長興縣儒學重修記𢎞治巳未貴溪徐侯浤以進士來令長興明年庚申以學之敝請于提學按察副使趙公寛既得報乃修大成殿及㦸門及靈星門新其兩廡修明倫堂新其兩齋又新會饌堂及射圃及庫廪庖湢凡有制于學者又明年辛酉落成先是我俞先生鎧自丙辰歲蒞兹學事嘗有意焉以力未果今是役也侯與其寮協謹畢力工不踰年費不竭公勞不厲農式克就緒凡入學者瞻對聖靈退而摳趨以至藏脩游息皆有其地諸生某等嘉侯之功有以成先生之志寓書屬寳載之于碑寳嘗論三代之學備矣周衰學廢至秦而極漢唐以來學由人興文翁韓愈時則以吏陽城胡瑗時則以師皆惟其人然地以方殊時以代異故其興也不勝其廢宋慶厯間詔天下立學於是其制博且久矣而任人之意又不勝法故吏與師者因之以泛繼之以玩名興實廢在在有之今學遍天下皇祖有詔象懸籍載萬世允式百年以來所任吏師或得不得學之興廢亦惟是焉繫孔子曰為政在人學政之大也非人其可哉觀侯與先生之於長興其不誣也巳使天下之為吏為師者皆如是學何患不古若哉雖然人才風俗天下之元氣也而學也者實培植之地故今之學以孔子為師六經為業漸磨仁義陶鎔禮樂流而為化成而為噐莫不益我元氣實而崇之是之謂興文而應之或并棄之是之為廢而宫廬塗雘之類不與焉子夏曰百工居肆以成其事然則宫廬塗雘固亦不可廢也侯與先生其不負於今之學矣先生已酉鄉進士寳嘗受業焉而僣書其名竊附臨文之義為天下告爾司訓某某實佐先生故亦書之愼齋記台郡多君子吾得與之遊者數人今江西僉憲王君景昭則以同官故加稔焉因君而得聞其父封監察御史愼齋先生有欲見未能之慊今年冬君以先生壽七十與其兄若弟以書相謀謂先生素厭燕樂歌頌之事乃舉愼齋名屬某記之將寓歸獻用承志焉是亦所以為壽也寳不敏嚮往先生久請因以質之可乎某昔嘗聞學於君子曰敬敬云足矣而又曰愼何居君子之論敬有曰一者愼其一乎非一而求所以為一也有曰貞者愼其貞乎非貞而求所以為貞也有曰莊者愼其莊乎非莊而求所以為莊也夫莊也貞也一也舉其一未足以盡敬而愼也兼之懼其有不敬也而加之愼則是愼也其與夫敬也同實而異名者也故知愼則知敬矣君子之學其何以加諸雖然愼有二有愼於事者有愼於心者愼獨云者愼於心之謂也愼於心則一而不滯貞而不諒莊而不矜有不言言則天下聽之有不行行則天下信之舍此而徒愼於事抑其次焉者矣先生何居先生之父存學公昔與姚文敏公並名有傳在學者嘗登正統壬戌進士未授官而卒時先生在襁褓母夫人教之既長又稟學於舅氏累試有司時名方隆輒心厭聲病棄去不事而躬行以教夫三子者惓惓惟聖惟賢是師吾是以知先生之能愼也景昭歴官内外臺卓有風裁且極力古義日可推之天下皆先生之功也而愼之為效亦著矣先生朝夕顧諟老而不倦有衛武抑戒之遺意焉淺陋之詞雖未足發抑豈不可竊附於日誦之義也哉是為記張中丞廟記張中丞何神也唐睢陽守張公巡也公當天寳亂城守以死且曰當為厲殺賊史稱其有保障江淮之功宋南渡後民結社備兵火者在在作公祠以倡忠義祠必厲狀謂之公志錫山之祠豈亦創于其時邪說者謂宋異人盧至柔者於此得泉井而施民以療疾疫遂祠公泉上俾汲必告以鎭民譁然以泉故禱者日衆其祠視他郡特盛葢自始祠迄皇明景泰凡若干年矣而耆老有行義者議曰祠必有祀祀弗在典猶弗祀也乃以上請得春秋祭著為令若干年成化某甲子議者又曰祀有典矣而祠以厲附他廟弗經弗專乃卜其東為今廟君子曰是近於義廟成貌公于堂以人易厲衣冠惟時主書其官祝如之榜亦如之君子曰是近於禮夫民祠公有報有祈而禦灾捍患無一日不望於公初何假夫泉哉然泉之利甚博收而幕則滯勿幕則泛勢必有主者而惟公是歸則公之得於人者亦於是乎徵觀一邑而江淮之南皆可知也氓之無知誣公以厲誠誕且恠然厲乎由民弗厲由民民求公殊而公之為民佑者譬之兹泉或泥或甃而水固無不在也黜乎厲以從其初如是為義如是為禮如泉之渫則源源而來以是求公公必享之故泉不必廢也廟與貌不可不正也吾於斯舉有取焉昔狄梁公毁淫祠於南方所存者四其一伍員公之忠於員遠矣而祀由禮義其將與兹泉始終乎是為記陳氏兩阡記陳氏兩阡今致政福建左布政使晉菴公賓之所營也公祖墓在惠山𦵏凡若干世至公父母之喪以隘而卜去二里所曰錫山得吉為阡南鄉合葬如禮至公配之喪又以隘而卜去錫一里去惠三里所得吉為阡東鄉葬左而虚其右公亦將斯樂焉公之父為南靖知縣贈吏部員外郎某府君其葬在成化甲子文思彭公表之公之母封太宜人某氏其葬後府君若干年甲子文肅王公表之公之配為封宜人吳氏其葬後太宜人若干年甲子某公表之皆碑于墓其在南阡有永慰之堂有慶源之橋有福地之門其在東阡有冲和之橋有佳安之門有榮恩孝思之堂當其中也題曰夀域葢尊制詞彰寵數反求德善以識久遠之意皆於是寓焉其他規搆尚多而斯數者大矣先是永慰堂成文懿楊公為記凡南阡之制畧具而東阡未有記者公比以屬某俾并書之寳嘗觀吾邑西諸山惠為最鉅其形衍迤東出稍伏而起者為錫錫惠之支峰也其秀鍾焉故其為泉源于惠者必經于錫然後會溪入湖而歸于海其發也遠其畜也深而其匯也旋委有截觀于泉而地之脉葢可知巳公世墓于惠再卜而錫之南三卜而錫之東其世序之相承猶其地之脉也公之先以醇厚立家自府君始顯而大發于公文學政行淵博脩潔望在朝著績在銓衡惠在藩省未老而請在天下有遺用焉其世德之漸底于盛亦猶其地之脉也此豈偶然也哉公之卜地惟近之相而吉焉是從未嘗謀諸葬師以要後利而垣域從衛封樹表識儀以飾觀度以節力君子謂稱乎其德况三地相屬岡連嶺望歲時展掃不出午旦而彼此可徧親親尊祖於是為備君子又謂稱乎其序序以經之德以本之發乎仁裁乎義而成之乎禮一事而衆美畢具焉由是觀之則徵於前者將益宏於後其眞可謂不偶然也巳孔子曰墟墓之間未施哀於民而民哀葢言感也公之為阡訓在其子孫而感在邑里夫復何庸於寳之言哉獨念兩阡并書公之意將以示後有不可已者於是乎記户部舘題名記通州倉户部歲委員外郎一人主事四人或七人或九人監出納之政葢分理以共成而有紀綱焉者也其所居公舘中為團亭有事議焉有客燕焉皆於斯𢎞治間有為題名之榜揭於亭楣者始自壬子迄于巳未凡六十有八人其字與貫具在可覽也由庚申以來以榜盈故莫之嗣書今員外郎祁君某主事成君某李君某馮君某向君某謂是缺典相與徵諸故籍得人視前榜員外郎多若干人主事少若干人其㡬人凡再至總㡬十有㡬於是予以督漕至通諸君請書歲月因念昔承乏司徒屬於二榜所書舊寮居多昌黎所謂烏得無情者予實有之惟古人一登臨游燕必題其名雖寂寥數字而千載一日不惟其官惟其人耳况諸君賢勞於國更必以歲情孚誼處禮將道益非尋常簪盍之比揆以古義欲巳於書其將能乎雖然是非不敏所能與也第感諸君意勤不可無復請舉司馬公記諌院語再三誦之尚德書院祠李忠定公記慧於錫為名山山之重在泉而幽邃如聽松菴者次之菴之左有茂林脩竹觀者謂為一山之勝吾世墓邇其地舊矣𢎞治間購于僧而得焉時方考聞宋丞相李忠定公居錫之故而恨其未之祠也葢有意於斯者凡十餘年至是幸獲休退而始為堂于竹間以為公祠間嘗登而四顧左右前後無非竹者乃顔其門曰尚德書院若謂竹有君子之德凡觀物者尚之云爾然豈徒以物為哉思古之君子而不可見將誦其詩讀其書以論其世葢狂斐之志如此粤稽三代以來君子之在錫者以至德則泰伯之祠尚矣儒學如龜山諸賢亦故有祠于學凡我後進皆得拜而瞻之公自其祖由邵武來居生長宦學於斯至以梁溪自號則固諸賢之儔也况嘗廬墓兹山義起之禮顧當後舉哉此吾堂之所以作也今夫祠擬諸祭菜則事合稱諸鄉先生則名正肖諸家廟舊本則像眞寳與子弟諸生歲時率以從事庶幾一陟降間如與君子周旋交懋厥修以階聖賢之域葢不知道有隆汚而時有古今也抑亦自尚吾志而已矣公之學吾未知其所從受觀其父母葬銘皆出龜山當亦與聞程氏之道者故其建明經畫大抵篤君臣尚氣節逹經權審進退以身任重而不自失焉其忠義激烈千載而下猶能使人興起史稱公有諸葛武侯之心而考亭朱子序其奏議至以天生弭亂許之即是而觀謂公古之君子其不然哉昔朱子以匡廬卧龍菴之名取諸潭石遂縁其義為畫武侯于堂君子謂其有異世之感若公於此精爽伊邇風聲所及學者有師揆之匡廬葢為感雖同而事則切矣乃若以竹興思寳不敏於龍菴之說竊自附焉天下之君子當有能知吾過者是舉也吾甥華珉實任其勞始於正德庚午七夕成於中秋奉安於重九皆不愆其素奠畢小燕客賦淇澳而退雲田記雲田者雲南提學按察副使彭公性仁讀書處也𢎞治間公由武選副郎出守汝州予時承許州乏間因胥會得聞所謂雲田者葢公世第清江上又十里為别業背連羣峰下面江流而中為平野凡若干畝山水之氣日夕生焉動盪滿盈恍有景象可望可即此其所由名也客有賦者曰東原有田中維雲雲濛濛兮田畇畇或卜其上兮讀且耘一經治兮五榖分江清清兮懷夫君有和以興者曰雲之興矣于我塍矣我息我游樂且令矣雲之收矣于我疇矣我游我息樂且休矣疇兮塍兮雲泱泱兮君子于田樂未央兮又有以比和者曰田兮澤澤以稼以穡雲兮駸駸以雨以霖人有道兮天無心儗物類兮徵德音田漠漠兮雲深深予聞而感之亦欲和焉然無以加也葢心藏者二十年矣乃者再擢至今官致其事而歸適予以貴州節過公郡公遂請記因書為復公博雅能文而詩逼唐法其居官屢有績效無愧于比者之言今其歸也更尋於賦且興者將不知老之將至也是為記仕學齋記仕而優則學古之道也今之仕而優者亦孰不以學為事哉學焉而不如古則亦徒學而巳古之學者為已此學之道也昔有寒而求衣者二人同適於市一人取布帛焉曰此足以温吾體矣其一人陋其朴也則取錦繡而製之他日風雨繼以氷雪錦繡者凍布帛者適不知為巳之病也蓋凡為學者皆當戒之而况仕者乎漳浦林魁廷元以進士厯官户部郎中簿書之餘不廢誦讀人謂仕而知學廷元遂以名齋而請予言為朂予嘉其志作記且銘曰必有事焉惟仕之謂思不出位我躬之微實叅三材何理不該游心千里寓言一室萬物職職此有敏者鬭靡誇多如身心何敬哉義哉是之謂學先民有作曹州新作教塲記曹州教塲在城西二里原野之間有阜突成名鳯皇嘴者其故形也環闢其周為畝三百容若干人凡閱陳士卒於斯進退於斯分合於斯因阜而高之堂其上曰全勝翼以兩序帥者臨焉而出號令於斯前于堂為階階前若干步凡稟進止受賞罰於斯降阜而南三百步門焉曰演武阜之東若干步為臺樹旗於斯盡疆而垣焉夾垣内外樹柳焉周完嚴整而塲之為制於是乎備葢正德壬申春三月實始基之越某月落成經畫而圖功者今山東按察使無錫吳公也先是辛未春霸州盜起縱橫四出攻刼城邑勢日猖獗廷議以曹古劇鎭其在今日齒牙北畿喉襟南服而肘腋河南山東之境實惟中原重地宜得文武才畧之臣以憲節往鎭之會公以監察御史再起在臺天官卿曰是惟其人乃請命為按察副使奉璽書整飭兵備作鎭于曹直𨽻暨河南諸郡邑在數百里内者皆受約束公至曹首簡士卒而躬閱焉既崇其墉既深其池倡厥勇敢為禦守計甚備顧舊有教塲在城東以習民壯而狹隘弗稱乃于是焉卜之曠然可馳隆然可望畫然而不可犯葢一舉目而有折衝千里之勢縱橫竒正參伍實虚棊布筭列如在指掌公臨其堂諭厥吏士從容指揮以伺警報而地之為用亦大矣厥既落成知州某以公命用書及圖來請記今天下承平久矣武衛惟籍民兵惟名彼盜悍猾敢蔑我師實是之故公之蒞斯凡閱數月賊不敢邇且屢遺我禽焉蓋公有不可勝者乃不自恃而閱習日勤其慮逺矣推公之意必使凡士卒者惟吾法是懼而不知敵寧賊同死而無同生然後為能師也嗚乎其可謂敏且共矣雖然會而習之存乎地簡而閱之存乎法鼓而作之存乎氣率而示之存乎義勸而休之存乎賞戒而警之存乎罰帥而從之存乎人人重則舉人輕則廢葢凡事皆然而况教民戰乎予比督運北河及兹省母南還道出濟上凡公舉措予審聞之於是賊三至公命騎士邀擊斬若干人俘若干人馘若干人有籍紀焉惟人之重允與地稱故能有兹成功知州某奉公命唯謹於是舉有勞焉是為記東湖書院記東湖書院者廣東按察僉事梧州吳公廷舉之所建也院在州東門外南臨潯灕二江北負大雲山山之下公三代先塋在焉有水出山半左右夾流至院之前匯而為池池方四畝曰小東湖者公名之也公之先為湖廣嘉魚人嘉魚有東湖既取以名又以扁夫院者葢示不忘其先也抑有尚友之道焉昔宋周元公茂叔嘗濯纓江州廬山蓮花峯下樂其水之清也遂寓以濂溪之號濂溪出道州去江州㡬千餘里蓮峯之水非濂溪之水也然自道眼觀之則孔子之所謂逝者如斯孟子之所謂有本者如是者固未嘗異也故觀道有術莫切於水得於水而不泥於水此有道者之大觀也吾於元公見之大雲之於東湖其亦類是矣夫公之學道從可知巳然遠而望其故鄉則得水木之義近而邇其先塋則廣風木之思傍以招引後學而退將自養焉一舉數得是皆道中之事也矧院之為勝負山嚮水草木魚鳥之觀日陳于前登堂矌如入室奥如經書圖史取諸左右無不應手而摳趨其間皆鄉里秀敏之士士之不遠千里束負而至者又時有之以是尚友古人夫豈僣且誇哉公博學好古有猷有為由邑而郡夙著名績予葢聞之久矣頃者以貳守北上道出江右始因吾寅萬公世和得傾葢焉比任雲間遂命伻來請記時𢎞治甲子也越六年正德已巳乃克執筆葢院之詳公自有記予特論公之志以告學者云湖廣提學分司題名記我皇明建學於國初為制最廣且備其設官奉勑以專提調自正統戊午始在諸省官列按察初無别署既乃有分司之建湖廣之為分司自成化巳亥始當是時山陰薛公綱以副使來任實割府學廟東地為門為中門各三間為堂五間為序左右三間為寢如堂而籍藏記室附焉後若干年𢎞治乙丑今僉事廬陵陳君文鳴乃闢寢後地五尺疏以受明東于寢為亭以備游詠又因中門為貳以節升降以辯出入自正德戊辰始於是公歴考前政氏名自劉公虬而下得十有三人疏其歴履刻于石且虚左以伺將來而分司之制於是乎成則已已始始君以進士高第入翰林為庶吉士讀中秘書既廼官刑部累員外郎被簡為今官士論稱允至則風厲施為惟明詔是訓惟正學是崇正道是迪而前乎是者之所樹立近著顯效遠流餘風君以是學是道律之則固若尺度權衡然有不可掩者夫何待於指其名而議焉也哉雖然師擇三人尚友千古古之人用之君亦用之君子謂君於是乎博夫正道隱而道其所道正學絶而學其所學由衰周至宋枝分派别不啻數百家要皆實徵於名其從與否存乎其人典學者不於是立辯焉則何以崇以迪以奉詔㫖然非明諸心體諸身稽古以驗諸今雖欲辯之而其惑滋甚是故學不易崇道不易迪非正之難知似正而非者之難辯也是故得是者賢勉是者次之凡師弟子者之趨嚮往往係焉而其究也將被諸海内歴數十世而未巳然則提學者之賢否其於天下國家也大矣若謂直回忠詐指議於前而勸懲於後則固事理之必然而君之意豈止是哉寳昔嘗承乏江右葢誠有媿於斯者兹至湖南而君辱以記屬既書其事復以鄙見為君誦之觀名者請以是先焉容春堂前集巻十一
