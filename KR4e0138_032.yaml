body:
  text: 容春堂後集卷十一明邵寶撰七言絶句六十五首題余立夫扇次企齊乞得塵途未老閒却因多病負看山春來擬作吟詩社一月同君十往還次見素翁送子七首雪餘詩到病夫驚素老丰姿紙上盈笑折梅花伴孤詠海風吹月不勝清愛才成癖謂公偏吐握曾聞古下賢嗟我懷人無所報一罌將汲惠山泉勸駕南來雪滿山到吳先慰病中閒而翁愛我時飛劄更有清言在夢間庭訓看來字字真老於吟詠轉精神滄洲吾道平生語不道蒼生望在身策名方際風雲㑹問道須從水陸宜山下出泉庭訓在百回千折定東之久矣聞君一見之雪消東渚晚舟移百年家學重敷對臣子孤忠天地知用世無能且病身却勞長者寄書頻慈闈春酒堪時獻歲有山田亦未貧莆陽林志道發解北上道出梁溪訪子草堂出視尊甫教言某辱公愛久而志道尤敦雅誼不敢默也病餘久謝筆硯殊不成章良用自愧耳除夕知微餽泉先是有懷因附之兩罌泉水一童來向日茅堂午正開謾謂清風無可報雪中詩為寄僧裁睡起偶書二首虛堂午熱睡不得聼客髙吟公甫詩詩當好處却恐睡正是隔簾風動時人言心靜不愁熱凉風不來凉意來從今夜夜有月色更愛草堂南向開春日奉次涯翁老師二首獨坐心情病後長已教童子任耕桑采新時為髙堂獻西自山鄉東水鄉一枕羲皇午夢長有詩不敢和柴桑燕山青繞今京洛却指程門望帝鄉為華文逺題畫次顧東江松枝落落骨欒欒風動寒泉更好看湖上幽居故相近他年曽此賦斯干即席題扇韋軒飲子松風閣同向山中試茗來松風髙閣倚崔嵬興酣别院尋僧去却愛幽花滿路開撲蝶圖宋裕陵筆花雨初晴日正東游蟲各自領春風狂童不識莊生意漫把閒情逐夢中贈錢校書夫椒山前孤草亭水風吹月秋冥冥客來鶴去主人返七十二峰湖上青題竹送李司訓送客將歸歌復歌諸生攀挽欲如何竹枝把作松枝贈歲晚相看思更多李君秩滿將行諸生請詩者踵至豫謂可以觀師道皆有以與之周生以畫竹來復賦一絶蓋江南詞也豫嘗聞餘干舟子亦善吳歌試以授之如何燈市追和錢希翁獨向三橋靜處行松棚落落帶春星城中月是山中月一有燈光分外清為葛元兆題扇青藜為杖葛為巾采采山中百草春歌罷紫芝還自和九峰殘日未逄人吳心逺惠新茗重以盆蕙走筆謝之題書正為山翁問忽報山翁使者來坐有香風起何處山中花在盎中開戲答許東廬二首春晚天涯有所思詩來剛值落花時青青竹笋真如玉珍重還教棘護籬主人心逺客來稀剝啄聲知是也非問訊何如還道甫數行書與一童歸夏夜足成春日之句春風門巷冉涇西興到新詩漫自題鵬翼順風滄海夢桃花流水碧山栖棕蒲二首棕櫚根老久應捐漫託昌陽為引年露下髙天秋澗冷山中人作水中仙棕本栽蒲故有之水邊石畔鬬新竒相逢若問通仙否直待形容變盡時再韻二首老朽判為世所捐定交今喜得青年清泉白石非君事行作蓬萊頂上仙蓬萊路逺未能之水上枯槎也自竒劒珮森森人似玉群仙初謁太清時次南沙謝菜敢誇異種出雲南老圃新畦也自堪擊節有誰知此味介君能辣白能甘贈周含山五年佐邑平如水更有餘功及我泉何地含山君莫問兩般疆宇一般天奉次涯翁先生寫真二首萬古勳名百歲身古人風采在今人丹青縱有如神筆難寫胸中一㸃春後天不老是公身今作人間野服人若問向來黃閣地東䦨芍藥有餘春題景婁翁壽藏追次張東海韻乾坤隨處是行窩漫聽人間哭且歌莫問向來登嘯地太湖秋晚水增波奉次涯翁先生漫興二首新為鄰人短築牆竹邊小徑舊升堂病餘謝客渾無事童子猶嫌洗硯忙水調山中不用符老僧仍挾古茶罏晚來送客前涇去問道前涇月有無戴文進春山疊翠圗戴翁筆底有春山萬疊風烟尺素間好似西湖新雨後兩峰回首六橋灣王友石枯木竹石何處蕭蕭玊數竿樹邊石畔晚風寒王郎標致元如此每向人家畫裏看鄒就閒見訪三十年前見此翁青春標格舊家風而今白髮垂雙鬢秋水依然是碧瞳米老拜石圗眼底巉巖萬古珍乾坤回首幾風塵公來一拜還袍笏不道天涯有美人王友石渭川烟雨圗為施克文題此老胸中有渭川筆端能雨復能烟休論畫法如書法曾向松庵讀史遷施克咨友石竹枝扇靣石庵畫竹人爭賞尺素流傳知幾家偶見平山亭子上長吟落盡晚春花謝張提學惠薏苡仁柬云涯翁作粥服之有辟濕之驗辟濕初聞薏苡仁涯翁詩裏見來真東風吹送臺端貺活火山泉共作春贈鄒光懋五月蠡溪新水生菰蒲出水與堤平望亭南望太湖白溪上詩人無限情謝張巡撫惠廪米廩人珠玉辱多分南浦猶懷共水雲作粥便將和薏苡涯翁詩自學臺聞春初張提學寄薏苡仁兼致涯翁老師絶句詩言和米作粥已濕有效故及之為鄒文謨題畫贈劉古田黃鶴樓前江漢流十年鄉夢在中洲而今木鐸翻琴操又向閩南望楚州詠史麻衣力盡泣孤臣回首江南草色新獨恨乾坤如許大首陽無地可埋身春庭八絶句三年種松五尺彊松枝盤桓松葉長歲寒節操久應見春日開花清更香偶栽梅樹是紅花每嵗花開對客誇知己相看心自白儘將顔色付詩家菖蒲本是仙靈物却為冰霜穴底藏過盡東風更梅雨水中央看婉清揚西園移來兩叢竹千古湘臯宛舊斑莫道吳天非楚地主人眼底有江山新梧樹傍舊桐栽俱自青山寺裏來幾見霜黃春又緑有詩空和鳯凰臺買裁金橘短婆娑向來洞庭風雨多分付蒼頭好澆灌莫教人力負天和燕居亭前石子臺兩株銀杏一時栽莫言未得絃歌地畫裏尼山許見來九畹新成古井田滋蘭又似賦騷年不如無界還無數雨露茫然太古天題畫送胡仁夫二首酌泉飲君君莫疑此泉德本與君宜煩君持向開河去宋老祠前奠一巵東山寺裏相逢地陸子泉頭再㑹年震澤烟波彭蠡月乾坤回首一茫然望雲菴為林提學題用素翁韻二首白石山前雲氣深有時飛起有時沈太行頂上南回首千里慈闈隔歲心黃河東繞太行深雲薄西峰日未沈萬里乾坤同一慨北南行止兩無心雨中柬文玉二首雨中閉閣自焚香門外詩來故故忙夢裏風騷猶逺在却教白日破羲皇梅天散帙動藝香誰信閒人盡日忙不見青藜照清夜欲將遺事問東皇寄許東廬衝雨衝風一事無東陂南蕩水連湖興如王戴非因雪他日休煩作畫圗題石庵畫竹蕭蕭數葉不勝看到此方知畫竹難誰信中書曾放筆片時行盡楚江干涯翁有題柯丹邱畫竹詩曰休將畫竹論難易剛道繁難簡更難君看蕭蕭祗數葉滿堂風雨不勝寒石庵此幅足以當此不知丹邱所作於此何如也為俞立夫題秦務本小畫詩興逢秋日漸深相知獨寄畫中琴青山影照斜橋水時往時來共賞音聽松偶成丁丑十月草八日秋深水國候來鴻一夜悲凉見朔風行遍冉涇無語者聽松閣上哭涯翁某以翁小像懸松風閣旬月一謁之成汝從惠鱸魚口占答之溪邊漁艇日相尋誰遣鱸魚動我吟我膾我羮人莫易當年張翰亦勞心容春堂後集卷十一
