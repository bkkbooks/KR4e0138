body:
  text: 容春堂别集卷九明卲寶撰雜著祭文五志一贊十五銘四跋三叙一祭松崖戴先生文維年月日門生浙江按察使卲某謹以牲醴庶羞之奠敢昭告于故資德大夫都察院左都御史贈太子太保諡恭簡松崖先生戴公之靈惟公清慎之德醇懿之學兩奉璽書人焉是作始于南畿終于西關文化旁行學者斗山公持權衡惟明克定謂公秉鈞是即公政公臬于浙公藩于閩風霜為威雨露為仁周旋司冦遂中執法公功不矜公謀不伐公在臺省風采峻凝每假色詞于我諸生十載京師春風賔館惟正惟忠誨言諄欵公以身請詔以國留天不憖遺公疾罔瘳惟公之沒天下所悼矧我諸生有德于教公喪北來丹旌悠悠嗟我懷公江水東流烏乎哀哉尚饗九江謁濓溪先生文維年月日具官某謹以牲醴之奠敬祭于濂溪先生周公某昔承乏江西嘗以公祠墓在兹疏聞于朝乞春秋享祀比得俞㫖儀祝牲帛一如所請而某轉官赴浙未獲躬告兹由湖南東往淮鎮祗謁祠下敢用特羊竊附古人釋菜之義惟公鑒之祭方伯婁先生文惟公昔以正學教我南畿規圓矩方學者有師德化所被既去益思凡我諸生愛莫起之公名御史公賢伯長嘉績在人諸生是仰寶也始進實舉自公暨乎再見禮遇益隆月朔之訓同人之義因事有言引掖斯至今也承乏視學于公之鄉瞻拜公墓跽奠一觴追感疇昔有涕霑裳尚饗祭李容之文維年月日謹以酒脯之奠致祭于李四丈容之之靈曰烏乎李丈吾師之季曰宦曰學綽有餘地顧乃壯而喪明强而長逝胡氣數之弗齊豈造物之為戲伯維元老為吾儒宗靡逺弗嚮靡衆弗從季也有幸庭几從容曷其奈何而領教弗終烏乎哀哉葬也比時殮也具物母兄憑棺公卿執紼英靈有知亦何恨乎飄忽而某等猶為之悵恍者蓋真念夫斯文之肉骨也尚饗郟州謁二蘇墓文維年月日許州知州邵某自汝州東出眉山兩蘇先生墓下具隻雞斗酒再拜以奠之曰烏乎公之父子繼美如歆向而才則盛之公之兄弟聨芳如紀諶而文則華某嘗怪古今天地之間氣夫何獨萃於公之一家也公之精英寓諸制作固百世而長留然其不可傳者將終藏於斯邱邪抑並二曜以齊光窮六合而上游邪某也不肖竊喜讀公之文每恨生不同世無以一登乎龍門眼中突然乃公之墳安得不慨然興感而放言以發吾所聞乎霍山廟復碑志上之新即阼也今少司徒太原喬公以太常少卿奉命祭告山川之在晉者比至北鎮霍山既成禮達觀諸碑有一仆地舉而讀之則公之祖少司空先生景泰初有事於茲而立焉者也于今五十六年矣公摩挲感嘆欲為復立之圖而今大司空才公暨憲副來君方以藩臬守巡陪位遂礱石以請公乃以舊文用古篆體書而刻焉越四年公以模本示寶寶觀而嘆曰美哉喬氏世德如此可以仰觀我國家之盛矣粵自唐虞元凱以來于商則有若伊陟踵休于周則有若吕伋趾美悉著書史蓋世之貴乎天下也久矣故觀國者率徴諸此若公於祖位望相承而後先五紀使命適同且於紀載之蹟似有繼述之道以數則不可謂偶矣以事則不可謂常矣它日志祠祀者録而傳之君子必將以是擬諸商周觀一家而天下可知也烏乎是可不謂之盛哉司空先生歷事三朝功業在人至于今猶稱之而公學行政蹟表表朝著方在登用其所以光厥祖而為朝廷重者豈止是而已哉寶辱公厚聞是事而喜為天下道也雖不敏敢敬志之陳晉庵像贊此大方伯晉庵陳公之風儀也冕而立朝其在考功時邪翼乎若趨儼乎若思進退人才我酌其宜君相行之蓋上以為國下以為民而中不為吾私惟德有望惟才有譽起百辟之瞻結九重之知其在斯歟其在斯歟南塘處士贊吾嘗聞南塘處士乃今得瞻其遺容而起豫之敬也蓋其生也外不違和中無失正尋常收月旦之評七十享春秋之慶其沒也有祠棲神有碑述行分室而絃誦聲聞奕世而衣冠輝映由前而論可以占嗣續之繁由後而觀可以徴行業之盛烏乎休哉薛仲文小像贊有客兮古冠竚空山兮盤桓撫孤鶴兮發長嘯聽泉流兮潺湲有書卷兮不展有琴囊兮不彈松天風兮生高寒我為君兮賦考槃景婁錢翁像贊翁吾尊姑之夫也翁卒之七年某還自京師其孫諫諷以遺像見示敬述贊言吉人辭寡知德者希周旋田里帛冠布衣誰歟招者王孫不歸壯志高逸晚節謙柔碧山將栖乃復景婁誰歟招者羽客丹邱墓我為銘像我為贊我懷先生陋彼鄉訕玊澗錢君贊猗與若人行謂之士分謂之民書謂壽耇詩謂嘉賔或逺觀其世譜又謂故國之王孫即讓里而藝黍指鴻山而采薪考槃所謂洋洋之泌其在今玊澗之濵乎猗與若人我思古人孫真人畫贊以聖童始以山人終非聖不見妙與天通儒取其言醫師其意藐彼於菟聊爾為戲龔守誠湖石贊突如來如端共而抗此何為者月星之精江湖之望洞庭君之丈人行也莫冰泉行樂像贊冬官莫君以此畫示豫豫謂其人丰神瀟灑有似於君也為作贊語而歸之風來松間我行徐徐丈尋千里沛乎廓如深藴謀猷早謝書簿人亦有言能詩水部葛芝巖小像贊讀書窮理能自得師醫盡物情如其吟詩詩以名家醫以傳世采芝于巖優游卒嵗興至高歌謂葛天氏古有逸民子真是邪東川莫君像贊推其志也八極可以橫邁充其才也一面可以獨當英華所萃發為文章風儀偉然稱其冠裳何既强而后仕乃僅止於為郎惟其在車駕也有疏以解都民之困在都水也有法以制漕卒之强君子稱之久而愈光此所謂亡而不亡者邪且閒鄒君像贊道鄉之裔讓鄉之居風神秀爽骨相修臞蚤持守乎清白晚被服乎紫未汲泉瀹茗尋鴻漸之故跡披雲招鳳吊伯鸞之遺墟稱之仙歟既歉焉而未足使之仕也或沛乎而有餘君子謂其自號且閒蓋實録而非迂也史敏甫贊力學不倦斐然其儀師非好為求則應之古貌古心古有東野謂昌其詩允哉知者錢梅林像贊蚤聞庭下之詩晚悟牀頭之易箕裘其心韋布其跡雖未參九老之班乃實與三賔之席植梅成林笑歌日夕斯人也殆書所謂而康而色曰豫攸好德惟皇之極者邪張玉亭像贊賔于鄉也以德不以年隱于市也以心不以地義嘗著于一官醫獨妙于一世畫圖極山水之觀杖屨帶烟霞之氣有竹在庭作我真契謂公落落于人豈無意邪楊府君像贊家之肖子國之逸民時服則服時巾則巾孝之舉也或疑乎漢質之尚也似生於殷才堪百里之邑惠止一鄉之人吾論其德以附於斯神君子觀之將無得其真邪書王友石所書金剛經後經乃先高伯祖伯完裝成今嵗久脫落為重裝而歸諸僧云蓋聞唐室諸蘭亭惟僧藏者最妙蘇家四菩薩以父愛也尤珍慨人逝而物存諒天同而人比古今共賞巨細同歸片紙千金既重中書之心畫百年一日兼勤先世之手裝敝則必修愛而莫助製我髹笥護彼緗函尚冀事附傳燈永作兹山之鎮義緣掛劒聊資他日之談謹跋陳舞陽銘清苑陳君通判吾常出示司成王公懋學所為舞陽異績序豫讀而感焉為之作銘銘曰令修泮宫鏹出土中廟堂孔嚴不以厲農惟令之功樓垂有瓜庭巢有鳩麥祥榖瑞于夏于秋民歌我侯侯有仁心及于獸禽二牛觳觫侯車實臨將死而生侯有德音牛邪鳩邪瓜榖麥邪有知無知誠之格邪昔也舞陽今也毗陵君子是徴我為作銘坐椅銘江西諸分司所用椅多高聳不便久坐豫每校文輒携此以行是雖細故於身心蓋有助焉友人周仲章謂其功不可忘豫乃志之以銘銘曰我行西江惟汝之以既康且舒夫焉有倚我展我體天寬地容允哉繩墨惟汝之功經鋤室銘錢諌昌言扁其别業之室曰經鋤蓋取漢人故事以勵其志也冉涇邵某為之銘銘曰漢兒寬氏帶經而鋤雖一事微百世弗磨農夫有田猶儒有經非心弗治非種弗生有經無心有種無田勿忘而忘荒哉落焉田與種涵經與心㑹古之學者以斯而貴寬也雖賢恐或未聞夷考其成飾吏以文君家世儒亦世服農先難後獲異事同功既顔于堂復銘于室乃亦有秋道不謀食書篋銘萬化散殊中含有常靜觀者程妙契者張我思曽氏唯于孔堂今曷求之孟子曰必有事焉心勿忘也跋白沙先生草書卷白沙之為書有定力而妙者也吾見此卷於京師幾三十年矣今為莫利卿所藏復一見之無改評焉乃或手執束茅輒號於人曰吾書白沙云云豈知白沙之為書者哉論學於白沙者亦當以是求之跋周雲漢所述姓源便覽百家姓童蒙始習之書也孰不能誦且書之而東泉君必為之正其音校其字疏其源者何居以言乎事則近以言乎用則切以言乎人道則大矣梓而傳之不亦可乎叙女夢吉生死女夢吉生壬寅五月十有三日先一夕豫宿文溪書舍夢入大殿有巨人迎授之物曰此貝也既寤而內媪以女生告遂名之生四月即能翻書指字呀呀然言人莫能解也是冬豫在南雍一夕不寐達旦起坐泣不止未幾家人至曰吉病疹以正月四日死計之適合不寐之夕嗚呼女吉生先之以夢宜其能育而遽死死而逺動豫心胡然者邪明年甲辰豫獨處京師追思之甚悲乃叙其生死容春堂别集卷九
