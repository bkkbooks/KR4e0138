body:
  text: 容春堂續集卷十五明邵寶撰墓志銘一十九首墓志銘江西按察司僉事萬君墓志銘江西按察僉事萬君世和致仕歸藤之十有三年年六十九正德丙子十二月二十三日疾病卒既殯之數日其壻喻行人漢以公便歸治墓縣南之南山越明年丁丑某月某日乃葬前室蘇孺人遷而祔焉禮也又明年己卯漢北上以狀來請銘豫在江西與君為僚友漢甥於君有子道焉君嘗命從豫受業漢之請蓋君之志也君之歸於是豫方視學白鹿洞餞故弗及蓋至于今以為闕如也而復忍不銘君哉君諱祥姓萬氏世和字也自號致齊其先江西新喻人勝國時有仕廣西全州者去官家藤遂為藤人曾祖宗銘不仕祖伯齡舉茂才官南城典史坐纍適役上林苑當適時其少室李方娠歸其家邵武生君父贈監察御史子信後南城與李繼卒各殯其地子信圖歸之不克比卒以屬其子子五人出三室君再繼陳出其季也年二十領成化戊子鄉貢會試屢屈間關北南求二殯所在辛丑歸南城之柩甲辰歸李之柩皆易棺以葬如父之志時人賢之謂之孝孫丁未擢進士第授南京陜西道監察御史論事無所避三年考績得贈封典母陳太孺人就養而卒君歸其喪以葬終喪除浙江道益著氣略君博學急當世於嶺南事尤悉嘗畫一陳奏都御史鄧公廷瓉鎮兩廣上君可領戎節不報尋以勑清理江南屯田力求其弊去之已未詔兩京部院舉方嶽才君在薦中而江西命下矣江西號多訟而屯田事尤賾君先弊後規罷行惟時譽言日聞時亦起忌最後以巡撫檄治盜于瑞力辨非辜同事蓄憾有間於巡按者署考無稱語會乙丑覲畢又以他怨致謗劾于言官遂有致仕之命先數月撫巡議薦君南贑兵備副使至是胥嘆而止去之日至粥什器為道費歸無田宅再易寓而后至藤備極艱困今內閣大學士蔣公某君同年進士也嘗貽之詩述君志操知者謂之實録上登極詔進階朝列大夫居數年改葬前母及兄以下六人娶諸子婦一人諸孫婦二人皆勉力為之其歸外舅唐貢士之喪在居官時事尤著詳見豫所為志君再娶初娶即蘇孺人後娶唐孺人皆無子蘇有女一人妻化州同知富川何鯤唐女二人一妻漢一妻工部侍郎全州陳仲廉子庠生邦佑漢以省解第一擢甲戌進士庶幾知恩義不負君者銘曰維南有人髯而長身如河朔間叶出入兩臺抗論不回譽成謗來才臣憲憲少也孝孫其歸斯原鄒君孚伯墓志銘泰伯鄒氏有碩望之士曰林泉翁顯之有丈夫子五人各有所肖其仲孚伯則得其風度焉孚伯少有智略甫弱冠以父命治田千餘畝傭者百餘人孚伯髙笠短褐日行田間手漆如意指揮作止加之號令翕然響應人見其儀貌端偉而意氣傾動謂即授之數千夫當無不就矩或士服入郡邑見諸縉紳先生亦皆起敬陳方伯晉菴曰林泉老矣吾見此子猶見林泉也王文肅陸宫詹二公皆曰夫夫而不仕誰當仕者指之仕途不對而退事事如故既而掌鄉賦里甲數千人聽命於孚伯如其治田藍田榮公實為邑大夫以威嚴繩下見孚伯獨謂之敏嗣是諸大夫皆然泰和曾實夫守郡時以儀門之圮謀於孚伯孚伯一言承之一錢一夫不煩公私三月而畢蓋孚伯布衣以幹濟獲上事多類此林泉翁老有不入公府之稱皆其力也比卒殮葬稱治致客逾千人先廬火孚伯懼傷母心别構東崦與故居夾溪而峙加巨麗焉母心乃適於是以例授七品服出入輿從鄉人觀之居然仕者矣論者謂孚伯家政如官而孝弟信義日修不怠是亦從仕也已田租嵗多貸人外有負者亦不甚較坐是業稍退孚伯怡然不以為意惟延師授二子經儀物雖共腆而有事勿助得優柔之意暇則手一編不置非左氏史漢則輿地志以是備知天下形勝及古今人物之略嘗以秦漢間事叩其子子對則問難繼之不對則為之盡間與客語亦不為窘人自宜興來談搏虎者先致其怒伺其馳而憊也乃追而斃之孚伯曰此曹劌所為三鼓氣竭者乎其弟和仲聞之謂孚伯讀書能得其意孚伯美髭髯忽而斑白如六七十者其尚義而濟人稱長者於是乎稱正德庚辰孚伯年五十三以訟入城為攝者匍匐乘舟晚歸得中風疾抵家而卒閠八月朔也孚伯諱觀别號顒齊孚伯其字於宋忠公浩為十幾世孫前母錢氏母惠氏娶鵝湖華氏子男二人長承府學生次式庶出女一人嫁義官吳縣徐謐孫男一人女二人豫始聞孚伯及其昆弟於其母舅錢靖伯先生繼而周仲章施克和道孚伯尤悉和仲晚從豫游習古文辭承治春秋亦以其疑往往來質孚伯之卒也承問復讐義豫謂既告之有司則復道盡矣其在人者於汝何有未幾承以和仲狀來請銘墓新卜於某地葬以某月某日銘曰有士有士其冠峩其才則多壯而思強而皤五十而死命也奈何明故山西布政司右參政華君暨配錢恭人合葬銘正德己卯六月某日山西布政司右參政華君以疾卒於官瘁也越一月其季子鏐奔走數千里奉其喪歸以十一月某日至殯于堂越明年庚辰十月二十八日其配錢恭人亦以疾卒毁也又明年辛巳某月某日其子鎣等奉二柩合葬于秦塘涇之新阡而請銘于君昔同鼓篋之友冉涇邵某某乃按其姻友都運張先生狀叙而銘之其叙曰君諱津字濟之别號謇齊姓華氏世為無錫人其先在齊有孝子寶在宋有榮者以仕徙居于汴至原泉避亂復來居隆亭族始蕃衍又五世至友直元常州路總管總管子㻑嘗以處士舉於集賢院號曰清逸其子希顔以文行為鄉望所著有東湖集君五世祖也傳汝立諒至君祖俊字景榮出贅􅖘山錢氏因家秦塘涇之上辭分業而自立遂成厥家有子三人其長為君之父瑄字伯和配蔡氏生君兄弟五人君行居三敏而知學弱冠遊邑庠二十六領成化癸卯鄉薦越三年丁未登進士第授湖廣松滋縣知縣操勵自躬庶致斬斬時有奸人挾王府勢強取於民君執而法之江溢壞民廬君為之防民賴以安滿三年撫按旌異政遂以風憲召聞母疾取道歸省比至升刑部主事以松滋之旌封伯和文林郎松滋縣知縣母蔡為孺人君在刑部遇疑獄反覆參鞠盡求生之道决囚淮揚諸郡平反為多屬有疾請告歸遭文林公喪㷀㷀在次不越戶限起復改戶部主事出納惟謹嘗監通州倉有怙中監勢請事者君拒之固中監銜之尚書顧公虞其中傷君也亟調監七馬房倉其嚴猶通州三年署員外郎奉勑勘田湖廣常德時宄瑾扇虐既行而有後命遣人追與之牒至則君由水道還矣其人既還報而君始至衆為君危之瑾見於左順門顧而謂曰華先生汝來何遲也盍亟往事事乎竟無他言未幾署郎中二年升湖廣辰州知府遭蔡孺人喪起復補直𨽻廣平府時當兵荒君畢精經畫凡無益之費不急之務悉罷之又請蠲常賦外民不能共者數事惟學校所須不以乏省太僕丞有欲收養馬民免地稅錢十之五者君曰民纍於馬甚矣以若所免猶不紓困如征其半民何以堪遂以其事白巡撫都御史轉聞于朝悉復其故屬邑邯鄲城每山水秋至輒為之壞民病修築君曰山水挾西河橫流舍河而他圖雖勞無庸乃改河上流北注之漳水勢既分城乃無墊事見李文正公所為記貴戚并民田於清河征斂太橫民訴於朝事下之日君削其數什九民歸君德議立生祠君止之三年以異政被旌誥進階中憲大夫贈封其父母妻皆如典尋升今官分守河東道搜剔利弊罷行惟允發私賄以正官邪禁戢豪強視廣平尤力居二年上疏乞休不許㑹車駕西幸凡境內供億之事夙夜調度者三月繼聞再幸之報巡撫都御史偕君至代殫力繕備又越二月疾作返臥司𪠘月餘遂卒年六十一君子謂君簡而惠共而介有君子之道配錢恭人男四人長即鎣次鑒次鋆次即鏐次鉦出繼錢氏姑女二人長適長洲王典次適鄒曾孫男九人女八人又叙曰恭人諱淑姓錢氏吳越武肅王鏐之後父玘母胡氏溫雅淑慎出於天性年若干歸君君厯仕中外恭人什五家居躬績以率其衆凡再當大喪四婚二嫁力治而襄君以是無內顧卒年五十九君子謂恭人孝慈儉勤於君無違德其銘曰華著于錫世有冠纓甲科之盛莫如我明君起丁未厯官凡六總總刑章瑣瑣金穀惟愼惟清厥問孔淑孰不佐藩君獨盡瘁令乎守乎前庸既最子往問疾而以喪來恭人繼歿無乃病哀伉儷皆藏是曰禮葬彼屹者碑千載之望承事郎顧君墓志銘君諱榮章字時顯姓顧氏别號筠軒居士嘗入資授承事郎世為無錫膠山鄉人其父誠軒翁信娶朱氏生君兄弟三人君幼從二兄習舉業久之皆以幹蠱棄去逮各有子畢力延師教以經學朝夕親程之邑之材人無弗賔禮也客以文籍至無重弗售𢎞治乙丑正德戊辰甲戌繼成進士者三人伯之子浙江參議可學仲之子刑部郎中可適各以初官推封其父君之子可立既積學未第可久為行人改國子學正例未得推封故論者繩近世科第之盛莫不歸顧氏於是又為君未滿焉而君且卒矣先是一年可久與同官數人上疏言事君初聞之躍然喜曰義也繼聞上震怒則悚然懼久乃聞改官之命又感且幸謂聖恩洪大無可報稱卒之日猶惓惓以為言蓋君素涉史傳於古人忠孝事多經論議故逹於大義如此君事父謹甚凡厥攸嗜雖逺且艱必力致之母生之嵗在丒君不忍食牛者終其身母老日屏居誦佛君恐其傷氣也百方勸釋母感而從之居二喪哀而稱治終慕之悲形於忌祭伯仲依依舉必退讓若猶在父母左右初同居以生息日衍始孫而别築有庶妹早孤子鞠而長之歸惟其宜人以急告起而應之不敢以緩弗能喪者輒給之棺陳某者先有服於君其老也獨生於君養死於君殯吾友春官進士浦君文玉其子之師也其狀實云君卒正德庚辰四月二十七日距其生天順庚辰十一月一日年六十有一配同邑李氏子男二人長即可立縣學生次即可久女一人適蒼梧知縣尤遂良子革孫男四人起敬起孝起豫起家女四人皆許嫁士族其壻長過某次葛某次茹某次鄒某君喪之三月可久兼程犯炎暑至自京師哭踊即次可立乃協謀卜地於璨山之原以明年辛巳某月某日舉君柩葬先是介參議君來請銘豫昔在吾師蒿翁之門知君兄弟最故諸子於今視豫加推孫焉况文玉言可徴於是乎銘伯名懋章其封承德郎工部主事仲名盛章其封徴仕郎中書舍人銘曰業懋自躬叶教子以正叶如農克昏秋罔不成徴休數物亦曰有命叶肆國子與廷諍而封典未及其父承事參家訓而夀考不如其兄烏乎天道爽與不爽來吾可聞無惑其往故盛君時敬妻馮令人墓志銘少司寇盛公之從弟時敬既卒之十有五年其配馮令人卒越三年其子太學生武臣宣卿啓君兆於慧山新阡而合葬焉先二月介其姻友張元充來請銘福建少參茹君世和為之狀狀稱馮氏世為無錫善族與盛伯仲本成翁娶于邵而生令人秀慧凝重少不喜飾雖閨中人罕聞其言笑也父母相謂是女也淑盍擇佳壻歸之於是司寇公之仲弟時正娶于馮於令人為從姊故時敬之父安仁翁聞而為時敬聘焉比其歸也年才若干班於群從娣姒巽而修謹自奉舅姑供祭祀至于延師燕客及他內外事皆能左右時敬備儀與物無愧卿族勤儉之德恆力行以率諸媵口授諸女諸孫女以女誡諸書於諸子亦以義方贊時敬無怠舅姑病醫焉禱焉其喪也斂焉葬焉時敬或未之悉令人相之唯謹時敬沒令人奉家規以周旋如時敬之存也年七十八忽嬰寢疾越四年而劇遂不起病之初劇也或請召巫令人謝焉曰吾年至此尚奚求哉使巫能生人則誰歟死者卒之日為正德己邜四月五日距其生正統已未五月十一日享春秋八十有一子男三人長稷娶華氏蚤卒次奭即武臣娶張氏次尹即宣卿娶厲氏繼宜興陳氏女三人長適侯芹次適秦鉞次適江陰徐稷孫男一人鐸聘曹氏女孫五人長適邑庠生秦濂次適宜興徐文煒次聘于華某次聘于顧起經次聘于華某蓋所與為婚姻皆公卿大夫士族不能悉著其葬以嘉靖元年月曰丁卯日曰壬寅時敬諱頊别號冰崖鄉人稱之曰六丈安仁翁諱曰立字文璧司寇之父贈都憲公之介弟也銘曰在成化中盛多文物外有軒裳內有翟茀婉婉令人歸維其時德配夫子群從孔宜比稱未亡教子不怠嘉耦令終祉其斯在乎封安人假母王氏墓志銘嘉靖元年三月晦假戶部金不逺百里來告其母王安人之喪且告葬請銘豫色然駭曰日吾聞安人之病何遽卒也抑何以遽葬金以墓地與嵗月之宜告豫重悲之遂為之銘按其表兄陳禮部子引狀王世家維揚元季遷武進入國朝延平同知友諒始登仕籍其子兵部主事某繼之而大盛於其孫文肅公㒜公以進士及第入翰林纍官南京翰林學士國子祭酒至吏部尚書進階榮祿大夫致仕卒贈太子太保安人公季女也其母為公繼室孫夫人安人幼貞靜簡默內惠終溫公及夫人皆鍾愛之年若干歸公友同邑假參政伯誠之介子汝信於是參政既致仕家居甚約文肅公在南京謂汝信以安人來寧館焉而就學者久之安人謂汝信曰家有父母懷安而失養子弗子婦弗婦如吾心何乃以情告文肅公公許之歸致養唯謹參政公暨其配劉宜人釋嚴為歡比歿治喪中禮時汝信遊庠校安人治內不煩其心客以講學至安人供具必周至其自奉豐儉唯宜且親紡績以率諸媵婢人不知出於貴族也汝信有兩兄蚤卒二寡嫂暨諸孤弱安人勤恤之終其身晚雖異居如同居時諸子者至于今德之金以正德戊辰進士始為主事南京以兩宫徽號恩封汝信如其官安人今號金以公幹過浙因省安人申圖報之戒語甚悉未幾汝信以暴疾卒安人治斂及葬葬已綱紀其家婚嫁唯時惠及側室戴並朂先思愛敬之化浹于中閨論者謂稱文肅之女卒以是月二十日年五十七先是十六日為安人生辰金率諸弟妹稱夀畢忽遘疾至是不起子二人長即金娶國子生無錫吳稶女次銜娶嚴州府推官同邑趙昌齡女女五人適國子生江陰徐治引禮舍人無錫楊董同邑蔣泓三人皆安人出戴出二人壻曰髙淳夏應鵬曰同邑楊鍵女孫二人葬以卒之明月望日辛卯墓在九里之原與汝信合兆汝信諱瑞參政諱實參政之父民以永樂甲申進士入翰林為庶吉士授刑部主事嘗預修五經四書性理大全書官至南京戶部侍郎銘曰懿哉安人太宰維考大參其舅有器有名亞卿之舊號以子封命服在躬德則多有葛覃之風五十七年封君其從銘者秩宗蔡母陳令人墓碣銘陳無錫世族元大德初恂隱于鴻山山間有橋名朱舍稱朱舍陳氏令人之曾大父曰至大父德威父仲嘉母曰長洲惠氏令人性靜專中閨無泛愛於是有曾大父之婢寡而有節令人重之與之處者若干年比歸蔡氏為仁裕翁配姑浦蚤世繼包再繼鄒凡事三人皆謂曰共仁裕異母兄弟姊妹十二人令人見其婚嫁及壯且老無不得其情者仁裕倜儻宏濶其所御侍女若干人令人弗之制也至於他過往往補焉然亦諷而不諫仁裕卒令人方少諸孤殊弱舅喪繼之有挾權豪以侮其孤者惴之曰吾已告諸法吏矣行將執汝以訊既而攝者至諸孤􅋏不敢往令人泣且嘆曰未亡人可出門戶乎雖然諸孤不忍棄也乃墨布為筓携其孤以出比歸謂其孤曰是筓也吾死必以為狥以見吾夫於是家業向圮晨夕召諸孤以訓之于先德之不可隳田廬之不易守誓之曰所不輔爾等以底成立者有如日鄒姑歸蔡也晚未間於蔡之故令人左右唯謹家政畫一論者謂仁裕在或未之逮也越十有五年長女始有歸又幾年長子始婦未幾婦卒又幾年仲子亦婦未幾婦亦卒繼而孤孫踵亡令人有不堪其憂者或勸以求福於佛老輒峻拒之其婦夏為之齊素以祈者二年不敢以聞其嚴正如此及二子能立令人謂之曰吾昔汝以今唯汝從固吾事也令人年七十曾𤣥滿前而家不異財令人之教也正德丙子令人忽遘疾亟集子孫而諭之曰汝輩能如此吾死可瞑矣啓小櫝出二酒器曰此得之吾父吾父得之外祖外祖得之先世繼自今其傳之長以志吾守又出笥中布帛若干束曰此吾未衰時手製其各衣之以志吾勤是唯其年三月六日距其生正統三年三月三日享夀八十有六越七年嘉靖改元八月八日乃葬先是族葬多非其次孚會族人改圖焉而后從事非敢緩也子二人長孚入資補蘇州衛指揮娶惠氏繼即夏氏次濟娶華氏繼顧氏再繼朱氏女一人適周瓊孫男七人振入資為諸郎娶范氏操娶錢氏授娶鄒氏抑娶華氏邑庠生掄娶鄒氏揆聘華氏幼未名者一人女七人長適錢仁靜次華夀次徐徵次錢讓次太學生華銘次錢諒次聘于邑庠生華宸曽孫男以下凡二十有一人具其姻福建布政使江陰夏公如山志銘兹不詳叙墓在某原其孫授以孚意請銘于碣豫謝以無庸則介吾姻友南沙莫君來再告遂書之銘曰貞婦有旌必徴之年匪生弗得著令則然易曰艱貞令人有焉孰謂未旌遂弗傳邪復軒潘君墓志銘君今浙江平陽縣知縣相之父也姓潘氏諱績字繼善復軒其所自號也其先在宋南渡時徽猷閣待制性欽始居無錫其子襄以儒醫名三傳至元江浙醫學提舉傳之又二傳至國朝無錫州醫學教授仁仲仁仲之子太醫院醫士克誠克誠之子韞輝娶俞尚書溥之女生二子其長曰時助君父也時助三子君為季踈爽共約布衣而能談世務有望於鄉初逰邑庠既乃治其世業所謂傷寒醫者於是生二十年矣間執往役之義於公府皆謂之才四十而里人多質平焉大族遇難事往往問計五十而相且長教之經學六十稱耆宿優遊里閈間七十一而相有官其兄梅邉翁年九十從弟玉林甫年七十婆娑嬉遊稱三夀焉吾嘗為之歌錫之人皆和之七十五之平陽居數月而歸歸二年病癰乃卒論者謂君可以無憾矣而人猶惜之者謂其不卒享子之祿且未及封典之故初君之在庠也稱勤敏㑹人有誣其父逺戍者久而未白君奮然輟學以白之弱冠遭父喪治之如禮母疾求醫走雪中顚仆傷足或謂君行何遽也君曰吾惟母病之急不覺至此既而母愈人有陰持刃以報仇者誤斫君耳隕越幾絶其族叔退庵藥而愈之退庵素善是藥而重於製製初成而應用蓋若有神以先之者見者歸命於德然君自是知晦益簡與接怨亦用希間有所論當者心服或辨焉折以一言而已及母之喪於治益勤伯兄鰥居卞急猶禀命不敢遂仲兄贅錢亦鰥無子養於君者終其身嫁其遺女先世多圖書器玩至是有失者君與其伯兄力求復之聚於新樓日以相娛樂樓前蠟梅一株提舉公手植也枯而復茂詩人比之田荆相始習舉子業猶兼讀醫書君懼其雜也以情問焉相曰吾將謝夫醫者君曰然相師李四順君曰得師友龔行儉陸節之君曰得友相舉甲子鄉試下第禮部君曰南雍士半天下祭酒章公今之名儒也師友於是乎在其亟往乎君至平陽喜相之得民而潜補其缺平陽之人見君歸若有所失情在贈行詩文歸一年相以覲過家時政在行在相久於京師及歸君已病癰矣相留于家侍湯藥者四十餘日君將瘥力遣之乃行行十日而卒君少其伯兄若干年其卒也後若干月若干日年七十有七娶趙氏宋晉王之裔孫曰讃之女子男二長即相次樞為伯兄後女二長適吳世臣次適秦文卿孫男六人相出者二應辰應霖樞出者四應嘉應占應貞應春女孫五人長適成效次適朱楷餘皆幼曾孫女一受華氏聘相奔歸之又明年十二月二十四日葬君於龍山祖塋之次先是相率樞從玉林甫暨吾姨弟楊元平元正來請銘豫自童子時識君矣銘之固宜玉林名緒字繼芳君叔時覲之子也梅邉諱讃字繼賢銘曰醫以承世而才以名行在家無競在邦無競有子為令在家無競子不云乎是亦為政奚其為為政麗水知縣浦君文玉墓志銘吾友浦君文玉之知麗水也三日而病三月而卒於是君之政雖未施其所規畫皆放於古良吏有端緒矣士民聞之無問見未見皆曰是將教養我者而遽死是天奪我師與保母也無不慟哭走弔其子應麒聞訃奔往奉其喪歸越明年某月某日乃即璨山先塋之次葬焉而問銘於豫泣而言曰知吾父者莫如先生非先生銘其何以葬嗚呼文玉始吾之期於君者何如而乃有此哉吾何忍焉其銘之也君幼有才名大為陳方伯晉庵所賞豫初舉進士蓋聞之既而豫為許州為戶部郎凡十五年以提學之命還則君文思逸發不假梯級綽有造詣王提學明仲特重品鑒巡撫都御史彭公尤殊遇之至以君貌瘠腴軫念錢太史與謙遊于錫君師焉與謙曰吾友也語必傾倒魁解之望籍籍郡邑間比豫按察兩浙君果舉應天然尚未滿衆望也又三年豫以都御史還自漕臺君在太學其古文詞與程文並駕於是今大學士熊峰石公為祭酒每堂課必以君與舒狀元國裳梅進士幼和相甲乙大魁之望又籍籍兩都矣甲戌下第歸豫病中常過君君學殊進浸淫于諸子百氏追古之作者凡所評隲實多益豫庚辰登第辛巳對大廷名在三甲衆猶以美除為望乃領麗水以去君行别豫且咨焉惓惓民事豫謂利器非試不成君他日大用其兆於斯其兆於斯而今則已矣官爵不必論年亦不可少延乎吾昔取靳裁之氏之意作品士亭於許昌於豫章而僣有所方論頗為先師文正公先生所許今則謂君何哉雖然銘不可以已也則徴君行之隱者於應麒參諸吾所知叙而銘之君諱瑾字文玉别號桂巖世為無錫人明興以來仁官鴻臚伯啓為博羅令皆出其族君祖士林好義能詩畫父怡靜翁宗盛尤稱長者嘗入資受郎官服怡靜娶某氏生君少持重不可犯弱冠遊邑庠謹飭自好有鄰女欲私焉君正色拒之不為亂事父母孝志色體三養無弗用情者繼遭二喪哀毁且治柩在殯而鄰火風熖將及君與諸兄弟號泣呼天舁而出之於是有欲間君兄弟者君舍已從兄當析産皆推兄先間不果行家庭嗃如而睦閨門穆如而共至其誨後輩又善接引故殊材而多成其登進士舉鄉貢遊於庠序升於大學有聲稱者若干人自負孤介不與公府相涉侯世卿為令時有所質必就君弗致蓋應麒所疏如此君卒於嘉靖元年五月十一日距其生成化壬辰六月二十九日年五十有一配黃氏子男四人長即應麒縣學生次應元次應辰應登女一人許嫁興道華信夫子士旗女孫三人應元侍君麗水君疾請告未得鬱而病亟應元左右無方君卒之日死而從焉處守黃于道曰篤孝哉是子可無旌乎遂上之銘曰嗚呼文玉誰之不如五十始官古琴在御方調以彈而遽蓋棺人亦有言朱絃三嘆吁嗟乎知音之難承事郎華君墓志銘君諱泰字亨夫别號思檜華其姓承事其例受官階也世為無錫人其先本春秋宋卿族後散處四方其在錫則望於南齊有若孝子寶在宋若原泉於隆亭在國朝若德昌於墓塘皆始遷而望於鄉者也德昌之曾孫楚英及其子循重鄉望繼起循重娶鄒生君十四年而孤悲泣之餘惟世業之墜是懼乃棄其所業舉子者極力幹蠱而事請于母志色之養與口體兼致祖父母繼喪以冢孫任襄事為諸父先母念嫁妹甚迎居别墅以慰其心處宗姻率從厚告急必應即有缺亦他貸而給之雖負弗改於是家益饒裕鄉里有質曲直者忿而來釋而去什常六七然不為武斷惟理惟情諭之而已既奉詔輸粟受冠服凡義舉有不告告無不從曰吾方愧吾名不敢不勉於是屬長鄉賦人謂之平至其田租遇饑多弛之憾是用鮮訟牘無君名閭右走勢途日不遑暇君事家事外鮮入城府識者謂本富者固如此以故都憲武進白公輔之方伯江陰夏公如山及潘平陽之逹楊東莞宗源秦舉人國選皆與為婚姻君子以是觀君年五十二正德辛巳正月二十八日病卒其未卒也鄉人聚禱凡若干人其既卒也會哭者如之其臨終以母養弗終囑其子者再三蓋於是有遺憾焉配楊氏繼胡氏子男七人長子仁次子信次子儀次子俊次子仕次子位仕後其從弟濟君遺命也仁俊倫胡出餘皆别出女五人長楊出適王文肅之孫太學生文炳次適徐綸次聘於秦瀛餘未聘君葬於卒之明年嘉靖改元十二月二十四日墓在萬安鄉祖壠與楊胡二配合兆先期二月其從弟中孚及潘平陽以其子某某來乞銘狀君者君姨弟禮部司務武進陳子引初君與吾友張臨湘世安友最密𢎞治間臨湘會試京師謂豫曰華亨夫於我既忠且惠吾德之子畀我文一篇吾將藉手以謝焉會别遽未果今臨湘沒且久矣孰意吾執筆銘君哉銘曰臨湘稱君交而能久於鄉於邦善亦多有家孰不世而君克守人亦有言人觀其友我託之銘為君不朽監察御史唐君墓志銘正德辛巳春正月監察御史唐君丁母憂服闋以疾卒於家二月十九日權厝于萬卷塢之陽明年十月其仲兄浙江憲使君某入覲過無錫持其弟鄉進士仕狀請豫銘將以年月日禮葬君而納諸墓時與方伯張君元錫偕來元錫謂君名御史銘不可靳先是二年君嘗過豫論學及政豫心重之而恨未相洽也孰意其遽死哉君諱濂字景之别號松坡世為歙之槐塘人其先為唐德宗後避亂居婺源之嚴田宋季曰虞者以元兵下江南議殱五姓而李與焉遂襲其故國號為唐居歙之聊山虞之後至君父復庵公凡八世中以學行稱先生於鄉郡者曰梅臞曰筠軒曰三峰凡三人三峯名仲實在髙廟朝以耆儒召見有不嗜殺人之對者也其子子儀知興國有惠政文廟簡為趙王講官於君為髙祖曽祖允祖邦皆能世其德復庵益敦信義約而能裕始以憲使貴封中憲大夫福建按察副使其配封恭人洪氏有子三人君其季也幼聰穎强記出語驚人時憲使與其從弟太史守之偕逰邑庠君請業其間憲使登進士知平鄉君從之學歸入郡庠文譽大起既登進士觀政兵部憲使為刑部郎中日退自公於當代典章及天下要務多所究習授南京太常博士君惟國大事在茲稽肄惟謹簡庖役嚴壇禁牲滌必預協贊諸郎臨之以分不少假京府臣弗躬陵祀君嚴檄之繼是勿敢弗躬南城太和二羅公繼蒞太常皆謂君能重其官三年考績試廣東道監察御史巡視西城不縱不激惟法無勢有內侍家人市馳馬傷人君執而法之內侍不敢怨臺幕岌挾權奸為橫家人馳馬與醉人爭道執送君欲誣以劫馬法君笑曰醉人耳杖而遣之君以守令數易惠鮮及民而吏緣為奸憲臣行部下上交諂庶事日廢大傷治體上疏論之尋差刷卷湖廣僅一月而宿蠧盡滌以災虞召還君列羣吏臧否狀請行黜陟又建白息民計嵗備武靖邉等數事詔議行之於是江西巡按當代宸濠反機露矣有欲禍君者計以其差歸君君行毅然無難色道聞洪恭人病馳歸十日而恭人卒君遂病毁既而江西變起君以郡當兵衝凡守禦之䇿力起贊畫焉事平後民兵太橫君言於郡减之巡撫欲借徴白糧於徽君以喪例至闕言於司徒請别議之曰民之情國計也吾不敢以郡嫌忘國卒如君言歸四月君疾復作遂不起前數日兄侃視君猶談辨如常時君與人交無諛無隱天下名士以名節與君相激昻者凡若干人為博士時諸生從而學者若干人其在家進諸弟姪而課之業輅敏而窘君尤資之養中憲以志不以時好伯兄某好詩有所倡君必和憲使君兄而師者也禮以師不以兄殺修先墓在藤源葛塘者復其堂若田為石坊大書仲實對髙廟語其上以彰殊遇又請諸郡梓梅臞以下三先生集其諸所欲為義舉尚多而未之逮也且君子望君於國於天下者尤重是以重惜之君所為文流麗警拔議論疊出詩清新雅淡不為俗語有松坡藁藏于家君年三十六配吳氏封孺人子一人世槐女一人聘於國子生洪仁範之子誨銘曰前為博士肄禮嗃嗃後為御史執法諤諤險危不驚在疚猶作孰墓不銘終古茲石明故程畨府推官王君墓志銘君南京吏部尚書贈太子太保諡文肅王公之從子也弱冠以禮經逰郡庠九應鄉舉弗利而名益起君之志亦愈勵文肅公一日見君所業於齊中覽之良久嘆曰是子於是學可謂盡心焉耳矣而弗利如是命可知矣吾其如之何於是公為戶部侍郎當廕乃以君名上之君不知也命下而愧慊並作然既不可辭遂入太學友天下士所造益精博銓考優等乃有是選居官若干年歸歸若干年卒君子謂君無負文肅之舉君性孝友有識量為文軒鬯典雅如其為人侍母楊孺人疾無愧古孝子事文肅第隘君以所居讓之撫弟浩有父道張希堯者其同經友也周恤之至衣裘共敝其於宗族鄉人應需已責尤多在官常誦程子存心愛物之言有獄至必重訊决期於無寃巡撫錢公才之命署州安順及督湖襄軍餉皆有濟未幾請老蕭然家居如未嘗仕者於是鄉大夫士有清平逸老之㑹君實倡焉非公事不至公府淵默嚴正老而不變其姻有官外郡而年力當休者君勸之不從尋歿京邸人髙君之識其他事多類是君子謂君無負文肅之教君既卒且葬其仲女壻光祿寺丞前中書舍人胡世徵以其子來乞銘其妻之從子監察御史龔士謙為之狀者如此吾以所聞徵之信然君諱澄字希范别號耐庵其父修孝處士諱俊為文肅母兄其世具文肅之碑其生以正統癸亥三月四日其卒以正德庚辰十一月八日其夀七十有八其配龔氏為士謙伯父竹庵之女其子男適出一人曰昆出側室吳者一人曰晏出側室劉者一人曰易其女三人其長適楊墀其次即世徵妻皆適出其次適郡庠生陸憲章與晏同母其次與易同母未行其孫男一人幼其女孫七人其長者適趙惠其葬以卒之明年士午十一月十有八日其墓在其邑定安西鄉裴巷村祖塋之次豫少辱文肅公知既獲交與其子都憲公希曾昭勇君希程及其孫中書舍人某於君之銘若有弗能已者銘曰科第兮曷重世祿兮曷輕君何為兮恆情維忠敬之在我雖蠻貊兮可行老州里兮社清平學兮仕兮誰謂君兮未成九原有知兮君𠂻我銘福州府知府張公配王氏宜人墓志銘福州公始為諸生娶于邵七年而邵卒繼室以王宜人於是公既舉于鄉矣既而授官厯同安知縣福寧知州丁母憂起復補涿州宜人誥封今號公擢今官二十五年以卒卒二十七年宜人卒於是夀八十有三矣先是三年哭其長子珤而慟乃始遘疾其卒也其仲子琇率其孫立等殮且葬焉以其從舅王僉憲獻夫狀請銘於某某於邵宜人為族諸孫故以祖姑視宜人銘故不能辭也王之先為揚之太興人元宣慰副使端翰林學士璽其逺祖也元季徙無錫再徙鄒岐三徙江陰東常里今居之曰迪曰汝振曰宗奭曰致逺者宜人之髙曾祖考也致逺娶于吳而生宜人幼有女德年二十一歸無錫張氏雍肅有度事舅贈知州愼庵翁及姑錢太宜人得婦道甚接諸姒以惠佐公以禮公初之同安太宜人以衰年辭不就養宜人留侍焉居數年宜人侍公於福寧嘗退自録囚不樂久之宜人曰吾嘗聞先生誦虞書之言曰與其殺不辜寧失不經何不樂之有公朝正京師宜人過家太宜人年八十餘矣病痢幾危宜人侍之加謹越數年乃卒公在福寧宜人偕歸謂公曰今姑之喪非昔舅之喪之時也雖厚不謂之踰公從之公在涿州從者以服食異宜為宜人憂宜人固淡如也公以異政當受誥宜人曰邵也沒無子先生其忘諸乎公曰賢哉汝之言之也有國典在汝且不忘吾惡能忘之吳母無依宜人養之終身卒葬錫山遷致逺翁而合之又數年公自福州朝正京師還卒於家宜人以其子珤等葬之於惠山新阡正德己卯珤赴臺試暴疾卒宜人為之服三年曰吾聞吾仲子琇稱禮之言云𢎞治正德間再遇太皇太后之喪持服如制人異之宜人曰吾矯也與哉而吾異也宜人天性勤儉從公厯三官四地皆宜之蚤作晏息無寒暑一致或勸之少逸辭以非好耋老猶矍鑠論者歸其淑靜之故內自媵婢外至族姻鄰里為惠不同同歸於感卒之日呼琇而語之學戒之踈逸且謂汝學禮喪宜從禮汝長姊之夫周於世故亦宜參之言已遂瞑是為嘉靖元年三月四日子男二人長即珤邑庠生娶陳氏次即琇邑庠生娶過氏女三人長壻為太學生華麟祥即宜人囑琇者其次為太學生盛武臣其次為庠生談一駿孫男七人立冠帶從事錦衣娶成氏繼陸氏仲貞娶江氏叔宣娶王氏季師聘某氏芳譽聘李氏芳問聘惠氏芳名尚幼女孫四人長適邑庠生施顯卿次適華渠次適孫良次受倪柏聘葬以其年十一月晦壬申合福州公兆福州公諱遜字時敏别號鈍軒宜人以福州異政將受四品封公卒而命不果下故稱從前封云銘曰二女同居志恆相戾至於繼室亦前之忌封不忘前維王之賢德則多有我銘是先慕稼朱君墓志銘君諱振字從德朱其氏慕稼其别號也其先在東晉繇吳徙越宋內殿崇班閣門祗候明知雍州卒贈刑部尚書自四明復歸于吳其子公綽登天聖進士官至光祿卿知舒州卒贈少師孫長文嘉祐進士官至祕書省正字兼樞密院編修官程伊川蘇眉山皆嘗薦之者也厯若干世成忠避亂光福巽為吳縣尉徙東墅宗式居通安橋皆不出吳中其子桎始自通安遷無錫之新安君髙祖也能㧨業如土著曾祖矩又西徙前漳祖仲南承世業而益裕之加以問學嘗代父為椽有隂德活若干人家望遂振父轅號稼軒初娶浦繼室姚氏生君少讀書善記稼軒懲仕而罹法者不俾卒學君長修孝弟惟日不足父夜吟而慮其忘也嘗命筆於君君徙臥寢側先吟而聽不待呼命無寒暑間養其伯祖軒又為伯祖輅之縣尹訟田而歸之為叔祖軌之子升置田與宅鄉有梁杠之缺率佐有司以治皆父志也伯兄拱蚤世撫其子舄如子治其家事如室力白其誣舄死保其孤至于遺孫翼哺周至教其仲兄擇之子鈇鉞不能就傅者季弟搢搆禍於人日夕叵測君禦之智力兼竭施及群從皆然君與人交以信臨難尤能執義其友有陸大本者縛於豪強髙惟清者人閉其子室中君率衆解且出之平居循循里閈間非遇事不知其若是奮激也父殁當析産人虞君之爭不虞其讓讓行而虞者愧嵗饑令賤糶糶者顧得利君糶如數乃止曰因災為利吾耻之謝勸者不聽凡助喪葬不顧其力然能周旋其間寡則以已多則以人必求有濟義田義孰力不逮志語及輒嘆之再長鄉稅徵輸大議必與聞焉供足而民無怨聲暇日手古人詩一冊吟哦終日若不嬰於公私者教子甚篤而尤注意於衮鈔書至數百卷延師無逺近惟其人御史絃其諸子也推官恩其諸孫也科第相後先衮舉于太學文學尤有名皆教之力面折人過而樂於受人人始或忤而卒服之老而謝事極樹藝逰觀之樂興至吟詩藳藏于家凡四三帙自謂不知其衰俄病中乾數月而卒卒之日為正德己卯六月某甲子蓋前二日猶能手書云夀八十二娶華氏繼杜氏先卒子男八人長珮次瑾次即衮次瓛次熊君命後舅氏次扆次褒次褎女七人丁舜年秦坤華球尤晉魏寅蔣曄其壻也其一人先卒孫男十人士冕士允士元士充士覺士觀士覲士先女九人適過詔浦應熊鄒契談愷鄒壬餘幼曾孫男十人女七人葬以卒之三年嘉靖改元壬午十二月十二日墓在開化鄉閣照山之東麓與二配合兆先是一年衮問銘於豫至是以兄珮來請銘曰朱繇吳遷越望自宋世以官重雍州舒州樞府編修世業作求巽尉吳邦家于東墅門戶乃樹通安再徙至於前漳前聞以光君政于家承其祖德有子觀國閣照之下四尺者墳我銘以文明奉政大夫修正庶尹工部郎中進階朝列大夫李公墓志銘公諱珵字汝璧姓李氏别號東山其上祖賡始自邵武徙居無錫宋元豐間䕫舉進士厯官右文殿修撰賜爵隴西縣男卒葬邑西湛峴山其子忠定公綱請膠山寺奉其祀子孫蓋世守之自宋末至國初三徙之黃塘之始居者公髙祖士忠也曾祖惟先祖時皆隱跡民間父泰字允通以公貴贈奉直大夫刑部員外郎母華氏贈宜人公以布衣舉成化乙酉鄉貢五試禮部至甲辰嵗始以吏部考第一授大理寺司務三載受勑進階登仕佐郎以端介稱九載考最升刑部浙江司員外郎以詳愼稱尋丁內外艱終喪補工部虞衡司㑹重建清寧宫公閲木桑乾河有敏幹稱未幾進郎中奉勑提督遵化鐵冶有嚴明稱於是群奸搆毁左遷福建市舶提舉公過家遇疾上登極詔復其官如故公遂請老正德改元以上兩宫徽號恩進階朝列大夫越十有二年以疾卒公初在大理以父母違養嘗迎致京師數年歸歸數年復請歸省賜道里費以行中朝諸大老皆有贈言鄉人榮之繼遭兩喪卜新阡龍山事以時襄觀者稱治誨諸弟各事事復罄舊業遜焉無吝色有義之者公曰吾以是慰吾先人惟恐不足何義之敢言哉公居官二十年共儉和惠自僚友至胥史輿皂無不感服既解官歸里居翛然非山水之遊不出嘗感司空圖所謂三休孫昉所謂四休者以其說榜于小齊朝夕吟哦其間家忘其貧身忘其老最晚復徙厥居人不堪其勞而公漠如也所著有東山白冶前陽龍山諸藁總若干卷大理評事嘉魚李茂卿嘗評之公卒正德某年某月某日距其生宣德乙卯某月某日春秋八十有三配過氏封宜人宋徐王郡馬孟玉裔孫瑗之女也先六年卒子男三人長曾次髙次雍女三人長適江陰任守誠先卒次適蔡元載次適鄒天與孫男六人文聲文鳯邑庠生文著文衛文龍文麟女孫四人長適華貢次適華珂次適江陰庠生徐綱其季也幼曾孫女一公葬以卒之某年某月某日兆於刑部公之側與過宜人合屬有遽令墓缺志石雍也以請吾母太淑人於宜人為族姪豫舉進士觀大理政實以友義尋姻好于今四十年矣銘其奚辭銘曰梁溪之李繇宋相綱公明俊造乃耀前光司冦司空自廷尉擢四任三階執事有恪公年未老而賦歸來詔若為公載進厥階燕歌嘉賔夀稱大耊曷維其藏西巖有節古行翁墓志銘翁姓王氏諱竒字世英其號古行者蓋士大夫稱之云爾非翁自謂也翁初為諸生頴敏絶人治尚書兼通易詩二經凡數十萬言翁皆成誦且兼通天文卜筮星數之學或曰有異傳焉然自得為多提學張先生和試其文而竒之再舉不利以友寃白有司至于訐且抗提學張先生悅謂非規也黜之同事數人皆力訴以復翁獨落落鄉里者數年成化壬辰其友潘提學禎以進士起復上京師謂翁曰子盍逺逰乎天下之大豈無知子者哉翁至京師董司寇昱館翁於漷縣里第為從子師久之欲妻以姪翁曰非吾耦也辭焉有薦為恭順侯教讀者或毁之冢宰尹公翁見公言無卑辭公色於堂翁悵然而歸遂漫逰金陵三原公在兵部方為權貴所尼屬翁筮之翁曰公歸矣越三載其起當銓衡乎已而果然時翁在京師或勸謁之翁曰今吾不可謁矣乃復之金陵既而又之京師居數年之江西之河南之山西之兩淮晚而東歸徘徊吳越之間者凡十年翁雖以術逰然惟神而明之之義不敢自怠於修凡語人又必附子服惠伯之說故縉紳先生猶以儒者待之翁亦以自待嘗謂人曰吾平生所敬者三人謂謝新建胡淳安及豫豫愧乎其言豫侍養歸之二年翁自其家以其子宗元來訪翁病溫將死宗元請徙館豫不可既愈乃歸越三年庚辰訪其舊令楊通判修于溫歸三日病卒八月閏十二日也年八十七於是宗元校書于我二泉書院子嘗許為翁傳其卒也宗元以請遂為之銘翁在金陵吏部官欲黜二御史而問其命翁曰命豈宜問於公哉進退人才固有不在命者不對而出刑部逸重囚主者屬翁筮之遇恆之大過翁曰五為囹圄賊入矣其焉逃之計其獲日與時皆不爽聞者皆色然駭陳指揮妻死將斂其女病問命於翁翁曰女固無恙其母亦且未死後當生二子即欲斂其必越午午時妻復生後果生子二人王郎中應奎問命翁曰是火氣太盛若官之南所至必有火災後守台州既上三月郡中大災十室九燼王以疾去翁在淮安屈總漕直問張冢宰綵之命俾為書寄之翁曰是固大顯然今將敗矣吾不敢為書也是嵗秋遊歡谷山中仰見𤣥象嘆曰客星主急變奈何越三日復觀焉則喜曰無事矣未幾逆瑾敗此數事其尤異者其他事尚多不書翁孝友天至有所得歸付其弟世善以養其母母年九十餘翁為兒態恱之有嘉果必䄂以奉然介甚茍非義雖千金不顧即受於知已亦惟足用而已京館人被誣繫獄翁為直之其妻邀夜飲翁閉門不納明日徙去聞人之善亟稱於人其有不善面詈之至不能容陳知縣衮舉鄉飲大賔再拜門請翁辭之曰無暇者可以與此吾豈不自知哉此皆人所謂古行者翁之先在宋有諱實夫者始自杭州徙居天台又三世至翁之曾祖貴亨永樂初以人才舉官至光祿丞祖伯玉甫成室與産父仁禮教授鄉里門多顯人母楊氏翁自知數竒不受室以宗元為之後其弟世德之子也娶戎氏有子二人曰䝉曰需女一人宗元先是為制柏棺茲歸治葬以明年辛巳六月丙申襄事墓在後洋之原從先兆也銘曰可貧可賤不能為諛虛中季主託焉以逃卟斯人也湖海之遊卟歟山澤之臞歟人曰古行墓吾將書之華碩人張氏壙志銘碩人故福州知府鈍軒張公之女待選國子生華君時禎之妻國子生雲之母也其卒也今致政太子太保刑部尚書莆田林公既為之銘雲學于豫以豫知其家世復以壙志屬焉張華皆無錫人張自福州公以上皆世隱德其父文簡贈涿州知州者尤稱里望福州以鄉貢進士厯縣令州守至今官於其族祖義士飛卿暨其子尚書惟中世望不落莫士夫談之華之先出春秋宋戴公在齊有孝子寶居慧山之華坡寶之後以仕居中州者蓋若干世宋處士原泉始復來居梅里之隆亭五傳至處州録判某稱惠而文又再傳至元太尉府知印山心精於史學有所著述其子開二入國朝以耆年不仕又再傳至康伯益尚隱節其文雅稱於三吳者與王孟端俞朝宗吕志學陳子莊及其族人東湖竝又厯荃本盛二世至時禎之父坦庵諱棟字良用蚤遊邑庠晚亦遂隱初碩人之配時禎也以贅福州謂坦庵世誼謂時禎也材故碩人既成室則念曰吾父之為此舉也為吾弟幼而祠墓無所託也為吾母王宜人之母吳無所歸也乃謂時禎曰吾女子也不能幹蠱子其代我時禎克事事而加之以敏故福州官廉而不甚貧凡所屬者皆濟既而坦庵業中衰而義不就迎養碩人曰舅姑如此子婦何以為心哉乃勸時禎請于福州脫簮珥築室於石羊涇奉坦庵及其配吳居焉石羊去張居一里而近凡朝夕省問雖不能日不失旬朔久之弟珤長能勉於家而二老漸衰碩人又請從之以養於是家道日富凡省問于張者旬朔必躬朝夕必使視昔于石羊加勤福州以是無家慮碩人在張嘗與逆珤之婦陳及歸妹盛氏珤也侈能約之為謹其在華又能調劑其伯叔氏及其娣姒反戾為和時禎亦以是無室怨其居舅姑二喪後先豐儉惟稱於時禎有相焉福州之卒以在室之服服之曰吾固與嫁者異王宜人哭珤而病問無虛時其喪也哭不絶聲蓋三日亦病此葬不廢哭逾年而痢乘毁以卒臨終囑其子雲甚詳語皆合於忠孝誠敬是為癸未八月二十一日春秋六十子一人即雲娶楊氏女四人長受鄒一䕫聘與其次俱殤次適秦濙次别出適吳性孫男三人長復初聘莫氏次復禮聘史氏次復誠聘曹氏女孫三人長聘於秦采次安如石次俞寀跡其父若祖則楊為溫州府通判致仁秦為撫州府通判國重故方伯中齊公之從子今司徒鳯山公之族兄莫為鄉貢進士僉吉史溧陽人為光祿少卿遜仲曹為吏科給事中于德秦為鄉貢進士國和於國重為從弟俞為山東左參政國昌皆名宦也鄒居泰伯吳居閭江安居膠山皆望族也雲敏而好古久淹科目當碩人病醫禱甚劬喪能讀禮事必稱父命蓋碩人素作其志且相之勤及得不得又稱命以慰之若嘗聞古賢母之故者雲於是所得多矣初喪時雲既請於南沙莫君銘其旌曰碩人又自叙事行凡若干言請於企齊張公為狀碩人之前母吾族祖姑也知碩人久今參諸張狀為序及銘福州諱遜字時敏時禎名麟祥墓在邑南九里涇之原從坦庵兆葬之日以卒之又明年某月某日銘曰始事在室以厥良人為父母效力卒事于家舅姑焉依而父母不遐彼婦從人如匏斯繫若而人者從從皆義君子曰孝蓋其在斯而致毁以病且死于嗟乎其尤可悲也夫秦冢婦毛氏墓碣銘毛氏今南京太僕卿礪庵公珵之仲女歸秦氏為太學生國英君配國英名鋭江西右布政使中齊公䕫之冡子也毛之初歸及事其祖舅封知府修敬公蓋為婦二十有四年以卒卒之三年國英以其子濂等葬焉太僕公既銘其幽復以墳前之石屬豫國英之子汶為豫季女壻嘗述其母之賢於豫曰吾母出吾外祖母韓孺人克遵其教柔嘉淑明女紅外能誦書作字年十九歸吾父事吾祖母沈恭人孝於是有吾曾祖之喪吾祖病風未幾亦卒祖母不勝哀母代以事事不離左右喪甫襄祖母以二少姑未嫁為憂母請出裝奩以助父乃遂歸妹既而祖母遘危疾母日夕侍者數月比愈而吾錢氏姑久病卒祖母䀌傷成疾亦卒父哀毁不能起母躬相殯殮過氏姑有幼女育於祖母母遂撫之如祖母在初外祖母疾母聞之泣而往少間亟還曰吾不敢以母事廢姑事也比祖母卒猶然母雖生豐盛寸絲粒粟未嘗妄費凡服飾器用自嫁時所有外不逐時好更製一物祖母衣或敝則手自補綴父見之曰無媵婢乎其然也母曰此吾母所以事吾祖母者吾敢不以事吾姑父以淹恤場屋為歎母曰命也君子行業不有大於此者乎外侮至勸之勿校母凡七妊存者三人吾兄甫成童即速父延經師教之母體弱過勞則病病惟飲藥不事鬼與常情異甚母疾亟猶屬外祖母為父置一妾曰此須及吾未死吾死或未忍也凡內事如我後何蓋越一月而母卒矣烏乎痛哉汶之言多不悉記記其大者如此比讀國英所為狀亦如汶之言乃叙而為銘毛為長洲名族如秦之在無錫而太僕公望特顯毛諱某字某年四十二卒以正德丁丑八月二十七日先是數月毛病初起歸省韓孺人子漢從之一夕暴死毛極驚慟疾復作遂劇子三人長即濂娶太學生盛武臣女次即汶皆邑庠生又次則漢嘗聘熊布政良佐孫女孫男女各一墓在惠山聽松菴右沈恭人之兆之側葬之日已卯十有二月甲申銘曰維訓之能其難資富丈夫則然矧維女婦毛嬪于秦曰若令人厥德奚在葛覃有陳孰婦無姑而鮮克孝卒歸之名以申壼教方母王安人墓志銘安人王氏方撫州學之母也撫州為刑部主事時封今號與其配封刑部主事府君並命越若干年以夀卒先府君之卒一年先是撫州以覲畢便道夀安人于家安人執其手曰吾衰矣安得汝常左右我乎撫州泣不能别至撫上疏乞歸至再安人使人止之曰汝固有職前言吾情耳比卒撫州以不及斂追恨罔極將葬詣豫請銘因述焉豫聞而重傷之按樂戶部鳴殷狀王之先無錫人後徙常熟之楊溪元季有號鐡菴者為鄉聞人徐御史士衡為傳稱其簡重沉毅周僉憲士倫志之尤悉安人髙祖也曾祖崙鄉貢進士祖鎮父孟清介朴多聞識安人之歸府君孟清實擇之及歸皆曰嘉耦安人事舅姑如父母而加愼姑老至九十餘尤極順適凡烹調非出其手不敢以進於是産殖廢於外侮府君力穡自樹安人輔以蠶織家乃再起有四子且長安人贊于府君謂學也弱而敏讀書其成名乎蓋自里孰至入邑庠夜歸必問所業督之溫習比領鄉舉試禮部再不利督之如初既登第官刑部厯主事員外郎郎中每戒往視者曰吾不知書吾聞刑官往往以喜怒輕重人罪至有陷之死地者人禍天刑其能免乎汝見學謂吾言云及在撫則又戒往視者曰天下之守一也吾郡有守民或父母之或仇讐之此無他仁不仁廉不廉耳治官如家不可一日忘也吾言云汝見學亦云其娶婦嫁女服飾器用惟質素是尚為子孫作式其訓言諄切不啻謂撫州者安人卒以丁丑九月十五日享年九十子四人長庠娶陳氏次序娶陳氏次孰娶楊氏其季即學娶鄒氏封安人女一人適顧公式孫男七人鵬龍鳯鸞鷺顯頴女孫七人曾孫男六人震霑皆龍出霽鸞出承祖承裕皆顯出登鳯出女四人墓在香涇之西原與府君合兆葬以卒之又明年已卯某月丁丑某日甲申府君諱碣字廷立晚號松鶴無錫泰伯里人其家世在其譜銘曰四命之養一命之封維國既庸之九齡乃考良人是從維天既終之德則多有我銘其徵之容春堂續集卷十五
