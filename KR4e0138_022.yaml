body:
  text: 容春堂後集巻一明邵寳撰雜著四十六首昭穆説荅楊崇周昭穆之稱其起於祫祭幽明之鄉北乎論世者以别父子論廟者以别左右取其位不取其義至於祭焉𦵏焉嗣焉禮律之稱是者尤著其來蓋乆矣某今人也不敢行古禮今之廟制行於朝廷大夫士者不一惟永樂間胡行唐所擬者嘗頒行之庶人祭三代則曾祖居中士以上祭四代非左右其奚置哉置以左右則昭穆之名從之亦有不得不然者父昭子穆無世不有謂無始祖而可廢乎左昭右穆無地不有謂無中龕而可廢乎今之所謂昭穆者幽明之義未能恊於古吾知之矣而謂左右之列不可行於今乎吾廟為四楹間中為三室虚中以俟祧主之蔵蓋小宗之道如此是中雖無主而未嘗無位也以是而左之右之曰昭曰穆非古之義而古之位也某今人也不敢行古禮酌古之義而今焉是從吾之分也雖不韙其敢辭諸家廟石磬銘辯汝聲介汝徳于以考之先祖之側其永無泐楊正甫英石銘突其來如移自遐逖誰琢且追而復考擊金兮玉兮聲在兹石兮温硯銘暑有發冰寒有藴火旣濟且和調劑在我彼鼎我硯制殊義同汝革汝從惟金在鎔功在斯文而不自有左右置諸歲寒良友屛鑑銘鑑乎惟觀屛焉以障異用並施厥亦有尚我屛我障我觀在之後前左右釋兹在兹知風之自弗障亦可我心水如我鑑在我范撫州像贊州當専城郡作别駕厥初京府位尹之亞威聲肅如後光前價勇退急流食不遑暇斯人也吾嘗聞其先君子之節於東山翁矣乃今徴乎其平生信矣哉有明於幾先無虛於名下也張企齋先生像贊企齋張公寳於母黨稱舅於文章徳行加重焉公亦謂寳知已公像之贊非寳其誰宜為哉西曹一月未足盡公之才東鎮三年未足盡公之政公學淵源公性堅定無事至殆忘其有為有物交益知其無競中歲極江湖之幽憂晩景遂山林之髙興時之論者不知其謂公何以予觀公蓋百折於世塗而不失其正者夫復舊物贊百子圗一識云括蒼鐵硯後人筆成化初失四之一庚子陸承翰氏歸我有子惟百四其軸誰為茲圗為嗣祝昔失其一今也復兆多男兮天以吿鐵器一髙二尺有四寸圎徑尺有八寸狀如鼎有趾而無耳鉉成化初失之正徳庚午春楊正甫氏以歸我𤣥金質焉近鼎象扣之有聲納有量舊物來歸義弗讓吾置之庭銘其上器不可假名不可強神予相之永圗是尚雕漆盤一狀如㯽榔天順末失之正徳壬申秋塼橋錢尚簡氏以歸我追兮琢兮三其角叶兮我有嘉賔以薦玉兮洛神圗一圎徑八寸許不知何人筆上有荆南髙䕫小楷書曹子建賦成化初失之正徳甲戌春鐫工何球以歸我魏人之賦今畫以書荒哉事也衛風之餘予尚觀之亦以警予龔守誠像贊詩咏稼穡書稱構堂鍳于古訓曰篤不忘家曰幹蠱國曰服勤古有良士君惟其人㓜壯敏彊耆艾静逸世務周旋觀幾于跡地以受㕓時以受服吏有滄洲隱無盤谷秋原藜杖春渚蘭舟人亦有言與造物游雲南憲副許君像贊西臺之望南臬之聲洗寃澤物有徳惟刑今也善良昔也凶慝何以致之有刑惟徳未老而請歸臥林邱古亦有人勇退急流太史作銘竊附我贊國有春秋鄉有月旦四事圗贊四事者子事父母也婦事舅姑也妻事夫子也妾事女君也予欲於言外示内則焉故假繪於杜懼男氏抑有不能忘言者於是乎贊事父如天事母如地允兹在兹其何敢替無貳爾心有臨上帝文王我師日三王季右子事父母用父事舅用母事姑我思古人是究是圗非自成已抑亦成其夫乎右婦事舅姑男位乎外女位乎内兹惟義類我惟坤乾則莫我敢對我櫛我巾小物是勤無貽君子之累右妻事夫子妻之言齊妾之言接命之不猶敢不兢業古有恩禮而中取節禮勝則離恩勝則媟右妾事女君壽星贊孰儲爾精南極之星孰擬爾形古之丹青或謂星其人歟降升下上一氣孔神凡天下之黄髪台背皆其身也其生無始其没無終南極輝輝與天無窮僊人畫贊鐵為杖兮若人超閬風兮歴崑崙下無地兮上無天掛扶桑兮少弭忽入水焉生鱗變復化兮莫測空遺像兮風塵希翁小像贊其孫金請西漁震澤之濵東樵鴻山之野短褐蕭然公何為者海鶴一聲天空月明我歌離騷敬弔先生前刑部郎中東樓黃君像贊於戲東樓仕勤夙夜之節舎將謂何學逹春秋之權用則執是直而見黜蓋嘗聞諸士師敗以為榮抑何愧於史氏歸歟曽日月之幾時懐矣極江湖之萬里於戲東樓可謂百年而無知已乎陸南康趨朝像贊冠冕珮玊晨趨于朝人知君之勞端拜稽首仰瞻重瞳人知君之共事要其成物覈其實至于小大無時或失云誰之知曰惟天日痩竹居士贊古篆今符壯附辭尊之義舊鄉新築晩從習隱之倫有詘有信既不計夫前勞而後逸無得無䘮又何知夫彼幻而斯真蓋君嘗自為之號曰痩竹居士論者謂得其象且得其神是故在朝在野挺其如玉而能自拔乎風塵語不云乎君子人與君子人也潘松邱像贊家所藏書曰古之遺身所被服曰今之制無産有恒不試故藝道存繼述之人望流傳聞之世生既謝乎公徴死何假於私諡或披斯圗而問焉亦惟曰松邱處士潘其氏也玊林翁像贊今人古冠志焉是尚子以徳訓母以色養振大雅於絃歌囬羣争於揖讓跡寓碧山之中名徹青雲之上曰老而傳康彊無恙或有問焉則操几杖噫若人者宜乎子弟從之為師而鄉人稱之為丈也汪良用像贊山澤哉而深忠愛之念江湖哉而勤孝養之心無憾哉子路之米有濟哉卜式之金宜哉若人遐哉徳音尚亦有餘情哉煙水之舫風泉之琴題東方先生畫像東方仙人衣被雲霞手一碩果來從海涯曰三千歲一實一華人聞此言皆笑其誇我欲扣之山深水涯無何爲鄉烏有爲家記先師文正公小像此吾師西涯先生李文正公小像也先生薨後某寓書求諸崔尚寳世興得之某昔侍先生嘗竊觀於架上亂書中蓋先生為學士時所畫於今三十餘年矣烏乎先生不可作矣得斯像而時展焉亦足以慰我岑鬱無涯之思耳聽松庵某世墓所在旬月必一至擇静室懸焉謁墓退則謁於斯勤且弗褻之道也丁丑秋七月朔司冦鐵柯劉公傳論論曰漢之時嘗遣繡衣使者持斧廵行郡國蓋斧以擊伐爲用尚矣斧之柯制必以木或患其弱故有以鐵爲之者柯勁而斧之用益利雖然執柯者人也人有剛徳而先之以明繼之以貞斯無負於柯矣其司冦公之謂乎叙筮二首秦國英之妻毛疾病筮之遇鼎之升其四爻曰鼎折足覆公餗其形渥凶上九曰鼎玊鉉大吉无不利鼎器也主器莫若長子國英以之毛冡婦也折足而覆餗不亡何待且足折矣雖有鉉將焉用之變後而象非類猶不告也華伯姬歸寧而病筮之遇乾之大有曰飛龍在天利見大人龍動物也春夏飛而東蟄秋就潜矣象之非時於人爲病然乾爲父為君姬之見父猶臣見君也見既利矣雖病何害焉且剛而之柔固婦人之所也其將復乎小試諸生䇿問四首問蘇建責大將軍青觀古名將所招選擇賢者勉之而幕府長史亦以士無所進論爲大司馬車騎將軍安世譏當其時二君子者一則以何與謝一則以何知謝不知其所與所知者果有所在乎亡也問仁義禮智性之四徳六經四子蓋多稱之子朱子釋仁義禮吾聞之矣智之爲訓則未之聞也豈有之而别出於他書耶如其無也後儒亦有補之者耶不然請擬所以補之者問秦㓕六籍禮壊樂崩尚書殘逸惟易以卜筮故存不知詩春秋之存抑何以哉諸生必有能言之者問予讀史見有問絳侯周勃何如人者張相如何如人者汲黯何如人者又有問顔真卿作何狀者當其時各有所爲問者而其對焉者亦必有以也諸生爲我尚論之三登贈秦都憲有序御史中丞秦公國聲以廵撫贊理之命將徃湖南而吿别於寳寳病餘閒居念吾國聲學行夙成昔在户部與聞尚書箋奏出歴臬藩敷文備武績望兼懋而兹行又超遷伊始欲有贈焉致我莫助之愛而不敢輕也檢吾篋得古箋一其色蔚然以碧瑩然以澤蓋藏之乆矣正月之望卜而得吉天開日明恵風以和爰啓冉涇東堂閉門謝客乃始執筆惟昔先民有作予得之於登者三其古與箋稱謹序以書書既而三緘之重襲加藉又卜日以授從者俾乗間進焉或曰何珍重若是曰以古物贈人其固宜哉曰居今之時姑舎是可也曰不可古之物即今之物也武昌之西有樓曰黃鶴相傳以爲仙者遺跡自唐以來人侈談之或曰非也山名黄鵠由東北是來西距於江有飛動之勢故以是爲鎮蓋堪輿家説也鵠鶴類也是之名耳雖然此不足深辯予嘗登之得大觀焉書稱江漢朝宗于海實於斯在夫海則逺矣而勢必趨焉有不可遏者朝云宗云蓋取諸覲禮以名其勢而并得夫心焉耳夫江岷出也漢嶓出也其所由來者異至是而勢不得不合所謂以異而同有恊恭之義焉人臣事君之道固如是夫予嘗登岳陽樓讀髙平范氏之記徘徊臨眺乆之或曰巴陵勝槩在洞庭一湖信哉言乎曰吾觀范記蓋云方記之未作也勝固在湖也厥既有記則勝不在湖而在斯文矣然則何謂曰記曰處江湖之逺則憂其君處廟堂之髙則憂其民又曰先天下之憂而憂後天下之樂而樂蓋古仁人之爲心如此而四三言者盡之此天下之勝也雖然君子讀是而感發焉固亦斯樓之勝哉若所謂坼吳楚而浮乾坤者則奚庸愈於此滕王閣者爲江南臨觀第一王勃氏序之盡矣予嘗登而觀于古今之作獨取昌黎所爲記焉其稱王中丞之觀察江南西道也前所不便及所願欲而不得者公至之日皆罷行之春生秋殺陽開隂閉令修於庭户數日之間而人自得於湖山千里之外烏乎斯人之爲一何曠逺神逸與斯樓稱哉或曰此何與夫臨觀曰天下之景其大致有二暢如也肅如也恒暢則荒恒肅則厲時以令變物與心違雖有湖山其如人之不自得何故叙景而先政昌黎公於是乎善記蓋今去王中丞千有餘年矣尚見其所爲景者雖未爲賦猶賦也歴代鐘鼎欵識跋右歴代鐘鼎欵識二十巻致臨江照磨事吾邑陸寛宗仁手搨宋薛尚功氏所編刻者也宗仁昔在禮部有事符篆以精博稱良史公卿大夫問古文者必宗仁焉屬而予爲尤予視學江西屬之尤數今觀是本㸃㸃畫畫皆無茍筆乃知宗仁之能昌其書者蓋稽古之力宏矣夫古之文不用於今今所用者符篆之外無幾焉然嘗聞諸昌黎凡爲文辭宜略識字識之非難用之爲難造之爲尤難神明在人無小大一也予夙志古經籍欲有述焉而未能也蓋於是媿宗仁因書而歸之東川墨蹟跋二首東川已矣邁徃之氣猶見於㸃畫之間而豐厚盈溢又類有福者顧不克永年何哉東川作詩如其作字其作字如其爲人蓋無一不軒豁流動也其人雖徃詩與字可使無傳焉哉題寳萱圗鵝湖華文逺名其奉母之堂曰寳諼蓋勵孝也勵孝則何取乎諼諼忘也諼之爲草食之令人忘憂故名詩曰焉得諼草言樹之背婦人欲自忘其憂云爾華母為母爲祖母賢子在前孫曾在下左右無違何憂之有而欲假物以忘之夫天下之愛莫大於親人子之願莫大乎夀所病乎壽者莫大乎憂憂者情之所不能無也孝子之道聽於無聲視於無形何獨於憂而不然人謂華母無憂矣有如萬一孝子之所不敢必也於此聞有物焉足以忘親之憂則雖千里之逺將力求焉况吾階庭間哉不是之寳又焉寳之此文逺氏之心也充是心也可以説親矣諼哉諼哉孰大於是圗爲正徳己巳作於沈石田氏越六年甲戌文逺視予請題之於是華母年八十矣病起賓位咨目某病餘體力尚歉未能具衣冠肅客敢謝屈玊之重倘辱曲顧燕居許䙝服以侍清論某之幸也非所敢望也氣弱不能多言乆坐敢謝不敏太淑人壽日賔位咨目家母仰荷上恩叨享夀康兹屆誕辰重厪恵顧無任感激但筋力爲禮非老者所宜而某也病餘又弗能代爲荅拜敢以一揖請惟俯從之野服對某病餘閒居常䙝服見客客有謂予曰子以力不能衣冠不能野服乎曰何敢野服隱者之服也予病者也非隱者也是以敢䙝服不敢野服也敢䙝服情也不敢野服禮也客曰然荅陸徳問陸徳有父之喪二年未𦵏於是將𦵏其外祖侯氏問服於邵子邵子曰禮三年之喪雖功衰不弔自諸侯逹諸士如有服而將徃哭之則服其服而徃今也㑹𦵏外祖亦視諸此而已矣若謂父未𦵏則徳也長也爲之主者也凡諸外事既莫之與其使諸弟徃焉亦可也續復舊物贊黃大癡畫一上有王梧溪楊鐵篴二詩先曽祖存一府君蔵篋中天順壬午棄諸孫時失之吾母太淑人言常及焉正徳戊寅蠡溪鄒光懋氏訪以歸我贊曰有帛一方山木蒼蒼畫者癡黄我篋以蔵而逸于荒六十七年還於我堂於乎先澤其何敢忘容春堂後集巻一
