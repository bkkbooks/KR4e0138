body:
  text: 容春堂前集巻十三明邵寳撰序二十三首許州志序許州志志許州也凡州之事循名考寔原始要終逺以鍳古近以驗今無不備焉是故謂之志志也者史家之一體耳今疆域之類則兼乎圖建置之類則兼乎表人物之類則兼乎傳文辭之類則兼乎集攷異之類則兼乎論辨似不純於一體者然而恐失於畧故求其詳恐失於浮故求其覈要於備焉而已此亦志之變也郡邑之有志尚矣是志之作葢有繫乎一州而不專於一人之蹟將以傳於乆逺而非獨為目前之談玩也寳嘗觀於其大有志封守者欲其慎固有志創建者欲其修繼有志沿習者欲其興革有志幽潜者欲其表章有志淑慝者欲其懲勸我所能為我則為之我所未能以俟君子是志之所以作也烏乎有天下之動而文籍生焉其初葢醇如也逮乎紀載日繁於是淳風漸衰而世變以降故天下之事亦為之而已矣奚有於志然名實之所以不紊終始之所以不爽徃徃於此焉賴是雖一家不可無乗況一州乎天下之大諸州之積也諸州之志備則天下無闕事矣況許自春秋分國以迄於今中間或為雄都或為望郡其事之所當志葢有倍蓰於他州者我朝經理海内而許之為州寔處兩畿之間徳澤在民物教化在人才制度在有司者萬世一日以今視昔地若増而重焉則夫紀述治功賛揚盛美乃守臣奉職之一端也是以不敢不作作焉不敢不詳不敢不覈豈得已哉志凡若干巻始寳承乏至州即有意於是既而政務紛冗方負尸素之愧故因循七年始克成編舊志出於前知州五羊陳公今多因之其分類立例則寳竊用已意云太康郭節婦詩序節婦詩一冊若干首葢太康郭氏之書也而君子取之以為可傳於天下者詩為節婦作也節婦為前刑部郎中王公傑之女公為鳳翔推官時郭君浩者亦從父宦咸陽公舘甥焉三年而沒節婦寡居内外無敓其志者或謂是足矣節婦獨曰未也盍歸于郭敎吾子納吾子之室越若干年其子天子之室繼之或謂節婦盍歸於王節婦又曰未也有吾孫在敎且室焉吾事也卒行其願以老烏乎一身撫兩世之遺孤厯四十餘年而終始不易節婦之所處豈惟能自盡而已哉婦以不二夫為節節盡而能處其子若孫節之大者也故春秋於紀叔姬歸􅈶特筆書之葢其識知存宗祀是所謂有其節而能處者當是時使不歸於􅈶而歸魯夫亦何損於節雖然豈叔姬之所以自處而春秋所以賢之者哉節婦之於郭猶叔姬之於紀其節同其處之也同君子通於春秋之義其不能無取於節婦也審矣然則是冊也雖郭氏之書茍傳於天下使夫虧於節與有其節而不能處者聞之一則以愧一則以興豈不大有補於風化哉節婦卒於成化壬辰先卒之數月有詔旌表其門後十年辛丑其孫緒舉進士厯官户部郎中論者以是為節婦之報寳比守許去太康纔百里高節婦之風嘗欲有所紀述而未能也今與郎中君同官乃僣為之序節婦母矣而猶曰婦云葢為天下舉重者言之而不欲視為郭氏之書也某非敢當君子亦竊取君子之意耳翠筠軒詩序節枝莖葉皆竹之有也而筠之在竹見稱獨多或遂以名竹葢竹以筠為體凡節枝莖葉之間通謂之筠至其用也則席於宗廟筐篚於朝廷簡牘於天下後世又皆筠寔為之而節枝莖葉不能加焉故傳曰如竹之有筠也此之謂歟然筠之為色唯翠者為多自籜解後更厯萬變翠未嘗易易則變變則雖有節枝莖葉摧敗繼之而竹之用於是乎窮故論竹者率以筠稱筠者率以翠此又物理然也吳君斯敏歙故家子㳺江湖間而以翠筠名軒其知竹者乎竹之為徳多矣而君獨有取於是者葢即一以求其全則凡截然為節翹然為枝挺然斐然為莖葉各色其色而竹之全徳不外是矣況其為席為筐篚為簡牘又未可量哉詩凡若干首作者皆時之君子而寳為之序少傅徐公夀詩序𢎞治丁巳之嵗今少傅謙齋先生徐公夀七十秋七月二十有一日為生之日時同郡大夫士之在朝者合若干人議觴以夀公公以上方軫念北邊有司修戒我其與憂固辭不受衆不敢彊越二月疆埸事少緩衆復因重陽節以請公辭如前衆乃言曰公盛徳抑畏何乃至此抑公此意政某等所以夀公者也公以先朝舊學之臣入掌中秘再陟孤卿相事今上凡若干年心孚徳咸寵倚兼至公亦毅然任重竭其忠貞以持國是雖羣務交集叅紏縁延未易卒定公茹以宏量鎮以雅重從容决之中外允服而民隂受其賜公乃不以為功每退食私第輙推至誠延訪俊乂及事利病視四海之内如視其家欣戚係之得一人惟恐不用用之惟恐不亟在易泰之九二所謂包荒得尚於中行者公之謂矣至與一二元老出入僉謀可可否否惟天惟民惟君惟國惟善所在不必在人不必在己此其休休有容於秦誓所稱亦罔譲焉是以數十年間百僚庶工胥師胥遜無復嫌忌之習説者皆謂俗尚丕變而不知公之風采有以表儀於上也由是論之則公之身繫天下者甚重而憂形話言至忘其年之為慶公之心天實鑒之書曰天夀平格保乂有殷繼自今公夀未艾而勲業日以益盛豈非天貽我聖眀為夀天下之地哉某等所以夀公者葢其在此而公何乃固辭之雖然以地以事公天子相以位以道公天子傅夀公之心誰其無之而分乃未敢今日之舉夀以天下禮則鄉人不亦可乎於是公不能止衆遂相率成禮而退退各為詩一章用紀盛事寳不佞辱公愛厚僣為之序重陽㑹詩序重陽㑹詩者吾鄉諸公官於東署者作也繼是將不一作焉故詩以節名夫詩以節名者㑹以節舉也劑暄凉之候酌疏數之宜莫大乎節天時且然況於人乎故今為㑹始元夕次上已次清明次端午次七夕次中秋次重陽次長至循還終始擬諸天時以寓無窮之意而我同鄉在朝者雖有二十餘人然署各疏隔不能時時相與也惟世卿在稽勲世恩在主客廷伯在都水文光在翰林而予與文美士𢎞嘉言國聲五人者在户部署既相近出入起居朝夕無間於是而節舉一㑹以要鄉盟此亦人事之不可已者也其所以必有詩者葢吾人之為㑹非為飲食言笑以流連光景之云也考徳將於是焉觀學將於是焉使不假夫古者陳采出納之遺而覘之其何以資麗澤之益而自别於羣居終日者哉由是觀之則所以為詩者固非誇多騁速搜異衒新屑屑工拙間以啟䡖忌之端者矣戊午重陽寔惟初㑹而予不敏敢僣為約曰凡㑹人為詩一章章書一簡者九主蔵其一賔分其八積之一歲為簡八十有一各成巨帙彼此相通随在具備不亦可常矣乎而命題限韻之類則㑹之日定焉諸公曰然遂如約所賦之詩題用古句庶幾古詩吾詩古人吾人也其目具左水利事宜序𢎞治丙辰都水主事姚君秀夫奉璽書治江南水利之政明年疏濬築捍漸底于績三吴數千里民懐其惠士服其識又明年水利之書出焉葢集前輩論水之有闗於吴郡者而為之也都水之用心一至於是其績之用成也夫固在此乎惟都水具有本之學久矣而於此尤致謹者葢賑備之策莫先水利水利之於民甚大於政甚難利之弗圖顧足為害故雖以順為道以鑿為戒聖功賢訓具在方策而時代異宜土方異勢溝防異制阞理異用奠淵異度分合異軌昔之人專官以司窮年以肄尚懼弗習其或敢以害易利妨吾人大計哉此都水所以求之今不足又求之古而至於為書焉者也寳承乏中州嘗從中丞徐公考觀汴堤及漢魏以来諸渠之故又嘗侍於少司徒劉公聞其所以治河者乃今得都水之書而閲之則南北之水亦畧可見矣使凡行水者皆都水其人水惡有不為利而為害也哉況水之在天下五行六職纔居其一又安得夫人之於事皆如都水之於水也寳於是重有所感作詩寄之以賀其成而都水得告西歸矣吾郡通判傅侯檜乃以都水所行事宜集為一編將與夫前所謂書者並刻以行其間相時因俗益損興補不必皆出於書而書之為效亦於是乎少著矣是編凡四類曰敷奏曰榜諭曰辯論曰詩文縂若干篇都水名文灝信之貴溪人先由刑部主事出判吾郡以擢今職儒者之政所至有之不特水也通守亦職於水奉以周旋都水葢亟稱之云河山勝覽詩引河山勝覽詩若干首吾黨諸君子贈史户部文鑑監兊而作也户部之行凡河南山東皆厯焉故題云爾夫兹河山覧則勝矣惟兹行也地方數千里軍民吏士從事者不下以數千計勞者欲息困者欲蘓訟者欲平是亦一劇任也户部何暇於此哉雖然夫人之為一人則煩二人則紓三人則逸四人則無事矣户部之才不啻兼數人而已者也用其三四以治其事而其所未用者以之覽勝尚有餘力孰謂無暇之有今夫黃河天下之大川也太行恒岱天下之髙山也嘗聞君子如高山大川信斯言也宜莫如户部者徳好相協自古已然户部其無躍然者哉夫是之謂勝覽而臨眺遊娱茍自别於俗吏者不足言矣重刋橫渠經學理窟序横渠先生之學始乎泛求中反之正終歸於知要而精思妙契之功實貫乎其間故其為書有西銘有正䝉有理窟而西銘粹矣正䝉次之理窟又次之然理窟所載要皆出於自得則所以為西銘之粹者茲其地哉今西銘正䝉已列學官而理窟獨鮮傳焉間得舊本遂刻而廣之以備張氏之書君子之志於學者其必有取云王升之遺稿序丙辰南宫之試榜出而詢焉得士之最少者四三人南昌王升之其一也升之年十五舉鄉試已稱俊才至是再捷文譽益起越眀年例授安陸知州有惠民之政又明年以事去官家居或將理焉而升之病且死矣予知升之聞而悲之於是視學其地既弔其父國賔公而其兄鄉進士元卿時與其弟彦卿尚卿和卿皆為諸生亟見亟問知升之者視昔為詳今元卿録其遺文一編請予序之余以是而徴諸其為州者誠不負乎其文也昔人論士之致逺先器識而後文藝古今以為名言若升之者方懋厥修致逺之道可謂兼之而僅止乎是抑又何哉是編於升之之文十纔一二其才固未盡也然即是而究其所必至亦當以大家視之矣況由是以起問者而表乎其所自立所謂致逺者顧不在斯與雖然才而夭者唐有李長吉宋有邢居實二子之在當時觀其文者徃徃疑於其夀升之之文氣昌詞雅曽無可疑而卒與李邢同歸此又余之所未喻也升之名朝卿世為臨海人其居南昌自國賔公始撫州府志序古之為國者各有史官掌記時事今之郡古大國也顧無所謂掌記之職者是以文獻罕徴焉雖然有志志非史也或能修之以時無廢前傳無絶後載則文獻之徴於天下後世者是亦史爾抑何必如古之云哉撫為江西大郡其地西南負山至郡治而平衍曠然數百里下控江湖視他郡為庶為富為多才俊其事之宜志者繁矣宋景定中家坤翁氏嘗一脩之君子謂之有體迄於今若干年尚無續焉斯可為文獻之一嘅也𢎞治庚申胡知府孝暨同知趙瑞始圖再脩乃得里居之賢前行人姚君復亨知府徐君用濟以主其局而布衣黎喆實與編纂之任今呂知府傑繼而成之刻梓以傳凡若干巻其例一承家氏之舊而少加損益葢無媿乎志云者雖謂一郡之史可也夫國史列是非備得失而不敢純用春秋之法史固異乎經也志之於史名異而實同故亦得用史法法有不録録必實有不書書必直二者或缺史且不能信於天下後世而況志乎然直存乎人實存乎事事有稽古傳聞之異是以紀録失真君子患之而墓碑家乗之類徃徃出於其時尤難盡信故直可必也實未可必也吾於其所未可必者而心誠求之欲必得焉以成吾直則是是非非得得失失公論在人亦莫之掩矣由是政有所資俗有所考以為因革之地他日采於國史傳之天下後世天下後世之徴文獻者亦將不外於是孰謂志之非史哉書成之月予適視學至撫知府傑請序遂論以歸之俟知言者評焉譚烈婦祠祀録後序右録一編為奏疏祭文碑記傳序各一詩諸體縂若干皆為永新譚烈婦作也烈婦宋宗室女遭元兵破城從其家匿縣學孔廟禮殿中既而兵至戕其舅姑暨夫節婦被執義不受汚及其兒死焉血漬於塼宛然其人形歴乆不滅若有鬼物呵䕶之者故天下之言婦節者尤以為烈而祠在學傍歲有私祀行於丁祭之後肇自知縣烏斯道至今廵撫都憲錢唐張公守吉安時始建議上請詔列於典而烈婦之名於是益章矣方元兵之南偪也其勢甚迫時士大夫死命死制者後先相望而吉郡尤以忠義稱焉其邑里之間固宜有如節婦者然一死以全其身而使夫有貞妻舅姑有孝婦是豈獨為女中之賢也哉昔漢宣帝詔褒黄潁川首以孝子弟弟貞婦順孫日以衆多為詞而辦集期會世恒以稱吏者顧不一及則守之為職亦可知矣公在郡若干年治行於天下為最扶植振舉不遺餘力而尤汲汲於此非學通古今而知所䡖重者其能然哉歐陽子作五代史死事傳序引王凝妻李氏㫁臂事謂忍恥偷生之徒宜聞風知媿論者謂歐公此史以治法繩亂觀其所叙而閔世之志見矣公之於政猶歐公之於史也是舉也豈為婦節勸哉臣死忠子死孝激勵於素而兾其成焉由一郡以及天下崇徳尚賢培養元氣舉斯心加諸彼而已矣集之成也公既序之兹復以末簡授寳寳不佞謹書祠祀之故為政人告而死事始末顧若畧焉葢有諸作者在也漕政舉要録序昔者聖人繫易葢嘗曰聚人曰財財莫大於榖粟榖粟之在天下必厚儲於京師京師人之大聚也儲不厚則人心離故京儲天下之命有國者重焉然其初在民非耕也不穫非歛也不積穫且積矣非運也不至昔者秦人以陸元人以海皆運也然其為事既勞且險君子病之故言運者以漕為貴漕之法有轉輸有直達其論尚矣今之為漕者寓倉而支取諸轉輸比舟而兊幾於直達自罷海運以来至是法凡幾變變屢則務繁務繁則因革損益之故歲積月累不可勝窮而斟酌擬議具足以為變通之地凡有志經世之士皆宜究心焉而況以是為職者哉寳為諸生時嘗讀三原王端毅公漕河通志竊知其槩比舉進士由許州入户部適有㑹典之纂與今少司徒太原王公德華同以郎中檢詳漕法始末且得其在都水時所為圖志者觀之於是凡政之闗於漕者粗若有見焉既而厯諸藩臬養士治民政以職異置是不講者餘數十年矣乃者仰奉明命承乏漕司視事之餘遂本二志所載徴諸户部副牘又叅以席主事書船志張主事文淵泉圖次苐手録藏之巻笥以輔記憶之劣端居靜思宜民裕國之道徃徃若有㑹於心者譬之為學有温故知新之義雖不敢以勤自慰而亦不敢不以逸自懲也書重典章易尚通變並行不悖則存乎乎人焉爾矣寳不敏行將與聞廷議當從諸君子講而求之以為上獻録凡若干巻曰舉要者未及詳也欲詳者盍於諸圖志求之湖南道學淵源録序湖南道學淵源者録宋大儒五君子之蹟也五君子者為濓溪周子為明道伊川二程子為晦菴朱子而南軒張氏附焉葢濓溪世家道州明道伊川生於黄陂而晦菴則與南軒屢為南岳之㑹是以統曰湖南而並録之所録者有詩有文為體不一而五君子之蹟在湖南者於是備矣初提學陳先生文鳴之為斯録也葢將以興起湖南之學者也而或者未得其意予嘗思昔孟子稱陳良楚産恱周公仲尼之道北學於中國夫周公仲尼之道天下之達道也然不遊中國則不可得而學焉由是觀之道學之傳雖係於人亦係於地在理若有固然者湖南古楚地也由周而来二千餘歲矣乃有五君子者生長遊寓其間所講服者皆周公仲尼之道至於今流風遺澤徃徃未泯故凡學者之求之也葢有不必出其鄉而自得焉者地同時異而學之難易係之提學君之意葢出諸此或者又以濓溪道人卒葬九江程子洛人朱子閩人張氏則廣漢人也矧其平生所過殆遍天下彼凡一言一行莫不以鄉以寓各有録焉湖南一方夫焉得而專之夫道至周公仲尼天下所同尊也而稱其化之盛必曰東魯為天下望國豈有它哉近而已矣予嘗譬五君子之道猶水也謂水之流行遍於四澤而此謂淵源將不可乎繼自今有志於學者始於一鄉終於天下又尚論古之人不惟其蹟而惟其心五君子之道得則周公仲尼之道於是乎在方今聖化流洽與海逺邇道徳風俗軌轍惟一湖南東魯此固提學君奉詔之志而其所望天下者抑豈敢後哉君醇學雅行正已作人惟五君子是式其為道興建甚多兹特其一耳觀學者盍通求之録凡若干巻酆都志序古者國有史史必世官惟世故專專則實而審公而㫁傳之天下後世而不誣若董狐在晉太史在齊倚相在楚是也今之郡縣葢古列國之變然不得為史不得為史而志出焉志無世官則於誰作而可無世官而有世族世族者文獻之所在也族有人焉以學以政於時稱才志之作舍是人將焉歸哉酆都為縣國朝以進士舉者惟僉憲某菴先生而温甫繼之所謂文獻世族者莫有盛於楊氏矣故論者謂温甫宜為志固若職分然而温甫亦以是自任采擇以求實去取以求公如不得已焉凡十有五年始克成編烏乎志之病也乆矣而非獨才之罪也葢附望以為雄其病也誇逞浮以為富其病也俗崇異以為竒其病也詭三者有一焉皆足以壞志之體況兼有之乎此無他執是筆者非宦焉之吏則㳺焉之客所謂實且公者無恠其慊焉而未足也況才之在人又有稱不稱哉今觀斯志簡而不誇質而不浮正而不詭學以基之政以叅之而文獻之不可誣者於斯焉在君子謂斯志也其史乎古之為史者觀其所書而知其所不書故左氏釋春秋毎致意於不書之故以求聖人之情其義精矣今天下言酆都者多神恠之説而温甫顧畧焉不書則其所書者其實而審哉其公而斷哉書曰絶地天通此天下之大義也以一邑之志而大義存焉使其當國史之任又將何如邪温甫有史才無所發而寓於此君子葢深惜之其請序於予久矣至是乃克以復其亦以是也夫重刋孔子家語序孔子家語若干巻王肅序以為皆當時公卿大夫士及諸弟子相對問之言其正實而切事者既集為論語餘遂别出為此書相傳至荀卿送入秦府故不以焚滅然博士孔衍則言漢武帝世孔安國因魯壁書撰次以成戴氏集曲禮乃取而禆益焉厥既入禮遂除家語本篇其説與肅稍異大抵㫖則夫子記則門人蔵以地異出以時殊其未列於經無足恠者朱子嘗謂家語是當時書然而不純烏乎得之矣寳讀春秋三傳及莊列諸子史漢諸書其間引孔子語或真或偽多可議者嘗欲手録其詞竊加辨論以與天下學者商確焉顧識與力未之能也況家語乃古成書君子讀而思之因而辯論其純也准諸經其未純也亦准諸經以求合乎聖人中正之則此亦格致之大端也或謂記者留此為病豈其然哉監察御史黄君希武視學南畿博求遺書此其一也頃以刋成屬其門生喻貢士義請紀嵗月寳不敏謹述所聞為序中和堂録序中和堂録者吾友施君克和録其先君子北野公所得詩文於人者也中和為公堂之名以之名録尊其父也録既成編克和授簡於寳寳因得讀之率一時名碩之筆雖隠顯不同而時稱作者則一也可謂盛矣公以儒醫名吳中凡三至京師公卿以下皆禮為客及謝事歸縉紳東西行者多造其廬葢公慕賢愛士老幼一節是以能致多如此不然則亦何有於是哉且中和云者斯道之大宗也吾儒以理而醫者以氣皆不外此觀公所以名堂則其平生從事可知矣是録所集比興備於吟咏事理具於序論葢不必登其堂而公之風采可以盡得之譬之丹青其可謂極似者歟況窮觀所交逺觀所主古之道也非鄉士則不能友於一鄉非國士則不能友於一國君子於公可以觀徳焉古之孝子思其親者於凡居處笑語無所不用其誠克和以是誦之以傳之人人則公之心術精神將終身一日矣豈直居處笑語之間而已哉君子於克和又可以觀孝焉克和才瞻學充其進未艾所以為公顯揚尚有大於此者寳不敏當為續書之林氏家譜序凡譜為家作也其要在辯族姓序昭穆明冢介嫡庶而家政行焉故天下之家各譜其譜而王道成譜之於世其亦可謂重矣然譜以脩理亦以脩壞壞之端有三冐望則壞養子則壞贅壻則壞故譜不可不慎也葢嘗論是三壞者曰養曰贅多知戒之而望焉是冐雖士大夫亦或不免況庸人乎閩之林其族最繁其所宗也最逺道逢其人問之則曰吾某宗也今某公卿為伯仲行觀其譜而信之天下無異議焉今户部主事魁廷元者之為譜也則異於是葢諸林滿郡邑獨據所知以為始祖而族姓辯代為圖系兼取歐蘇上承下繼而昭穆序人各著其所出而冢介嫡庶明所謂三壞者皆無之君子以為善譜廷元初以進士有事江西予方承乏視學一見為相知今予領督漕命道出臨清廷元適監倉政奉斯譜告予曰願有序也廷元之先自隠菴府君以下世以敦朴愷弟相承至於今韋布而詩書者甚多廷元博雅有志好學不倦其所樹立將未可涯觀其所為譜而世徳於是乎徴矣因書而歸之送方伯徐公赴湖藩序寳為童子時聞先生長者論鄉邦人物慨然慕葉文莊公之為人謂其亷介不羣名重當世稍長得其文辭而讀之又聞其立朝議論與其所以施於外藩者乃知文莊之學問政事足以追古人而上下之非直一節而已也自是每見其門生故吏輒詳詢焉有謂寳者曰文莊前堂内寢各置文正范公圖像退朝政暇拱手黙對良久乃去夫其若是也豈徒然哉葢心孚神㑹前奮後興不啻親炙焉者是宜其所造之至爾也惜夫威儀日遐有不得拜階下以望見之恨及来河南進謁於大叅徐公公以鄉晩命進之坐而論政首舉文莊所以待士者詔之又以文莊所謂水東日記者示寳寳退而考吾徐公之所行一本其所學不少移易其風采足以消邪心其操守足以愧貪俗葢後文莊而興起者其言必稱文莊也亦豈徒哉寳嘗以為文莊不可得而見乃今得見徐公焉夫范公與文莊皆吳産其出入將相大率皆同而所建立亦各彰彰於天下徐公敡歴中外茂著成績今又奉命布政湖藩其入以輔理葢有日矣由文莊而希范公孰得而禦之吾見鄉邦人物之評又不落莫矣寳忝從屬吏之後方以慕文莊者事公而不獲終領其敎狂斐之志竟何如哉故於公之行敢有言於執事謂後進之於先達道盛徳而賛休聲以播於人人寳之心也若以當贈言之列則寳豈敢送施别駕序今天子改元之春首詔史臣修先皇帝實録禮部請遣進士若干人分詣各省采集事之當録者以備叅閲于時吾貳守施君以河南省檄有事編纂將行寳與僚屬具酒殽餞於北門外酒半寳起言曰世之人有忠直而不信者潜徳而不彰者憸邪姦宄而不露者事有是而或錯者非而或舉者一時之論晦而無徴則曰後世有公論焉後世之公論奚慿慿乎今之紀録而已矣昔人謂左氏傳失之誣胡丈定之説春秋也乃多取之不得已也今夫理官之聽民訟成案既具雖有大吏者徴詞而閲實因而决㫁者什九從而平反者什一何則彼其始定之辭則然也史也者天下之大案也縂裁也者天下之大吏也君之為編纂也聽乎詞以定案者也大吏將於是而徴焉書曰察辭于差差不差出於民之口察不察係乎吏之聽史之成與獄之成孰輕重乎君其辨之矣勿以一方為小勿以一人為寡勿以一事為微勿以一時為近天下一方之㑹也衆人一人之聚也萬事一事之集也萬世一時之積也君其慎之君學問博洽壯既困於禮部晩復屈於有司其更事且多今其行也豈患其不慎哉惟古人贈言之意不敢不告耳君起謝請書為序送石汜水赴召序環府州而列者皆縣也此得一人焉以為令則其民欣欣然有生意彼不得者反是一人之後復得一人焉繼之則所謂生意者不冺而愈滋是其民之幸也茍今日得一人矣而繼此或不得吾見生意轉為戚容地若易而異者夫一縣之休戚係一人一人亦易得爾然方千里或七八百里而為府四五百里或二三百里而為州府州之所統不下數縣不得其人民有戚容者什八九而欣欣然有生意䝉得人之幸者纔一二而已甚者咸無焉此豈激勸之典有未至哉今之制縣令有治行者率内遷數十年来聞某縣起一人為御史矣曰此亷而材者也又聞某縣起一人為御史矣曰此勤而能者也人人而詢事事而核歲歲而計起一人必㧞其尤激勸之典如是其至而得人之效又何其難也盖激勸之典懸於上出于一時而士之所學所養則藴蓄於中而定於平生平生有是學有是養則固是人也彼懸於上而出於一時者得之固可無加榮焉不得亦可無加辱焉自一命以至卿相皆然而況一縣乎藁城石君邦秀以進士来令汜水至是六年矣其所行寛而有節簡而無缺汜水之民所謂欣欣然有生意者與疆域廣狭施及隣境亦質平焉故鄭一州縣凡四開封一府縣凡三十六得一人如君者一汜水而已豈惟一府一州哉雖一省之内縣加數倍得一人如君者亦不數也可謂難矣君藁城望家世以經學相傳葢有所藴蓄而定焉正吾所謂其人者其有聲於一縣固其素也使天下之為縣者皆如君則得人之效又何患乎其難之有寳與君以場屋事嘗再聚於汴遂為相知葢望其為御史久矣今茲之召方將走書為賀而其縣文學孔君乃以祖道之序見屬寳故道君之為縣而能幸其民者以為贈葢為君言之而非敢妄論夫天下之事也若夫君它日之政之大者寳不佞請于汜水觀之送楊户部使甘肅序𢎞治甲寅冬甘肅有邊警守將以聞詔司馬治兵司徒㑹餉大為戎備越眀年乙夘春復有言者詔廷臣議可否僉謂兵宜振不宜輒興而所謂餉者則當預為之處大司徒乃請勑其屬才且綀者一人徃蒞焉於是陕西司郎中壺闗楊君以選當行凡我僚友無不壯君者或為歌詩以贈而謂寳宜序寳謂楊君領天子命而督運於西陲其事甚大在它人或難而君為之甚稱大司徒其知人哉楊君讀古書見古人處邊事成敗利鈍之迹葢嘗一一熟籌之矣自君為主事時嘗領命稽閲居庸等鎮倉儲其為員外郎也又嘗領命賛漕事於東南及為郎中實司陕西諸邊諸邊奏請歲無虚月君按章覆議例比義斷左酬右應動中機㑹所謂出納舒縮進止速緩葢其素具也今飛輓者吿勞屯戍者吿病庾廩告虛士卒告乏兵非有加食乃不足此其故何也君行矣將有新政邪將舉舊政而復之邪夫亦去其害政者而已雖然去細害易去鉅害難此知務者之所留意而深察也夫國家之患在戎夷而疆場之守在兵食食既足有自奮之兵兵雖精無自足之食食之所繫亦大矣哉詩曰載馳載驅周爰諮􅓪君奉勅外幸畫一敬獻天子施行焉此亦使臣職也寳不敏何敢序諸公之作哉聊以是為楊君吿送李大叅赴廣西序人之言仕者皆曰儒吏異途又曰内外不同體其果然哉夫吏固不能為儒儒而吏也簿書之中有義焉於從政乎何有然吏於内者親上典法為宻吏於外者親下事情為滋宻者所以處其滋必盡其滋而後可以言宻由是觀之則内外不害其為同而儒之與吏又安在其異也哉南海李君元善始事白沙陳先生得静虛之趣繼而北遊京師聞見日博而學問文章益贍以雅葢所謂儒者也及登進士累官户部雲南司郎中兼京兆及東南漕事京兆多豪猾徃徃欲有所撓而漕事之宜又歲更月異君一斷以義理不亟不徐卒底於成在位若干年奏凡數百上上輒得允今年春吏部舉最當遷上擢君廣西左叅政命下之日君語諸僚曰吾久服在内行之外也將若之何夫君之為斯言固周於慮者然内外之不同者體耳體不同而理同舉以措之宜無弗逹矣葢政莫大於典法天下烏有廢典法而可行者哉故以典法而驗諸事情則非具文以事情而稽諸典法則非臆見内惟是外亦惟是而後謂之良吏它日以牧伯最君者當猶今也而奚慮焉勞於外而復陟於内為天子之大吏以收儒者之成功其尚有望於君矣君行同朝大夫士與君遊者皆有詩為贈而以序屬寳寳不佞竊謂詩可不序也儒吏内外之異同則不可不論也於是乎言送僧會定忞序忞兩住惠山凡二十年今年乃用薦者為縣僧㑹夏六月來京師得選而去去之日予因而想九峯於煙雲千里之外有餘情焉忞為僧將以遺脱世累為其道顧舍其山中之樂而役役於一官何哉或謂忞於其道也淺於是乎官烏乎君臣之義不可解於心天地之間雖欲逃之焉徃而逃之忞也井而飲田而食桑麻而衣裳安居無患於草木泉石之間其亦知所自矣縱不即我攸居而其不能解與其無所逃者固未嘗不存焉況敢自外於有司之薦乎葢吾猶恨其下山之晩也忞歸哉祝釐之餘尚以是告其徒容春堂前集巻十三
