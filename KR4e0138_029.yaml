body:
  text: 容春堂後集巻八明邵寳撰祝文二首祭文四首建家廟告文孝𤣥孫寳敢告寳勉建家廟于正寝東南謹卜八月二十八日上梁是日以新贈官階易書我祖考考二府君神主伺新室奉安敢用告知謹告家廟成遷主奉安告文維正德十年歲次乙亥十月甲申朔越二日己酉孝𤣥孫通議大夫户部左侍郎寳謹以特羊庶羞之儀敢昭告于顯高祖考叔安處士府君顯高祖妣孫氏安人顯曽祖考存一處士府君顯曽祖妣朱氏安人顯祖考贈通議大夫都察院右副都御史三益府君顯祖妣贈淑人楊氏顯考贈許州知州加通議大夫都察院右副都御史純和府君曰某徼福于我祖考致位内外二品頃因遷徙不常祠祀之禮缺然未舉今旣定居冉涇舊第乃於正寝東南建家廟四楹如皇朝之典中祀我髙曽祖考四代如小宗之制其間序次儀章參酌古今歸于禮義卽日新宫考成謹奉神主各安厥位繼自今嵗時月朔以享以薦祖考其時歆之尚饗祭陸士𢎞文某辱君友三十餘年自鄉達於朝易地而無胥斁自壮至於艾易時而無胥愆蓋君之精確有以起吾之惰而吾之朴直亦有以濟君之偏白鹿之期旣不可副南康之銜乃執筆以表乎青山之阡烏乎傷哉某也歸養以來病起居間絃歌朝夕與物周旋凡吾志之未畢于天下者思古人而我獲憑文章以自宣追念疇昔時用慨然聞君之葬不能徃會薄奠告哀有淚如泉尚饗祭先師文正公文正德丙子七月己亥少師兼太子太師吏部尚書華蓋殿大學士致仕西涯先生李公薨於京第越三十有九日八月戊寅晦門生邵寳聞訃於汪司業器之旣為位寝哭三日又十三日九月甲午謹具瓣香束帛遣家人寧奔奠于几筵之下力疾陳詞跽授寧以致之烏乎哀哉先生已矣今歲何歲惟先生壽七十寳嘗為辭祝之願其耋且期以至無疆而不意遽至此也今日何日旦夕企望復書且至而不意其遽聞此也烏乎哀哉昔在壬申寳初請養先生難之寳曰寳之情先生所知也古人以知已進今非知已不能退先生其謂寳何不荅未㡬再請得省視歸先生謂曰汝年尚强或可再至吾老矣恐不及見耳寳時雖聞此言然自度再見無期悲慘而别旣歸復請得侍養之命先生致政後貽寳書曰鄉見孫九峰言國賢行時不欲顯言别去此情此誼亦可與知者道也寳之心先生固知之今果然矣烏乎哀哉先生於天下有黙旋𢎞濟之功有允孚中立之德有大雅振古之言古稱三不朽者先生兼之先生我師而能成我所以生處我所以為食蓋有罔極之恩焉昌黎所謂傳道授業解惑三者先生皆有意於不肖或逺或近或合或離無非教者而寳未之能承也蓋至于今慚負方切而先生已矣𦕈哉我躬旣病而衰未耆而老及之誠有如今日者烏乎哀哉昔蘇子瞻祭歐陽子其言曰上為天下慟下以哭吾私寳於先生亦云雖然寳愚且逖敢慟而不敢陳重華之詞敢哭而不敢擬尼父之誄北向長號有涙如水惟先生鍳之祭司馬東山公文維正德十一年歲次丙子十月己酉朔越七日乙邜户部左侍郎侍養前户部郎中無錫邵某謹寓香帛果脯之奠哭祭于故兵部尚書前户部左侍郎東山先生劉公曰烏乎哀哉今年之秋月仲二十一日聞公訃于黎典寳越八日聞涯翁訃于汪司成涯翁吾師也公於吾亦有師道焉今皆已矣烏乎哀哉某戊辰别公於湖南於今九年壬申别涯翁於京師於今五年公老不起某母老亦不能起於公於涯翁計皆無可見之日然每一念慮舉措未嘗不馳意於京師於湖南以為公聞之此必我然也此必我異也或以心興或以心戒而今已矣烏乎哀哉公生八十年仕者四十餘年始自湖南發解第一登進士改庶吉士讀中秘書久之慨然欲以事功自見請就部選居本兵地者十餘年時權貴者薦公為亞卿公力辭忤其意禍且不測遂自請補外以去遲廻閩廣浙三藩又數年以治河召為御史中丞為同事者所忌功成僅轉户部亞卿又數年請老得予告以去未㡬起鎮兩廣召入為大司馬先帝聖明獨知公於諸卿間委以腹心将圖更化明良相遇可謂千載一時而宮車晏駕公請明農歸無㡬時内宄外奸合謀搆公逮公於家下之詔獄将置死地甘肅之戍亦阽危矣旣還數年乃卒惟天惟祖宗所以佑忠賢以存國紀者於是乎在數年以來凡朝廷有大任使大議論輿論必歸於公公今已矣烏乎哀哉某識公最晩吾師涯翁公友也某嘗問公於涯翁翁曰與物無競臨事敢為東山有之及某侍公謀議而觀其施行大抵務在曲成而不失其正惓惓接引於某亹亹不倦此吾所謂有師道者今則已矣烏乎哀哉公昔被逮寳以周易筮之遇晉曰康侯用錫馬蕃庶書日三接當是時蓋未知其占所告也由今觀之公受知先帝禮遇隆矣雖權奸害之而公之所得者固無損也免戍復官考終正寝此其兆乎論者曰然其然乎其不然乎不必論也洞庭漫漫南極蒼梧一雲萬里公之未卒蓋有懷而不敢言者久矣某東海病人也西望東山莫知所在寓詞一奠竊附絮酒之義惟公鍳之尚饗祭徐東之文維正德十有二年歲次丁丑六月乙巳朔越十有三日丁巳户部左侍郎侍養無錫邵某謹具時羞之奠遣家人壽致祭于故上髙訓導吾友徐君東之之靈曰烏乎嗟我與君早則相聞晩乃相與義形於詞有贈有處久要不忘平生之語宦學游從君知己者比病閒居君數慰予時徃歲來五閲寒暑手書繼言今纔月許夫何訃音遽至吾所江湖淼茫時方暑雨我酌我泉先我芳醑弔君未能徘徊溪渚尚饗容春堂後集巻八
