body:
  text: 容春堂前集卷九明邵寶撰雜著三十首守官針何以守官曰敬與廉敬則不忽廉乃有嚴何以守敬曰惟以畏國憲天彞罔或敢墜何以守廉曰惟以儉我用克節我俸亦贍循是二者靜以待之可否在事喜怒曷施民曰父母君曰臣子勉焉夙夜庶幾稱此同官針錫山邵寶為州於許五年而未即有功其幸免大過者同官之力居多焉思愼厥終乃作針曰同官為僚伊何其同莫非王事惟時天功王事同襄天功同亮惟私起爭惟公生讓詩詠攻玉易贊斷金我思古人實獲我心事否則否事可則可不必在人不必在我情義相孚同僚弟昆勿或有間斯愛斯惇德業相勸同僚朋友勿或有間斯敬斯久小子作針告諸大夫同寅協恭聖有嘉謨治河論上萬世言治水者必曰禹治水而不法禹可乎孟子曰禹之治水水之道也水之所以為水禹之所以為治無出此矣河也者天下之水之大者也禹之治水其詳見於禹貢其曰導河積石至於龍門南至于華陰東至于底柱又東至于孟津東過洛汭至于大伾北過絳水至于大陸又北播為九河同為逆河入于海者皆順導之法初無逆障之說故能成府事之功而天下稱神其極至於地平天成焉由今觀之其所空之地甚廣所處之勢甚易所求之效甚小是故其成功也如此今之治水者其去禹也逺矣而所空之地乃狹於禹所處之勢乃難於禹所求之效乃大於禹欲其成功不亦難乎何謂所空之地狹於禹蓋禹之導河自大伾以下分播合同隨其所之而疏之不與爭利故水得其性而無衝決之患非無衝決也彼自衝決而非吾之所得與也今夫一杯之水舉而注之地必得方尺乃能容之其勢然也河自大伾以上水之在杯者也大伾以下水之在地者也以在地之水而欲拘束周旋如在杯之時大禹不能而况他人乎今河南山東郡縣棊布星列官亭民舍相比而居凡禹之所空以與水者今皆為吾有蓋吾無容水之地而非水據吾之地也固宜其有衝決之患也故曰所空之地狹於禹何謂所處之勢難於禹蓋嘗觀禹之治矣隨處施工初無窒礙亦無拘限今北有臨清中有濟寧南有徐州皆轉漕要路而汴省在西南又為宗藩所在左盻右顧前瞻後望動則肘掣使水有知尚不能使之必隨吾意况水無情物也其能逶迤曲折以濟吾之事哉故曰所處之勢難於禹何謂所求之效大於禹蓋禹之所以為治去其墊溺之害而已此外無求焉今則賴之以漕不及汴矣又恐壞臨清也不及臨清矣又恐壞濟寧也不及濟寧矣又恐壞徐州也使皆無壞又恐漕渠不足於運也了是數者而後謂之治故曰所求之效大於禹以若地處若藝求若效雖使禹復生恐其難矣而或者猶譊譊然曰某為上策某為下策某為中策則惑之甚也然則奈何哉求其大治必至於大亂先王知其然是故以不治治之治之以不治者乃所以深治治之也某於河亦云治河論下夫所謂治之以不治者非不欲治之也蓋難於其治也難於其治而遂不之治則其患有不可勝言者君子顧忍坐視吾無辜之百姓受兹酷烈哉今夫人有病其勢篤且死也將求醫以治之歟抑亦委之於不醫歟委之於不醫是待死而已矣是故謂河之不必治者待死而委之於不醫者也茍知求醫矣而謂其可恃以必不死且至千百年之壽此所謂不惟無益而又害之今之治河者何以異是是故亦治之以不治而已矣蓋河自周定王時北徙漢氏而下決東郡決瓠子決魏之館陶分屯氏決清河靈鳴犢口其變非一議者或欲疏禹之故道或欲塞所決之口或欲分流以殺其衝決之勢或欲築堤以障其泛溢之虞或又有望氣用數而謂人力强塞未必可以應天者載考前史歷歷可見亦今日治河者之所熟講而飫聞者也雖成敗得失不能無辨然譬之醫者其皆一方乎茍不問其緩急先後執一方而求病之愈不愈則歸咎於方豈方之罪哉用方者之罪也取古之方隨其緩急先後而用之此所謂治之以不治者也故如漕渠急則張秋等壩所當先築而疏故道塞新決分流諸派次焉然故道若高則不必於必疏新流若下則不必於必塞其間泛出傍溢或用疏法或用塞法以水治水吾無容心故曰取古之方隨其緩急先後而用之此之謂也今河之為患如一人之身而具百病者也朝輕而夕重表减而裏加雖有盧扁不能使之全愈也故必得良醫師坐守其側切脉觀色聽其聲音察其寒熱究其病之所由起盡心力救之如前所謂取古之方隨其緩急先後而用之者幸而愈則調理如故不幸而復發於此則改圖而治之是故有求醫無遣醫藥餌常備攻治常施而不必其成功要於不死而已矣故曰治之以不治今治河之大臣良醫師也工與料藥餌也凡所謂疏塞分築之類攻治之法也為今之計宜常設總理大臣更置其屬頻巡視謹調護任滿則代或加命使仍其職而不必其功之成備工與料而惟其所用焉可也然大臣之任其事在朝廷疏塞分築之類其事在大臣而所謂工與料者則在民矣民可使之困乎故治河非難也備工與料之為難也王魏論或問王圭魏徵不死建成之難而從太宗君子以為害於義然歟曰不然王魏之於建成非君臣也何死難之有子游問曰喪慈母如母禮與孔子曰非禮也古者男子外有傅內有慈母君命所使教子也何服之有王魏承高祖之命而為建成之輔建成固不得而臣也王魏何從而為之死哉曰其事太宗可乎曰不可王魏義當死者也何也以建成之難雖不當死以高祖之命則不可不死也曲禮曰國君死社稷大夫死衆士死制受君命而輔太子其為制也尤重安危榮辱死生以之今有人焉殺其所輔而奪之位乃恝然莫之省則何以復君命矣且太宗以弟殺兄以藩王殺太子是有無君無親之心比於篡弒特一間耳在春秋之法所謂人人得而誅之者况為其輔者乎王魏於此盡力致討死而後已焉可也故王魏雖不當死建成之難而不可不死於高祖之命也如之何其事太宗也曰死建成則死死高祖則死死有異乎曰死非異處死為異均一死也此是彼非義則然耳故王魏之不能死固天理人心之所不與也然以建成而責其君臣之義則彼猶得以辭其責以高祖之命責之九原可作吾知其百喙不能為辭矣曰然則尹起莘之論亦無不可曰由尹氏之論此亂臣賊子所以接迹於世也烏乎可事難事之難者天下有之矣然東萊呂氏獨以祭仲之女子南之子之聞將殺父也以為天下之至難而君子之所當先講者卒乃引伐國不問仁人謂君子必無此事而不必講也豫謂天下之事有可以意度者亦有不可以意度者對孝子而公言將殺其親固世之所無也假令彼不吾告而或偶聞之而或陰得之則亦將推託於不知而聽其自相戕賊哉棄疾於子南父子也於楚子君臣也當是時子南在楚蓋僭越之甚而無君之漸萌矣而一旦君以殺其父告使棄疾而泄命則子南必先圖於楚子否則坐視親之將見殺而不顧也由前則黨父以讐君由後則從君而賊父忠孝之罪人棄疾曷逃焉為棄疾之道者既聞是命必免冠徒跣號泣於庭以告其父曰吾族有位於國世食其祿以為巨室今王之弗强一國之所知也而吾乃攬其威權利其寵靈俾國人上下皆謂主降臣逼王亦不自安將有虞於吾族竊恐有擬吾後者雖王亦不能止也盍棄位出奔以全先大夫之祀乎如是懇惻至于再三假令不從則再拜而自盡若申生之為者吾親之心庶其有感而君父之難萬一可解也豈不愈於自經於溝瀆哉不然從父起居父生則子不敢死父死則子不敢生固常情也今不此之圖乃曰父戮子居將焉用之泄命重刑臣亦不為何為者邪若夫雍姬之事則尤有可論者父者子之天也夫者婦之天也國君殺大夫而專之非法也且命其壻以賊其舅君非義令臣非義共平聲君不可諌夫可諫也諫其夫以逃不義一舉而全二天此雍姬之道也諌而不從夫道絶矣則告於父而自經焉以明吾心其亦可也雍姬不明此義乃泄其謀而視其夫被戮以死豈不誤哉雖然棄疾不惟可以諫父而亦可以諫君雍姬不惟可以諫夫而亦可以諫父不從則死之死於君猶死於父也死於父猶死於夫也死於君為忠死於父為孝死於夫為義烏乎孰謂天下果有難處之事哉銅雀硯銘兹惟陶氏遺鄴之野摩挲漢年尚論作者俾與端居彬然文雅噫彼豈為硯我何用瓦器不以人時哉用舍葉司徒贊偉哉葉公經濟之資遲回抑遏至老而施中外後先閲歷二紀凡諸物宜驗之在巳既成文治溢為戎勳南丹單騎荔浦孤軍岷賊有徒怙凶惟舊公計滅之如縛病獸公在北邊如其在西益障損戍精耀鼓旗是皆公功公則不伐從容廟堂藴乃丕發國計民生惟大司徒公曰艱哉我何以圖內帑外庾歲漕月餉通融有無公執其量嬖人肆驕公語諤諤戚氏專利公疏鑿鑿彼以其寵公以憲章以國以民披肝瀝腸帝曰都哉惟卿議是其所否者什才一二公胡能爾曰識曰才識以聽納而才以裁若古大臣厥亦無愧先憂仲淹善斷如晦七十一年乃老于家錦衣犀帶淮水之涯公壽無疆天用鎮俗考德于何名臣有録石祁子贊沐珮則兆吾弗敢知吾所知者凶吉異儀或兆或否偶邪非偶大哉禮云維臣子守紀叔姬贊國亡君亡吾將曷歸父母邦魯先君廟酅歸不于魯而酅是依烏乎叔姬泉研銘我石汝琢我泉汝名無絶其源我心汝盟畜之池盈放之川行我詞汝徵白石硃研銘堅白者石圓方者池中渥者丹我其用之菽水堂銘維士養親鼎貴多有有鼎有實厥味維厚物有貴薄亦惟其誠我分乃是菽水三牲水曰𤣥酒菽曰嘉穀至薄而腴義我所欲所欲是承樂在其中菽水匪歉三牲匪豐茍為不義君子所棄一芥萬鍾理罔或異盜泉不顧仁粟必求是物是誠孝哉惟休我銘君堂要在養志參何人哉希之則是江西小硯銘介豫汝嘉貞汝豫樂持汝論士豫斆豫學勺汝為川卷汝為嶽汝尚相豫無忘始作也杜氏琴銘物以素貴有如此琴𤣥酒大羮實維我音或鼓而歌聽之者心庶幾古人復見于今乎閟宮說閟宮詩人頌禱其君以伯也僖公之時天王失馭諸侯彊有力者肆為侵暴而蠻夷戎狄亦皆起而猾夏生民之荼毒甚矣故志於當世者莫不慕桓文之事焉閟宮詩人頌禱其君曰遂荒大東至于海邦又曰遂荒徐宅淮夷蠻貃及彼南夷又曰戎狄是膺荆舒是懲至論其所以為之則曰公車千乘公徒三萬夫以車徒之衆而闢土服逺兹豈非桓文之事歟於此而少進焉則有詩人之所不能及者故曰魯一變至于道此仲尼之志也書録費誓詩録閟宮得巳哉得巳哉觀陶說邵子觀于景德之陶歷群工所咸造焉客或嘆曰吁陶之為器其難矣哉方其取土於山猶夫石也碓而粉之澄之以水濾之以渠浥之以甓和之以漿始可以揉而規之又必削其未整焉因以壞者什一磨其未澤焉壞者什二潤之以膏飾之以采內諸火而出焉壞者什五其幸不壞者璺隙疣玷又什之三蓋自始規而至成器以獻于尚膳其不得與焉者多矣然取土而舁者若干人碓者若干人澄者濾者浥者和而揉者削者磨者潤且飾者納諸火者各若干人凡越工者十而后器斯得其成也其獻之上不過備一御耳為之如是其難而用之不以為異是可嘆也邵子曰是誠難矣雖然吾猶以為易也夫取土而制其質澄濾浥和而後就規刮磨潤飾而後就火茍不壞者皆成器矣器而獻之不過三月則離山野而薦諸郊廟陳諸宮寢祭祀享燕實與有用焉斯亦異矣視其為之之難亦何負哉乃若君子之修身以待用者材以為土學以為碓戒以為澄省以為濾從義以為浥力行以為和循禮以為規研精以為刮師友以為磨出詞以為潤表儀以為采自試而徵之以去其疣隙玷璺近者十年遠者三四十年曾不得望君門而效用焉甚或終其身於山野其視夫陶也又何如邪寶方陶於人才知其難焉故陶吾猶以為易也客起而謝曰吾聞萬室不足於一陶今乃知其難若是雖然器猶末也請著以為說俾用才者知焉宋穆公論宋宣公之立穆公也不使公子與夷避之穆公之立與夷也則使憑也出居於鄭且與夷之將立也有非先君之意之言而憑也承穆公之命乃無遜詞以對其弒奪之禍固不待他日而後見矣豈有敢為弒奪之人而可授之國乎吾嘗疑穆公重嫌以致亂由是觀之穆公之擇繼彼善於此固必舍慿而立與夷之為是也况使慿出居所以防之亦甚周密與夷於此茍能修德和民以好鄰國則其位自定顧與逆賊合謀欲求除害而卒及於難蓋自求之耳故君子謂之饗之道其常也饗而不饗與夷之罪也豈穆公之罪哉而或者以纍宣公抑又過矣學禮不議說非天子不議禮禮者所以品節乎道道無變更而禮有損益損益之要其因以時其起以義故不敢議也雖然君子豈可不學哉子曰吾說夏禮杞不足徵也吾學殷禮有宋存焉吾學周禮今用之吾從周由是觀之則孔子於三代之禮皆嘗學之矣其所以不敢議者非義不足也時不當也時茍不當而欲議焉雖聖人不敢而况他人乎茍惟視為外事而於損益之故漫無考究則局而未博泥而未通雖聖人不能而况學者乎是故君子之於禮也學而不議因時起義有待而用焉斯得之矣劉忠愍公像贊劉禮部景玊以其祖忠愍公遺像見貽再拜敬瞻乃作贊曰於忠愍公侃侃堂堂在正統中修省有章惟辟福威是膺戎狄義形于言諌匪公職公如元氣柱我邦家彼奸賊公乃動于邪公學春秋上師孔子知有君臣不知生死死道多端公為其難賴公存者堂陛衣冠今日何日獲瞻公貌我淚潸然為天下悼諸侯葬稱公對或問春秋於諸侯之葬曷為槩公之曰從其臣子之私稱也曷為從其臣子之私稱曰見其私諡也私諡可乎曰古者生不爵死無諡諡與爵非天子孰敢議之天子之諡諸侯奈何曰從法而繫以爵使札對或問吳子使札來聘在昧夷卒三十年前仲尼何貶之預也曰兄亡弟及既有父之命矣則札也實君之二也吳子烏而使之是使也札將無意乎不然何歷之諸國觀樂論人從容暇豫如此傳曰季札使而亡焉得其心矣此春秋貶札之實也何預之有曰傳稱壽夢賢季札欲立以為嗣札辭不可然後立諸樊則札之辭壽夢巳聽之矣其必欲致國者乃諸兄之意非父之命也曰兄為君兄之命君之命也况初意出於父乎小宗祭法對談萊州問小宗祭法於寶寶對曰祭法與宗法表裏唯大宗有太祖之祭小宗則不敢祭别大宗也小宗而祭太祖則宗法廢矣然則小宗之祭如何祭各始於所繼而極于高故繼禰者祭一世繼祖者祭二世繼曾者祭三世繼高者祭四世不四世不祧也此小宗之祭也小宗亦可立祖乎貴者賢者有功者以義起焉可也雖然必至當祧而議焉未祧而議是二大宗也將石亭針豫以泉名齊蓋感川流之㫖而勵志於道也他日或謂泉之流易濁汲水者必將以石則歷久而其清如故於是又以將石名吾亭焉比承乏浙臬有澄清之寄益用自警憲副謝君汝為聞而豫之為大書扁豫燕室且辱為之記豫不敏曷足以當此哉乃述鄙意針于屏間期無負初志云針曰山下有泉其源本清出山乃濁豈泉之情歷澗而溪塵沙汨沒視我蒙初幾如二物我泉我汲我石是將石置之水隱有激揚出山在山清也如素不逺之復維此石故維石何為維貞維靜壁立頽波何動不定動靜相資厥修乃來放乎四海石哉泉哉觀我軒銘豫自臬司來浙省既適厥居旁觀其東得隙地焉遂軒其間公暇居之有客請名名曰觀我顧其義未之詳也乃復著銘以俟詢者其詞曰人有恆言靜觀萬物萬物我備我其敢忽觀物於物盍于我心充之益宏鈎之益深以我體物以物徵我揆協後先原逢右左動不可亂賾不可惡我分固然求我矩度寂然不動我觀其幾感而遂通我觀其宜孟曰養心程曰定性元公有圖示我主靜一事豫耻一夫豫辜至公無我大哉聖謨自公退食我坐我室俯仰兩間萬物職職物我異分而無異觀我庭廓如地容天寬從事於斯是政是學匪敢為迂先民有作瘞卷銘江西諸生小試文總三萬餘卷蓋自𢎞治庚申至乙丒凡四視學所得也念皆英才精力所寓故携庋草堂時一展焉然紙久則敝敝則棄且䙝者理必有之於是穴地以藏為銘其上曰是惟奎壁之精廬蠡之氣其騰耀而不可掩者既行於世矣兹其不可久者亦安可棄也還之造化亦曰義哉亦曰義哉松壇銘賢哉二大夫昔聞其語今乃見之古色蒼然挺乎儼而我壇於斯參其離立山空無人仰不可及黿峰銘九華煙霞五老氷雪夫何縹眇飛來奇絶天柱不折日觀無窮我歌武夷考此石鍾于嗟乎峰時雨亭銘有序今年春二月都御史彭公奉命勦河南流賊越四月賊平復命移師殪東賊之逋于南者公至潁州飭戎僉憲孫君伯堅避分司以館公榜之曰都臺維時大暑遂門其寢之北壁除地為庭且亭焉公坐以籌體舒神暢伯堅請名公名之曰時雨蓋謂師出天王其神速如此伯堅以公命使來請銘初公得命將行豫方在朝數與餞燕嘗擬功成之日為詩頌之今而果然吾聞古之能師者惟貞以吉惟威以濟惟全以勝惟豫以立而濟之以機成之以斷公通儒也知用是道為王師將克成厥功且不自居而歸之于上亭名時雨不亦宜乎伯堅素著風裁於是師有勞焉銘曰有鎮斯川宿我重兵有屹斯臺有翼斯亭孰亭臺中而時雨是名吁嗟偉哉彭公中丞巾丞有文中丞有武鉞秉節持自天子所拯我人斯殱彼豺虎中原既汛遂指南土民則大和式歌且舞維此舞歌中丞之功中丞曰吁帝載天工公贊神算桓桓我師譬彼大旱雨來孔時人亦有言王師時雨公維雨師既雨既處侃侃憲臣從公于征乃後乃先駕風鞭霆有榜孔昭上對天日大田既膏嘉榖既實江漢滔滔河汴湯湯以蘇以潤雨流孔長公以雨來斯焉戾止時雨時暘其自今始人視亭只如棠斯陰公像弗留尚留公心原壽原壽壽封承德郎户部主事草亭成君也正德辛未君以子汝從貴致山東寧陽教事就封而歸又明年壽七十汝從適還自京師乃大設燕以姻友賓客祝焉謂寶與君夙同庠序請為之詞乃作原壽以歸之其文曰壽其原於人之始生乎譬之射者其矢之注而發也力逺則逺力近則近於是乎有修短焉抑又有修短者由射於百步之外也其始發如是而風雹或撓於天陵木或絓於地干㦸或拒於人發雖力未有能至者故或五六十步而止或八九十步而止其至少者弗論也夫人之壽亦何以異是哉是故或定於妙合之初或起於倉卒之變皆弗可得而知焉而亦歸之數雖然物之無情非若人之有欲也故射之為物非外物阻之發惟弗力力斯至矣乃若人之生也則有莫之戕焉而自賊其性情者故惟至人為能全其數下此而保其數者鮮矣孔子曰人之生也直至人者直乎直者也其餘則未免雜之以罔瞬息之罔生理虧焉理虧而氣亦虧由瞬息以至於旬時以至於歲年數之修短又於是乎在人見其若是短也若是修也乃亦遂謂之數數一也前所謂數人與物同後所謂數人與物異同焉者存乎天異焉者存乎人書曰若生子罔不在厥初生自貽哲命此之謂也是故數不可以加益而可以保全非知道者其孰能與於此然則年不可引乎夫貞觀者天地而有時乎傾缺貞明者日月而有時乎昃虧數則然也數之所在天地日月且不能違之而况於人乎儒先君子嘗以作聖之功祈天之道喻夫引年者蓋即夫修為之至者言之固亦未嘗出於數之外也是故論舜德者謂盡其性君子以為允論周祚者謂過其歷君子以為誣豫於論壽亦云作原壽容春堂前集卷九
