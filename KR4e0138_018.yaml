body:
  text: 容春堂前集卷十八明邵寶撰志銘十三首明故亞中大夫四川布政司右參政加俸一級郭君墓碣銘君諱緒字繼業姓郭氏開封之太康人其先蓋出周虢叔逺莫可考已其居太康則元季時開封通判佑之子二翁始二翁子曽國初為御史臺治書子在豐行苑馬寺監正子浩娶王氏生子果六歲而浩卒王刑部郎中傑女也寡居守節育果以長歷六十餘年以貞節旌果娶楊氏有子三人君其季也君生七年父母繼沒祖母王復撫教之君幼端簡沉默提學憲副劉先生昌見而竒之進為邑庠生君遂勤苦自勵閉户不出遇歲歉嘗以所得廩米分給族人與人接莊不可犯成化庚子舉于鄉明年辛丑連得進士觀工部政有事楚府能禮却物饋楚王賢之既而授户部湖廣司主事嘗督運銀二十萬兩于陜西既給軍而主者以羡告君曰羡以正支法也歸之藩司𢎞治戊申升署員外郎蓋於是監水次倉者再監馬坊倉者一皆有善聞癸丑實授員外郎時宣府缺總儲郎中尚書山陽葉公言于吏部疏君名請升署郎中奉璽書以往宣府諸鎮嵗用糧草不下數百餘萬每招商則奸豪風聚時有持都臺某書謁者君叱不得售甲寅實授郎中歸蒞江西司戊午升雲南布政司左參議雲南去京師萬餘里君中州人僉謂非宜君曰分也過家置妻子獨行抵任日事事不弛鶴慶地山水暴發漂流廬寨君見途號者哺之野暴者瘞之民謂君仁大理䝉化諸土官侵賦銀數萬蓋久且隱君訪而追之其分守所至克殄久叛巨盜楊才輩數十人民謂君義且勇先是迤西有夷曰思六越金沙江界據地若干里積二十年拒不受撫至辛酉嵗勢益猖獗鎮巡合議以勦請事下公卿議撫之便孝廟重用兵從之有詔簡藩臬貞毅臣以往乃以君與按察曹副使玉同行旬餘抵金齒於是盧參將和統軍距所據地二程許而次遣官持檄往者皆被留不報盧還軍至千崖遇君語其故且戒勿迫君曰吾受國恩報稱正在此如公言若臣節何昔蘇武入胸奴十九年尚得生還况此夷非胸奴比萬一不還亦分內事也或謂君曰蘇君以黑髮去髮白而還君今白矣將以黑還乎君正色不答是日曹有疾君單騎從數人行旬日至南甸巖突不可騎乃斬荆徒步繩挽以登又旬日至一大澤戞都土官以象輿來君乘之上霧下沙晦淖迷躓而君行愈力又旬日至孟賴去金沙江僅二舍君茇以次手為檄遣官持過江諭以朝廷招􅝘之意夷人相顧驚曰中國官今亦至此乎即發夷兵率象馬數萬夜過江抵君所持長槊徑弩露機刀環之數重有譯者泣走報曰賊刻日且焚殺奈何久此君曰爾譯雖微者亦世受國恩不以死報乃為間邪因拔所佩劒指示曰明日我渡江敢復言者斬衆皆股栗君因賦詩見志思六既見檄諭禍福明甚又聞君志決即遣其酋長數輩來請聽令及餽土物供具君悉却去乃奉宣敕榜且與語云云大略先叙其勞次伸其寃然後責其叛罪思六等聞之皆俯伏泣下請歸侵地君曰此固我聖天子意也宣言許之皆稽首稱萬歲歡聲動地因詰盧參將先所使人出以歸君盧曹得君報馳至則已撤兵歸地受緬書矣是夏五月君歸至㑹城鎮巡以下皆極稱與或謂君曰君豈令公後邪何深入夷中而簡易如此鎮巡以狀聞詔豫奏事者官一級餘功伺核以録僉謂君且有殊擢越三年君考六年績道升四川督儲參政蜀財賦弊最天下君至甫一歲漸克濟用松建為蜀極邊內地轉輸勞苦備至率數石而致一石君建議歲賫米價銀往令以半糴而存其半貴則米賤則銀惟時酌給省費而便行之果然又一年正德丙寅始以雲南功加君俸一級丁卯君進萬夀表至京師因請致仕歸明年戊辰六月十有八日以疾卒距其生正統乙丑六月七日年六十有四配彭氏湖廣布政司都事頥之女纍封宜人子四人長存心義官先卒次存恕邑庠生次存志次存性女一適士人耿希龍孫男二承仕承美女三君所為詩有學吟稿撫夷録藏於家君忠確簡儉孚於家達於政豫以同官故知之久矣而臨事不避意氣壯偉復有如金沙之行者古稱士者使不辱命非君謂邪存恕手録所聞於君者為狀躬至京師請豫銘及豫南歸屢以書速焉豫故最君行為銘而序以先之俾歸刻諸碣君葬太康城西北壩王臺之陽去祖塋一里而近存志廬其側者三年哭泣之哀聞者感動銘曰侃侃郭君允維國士自司徒屬逺佐藩使天子聖眀夷乃爾負叶恃其險頑越我江涘維君承詔往問疆事叶君拜稽首有死無二叶君行孔艱叶澤左茅前叶胡逆不順彼夷亦人朝聞君言暮歸我地後不今如無能此濟大哉天威敢貪以功君歸自南兩卒一乘叶稍遷而西亟歸以東老請未幾遽告寢終廬焉銘焉維君有子廬卧三年銘走千里孝以顯忠子子臣臣我詞于碣以慰九原叶秦恭人沈氏墓志銘秦恭人沈氏故江西右布政使中齊公之配初封安人再封至今號後中齊公卒若干年其子鋭以卒之又明年某月某日啓公兆合葬焉乃述其行請豫銘按沈之先出烏程至宋逸士遇始徙無錫代有顯人恭人之父曰澤號順菴娶宋後諸趙氏實生恭人長而歸公公之先自其父封中憲大夫武昌知府修敬公上至宋少遊先生凡若干世中憲公以文行望州里與順菴世契故知恭人而聘焉恭人事公由邑庠生領畿薦登進士第歷官南京兵部主事員外郎郎中武昌建昌知府福建參政終今官凡若干年蓋勤儉敬慎如一日在南京嘗請于公迎其舅中憲公暨姑殷安人養于官愛敬兼致比守武昌以江湖險逺遂辭公而自奉以歸率二娣盡婦事時公踰四十未有子恭人置妾數人俾侍公公朝覲還恭人乃育殷恭人疾恭人憂形於色其喪也戚甚至毁既葬而公之建昌恭人謂建昌山水郡適協中憲公雅好乃復迎養如南京凡百供具恭人實承之公至福建十八日而疾作尋遷江西奉萬夀表于途疾復作遂歸於是中憲公老而康公與二弟日侍側以文字侑觴豆恭人在中饋猶新婦時也既而中憲公卒公繼之恭人以其子行事無違禮中憲公葬龍山地狹乃卜惠山聽松為新阡今墓是也恭人義以處恩親親踈踈各當其則順菴無後歲春秋墓祭後必及焉其教諸女得古女則每舉賢孝事諭而歆之居常以朴素自將非大節令不敢御命服敝衣必綴羡饌必藏恬愈靜重譬之丈夫類有德君子其諸家政綜理周密又類有材局者越七十而齒髮如壯至是一疾不起夀七十有四子男一人即鋭邑庠生娶山東參政吳郡毛貞甫女女五人壻錢稷陸含章過轅楊金華胡端含章故詹事冶齊公簡子金進士伯和子孫男三濂聘盛武臣女汶聘豫女漢聘四川布政使熊良佐孫女宣聖裔孫孔氏出也銘曰婦以夫貴賢不以夫賢以夫顯爰有令圖令圖如何為家作式天夀嘉貞允也弗斁方伯軒軒恭人間間與與翼翼庭無譁言維山有松風逺孔肅我銘恭人告我邦族處士西園公墓志銘處士西園公於寶為從叔父日寶從仕中外公家居實長族人邑大夫聞有負公租者欲為督之公辭以義比歲荒當免稅命多其數公辭以法鄉飲酒禮請賔焉公辭以德上官至謝不敢見有强之見者曰珍重父老有何云則對曰某老矣幸有從子為國驅馳某與子若孫采山釣水歌誦詩書不啻足矣何云之有曰是囂囂者無乃為矯歟曰某野人不知矯亦不能也其人敬謝鄉人愈益重公寶方恃公以免家慮而公忽不起矣蓋正德四年十一月五日也於是寶方休致歸訃聞于途慟哭之餘既以不與斂為恨而猶幸葬之及㑹也昔寶幼學時公嘗慷慨執寶手曰吾祖積德久而今得汝汝將何以副之寶謹謝不敏退而感奮蓋為教甚厚今且老矣而猶夫人也每以是愧公公之葬也非寶為銘而誰為之邪公幼頴敏依其舅氏於閭江從李絅菴先生學博洽書史能為啓劄詩詞既而補邑庠生終歲謝去而讀誦如故對賔客道古今事亹亹不已至究其悉皆出諸胸中未嘗剿一語於人性尚簡朴偉貌長軀巾葛衣布乘小舟過山郭瓢飲缶歌或笑其陋公若弗聞也間當輸料京師或欲代行將不利於公公毅然挾一童竟往往數月畢事還因得歷覽國都形勝及山川險阻乃益好隱日行田間與野老相周旋居常不飲飲不醉不止當其興發髙歌杜子數詩擊節自賞導客和之音調悲壯聞者知其為公也錢希翁先生懷抱古學落落鄉里中公常延致君子樓愛敬數年如一日嘗謂其子珠璣曰師非但理㑹文史凡一言行皆學也汝於希翁當知所事矣其教子業進士先珠次璣皆以事奪乃教其孫烈烈夭始及勳勳靜重有受公深屬焉君子謂公之教猶古人之學得勿忘勿助之義云公之髙祖仲容府君寶五世祖也國初以試知州歷刑曹事曽祖伯完祖公禮父廷章三府君皆有隱行廷章號靜菴未老而病公為幹蠱以振其家卒而禮葬事母吳安人能忠養母年七十公盛燕畢數日而卒葬之如其父至是公病遣命儉葬無事佛且申古人家于喪之戒蓋素志也公諱濂字惟澄晚號西園逸民夀六十七配過氏宋徐王郡馬孟玉後子二人即珠璣孫四人烈蚤世勳熊熙卒之明年庚午十二月某日珠璣穆卜吉葬公聽松先塋從靜菴公兆孰賔周君仲章既狀其事寶乃參考而為銘曰壺觴在右琴瑟在左嘐嘐古人何有於我晚學為圃手不釋書登髙放歌微醉之餘丘園是甘不至偃室身無事勞心有德逸生曰逸民沒書于碑凡百鄉人敬而觀之故東耕翁配過孺人墓志銘孺人姓過氏吾母太淑人長姊也過在宋有徐王郡馬曰孟玉者自汴來居于錫歷元至國朝為鄉巨族我外祖時明府君尤稱朴厚配周孺人生孺人笄而歸楊氏為東耕翁配東耕諱旻字日初輸粟受仕服先孺人三年卒其葬也寶實為志孺人之行蓋附今將啓而合葬其子槩等復以志屬寶孺人於寶為從母幼撫長訓有母德焉悲慟之餘謹掇前志所未及者序而刻之初孺人在室端慧恭謹識字知道理為父母鍾愛歸楊時資裝之盛甲它族孺人不以驕於是楊方中衰孺人實相東耕克復故業東耕好賔客孺人曲承之曰茗則茗曰饌則饌曰醴則醴甚至先意從事蓋數十年如一日比其子知學朋遊日廣孺人館而禮焉如初子長有孫其為禮也不衰周孺人老而好談孺人每迎養于家輒致里媪日與周旋蓋其性篤於孝如此女適成氏者寡而無居孺人曰盍我焉歸既而曰盍鄰於我遂遷而鄰焉識者謂之知義其恆事不書亦不勝書也孺人卒於正德辛未四月二十有五日距其生宣德乙卯七月二日為夀七十有七子男二人長即槩義官娶過氏繼趙氏次楷娶殷氏女一適成瓉孫男二淮邑庠生娶髙氏汴聘過氏女四人長歸邑庠生莫同次歸陸術次聘于張琳次聘于朱遷墓在龍山河滸之原以壬申十月四日葬銘曰夫幹父蠱婦作家貞施于孫子永享厥成後有顯者於是乎徵之明故户部郎中致仕進階中議大夫郝君墓志銘成化丁未豫在河南始識郝君世瞻因得其歷履繼讀其所謂流芳集者於其世系蓋盡得之及入户部追檢故籍又得君治行之略於是自徵前聞不誣幸君未老尚可起而凶問至矣豫方悼君而其子文寀奉翰林典籍夏君狀來以銘請豫不得辭也君諱冕字世瞻舉天順庚辰進士授南京户部主事丁內艱服闋改户部進員外郎郎中前後若干年以父工部公老移疾歸養又五年遂乞致仕用詔恩進階中議大夫初君既分俸以有弟例不得終養故用疾告及致仕年才四十有七人皆風君再出而君固泊然終身嘗曰吾家自校書府君學于元中丞馬公得其指授儒業相承至于令舊矣其忍弗繼乃修治先塋申祠堂禮式又編刻遺文為流芳集以傳一時諸子感發向學者輩出君力行仁厚撫二幼弟成長讓以故業且悉所有周其姻族凡值大饑者一中饑者三皆免於病人謂君有餘政焉嘗為集賢㕔以延賔客燕坐終日而無怠容或選勝登臨壺觴自隨風致散逸若不知有家纍者豫昔所得悉與夏狀合君在户部稽閲精勤經畫通敏三考三最成化間嘗奉敕督漕北河及省賑畿內諸郡所至有聲最後督運遼東軍儲尤著風力其所建白論救荒論流民論邊備疏凡五上事凡若干條皆切時宜多見施行君治行夏狀所列在故籍可考也君為汝寧光州望族系出元文忠公經傳三世有諱興者元樞密院檢書郎為君曾祖祖仲賢贈兵部右侍郎父璜以進士纍官南京工部左侍郎母某氏纍封淑人君配張氏福建參議雄之女纍封宜人豫男三長文宇義授承事郎次即文寀州學生次文容光山縣學生女九嫁者六壻為州學生舒敏德史臣盧鳳羽林衛指揮使髙澤安陸州吏目徐渭義官胡士竒未嫁者三張芳熊美陳某其壻也孫男五鑄鏡鏞鈞銑女二君夀六十有二卒於𢎞治戊午十二月五日明年三月某日葬州城東謝靈橋西先塋之次君嘗至工部公墓下拜且哭已謂文寀曰它日植松柏當如此明日君卒夏狀云銘曰不終于官終養于親孰謂能子而不能臣觀仕于初可以要久用養效勞寧不兼有浮光之墟從先大夫所未畢者貽厥後圖沒而有知公其慰夫大明唐府蓬萊郡主墓碣銘豫昔為許嘗聞唐府蓬萊郡主儀賔莊君之賢于豫山先生張君文粹時君方為裕州諸生厥既成禮而賢益彰於豫有文字之交焉頃以主卒且葬請表于豫豫讀今南京户部左侍郎前國子祭酒王公某之銘及君所自為蓋文而重歎夫主之賢也顧病餘荒落未能執筆以書而君請益勤乃最王志之所書者而詩之俾篆于碣其詩曰古有女則方䇿以陳隳自貴富不自賤貧惟古之志婉婉令人婉婉令人唐王之女帝有殊恩錫郡作主有養克孝有祀克撫有瑟有琴關雎之風亦有書數以佐女紅歲朝月謁誕慶忌哭王曰賢哉維古貞淑二十九年抱疾以終國賔哀慟上感睿𠂻厥葬疇銘國子祭酒載徵表詞我則何有墓前有石嘉號以題終古是圖刻我銘詩仲父怡閒府君墓志銘怡閒府君先考贈奉直大夫許州知州純和公之弟其母為吾祖母楊孺人其所生母曰許侍吾祖考三益公生府君九年而公卒又八年娶于朱朱吾曽祖母族也於是寶既孤學且仕凡二十餘年府君亦四遷厥居乃復于故中以朱喪再娶方氏年五十九卒正德改元正月七日也寶以浙憲之命得過家視含焉朱兆侵於鄰故終喪而未克葬今寶還自京師侵地復歸乃與其子賔卜今年八月一日厝於先塋穆位禮也惟府君承世德後性坦逸不事事家雖屢空惟用酒自慰然習見內外家法恆自矜重小弗如意輒發激昂語竟亦無他故鄉之君子為之號曰怡閒云府君諱潤其字惟澤子一人即賔一女許嫁談某俱方出吾卲世系具世諜兹不叙銘曰泝而上世盛德盛有衰此其極過知仁詘乃信慶惡在後之人成世華妻楊氏墓志銘楊氏年二十三歸永康丞成君之仲子世華為繼室十有八年而寡又十有八年以疾卒年五十八世華前室之子二伯瀚仲浩浩後其伯父世榮世榮世華繼亡而家衰二子各依其婦黨以居楊一子不育有一女幼既除喪或謂楊盍就子居乎楊曰子可從也婦之黨不可依也然則莫若從父曰父可從也夫之宗不可廢也乃僦其父之鄰之屋獨與一老嫗居嵗時設世華主奠酒饌哭盡哀召姻戚餕以為常有訪舊者必之楊榛椇之問不缺女長贅孟氏子侃為壻乃益修整為內外規而今已矣楊具四德而德容雅著初寡時有欲奪其志者用間探其意知不可乃已久之貞聞益起君子謂貞而存宗於女節為難世華屬纊未諒楊之終僅以田百畝贍焉今用以葬葬之日為卒之又明年十有一月甲申墓在龍山之原從世華兆楊父東耕翁諱旻字日初母過氏宋徐王郡馬孟玉後豫母太淑人姊也銘曰慎厥從以存厥宗維貞始終吁嗟楊乎其起於紀叔姬之風乎卲烈壙志銘烈吾從父西園翁之孫翁二子伯曰珠字國臣仲曰璣字國政國臣娶于王四十未有豫國政娶過氏乃生烈翁命後之烈丰姿秀爽而性尤沉靜年十二入邑庠為附學生越七年既加冠益知向學遊于南沙莫君之館師其族叔祖平野君日課有進不數月忽暴病以歿正德丙寅六月草二日也年止十九論者謂巫誣醫誤雖然亦其命也夫烈冠時豫為制字曰以楊聘今黎平太守企齊張公之女將歸焉而不及遂烏乎悲哉西園翁卜地南塘九里鋪北以卒之年十月十六日以長殤葬禮也豫在浙始聞烈病亟使人問焉至則屬纊矣既得訃豫哭之慟今其葬也為銘俾刻之銘曰世德之家宜蕃厥孫烈乃殤矣異于前聞匪聞則謬數也莫究巫邪醫邪豫誰咎邪萊陽于婦髙氏貞烈碑銘并序辛未之盜起自霸州奔突于近藩歲十一月東至萊陽大肆焚戮于婦髙氏以不受汚及其幼兒皆被殺當是時吏以威屈士民以脅從婦若女以逼辱者往往是也雖然吏以守死士民以敵死婦若女以拒死者亦時有之髙氏其一也於是豫兼憲節視漕師河上每得之傳報則嘆以為三綱為國之本今當倉卒流離而其不可解於人心者乃如此盜其不足平也矣盜其不足平也矣既而盜平御史具死者名以聞禮官請上命吏有贈有䕃士民有恤有復婦若女有旌有祠具著之令比豫南歸見吾邑丞于世用與之道其故則知髙為世用之妻蓋其所以刑之者素矣既而世用以祠成請文于碑乃為叙次其事繫之以詩詩曰髙哉于門為貞烈作帝渙大號顧是旡怍貞烈謂誰于矦之婦保身如玉乃罹刀斧刀斧可加身不可辱呱呱者兒臨刃以哭賊有甘言繼以甚威我心匪石百折不墮賊也我仇死實吾所須臾茍生義則不可御史上疏貞烈是嘉百寮傾聽帝曰咨嗟國有舊章司存宗伯厥典弗殊曷揚以白既作之門復建之祠往來聚觀以歲以峕妻道如臣夫道如父鼎立三綱匪今自古新門在閭新祠在里我銘在碑傳者國史明贈承德郎南京户部主事陳君墓碣銘贈承德郎南京户部主事陳君以𢎞治辛亥卒其明年壬子葬其配葉氏祔越十有七年乙丑其子墀舉進士又七年正德辛未墀歷東管知縣遷南京户部主事以詔恩贈君如其官階葉氏贈安人墀始請于南京國子祭酒王先生思獻志而納諸墓焉至是以題名之碣未有所刻則來請文按王志君諱爟字文政別號果菴陳其氏福之閩人世以文學顯祖周以某子貴封監察御史父叔剛以御史與修宣廟實録升翰林侍讀其伯子煒纍官浙江左布政使其季君也侍讀公卒時君方三歲嫡母林氏暨生母林氏鞠育以長從長樂陳思懋氏受春秋為舉子業於是布政君方仕于朝君獨侍母居業以弗卒君內承母歡外理家事歲時祭祀外慶弔往復周致而裕且能推所有以周姻族之貧者母病肺喘君躬進湯藥惟謹比卒哀以襄事時布政君以江西按察使奔喪歸里有産奪于閭右者將謀以歸之君曰彼力奪而産吾乘而利焉其與幾何吾不是義吾兄其受諸尋復諭閭右俾還所奪有行戍者暴死於逆旅其黨誣其主人無以自白君曰寃哉寃哉吾目擊焉而不為之白誰為之白者乃以其情告諸部使者不卒誣而去君素溫厚端慤見者知為德人而義激於衷是非明斷乃有如此者家故以資長賦其里里中十年更籍君以某官令與焉戶而平之衆謂之允晚以家指日蕃布政君命之析君從之謂兄廉於官弟敢以分弗讓讓而后取率損其分焉篤教于墀墀舉于鄉而屢不利禮部君曰學也何尤比成名而君卒知者惜之君為別墅於義江之滸時與諸能詩者觴咏其中今其鄉傳野航漁唱集者其詩也君夀五十四有子一人即墀今為南京户部署郎中女子二人長歸林錠次林廷植孫男二朝銓朝錧女二曾孫男一邦源君墓閩藍利石人山之原葉安人祔而碣不書禮也安人與君同邑其祖某嘗為南海簿父某母某氏其歸陳逮事二姑及佐君襄其大事其卒先君六年年五十詳具內翰董君文玉所為志銘曰卒以士葬以士銘以贈官維君有子子有令圖上施不孤其始自今贈以大夫表以大夫君有恆德我銘不誣明故奉政大夫贑州府同知張君墓志銘君諱瓛字孔圭自號慎菴姓張氏其先河北人在中唐有曰文昭者徙中州至宋南渡時有諱晟者以直祕書扈從遂家建安之南村晟以上世有顯仕元末有諱信者以避冦遷浦城縣南既而卜築回龍山陽今所居是也信子子榮生永永沉邃偉特博通書史國初有司兩以隱逸應詔皆不就其卒也楊文敏公銘焉子四人長善舉永樂辛丑進士歷官監察御史其季冕娶于某生君君幼警敏隱逸公命監察公教之十有一年遊邑庠即問聖賢行已之要于師師異而禮之弱冠應鄉試年二十七貢而升諸禮部卒業南雍成化庚子舉應天髙第又屢不利禮部丁未試吏部簡授江西贑州府推官時汀韶冦大侵贑境因以饑疫民死徙殆盡君持檄走諸邑治其溝城存徠周恤以全其人瑞金石城二縣故無城城自君始當是時君力為規勸且屢請發帑於上語甚切至蓋活者數萬人既又重逃復之典權婚嫁之宜申掩埋之令稽古荒政而加敏惠焉其治刑尤加意疑獄他郡獄未具者亦多移蒞於君有俠民金伸誣告死罪轉引二十餘人獄死者過半君得其情亟白于録囚使者釋其未死者七人君在官前後平反死刑四十餘人雪流以下者不可勝紀九載秩滿㑹贑缺同知遂以擢君君職清戎清戎某御史方以苛察繩下虐及無辜君抗言無隱情屢見抵弗顧既而嘆曰吾不能殃民以奉人而靦顔於位退不猶愈乎即移疾請致其事疏發三日遂行於是君苦煩熱舟行至廬陵病病七日不起𢎞治己未七月十有六日也君性孝友以祿不逮父養養母曽氏甚謹與諸兄處愛不忘規自奉約而急於周人外重內剛不以佞奪而理棼修墜衆以為難君裕如也嘗集古格言為世訓一卷所著詩文有慎菴小稿六卷錦江雜咏四卷藏于家君生正統丙寅正月三日卒時年五十四娶蘇氏繼彭氏子男六人長桂次槐次鳳次鵾次鵬次鶴鵬辛未進士今為户部主事君墓在邑城西綿溪之原葬以卒之明年壬戌四月二日于今十有四年矣而銘石尚虛鵬以豫與君同應天舉手録君行泣拜以請豫已酉嵗視學至贑贑之人尚有道君遺事者於鵬所述蓋符焉銘曰南閩之彥舉于南畿有官佐郡嶺北是治九載當最即遷乃倅曽幾何時一辭以退用未盡君君志則遂其所未遂有子以承廷揚署列嘉績用成君有遺德於是乎徵我刻兹銘蒿菴俞先生壙銘孝大志養先生以之曽閔遐矣先生我師彼士衣冠謂義而利先生介如進德有地豈不願忠吾養未終再輟仕籍式歸于東昔在陽城用孝為教微城猶興學古之效古有謨訓曰書春秋孰弗章句鮮為道謀經序蒸乂傳稱錫類先生終身聖賢與對生事既畢歸全是圖從親九原庶幾慰夫士舉師司義歸禮葬是謂歸全請以銘壙容春堂前集卷十八
