body:
  text: 容春堂續集卷十明邵寶撰記二十三首記新修劒州城記劒門之西南八十里為劒州自梁越唐迄于我皇明數更建置而無改治昔人稱劒門為兩川要害謂之金城夫州固與有守焉然其城北負漢陽山乃以逺故不惟其麓是即而前臨於溪溪之南逼鳴鶴山山左右合而城當其窪其為勢甚卑且於古城址僅有其半其為制又甚隘卒然有寇一攻什守難易倍百蓋俯仰順逆舒迫勞逸之理有固然者正德乙亥武緣李矦璧來知州事見而危之又稽諸志牘得宋及近歲棄且陷之故亟與諸職事周覽焉而嘆曰嘻世有若城而可以為守者哉雖然拓而西隘可廣矣闢而北且躋焉卑可髙矣若其南東緣溪為阻則固城之宜也吾舍是何之哉衆皆曰然越三年戊寅既咨既繹既卜既畫乃獻狀及圖于巡撫右副都御史馬公昊于巡按監察御史盧君雍于鎮守都督僉事吳公坤于藩于臬于守若巡罔弗矦從七月某日矦躬率興事判官趙思仁以義民六人者相之越明年巳卯四月某日告成初矦念寇餘民瘵亦重兹役既而會籍分庸人才得尺有奇民聞而歡趨之故其成若是亟也城西北皆新作南東修焉其崇為丈者二其奇四尺厚減於崇六之一周袤為丈七百其奇二十凡益其舊為丈四百三十舊有門四益其二為六樓如其門濠埤闉堞視舊加偉中為衢井序屬區分鄉之氓願受而居焉者若干室於是士民胥慶請頌矦績矦曰吾職也何頌之敢聞顧不可無以告吾後之人俾勿壞者則不逺數千里伻來以書請記豫嘗觀易稱天地之險而繼以王公設守之義蓋城之攸繫大矣劒門於天下實惟地險之最論者至擬諸天今四海一家兹險也固若無所事者其在一方則外控諸夷內聨列郡所謂要害者固於是乎在焉而城乃弗地誨寇延敵懲亦屢矣近監逺稽不能不勤有識之慮而况民社於兹者哉然非知幾能豫上信其共下忘其勞如矦者欲謀而成焉不亦難乎矦字白夫以進士乙科厯教永興蘭溪仁和三邑選擢今官學尚古義蓋豫自按察兩浙時知之矣矦嘗建諸葛武矦祠兼山書院又申表諸死節者知方之教實於城先因併書之無錫縣修城隍廟記今天下郡邑歲春秋壇于南郊而祭焉者其神有三曰風雲雷雨曰境內山川曰城隍城隍既壇矣乃復廟焉何居風雲雷雨天之神也其祀取諸雩山川地之神也其祀取諸望壇而不廟禮也若夫城隍則築焉鑿焉成於人者也故其神雖無方必於人焉依臨川吳氏謂宜有古忠烈正直之士為之配若勾龍之於土棄之於榖者於是焉廟於城之中以為羣萃之主不亦可乎前代不經之典我聖祖既釐正之而隂陽表裏之説尤勤播告吏長二初至若三厲祭皆於神要盟焉禳祈必先又不惟朝夕出入警守是賴廟固不嫌於瀆也壞而修之非有司而奚存哉吾錫之為廟者稱弊久矣今年春二月吾郡二守范侯澤來攝縣事於是民飢且疫侯屢造而禱焉亟圖修之越三月告成或者謂君子先成民而後致力於神夫城隍為邑保障人修之而神相之守蓋理之宜今吾城且復隍過者莫不興嘆有吏責者不是焉圖而汲汲於神是崇是飾不亦末乎烏乎東南民力竭矣在一郡一邑尤難為言兹役之大若之何其可以遽興也况自壬申之秋至于今兹撫按諸公屢議未協侯一人獨且奈何哉而廟之修則侯之所能為也以其不能而并輟其所能為者是可忽也孰不可忽也抑侯之舉其殆若為之兆也夫廟之東序皆新作其堂若門若西序則因而治之棟隆桷密瓦甓完壯素壁丹楹錯映旁麗允與新稱凡費為白金若干兩皆措畫自侯往來宣勤者縣丞雲君升杜君世昻王君震主簿林君漢典史髙凌霄而道會華清真有專責焉間以侯意請記其事於是乎書月華記已卯中秋之夜月踰午矣有言其光之異者開户視之則見夫月之外有黃赤二暈暈之外祥雲絢爛五綵五色紛披輪囷互映旁射千奇萬麗不可名狀月在暈之中清虛相涵丸如其圜如懸如其麗如浴如其旋如鑠如其輝如濯如其潔如其輪廓若加而大焉凡一圍許少焉有朵雲來掩之漸曀而散月乃復故蓋吾華氏女言如此豫嘗聞言月華者人人殊今於是獨有得焉月水之精也秋之氣於行為金秋中則金盛金盛則水因以滋故於望也受日之光於他月之望為尤重月之華日為之也是故其望也倐其華也忽不然水隂物也金亦隂物也烏能動蕩騰躍如是也哉是日久雨初霽酉刻復大雨震電亥盡稍霽尋復雨至是乃大霽燕夀記正德庚辰之歲吾母太淑人夀登耋老先一歲巳卯冬十一月二十日為始生之辰於是稱觴以祝焉禮也時某亦耆年矣諸姻友君子將以正月一日為某慶某以母在辭不敢當越九月會有南京禮部之命某疏辭未報太淑人夀期及矣先十日辛丑賀客有至者太淑人居中堂諸客以分入拜太淑人起立受之當答拜者某代之答禮畢乃燕是日為本宗若干人六世祖姑之族一人居尊席祭酒焉從弟珠璣屬吾友浦文玉為序從子勳作慶客對十二日壬寅為太淑人之族黃藻過氏合河南北若干人其入拜如本宗族舅傒為序舅姪棟繼為之十三日癸卯為吾祖母楊淑人之族若干人吾姨弟槩楷與焉其入拜如初屬序於馮僉憲廷伯廷伯為吾從曽祖姑之外孫敘吾世德為詳十四日甲辰為吾室顧淑人之族若干人十五日乙已為吾季女壻秦汶之族若干人其燕也居尊席者其表叔殷翁時泰其年亦七十九汶自為序天台王生宗元又為汶序之汶之父國英賦詩十六日丙午為吾庚子鄉舉甲辰進士同年之子十五人席南北列坐中尚某東坐西向呂太僕仲仁為序莫鉛利卿吕亨夫叔通皆賦詩十七日丁未諸鄉大夫士之內子若干人來燕於中堂居尊席者談萊州之室錢太恭人其年八十有二十八日戊申吾內外姻族諸女賔來燕之如諸內子居尊席者吾祖母之從弟婦張其年八十一十九日巳酉為鄉貢進士若干人席南北列坐西上凡吾門人皆降齒陪席新喻訓導趙勳立之為序蓋諸君請之顧成美華企説皆賦詩燕畢縣大夫暢侯暨鄭邑博以鼓吹導辭障儀物至遂留燕焉時日將夕矣陪席者茹參議世和二十日庚戌某率三壻及女及諸外孫男女稱觴於侍飬之堂禮畢莆田進士陳應之及諸姻友子弟先後至者皆入拜退而小燕先是某嘗請諸表舅都運張公元之為序至是懸之二十一日辛亥為邑庠生若干人莫如山為序張琇元充繼為之陳籌廷猷莫鋭藴卿而下賦詩者若干人二十二日壬子為里儒若干人羅建寧文徽為序蓋諸君請之潘繼芳而下賦詩者若干人二十三日癸丑為泰伯鄒氏若干人德豫吾門人也自為序秉倫舄及其諸子承皆賦詩二十四日甲寅為吾仲女壻閭江吳汝憲之族若干人汝憲自為序居尊席者其尊姑之夫鄒翁允明年七十二二十五日丙辰為鄉大夫士仕而歸者若干人吳憲使遜之為序趙揮使廣淵與焉馮僉憲廷伯顧少參與成皆賦詩二十六日丁巳為吾從祖姑之族磚橋錢氏凡若干人表弟諫諷為序其叔枋賦詩二十七日戊午為鵝湖華氏若干人吳門都太僕玄敬為序蓋文逺翁請之瓉宗玊琢成玊皆賦詩二十八日已未為太學生陸德以昭輩若干人南京户部郎中陸節之為序節之以昭從兄也初以昭請序于靳閣老戒菴公諾而未成故請于節之陳稚有實自繪萱草賦詩其上二十九日庚申為吾長女壻華珉之族若干人居尊席者其姻吳東湖氏年七十鄉貢進士朱象賢世承為序珉請之也三十日辛酉為縣屬諸司官暨鄉里諸耆舊若干人馬經天常實倡之而請諸顧少參與成為序四明二儒生與焉十二月壬戌朔為望亭髙橋二巡檢暨六房諸掾若干人二日癸亥為南塘及冉涇里社諸鄰若干人龔翁世安居尊席時年七十九三日甲子為方外交者若干人燕于别室四日乙丑以後至者留之不日不旅論者謂是舉也積雨而霽蓋若得天道焉羣分而萃蓋若得人情焉况有命自天久廢而舉式當夀期非荷吾君遐遺之念抑何以得此此皆吾母貞心慈節上通旁浹以臻斯盛寶也不孝其何以當之欣幸之餘敢筆以識必日者不敢不謹也毗陵驛遷建記毗陵驛舊在郡城朝京門外去郡治若干里自洪武元年始建越若干年天順某甲子前知府王侯慥以賔餞之弗便也改建于朝京門內時城久壞水無鍵柵使舟之往來罔晝夜阻不知城之為間也成化以來城再修而益嚴水門有啓閉之令舟或夜至時入則啓謀於姦不時入則方令於遽蓋議者多及之而莫能為計正德巳卯秋屬有江警監察御史天台葉君忠奉詔巡按見而深虞之乃屬今知府宜賔王侯教而告之利害曰是尚可緩乎侯曰某不敏亦虞之久矣敢不亟圖爰暨同知范侯某通判某侯某推官某侯某檢郡志而得其故則率武進知縣某君某等相舊驛旁近地而議遷焉以舊基豫民得其直而易新基蓋略相當撤故材外所益亦無幾召匠稽會衆議惟允用書請于今巡撫都御史內江李公某公議如巡按巡按具以疏聞事下司馬如其議以請詔從之侯乘農隙擇日興事越明年二月告成伻來屬記於寶惟事之在天下不能無所因革君子於因革之際利不倍蓰則不敢輕舉害不倍蓰則不敢輕廢蓋重輕急緩之宜存乎其迹者易見而勢若幾有出乎其外者非執兩端而明以照之欲得其實難矣然郡有守縣有令而監司者臨焉雖同心事國而體分各殊茍人持所見而惟意之遂則有遷驛以圖便而妨於城守如前日之為者且夫驛以傳設城以守築二者固不相與焉而是驛也於是城也一因革不審其利害固有較然者矣况天下之政始於朝廷而達于郡縣其因革之故勢有倚伏幾有顯藏尤非一二之可盡是故君子無巨細邇遐必於其微而同心以圖焉不然何是驛之議一倡於巡按而王侯承之惟共而巡撫而司馬亦罔弗協如是哉君子於是舉也可以觀政可以觀人矣寶不佞於是乎記巡按君有古憲臣風裁所至究諸利害罷行惟時蓋尤有大於是者以非是之繫也不書王氏橫麓新阡記阡於橫山之麓故昭勇將軍鎮江衛指揮使王侯希程壯而逰焉老而營焉其卒也其子太學生文炳承其命而治焉者也初侯之祖兵部公欲卜居焉未果其子冢宰文肅公其孫都憲公皆有政於國未暇以卜蓋至於侯三世矣侯始作别墅於山之陽既又即其隂為山居晚於居之左相得善地曰吾死其葬於斯乎蓋屢以語文炳文炳心識之不忘至是乃克成之山繇艮是來厯震而巽漸起益崇凡若干丈由陽岡以登度䫈而即于其隂下上惟半侯之兆實於斯在左顧别墅若為我負右掖山居作我股肱水旋流左右再匯再折北迤東若干里入於溪又東北若干里入於江堪輿家曰法卜筮曰吉蓋自麓及兆凡若干丈道樹以松者什九以柏者什一凡再踰澗石池如之池皆有梁其一且屋焉門四重初若二皆石初曰雲關二曰神道其三為屋其四為柵背三曲澗當柵之前形如玊環命之曰環玊阡之觀於是為勝又上為祭享之堂六楹左為土神祠右為廬以宿齋者石垣於兆之周其門以山之名所謂芳茂者顔之不忘故也是阡也侯既授大凡文炳陳修惟勤經畫惟悉樹藝惟懋成於侯卒之二年巳卯明年庚辰某月某日乃葬先數月文炳介其姑兄户部主事假君子辛以圖及書來請記惟慶之稱餘尚矣是豈獨天道然哉人固若有遺之要之歸於天焉故以言乎時則若有待以言乎數則若有定無小大一也晉陵王氏以端雅立家我皇朝以來惟兵部公繼其父延平公以儒業起從仕皆德浮于位文肅公顯矣盛矣而未及入相人猶缺望焉故富貴福澤遺其子若孫者譬之寓物於人巳取之不盡若約夫後之人必取之者不然橫山之地知則久矣乃三世蓄志不遂用之而必待於侯之宅之也哉君子觀乎其小可以知其大矣侯諱洛希程其字别號弦齋雖階武以顯而行業不愧其世其詳具銘表若碑兹不著蔣氏槐廳記出全州南門之外若干步為今太子太傅禮部尚書武英殿大學士蔣公之第自公以上凡若干世皆居於斯至公之世而家指益繁乃於第之右圃作新第焉禮也中為堂有巨槐一株度方定位適當其前堂成君子過而嘆焉曰此古人所謂嘉樹也又曰徵之近代其公卿之兆乎乃題其堂之楣曰槐廳於是公自少宰入參機務遂進今官贈三代皆如之伯兄誠之公亦自都御史進南京户部左侍郎諸子若孫繼起未巳君子以為德之符也為詩歌賦頌而美之者自少傳邃菴公而下凡若干人公乃用書屬某記之天下之物莫大於無心之會是蓋有天者存乎其間而人之力不與焉故夫物徵於人為休於家於國為禎為瑞不可誣也蔣氏之有斯樹也不知幾百年矣昔也在圃今也在庭昔之植也蓋曰惟圃之宜而豈逆知其為庭之蔭且觀哉故君子以為在德德之貴乎積也久矣孰能纍世相承惟曰我分固爾合於易不耕穫災畬之義如公之先者由今觀之蔣氏之世德其亦猶斯樹也夫樹不期庭庭不期樹無心之會非天其孰為之烏乎盛哉某辱公知且三十年公位少宰某承乏司徒又數朝夕今歸且病矣心亦未敢忘也於是乎記若夫公之德在朝廷而望重天下天下之人固有稱述以禆國史者兹不著水石簋記邵子壯遊中原得銅簋二以歸丹翠相錯古色可愛中嵗病居每夏苦熱輒挹惠山泉注其中會有自漢之澨拾石子遺我者或圓或嶞黑者如漆白者如玉邵子曰吾缺典也簋貯數箇焉手揶勺而弄之晝日忘暑客有過而見焉者曰異哉古人之清玩多矣而獨未有此也東坡怪石乃辱於僧無足論者雖然安得起雲林子而賞之常州府遷建忠義祠記昔在宋德祐乙亥元人入江南常州既降而尋復於統制劉公師勇也於是西蜀姚公訔以朝命起知州事郡人陳公照起為通判與師勇及兵馬副都監王公安節柵塹共守餘四旬不下巴延怒會兵破城姚陳王三公皆拒戰死之師勇突圍趨臨安卒從王事以死時信國文公方駐師平江尹憲將玉麻巡檢士龍皆以其命將兵來援士龍戰死虞橋玉戰死五牧胡進士應炎起署節度通判計畫守禦與其父兄皆死知武進包圭被執不屈死方其在圍招誘脅迫繼以屠戮勢極慘烈自吏士至於民無一人言降者事聞行在有詔為諸公立廟未克立而國亡我皇明成化間諸生有以祀典為言者有司僅即他廟嵗時私舉正德初諸生葉夔又以為言巡按監察御史謝君琛請著於典詔從之前知府李侯嵩嘗建祠於郡學左狹陋弗稱歲丁丑今知府王侯教方圖遷建會監察御史張君鰲山視學至郡斥毁尼寺乃議以所謂妙勝寺者易正覺寺於僧改而成之中祠信國者節制所在有帥道焉故上附功宗之義諸公咸秩凡九人先是戰死無錫曰阮知縣應得者與焉乃若僧起兵死者二人道士不屈死者一人又稽諸前後死事者二人方允武劉溶皆從享於序烏乎元人南下臨安迫逐衰宋至于德祐極矣長江天塹不足為險而况於城乎城無人焉猶無城也無城則無郡無邑是尚為有臣子乎國步之蹙其何日之有况常之為城至是孤危特甚乃獨抗於其間既堅且久蓋惟數君子是賴數君子者亦惟忠義是秉是矢傳所謂國有與斃者不其信哉故論者謂常為忠義之城擬諸唐之睢陽至于今稱之烏乎睢陽雖敗保障之功實在唐室而吾常於宋乃弗弔如是哉援兵隔絶而恢復無期人邪天邪謂之何哉夫大忠三人死而存國忠義數人死而存城城亡矣國亦亡矣而其義固存也蓋君子之論如此今去宋且數百年矣惟兹祠事議興於庠校疏上於巡按命制於朝廷基定於提學而功成於郡守春秋肇祀繼繼無窮蓋必如是而君臣之道立必如是而封疆之守嚴必如是而春秋之法著忘身以殉國居常以虞變樹聲以廣教一舉而數善具皆可書也祠為堂若干楹前門若干楹中門若干楹左右序若干楹皆即其故而新之其功不減於作又作齋宿牲殺省滌餕燕之屋凡若干楹祠制斯備堂之左右有池汪如各一畝所祠成之三年巳卯巡按監察御史葉君忠臨觀而有感焉作浩然之亭其上而為之詩侯賡載歌巳而歎曰神其如此水夫寶郡人也聞而樂道之侯先以記屬至是來再告謂郡之故於斯為大雖不敏敢不執筆以書淮海秦先生祠堂記淮海秦先生祠堂者先生之十九世孫鋭之所建也先生在宋建中靖國間以國史編修坐黨籍謫外尋遭忌者所中四徙而卒於藤州歸葬髙郵政和間其子湛倅常州遂遷葬于璨山其孫南翁因家無錫傳十餘世至鋭之祖封武昌知府公景暘暨其子方伯公廷韶其諸子封都憲公潤孚謂先生生長宦逰之地皆有崇奉而錫為葬所顧獨缺焉蓋有志於祠未果而繼卒鋭欲擇善地以承先志久而未得嘗以告豫繼之以嘆正德丁丑監察御史安成張君汝立以提學至縣盡毁尼女冠之居而及於鳳光橋東所謂善智寺者鋭見其近且塏爽乃請于提學君君亟稱善而從之爰謀於其諸子今鄉貢進士泮歸直于官請其地而建焉始事於戊寅之秋越明年巳卯春厥功告成豫往謁之退而嘆曰美哉祠也秦族盛矣宜其有此哉蓋吾嘗觀於前宋周程之道學尚矣其次則德行如司馬其次則功業如韓范其次則文章如歐蘇亦皆古所稱不朽者先生文麗思深而風致清逸與黃陳數子並遊於蘇文忠公亟見許與既入史院而不幸死於遷謫至於今誦其言想望其丰采者猶色然起敬謂夫不朽亦庶幾無愧焉爾矣錫之祠墳蕪茀巳甚而數十世後乃有繼圖崇奉如鋭之祖孫父子者君子雖欲弗豫其將能乎秦之在錫自國朝以來起家鄉貢者九人登進士者二人而學行政績莫顯於方伯公與今都憲公國聲嗣而興者其人尤衆初鋭既得地而經始也亟用書告都憲於湖南都憲曰此吾族之缺典不可不圖及將落而告其二叔永孚仲孚又皆曰此吾父吾兄之志也不可不力祠因故材葺而為堂中奉先生之像前為門堂之後新作燕室四楹室之後為樓題曰淮海其下為夾室常州公暨處士物初先生暨武昌暨封都憲暨方伯五公之像縣焉左右有序凡若干楹歲舉私祀於堂鋭也祼獻唯謹餕於室則諸昆弟咸在夾室五像以有家廟故薦而不祀乃若二子濓汶及其羣從延師講肄亦皆於斯蓋尊賢於先而因以風其後人鋭之繼述於是乎大矣某辱交於秦氏三世至鋭始為姻連蓋於是與有慶焉頃鋭以記請再辭不獲既為書其事復作迎送神辭俾於享焉歌之物初都憲之曾祖也於武昌為諸父鋭字國英太學生其辭曰有藤糾兮若虬與古木兮相繚公何為兮此邱昔有夢兮彼州夢維水兮我泉清流公舍此兮焉留矧有箕兮有裘世復世兮千秋公之墳兮既荒邑有構兮曰公之堂蕙肴蒸兮奠桂漿肅登降兮有冠有裳公之來兮如水斯洋公之去兮如風斯翔祝有册兮歌有章惠諸孫兮不忘浙江清軍察院題名記古者兵農出於一而治之者二後世兵農出於二而治之者三何謂二在國曰治賦在軍曰治兵何謂三二者之外有清理之政焉二專其一三兼其二是故治以清理為難難存乎人不存乎政今朝廷遣御史方行天下巡按之外惟清軍為重頃著令一年一代與巡按等嚴之至也厥亦惟重故之以哉上之十五年正德己卯監察御史某以清軍奉勑蒞浙越明年庚辰當代爰考其前政氏名敘而書之以刻于石伻來用書請記惟題名以清議為激揚尚矣而所以為議者則隨所司而異今之蒞清軍者或威如以為嚴其究也野不勝寃或豫如以為寬其究也伍不勝缺今之所書若其人宜皆有之來者不可聞吾聞其語矣然指而議之曰某也豫如而無缺某也威如而無寃其不然者某若某皆是也言若是而謂不可聞乎既而又曰雖然某也亷以正某也忠以直若某則肆若某則回雖飾於政不足尚也或寃且缺政又若是其劣蓋守道與官相勝而不相掩言若是而謂不可聞乎今夫鑑衡權度後之視今猶今之視昔也是非之極出乎近而應乎逺榮辱之端發乎微而成乎著名之為激揚於是乎大矣題可不慎乎或謂人品本於初生而習以成之此其力固有素定焉者故成仁取義不顧死生惟其人患得患失鄙夫是甘亦惟其人夫豈一題名間所能轉移哉君子推思齊自省之心而以忠告於人文獻信於傳聞風聲捷於號令事非典法所麗而彰疸行焉古之人用之今之人何獨不然昔者吾友徐子謙之題名於南京福建道也吾嘗為之記之君時同官蓋至于今猶未忘也立朝奉使所至懋於聲實此固君素所蓄積而相觀之助要亦不可誣也繼自今聞君之舉者安知不有興起如君者乎乃若記云則吾為君誦司馬公諫院之言足矣修松風閣記寶初卜太夫人夀藏於繡䫈之下其兆當聽松菴松風閣左人謂閣也右勝非宜盍徙諸寶不可既而徙其兆於上當閣之後人謂閣也前塞盍徙諸寶又不可越數日説者不巳乃擇日齋戒以周易筮之遇萃之漸史曰吉兆其宜矣閣亦無庸徙矣於是盡謝諸説者而定議焉或曰僧之閣故方伯秦公所建也徙而弗廢何不可之有寶曰閣吾有不欲徙者四卜兆將以安吾親親安則福生吾其可毀人以自成哉且筮得吉占不從何為矧菴之先僧交於吾髙祖以下凡五世矣寶何忍涣而棄之方伯公吾壻汶之祖也若吾徙其所建雖勿廢亦烏乎可於是説者皆止然念閣不修且壞壞則其勢必至於毀吾雖不欲其能遂諸於是告於姻友之有行義者數人胥助工力易其棟梁之撓腐者榱桷之朽折者益其瓦若甓之圮敗者中為虛櫺而徙其佛像以從秦公之舊又為髹塗采繪侈彼舊規作我新觀始事於正德庚辰冬十一月明年辛巳二月告成菴之長僧宗燁曰昔秦公之建斯閣也有記焉實刻在壁今兹之修其功不減於作而記乃無述敢以為請寶曰燁而弗聞乎維我邵氏勝國時世墓在張山國初我五世祖考妣始葬於而聽松而菴僧以懷德故實與薰薌之事有守道焉今也不他之卜而眷眷於是豈惟壤土之擇亦惟世德是思是繼而是地也蜿蜒一脈上由繡䫈是來左右二澗夾岡下行滙而為池池之西北有泉出焉淙淙金石聲冬夏不息雙松並峙門右皆數百年物其左配以石床有唐人篆刻者人謂之稱閣之有亡蓋不與焉惟我先祖容春府君以來積德數百年而始至於寶寶雖不肖敢不仰承遺澤以圖似續閣之修其猶吾祖之志也夫燁曰此公之德也此固邵氏之祉也吾先僧有知實聞公言記其能外於斯敢以刻請寶曰諾遂刻之石記邵子作點易臺基既定矣偶行於其崖之上有石突出其髙數尺其廣半之其西有如級者可升其上有如榻者可坐其右有如几者可倚可枕右之前有如案者誦可攤書書可伸紙飲可置蔬一盂酒一壺其東若北皆嶄焉壁立有巖巖之象或坐而東北望則武進之橫山江隂之定山吾東野之膠山髙山芙蓉山鴻山􅖘山嵩山石窒諸山厯厯可指近瞰蓉湖如沼在圃通波柱渚錯襟互帶而竒松一株適當其前觀者以為此真臺也邵子喜遂以所書點易臺三字刻於石上泉記臺之始卜也邵子作詩志焉有安得泉分一道來之句既而臺之右石壁下忽傳有泉出焉始涓涓流繼鑿渠而引之則源源如注淵然成池邵子喜名之曰滴露昔賢祠記昭勇王公既葬之一月其子太學生尚絅即其墓之側而為廬焉禮也何為有昔賢之祠也於是某掘地築垣得斷碑之半焉蓋宋李常州昌宗之志郡志稱其文出王荆公公之集固載其全某讀而嘆曰此昔之賢人也葬於是者蓋五六百年其兆既不可識不可以復封吾則何以為心哉於是乎有祠之圖既又慨然以思曰兹山故號芳茂今名曰橫實以晉曹將軍橫者葬於是之故橫於史傳無考其在當時非有重望何至以其名名山久而不易今也祠李而能遺曹乎地官主事假子辛聞而贊焉曰夫祠也固以義起也合之其可也遂成之祠為二主左曰晉將軍曹公右曰宋朝奉郎守國子博士知常州李公春秋有墓事祀土神後則具爼豆以享某既自為序復介其友錢景旻來請記於豫豫頃嘗為王氏記斯阡也於兹山也悉矣使兹石也先是而出豫固當牽聨書之况義以起祠有如今之舉者君子謂某於是乎厚雖欲勿書烏得而勿書石得於正德庚辰十二月越明年辛已二月祠成上於廬若干步石刻嵌于祠壁又别用石刻其全文以伺謁而尚論焉者浙江巡按御史察院題名記題名其以風勸乎易有之動萬物者莫疾乎風風之能動物也亦惟無心焉耳夫人之有心固不能如風也惟有心而不與焉褒之而無作褒也貶之而無作貶也是謂有心而無為雖謂之無心也亦宜孔子之春秋是也下此則不然而謂夫題名為風勸者何居題其名不著其事行褒乎貶乎一付諸天下後世而巳不與焉蓋庶幾所謂無心者非能無心也有心而無所容也故曰題名其以風勸乎此之謂也是舉也自唐以來蓋巳有之而人之膾炙莫盛於司馬公諫院之作重其言也非重其言重其人也夫以斯人為斯言而施諸無心之舉雖欲不傳其將能乎監察御史寶慶唐君應韶奉詔巡按浙江及期將代乃合前政氏名凡二碑所載及考而續焉者通敘而書焉以刻之石乃用書屬諸生某等來請記蓋豫嘗觀諸歷代之史矣凡傳有所謂道學者儒林者文苑者循吏者忠義者孝友者隱逸獨行者皆先目後人標榜科級不少假借宜若無餘論矣茍其人之未稱乎其情則此方閣筆而彼議巳起如公論何或者乃謂不如總之列傳然所謂傳者必敘其事行而抑揚輕重或有愧於鑑衡卒亦不能逃乎君子之論今夫樹片石以當公署凡有事於是者大書其名下注其字若邑里歷官而於事行不綴一詞故雖孝子不能加於其父友弟不能加於其兄極而至於積恩宿怨皆行道之人也物之無心莫大於是矧御史以風憲名官其出巡也視古觀風之體凡事得風聞以言蓋皆有取於無心而唐君清修剛毅尤於是有餘力焉吾嘗於其前此暨今所按而知之矣故於是舉輒以一言贊之以成其風勸之美乃若記云某固非其人也則何言之敢哉烏木几記是几也豫為戶部郎中時折俸烏木所製也正德巳巳豫以都御史總漕事朝京師實始得之越明年庚午致仕歸几成又六年丙子作奉詔侍養之堂堂成置于其中於是乎記東堂新第興建記東堂新第者翰林嚴先生惟中之所建也嚴氏為分宜望族世居介溪自先生之髙祖方伯公某以下子姓日繁隘至不可容先生以兹地密邇學宫故擇而居之其先止有其東之半作堂東向號曰東堂鄉之人久而習稱焉説者往往謂夫南有鈴岡背而不嚮於物理若有非宜者正德辛未豫以貴州之節過之蓋亦謂然越八年巳卯先生奉使還自桂林乃作堂以面鈴題曰鈴山之堂掖以兩齋右曰鄰頖左曰迎暉其南當出入之途建太史坊其北即前所建東堂也又北為燕居亭曰謹思又西折而北作樓以藏書曰遵訓東堂之東舊逼易氏園近貿得若干步所建先祠焉題曰方伯之祠方伯於世得祠而以是名者以爵以德為他日不祧之地今年春先生北上過錫為某道山堂之槩謂凡鍾山仙臺諸峯逺近環列而鈴獨蒼然秀出端若屏障嵐霏空翠近落軒几風松煙竹灑如沐如而夏雨方雲冬雪初日滿盈光潔蕩胸耀日朝夕萬狀而堂得專之堂之前瀦水為池環以嘉樹城市山林不惟其趣亦惟其景先生於是蓋有以得夫勝觀焉豫再至鈴一登其頂今聞先生言尤不勝躍然者惟先生以竒偉之才博雅之學膺臺閣妙選為國太史儲飬延登屹然為天下之望一鄉之士宜不屑居然自鄉之人論之亦固不能不以為冠冕也鈴也一邑之勝也先生之居適與之對昔人所謂天設地藏以遺其人者非此之謂乎且營室而廟焉是先禮也廟而特尊方伯公義也燕居而思謹敬也藏書而遵訓博而能正識之明也樹而務滋崇德也沼而涵清澄心也禮以經之義以緯之敬以持之識以廣之澄心崇德以終擇鄰之意先生之啓渥經綸於是乎在觀乎其小可以知其大矣豫昔視學分宜以兹地故為僧寺不宜居學之左祛其徒而虛之所存佛堂改題曰視學之堂至是乃有賢人如先生者入直于官闢其東之隙居焉而堂固巋然不尤愈乎先生聞之曰重哉邵子之言吾居成矣請書以為興建記超然堂記超然堂者二泉邵子之所作也邵子初為許州許有尚書臺在臨潁之野其規模風景邵子嘗聞諸故老而未之見也𢎞治甲寅一夕夢至焉其堂曰超然而吟松咏竹二齋列於左右逍遙容與久而後寤具以告客客紀之以詩蓋至于今正德庚辰二十有八年矣於是邵子既辭尚書之召侍飬之暇作點易之臺於惠山之麓精舍之傍既成而登恍然如夢中所見故為堂於臺前榜之如夢或謂許之臺名尚書蓋以漢馬融氏嘗講經於是也故句今臺焉乃適邵子之起為是官也名若是協邪是之堂爾或曰不然邵子為親而請告其起也當正德巳卯庚辰之歲時上下方震凌撞擊而邵子獨優遊泉石之間超然云者其在是乎邵子聞而謝焉既乃喟然曰吾聞古之人有晚年進德者疇昔之夢殆是謂矣不然則所謂伸於萬物之上者非學何以至此今吾雖老固不敢自棄也若夫二人者所云或失則淺或失則荒於吾志乎何有乃為之歌曰我昔夢兮超然倐冉冉兮卅年吾臺斯兮斯屋將假我兮韋編若登丘兮望海何恢廓兮吾天又歌曰天髙髙兮萬物在下叶孰能靜觀兮精思何苦久矣吾衰兮吾過吾補孰夢非真兮孰今非古二人者聞之若相謂曰邵子其超於夢矣邵子復起而謝焉遂書為記秋野記邵子秋日行於惠山之麓南遵梁溪放於青山經邱踰坂逰目四顧於是林木黃落百草萎傷凡春夏之敷榮者莫知所在蓋慨然感歎者久之乃有斑白之老帛冠布衣倚杖行歌顧若有深樂者邵子異而問焉曰子邑之望族吾稔識之矣中邑而居前為學宮後為治所左右第宅棟宇森秩夫族世則望而詩書相繼邑居則華而禮義相先子何不是焉樂而樂於寂寞之濵且逍遙容與視收斂之候若發生盛長焉者豈亦有説乎老人曰惟天平分四時春煦秋肅氣則然耳吾豈有所擇哉物生於春而成於秋秋之肅索吾固知之然碩果在樹而嘉榖垂畝含元薦馨於是乎在某質朴人也不於此樂又奚樂哉且文勝則史質勝則野吾既質矣而焉逃野况夫野謀則獲于邑則否古之人蓋有然者矣豫無能為謀而質任自然有懷于𠂻人或弗問問即為盡不能闕如謂之野人吾實甘焉非敢謂從先進也乃若粢盛饋祀酒醴羞耇非有秋將安取之發生盛長固今日之地也昔人之登髙而悲聞聲而賦其觀物感時者深矣處山澤而志廟廊又非吾儕之分也遊焉而樂樂焉而歌不亦可乎邵子曰隱君子也乃為之歌曰野兮秋兮百物以收吾足吾食兮吾將焉求用將藏兮巳矣行休吾不知化兮聊與天逰又歌曰秋兮野兮我心以寫行孰從兮農人唱孰和兮樵者含且鼓兮猶能識乎陶冶日冉冉兮天涯雲溶溶兮山下憺忘歸兮樂不可舍老人曰子不惟知吾心而又能為吾言長歌度溪而去明日適其七十之初度子壁訪豫點易臺請書為記老人名俊字時選秋野其號姓殷氏前雲南方伯序賔公之曽孫也龍泉精舍記惠泉之南百步許有泉出石罅涓涓南流過黃公澗東入于溪謂之龍縫泉廣東僉憲馮公作堂於其流之滙處榜曰龍泉精舍日逰息其中上自黃羲下至莊列之書手一帙而玩焉六合之外萬古之前無不窮也凡鄉邦之元夫巨人湖海竒逸之士席無虛日左酬右應無不宜也或曰公之趣泉蓋發之抑非也公自少時承其祖戒軒先生之澤而得詩禮之教於其翁觀省先生逰歌泮庠涵飬奮勵夙有造詣比登甲科厯工刑户三部纍官員外郎屢有建明上采之公卿稱之尋以才望推擢廣臬其所建明如在部時而風采振動人士嚮慕於是當正德初權姦在內而羣小附之謂公妨其所為也而致仕之命下矣公視得失不一介意惟託意於斯若將樂之至於期頥而不厭焉者故當其得意輒筆之簡以授同志而寓物詠歌皆超出物外古有所謂列仙之儒者殆其人乎泉乎泉乎所以發公之趣者在是而公之重未嘗不歸之泉也始泉之出於石也其源甚細至公之堂之旁而始行修竹成徑水流其中淙淙有琴築聲既而東出衍迤濔漫凡若干畝荷花叢生水禽翔集若無畔岸而東流之勢於石梁焉見之道眼觀物又於是乎在吾作二泉草堂於兹密邇公與豫又有四世之姻嘗獲觀其所著元始剩語者知公為深於是乎記公之博如泉之汪於海公之微如泉之出於山君子觀於泉可以知公矣資仁堂記吾邑磚橋錢君孟潤之為堂也君子過之而見其扁者問之曰君之堂何以名資仁哉君起而對曰吾聞之仁者人也人而不仁不可以為人吾斯懼焉雖不敏不敢不勉名吾堂所以志也曰為仁由巳孔子之訓也君而不聞乎顧舍諸而言資也無亦重自任而輕人之求歟曰何敢然哉資之於仁大矣矧如不敏者非資焉言則曷聽行則曷觀禮曰率法而強之資仁者也敢不務乎曰然則資惡乎在曰昔者孔子之告子貢蓋嘗曰事其大夫之賢者友其士之仁者凡堂焉而吾坐者皆若人也此吾所為資焉者也不然吾省焉雖然吾所居里去郡邑逺大夫士非特至焉者吾見亦罕矣資將焉取哉曰野固有人焉冀缺耨而敬胥臣稱其有德謂仁之則於是乎在今之野焉知無缺乎茍有之其稽古傳恭將無説乎所謂資焉者孰大於是君聞斯言也以為得資再拜而受之他日以告豫豫謂之曰允哉君子之論可以銘君之心矣遂為之記君名潤孟潤其字系出五季十國所謂吳越王鏐蘇眉山稱其有德於民甚厚者也君九世祖進宋祥符間始繇嘉禾徙居無錫勝國時其孫寬甫益大其業至以私廪代公賑鄉人德之事具許忠敏公所為墓銘國朝洪武中君大父公達徙今磚橋父惟常世修鄉惠正統中用義受璽書旌于門君生承厥世面天資近道持身及家克勤無怠今且老矣猶不忘自針如是君之伯兄孟清於豫為尊姑之夫豫之知君蓋四十年于兹矣因并及之華氏佘山夀藏記錫東諸山錯起於平野髙下相望者以十數惟佘山為小堪輿家顧有取焉登而望之奚山左參白簷右嶞前屏陽岑後負膠䫈而佘乃中居三山華君永貞之夀藏實卜於斯既定厥兆鑿其北則石壁嶄焉以立荒其南則沙垤纍然以延昔人所謂天設地藏以遺其人者殆此之謂乎自始事至于今蓋二十餘年矣而門焉道焉池焉梁焉階焉堂焉室焉臺且亭焉無弗備者歲辛巳季春吾嘗逰之今年是月其子進士子宣歸自京師則以君意來請記前志有之豫凶事非禮也今之夀藏云者蓋近是矣而談者率謂之達且今日之夀藏則他日之新阡也於古所稱族葬掌於冡人墓大夫者亦若弗類焉何三山君見於其一而遂忘其他也歲制時制古之人則亦有然者矣况非歲時所能為者而夙自營之非所謂豫凶也於葬既久則地不能容其在吾錫他族不必論華自宋以來由隆亭而冷村而厚本而夀山而椿桂蓋凡五遷矣變而通之於今為盛三山君其殆見於是乎通幽明之故適新故之宜義以起之而禮以成之引於前而益逺衍於後而彌昌將於是乎在是皆可書也若其經理之勤位置之悉則觀於子宣之記足矣君名智永貞其字三山其别號也其父為西野翁鄉稱有德君無愧為其子云容春堂續集卷十
