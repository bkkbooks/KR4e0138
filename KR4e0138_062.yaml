body:
  text: 容春堂别集卷七明卲寶撰墓志銘十八首壙銘一首明封宜人王母任氏墓志銘宜人任氏為隆慶州知州進階奉直大夫王公某之配其子今南京户部右侍郎瓊先為工部主事以考績例宜人始封安人比進員外郎乃加今號按任氏世居山西太原宜人父曰恩母郝氏年十七歸奉直公公父某工部尚書公某子也宜人入門敬謹雍穆事尚書公及其配李夫人以孝稱初公為諸生讀書黌舍中宜人居家治食飲以供及小大諸務一不煩公心尚書公好施豫宜人常佐公承其志李夫人老而傷股在牀褥者幾三年宜人與公躬浣滌無怠夫人至忘其恙以終後公舉于鄉筮仕知昌黎縣宜人獨留于家凡十年教飭諸子女畢婚嫁壼以內無隳事比公遷隆慶户部以進士便道過家迎宜人從公于官居數年公罷政歸於是家指日繁宜人以勤儉相公諸子遵之皆尚朴素蓋若有政焉又數年公卒宜人哀以禮户部由工部郎中纍遷至右副都御史理兩淮鹽課時宜人皆就養及總漕運被召還朝孫朝立乃自臨清侍宜人歸太原既而轉吏部右侍郎再改今官而宜人以疾卒正德已已五月有五日也距其生宣德巳酉十月十有六日壽八十一子男四長瑤國子生次即瓊次玠義官次珮儒士女三長適國子生太谷白元瓉次適郡庠生榆次羅崇德次適陽曲張永相孫男八長即朝立儒士次朝元國子生次朝翰朝簡朝迪朝選朝起朝碩女七長適渾源郭衛邦次適舉人鴈門崔允次許嫁平定郗元洪餘皆幼曽孫男女各一宜人之始卒也户部時奉勑賑飢南畿厥既聞訃即具事狀徴銘于寶寶以漕事朝京師其姻駙馬都尉崔公又為之速會寶致仕東歸未能執筆以復明年庚午三月十七日户部奉宜人安厝于柳林之墓合奉直公兆伻以書來請終銘之銘曰烏乎宜人德稱于家子為國禎天王用嘉載錫之號有誥以華至光無幽至顯無遐我銘一辭於宜人乎奚加仲室趙孺人墓志銘正德丁卯冬陜西按察副使仲君與立寓書湖南徴豫銘其室趙氏孺人之墓既而其子承祐寓朱户部某所為狀至自寶應豫以君失嘉耦方為惜之而何能不銘之始豫舉進士獲識君之父太醫院使前通政松東公於京師知公事其母貞節鄭太宜人孝其配楊宜人奉以周旋伏臘燕饗無專無廢能不失鄭意公子三人既有室猶遣出遊潘南屏丁補齋二先生之門每旬日一歸讀誦不輟其家法之肅如是今讀朱狀乃知有婦如孺人者固亦有與哉及豫為許州君舉進士由刑部主事出判汝寧稔聞其卓異之譽狀謂孺人相而慰之其亦信然狀又謂君三歷臬司孺人自留奉姑于家而卜妾以從待寡娣遺之佚撫孤姪導之勤皆人所難者由前所聞質諸今所稱銘之實宜初孺人疾亟其女適朱應辰者密刲股肉和藥以進君子稱孺人有女孺人姓趙氏其先淮人後徙寶應西安同知某者其叔祖也父曰剛母某氏其生為天順辛已十二月二十六日越若干年歸于仲又若干年正德戊辰六月三日以疾卒年四十有八葬以卒之又明年某月某日墓在邑北郭某邱之原子男二長即承祐縣學生娶儲亞卿靜夫女次承榖娶某氏其庶亦二承慶娶某氏承汴娶某氏女三長壻即應辰朱知縣存仁子也餘尚幼銘曰仲有壽姑有婦克孝孝婦有婦惟孝婦是效三世傳德遂成壼教奈何不吊吾嘉仲宗兹以銘趙故無錫縣道會梅鶴許翁墓志銘翁諱真常許其氏梅鶴其號無錫方湖里人父敏母陸氏生而骨相竒偉弱不好弄識者異之時洞虛知宫陸靜淵者為翁母舅遂依而學焉陸之徒為龔太沖氏龔之徒為范玄機氏翁禮為師既乃學祈禱法於太沖學攝召法於姚端夲學齋醮法於湯應泉學養生法於四方之羽流由是名譽日起翁尤嗜儒學初從余伴讀季樞得書史大義後益奮勵於古詩取諸陳遜庵天澤律詩取諸高梅庵惟清雜文取諸吳管窺鵬舉真行書取諸陸竹石懋成恆以緣飾教事平居文雅莊重見者稱有德容焉會道會缺衆以翁舉同輩欲奪之郡守龍侯晉試以文翁援筆綴數百言其論遂定在官若干年取重自躬部使者暨郡侯縣公無不加敬張真人嘗以覲過翁逆之甚恭真人改容禮之謝事後益究引年之術聞武當之勝嘗三往遊尋訪古迹及名流異方皆有所聞而還始從師居城南祠山廟後復居洞虛宫雷神祠皆有修建功晚益好靜恆焚香燕坐觀史賦詩以自適或與客圍棊當其興趣所到岸幘長嘯自謂神仙中人忽病數日卒於是豫方東歸聞而哀之其徒范景辰將以是年冬十二月八日葬翁惠山河滸之原乃以吾友茹少參世和狀介周雲漢來乞銘惟吾先大夫純和公與翁遊最密豫故以執友事翁雲漢始從公數十年公知其有志儒學遂遣從俞御史世德習禮經束修之資樂為之助論者謂翁有歸儒之心故於雲漢贊之決不然道不同而能為謀如是也哉某以是重翁惡乎不銘翁卒正德五年正月某日距其生宣德某年某月某日享壽八十二徒一人即景辰景辰之徒四人某某某某銘曰雲衣星冠尋真名山蒼顔碧瞳虛往實還儒有夙心晚嗜益深乃謂其徒修贄士林鶴鳴梅開翁招不來白雲悠悠翁在瑤臺鄒以升配王氏墓志銘王氏諱瓊字潤卿常之武進人故南京吏部尚書贈太子太保諡文肅思軒公女也其兄為都憲公希曽其歸于鄒為堂字以升配以升霜檜翁某之子宋忠公弟進士泂十幾世孫錫之言望族者歸焉王蚤失其母某祖母朱太夫人實鞠之長教之小學女誡諸書及古今格言皆能口誦事繼母孫夫人以孝謹得其愛既歸以升姑周氏已沒事繼姑鍾如事孫夫人既而霜檜處分諸子自為别業蠡湖之上蓋去故居半舍許王晨夕饋於鍾以達於翁猶在堂也越若干年翁暨姑年皆高以升迎歸凡服食王必先時備物得其歡心自奉儉素嫁時珍綺屏去殆盡惟鄉族是從談者以為難於是文肅日貴顯第宅服御之盛甲於郡中王嘗縑卉歸寧儕輩或誚其過王以分謝之終不為變平居佐以升重祭敬客勤耕博藝不亟不徐務歸于義以升兄弟數十人王皆禮之於同母者加焉或問之曰不敢忘吾姑也業諸子女訓必以幼率必以躬每誦古常語曉之蓋以升之家政稱理者凡若干年衆而無譁賾而無擾逆而無躓周旋默相王之力為多初王聞其兄都憲公沒于官哭之慟及姪中書忭病就醫吳中乞見為訣王冒風霧往自是遘疾數月遂不起姻里聞訃有流涕者王生景泰三年六月二十有二日卒正德四年十二月二十有三日得年五十有八子男三長欽次鎔太學生次鉦娶皆華氏女二皆適華長壻鯨蘇州衛指揮次訓太學生孫男五人女八人以升卜以卒之明年某月某日葬王于其鄉闕新阡乃奉户部郎中錢君世恩狀來乞銘豫知文肅公之家政舊矣今徴之銘曰關雎之風葛覃繼之勤儉孝敬允為女師此有令人孰曰未學我刻銘詩以配古作明故承事郎思本朱公墓志銘吾郡稱善教子者邇年來以思本公為之最公之子今通政司經歷昶蒞任有聲封典將及而公沒知者惜之公善居第崇巨堅朴如其為人先卒之數月火幾盡既而訃至知者重惜之時豫督漕師入朝吊司經於京邸司經乃奉何户部孟宜狀來請銘某之曽祖母公之族姑也於司經素有斯文雅其能辭于銘邪按狀公諱斌字世昌姓朱氏别號日新晚更號思本常之江隂人其先有諱良璧者實晦庵先生從父行宋宣和進士官鴻臚主簿從思陵渡江家於晉陵十傳至均寶始遷無錫則公之六世祖也均寶生浙江提舉光逺光逺生紹興知事子升子升生士銘入國朝為江隂之宗士銘生善慶善慶生維吉號梅月正統間以孝義旌門景泰間被薦授修職郎通政司知事其配鄒氏實宋忠公浩十三世孫有子二人公為仲質直好義博學善為詩嘗從父京師終日侍左右無倦中朝卿大夫賢之贈之詩歸與兄世寧居友愛敦篤庭無間言既而以父命出居西偏朝夕承歡不以逺故少廢父沒殮葬以禮徴銘集誄碑板盛傳談者侈之先是景泰甲戌嘗出粟千斛助邉受服如例成化丙戌飢復輸粟錫璽書旌門繼加承事郎公感激圖報凡義舉若修學築城造梁之類必為民倡郡邑長吏亦必以屬公論者謂公受異褒於是為稱其御家內外井井僕數百人因能授事各有紀綱公總其成勸勤懲惰政若公府處姻族率以恩勝義與人交敬而信恭而度故無尊卑踈戚皆敬重之雅好文學雖家務叢賾不廢講論其教司經尤加之意聞有博洽士不逺數百里必延致之館榖問遺儀物兼至司經既得鄉舉猶課督不衰孫承爵生公蠲逋租數千斛以志喜及長為邑諸生卒業南雍稱好古學公因而進之期逺到焉初公立門户有軒特之稱中而坦然終而退然雖或侮之弗較也君子謂公於是乎哲司經之初授官也屢以公病乞終養公口授家人謂宜勉供事不得顧家及遭火變又以書慰之歸之數而已公生宣德壬子五月二十二日卒以正德四年九月三十日壽七十有八配長洲惠氏先公二十年卒繼同邑何氏子男一即昶女四徐渙楊維何桓邵天民其壻也孫男一即承爵曽孫男一伯曽女二長未聘次許聘何應辰墓在邑東慶雲磬石山之原蓋祖塋地公嘗於是營壽藏惠氏卒葬焉司經卜以某年某月某日啓而葬公銘曰古有世家命由國君今也則否自我高門大江之南世家者幾朱稱文林為鄉之紀家有偉人曰思本翁幼學老傳以義始終孰不教子翁心則篤維詩維書以似以續國徴文獻惟家亦然或觀民風視表于阡承事郎慕菊朱君墓志銘君諱暄字朝陽姓朱氏别號慕菊世居錫城南石洋里高祖壽義曽祖彥昭祖士原父本字文立號菊莊有鄉行母蕭氏君幼岐嶷從里儒華適安遊讀書通大義尤好觀史每見姦邪誤國處輒抗聲罵聞者壯之甫冠兄曦卒府君外應門户內事菊莊極謹初菊莊為良稅長老厭於役君力為謝之疾而懇禱喪而慎斂葬而備窆且有終身之思以父愛菊嵗時對菊輒感傷不已慕菊之號以此申祠堂之規謹墓祠之節視菊莊不少替姊妹四人既有家而業衰君悉周恤之若宗姻有大事求無不應戚者有加賢者又加焉或售産劵求益再三與之菊莊存時雅愛客客至必留飲飲惟勸酬微醺乃已不效里俗為喧譁態庭有牡丹數本嵗為賞花之燕旬日始罷府君繼之每舉加盛又為巨舫遨遊溪湖間號曰野航錢希翁為作賦然性疏率與人談笑洞見肺腑往往面折人過過而能改則又稱道不釋口嘗罹橫逆君知其人姦賣田以貨之後數嵗節縮經理卒復其田既應令助賑受七品官階乃以家事付其子而間適以老所居近郭多野趣前有沼植蓮其中為亭曰水雲東為觀稼樓各以其時居之如是者若干年卒卒之日為正德戊辰十月三日先是遘疾自度不起治命甚悉大抵皆勤儉忠厚之語君生正統二年丁已九月二日享春秋七十有二娶楊氏子男一辨女一適華汝器季子户部書算世明孫男二某某幼孫女一許配堠陽華某辨將以卒之又明年十二月十八日葬府君祖塋之次在所居後左銘曰菊云菊云隱者尚之兩世一德再培而滋采蓮南池觀稼東閣吁嗟若人不可作矣九原有知無亦謂夫斯邱之樂也乎東耕處士楊公墓志銘東耕楊公吾從母之夫也楊於錫為望族蓋世長鄉賦若有政焉茂林景信在宣德正統間尤以惠稱於公為曽祖祖曰汝潤者公父也其性曠逸不羈以輕信人故負公緡甚多於是公方學于傅書史有程矣即毅然以代勞為任百方營補數年而後克完有司用法困辱叢至母潘氏卒出則就理入則當喪能不以厄廢禮衆憐而壯之既乃謝稅役與其配過孺人檢內外資産葺殘經賾加以節儉又二十餘年而故業復中遭祖母朱及汝潤公之喪皆力為葬具念母早喪隆禮於舅氏甚篤舅儒醫也諸子克世其業與公相師友婚嫁子女時而當物愛其弟妹恩及甥姪雖居城市非慶吊不出客至必留欵竟日談古今事亹亹忘倦酒酣吟哦意氣動人君子謂其有國初諸老之風時公年五十餘張御史淮巡按江南重耆老之舉郡縣強公為之未幾求退其效謀持斷公平著于上下者視稅長時為多然自是多居鄉躬閲農圃東耕之號以此凡嵗積與里人共歉散豐收不以時趨利鄰嘗火至公廬而止群盜煽虐戒毋公犯晚受仕者服應賑飢令也親黨論曲直者咸質平焉公性直諒與人交無留言隱意識者謂公古逸民非今人也使人人皆如公安用官府為哉公聞而謝之公諱旻字日初壯以字行過裔出宋徐王郡馬孟玊子男二人槩娶過即母族繼趙宋後諸孫也楷娶殷為方伯序賔曽孫女一人適永康丞成景高子瓉早寡有貞行孫男二人楷之子淮邑庠生娶高沅州孫女槩之子汴亦聘于過女四人其壻長為庠生莫同次為陸南康子術又次為張黎平子琳琳始聘又次者幼公卒于正德戊辰二月十一日距其生宣德甲寅十月二十三日為壽七十有五葬以卒之又明年庚午十二月某日墓在邑西龍山河滸之原從先兆也初公之卒寶在浙藩將之湖南聞訃而慟有未能會葬之嘆乃今幸獲臨穴且以槩楷請執筆為銘實寶志也其事寶所逮見及聞長者言其詳則徴諸王元信所為狀云銘曰為士為農為商之質為夏之忠惟變乃通幹蠱於初履坦於中卒也缶歌是為君子之終奉議大夫湖廣按察司僉事姚君墓志銘湖廣按察僉事姚君秀夫既卒之二年其子伯生狀君事來請銘豫與君同舉進士相知為深昔在貴溪豫既吊哭之銘固弗容遜也君諱文灝秀夫其字自號鄱東野人晚更號學齋世為信之弋陽人其先有自立者徙貴溪東山至本正始膺貢為太學生君曽祖也祖添德父明以鄉貢進士官監察御史陜西按察僉事配王氏生君年二十領癸卯鄉薦甲辰省試第二廷對賜同進士出身授工部都水主事督造淮安運舟改刑部陜西司調常州府通判遷工部都水司主事督浙西水利以病告家居起為刑部廣東司主事擢今官提督學政三年而卒初君侍父于陜時方弱冠讀書恆逹旦見者知為偉器及歸娶獨行親迎禮流俗咻之不顧父喪極哀毁內翰張公東白謂人曰是子可以語道矣勵志問學能忘其貧文譽隱起比有祿迎母就養京師踰年母歿歸其喪葬之廬墓終制其督漕舟處置得宜軍民稱便在刑部才三月坐纍當調外或謂任淺宜自白君曰職既在是即一日亦與有責敢獨免乎言者愧服常州水政先諸郡工部侍郎徐公貫奉勑視水浙西君陳興革事皆見施行還朝上君治狀遂有工部之命君既受命亟陳水利六事一曰設導河夫二曰發濟農粟三曰給修閘錢四曰開議水局五曰重農官選六曰專農官任鑿鑿皆經久計朝議行其四事君巡行相度雖極險逺忘其勞繪水道之圖人謂之確集水利之書人謂之備其自著又有事宜一編皆行於時及歸大巖下益事著述提學命下輿論允協君慨然以作人為任條教甚悉大要本聖賢之學而參以時制痛革浮靡考校一斷以公自謂毁譽不入請託不行賄賂不通聞者以為不誣甲子之試凡中式者皆公所擬侍御包君澤歎服其精而公不及見矣君性方嚴純正平居寡言笑在官無二志在家無嬉容友諸弟兼有情誼接人敬人亦敬之臨事剛毅充其志雖死生在前弗顧也自始仕至卒每公暇端坐手一編儼如儒生諸經書皆有辨論或欲更訂大學章句公謂宜守程朱定本至其獨得時又自附當仁之義非有識者不能深知也公所著有學齋吟藁文藁經説雜説報德録中庸本義諸書藏于家公之卒也其配樊安人携伯生歸試君以後事屬二三寮友殯斂周謹君子謂君忠誠感人至是益驗云君生景泰乙亥五月二十三日卒𢎞治甲子七月二十七日年止五十葬為正德丙寅十月一日墓在邑河潭龍山之原子一即伯生孫一曰仲賢銘曰刑名水利用儒為吏吏未盡儒儒有餘地我著我書靜退之餘奮其往如為君子儒湖南之教少徴儒效粹如其文於德有耀充君所志當止於何考言較功其得孰多龍山之麓英靈攸復我銘不磨中有貞玊華室鄒氏墓志銘鵝湖華允昭將葬其妻鄒氏乃屬其族弟珉書來請銘于豫珉豫甥也道允昭之意甚勤既以吏事辭至再三請乃諾而銘之按狀鄒氏諱某字某其父曰靜修處士佑之生若干年歸于華為會通公子婦其配允昭名奎於行為仲佑之公華出也復娶于華故歸焉重世􅀈也鄒氏天質貞順幼承內則夙有儀度其在華氏若干年事其姑錢堂謁室饋進退庭階無少愆違平居寡言笑妾媵稱仁奴僕稱義於允昭得相之道允昭亦賔遇之成化間允昭以訟北上遂服淡食素至成悸疾鄉人談之嘗生女而夭恆以嗣為憂後側室生子曰是即吾子其知大義如此故有疾以姑之喪而劇是時父母繼喪母兄弟六人喪者五矣至是不勝哀遂至大病臨終無他言惟不欲金帛殉葬云鄒氏卒𢎞治乙丑九月二十五日距其生天順已已得年四十七子一曰鎔女二葬以卒之又明年正德丁卯某月某日墓在西壽山先塋之次華出南齊孝子寶至允昭若干世鄒出宋忠公浩之弟泂至靜修若干世詳在其譜銘曰憂而惕喪而戚而視庶猶適維惇于心乃至斯極忠門之孫孝門之嬪貴不以族維其人兮徐府君墓志銘府君諱乂字宗俊别號浩軒其先為宋節孝先生積之裔蓋數世至彥京者始自蘇徙吾錫以巨族稱於招義鄉彥京生惟育惟育生景徽景徽生元德厥家始大晚以輸粟授承事郎尋復益之旌其門曰義民承事娶於張生府君弱冠時父命治别業極力經畫堂寢門庭整而有度識者謂其能家長司鄉賦征斂不苛民甚德之入事父母尤善伺顏色以勤儉承意若甘旨之奉則恆事不論也母嘗念府君獨勞公事欲分任於兄府君辭以分當爾且曰弟事於公兄事於私奚獨勞之有及父喪愛兄彌篤久之勉從兄命析居其析也凡百就其薄者至於書䇿皆以畀兄之子人尤多之御家衆以公食指千餘無敢譁閧施及鄉鄰救災恤患吊死問孤遇嵗飢減租增貸有德惠焉或勸入粟補官不聽布素終身略無慊色性不喜綺靡獨與賔客飲則浩然暢懷因號浩軒淵默鯁直平居似不能言臨事剖折侃侃如也病且亟以勤儉訓其子甚悉語畢乃瞑時正德庚午六月二十有八日也距其生景泰癸丑八月十有五日壽五十有八配章氏先卒繼黃氏子男二長言義官次竒女一適義官江隂張堮孫女二言等卜卒之明年正月二十日啓章氏兆合葬以吳君大章狀託吾弟璣以墓銘請乃次第吳狀為之銘銘曰古稱本富力穡服田加之行義尤謂卓然吁嗟徐君吾表其阡烏呼賢哉玊亭處士張公墓志銘豫按察兩浙時公以小像命為贊比歸自漕臺見公猶像中也方以耆逸為公慶未幾公病久之訃聞且聞其沐浴更衣焚香正寢乃瞑先是命其子輅悉而無亂類有道者既而輅以其從弟鄉進士汝欽狀來請銘豫祖三益府君與公同為楊氏壻公豫祖行也銘烏敢辭按狀公諱復字善初姓張氏其先泰州人十世祖福宋國子助教從思陵南遷遂籍于錫五傳至天騏生士英士英生用謙號止庵醫術妙一時娶于丁生公幼能自立終日手一編不釋人以為有公輔器或勸業進士止庵曰隱吾世德也遂以所著醫書要指遺之曰汝第事此公受而攻焉學大進求者沓至公性簡重惟親舊則一往餘以方與之亦無弗效者家故有田僅足嵗用無他經紀蓋廉德與醫名並傳人謂止庵有子居父母喪以禮襄事於是弟某方幼愛而教之值病乃已平居莊敬自持雖盛暑必冠服見客客問則對皆有理致否則默默而已家藏書畫最多醫方倍焉觀其志即重貨不願易也有司以鄉飲請公辭之陳方伯晉庵輩為社會以公至為歡既老而傳即後圃搆一亭植竹數竿獨坐自適間與客坐竟日不及酒署曰玊亭蓋謂竹也錢太史福以公之德似之著之於文𢎞治壬子飢出粟應令受服每適野野服如故配楊氏義官汝威翁女慈婉多內助子一即輅初事舉業後以醫名女四長適寧鄉訓導馮夏時次適陳用時次適庠生殷佐次適義官朱珣孫男拱邑庠生曽孫男一朱公生宣德九年二月十九日卒正德五年八月十一日壽七十有七葬以卒之明年二月某日墓在邑開原鄉大池之原蓋公所自卜云銘曰其人如玊太史則云生居以亭殁瘞以墳惟輝燁如孰不見聞後有徴者請視豫文承事郎殷府君墓志銘府君姓殷氏諱廣成别號雲溪其先晉荆州刺史仲堪以守郡占籍無錫嚴埭鎮歷千餘年至國初有德徴者生子實始徙邑中定花版巷子實子序永樂甲申進士纍官至雲南左布政使得贈二代俱如其官于時再遷今城隍廟西公配夫人戴氏生璉字尚朴娶於周生子五人府君為長公以佳孫自慶日置諸膝飲食必先焉且教以幼儀稍長為尚朴翁幹蠱暇則歌誦古詩以養性情若世事亦旁究弗遺翁嘗被逮刑部獄府君從之行能專對問者見者壯之歸任門户事不以煩諸弟比其冠婚皆自備禮適嵗歉戴夫人在堂府君輔翁供事及卒斂葬如禮雖兄弟析爨事翁益周歸妹撫弟施及姪甥情愛周洽中嵗家漸裕教子以業則農賈兼事以學則師友兼隆卿士大夫謂布政公識府君於是乎驗當時姻戚中若盛中丞冰壑貞人也錢偃師孝常介人也厲青田文振狷人也皆重府君有疑以質焉晚以遼陽軍興例輸粟得七品散官蕭黃門文明實舉之嵗鄉飲請列三賔多辭不赴常乘一小舟于溪山間極遊觀之適又於水南為小溪山客至欵洽終日晉庵陳方伯作真率會府君與焉後諸老散謝府君獨優遊如故衆方羡之而病且卒矣正德庚午八月十三日也時仲子佐試應天聞而趨歸得奉遺命云府君生宣德癸丑閠八月十四日為夀七十有八配馬氏先十年卒子男四長俊次傑次即佐次修佐邑庠生俊傑修皆七品散官女一適太學生施誾早卒孫男五長奎次璧皆庠生次瓛次金次阿六女八朱珮過輈鄒孟楊濬吳恩陳稚秦瀚其壻也俊等將以卒之明年辛未三月某日葬府君於舜柯山先塋與馬合兆佐乃自為狀介潘君繼芳來請銘銘曰今布政使古稱方伯殷歷三藩九考厥績若國在昔邑論世族舍斯而何君方伯孫士行則多壯而恂恂老而番番鄉德惟歌我銘幽堂吁其不磨明故四川新寧縣知縣加封文林郎晚樂茹公墓志銘正德五年六月十有三日晚樂公以疾卒于家其子福建參議鑾聞訃歸與其弟鎣鑒卜卒之又明年壬申某月某日葬公惠山西北㠏􅣦祖塋之次參議姻友於豫最久故以銘屬俞給事國昌實為之狀豫素知公固不得辭也公諱玊字璧英姓茹氏别號石窗以勑詞有晚樂田園之褒故更今號公之族世為錫望勝國時曰良夫者以積善稱歷循仁文達皆敦行義文達之子洪國朝永樂中以諸生被徴修大典諸書書成授壽光丞卒于官配陸氏以幼子璿歸有貞操正統中詔旌其門璿娶周氏生子三人公為之長公體貌端偉而性尤敏慧自八嵗入小學至十二治書經為舉子業日有所進嘗以家藏舊琴按譜彈之宛得古操十五從都憲冰壑盛公遊繼又資諸馮參議麗庵唐教諭主一劉知縣梅堂三公且廣擇友為講會比入邑庠每試輒優等為同輩所推居父喪以禮君子重其行數舉不利乃以貢入太學遭母喪喪畢而起備極困乏而志益強又若干年年五十二選官得新寧於是參議舉應天鄉試公奮曰吾父子蒙薦國恩厚矣敢不力圖報稱既至官賑窮恤孤鋤強扶弱凡諸利病次第罷行之民翕然以歸時有鄰警公請城焉雖勞且費不恤有計遷學以易地者公發其隱寢之然雅有逸趣年六十二即致其政歸及參議登進士公受今封乃以家政屬次子鎣鑒别室於所居西偏靜究引年諸書有方士至必延與論議皆謂公有所得矣而觀者亦以貌力稱其言云公生宣德五年四月十四日壽八十一配金氏子男三長即鑾釋褐知唐縣五遷至今官次即鎣鑒皆七品散官女三陳時雨夏從桂施泰其壻也孫男五霆早卒霽䨤霓霦女五嫁者三壻李裳鄒立袁渭許嫁者二壻盛某鄒某曽孫男二繼宗衍宗俱幼銘曰士有民社是謂志行罔曰邑小大者是徴仕始五十六十乃老君子謂公見幾之早峩峩㠏􅣦公昔所遊龍章寵賁成此一邱明故景婁處士錢公墓志銘公諱清字孟清姓錢氏别號景婁無錫人也其先蓋出吳越患獻王王曽孫某始由嘉禾遷無錫七傳至裕而族始大裕之孫曰彥春元永嘉書院山長公高祖也曽祖伯剛祖公達父惟常世有隱德惟常配鄒氏生公甫二旬而鄒殁公鞠于諸母稍長從周誠齋先生遊敬而能勤日課外涉獵辟籍尤熟小學性孝友自能言詢得母儀容悲慕不置屢形夢寐父疾刲股者再皆有感及喪斂葬如禮而哀毁過之復裒銘志之類為書以傳所謂遺芳集者是也庶祖母姚寡居踰二十年公白于官以聞詔旌曰貞節弟孟深蚤世以次子模後之及諸幼弟均為立産成室祠堂之禮品式具備躬率子姓春秋墓祭忌日寢祭哭泣終身生日不受燕賀至老猶然周恤貧乏篤於私好助官賑民飢者凡二正統庚申出米二千石朝廷有義民之旌時公尚少實贊其父惟常公為之景泰甲戌出米三千石公獨為邑人先自是益樂施豫內外二族及鄉之親舊待以舉火者數十家為糧長費不及民顧有助焉常製藥以濟病造棺以濟死立義孰以教人子弟其治道路建橋梁嵗有之不可勝録公儀容豐偉衣冠朴雅望之人皆知為重厚長者表然世族楷範聽其言簡而度即其行端而恪罔不起敬性好賔客江左知名士多與之遊有詞章贈遺動盈卷帙其趣尚所寄舟名水雲圃名寰瀛恆以古書畫自隨竒花異石不讓昔人所謂名園者邑大夫以鄉飲禮請輒辭之時有縣官不得見之稱閭右有健訟者人必舉公為戒公益謙慎欲以柔道率物慕師德唾靣事故號曰景婁云及疾作閉門不出者數月一日集諸子暨孫告以後事且有規言又三日而卒公生永樂丙申十月某甲子卒𢎞治壬子十二月某甲子享年七十有六配邵氏繼孫氏皆先卒子男三俱義官長楨娶華氏次即模娶何氏次棟娶司馬氏女四孫男十楨等卜以癸丑冬十月某甲子葬公于邑西開化鄉軍帳山先塋之次二配合兆奉其從叔父孟洪君狀屬從弟今禮部主事世恩請于故少保璚臺邱公為表其墓復以寶在姻屬俾之銘謹敘而銘之公嘗授義官而鄉先生題墓曰處士本其志也銘曰處士之業好義而濟復有群行忠信孝悌以義而官有峩者冠考公平生匪直一端所未滿者公身在野公實樂之時豈公舍孰題厥阡君子曰然有徴斯銘後千百年夏室周安人墓志銘周安人吾姻友户部郎中夏君如山之室也正德戊辰七月一日卒于習禮里第又明年庚午某月某日葬于范莊先塋君自為狀使來徴銘君以𢎞治癸丑進士授工部主事纍遷至今官凡若干年安人皆從之以君考績受今封辛酉君奉命清屯田於山東河南於是君之父封工部主事訥庵公病君屬安人歸侍湯藥凡若干年訥庵卒安人任焉比君歸安人佐襄事以勞而病又遭子喪遂不起年止四十五按狀周夏皆常之江隂人周為宋丞相益國公後自洪州徙無錫陸墅元季有曰貞五者贅夏氏既盛而衰其曽孫良輔力穡以復遂與夏埓望良輔娶于王生安人婉娩溫惠年十八始歸君從遊郡庠相之學歸事其舅姑甚謹每飯必侍既飯無他言始釋然退若候他起居類是君凡三歸妹安人力襄其行至出已裝不吝其歸趙氏者夭取其幼女而子之承姑意也及從君北行子楨方弱安人知姑意欲留雖甚愛不以自隨時時念之有服食物必致致必先姑聞者以為有禮居宦邸節用而整僮奴各事事無惰蓋君疏於治生故安人助之然事無大小必請於君君喜賔客席無虛日觴豆所需未嘗缺緩或先意而具視事舅姑時蓋裕如也及其病也兩婢扶腋猶視家人婦治膳曰養不躬雖豐非禮嘗以是自恨且痛其子學成而弗年故病日劇先是兩為君置妾至是謂曰吾病必不起即延數年君則衰矣再娶益晚乃謀娶同邑徐氏為二室以同生視之徐亦事之如其母卒以姑養託焉姑包氏封太安人安人諱某子一人即楨娶某氏其别出子二曰某某孫男一人曰霖銘曰鼎則有味琴則有聲既和且平德焉是徴家利女貞胡彼階厲我銘令人此有餘地司馬孺人墓志銘司馬孺人為錢君世梁之配錢吾錫望族司馬邇於錢而世通姻焉孺人父廷駒母陳氏廷駒早世無子女惟孺人已受世梁聘乃議後者立其弟之子曰􅂒時孺人尚幼哀痛中時為寬言以慰其母處􅂒無異親弟宗老頗異之稍長從女師授孝經列女傳能通大義剪刻裁製尤多巧思及笄將歸于錢其祖以衡顧曰吾老􅂒且弱而人行則門以內事孰與輔吾婦者不如因館其壻於是世梁二室於司馬氏司馬氏之業益裕而理者蓋世梁之力而孺人相之也既而其祖卒􅂒長有立世梁乃以歸養謀諸孺人孺人曰妻從夫婦事舅姑禮也昔以俗處變今以禮復常不亦可乎世梁遂白於陳以孺人歸奉其父景婁翁命居馬橋别業馬橋去世梁故居五里而逺嵗時月朔孺人省問必躬無愆期無違度迎母就養在錢如在司馬者閫政日修上下左右恩煦義肅世梁無內顧焉孺人既多育猶以似續未廣益為世梁置婢有婢産女欲棄之孺人親抱持以全其生繼姑孫病痰劇孺人驚趨視亦病後孫殁孺人扶而往哭哀甚歸竟不起𢎞治戊申七月七日也世梁卜以卒之六年甲寅某月某日葬孺人於邑西開化鄉軍帳山祖塋之側先期以事行告吾友周君雲漢屬為狀徴銘於寶寶之再從祖姑世梁之嫡母也知孺人久讀周君狀而益信故為銘孺人諱某字某年三十有七子男七讃先卒次諤謖諲天相天澤天瑞女二某嫁邑庠生鄒諫某别出受王某聘孫男一永齡女一永秀銘曰始從以俗終歸以正於婦道也奚病死而可銘我最其行明故勿齋浦府君墓志銘府君諱瓛字文瓛别號勿齋姓浦氏世為無錫人宋建炎中有曰仲良者居邑之馬橋富而好施其子曰克明生名逺入國朝籍前澗族於是始望名逺季子宗賢以事殁京師遺孤彥溫母氏鞠以長鄉人稱之君祖也彥溫長子汝澄尤號謹厚娶吕氏生君垂齠時即有器局稍長從鄉先生講書史知大義年二十遂涉左氏春秋及它經傳皆能記憶對客讎論上下古今如目前事事父母曲有禮度母卒終喪猶哀父喪如之治家勤儉痛刮奢習衣粗茹淡為子孫倡嘗作書戒之曰吾聞兄弟翕而後父母順汝等其協乃心力無自生侮或以利而致鬬訟縱逭于法汝心安乎况法決不可逭乎且勤則成怠則廢為學與理家一也知孝者當有所務矣其朝夕常語亦以此旁通醫術不輕施用惟病而無力者豫之藥多驗故嘗蓄以待求焉天順中鄉民遭水患多就食其家或以竊財事覺衆曰斯人無狀盍聞諸官君曰飢寒故耳何足較也又有負人財將鬻女以償者憂形于色君問焉為之代償如數強賊匿于鄰鄰弗知也既而捕者至賊將誣以知情鄰懼來告君曰汝執送官彼誣焉用哉不果誣嘗道見遊僧刺指血寫佛書者君責之曰自殘以惑衆如父母遺體何即摽之使去其嫉邪如此君年既高邑大夫以鄉飲請則謝曰德與年稱斯可有年否德吾敢與乎今上改元詔行優老之典或勸君冠帶君笑曰詔例固然吾年與德何以堪之正德已已九月君疽發肩歷數醫轉劇乃集諸子孫申以平生之訓且戒勿用浮屠語畢而逝是月二十九日春秋七十有八娶顧氏繼華氏子男三長億義官次兆次秭女二長適吕樾次適黃訓孫男十二長榖次稹太學生次稚次稼次禾次稠次穆次秩次穋次秢次种次穎女五曽孫男三女三億等以卒之四年壬申十二月二十日葬之于其鄉石窒山之原先期奉羅建寧文徽狀託吾姻吳鯨氏請銘豫雅聞君之行為之銘曰士有逸遺乃身在野義形于詞尚論古者澤弗逺施施止其鄉辟彼澗泉引之則長逺觀其孫近視其子我銘不誣輿誦如史茹室女壙銘成化癸卯正月庚戌新寧令茹君璧英有季女在室久病而死其伯兄鄉貢進士廷和聞于南雍慟哭馳歸既寓書報新寧遂以其年八月某日袝葬于龍山祖塋之殤位仲兄廷貴亦自新寧來會葬先是廷和圖銘于豫豫諾之豫何取乎而為銘也廷和之言曰吾妹生幾年吾父以國子待選京師即侍吾母金孺人以隨既而病足痿醫莫能興居幾年吾父有新寧之選始携以歸當之任以蜀道險逺吾妹隨行難於是鑾將卒業南雍乃留于家依我室相顧悲咽而别吾妹慕父母不置病屢以劇今年春遂至于大病年止二十四嗚呼哀哉吾妹慈惠幼成婉娩有儀平居聲不聞于壼外中饋之事代母之勞為多織縷文繡精巧過人吾父母愛之思得良士而嫁焉然而不幸值奇數以至于斯且生之日什五疾病死之日不得見父母兄弟以永訣重傷吾妹心嗚呼哀哉今也骨肉歸土不能為懷惟是壙中之石宜有以志子其念之豫感其情是以諾而為銘也銘曰瞻望父母蜀道長只幽魂飄飄心孔傷只比時具物葬有兄只雖則傷只亦尚康只鄒本忠妻錢氏墓志銘錢氏鄒本忠妻也卒之幾月嗣子某之父舄介其孰賔吳宋卿來請銘曰某孩提罔知敢代以請越數日又偕錢之弟元玊來其季國子學録潤中君實友於豫故諾而銘之錢諱淑潤錢其氏出吳越武肅王鏐勝國時自臨安再遷至無錫新安鄉國朝義居處士公性者於錢為曾大父服習禮義有古君子風大父惟心克世其德父應機母湖塘蔣氏長歸于鄒為本忠配本忠名秉衷宋忠公浩之弟進士泂之後由晉陵徙無錫泰伯鄉世尚隱節力本以富其家入國朝桂堂柏軒約齋三府君居龍涇上尤為族望錢幼具四德讀孝經列女傳通大義母嘗病且危錢侍湯藥至廢寢食夜率二弟露禱北辰母疾遂愈及其歸也年甫十八上下翕然宜之不二載秉衷病疹以沒錢慟哭幾隕既畢葬事奉姑周氏晨省昏定日以為常姑性雖嚴能得其歡心已而姑憫其無子勸以再適錢不答至再三言之則誓死以謝後姑老命與諸叔氏異産錢讓而後取既乃以禮繩衆課耕督織內外肅如業日以裕極飢恤寒里鄰婦女莫不感化若其順德行於姒娣惠心孚於妾媵者又恆事不論也姑亡後悲思成疾力為殮葬一日疾作就枕月餘乃卒初子叔氏秉倫子玄恩五嵗而死至是自度不起立某而暝某方二嵗於錢為再從子云卒之日為正德已已十一月六日距其生天順壬午二月一日年止四十有八葬以卒之明年某月某日墓在寧山之原合秉衷兆銘曰死知立後孺泣者孤九原有知無赧厥夫婦不二適為貞為孝嗚呼慶門孰曰不吊容春堂别集卷七
