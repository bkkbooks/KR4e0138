body:
  text: 容春堂後集卷二明邵寶撰記十四首碑銘二首奉詔侍養之堂記上之六年正德辛未臣寶承乏中外之二十八年凡十一遷至今官明年壬申臣以母太淑人老疏請終養上初不許復請則許省視給道里費以歸歸又請乃有侍飬之命當是時臣得歸養幸矣上優焉故特詔如此臣不德何以承之越四年乃作斯堂臣奉母朝於斯夕於斯歲時節序於斯臣母及臣生之日皆觴且拜於斯惟天咫尺載瞻載稱以康吾母堂哉惟君命之重哉臣生三年而先臣棄臣臣母守節五十有五年於令得旌門臣未之敢言臣心缺焉臣母之再受誥也於是臣陳情者再矣誥是以有矧豫風紀之臣上有貞節之母之語宸章敷賁載揭堂楣君子謂夫誥也其為旌也孰大於是堂哉惟君命之榮哉臣愚敢不圗所以為報者然臣病矣臣於是乎愧詩曰中心藏之何日忘之户部左侍郎臣寶謹記莆田林氏忠烈祠碑銘有序正德壬申今致政右都御史莆田林公俊新作始祖邵州公祠於郡城𤣥妙道院之左榜曰忠烈别家祠也於是公起征蜀功成上有白金文綺之賜公謹以從事公弟通判侃義民傅知州僖及從子御史季瓊皆有助焉子主事逹時為諸生奉命以共越五年丁丑考成侃等使來屬某書曰惟我林之先得姓最逺唐睦州刺史披九子皆刺史是稱九牧邵州公蘊其六也初邵州為西川節度推官劉闢叛逆力抗不屈繼掌滄景書記程權上籍陳義贊决國史郡志皆以忠烈稱於我林所謂始祖百世不遷者舊有祠在聨桂坊宋時入郡學今禮殿其地時邵州十三世孫宗正寺簿應成始為小宗祠於家而邵州之祠以力未建國朝吾祖教授敬齊公暨吾考鞠庒公繼圗之未就惟以田易今基至吾伯兄見素公始克為之祠中像邵州歲冬至祭小宗之子孫攝行獻禮具有儀式邵州以下稱賢者則分繪於東西序之别室以示瞻仰而不敢為位懼僭也祭畢而餕邵州支庶之賢者與賔焉此皆議自吾兄衆以為允惟麗牲有碑將歲月是紀敢以為請某嘗從公觀林氏世譜而徴之史志允矣邵州之為賢也惟家之有不遷之祖尚矣然親盡之後世祠而不世祔祭以大宗小宗助焉禮也有賢如邵州者鄉人祠焉而宗祠乃缺族且蕃矣顧獨以非分而弗敢繼曾謂宗之人不如鄉乎且祖祠於上而族合於下有萃渙之道焉傳所謂禮雖先王未之有可以義起也者斯其近之矣公賢者也禮義所由出焉敦邇而風逺固當自其家始推邵州之心而視諸其族凡所當恤力不顧私且圖繼之以義田公又將自兹祠始某辱公知然不敏不敢與知祠敢刻兹銘銘曰林稱九牧邵州其六世德惟休為莆望族廪廪邵州始起文科抗闢諭權忠義則多兹維盛德世百宜祀鄉人則然矧其孫子子孫孔衍孰肇而祠有族弗合以歲以時都憲貞臣曰是在我是咨是圗祠歟其可上有功賜乃材乃傭宗人聞命亦罔弗從吉日考成肅儀備物堂堂邵州南靣紳笏於宗曰祖於郡曰賢君子曰允我詩其傳之歙縣西溪汪氏先祠記西溪汪氏先祠者其族孫燦等即故基而建焉者也西溪之始遷實自元宣教府君以宣教為大宗而諸宗從焉禮也今之祠乃上宗於其古城東關之祖宋司農少卿公何居司農於今十有二世矣又上宗於其始祖唐越國公宋加封忠烈王何居越國於今三十有五世矣越國起兵於隋論者擬諸秦之吳芮歸命於唐論者擬諸漢之竇融其於鄉也生有保障之功沒有禱祈之應故自唐至於今郡之人皆祠之蓋神之也而古城東關者西溪之所自遷也禮有義起先民則然燦也將是附焉爾乎祠之制中為堂三間奉越國像冕笏命服南面儼臨蓋猶神之也東為堂三間中祠司農公自司農以下仕隱之有聲者左右祔凡四世九人西為堂三間中祠宣教府君自宣以下齒德之有稱者左右祔凡六世十有七人中堂之前為堂五間如古榭之制歲時享於斯薦於斯燕羣族於斯前門後寢夾廡周垣無不具備鄉之人謂是祠也於昔為盛九江推官致仕浚者燦之再從弟也以故吏故不逺千里詣豫請記且述夫人之言曰古有宗法今之祠於古無所當也豫曰人之言然然不曰繫之以姓而弗别綴之以食而弗殊雖百世而昏姻不通者先王之道然乎又曰古有祭禮今之祠於古無所當也豫曰人之言然然不曰冬至祭始祖立春祭先祖君子之論然乎雖然吾有所取焉者以鄉人之義而隆於族以族人之義而萃於祠越國焉可也司農焉亦可也越國逺矣澤之在徽者猶未泯也自鄉逹於郡其為祠不一凡郡之人見汪氏之人者必曰此越國之後也見西溪之人者又必曰此司農之後也夫然則其族之人豈能忘諸或忘焉時假於祠本源之心有不興焉者乎燦於族為長實是焉倡浚暨前某縣知縣某蓋左右之祠建於正德庚午八月越明年辛未四月祠成族之有助於祠者名於碑隂鄒氏啓夀山新阡記啓壽山之阡太學生鄒望國表卜以葬其父時用府君而因以遷其祖良節公及其伯父時揚甫者也先是良節營徐塘東為夀藏比卒而葬時用遷其母於竹橋而合焉其仲子時揚祔封樹既成值家多故而浮言胥動曰兹弗利時用曰惟兹弗利實惟我先人體魄弗寧故吾弗足恤吾寧忍於先人乎於是乎有遷之圖未及圗而時用卒將卒治命望者亦先於是曰遷乃成葬中而大父左而伯父其右則而父既卒望行之如時用之志或謂葬其父而必遷其祖及其伯氏於禮何居君子曰禮緣情而節文之者也今夫屋不庇風雨則居不安茍安矣父有不思其子者乎子有不思其父者乎兄及弟有不胥思者乎死之墓生之居也死者有知亦何異生者與哉時用之志固良節之志也望也奉治命從事亦原諸情而已矣情出於義則禮可起不然則否望聞而卒行之時用卒於正德甲戌夏阡於是卜越明年乙亥秋阡成冬十有二月某日二柩遷自徐塘又明年丙子某月某日乃㑹而葬原曰九曲鄉曰泰伯其名啓壽山者嘉之也阡有堂三中祠良節公左祠時揚甫右祠時用府君亭於左右者六以居文刻右一堂儲祭器水流其前西通震澤東合於鵝湖良節諱珮湖廣通道知縣驎之子例授承事郎時揚諱翹時用諱翎例授蘇州衛指揮使望其長子也頃以阡成輿疾詣豫請記書曰資富能訓又曰純其藝黍稷以孝養厥父母豫謂鄒氏父子兄弟有之於是乎書西青小隱記山之蒼蒼其正色耶其草木之葱鬱者然耶山有草木其葱然鬱然者固草木之色也山無草木者亦多有之吾嘗迫而觀焉其質土也石也其色亦土也石也少逺而觀焉亦夫色也及乎數十里之外則蒼蒼之色與有草木者同矣今夫地之上凡虛空者皆天之氣也山起於地而突乎天中得天之氣是以其色若是也山之蒼蒼其正色耶其草木之葱鬱者然耶夫椒之西峰曰西青山人謂山有諸峰而是峰獨擅是色故名歸之其所有草木固無加於諸峰也揆之吾前所論其不然耶錢君師聖築室其下名曰小隱師舜通經學古博雅多文蓋士之秀者也譬之山焉得天之氣多矣故凡聞師舜之言見師舜之行莫不賢之此師舜之所以為師舜猶山之所以為山也或曰師舜攻辭章故然或曰師舜習威儀故然信斯言也是以山之色獨歸諸草木也而可乎雖然山之氣盛而草木蕃焉士之道隆而詞章威儀著焉亦固其理也因山而得夫士之道遂為師舜記之小隱者為屋數楹屋前後植竹千挺中藏書數千卷凡為文事之具者皆備外有田數十畝挹湖水灌之足以供客山人謂之莊君子過焉為之賦詩者若干人嵗乙亥冬十月二泉邵某記後樂堂記正德乙亥秋八月德安府新作後樂堂成府聽事後故有退食所隘且久圮前知府遷安李侯某欲為堂未果壬申歲西充馬侯汝載繼知府事朞月政成乃有事於斯至是落焉侯以文正范公語顔之曰後樂蓋文正子忠宣公嘗倅於此能以家訓惠民民到於今稱之侯於是得師焉是之取爾同知樂平陶君某伻來致書以侯志請記豫病餘閒居不敢與聞天下之事然嘗聞諸孟子樂以天下憂以天下君子之情於是至矣至公乃復有先後之論焉何居天下之憂樂一也惟夫見人人殊故憂樂恆易其所自一郡邑以至天下蓋多有之是故先憂存乎知幾後樂存乎知務知幾之至則憂不得不先知務之至則樂不得不後後云後云非自介用逸衎衎醉飽而曰姑徐徐云爾之謂也書曰不惟不敢亦不暇蓋君子之情如此雖然天下樂矣則奚事之從昔者夫子論崇德嘗曰先事後得論仁又曰先難後獲德與仁吾事也夫以得獲為後則所謂事者固其所先者也至於天下何獨不然然則君子於此亦曰始乎憂勤終乎憂勤而已非古仁人其孰能與於此能言後樂者文正之徒也德安之政於是乎可觀矣侯名籥以進士厯官吏部貟外郎出知睢州起為今官用威濟惠革薄從忠懋著成績蓋聞忠宣之風而興起焉者豫與侯之兄故浙江布政使汝礪同舉進士因得拜其先大夫南京禮部尚書紫崖先生於翰林侯初舉進士豫在户部亦嘗一再見之蜀稱家學馬氏為盛君子觀侯之樹立亦豈待夫德安之徴也哉侯修舉於治者備矣美矣於侯為細不書蕭山縣新修儒學記正德癸酉秋七月蕭山縣新修儒學成學故在縣之某隅自某年始建於今若干年撓敝傾圮殆不可居先是辛未春監察御史海陵張君元德以巡按至則與參政吳君汝和相顧以嘆議圗新焉謂其南逼於民田位置弗稱亟令買而拓之時知縣事休寧吳侯瓚實始興役未幾吳擢知州以去而江浦王侯瑋以進士來繼㑹今提學憲副海陵徐君宣之至而飭修之政行焉侯乃慨然以為己任越明年壬申禮殿甫搆秋七月颶風大作繼以甚雨殿與先聖舊像皆毁侯於是加意圗之既旬月羣材復具且節畫以共至是以成告秋八月既望徐君觀而嘉之則屬楊教諭武余訓𨗳蘊使諸生徐行韓簉來請記惟道術裂而學無恆宗於是乎有諸師人才雜而仕無恆途於是乎有諸科庠序廢而仕無恆居於是乎有諸院舍蓋自周衰至於宋其變不一其大較可知也我明之興鍳於前代而先王時若學必本諸經說經者必本諸程朱氏而道術之裂者合士游庠序比年有貢三年有舉而人才之進者専自郡徂邑命官簡徒宫居廪食山林湖海罔有逸游而庠序之廢者興大哉聖謨實參天運而道久化成蓋有出於司存之外者若其屋廬之敝則新是圖焉非良有司其誰任之非賢典學其誰倡之今夫學必有堂堂之榜皆曰明倫蓋取諸孟子而孟子則聞諸舜之命契蓋萬世教學之道莫大於是先聖先師盡是以則則祠而奠焉經訓典籍載是以傳則閣而尊焉師以是授弟子以是受體是為德貌是為文缺是為病惟德輔世於學成矣而文虛病廢雖學焉君子謂之非學今是學也基缺於南衆以為病也則圗而方之必截然畫一而後為稱矧吾所謂倫者而或缺焉可謂之學乎此教焉者與學焉者事也非有司所與力也雖然此猶其常耳若夫時有升降世有隆汙窮居逹用我秉吾倫而危險荐臨厥或病之則固有若彼風雨之振陵我殿宇敗壞我像設者矣警焉而支之勉焉而復之以無改厥常比之致力於物者其艱為甚此固學者事也又非教焉者所與力也而奉詔作人者固有厚望焉徐君學政最諸藩其屬斯記也豈徒欲夫成之書哉寶不敏蓋亦嘗與聞是者請以為諸生告廟左學右粵有常制而門廡齊舍各奠厥所其事實作而以修書有故故也其費為白金八百兩有竒蓋㑹程有方故其用約其所出曰公楮之直參政君所檄致實是焉先曰廢寺之租曰微眚之贖則所謂節畫者也古重民力而是役無専斂焉故附書之徴瑞樓記徴瑞樓者監察御史海虞陳君元習奉母之居也元習之母談太孺人於是年七十矣而康寧順適以享元習之養元習之為斯樓蓋大七十之夀欲為稱慶者重焉爾也而親之娛侍固亦宜之歲丙子某月某日惟太孺人始生之辰鄉之君子自某官某公而下若干人登樓將舉慶觴太孺人出房西向再拜謝曰老婦不德敢勤長者之辱惟我先舅姑嘗作具慶之堂以奉我祖舅祖姑堂成之日有蜂數千若隕自天一巨蜂止於梁羣蜂尾綴若旒下去地二尺所而止餘蜂從而周旋焉者蓋不知其數君子曰瑞也詩而歌之者若干人先舅姑未敢當也吾雖不幸稱未亡人幸有二子繼舉進士察為御史寰為國史檢討吾今老矣叨兹榮號此固吾祖考之餘慶也其敢忘諸於是退啓北牖望闕稽首曰非君賜何以致此既乃遍謝諸客元習肅客燕於堂而退越明日元習再誦太孺人對客之言而曰吾母知尊祖矣題其樓之楣曰徴瑞又誦其望闕之言而曰吾母知尊君矣題其北牖之楣曰北望復自序其事詣豫請記豫惟天人之際至微而顯至逺而近惟盡乎人者能知之舍人而求天非鑿則荒其究也誣君子所不道也然則蜂之稱瑞於陳氏也何居易曰有父子然後有君臣蓋天之道如此蜂之為物能知君臣者也瑞云瑞云其諸謂夫父子之道篤於家而君臣之義將逹於國乎其身其子孫必有徴之者矣吾聞元習之大父繼芳甫敦尚禮義鄉稱長者大父叔維甫孝德尤著所以致瑞蓋其在兹叔維沒迄今未及六十年而二孫者皆位於朝官以史為名天下之法萬世之論各有司存蓋君臣之義莫是為大瑞之徴有不在兹乎所謂天道者近耶逺耶微耶顯耶君子之言固非舍人而求天者太孺人述之且有禮焉可以傳矣豫則何以加諸元習再拜曰此固所以記吾樓也請書以歸刻諸樓中為他日稱壽者誦之思約齊記泰伯鄒君存正以思約名齊而告於豫曰吾父讀論語至以約失之者鮮矣嘗廢書而歎謂是一言可終身行之因以名齊且為别號焉惟吾父勤一生以為業禮義方興而不幸奄棄有子四人兩兄早世而某也不肖獨承之以至今日惟先德是賴德之嗣惟約是宗而惠及鄉人義動公府凡為約之效者將次第而效之吾與弟某侍吾母孀居數十年而弟又夭沒某每謁祠墓亡矣失矣之悲不可釋也退而求諸心以思約自號以為是吾父之心之所存也自矢永久弗怠蓋嘗齊沐而走於錫麓於茅峰於雲巖於岱宗要盟大神而猶未巳惟先生有以教之豫曰孝哉存正可謂有人子之心者矣古之君子於親之亡也凡其居處笑語志意樂嗜無所不用其思今之人乃有欲加於是者凡親之别號思之慕之愛之見之稱謂胥效未巳存正蓋於此乎有之雖然古有諱禮所以廣敬也父母之名口不得言也尚矣今之别號猶名也已號之則人稱之昔以稱父而今以稱子二名不偏諱可也二號而偏稱之何居豫知存正久矣凡存正之為可以言孝不可以言禮禮所以成孝也有人子之心而要之以禮約之思其將由斯乎且盟以神曷若以心茍能充之孝不可勝用矣如以稱焉而已其如禮何書曰慎乃儉德惟懷永圗易曰默而成之不言而信存乎德行此古君子之道也存正以為何如存正起再拜曰倫方慕乎今君子之道而未及乎是聞子之言如見古君子矣請書以銘吾齊報德堂記報德堂者龔泰時亨以祠先者也堂搆於蓉湖别業其制為四楹間虛其中左右各為一室奉鄒龔二父主以二妣配生卒二忌各於是致享焉堂成則介潘繼芳氏請記於豫豫曰斯禮也吾未之前聞也吾惡乎記諸繼芳曰時亨鄒服乘氏之介子也幼以姻故母命子於龔景福氏既冠有室而景福之子節乃生或謂時亨盍去諸時亨曰龔父於吾猶吾父也父在吾何忍去比景福沒龔有分田或謂時亨盍取諸時亨曰有節在辭焉而營以力於室於器皆然蓋籍以鄒立而名若字猶繫之龔於是若干年矣初時亨之為斯堂也戚然曰生我之德大矣成我者與等泰皆不能忘也然龔則有弟矣有弟則主存祠焉非吾事也鄒則有兄矣有兄則宗存祠焉亦非吾事也非吾事而缺焉於吾心有不能自己者是故其報然而其禮然也斯不可記乎豫曰斯禮也吾固未之前聞也雖然時亨之情如子之言則有可取焉爾矣今夫世之人固有化於螺負而忘其本始者不然則朝同室而暮路人者亦多有之此其情於時亨何如也蓋詩有之曰欲報之德昊天罔極又曰無德不報殆時亨之情歟繼芳曰斯固時亨之情也斯不亦可記乎遂書以歸兖州府滋陽縣學記兖治於滋陽古魯地也魯在春秋為望國列國之觀禮樂者必之焉吾夫子生而地為闕里望繫於天下後世尤重是故君子於其學之興也固先望之其廢也固重歎之而况守土之吏有職存焉者哉惟兗之屬州縣學二十有七而滋陽邇以廢稱特甚乃正德癸酉沔陽童侯旭以户部郎中來知府事於是冦甫夷而荒繼之侯拊循略定即修府學復建鄉賢名宦之祠而余訓導信至亟以學廢告侯侯請諸監司皆報以非時未果今年春適有入資為儒官之令侯曰是令出士無志者將趨之吾弗能止將薄示抑焉以為學圖一日集其僚同知某通判某推官某及屬吏師生而謀焉僉曰宜哉而士亦樂承侯意凡得白金若干兩乃聚材鳩工以成畫授趙知縣繼祖卜日興事撤敝搆而廣厥基凡廣袤若干丈所越三月功成學惟復聖公顔子廟實以封國兖故今堂六楹間中肖公像冕而衮服儼然臨之庭廡門階各應儀式後為明倫堂為兩齊為講堂為㑹饌之室為燕息之舍為習射之圃以至倉庫庖湢諸制悉備衣冠絃誦與郡庠輝映觀者為魯邦之觀於是為稱訓導君以侯修復之功不可忘也乃走書幣不逺數千里以記屬某某昔奉詔視學江西侯以進士知瑞之上髙上高巗邑也侯於學事能不以多盜廢今揚厯既久來牧望郡將興學為天下先是固侯悅道之夙志無足異者獨其當兵荒之後興兹大役而公私無擾非才與力兼而動惟厥時不足以與此豫於是乎重嘉焉古者學有先聖先師而無常奉自先聖吾夫子而以顔子以下四大賢為先師其制於天下久矣乃若嘉祥學則廟曾鄒學則廟孟而滋陽則廟顔蓋猶國故之意創於洪武十有八年迄今若干年而新作焉完且美而惟舊焉仍禮也子周子稱顔子發聖人之蘊以教萬世謂士之學必由之諸生生聖人之鄉斯遊斯歌瞻仰在昔實得我師希賢而聖固其所也充其所志雖高識如兩生博聞如諸經師且猶未屑而况其下乎如是而稱魯之君子於天下固侯之所願也故因記而輒及之若夫國章古訓則博士弟子有常肄矣某無庸著其諸董役者之職名具列於後海天亭記亭於惠山之麓曷為以海天名山有泉發自巖竇滙而為池七池相注東入於溪北東百里入於江又東百餘里入於海海泉之所歸也吾嘗觀泉於池徘徊鑑影濯吾纓而樂之因思其所歸焉登髙而東北望曰海其在是吾泉至是極乎望而不見則仰天以歎嘯咏而歸山之麓於是乎亭亭成之明日豫與客登之語之以其故復韻而歌之歌曰兹山兮我泉始流兮涓涓東行兮何極指滄海以為淵逝晝夜兮不舍又焉知兮歲年吾窮源兮思委方在此兮忽彼望夫海兮未見見雲天兮興喟天𡨕𡨕兮雲深深登兹亭兮勞我心客有和者曰泉流兮山中日流兮日東彼東海兮伊邇吾舍此兮焉從源之委兮朝復宗子不聞兮古人曰有本兮如是孰進之見兮未見其止海際天兮天有光逺在彼兮近吾汪知子者謂子之有望不知子者謂子為荒海滙然兮天一方豫聞而使反之飲泉而退懷李樓記常郡守渤海李侯嵩既去之三年今守宜賔王侯教以南京刑部郎中來涖焉於是郡之城修建者六年矣侯與其寮盩厔范侯澤餘干胡侯守青城王侯鈞登而觀之曰壯哉城李君之功也既而見其壞者而修之而知其難也則又歎曰是未及其千一其難且爾况創焉成焉者哉李君之功於是為大矣既而聞李侯以城故得謗而去則又慨然曰功未酬而謗興誰歟尸者於是重為公論惜之謂西門為侯所去途也乃即其門之樓大書以榜之曰懷李若將代邦人君子言之者而屬某為記且託言於徐訓導淮申之以郡諸生陸輅陳表再而益勤烏乎是固吾意也昔者城成吾嘗為李侯記之謂是之功不難於經畫督率而惟任怨為難然方其任怨而從事也亦惟勞民是懼固不虞有謗之者及其受謗而去位也亦惟失民是戚亦不圗有懷之者夫懷與謗非異人出危警而逸忘近惑而久定恆物之情固其然乎非良後政誰其知之而誰敢昌言之書曰推賢讓能庶官乃和吾侯可謂能廣其讓矣若同時焉不有濟乎世有指議前政而自矜其伐者聞侯之風可以赧然矣豫病餘荒於文既謝不敏乃代民作歌為侯誦之歌曰昔侯城兮勞心民有怨兮侯則任城既成兮侯去晉陵固兮江深今侯來兮思昔榜高樓兮翼翼民有心兮侯知望周行兮何極今之侯兮非昔侯觀民風兮紀春秋思昔侯兮不見見今侯兮在樓屼其城兮吾何憂修泰伯廟記吾郡二守范侯以提學憲臺檄來涖我修學也實於吾邑戾止者兩月嘗道泰伯廟下入而謁焉見其蕪圮已甚嘆而謂從吏曰此至德之聖也國有祀焉而廟乃如此乎或曰鄉者祀於斯歲時朔望若吏初至謁皆於斯廟亦嘗飭矣自新廟於梅村之墓祀移而謁遂廢廟之蕪圮固宜其然侯曰若是哉民之迂且固也昔泰伯之讓國而東也實始闢是土人之克即禮義非泰伯其誰啓之墓之廟也以存故也而祀仍於邑習我吏民於敬夫豈不可而必梅村之之也學宫之修賢士與焉有聖人之廟蕪圮而若罔聞知可乎或曰近一二歲以祀之弗時亦既於斯從事矣廟將有修者侯曰政於義弗安圖之弗可一日緩也矧惟至德之聖邦人具依廟其忍弗修修之此其時乎抑吾斯舉所謂為之兆者寧亟圗之猶有繼焉與其俟也言訖遂以成畫授二耆民庀物鳩功而責成於署邑事者明日侯訪某於二泉精舍具語其故某起而揖曰侯之言是也某當為侯書之是惟正德辛丑夏五月草有二日至秋七月既望告成乃書侯名澤字汝霖陜西盩厔人署邑事者縣丞髙唐雲升户部左侍郎邵某記無錫縣儒學復五賢祠記無錫縣儒學之有五賢祠肇自宋季其初四人繼或以意益至九人薇山虞薦發氏實釐而正之損五人益一人是謂五賢五賢者為龜山先生文靖楊公玊泉先生喻公子才遂初先生尤公延之小山先生李公元德實齊先生蔣公良貴位則龜山中而南靣四君子者東西列焉事具尤棟氏所為記歷元入國朝以意益焉者尤多且遂並列無配今考其人莫不節具章成而其道於龜山則有間矣君子之論焉可誣也成化中祠再葺武功伯東海徐公記焉於五賢之承傳履厯詳矣而他不一及此其意蓋猶夫薇山也然而班簉如故弗革益加某少游於斯讀尤徐之文嘗謂是祠一失則泛再失則雜泛可裁也雜不可辨乎蓋亟瞻亟興嘆而莫可告者正德丁丑夏督學御史安成張君汝立毁諸尼若女冠之居以修我學宫人或以是為言汝立乃問於某某謂之曰人之言然盍亟圗之於是屬吾郡二守盩厔范侯汝霖擇地尊經閣後為堂四楹中龜山而從以四君子者如虞氏釐正之式復其榜曰五賢凡後所益者則於舊祠祠之謂之鄉賢邑博士唐德卿劉景儀鄭大節謂某實先斯議不可無記乃率其弟子某等來請昔韓子稱求觀聖人之道者自孟子始孟子後千餘年而兩程子繼之今之求道者不當自程子始乎龜山傳程子之道而南者也其在無錫久至十有八年說者謂其嘉泰伯延陵之風於是止而進修焉追惟其時及門若私淑蓋繁其人而四君子者深矣是祠是配其將自龜山以求程子乎其自程子以求聖人之道亦將於是乎在書曰升髙自下陟遐自邇斯舉也其有之是故裁泛以義昔之君子逺矣今之君子為其雜也而以名實立辨焉亦昔之君子之志也雖然非賢督學其孰與成之丁丑八月朔具官某記冉涇邵氏家廟碑銘有序惟皇明正德十年秋九月丙戌朏冉涇邵氏新作家廟成作者𤣥孫户部左侍郎寶自高祖至於寶皆適於禮為小宗寶不肖徼福於祖嘗厯官內外二品三品遵國典以廟稱禮也廟之制為屋四楹間遵今制上中虛其中前陳几敷席設鼎炬東西各為二室顯高祖叔安處士府君居東室顯曾祖存一處士府君居西室顯祖考皇贈通議大夫都察院右副都御史三益府君居東東室顯考皇贈奉直大夫許州知州加通議大夫都察院右副都御史純和府君居西西室蓋稽古昭穆之義四時祭遷主於中室前高祖南向曽祖東向祖西向考東向遞下而南各一位祭畢還主若朔望謁若出入告若有事告時物薦皆於中室前若忌祭則各於其室東西為二夾室東藏遺書服器西藏祭器外為門中庭為閣尊命誥於上凡所受敕副及賜書皆在焉兹惟麗牲之石敢刻兹銘銘曰維冉涇水南東其流維我邵宗宅哉維休維髙及曾生於斯亦斯焉遊越後百年𤣥孫寶有祿既遷乃復維祖維考朝有命服乃作新宫為族小宗惟禮義是從有子有孫百世其崇之容春堂後集卷二
